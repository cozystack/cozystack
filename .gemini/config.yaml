have_fun: false

ignore_patterns:
  - "**/charts/**"
  - "**/vendor/**"
  - "**/zz_generated.*.go"
  - "**/pkg/generated/**"
  - "**/_out/**"
  - "**/*.tgz"
  - "**/dashboards/**/*.json"
  - "**/*.patch"
  - "**/*.diff"
  - "**/images/*.json"

code_review:
  disable: false
  comment_severity_threshold: LOW
  max_review_comments: 50
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: false
