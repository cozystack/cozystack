name: Update Release Notes

on:
  push:
    branches:
      - main
    # Only run when a release changelog changes. The release body is synced from
    # docs/changelogs/v*.md, which lands on main either when the changelog PR
    # (tags.yaml generate-changelog) merges or when a maintainer edits an
    # existing changelog. The v* glob deliberately skips template.md /
    # patch-template.md in the same directory. Every other main push left this
    # job scanning the latest 30 releases for nothing.
    paths:
      - 'docs/changelogs/v*.md'
  # Manual re-sync hatch: re-run the changelog -> release-body sync without
  # touching a changelog file (e.g. if a release body drifted out of sync).
  workflow_dispatch:

concurrency:
  group: update-releasenotes-${{ github.workflow }}
  cancel-in-progress: false

# Top-level token defaults to read-only; jobs request the minimum extra scopes.
permissions:
  contents: read

jobs:
  update-releasenotes:
    name: Update Release Notes
    runs-on: [self-hosted]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Update release notes from changelogs
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const changelogDir = 'docs/changelogs';
            
            // Get releases from first page
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 30
            });
            
            console.log(`Found ${releases.data.length} releases (first page only)`);
            
            // Process each release
            for (const release of releases.data) {
              const tag = release.tag_name;
              const changelogFile = `${tag}.md`;
              const changelogPath = path.join(changelogDir, changelogFile);
              
              console.log(`\nProcessing release: ${tag}`);
              
              // Check if changelog file exists
              if (!fs.existsSync(changelogPath)) {
                console.log(`  ⚠️  Changelog file ${changelogFile} does not exist, skipping...`);
                continue;
              }
              
              // Read changelog file content
              let changelogContent;
              try {
                changelogContent = fs.readFileSync(changelogPath, 'utf8');
              } catch (error) {
                console.log(`  ❌ Error reading file ${changelogPath}: ${error.message}`);
                continue;
              }
              
              if (!changelogContent.trim()) {
                console.log(`  ⚠️  Changelog file ${changelogFile} is empty, skipping...`);
                continue;
              }
              
              // Check if content is already up to date
              const currentBody = release.body || '';
              if (currentBody.trim() === changelogContent.trim()) {
                console.log(`  ✓ Content is already up to date, skipping...`);
                continue;
              }
              
              // Update release notes
              try {
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                  body: changelogContent
                });
                console.log(`  ✅ Successfully updated release notes for ${tag}`);
              } catch (error) {
                console.log(`  ❌ Error updating release ${tag}: ${error.message}`);
                core.setFailed(`Failed to update release notes for ${tag}`);
              }
            }

