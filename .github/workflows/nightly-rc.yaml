name: Nightly RC

# Cut a write-once nightly release-candidate tag for each tracked target
# (main + active release-X.Y maintenance branches) when its HEAD has moved
# since the last nightly. The tag triggers the normal rc build/e2e path
# (tags.yaml + release-e2e.yaml). Tags are never moved or deleted here;
# retention.yaml prunes old nightlies.
#
# Gated by the NIGHTLY_RC_ENABLED repository variable so it can be merged dark
# and switched on deliberately (set the variable to 'true' to enable).

on:
  schedule:
    - cron: '0 1 * * *'   # daily 01:00 UTC
  workflow_dispatch: {}

concurrency:
  group: nightly-rc
  cancel-in-progress: false

jobs:
  nightly:
    name: Cut nightly rc tags
    runs-on: ubuntu-latest
    if: vars.NIGHTLY_RC_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.COZYSTACK_CI_APP_ID }}
          private-key: ${{ secrets.COZYSTACK_CI_PRIVATE_KEY }}
          owner: cozystack

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Cut nightly tags
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -eu
          git config user.name  "cozystack-ci[bot]"
          git config user.email "274107086+cozystack-ci[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}"

          DATE="$(date -u +%Y%m%d)"

          # Tracked targets: main + every release-X.Y maintenance branch.
          targets="main"
          for b in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/release-* 2>/dev/null); do
            br="${b#origin/}"
            # Only exact two-component maintenance branches (release-X.Y). A bare
            # shell glob also matches the per-tag staging branches tags.yaml
            # creates (release-1.4.0, release-1.4.0-rc.2, release-1.5.0-nightly.<date>),
            # so anchor with a regex to drop them.
            printf '%s\n' "$br" | grep -qE '^release-[0-9]+\.[0-9]+$' && targets="$targets $br"
          done

          # Highest vX.Y.Z stable tag (ignores prereleases) for next-version math.
          latest_stable() {
            git tag --list 'v*.*.*' --merged "origin/$1" 2>/dev/null \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1
          }

          for tgt in $targets; do
            # Check the branch out so the tag push carries base_ref — tags.yaml's
            # "Get base branch" step requires it (push via HEAD:refs/tags/<tag>).
            git checkout -B "$tgt" "origin/$tgt"
            HEAD_SHA="$(git rev-parse HEAD)"

            # Derive the in-development version for this target:
            #   main          -> next MINOR (.0)
            #   release-X.Y    -> next PATCH
            base="$(latest_stable "$tgt")"; base="${base#v}"
            maj="${base%%.*}"; rest="${base#*.}"; min="${rest%%.*}"; patch="${rest#*.}"
            : "${maj:=0}" "${min:=1}" "${patch:=0}"
            if [ "$tgt" = "main" ]; then
              devver="${maj}.$((min + 1)).0"
            else
              devver="${maj}.${min}.$((patch + 1))"
            fi
            tag="v${devver}-nightly.${DATE}"

            # Idempotent: skip if today's nightly already exists for this target.
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "↷ ${tag} already exists; skipping ${tgt}."
              continue
            fi

            # Skip if HEAD hasn't moved since the most recent nightly on this line.
            last="$(git tag --list "v${devver}-nightly.*" --merged "origin/$tgt" | sort | tail -1)"
            if [ -n "$last" ] && [ "$(git rev-parse "${last}^{}")" = "$HEAD_SHA" ]; then
              echo "↷ ${tgt} HEAD unchanged since ${last}; skipping."
              continue
            fi

            echo "▸ Tagging ${tgt} (${HEAD_SHA}) as ${tag}"
            git tag "${tag}" "${HEAD_SHA}"
            # HEAD is on ${tgt}, so the tag push carries base_ref=refs/heads/${tgt}.
            git push origin "HEAD:refs/tags/${tag}"
          done
