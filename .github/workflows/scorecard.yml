name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Run weekly on Mondays at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Declare default permissions as read-only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to publish results to the public scorecard.dev API
      # (OIDC token allows publish without storing long-lived credentials).
      id-token: write
      # Needed to read repository contents.
      contents: read
      # Needed to read workflow definitions for the Dangerous-Workflow check.
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish the results to the OpenSSF Scorecard public API so the
          # project appears at https://scorecard.dev/viewer/?uri=github.com/cozystack/cozystack
          publish_results: true

      # SARIF is kept as a downloadable artifact only. It is intentionally NOT
      # uploaded to GitHub code-scanning: Scorecard posts one alert per check,
      # which floods the Security > Code scanning dashboard and buries CodeQL's
      # first-party findings. The public scorecard.dev badge (publish_results
      # above) is the canonical view of these results.
      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5
