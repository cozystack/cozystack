name: E2E (fork)

# Privileged half of the fork-PR e2e split (#3257).
#
# A fork PR's `pull_request` run (pull-requests.yaml) carries no registry
# credentials, so it builds every image to an OCI archive and uploads it as an
# artifact instead of pushing (OCI_EXPORT_DIR). This workflow runs from the
# DEFAULT branch after that run completes — so it DOES have secrets — and:
#   1. pushes the pre-built image archives to OCIR BY DIGEST and flux-pushes the
#      digest-pinned packages tree (job `publish`); and
#   2. runs the e2e suite against them and reports the required "E2E Tests"
#      check-run back on the PR head SHA (jobs `e2e` + `report`).
#
# Security boundary: the untrusted fork code produced only opaque artifacts. The
# OCIR push token is live ONLY in `publish`, which runs trusted binaries
# (git/skopeo/flux/yq) over data — never `make` or any fork-authored script. The
# fork's images and test scripts run only in `e2e`, which has NO push token and
# runs in an ephemeral sandbox. This is why the split exists instead of a
# pull_request_target run that would hand fork code the credentials directly.
#
# Same-repo PRs are handled entirely by pull-requests.yaml; this workflow no-ops
# for them (see the `resolve` job guard).

on:
  workflow_run:
    workflows: ["Pull Request"]
    types: [completed]

# Cancel a stale privileged run when the fork pushes again (a newer Pull Request
# run for the same fork branch supersedes it). Keyed by fork repo + branch since
# the PR number is not known at workflow level.
concurrency:
  group: e2e-fork-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  REGISTRY: iad.ocir.io/idyksih5sir9/cozystack

permissions:
  contents: read

jobs:
  # Decide whether this is a fork PR that needs e2e, resolve its PR number and
  # head SHA, and open the pending "E2E Tests" check-run so the PR is not
  # mergeable until we conclude it. Every decision is derived from data the fork
  # cannot forge — the workflow_run conclusion, the base-repo PR list, and the
  # base-repo PR file list — NOT from the presence/absence of an artifact the
  # fork's own build controls. Fail-closed if the fork build failed or the
  # pr-patch artifact is missing; green-and-stop only for a PR whose file list is
  # entirely under docs/ (verified against the base-repo API).
  resolve:
    name: Resolve fork PR
    # Only fork PRs: head_repository differs from the base repository. Same-repo
    # PRs get "E2E Tests" from pull-requests.yaml's e2e-report job instead.
    if: >-
      ${{ github.event.workflow_run.event == 'pull_request'
      && github.event.workflow_run.head_repository.full_name != github.event.workflow_run.repository.full_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: read
    outputs:
      should_run:   ${{ steps.r.outputs.should_run }}
      pr_number:    ${{ steps.r.outputs.pr_number }}
      head_sha:     ${{ steps.r.outputs.head_sha }}
      run_id:       ${{ steps.r.outputs.run_id }}
      check_run_id: ${{ steps.open.outputs.check_run_id }}
      # TIA inputs derived from TRUSTED base-repo data (the PR file list and
      # labels), NOT the fork-controlled merge-ref diff — so suite selection
      # keeps the same anti-forgery property as the docs-only decision (#3257).
      changed_b64:  ${{ steps.r.outputs.changed_b64 }}
      full_e2e:     ${{ steps.r.outputs.full_e2e }}
    steps:
      # Decide the verdict using this step's default (workflow_run) token, which
      # already has the actions:read / pull-requests:read scopes these lookups
      # need. It creates NO check-run — the next step publishes the verdict as
      # the COZYSTACK_CI app so the app token stays scoped to checks:write only.
      - name: Resolve fork PR and decide verdict
        id: r
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          HEAD_SHA:   ${{ github.event.workflow_run.head_sha }}
          RUN_ID:     ${{ github.event.workflow_run.id }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        with:
          script: |
            const { HEAD_SHA, RUN_ID, CONCLUSION } = process.env;
            const { owner, repo } = context.repo;
            // Validate the SHA before it flows into a check-run / image tag.
            if (!/^[0-9a-f]{40}$/.test(HEAD_SHA)) {
              core.setFailed(`unexpected head_sha '${HEAD_SHA}'`);
              return;
            }
            core.setOutput('head_sha', HEAD_SHA);
            core.setOutput('run_id', String(RUN_ID));

            // Record a terminal verdict for the `open` step to publish as a
            // completed check-run. This step never creates a check itself.
            const decide = (conclusion, summary) => {
              core.setOutput('verdict_status', 'completed');
              core.setOutput('verdict_conclusion', conclusion);
              core.setOutput('verdict_summary', summary);
              core.setOutput('should_run', 'false');
            };

            // Fork build did not succeed → fail the required check (fail-closed).
            if (CONCLUSION !== 'success') {
              decide('failure', `Pull Request workflow concluded '${CONCLUSION}'; e2e not run`);
              return;
            }

            // Resolve the PR number for this commit (workflow_run.pull_requests
            // is empty for forks). Select ONLY an OPEN PR — never fall back to a
            // closed/merged association, which a fork could point at a stale
            // commit to smuggle a green through. Validate it is a bare integer
            // before it flows into a checkout ref.
            const assoc = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: HEAD_SHA,
            });
            const pr = assoc.data.find(p => p.state === 'open');
            const prNumber = pr ? String(pr.number) : '';
            if (!/^[0-9]+$/.test(prNumber)) {
              decide('failure', `no open PR for ${HEAD_SHA}`);
              return;
            }
            core.setOutput('pr_number', prNumber);

            // Docs-only decision from TRUSTED data: the base-repo PR file list,
            // NOT the presence of a fork-build artifact. A fork controls whether
            // pull-requests.yaml emits pr-patch (its plan step runs from the fork
            // merge commit), so inferring docs-only from a missing artifact would
            // let a fork skip e2e and conclude green with nothing tested (#3257).
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: Number(prNumber), per_page: 100,
            });
            const hasNonDocs = files.some(f => !f.filename.startsWith('docs/'));
            if (!hasNonDocs) {
              decide('success', 'docs-only PR (verified via PR file list) — e2e not required');
              return;
            }

            // Non-docs change → e2e is REQUIRED. The fork build must have produced
            // the pr-patch artifact; a missing one means the build did not
            // complete, so fail closed (never conclude green without running e2e).
            const arts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: RUN_ID, per_page: 100 },
            );
            if (!arts.some(a => a.name === 'pr-patch')) {
              decide('failure', 'expected pr-patch artifact is missing — the fork build did not complete');
              return;
            }

            // Test-Impact Analysis inputs, from the SAME trusted sources as the
            // docs-only decision above: the base-repo PR file list drives suite
            // selection (base64 so newlines survive the job output), and the
            // base-repo PR labels drive the full-e2e override. Deriving these
            // from `git diff` on the fork-controlled merge ref would let a fork
            // shape the diff so TIA selects nothing and e2e is skipped — the
            // same class of bypass #3257 closes. select-e2e.sh fails safe to the
            // full suite on any unrecognised path, so this can only narrow.
            const changed = files.map(f => f.filename).join('\n');
            core.setOutput('changed_b64', Buffer.from(changed, 'utf8').toString('base64'));
            const fullE2e = (pr.labels || []).some(l => l.name === 'full-e2e');
            core.setOutput('full_e2e', fullE2e ? 'true' : 'false');

            // Real run: the `open` step opens an in-progress check-run; `report`
            // concludes it.
            core.setOutput('verdict_status', 'in_progress');
            core.setOutput('verdict_summary', 'Running e2e in the privileged fork workflow…');
            core.setOutput('should_run', 'true');

      # Skipped when `resolve` set-failed on a bad SHA (fail-closed: no check →
      # "E2E Tests" stays unreported → PR not mergeable).
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.COZYSTACK_CI_APP_ID }}
          private-key: ${{ secrets.COZYSTACK_CI_PRIVATE_KEY }}
          owner: cozystack
          repositories: ${{ github.event.repository.name }}
          permission-checks: write
      # Publish the verdict as the COZYSTACK_CI app so the check-run lands in the
      # app's own check-suite — matching the same-repo e2e-report path and the
      # branch-protection pin (see pull-requests.yaml e2e-report comment and
      # docs/agents/e2e-testing.md §10). Creating it with the default token would
      # file it under an arbitrary GitHub Actions suite (a labeler).
      - name: Open "E2E Tests" check-run (as app)
        id: open
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          STATUS:     ${{ steps.r.outputs.verdict_status }}
          CONCLUSION: ${{ steps.r.outputs.verdict_conclusion }}
          SUMMARY:    ${{ steps.r.outputs.verdict_summary }}
          HEAD_SHA:   ${{ steps.r.outputs.head_sha }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { STATUS, CONCLUSION, SUMMARY, HEAD_SHA } = process.env;
            const { owner, repo } = context.repo;
            const params = {
              owner, repo, name: 'E2E Tests', head_sha: HEAD_SHA,
              status: STATUS,
              output: { title: 'E2E Tests', summary: SUMMARY },
            };
            if (STATUS === 'completed') params.conclusion = CONCLUSION;
            const cr = await github.rest.checks.create(params);
            // Only the real (in-progress) run is handed to `report` to conclude.
            if (STATUS === 'in_progress') core.setOutput('check_run_id', String(cr.data.id));

  # Push the fork-built image archives to OCIR by digest and flux-push the
  # digest-pinned packages tree. Only trusted binaries touch the fork's content
  # while the OCIR token is live — no `make`/fork script runs here.
  publish:
    name: Push fork images + packages artifact
    needs: [resolve]
    if: ${{ needs.resolve.outputs.should_run == 'true' }}
    runs-on: oracle-vm-4cpu-16gb-x86-64
    timeout-minutes: 40
    # No `packages: write`: this job authenticates to OCIR via OCIR_USER/
    # OCIR_TOKEN (not the GHCR GITHUB_TOKEN), so it needs no GHCR push scope.
    permissions:
      contents: read
      actions: read
    outputs:
      packages_digest: ${{ steps.push.outputs.packages_digest }}
    steps:
      - name: Set up toolchain (skopeo, flux)
        env:
          # Pin the flux CLI instead of install.sh's rolling latest. This is the
          # one privileged job that runs a remote installer as root right before
          # the OCIR token is loaded, so it pins where the rest of CI does not;
          # keep it in step with the flux distro cozystack ships
          # (packages/system/fluxcd, 2.8.x).
          FLUX_VERSION: "2.8.6"
        run: |
          command -v skopeo >/dev/null || { sudo apt-get update -qq && sudo apt-get install -y -qq skopeo; }
          if ! command -v flux >/dev/null; then
            s="$(mktemp)"
            curl -fsSL https://fluxcd.io/install.sh -o "$s"
            sudo env "FLUX_VERSION=$FLUX_VERSION" bash "$s"
            rm -f "$s"
          fi
      # The base repo's own merge ref — safe to fetch, not fork-controlled code
      # execution. pr.patch is applied as DATA below; nothing from the tree runs.
      - name: Checkout PR merge ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/pull/${{ needs.resolve.outputs.pr_number }}/merge
          fetch-depth: 0
          persist-credentials: false
      # Guard against a TOCTOU race: the check-run is stamped on the SHA `resolve`
      # saw, but refs/pull/N/merge tracks the live PR head. If the fork pushed
      # again between resolve and here, HEAD^2 (the merge ref's PR-head parent)
      # no longer matches — abort rather than push/test unresolved code.
      - name: Assert checkout matches resolved head SHA
        env:
          EXPECTED_SHA: ${{ needs.resolve.outputs.head_sha }}
        run: |
          got="$(git rev-parse HEAD^2)"
          [ "$got" = "$EXPECTED_SHA" ] || { echo "::error::merge ref moved: HEAD^2=$got != resolved $EXPECTED_SHA"; exit 1; }
      - name: Download pr.patch
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pr-patch
          path: _out/assets
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.resolve.outputs.run_id }}
      - name: Apply pr.patch (reconstruct digest-pinned tree)
        run: git apply --3way _out/assets/pr.patch
      - name: Download OCI image archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: pr-oci-*
          merge-multiple: true
          path: _out/oci
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.resolve.outputs.run_id }}
      - name: Login to OCIR
        env:
          OCIR_USER:  ${{ secrets.OCIR_USER }}
          OCIR_TOKEN: ${{ secrets.OCIR_TOKEN }}
        run: |
          # skopeo (image copies) and flux (artifact push, via the docker
          # keychain) each need OCIR auth. Token via stdin, never argv.
          echo "$OCIR_TOKEN" | skopeo login "${REGISTRY%%/*}" -u "$OCIR_USER" --password-stdin
          echo "$OCIR_TOKEN" | docker login "${REGISTRY%%/*}" -u "$OCIR_USER" --password-stdin
      # Trusted allowlist of image repo names. Every OCI archive a fork PR pushes
      # under ${REGISTRY}/ must be one the BASE tree can itself export — derived
      # from the base parent (HEAD^1), never the fork's Makefiles, so a fork
      # cannot mint an arbitrary repo path under the CI registry by renaming an
      # image (#3262 non-blocking hardening). `make -n` only expands recipes (no
      # build); COZYSTACK_VERSION is set so the version probe in common-envs.mk
      # stays dormant. The charset guard in the push loop stays as defence in
      # depth; this narrows it to the exact expected set.
      - name: Derive trusted image allowlist (base tree)
        run: |
          set -eu
          base="$(git rev-parse HEAD^1)"
          # Unique path so a leftover from a crashed/concurrent run on the shared
          # self-hosted runner can't fail `git worktree add`.
          bt="$(mktemp -d)/basetree"
          git worktree add --quiet --detach "$bt" "$base"
          git -C "$bt" ls-files 'packages/*/*/Makefile' | while IFS= read -r mk; do
            grep -qE '^image:' "$bt/$mk" || continue
            make -n -C "$bt/$(dirname "$mk")" image \
              OCI_EXPORT_DIR=/oci REGISTRY=r COZYSTACK_VERSION=0 2>/dev/null || true
          done \
            | grep -oE '(dest=/oci/|oci-archive:/oci/)[a-z0-9._-]+\.oci\.tar' \
            | sed -E 's#.*/##; s#\.oci\.tar$##' | sort -u > _allow.txt
          git worktree remove --force "$bt"
          n="$(wc -l < _allow.txt)"
          [ "$n" -ge 1 ] || { echo "::error::image allowlist derivation produced no names"; exit 1; }
          echo "Allowed image repos ($n):"; sed 's/^/  /' _allow.txt
      - name: Push images by digest + packages artifact
        id: push
        env:
          # Tag is cosmetic — consumers resolve by @sha256 digest (baked into
          # pr.patch) — but keep the pr-<N>-<sha> scheme for discoverability and
          # retention. Both values are validated in `resolve`.
          IMAGE_TAG: pr-${{ needs.resolve.outputs.pr_number }}-${{ needs.resolve.outputs.head_sha }}
          HEAD_SHA:  ${{ needs.resolve.outputs.head_sha }}
        run: |
          set -eu
          shopt -s nullglob
          # A non-docs fork PR must have exported at least one image; an empty
          # download means the build silently produced nothing — fail rather than
          # push an empty closure and let e2e install a stale/mismatched tree.
          count=$(ls _out/oci/*.oci.tar 2>/dev/null | wc -l)
          [ "$count" -ge 1 ] || { echo "::error::no OCI image archives to push"; exit 1; }
          for f in _out/oci/*.oci.tar; do
            name="$(basename "$f" .oci.tar)"
            # The archive basename becomes a registry repo path — the fork picked
            # the filename, so validate it against a strict charset before it
            # flows into a docker:// ref (defence against a crafted artifact name).
            case "$name" in
              *[!a-z0-9._-]*|""|-*) echo "::error::unexpected image archive name: $name"; exit 1;;
            esac
            # …and against the trusted base-tree allowlist, so a charset-clean but
            # unexpected name cannot create a junk repo under the CI registry.
            grep -qxF "$name" _allow.txt || { echo "::error::image '$name' is not in the base-tree allowlist"; exit 1; }
            echo "Pushing $name → ${REGISTRY}/${name}:${IMAGE_TAG}"
            # --all so a multi-platform build copies the whole manifest list and
            # its index digest is preserved (else containerimage.digest — the
            # index digest baked into pr.patch — would not resolve). --preserve-
            # digests keeps every manifest digest bit-for-bit so the
            # ${REGISTRY}/${name}@sha256:… refs in pr.patch resolve.
            skopeo copy --all --preserve-digests "oci-archive:$f" "docker://${REGISTRY}/${name}:${IMAGE_TAG}"
          done
          # Push the fully-patched packages tree — the OCI artifact the in-cluster
          # operator pulls. This uploads data; it runs no code from the tree.
          flux push artifact "oci://${REGISTRY}/cozystack-packages:${IMAGE_TAG}" \
            --path=packages \
            --source=https://github.com/cozystack/cozystack \
            --revision="fork-pr:${HEAD_SHA}" 2>&1 | tee _push.log
          digest="$(awk -F@ '/artifact successfully pushed/ {print $2}' _push.log)"
          [ -n "$digest" ] || { echo "::error::failed to capture packages artifact digest"; exit 1; }
          echo "packages_digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Pushed packages artifact @${digest}"

  # Run the e2e suite against the pushed closure. NO OCIR push token here — the
  # sandbox pulls images anonymously; the fork's images/scripts run only in this
  # ephemeral job. Mirrors pull-requests.yaml's in-tree e2e, including Chainsaw
  # Test-Impact Analysis — scoped from resolve's TRUSTED base-repo file list
  # (not a fork-controlled merge-ref diff), so suite selection can only narrow.
  e2e:
    name: E2E (fork run)
    needs: [resolve, publish]
    if: ${{ needs.resolve.outputs.should_run == 'true' }}
    runs-on: oracle-vm-32cpu-128gb-x86-64
    timeout-minutes: 180
    permissions:
      contents: read
      packages: read
      actions: read
    # Set the sandbox name as a job-level env var rather than writing it to
    # $GITHUB_ENV from a step (which the zizmor github-env audit flags). run_id
    # is unique per run — in workflow_run context GITHUB_REF is the default
    # branch, so it can't disambiguate concurrent fork runs on a shared host.
    env:
      SANDBOX_NAME: cozy-e2e-sandbox-fork-${{ github.run_id }}
    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/pull/${{ needs.resolve.outputs.pr_number }}/merge
          fetch-depth: 0
          persist-credentials: false
      # Same TOCTOU guard as `publish`: refuse to test a merge ref that moved off
      # the SHA the check-run is stamped on (see the publish job for the rationale).
      - name: Assert checkout matches resolved head SHA
        env:
          EXPECTED_SHA: ${{ needs.resolve.outputs.head_sha }}
        run: |
          got="$(git rev-parse HEAD^2)"
          [ "$got" = "$EXPECTED_SHA" ] || { echo "::error::merge ref moved: HEAD^2=$got != resolved $EXPECTED_SHA"; exit 1; }
      - name: Set up toolchain (yq)
        run: |
          command -v yq >/dev/null || { sudo curl -sSL -o /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq; }
      - name: Download Talos image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: talos-image
          path: _out/assets
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.resolve.outputs.run_id }}
      - name: Download pr.patch
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pr-patch
          path: _out/assets
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.resolve.outputs.run_id }}
      - name: Apply pr.patch
        run: git apply --3way _out/assets/pr.patch
      # Point the installer at the packages artifact `publish` pushed (the
      # artifact carries no self-digest, so pin it on the values we install).
      - name: Pin installer to pushed packages artifact
        env:
          PACKAGES_DIGEST: ${{ needs.publish.outputs.packages_digest }}
        run: |
          yq -i ".cozystackOperator.platformSourceUrl = \"oci://${REGISTRY}/cozystack-packages\"" packages/core/installer/values.yaml
          yq -i ".cozystackOperator.platformSourceRef = \"digest=${PACKAGES_DIGEST}\"" packages/core/installer/values.yaml
      - name: Prepare workspace
        run: |
          rm -rf "/tmp/$SANDBOX_NAME"
          cp -r "${{ github.workspace }}" "/tmp/$SANDBOX_NAME"
      - name: Prepare environment
        run: |
          cd "/tmp/$SANDBOX_NAME"
          attempt=0
          until make SANDBOX_NAME=$SANDBOX_NAME prepare-env; do
            attempt=$((attempt + 1))
            if [ $attempt -ge 3 ]; then echo "Attempt $attempt failed, exiting..."; exit 1; fi
            echo "Attempt $attempt failed, retrying..."
          done
      - name: Install Cozystack into sandbox
        run: |
          cd "/tmp/$SANDBOX_NAME"
          if ! make -C packages/core/testing SANDBOX_NAME=$SANDBOX_NAME install-cozystack; then
            echo "❌ Install failed (no retry — diagnostics below)"
            echo "::group::HelmRelease status"
            docker exec "$SANDBOX_NAME" sh -c 'kubectl get hr -A -o wide 2>&1 | tail -100' || true
            echo "::endgroup::"
            echo "::group::not-Ready HelmReleases"
            docker exec "$SANDBOX_NAME" sh -c 'kubectl get hr -A --no-headers 2>/dev/null | awk "\$4 != \"True\" {print \$1\" \"\$2}"' \
              | while read -r ns name; do
                  echo "--- $ns/$name ---"
                  docker exec "$SANDBOX_NAME" sh -c "kubectl describe hr '$name' -n '$ns' 2>&1 | tail -50" || true
                done
            echo "::endgroup::"
            exit 1
          fi
      - name: Run OpenAPI tests
        run: |
          cd "/tmp/$SANDBOX_NAME"
          make -C packages/core/testing SANDBOX_NAME=$SANDBOX_NAME test-openapi
      # Test-Impact Analysis: select only the Chainsaw suites the PR diff
      # affects. The changed-file list is resolve's TRUSTED base-repo listFiles
      # (base64 through the job output), NOT a git diff on the fork-controlled
      # merge ref — so a fork cannot shape the diff to make TIA select nothing.
      # select-e2e.sh escalates to the full suite on any unrecognised path, so
      # this only narrows. Skipped (→ full suite below) on the full-e2e label.
      - name: Select E2E tests
        id: select
        if: ${{ needs.resolve.outputs.full_e2e != 'true' }}
        env:
          CHANGED_B64: ${{ needs.resolve.outputs.changed_b64 }}
        run: |
          cd "/tmp/$SANDBOX_NAME"
          printf '%s' "$CHANGED_B64" | base64 -d > /tmp/changed.txt
          echo "Changed files:"; sed 's/^/  /' /tmp/changed.txt
          apps="$(./hack/select-e2e.sh /tmp/changed.txt)"
          echo "Selected apps: ${apps:-<none>}"
          echo "apps=${apps}" >> "$GITHUB_OUTPUT"
          if [ -z "${apps}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      # Single `chainsaw test` invocation, no per-app retry loop (e2e-testing.md
      # §1) — Chainsaw polls each assertion to its own timeout. Full suite when
      # the full-e2e label skipped selection or the selection is empty.
      - name: Run E2E tests
        id: e2e_tests
        if: ${{ steps.select.outputs.skip != 'true' }}
        env:
          SELECTED_APPS: ${{ steps.select.outputs.apps }}
          FULL_E2E: ${{ needs.resolve.outputs.full_e2e }}
        run: |
          cd "/tmp/$SANDBOX_NAME"
          if [ "$FULL_E2E" = "true" ] || [ -z "$SELECTED_APPS" ]; then
            suites=""        # empty => test-chainsaw runs the whole suite
            echo "Running full chainsaw suite"
          else
            suites="$SELECTED_APPS"
            echo "Running selected chainsaw suites: $suites"
          fi
          if ! make -C packages/core/testing SANDBOX_NAME=$SANDBOX_NAME test-chainsaw CHAINSAW_SUITES="$suites"; then
            echo "❌ Chainsaw E2E failed (see the assertion diffs above and diagnostics below)"
            echo "::group::Diagnostics: HelmRelease status"
            docker exec "$SANDBOX_NAME" sh -c 'kubectl get hr -A -o wide 2>&1 | tail -50' || true
            echo "::endgroup::"
            echo "::group::Diagnostics: recent events"
            docker exec "$SANDBOX_NAME" sh -c 'kubectl get events -A --sort-by=.lastTimestamp 2>&1 | tail -30' || true
            echo "::endgroup::"
            echo "::group::Diagnostics: COSI bucket state"
            docker exec "$SANDBOX_NAME" sh -c '
              kubectl get bucketclaims.objectstorage.k8s.io -A -o custom-columns="NAMESPACE:.metadata.namespace,NAME:.metadata.name,READY:.status.bucketReady,BUCKET:.status.bucketName" 2>&1
              kubectl get buckets.objectstorage.k8s.io -o custom-columns="NAME:.metadata.name,READY:.status.bucketReady,ID:.status.bucketID,CLAIMNS:.spec.bucketClaim.namespace" 2>&1
              kubectl get bucketaccesses.objectstorage.k8s.io -A -o custom-columns="NAMESPACE:.metadata.namespace,NAME:.metadata.name,GRANTED:.status.accessGranted,CLAIM:.spec.bucketClaimName" 2>&1
            ' || true
            echo "::endgroup::"
            exit 1
          fi
          echo "✅ All selected E2E tests passed"
      - name: Collect chainsaw report
        if: always()
        run: |
          cd "/tmp/$SANDBOX_NAME"
          mkdir -p _out
          docker cp "$SANDBOX_NAME":/workspace/hack/e2e-chainsaw/chainsaw-report.xml \
            _out/chainsaw-report.xml || true
      - name: Upload chainsaw report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chainsaw-report
          path: /tmp/${{ env.SANDBOX_NAME }}/_out/chainsaw-report.xml
          if-no-files-found: ignore
      - name: Collect report
        if: always()
        run: |
          cd "/tmp/$SANDBOX_NAME"
          make -C packages/core/testing SANDBOX_NAME=$SANDBOX_NAME collect-report || true
      - name: Upload cozyreport.tgz
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cozyreport
          path: /tmp/${{ env.SANDBOX_NAME }}/_out/cozyreport.tgz
          if-no-files-found: warn
      - name: Tear down sandbox
        if: always()
        run: make -C packages/core/testing SANDBOX_NAME=$SANDBOX_NAME delete || true
      - name: Remove workspace
        if: always()
        run: rm -rf "/tmp/$SANDBOX_NAME"

  # Conclude the required "E2E Tests" check-run opened by `resolve`. Always runs
  # (so a failed publish/e2e still turns the check red rather than leaving it
  # stuck in-progress). success only when the e2e job passed.
  report:
    name: Report fork E2E status
    needs: [resolve, publish, e2e]
    if: ${{ always() && needs.resolve.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # The pending check-run was opened by the COZYSTACK_CI app in `resolve`;
      # checks.update must run as the same app, so mint its token here too.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.COZYSTACK_CI_APP_ID }}
          private-key: ${{ secrets.COZYSTACK_CI_PRIVATE_KEY }}
          owner: cozystack
          repositories: ${{ github.event.repository.name }}
          permission-checks: write
      - name: Conclude "E2E Tests" check-run
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          CHECK_RUN_ID:   ${{ needs.resolve.outputs.check_run_id }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
          E2E_RESULT:     ${{ needs.e2e.result }}
          HEAD_SHA:       ${{ needs.resolve.outputs.head_sha }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { CHECK_RUN_ID, PUBLISH_RESULT, E2E_RESULT, HEAD_SHA } = process.env;
            const { owner, repo } = context.repo;
            let conclusion, summary;
            if (E2E_RESULT === 'success') {
              conclusion = 'success';
              summary = 'fork e2e passed (privileged run)';
            } else if (PUBLISH_RESULT !== 'success') {
              conclusion = 'failure';
              summary = `image/artifact publish did not succeed (result: ${PUBLISH_RESULT})`;
            } else {
              conclusion = 'failure';
              summary = `fork e2e did not pass (result: ${E2E_RESULT})`;
            }
            if (CHECK_RUN_ID) {
              await github.rest.checks.update({
                owner, repo, check_run_id: Number(CHECK_RUN_ID),
                status: 'completed', conclusion,
                output: { title: 'E2E Tests', summary },
              });
            } else {
              await github.rest.checks.create({
                owner, repo, name: 'E2E Tests', head_sha: HEAD_SHA,
                status: 'completed', conclusion,
                output: { title: 'E2E Tests', summary },
              });
            }
            core.info(`E2E Tests → ${conclusion}: ${summary}`);
