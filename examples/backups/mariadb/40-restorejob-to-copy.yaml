# To-copy restore. Targets the empty mariadb-target MariaDB app from
# 30-mariadb-target.yaml; the driver creates a k8s.mariadb.com/Restore CR
# with mariaDbRef=mariadb-target so the operator replays the logical
# dump into the running target while mariadb-src stays running and
# untouched.
#
# Driven for the same-namespace happy path by run-all.sh in this
# directory (and the mariadb-2-backup-roundtrip Chainsaw suite); also
# applicable manually with kubectl apply -f. The cross-tenant variant
# stays manual; see 30-mariadb-target.yaml for the network-policy reason.
---
apiVersion: backups.cozystack.io/v1alpha1
kind: RestoreJob
metadata:
  name: mariadb-src-to-mariadb-target
spec:
  backupRef:
    name: mariadb-src-adhoc
  targetApplicationRef:
    apiGroup: apps.cozystack.io
    kind: MariaDB
    name: mariadb-target
