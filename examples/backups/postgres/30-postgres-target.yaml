# Empty target Postgres instance for the to-copy restore. Keeping the spec
# minimal - the CNPG driver overlays bootstrap.* and backup.* values when
# the RestoreJob fires; the chart then renders externalClusters[] from
# those values so the new cluster's restore_command can fetch WALs from
# the source's S3 archive.
#
# This manifest is the reference for the same-namespace to-copy happy path:
# deploy it alongside pg-src and the restore leaves the source running. The
# gated postgres backup e2e (hack/e2e-chainsaw/postgres, opt in with
# POSTGRES_E2E_S3_ROUNDTRIP=1) drives exactly this flow via run-all.sh. The
# cross-tenant variant (target in tenant-test, source's seaweedfs in
# tenant-root) is blocked by the per-tenant Cilium egress policy.
---
apiVersion: apps.cozystack.io/v1alpha1
kind: Postgres
metadata:
  name: pg-target
spec:
  replicas: 2
  size: 5Gi
