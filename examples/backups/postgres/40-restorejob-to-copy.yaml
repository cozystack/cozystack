# To-copy restore. Targets the empty pg-target Postgres app from
# 30-postgres-target.yaml; the chart bootstraps a fresh cnpg.io Cluster
# from the source's Barman archive while pg-src stays running and
# untouched.
#
# The reference for the same-namespace happy path, and the final step the
# gated postgres backup e2e (hack/e2e-chainsaw/postgres, opt in with
# POSTGRES_E2E_S3_ROUNDTRIP=1) asserts via run-all.sh. The cross-tenant variant
# stays manual; see 30-postgres-target.yaml for the network-policy reason.
---
apiVersion: backups.cozystack.io/v1alpha1
kind: RestoreJob
metadata:
  name: pg-src-to-pg-target
spec:
  backupRef:
    name: pg-src-adhoc
  targetApplicationRef:
    apiGroup: apps.cozystack.io
    kind: Postgres
    name: pg-target
