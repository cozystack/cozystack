# Static S3 credentials Secret consumed by the CNPG driver. The shape MUST
# carry AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY because that's what
# CNPG's barmanObjectStore.s3Credentials reads.
#
# Cozystack emits a per-user Secret named "bucket-<bucketname>-<username>"
# carrying a BucketInfo JSON blob (see 00-bucket.yaml's users.backup). The
# fastest way to materialise these credentials is:
#
#   BI=$(kubectl -n tenant-foo get secret bucket-pg-backups-backup \
#        -o jsonpath='{.data.BucketInfo}' | base64 -d)
#   AK=$(echo "$BI" | jq -r '.spec.secretS3.accessKeyID')
#   SK=$(echo "$BI" | jq -r '.spec.secretS3.accessSecretKey')
#   for app in pg-src pg-target; do
#     kubectl -n tenant-foo create secret generic ${app}-cnpg-backup-creds \
#       --from-literal=AWS_ACCESS_KEY_ID="$AK" \
#       --from-literal=AWS_SECRET_ACCESS_KEY="$SK" \
#       --dry-run=client -o yaml | kubectl apply -f -
#   done
#
# The Secret name MUST match strategyRef's s3Credentials.secretRef.name
# template (see 10-cnpg-strategy.yaml).
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-src-cnpg-backup-creds
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: REPLACE_WITH_BUCKET_ACCESS_KEY
  AWS_SECRET_ACCESS_KEY: REPLACE_WITH_BUCKET_SECRET_KEY
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-target-cnpg-backup-creds
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: REPLACE_WITH_BUCKET_ACCESS_KEY
  AWS_SECRET_ACCESS_KEY: REPLACE_WITH_BUCKET_SECRET_KEY
