# Chainsaw port of hack/e2e-apps/postgres.bats ("Create DB PostgreSQL").
#
# Every `timeout N sh -ec "until kubectl get ..."` + `kubectl wait` pair from
# the BATS test collapses into a single assert: chainsaw polls until the
# resource exists AND matches, or the timeout expires. Failure output is a
# structured diff of the assertion tree against the live object.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: postgres
spec:
  # Diagnostics collected automatically when any step fails. The BATS suite
  # only does this in harbor.bats, by hand.
  catch:
  - events: {}
  - describe:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: postgres-test
  - podLogs:
      selector: cnpg.io/cluster=postgres-test
      tail: 50
  steps:
  - name: create-postgres
    try:
    - apply:
        file: postgres.yaml

  - name: wait-helmrelease-ready
    try:
    - assert:
        timeout: 6m
        resource:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: postgres-test
          status:
            # JMESPath filter: condition order in the array does not matter
            (conditions[?type == 'Ready']):
            - status: "True"

  - name: wait-init-job-complete
    try:
    - assert:
        timeout: 2m
        resource:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: postgres-test-init-job
          status:
            (conditions[?type == 'Complete']):
            - status: "True"

  - name: verify-services-and-endpoints
    try:
    # Replaces three `until kubectl get svc ... | grep -q 5432` loops
    # TODO(chainsaw>0.2.15): the (ports[0].port) / (ports[*].port) projection form in
    # these Service asserts is a v0.2.15 workaround for mis-evaluated number-literal
    # filters (ports[?port==`5432`]); (ports[0]) also checks only the first port.
    # Restore the filter form on a chainsaw bump. Same workaround lives in
    # kafka/mariadb/harbor — see "Chainsaw v0.2.15 gotchas" in docs/agents/e2e-testing.md.
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-test-r
          spec:
            (ports[0].port): 5432
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-test-ro
          spec:
            (ports[0].port): 5432
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-test-rw
          spec:
            (ports[0].port): 5432
    # Replaces `until kubectl get endpoints ... | grep -q '[0-9]'` loops.
    # The read-only endpoint is skipped, same as in the BATS test.
    - assert:
        timeout: 3m
        resource:
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: postgres-test-r
          (subsets[0].addresses[0].ip != null): true
    - assert:
        timeout: 3m
        resource:
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: postgres-test-rw
          (subsets[0].addresses[0].ip != null): true
    # Functional probe — the BATS test never actually talks to the database.
    - script:
        timeout: 2m
        content: |
          set -eu
          pod=$(kubectl -n "$NAMESPACE" get pod \
            -l cnpg.io/cluster=postgres-test,cnpg.io/instanceRole=primary \
            -o name | head -n1)
          kubectl -n "$NAMESPACE" exec "$pod" -c postgres -- \
            psql -U postgres -tAc 'SELECT 1'
        check:
          ($error == null): true
          (contains($stdout, '1')): true
    # The init-job is operator-created (not applied by chainsaw), so it is
    # not part of automatic cleanup — delete it explicitly, as BATS does.
    finally:
    - delete:
        ref:
          apiVersion: batch/v1
          kind: Job
          name: postgres-test-init-job
# The Postgres CR itself was applied by chainsaw and is deleted (and waited
# on) automatically during cleanup — no explicit teardown step needed.
---
# Full barman-cloud backup -> to-copy RestoreJob round-trip, driving the
# validated example scripts (examples/backups/postgres) as the harness so the
# test and the documented flow can never drift. run-all.sh runs Bucket ->
# source Postgres + sentinel row -> CNPG strategy + BackupClass -> ad-hoc
# BackupJob (waits Succeeded) -> empty target Postgres + to-copy RestoreJob
# (waits Succeeded) and asserts the sentinel round-tripped through S3 into the
# restored copy — the in-cluster witness that a barman-cloud plugin backup is
# both taken and restorable end to end.
#
# GATED OUT OF CI (opt in with POSTGRES_E2E_S3_ROUNDTRIP=1). The backup path
# cannot succeed in the kind e2e environment:
#   - the barman-cloud sidecar backs up to the bucket's EXTERNAL ingress
#     endpoint (from the BucketInfo Secret); in CI that is the s3.example.org
#     placeholder, which the source Postgres Pod can neither route to nor
#     TLS-validate;
#   - the in-cluster seaweedfs-s3.tenant-root:8333 endpoint serves HTTPS with a
#     self-signed cert — the ObjectStore CAN trust it (run-all.sh copies
#     seaweedfs-system-ca-cert into <app>-cnpg-backup-ca and wires endpointCA),
#     but the e2e tenant is created with isolated: true
#     (hack/e2e-install-cozystack.bats), so the Cilium tenant policy blocks the
#     source Pod from reaching tenant-root's seaweedfs.
# The round-trip therefore only works against a reachable, CA-trusted S3
# endpoint (a real cluster). Chainsaw v0.2.15 has no conditional Test-level
# skip, so the gate is a plain in-script conditional that exits 0 in CI with the
# skip reason in the log — the same file runs un-gated on a real cluster with
# just the env var set.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: postgres-2-backup-roundtrip
spec:
  skipDelete: true
  catch:
  - events: {}
  - describe:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: postgres-pg-src
  - describe:
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: postgres-pg-src
  - describe:
      apiVersion: barmancloud.cnpg.io/v1
      kind: ObjectStore
  - describe:
      apiVersion: backups.cozystack.io/v1alpha1
      kind: BackupJob
  - describe:
      apiVersion: backups.cozystack.io/v1alpha1
      kind: RestoreJob
  # The barman-cloud backup/WAL work runs in the cnpg Cluster Pods' sidecar; a
  # failed upload or TLS handshake leaves its error only in that Pod's log.
  - podLogs:
      selector: cnpg.io/cluster=postgres-pg-src
      tail: 200
  steps:
  - name: run
    try:
    - script:
        timeout: 25m
        content: |
          set -eu
          if [ "${POSTGRES_E2E_S3_ROUNDTRIP:-0}" != "1" ]; then
            echo "# S3 backup/restore round-trip gated out of CI: no reachable,"
            echo "# CA-trusted S3 endpoint in kind (see comment in this file). Set"
            echo "# POSTGRES_E2E_S3_ROUNDTRIP=1 on a real cluster to run it."
            exit 0
          fi
          cd ../../..
          [ -x examples/backups/postgres/run-all.sh ] || { echo "postgres backup example scripts not found at examples/backups/postgres" >&2; exit 1; }
          NAMESPACE="$NAMESPACE" examples/backups/postgres/run-all.sh
        check:
          ($error == null): true
    finally:
    # Idempotent — a no-op when the round-trip was gated out. Resumes the
    # driver-suspended HelmReleases before deleting the RestoreJob so the apps
    # are not stranded, then removes every resource the harness created
    # (chainsaw did not apply them, so they are not part of automatic cleanup).
    - description: backup-flow cleanup
      script:
        timeout: 8m
        content: |
          set -eu
          cd ../../..
          NAMESPACE="$NAMESPACE" examples/backups/postgres/cleanup.sh
