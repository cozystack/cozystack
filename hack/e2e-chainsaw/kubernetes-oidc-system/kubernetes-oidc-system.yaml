# No KubernetesNodes pool is created — this is a render-side test that only
# asserts on the KamajiControlPlane + the cozy-realm Keycloak objects. Since the
# Phase 2 split the kubernetes chart renders the control plane only (worker
# pools are separate KubernetesNodes resources), so there are zero
# MachineDeployments, KubevirtMachines or worker DataVolumes — no DRBD churn
# overlapping the kubernetes-previous suite.
# Unlike the bats original, no talos.imageFactoryURL block is injected here:
# the helper emits it only when the in-sandbox Talos image cache is up, and
# with zero worker replicas this render-side test instantiates no DataVolume
# imports for it to redirect — the static fixture stays equivalent.
apiVersion: apps.cozystack.io/v1alpha1
kind: Kubernetes
metadata:
  name: oidc-system
spec:
  addons:
    ingressNginx:
      enabled: false
      hosts: []
      valuesOverride: {}
  controlPlane:
    apiServer:
      resources: {}
      resourcesPreset: small
    replicas: 1
  version: v1.35
  oidc:
    mode: System
    users:
    - email: e2e-admin@example.test
      role: admin
    - email: e2e-viewer@example.test
      role: view
