# nodeGroups (and storageClass) intentionally omitted — this is a render-side
# test that only asserts on the KamajiControlPlane + the cozy-realm Keycloak
# objects. With the schema default `{}`, the chart helper emits the default
# `md0` group with `minReplicas: 0` — exactly one MachineDeployment renders
# (API-surface completeness) but the chart no longer manages `spec.replicas`,
# so CAPI's defaulting webhook seeds it to 0 from the autoscaler min-size
# annotation. Result: zero KubevirtMachines, zero worker DataVolumes, no DRBD
# churn overlapping the kubernetes-previous suite (see #3231).
# With zero worker replicas this render-side test provisions no worker boot
# disks (neither a golden-image clone nor an HTTP import), so there is no
# DataVolume work — the static fixture stays equivalent.
apiVersion: apps.cozystack.io/v1alpha1
kind: Kubernetes
metadata:
  name: oidc-system
spec:
  addons:
    ingressNginx:
      enabled: false
      hosts: []
      valuesOverride: {}
  controlPlane:
    apiServer:
      resources: {}
      resourcesPreset: small
    replicas: 1
  version: v1.35
  oidc:
    mode: System
    users:
    - email: e2e-admin@example.test
      role: admin
    - email: e2e-viewer@example.test
      role: view
