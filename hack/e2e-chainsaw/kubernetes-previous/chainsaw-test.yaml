# Chainsaw port of hack/e2e-apps/kubernetes-previous.bats. See the sibling
# kubernetes-latest test for why the logic stays a script wrapping
# _lib/run-kubernetes.sh. This one targets the previous K8s version and skips
# the ouroboros addon (no 4th arg).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: kubernetes-previous
spec:
  catch:
  - events: {}
  steps:
  - name: tenant-kubernetes-previous-version
    try:
    - script:
        timeout: 40m
        content: |
          set -eu
          cd ../../..
          . hack/e2e-chainsaw/_lib/run-kubernetes.sh
          run_kubernetes_test 'keys | sort_by(.) | .[-2]' 'test-previous-version' '59992'
        check:
          ($error == null): true
