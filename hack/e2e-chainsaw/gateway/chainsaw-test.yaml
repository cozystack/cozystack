# Chainsaw port of hack/e2e-apps/gateway.bats (29 cases).
#
# Declarative cases (CRD/GatewayClass/Gateway/HTTPRoute/TenantGateway status,
# VAP existence) use asserts. Admission-rejection cases need kubectl
# impersonation or error-message greps that Chainsaw `apply` can't express, so
# they stay scripts. The tenant apex is read at runtime from the tenant-test
# namespace's namespace.cozystack.io/host label, so these tests pass both in CI
# (test.example.org) and on a dev cluster with a different host.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gateway-api-crds
spec:
  steps:
  - name: crds-established-and-gatewayclass-accepted
    try:
    - assert:
        timeout: 1m
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: gatewayclasses.gateway.networking.k8s.io
          status:
            (conditions[?type == 'Established']):
            - status: "True"
    - assert:
        timeout: 1m
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: gateways.gateway.networking.k8s.io
          status:
            (conditions[?type == 'Established']):
            - status: "True"
    - assert:
        timeout: 1m
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: httproutes.gateway.networking.k8s.io
          status:
            (conditions[?type == 'Established']):
            - status: "True"
    - assert:
        timeout: 3m
        resource:
          apiVersion: gateway.networking.k8s.io/v1
          kind: GatewayClass
          metadata:
            name: cilium
          status:
            (conditions[?type == 'Accepted']):
            - status: "True"
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gateway-minimal-programmed
spec:
  catch:
  - events: {}
  - describe:
      apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      name: gateway-e2e-probe
  steps:
  - name: create-minimal-gateway
    try:
    - apply:
        file: gw-minimal.yaml
  - name: assert-accepted-programmed
    try:
    - assert:
        timeout: 2m
        resource:
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: gateway-e2e-probe
          status:
            (conditions[?type == 'Accepted']):
            - status: "True"
            (conditions[?type == 'Programmed']):
            - status: "True"
    # Cilium materialises a LoadBalancer Service per programmed Gateway.
    - assert:
        timeout: 1m
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: cilium-gateway-gateway-e2e-probe
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gateway-hostname-policy-installed
spec:
  steps:
  - name: vap-and-binding-and-host-label
    try:
    - assert:
        resource:
          apiVersion: admissionregistration.k8s.io/v1
          kind: ValidatingAdmissionPolicy
          metadata:
            name: cozystack-gateway-hostname-policy
    - assert:
        resource:
          apiVersion: admissionregistration.k8s.io/v1
          kind: ValidatingAdmissionPolicyBinding
          metadata:
            name: cozystack-gateway-hostname-policy
          # Binding must Deny — [Audit]/[] would let requests through silently.
          (contains(spec.validationActions, 'Deny')): true
    # The whole hostname policy keys off this label; assert it is set
    # (script, not an assert: numeric/length compares on labels are unreliable).
    - script:
        content: |
          set -eu
          kubectl get namespace "$NAMESPACE" \
            -o jsonpath='{.metadata.labels.namespace\.cozystack\.io/host}' | grep -q .
        check:
          ($error == null): true
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gateway-foreign-hostname-rejected
spec:
  steps:
  - name: foreign-listener-hostname-denied
    try:
    - script:
        content: |
          set -eu
          out=$(kubectl apply -n "$NAMESPACE" -f - 2>&1 <<'EOF'
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: hostname-hijack-probe
          spec:
            gatewayClassName: cilium
            listeners:
            - name: https
              protocol: HTTPS
              port: 443
              hostname: "dashboard.example.org"
              tls:
                mode: Terminate
                certificateRefs:
                - name: noop
              allowedRoutes:
                namespaces:
                  from: Same
          EOF
          ) && rc=0 || rc=$?
          echo "rc=$rc out=$out"
          if [ "$rc" -eq 0 ]; then
            kubectl -n "$NAMESPACE" delete gateway hostname-hijack-probe --ignore-not-found
            echo "BUG: admission accepted cross-tenant hostname" >&2
            exit 1
          fi
          echo "$out" | grep -qi "ValidatingAdmissionPolicy"
          echo "$out" | grep -q "must equal"
        check:
          ($error == null): true
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: package-attachednamespaces-accept
spec:
  steps:
  # Admission must accept a tenant-* entry in gateway.attachedNamespaces; a
  # successful apply (and Chainsaw auto-cleanup of the Package) is the proof.
  - name: apply-package-probe
    try:
    - apply:
        file: package-attach-probe.yaml
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tenant-host-policy
spec:
  steps:
  - name: untrusted-sa-cannot-set-tenant-host
    try:
    - script:
        content: |
          set -eu
          ns="$NAMESPACE"
          # Authorization runs before admission; grant the SA RBAC to create
          # Tenants so the apply reaches the VAP rather than failing on RBAC.
          kubectl apply -f - <<EOF
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: vap-probe-tenant-create
            namespace: ${ns}
          rules:
          - apiGroups: ["apps.cozystack.io"]
            resources: ["tenants"]
            verbs: ["create","get","list","watch","update","patch","delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: vap-probe-tenant-create
            namespace: ${ns}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: vap-probe-tenant-create
          subjects:
          - kind: ServiceAccount
            name: default
            namespace: ${ns}
          EOF
          cleanup() {
            kubectl -n "$ns" delete rolebinding vap-probe-tenant-create --ignore-not-found
            kubectl -n "$ns" delete role vap-probe-tenant-create --ignore-not-found
            kubectl -n "$ns" delete tenants.apps.cozystack.io vaphostprobe --ignore-not-found
          }
          trap cleanup EXIT
          out=$(kubectl --as="system:serviceaccount:${ns}:default" \
                        --as-group=system:serviceaccounts \
                        --as-group="system:serviceaccounts:${ns}" \
            apply -n "$ns" -f - 2>&1 <<EOF
          apiVersion: apps.cozystack.io/v1alpha1
          kind: Tenant
          metadata:
            name: vaphostprobe
            namespace: ${ns}
          spec:
            host: foreign.example.org
          EOF
          ) && rc=0 || rc=$?
          echo "rc=$rc out=$out"
          [ "$rc" -ne 0 ]
          echo "$out" | grep -qi "ValidatingAdmissionPolicy"
          echo "$out" | grep -q "spec.host can only be set"
        check:
          ($error == null): true
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: namespace-host-label-policy
spec:
  steps:
  - name: untrusted-sa-cannot-change-host-label
    try:
    - script:
        content: |
          set -eu
          ns="$NAMESPACE"
          host=$(kubectl get namespace "$ns" -o jsonpath='{.metadata.labels.namespace\.cozystack\.io/host}')
          kubectl apply -f - <<EOF
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: vap-probe-namespace-patch
          rules:
          - apiGroups: [""]
            resources: ["namespaces"]
            verbs: ["get","list","watch","update","patch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: vap-probe-namespace-patch
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: vap-probe-namespace-patch
          subjects:
          - kind: ServiceAccount
            name: default
            namespace: ${ns}
          EOF
          cleanup() {
            # Restore the original host label in case admission let it through.
            kubectl label namespace "$ns" "namespace.cozystack.io/host=${host}" --overwrite >/dev/null 2>&1 || true
            kubectl delete clusterrolebinding vap-probe-namespace-patch --ignore-not-found
            kubectl delete clusterrole vap-probe-namespace-patch --ignore-not-found
          }
          trap cleanup EXIT
          out=$(kubectl --as="system:serviceaccount:${ns}:default" \
                        --as-group=system:serviceaccounts \
                        --as-group="system:serviceaccounts:${ns}" \
            label namespace "$ns" namespace.cozystack.io/host=foreign.example.org --overwrite 2>&1) && rc=0 || rc=$?
          echo "rc=$rc out=$out"
          [ "$rc" -ne 0 ]
          echo "$out" | grep -qi "ValidatingAdmissionPolicy"
          echo "$out" | grep -q "immutable"
        check:
          ($error == null): true
  - name: untrusted-sa-cannot-set-host-label-at-create
    try:
    - script:
        content: |
          set -eu
          ns="$NAMESPACE"
          kubectl apply -f - <<EOF
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: vap-probe-namespace-create
          rules:
          - apiGroups: [""]
            resources: ["namespaces"]
            verbs: ["create","get","list","delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: vap-probe-namespace-create
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: vap-probe-namespace-create
          subjects:
          - kind: ServiceAccount
            name: default
            namespace: ${ns}
          EOF
          cleanup() {
            kubectl delete namespace vap-host-label-probe --ignore-not-found --wait=false
            kubectl delete clusterrolebinding vap-probe-namespace-create --ignore-not-found
            kubectl delete clusterrole vap-probe-namespace-create --ignore-not-found
          }
          trap cleanup EXIT
          out=$(kubectl --as="system:serviceaccount:${ns}:default" \
                        --as-group=system:serviceaccounts \
                        --as-group="system:serviceaccounts:${ns}" \
            apply -f - 2>&1 <<EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: vap-host-label-probe
            labels:
              namespace.cozystack.io/host: foreign.example.org
          EOF
          ) && rc=0 || rc=$?
          echo "rc=$rc out=$out"
          [ "$rc" -ne 0 ]
          echo "$out" | grep -qi "ValidatingAdmissionPolicy"
          echo "$out" | grep -q "immutable"
        check:
          ($error == null): true
