apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tenant-gateway-label-lockstep
spec:
  catch:
  - events: {}
  steps:
  - name: create-child-tenant-with-gateway
    try:
    - apply:
        resource:
          apiVersion: apps.cozystack.io/v1alpha1
          kind: Tenant
          metadata:
            name: gwprop
          spec:
            gateway: true
  - name: assert-label-and-values
    try:
    - assert:
        timeout: 3m
        resource:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: tenant-test-gwprop
            labels:
              namespace.cozystack.io/gateway: tenant-test-gwprop
    - script:
        timeout: 2m
        content: |
          set -eu
          deadline=$(( $(date +%s) + 60 ))
          until kubectl -n tenant-test-gwprop get secret cozystack-values >/dev/null 2>&1; do
            [ "$(date +%s)" -ge "$deadline" ] && { echo "cozystack-values not created" >&2; exit 1; }
            sleep 2
          done
          v=$(kubectl -n tenant-test-gwprop get secret cozystack-values -o jsonpath='{.data.values\.yaml}' | base64 -d)
          echo "$v" | grep -E '^\s*gateway:\s*"tenant-test-gwprop"\s*$'
        check:
          ($error == null): true
    finally:
    - delete:
        ref:
          apiVersion: apps.cozystack.io/v1alpha1
          kind: Tenant
          name: gwprop
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tenant-gateway-inheritance
spec:
  catch:
  - events: {}
  steps:
  - name: create-parent-tenant
    try:
    - apply:
        resource:
          apiVersion: apps.cozystack.io/v1alpha1
          kind: Tenant
          metadata:
            name: gwparent
          spec:
            gateway: true
    - assert:
        timeout: 3m
        resource:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: tenant-test-gwparent
            labels:
              namespace.cozystack.io/gateway: tenant-test-gwparent
  - name: create-child-tenant
    try:
    - apply:
        resource:
          apiVersion: apps.cozystack.io/v1alpha1
          kind: Tenant
          metadata:
            name: gwchild
            namespace: tenant-test-gwparent
          spec: {}
    - assert:
        timeout: 3m
        resource:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: tenant-test-gwparent-gwchild
            labels:
              namespace.cozystack.io/gateway: tenant-test-gwparent
  - name: assert-inheritance-values
    try:
    - script:
        timeout: 2m
        content: |
          set -eu
          deadline=$(( $(date +%s) + 60 ))
          until kubectl -n tenant-test-gwparent-gwchild get secret cozystack-values >/dev/null 2>&1; do
            [ "$(date +%s)" -ge "$deadline" ] && { echo "child cozystack-values not created" >&2; exit 1; }
            sleep 2
          done
          v=$(kubectl -n tenant-test-gwparent-gwchild get secret cozystack-values -o jsonpath='{.data.values\.yaml}' | base64 -d)
          echo "$v" | grep -E '^\s*gateway:\s*"tenant-test-gwparent"\s*$'
        check:
          ($error == null): true
    # The child must NOT own a gateway HelmRelease — inheritance, not its own.
    - error:
        resource:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: gateway
            namespace: tenant-test-gwparent-gwchild
    finally:
    - delete:
        ref:
          apiVersion: apps.cozystack.io/v1alpha1
          kind: Tenant
          name: gwchild
          namespace: tenant-test-gwparent
    - delete:
        ref:
          apiVersion: apps.cozystack.io/v1alpha1
          kind: Tenant
          name: gwparent
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tenant-gateway-route-listener
spec:
  catch:
  - events: {}
  steps:
  - name: parent-child-and-route-drive-listener-set
    try:
    - script:
        timeout: 6m
        content: |
          set -eu
          ns="$NAMESPACE"

          cleanup() {
            kubectl -n tenant-test-rparent-rchild delete httproute inherit-probe --ignore-not-found >/dev/null 2>&1 || true
            kubectl -n tenant-test-rparent delete tenant rchild --ignore-not-found >/dev/null 2>&1 || true
            kubectl -n "$ns" delete tenant rparent --ignore-not-found >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          # Parent tenant owns the Gateway.
          kubectl apply -n "$ns" -f - <<EOF
          apiVersion: apps.cozystack.io/v1alpha1
          kind: Tenant
          metadata:
            name: rparent
          spec:
            gateway: true
          EOF
          timeout 180 sh -ec 'until kubectl get ns tenant-test-rparent >/dev/null 2>&1; do sleep 3; done'
          timeout 120 sh -ec 'until kubectl -n tenant-test-rparent get gateway cozystack >/dev/null 2>&1; do sleep 3; done'

          # Child tenant inherits the parent Gateway.
          kubectl apply -n tenant-test-rparent -f - <<EOF
          apiVersion: apps.cozystack.io/v1alpha1
          kind: Tenant
          metadata:
            name: rchild
          spec: {}
          EOF
          timeout 180 sh -ec 'until kubectl get ns tenant-test-rparent-rchild >/dev/null 2>&1; do sleep 3; done'

          child_apex=$(kubectl get ns tenant-test-rparent-rchild -o jsonpath='{.metadata.labels.namespace\.cozystack\.io/host}')
          [ -n "$child_apex" ]
          route_host="harbor.${child_apex}"

          # An HTTPRoute in the child, attached to the parent Gateway.
          kubectl apply -n tenant-test-rparent-rchild -f - <<EOF
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: inherit-probe
          spec:
            parentRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: cozystack
              namespace: tenant-test-rparent
            hostnames:
            - "${route_host}"
            rules:
            - matches:
              - path:
                  type: PathPrefix
                  value: /
              backendRefs:
              - name: kubernetes
                namespace: default
                port: 443
          EOF

          # cozystack-controller collects the route across the inheritance label
          # and grows a per-listener HTTPS entry on the parent Gateway.
          timeout 120 sh -ec '
            until kubectl -n tenant-test-rparent get gateway cozystack \
              -o jsonpath="{range .spec.listeners[?(@.protocol==\"HTTPS\")]}{.hostname}{\"\n\"}{end}" 2>/dev/null \
              | grep -qx "'"$route_host"'"; do sleep 3; done'

          # ...and a matching per-listener Certificate.
          timeout 60 sh -ec '
            until kubectl -n tenant-test-rparent get certificate \
              -l cozystack.io/per-listener-cert=true \
              -o jsonpath="{range .items[*]}{.spec.dnsNames[0]}{\"\n\"}{end}" 2>/dev/null \
              | grep -qx "'"$route_host"'"; do sleep 3; done'
        check:
          ($error == null): true
---
# Legacy-Ingress counterpart of the gateway/route hostname VAPs (bats: the 12
# cozystack-ingress-hostname-policy cases). Gateway API is off by default, so
# tenant apps publish through a legacy networking.k8s.io/Ingress; the VAP
# constrains tenant Ingress hostnames on the shared ingress-nginx. The VAP
# matches on the tenant-* namespace, not the caller, so plain applies as the
# runner's identity exercise it — no impersonation needed. Hostnames are
# derived at runtime: the tenant apex from this namespace's
# namespace.cozystack.io/host label (as elsewhere in this suite) and the
# platform ROOT apex from the same label on tenant-root, so the
# under-root-but-outside-own-apex cases stay host-independent where the bats
# hardcoded test.example.org / example.org.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ingress-hostname-policy
spec:
  catch:
  - events: {}
  steps:
  # If these resources are missing, admission cannot constrain tenant Ingress
  # hostnames — make that loud instead of letting it fall through as a silent
  # pass.
  - name: vap-and-binding-installed
    try:
    - assert:
        resource:
          apiVersion: admissionregistration.k8s.io/v1
          kind: ValidatingAdmissionPolicy
          metadata:
            name: cozystack-ingress-hostname-policy
    - assert:
        resource:
          apiVersion: admissionregistration.k8s.io/v1
          kind: ValidatingAdmissionPolicyBinding
          metadata:
            name: cozystack-ingress-hostname-policy
          spec:
            (contains(validationActions, 'Deny')): true
  # Apex-derived rejects:
  #   foreign-apex-host    dashboard.<root> — under the platform root apex but
  #                        outside the tenant's own apex
  #   prefix-adjacent      evil<apex> — dot-boundary guard: a naive suffix
  #                        check without the leading dot would match "<apex>"
  #                        inside "evil<apex>"; the CEL uses endsWith("." + apex)
  #   foreign-tls-host     in-apex rule host, but a spec.tls[].hosts[] entry
  #                        under the root apex — the tls branch denies on its own
  #   wildcard-matches-apex *.<root-parent> is "outside" the root apex by a
  #                        plain string test, but at ingress-nginx it also
  #                        matches the bare root apex; the outside-root path is
  #                        gated on the host not being a wildcard
  - name: foreign-and-adjacent-hosts-denied
    try:
    - script:
        content: |
          set -eu
          ns="$NAMESPACE"
          apex=$(kubectl get namespace "$ns" -o jsonpath='{.metadata.labels.namespace\.cozystack\.io/host}')
          root=$(kubectl get namespace tenant-root -o jsonpath='{.metadata.labels.namespace\.cozystack\.io/host}')
          [ -n "$apex" ] || { echo "SETUP FAILURE: $ns lacks the namespace.cozystack.io/host label" >&2; exit 1; }
          [ -n "$root" ] || { echo "SETUP FAILURE: tenant-root lacks the namespace.cozystack.io/host label" >&2; exit 1; }
          [ "$apex" != "$root" ] || { echo "SETUP FAILURE: tenant apex equals root apex; under-root-outside-own cases are undefined" >&2; exit 1; }
          # deny <case> <ingress-name> <extra-grep|""> reads a manifest on
          # stdin and expects admission to reject it with a VAP message.
          deny() {
            kubectl -n "$ns" delete ingress "$2" --ignore-not-found >/dev/null
            out=$(kubectl apply -n "$ns" -f - 2>&1) && rc=0 || rc=$?
            echo "case=$1 rc=$rc"
            if [ "$rc" -eq 0 ]; then
              kubectl -n "$ns" delete ingress "$2" --ignore-not-found
              echo "BUG: admission accepted $1: $out" >&2
              exit 1
            fi
            echo "$out" | grep -qi "ValidatingAdmissionPolicy"
            [ -z "$3" ] || echo "$out" | grep -qi "$3"
          }
          deny foreign-apex-host ingress-out-of-apex-host-probe "must be within" <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-out-of-apex-host-probe
          spec:
            rules:
            - host: "dashboard.${root}"
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: noop
                      port:
                        number: 80
          EOF
          deny prefix-adjacent ingress-prefix-adjacent-probe "" <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-prefix-adjacent-probe
          spec:
            rules:
            - host: "evil${apex}"
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: noop
                      port:
                        number: 80
          EOF
          deny foreign-tls-host ingress-tls-out-of-apex-probe "must be within" <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-tls-out-of-apex-probe
          spec:
            tls:
            - hosts:
              - "harbor.${root}"
              secretName: noop-tls
            rules:
            - host: "harbor.${apex}"
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: noop
                      port:
                        number: 80
          EOF
          case "$root" in
            *.*) w="*.${root#*.}" ;;
            *)   w="*.${root}" ;;
          esac
          deny wildcard-matches-apex ingress-wildcard-host-probe "" <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-wildcard-host-probe
          spec:
            rules:
            - host: "${w}"
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: noop
                      port:
                        number: 80
          EOF
        check:
          ($error == null): true
  # Static rejects — catch-all shapes on the shared ingress-nginx:
  #   hostless        a rule with no .host matches all inbound HTTP
  #   empty-host      host: "" is the same catch-all; the CEL denies it via
  #                   r.host != "" (or has(r.host) if the apiserver drops it)
  #   defaultBackend  catch-all for otherwise-unmatched traffic
  - name: catch-all-shapes-denied
    try:
    - script:
        content: |
          set -eu
          ns="$NAMESPACE"
          deny() {
            kubectl -n "$ns" delete ingress "$2" --ignore-not-found >/dev/null
            out=$(kubectl apply -n "$ns" -f - 2>&1) && rc=0 || rc=$?
            echo "case=$1 rc=$rc"
            if [ "$rc" -eq 0 ]; then
              kubectl -n "$ns" delete ingress "$2" --ignore-not-found
              echo "BUG: admission accepted $1: $out" >&2
              exit 1
            fi
            echo "$out" | grep -qi "ValidatingAdmissionPolicy"
          }
          deny hostless-rule ingress-hostless-probe <<'EOF'
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-hostless-probe
          spec:
            rules:
            - http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: noop
                      port:
                        number: 80
          EOF
          deny empty-host ingress-empty-host-probe <<'EOF'
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-empty-host-probe
          spec:
            rules:
            - host: ""
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: noop
                      port:
                        number: 80
          EOF
          deny default-backend ingress-defaultbackend-probe <<'EOF'
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-defaultbackend-probe
          spec:
            defaultBackend:
              service:
                name: noop
                port:
                  number: 80
          EOF
        check:
          ($error == null): true
  # Inverse sanity checks under the tenant's own apex: an in-apex rule+tls
  # Ingress and a wildcard under the own apex (*.<apex>) must NOT be rejected
  # — the anti-wildcard gate applies only to the outside-root path. Created
  # inside the script (they need ${apex} interpolation), so also deleted here.
  - name: own-apex-allowed
    try:
    - script:
        content: |
          set -eu
          ns="$NAMESPACE"
          apex=$(kubectl get namespace "$ns" -o jsonpath='{.metadata.labels.namespace\.cozystack\.io/host}')
          [ -n "$apex" ] || { echo "SETUP FAILURE: $ns lacks the namespace.cozystack.io/host label" >&2; exit 1; }
          kubectl apply -n "$ns" -f - <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-hostname-allow-probe
          spec:
            tls:
            - hosts:
              - "harbor.${apex}"
              secretName: noop-tls
            rules:
            - host: "harbor.${apex}"
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: noop
                      port:
                        number: 80
          EOF
          kubectl -n "$ns" delete ingress ingress-hostname-allow-probe --ignore-not-found
          kubectl apply -n "$ns" -f - <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-ownapex-wildcard-probe
          spec:
            rules:
            - host: "*.${apex}"
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: noop
                      port:
                        number: 80
          EOF
          kubectl -n "$ns" delete ingress ingress-ownapex-wildcard-probe --ignore-not-found
        check:
          ($error == null): true
  # Case-insensitivity. spec.rules[].host and spec.tls[].hosts[] are always
  # lowercase — the apiserver's host validation permits only lowercase, so an
  # uppercase host is rejected before the VAP runs — but the apex operand is the
  # namespace.cozystack.io/host label VALUE, and Kubernetes permits uppercase in
  # a label value. Under a mixed-case apex a lowercase in-apex Ingress must
  # still be admitted, so the VAP normalizes both operands with .lowerAscii().
  # Ingress is the default publish path and carries the most complex CEL (a
  # rule-host and a tls-host branch), so it gets its own runtime guard beside
  # the route one; both branches are exercised at once because the tls branch
  # denies on its own.
  #
  # The probe apex is derived as Case-Probe.<root> rather than hardcoded, and it
  # has to sit UNDER the platform root to mean anything: the outside-root branch
  # admits any non-wildcard host outside the root apex whatever the tenant apex
  # says, so a probe on an unrelated domain would be admitted pre-fix and prove
  # nothing. Under the root that escape is closed — pre-fix the own-apex branch
  # misses on case and the outside-root branch is excluded, so admission denies
  # and this step is red; post-fix the own-apex branch matches and it is green.
  #
  # The mixed-case apex goes on a throwaway tenant-* namespace rather than on
  # tenant-test, for the same reason as the route case. Built in a script since
  # it needs ${root} interpolation, so the namespace is torn down in finally
  # rather than by Chainsaw auto-cleanup. That teardown is also why the allow and
  # deny halves share ONE step here while the route case splits them in two:
  # finally runs at step scope, so a second step would find the namespace gone.
  # The route namespace is applied declaratively and reclaimed at test scope, so
  # it survives into its own deny step.
  - name: mixed-case-apex-allowed-and-denied
    try:
    - script:
        content: |
          set -eu
          root=$(kubectl get namespace tenant-root -o jsonpath='{.metadata.labels.namespace\.cozystack\.io/host}')
          [ -n "$root" ] || { echo "SETUP FAILURE: tenant-root lacks the namespace.cozystack.io/host label" >&2; exit 1; }
          apex="Case-Probe.${root}"
          host="probe.case-probe.${root}"
          # Guard against a vacuous pass: the probe apex must really be
          # mixed-case. An all-lowercase apex would admit the Ingress with or
          # without the fix — this catches a later edit that lowercases the
          # literal above, which the persisted-label check below cannot see.
          [ "$apex" != "$(echo "$apex" | tr '[:upper:]' '[:lower:]')" ] || { echo "SETUP FAILURE: probe apex '$apex' is not mixed-case" >&2; exit 1; }
          # Pre-clean a namespace left behind by an interrupted prior run.
          kubectl delete namespace tenant-ingress-case-probe --ignore-not-found --wait=true --timeout=60s
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: tenant-ingress-case-probe
            labels:
              namespace.cozystack.io/host: ${apex}
          EOF
          # Second vacuous-pass guard: re-read the persisted label, in case
          # anything normalized the value on the way in.
          got=$(kubectl get namespace tenant-ingress-case-probe -o jsonpath='{.metadata.labels.namespace\.cozystack\.io/host}')
          [ "$got" = "$apex" ] || { echo "SETUP FAILURE: apex label persisted as '$got', want '$apex'" >&2; exit 1; }
          kubectl apply -n tenant-ingress-case-probe -f - <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-hostname-case-probe
          spec:
            tls:
            - hosts:
              - "${host}"
              secretName: noop-tls
            rules:
            - host: "${host}"
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: noop
                      port:
                        number: 80
          EOF
          # The deny half, pairing with the allow above the way
          # foreign-and-adjacent-hosts-denied pairs with own-apex-allowed. The
          # allow half alone only proves the normalized match does not
          # UNDER-admit; over-admission is what hijacks a hostname, and
          # normalizing both operands is exactly the edit that can widen a match
          # by accident.
          deny() {
            kubectl -n tenant-ingress-case-probe delete ingress "$2" --ignore-not-found >/dev/null
            out=$(kubectl apply -n tenant-ingress-case-probe -f - 2>&1) && rc=0 || rc=$?
            echo "case=$1 rc=$rc"
            if [ "$rc" -eq 0 ]; then
              kubectl -n tenant-ingress-case-probe delete ingress "$2" --ignore-not-found
              echo "BUG: admission accepted $1: $out" >&2
              exit 1
            fi
            echo "$out" | grep -qi "ValidatingAdmissionPolicy"
          }
          # Under the platform root but outside the probe's own apex: the
          # own-apex branch must miss on more than case, and the outside-root
          # branch must stay closed under the root.
          deny foreign-apex-host ingress-case-foreign-probe <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-case-foreign-probe
          spec:
            rules:
            - host: "dashboard.${root}"
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: noop
                      port:
                        number: 80
          EOF
          # Dot-boundary guard on the normalized path: "evilcase-probe.<root>"
          # ends with the lowercased apex "case-probe.<root>" without being a
          # subdomain of it. Only endsWith("." + apex) denies it; drop that
          # leading dot and the apex is hijackable.
          deny prefix-adjacent ingress-case-adjacent-probe <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ingress-case-adjacent-probe
          spec:
            rules:
            - host: "evilcase-probe.${root}"
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: noop
                      port:
                        number: 80
          EOF
        check:
          ($error == null): true
    finally:
    - delete:
        ref:
          apiVersion: v1
          kind: Namespace
          name: tenant-ingress-case-probe
  # Static accepts — concrete external domains outside the platform root apex
  # on both spec.rules[].host and spec.tls[].hosts. Declarative apply; Chainsaw
  # auto-cleanup deletes the probes.
  - name: external-domain-allowed
    try:
    - apply:
        file: ingress-external-allow.yaml
