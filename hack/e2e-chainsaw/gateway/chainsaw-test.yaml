apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tenantgateway-reconciler
spec:
  catch:
  - events: {}
  - describe:
      apiVersion: gateway.cozystack.io/v1alpha1
      kind: TenantGateway
      name: tg-e2e-probe
  steps:
  - name: create-tenantgateway
    try:
    # apex is read from the namespace host label so the CR is valid on any host.
    - script:
        content: |
          set -eu
          ns="$NAMESPACE"
          apex=$(kubectl get namespace "$ns" -o jsonpath='{.metadata.labels.namespace\.cozystack\.io/host}')
          kubectl apply -n "$ns" -f - <<EOF
          apiVersion: gateway.cozystack.io/v1alpha1
          kind: TenantGateway
          metadata:
            name: tg-e2e-probe
          spec:
            apex: ${apex}
            certMode: http01
            gatewayClassName: cilium
          EOF
        check:
          ($error == null): true
  - name: assert-gateway-issuer-status
    try:
    - assert:
        timeout: 2m
        resource:
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: tg-e2e-probe
    - assert:
        timeout: 2m
        resource:
          apiVersion: cert-manager.io/v1
          kind: Issuer
          metadata:
            name: tg-e2e-probe-gateway
