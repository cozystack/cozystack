# Chainsaw port of hack/e2e-apps/kubernetes-latest.bats.
#
# Spinning up a tenant Kubernetes control plane (Kamaji) + worker nodes + the
# LB/NFS/ouroboros checks is deeply imperative (port-forwards, a tenant
# kubeconfig, curl probes), so the battle-tuned logic in
# _lib/run-kubernetes.sh is reused verbatim from a single script step rather
# than rewritten as asserts. The script cd's to the repo root (the test dir is
# hack/e2e-chainsaw/kubernetes-latest, so repo root is ../../..) where the
# helper's `helm template` and versions.yaml paths resolve.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: kubernetes-latest
spec:
  catch:
  - events: {}
  steps:
  - name: tenant-kubernetes-latest-version
    try:
    - script:
        # ~25m Kamaji bringup + worker join + LB/NFS/ouroboros assertions.
        timeout: 40m
        content: |
          set -eu
          cd ../../..
          . hack/e2e-chainsaw/_lib/run-kubernetes.sh
          # 4th arg "true" folds the ouroboros hairpin-NAT assertions onto this
          # cluster instead of a second ~25m bringup.
          run_kubernetes_test 'keys | sort_by(.) | .[-1]' 'test-latest-version' '59991' 'true'
        check:
          ($error == null): true
