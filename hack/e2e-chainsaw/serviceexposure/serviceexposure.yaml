# The externalIPs path is chosen deliberately so the test creates no
# MetalLB/Cilium pool — it cannot collide with the cluster's existing
# LoadBalancer address pools or depend on real L2 reachability
# (203.0.113.10 is TEST-NET-3), keeping it deterministic. The metallb and
# cilium rendering paths (pool + announcer CRs, garbage collection, take-over
# guard) are covered exhaustively by the Go unit tests in
# internal/controller/serviceexposure.
#
# The ExposureClass is cluster-scoped; Chainsaw tracks cluster-scoped applies
# too, so auto-cleanup reclaims all three objects in reverse apply order.
apiVersion: network.cozystack.io/v1alpha1
kind: ExposureClass
metadata:
  name: se-e2e-externalips
spec:
  backend: externalIPs
---
apiVersion: v1
kind: Service
metadata:
  name: se-e2e-svc
spec:
  type: ClusterIP
  externalIPs:
  - 203.0.113.10
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: network.cozystack.io/v1alpha1
kind: ServiceExposure
metadata:
  name: se-e2e
spec:
  serviceRef:
    name: se-e2e-svc
  exposureClassName: se-e2e-externalips
