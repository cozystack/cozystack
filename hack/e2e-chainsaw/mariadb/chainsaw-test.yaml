# Chainsaw port of hack/e2e-apps/mariadb.bats
# ("Create DB MariaDB" + "Create single-replica MariaDB").
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: mariadb
spec:
  catch:
  - events: {}
  - describe:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: mariadb-test
  - podLogs:
      selector: app.kubernetes.io/instance=mariadb-test
      tail: 50
  steps:
  - name: create-mariadb
    try:
    - apply:
        file: mariadb.yaml

  - name: wait-helmrelease-ready
    try:
    - assert:
        timeout: 6m
        resource:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: mariadb-test
          status:
            (conditions[?type == 'Ready']):
            - status: "True"

  - name: verify-service-and-statefulset
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: mariadb-test
          spec:
            (ports[0].port): 3306
    # The chart hands the operator a MariaDB CR and ships no built-in workload,
    # so the HelmRelease above goes Ready as soon as helm applies the manifests
    # -- it never waits for a pod. This assert is the first gate that does: an
    # endpoint address appears only once a replica has passed its startup and
    # then its readiness probe. The startup probe grants each replica 310s of
    # first-boot budget (see packages/apps/mariadb/templates/mariadb.yaml for
    # why), so a ceiling under that would fail runs the probe was still willing
    # to wait for. One ready address satisfies this assert, so it has to clear
    # one budget, not two, plus the operator reconcile, PVC bind and image pull
    # that precede it. 10m leaves room for all of that.
    - assert:
        timeout: 10m
        resource:
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: mariadb-test
          (subsets[0].addresses[0].ip != null): true
    - assert:
        timeout: 2m
        resource:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: mariadb-test
          status:
            replicas: 2

  - name: verify-metrics
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: mariadb-test-metrics
          spec:
            (ports[0].port): 9104
    - assert:
        timeout: 1m
        resource:
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: mariadb-test-metrics
          (subsets[0].addresses[0].ip != null): true
    - assert:
        timeout: 2m
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mariadb-test-metrics
          status:
            replicas: 1
---
# Guard for the operator-webhook regression fixed in c7e8f4d97: replication is
# guarded on replicas>1, so replicas=1 must render a CR the mariadb-operator's
# validating webhook admits. With one replica the operator provisions the bare
# <name> Service (no -primary/-secondary split).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: mariadb-single
spec:
  catch:
  - events: {}
  - describe:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: mariadb-single
  # The rendered operator CR makes a webhook rejection (the regression this
  # guards against) legible in the log.
  - describe:
      apiVersion: k8s.mariadb.com/v1alpha1
      kind: MariaDB
      name: mariadb-single
  - podLogs:
      selector: app.kubernetes.io/instance=mariadb-single
      tail: 50
  steps:
  - name: create-mariadb-single
    try:
    - apply:
        file: mariadb-single.yaml

  - name: wait-helmrelease-ready
    try:
    - assert:
        timeout: 6m
        resource:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: mariadb-single
          status:
            (conditions[?type == 'Ready']):
            - status: "True"

  - name: verify-service-and-statefulset
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: mariadb-single
          spec:
            (ports[0].port): 3306
    # Same gate as the replicated case above -- the HelmRelease does not wait
    # for a pod, so this is where first boot is actually covered. One replica
    # means one 310s startup budget, plus the operator reconcile, PVC bind and
    # image pull ahead of it.
    - assert:
        timeout: 10m
        resource:
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: mariadb-single
          (subsets[0].addresses[0].ip != null): true
    - assert:
        timeout: 2m
        resource:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: mariadb-single
          status:
            replicas: 1

  - name: verify-metrics
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: mariadb-single-metrics
          spec:
            (ports[0].port): 9104
    - assert:
        timeout: 1m
        resource:
          apiVersion: v1
          kind: Endpoints
          metadata:
            name: mariadb-single-metrics
          (subsets[0].addresses[0].ip != null): true
    - assert:
        timeout: 2m
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mariadb-single-metrics
          status:
            replicas: 1
---
# Full logical-dump backup -> to-copy RestoreJob round-trip, driving the
# validated example scripts (examples/backups/mariadb) as the harness so the
# test and the documented flow can never drift. run-all.sh runs Bucket ->
# source MariaDB + sentinel row -> MariaDB strategy + BackupClass -> ad-hoc
# BackupJob (waits Succeeded) -> empty target MariaDB + to-copy RestoreJob
# (waits Succeeded) and asserts the sentinel round-tripped through S3 into the
# restored copy while the source stays untouched — the in-cluster witness that
# a mariadb-operator backup is both taken and restorable end to end. It follows
# the same harness-driving shape as etcd-2-backup-roundtrip
# (hack/e2e-chainsaw/etcd/chainsaw-test.yaml): a single run step pre-cleans any
# leftover state, drives run-all.sh, and drains in an always-reached finally.
#
# Runs in tenant-root, not the default tenant-test: the S3 client here is the
# mariadb-operator Backup/Restore Job INSIDE the tenant, and the e2e tenant is
# created isolated (hack/e2e-install-cozystack.bats) — its Cilium egress
# allowlist blocks a tenant-test Pod from reaching tenant-root's seaweedfs,
# while a tenant-root Pod reaches it over same-tenant egress. The harness
# targets the in-cluster endpoint (S3_ENDPOINT below) instead of the BucketInfo
# external ingress URL, which in CI is an unroutable placeholder, and trusts
# its self-signed cert by copying the seaweedfs CA secret (seaweedfs-ca-cert,
# auto-discovered from the cert-manager Certificate) into the per-app CA
# Secret. (The bucket suite's mc checks lean on the same tenant-root seaweedfs,
# just from the test runner via port-forward.)
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: mariadb-2-backup-roundtrip
spec:
  namespace: tenant-root
  skipDelete: true
  catch:
  - events: {}
  - describe:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: mariadb-mariadb-src
  - describe:
      apiVersion: k8s.mariadb.com/v1alpha1
      kind: MariaDB
      name: mariadb-mariadb-src
  - describe:
      apiVersion: k8s.mariadb.com/v1alpha1
      kind: Backup
  - describe:
      apiVersion: k8s.mariadb.com/v1alpha1
      kind: Restore
  - describe:
      apiVersion: backups.cozystack.io/v1alpha1
      kind: BackupJob
  - describe:
      apiVersion: backups.cozystack.io/v1alpha1
      kind: RestoreJob
  # The dump/import runs in mariadb-operator-created Jobs; a failed upload or
  # TLS handshake leaves its error in those Pods' logs. Capture the source
  # instance's Pods too (operator Jobs are short-lived and TTL-reaped).
  - podLogs:
      selector: app.kubernetes.io/instance=mariadb-mariadb-src
      tail: 200
  steps:
  - name: run
    try:
    # Pre-clean: tenant-root is a shared, persistent namespace with fixed
    # resource names, so a run killed before the finally below leaves stale
    # state behind. A leftover BackupJob still carrying status.phase=Succeeded
    # from a prior run would satisfy `wait_for_field ... Succeeded` instantly
    # and pass without a real backup ever running. cleanup.sh is idempotent
    # (--ignore-not-found), so this is a no-op on a clean namespace.
    - script:
        timeout: 8m
        content: |
          set -eu
          cd ../../..
          NAMESPACE="$NAMESPACE" examples/backups/mariadb/cleanup.sh
        check:
          ($error == null): true
    # The 30m budget is the whole documented flow: bucket provisioning, a
    # 2-replica source MariaDB (each replica's operator startup probe grants
    # 310s of first-boot budget — see the mariadb app suite above), the logical
    # dump to S3, an empty 2-replica target, and the to-copy restore + verify
    # (convention 6: justified in-line). run-all.sh fails fast on terminal
    # BackupJob/RestoreJob phases and stalled HelmReleases rather than polling
    # out the budget.
    - script:
        timeout: 30m
        content: |
          set -eu
          cd ../../..
          [ -x examples/backups/mariadb/run-all.sh ] || { echo "mariadb backup example scripts not found at examples/backups/mariadb" >&2; exit 1; }
          NAMESPACE="$NAMESPACE" S3_ENDPOINT="https://seaweedfs-s3.tenant-root:8333" \
            examples/backups/mariadb/run-all.sh
        check:
          ($error == null): true
    finally:
    # Removes every resource the harness created (chainsaw did not apply them,
    # so they are not part of automatic cleanup) — including the operator-side
    # k8s.mariadb.com Backup/Restore CRs the Cozystack jobs own only by label.
    - description: backup-flow cleanup
      script:
        timeout: 8m
        content: |
          set -eu
          cd ../../..
          NAMESPACE="$NAMESPACE" examples/backups/mariadb/cleanup.sh
