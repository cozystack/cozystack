apiVersion: apps.cozystack.io/v1alpha1
kind: Kubernetes
metadata:
  name: oidc-byo
spec:
  addons:
    ingressNginx:
      enabled: false
      hosts: []
      valuesOverride: {}
  controlPlane:
    apiServer:
      resources: {}
      resourcesPreset: small
    replicas: 1
  nodeGroups:
    md0:
      diskSize: 20Gi
      gpus: []
      instanceType: u1.micro
      maxReplicas: 1
      minReplicas: 0
      resources: {}
      roles:
      - worker
  storageClass: replicated
  version: v1.35
  oidc:
    mode: CustomConfig
    customConfig:
      config: |
        apiVersion: apiserver.config.k8s.io/v1beta1
        kind: AuthenticationConfiguration
        jwt:
        - issuer:
            url: https://idp.byo.example.test
            audiences:
            - cozystack-byo-oidc-byo
          claimMappings:
            username:
              claim: preferred_username
              prefix: ""
            groups:
              claim: groups
              prefix: ""
    users:
    - email: byo-admin@example.test
      role: admin
