# No KubernetesNodes pool is created — this is a render-side test that only
# asserts on the KamajiControlPlane + the tenant-supplied issuer
# AuthenticationConfiguration Secret. Since the Phase 2 split the kubernetes
# chart renders the control plane only (worker pools are separate KubernetesNodes
# resources), so there are zero MachineDeployments, KubevirtMachines or worker
# DataVolumes — no DRBD churn between CI runs.
# (see #3231).
# Unlike the bats original, no talos.imageFactoryURL block is injected here:
# the helper emits it only when the in-sandbox Talos image cache is up, and
# with zero worker replicas this render-side test instantiates no DataVolume
# imports for it to redirect — the static fixture stays equivalent.
apiVersion: apps.cozystack.io/v1alpha1
kind: Kubernetes
metadata:
  name: oidc-byo
spec:
  addons:
    ingressNginx:
      enabled: false
      hosts: []
      valuesOverride: {}
  controlPlane:
    apiServer:
      resources: {}
      resourcesPreset: small
    replicas: 1
  version: v1.35
  oidc:
    mode: CustomConfig
    customConfig:
      config: |
        apiVersion: apiserver.config.k8s.io/v1beta1
        kind: AuthenticationConfiguration
        jwt:
        - issuer:
            url: https://idp.byo.example.test
            audiences:
            - cozystack-byo-oidc-byo
          claimMappings:
            username:
              claim: preferred_username
              prefix: ""
            groups:
              claim: groups
              prefix: ""
    users:
    - email: byo-admin@example.test
      role: admin
