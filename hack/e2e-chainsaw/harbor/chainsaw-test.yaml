# Chainsaw port of hack/e2e-apps/harbor.bats ("Create Harbor").
#
# The BATS test hand-rolled a large diagnostic dump on the harbor-test-system
# HelmRelease wait; here that becomes the test-wide catch block, which fires on
# any step failure.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: harbor
spec:
  catch:
  - events: {}
  - describe:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: harbor-test
  - describe:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: harbor-test-system
  - describe:
      apiVersion: objectstorage.k8s.io/v1alpha1
      kind: BucketClaim
      name: harbor-test-registry
  - describe:
      apiVersion: objectstorage.k8s.io/v1alpha1
      kind: BucketAccess
      name: harbor-test-registry
  # The backend view: cluster-scoped Buckets plus the COSI controller pods,
  # where a frozen-claim readiness propagation failure actually surfaces.
  - get:
      apiVersion: objectstorage.k8s.io/v1alpha1
      kind: Bucket
      format: yaml
  - script:
      content: kubectl -n cozy-objectstorage-controller get pods
  - podLogs:
      selector: app.kubernetes.io/instance=harbor-test
      tail: 50
  # harbor-test readiness is gated by the inline RedisFailover
  # harbor-test-redis: its three sentinels stay NotReady until the spotahome
  # redis-operator elects a master and rewrites their monitored-master config.
  # None of the collectors above see that path: the harbor-test instance
  # selector matches neither the operator (namespace cozy-redis-operator) nor
  # the rfr-/rfs- pods, and the RedisFailover CRD ships no status subresource,
  # so there is nothing to assert on declaratively.
  - describe:
      apiVersion: databases.spotahome.com/v1
      kind: RedisFailover
      name: harbor-test-redis
  - podLogs:
      namespace: cozy-redis-operator
      selector: app.kubernetes.io/name=redis-operator
      tail: 200
  - script:
      # A script rather than more podLogs entries: the -o wide pod tables and
      # the rfr-/rfs- name-prefix match (independent of the operator's
      # pod-label scheme) are not expressible declaratively. Every command is
      # best-effort (|| true) so diagnostics never mask the test's own error;
      # no inner timeout wrappers, so the 2m op timeout is the only budget.
      timeout: 2m
      content: |
        set -u
        echo "== redis-operator pods (cozy-redis-operator) =="
        kubectl -n cozy-redis-operator get pods -o wide || true
        echo "== rfr-/rfs- pod states ($NAMESPACE) =="
        kubectl -n "$NAMESPACE" get pods -o wide | grep -E 'rf[rs]-harbor-test-redis' || true
        for p in $(kubectl -n "$NAMESPACE" get pods -o name | grep -E 'rf[rs]-harbor-test-redis'); do
          echo "== logs $p =="
          kubectl -n "$NAMESPACE" logs "$p" --all-containers --tail=100 --prefix || true
        done
  steps:
  - name: create-harbor
    try:
    - apply:
        file: harbor.yaml

  - name: wait-helmrelease-ready
    try:
    # 10m, not the standard 5-6m: harbor-test readiness is gated by the inline
    # RedisFailover, whose three sentinels only go Ready after the spotahome
    # redis-operator elects a master and rewrites their config. Normal
    # convergence is 2-3m, but on a CPU-committed runner the tail runs long
    # (steal-induced probe misses, documented in pull-requests.yaml). Matches
    # the harbor-test-system budget below and the justified-longer-wait
    # allowance in docs/agents/e2e-testing.md. If this still times out, the
    # catch block's redis-operator log shows which reconcile gate stalled.
    - assert:
        timeout: 10m
        resource:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: harbor-test
          status:
            (conditions[?type == 'Ready']):
            - status: "True"

  - name: wait-cosi-bucket
    try:
    # 2m, not the default 5m: the objectstorage-controller requeues the
    # BucketClaim until the backend Bucket is ready, so readiness converges
    # within tens of seconds; a claim still not ready after 2m is frozen
    # (readiness-propagation regression), and the tight bound surfaces that
    # instead of masking it (mirrors the bats 120s budget from 63d14e748).
    - assert:
        timeout: 2m
        resource:
          apiVersion: objectstorage.k8s.io/v1alpha1
          kind: BucketClaim
          metadata:
            name: harbor-test-registry
          status:
            bucketReady: true
    - assert:
        timeout: 1m
        resource:
          apiVersion: objectstorage.k8s.io/v1alpha1
          kind: BucketAccess
          metadata:
            name: harbor-test-registry
          status:
            accessGranted: true

  - name: wait-system-and-deployments
    try:
    - assert:
        timeout: 10m
        resource:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: harbor-test-system
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
    - assert:
        timeout: 2m
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: harbor-test-core
          status:
            (conditions[?type == 'Available']):
            - status: "True"
    - assert:
        timeout: 2m
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: harbor-test-registry
          status:
            (conditions[?type == 'Available']):
            - status: "True"
    - assert:
        timeout: 2m
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: harbor-test-portal
          status:
            (conditions[?type == 'Available']):
            - status: "True"

  - name: verify-credentials-and-service
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: harbor-test
          spec:
            (ports[0].port): 80
    - script:
        content: |
          set -eu
          pw=$(kubectl -n "$NAMESPACE" get secret harbor-test-credentials \
            -o jsonpath='{.data.admin-password}' | base64 -d)
          url=$(kubectl -n "$NAMESPACE" get secret harbor-test-credentials \
            -o jsonpath='{.data.url}' | base64 -d)
          test -n "$pw"
          echo "$url" | grep -q 'https://'
        check:
          ($error == null): true
