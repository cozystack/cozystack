# SiteRouter A — the tenant gateway under test (the site-router product). This
# is the instance whose HelmRelease, VM, LB, kube-ovn mediation and guest guards
# the suite asserts end to end.
#
# peer.address is a placeholder: A is the IPsec responder ("the remote peer
# dials in", per the schema), and B's pod-network address is only known at
# runtime, so the establish-topology script patches spec.peer.address with B's
# discovered VMI IP before the tunnel is asserted up.
#
# The image clones the cozystack VyOS golden image PVC
# (cozy-public/vm-default-images-vyos-router). That image is committed DISABLED
# (T01) and the VyOS 1.5 firewall syntax is provisional (TODO(T13)), so this
# suite is deferred from CI (see hack/select-e2e.sh) and runs only in the
# empirical validation, which publishes the image or supplies an uncommitted
# override. No image URL is committed here.
apiVersion: apps.cozystack.io/v1alpha1
kind: SiteRouter
metadata:
  name: a
spec:
  tunnel:
    type: ipsec
  peer:
    # Patched to B's VMI IP at runtime (see the establish-topology step).
    address: "0.0.0.0"
    auth:
      # A fixed, deterministic e2e value shared with B's static config — NOT a
      # real credential. Pinned (rather than autogenerated) so B's initiator
      # config can match it without reading A's generated Secret.
      psk: "cozystack-e2e-site-router-psk"
  # B's simulated external site network. RFC 5737 TEST-NET-1 (192.0.2.0/24) is a
  # documentation range disjoint from the cluster pod/service/join networks, so
  # the controller deny-set admits it (an overlapping range is rejected at
  # admission — covered by the Go admission tests, not here).
  remoteCIDRs:
    - 192.0.2.0/24
  # Source CIDR allowed to reach the VyOS management API. Must equal the
  # controller --management-cidr (both default to the kube-ovn pod CIDR).
  managementCIDR: 10.244.0.0/16
  image:
    name: vyos-router
  resources:
    cpu: 2
    memory: 2Gi
