# Backend behind A — the inbound target for the routed source-preservation
# assertion. agnhost netexec serves /clientip, which echoes the observed client
# source IP:port, so the test proves B's real remote source (192.0.2.x) is
# preserved end to end (not NAT'd) across the routed tunnel — the routed-mode
# contract.
#
# Created AFTER A programs the namespace routes, so it inherits the return route
# to B's site (192.0.2.0/24) via the kube-ovn webhook (routes are stamped onto a
# pod only at CREATE). This pod therefore doubles as one of the "fresh pod
# inherits the route annotation" assertions.
#
# TODO(T13): pin the agnhost image to a digest available on the sandbox nodes
# (add it to hack/e2e-prepull-images.sh if needed) so the backend does not race
# on an image pull.
apiVersion: v1
kind: Pod
metadata:
  name: site-router-backend
  labels:
    app: site-router-backend
spec:
  containers:
    - name: agnhost
      image: registry.k8s.io/e2e-test-images/agnhost:2.47
      args: ["netexec", "--http-port=8080"]
      ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: site-router-backend
spec:
  selector:
    app: site-router-backend
  ports:
    - port: 8080
      targetPort: 8080
