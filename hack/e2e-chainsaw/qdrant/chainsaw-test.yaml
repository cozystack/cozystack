# Chainsaw port of hack/e2e-apps/qdrant.bats ("Create Qdrant").
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: qdrant
spec:
  catch:
  - events: {}
  - describe:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: qdrant-test
  - podLogs:
      selector: app.kubernetes.io/instance=qdrant-test
      tail: 50
  steps:
  - name: create-qdrant
    try:
    - apply:
        file: qdrant.yaml

  - name: wait-helmreleases-ready
    try:
    - assert:
        timeout: 6m
        resource:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: qdrant-test
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
    - assert:
        timeout: 5m
        resource:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: qdrant-test-system
          status:
            (conditions[?type == 'Ready']):
            - status: "True"

  - name: verify-statefulset-and-storage
    try:
    - assert:
        timeout: 2m
        resource:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: qdrant-test
          status:
            readyReplicas: 1
    - assert:
        timeout: 2m
        resource:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: qdrant-storage-qdrant-test-0
          status:
            phase: Bound

  - name: verify-pvc-reclaim-on-delete
    try:
    # Issue #3059: Kubernetes never GCs StatefulSet-templated PVCs; the
    # chart's post-delete cleanup hook Job must reclaim the data PVC
    # asynchronously during uninstall (ordinal-anchored so a sibling's PVC is
    # never deleted, 2587458bd/ae7c23240). The `error` op polls for absence
    # and retries transient API errors internally, so a blip is never misread
    # as "reclaimed" (2m mirrors the bats ~120s budget).
    - delete:
        ref:
          apiVersion: apps.cozystack.io/v1alpha1
          kind: Qdrant
          name: test
    - error:
        timeout: 2m
        resource:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: qdrant-storage-qdrant-test-0
    catch:
    - script:
        content: |
          kubectl -n "$NAMESPACE" get pvc -o wide
          kubectl -n "$NAMESPACE" get jobs,pods -l app.kubernetes.io/instance=qdrant-test -o wide
