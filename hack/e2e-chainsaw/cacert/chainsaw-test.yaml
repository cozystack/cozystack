# Exercises cozystack-publish-ca-cert-writer-policy against the live API server.
#
# The policy's whole protection is two CEL expressions. helm-unittest pins them
# character-for-character and the bats check pins the writer identity, but until
# an engine converges onto the label leg NOTHING drives the deny path through
# admission — so a CEL that is wrong AS WRITTEN (a has() miss, the oldObject
# branch inverted) would pass every existing test while admitting a forged trust
# anchor. These cases drive it: they impersonate a non-cert-manager identity and
# confirm the API server refuses both attack shapes, and that cert-manager
# itself is still allowed (a policy that denied everyone would fail the seed).
#
# Impersonation and error-message greps can't be expressed by Chainsaw `apply`,
# so the cases stay scripts, mirroring hack/e2e-chainsaw/gateway (the
# foreign-*-denied cases). No tenant app is created: the policy is installed by
# cozystack-basics and enforced cluster-wide, so the tenant-test namespace and
# the shipped cert-manager ServiceAccount are all it needs.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: publish-ca-cert-writer-policy
spec:
  steps:
  - name: policy-binding-present
    try:
    - assert:
        timeout: 1m
        resource:
          apiVersion: admissionregistration.k8s.io/v1
          kind: ValidatingAdmissionPolicyBinding
          metadata:
            name: cozystack-publish-ca-cert-writer-policy
  - name: forge-and-relabel-denied-cert-manager-allowed
    try:
    - script:
        content: |
          set -eu
          ns="$NAMESPACE"
          label="internal.cozystack.io/publish-ca-cert"
          certmgr="system:serviceaccount:cozy-cert-manager:cert-manager"

          cleanup() {
            # This suite runs against the shared, pre-existing tenant-test
            # namespace (hack/e2e-chainsaw/.chainsaw.yaml), and Chainsaw only
            # reclaims namespaces and objects IT applied — everything here is
            # created by kubectl inside this script step, so nothing is
            # auto-reclaimed and it must be pruned by hand. That is why the trap
            # is armed BEFORE the RBAC apply below: a partial apply (Role created,
            # RoleBinding rejected) would otherwise leak the privileged Role into
            # the shared namespace. vap-ca-source-forged is deleted too: it does
            # not exist when the deny path holds, but it is created precisely when
            # the policy regresses and the test fails, and a leaked forged source
            # must not outlive the run. Deletes are NOT masked with `|| true`
            # (docs/agents/e2e-testing.md forbids it): every delete runs even if
            # an earlier one errors (each records the failure instead of aborting
            # the trap under set -e), the test's own exit status is preserved, and
            # a genuine cleanup failure fails the step.
            status=$?
            rc=0
            kubectl -n "$ns" delete secret vap-ca-source-seed --ignore-not-found || rc=1
            kubectl -n "$ns" delete secret vap-ca-source-forged --ignore-not-found || rc=1
            kubectl -n "$ns" delete rolebinding vap-probe-ca-source --ignore-not-found || rc=1
            kubectl -n "$ns" delete role vap-probe-ca-source --ignore-not-found || rc=1
            if [ "$status" -ne 0 ]; then exit "$status"; fi
            exit "$rc"
          }
          trap cleanup EXIT

          # Grant the tenant default SA Secret write, so the probe requests
          # reach ADMISSION (the VAP) instead of stopping at RBAC. Without this
          # a Forbidden from RBAC would masquerade as the policy's denial and
          # the message grep below would be the only thing telling them apart.
          kubectl apply -f - <<EOF
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: vap-probe-ca-source
            namespace: ${ns}
          rules:
          - apiGroups: [""]
            resources: ["secrets"]
            verbs: ["create", "update", "patch", "get", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: vap-probe-ca-source
            namespace: ${ns}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: vap-probe-ca-source
          subjects:
          - kind: ServiceAccount
            name: default
            namespace: ${ns}
          EOF

          as_tenant="kubectl --as=system:serviceaccount:${ns}:default \
            --as-group=system:serviceaccounts \
            --as-group=system:serviceaccounts:${ns}"

          # 1. FORGE-NEW: a tenant-tier identity creates a labelled source with
          #    an attacker ca.crt. Denied on the NEW object's label. (Content is
          #    irrelevant: the policy gates WHO writes, not WHAT.)
          out=$($as_tenant apply -n "$ns" -f - 2>&1 <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: vap-ca-source-forged
            namespace: ${ns}
            labels:
              ${label}: "true"
          type: Opaque
          stringData:
            ca.crt: forged
          EOF
          ) && rc=0 || rc=$?
          echo "forge-new rc=$rc out=$out"
          [ "$rc" -ne 0 ]
          echo "$out" | grep -qi "ValidatingAdmissionPolicy"
          echo "$out" | grep -q "may only be written by cert-manager"

          # 2. cert-manager IS allowed: seed a labelled source as its
          #    ServiceAccount. This is also the positive control — a policy that
          #    denied everyone (a mistyped writer literal, say) fails HERE, not
          #    silently at the deny cases above.
          kubectl --as="$certmgr" apply -n "$ns" -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: vap-ca-source-seed
            namespace: ${ns}
            labels:
              ${label}: "true"
          type: Opaque
          stringData:
            ca.crt: seed
          EOF

          # 3. RELABEL-AWAY: a tenant-tier identity strips the label off the
          #    existing source to dodge the gate. Denied on the OLD object's
          #    label, which is the branch the matchCondition adds precisely so
          #    this evasion cannot slip through.
          out=$($as_tenant label secret vap-ca-source-seed -n "$ns" "${label}-" 2>&1) && rc=0 || rc=$?
          echo "relabel-away rc=$rc out=$out"
          [ "$rc" -ne 0 ]
          echo "$out" | grep -qi "ValidatingAdmissionPolicy"
          echo "$out" | grep -q "may only be written by cert-manager"
        check:
          ($error == null): true
