apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: etcd-backup-schedule
spec:
  skipDelete: true
  catch:
  - events: {}
  - describe:
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: etcd
  - describe:
      apiVersion: etcd.aenix.io/v1alpha1
      kind: EtcdBackupSchedule
      name: etcd
  steps:
  - name: ensure-clean
    try:
    - script:
        timeout: 5m
        content: |
          set -eu
          kubectl -n "$NAMESPACE" delete etcd.apps.cozystack.io etcd \
            --ignore-not-found --wait=false >/dev/null 2>&1 || true
          # See etcd-basic ensure-clean: drain the leaked Kamaji DataStore
          # finalizer so the next install starts clean.
          deadline=$(( $(date +%s) + 240 ))
          while kubectl -n "$NAMESPACE" get hr etcd >/dev/null 2>&1 \
             || kubectl get datastore.kamaji.clastix.io "$NAMESPACE" >/dev/null 2>&1; do
            kubectl patch datastore.kamaji.clastix.io "$NAMESPACE" \
              --type=merge -p '{"metadata":{"finalizers":[]}}' >/dev/null 2>&1 || true
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "etcd/DataStore teardown did not settle within 4m" >&2
              kubectl -n "$NAMESPACE" get hr,etcd.apps.cozystack.io >&2 2>&1 || true
              kubectl get datastore.kamaji.clastix.io "$NAMESPACE" -o yaml >&2 2>&1 || true
              exit 1
            fi
            sleep 5
          done
        check:
          ($error == null): true
    - error:
        timeout: 1m
        resource: {apiVersion: v1, kind: Secret, metadata: {name: etcd-s3-creds}}
    - error:
        timeout: 1m
        resource: {apiVersion: etcd.aenix.io/v1alpha1, kind: EtcdBackupSchedule, metadata: {name: etcd}}
  - name: create-etcd
    try:
    - apply:
        file: etcd-backup.yaml
  - name: wait-ready
    try:
    - assert:
        timeout: 6m
        resource:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata:
            name: etcd
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
    - assert:
        timeout: 3m
        resource:
          apiVersion: etcd.aenix.io/v1alpha1
          kind: EtcdCluster
          metadata:
            name: etcd
          status:
            (conditions[?type == 'Ready']):
            - status: "True"
  - name: verify-backup-resources
    try:
    # Region field must propagate to the EtcdBackupSchedule.
    - assert:
        resource:
          apiVersion: etcd.aenix.io/v1alpha1
          kind: EtcdBackupSchedule
          metadata:
            name: etcd
          spec:
            destination:
              s3:
                region: us-east-1
    # The S3 secret carries the access key (base64 of "e2e-access-key").
    - assert:
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: etcd-s3-creds
          data:
            AWS_ACCESS_KEY_ID: ZTJlLWFjY2Vzcy1rZXk=
    # The operator generates a CronJob from the EtcdBackupSchedule.
    - assert:
        timeout: 2m
        resource:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            labels:
              etcd.aenix.io/etcdbackupschedule-name: etcd
