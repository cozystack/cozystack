{{- if .Values.external }}
{{- $extHost := required "external is true but _namespace.host is not set" (.Values._namespace | default dict).host }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-external
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ printf "%s.%s" .Release.Name $extHost }}
spec:
  type: LoadBalancer
  selector:
    opster.io/opensearch-cluster: {{ .Release.Name }}
    opster.io/opensearch-nodepool: nodes
  ports:
    - name: https
      port: 9200
      targetPort: 9200
      protocol: TCP
{{- if .Values.dashboards.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dashboards-external
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ printf "%s-dashboards.%s" .Release.Name $extHost }}
spec:
  type: LoadBalancer
  selector:
    opster.io/opensearch-cluster: {{ .Release.Name }}
    app.kubernetes.io/component: dashboards
  ports:
    - name: https
      port: 5601
      targetPort: 5601
      protocol: TCP
{{- end }}
{{- end }}
