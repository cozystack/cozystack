{{- /*
NOTE: Transport mTLS is always operator-managed (spec.security.tls.transport.generate: true
with perNode: true). This file covers HTTP layer (port 9200) and Dashboards HTTPS only.
Setting tls.enabled: false does NOT disable transport mTLS — the operator enforces it
regardless, as it is required by the OpenSearch security plugin.

Design: ONE combined leaf Certificate covers both the HTTP API (port 9200) and Dashboards
(port 5601) SANs. This keeps the chain at 4 resources and avoids duplicating the CA Issuer.

IMPORTANT: The CA secret is named {{ .Release.Name }}-http-ca (NOT {{ .Release.Name }}-ca).
The opensearch-operator hardcodes <clusterName>-ca as the name of its own internal transport
CA secret (see ReadOrGenerateCaCert in
https://github.com/opensearch-project/opensearch-k8s-operator/blob/main/opensearch-operator/pkg/reconcilers/util/util.go).
Using the same name would cause the operator to read our cert-manager CA and fail with
"tls: failed to find any PEM data in key input" because it expects ca.key but the
cert-manager secret stores the private key under tls.key.

securityadmin trust: the securityadmin job connects to the HTTP endpoint (port 9200 for
OpenSearch >= 2.0) and validates the server certificate against the admin certificate's
ca.crt, authenticating with that same admin certificate. To make both anchor on this CA,
the CR passes {{ .Release.Name }}-http-ca to spec.security.tls.http.caSecret: the operator
then signs the admin certificate with this CA and sets the HTTP listener trust anchor to
it (pemtrustedcas). The operator reads the cert-manager secret's tls.crt/tls.key as the
CA via the cert-manager.io/issuer-kind annotation. As a result securityadmin verifies the
server certificate, is accepted as admin, and the security config (users/roles) applies.

NAME-LENGTH GUARD: Kubernetes object names are bounded at 63 characters. The longest
suffix below is "-http-selfsigned" (16 chars), so the release name must be 47 chars
or fewer. Fail fast with a clear message rather than producing invalid object names.
*/}}
{{- $tlsEnabled := (include "opensearch.tls.enabled" .) | eq "true" -}}
{{- if $tlsEnabled }}
{{- if gt (len .Release.Name) 47 -}}
{{- fail (printf "Release name %q is %d chars; opensearch TLS requires <=47 chars so cert-manager resource names fit in the 63-char Kubernetes limit (longest suffix: -http-selfsigned)." .Release.Name (len .Release.Name)) -}}
{{- end -}}
{{- /*
The OpenSearch >= 2.0.0 floor for chart-managed HTTP TLS is enforced in
opensearch.tls.enabled, which fails on an explicit request and degrades an
auto-on one, so reaching this point already implies a supported version.
*/}}
{{- $clusterDomain := (index .Values._cluster "cluster-domain") | default "cozy.local" }}
---
# Self-signed bootstrap Issuer — used only to sign the HTTP CA Certificate below.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-http-selfsigned
spec:
  selfSigned: {}
---
# HTTP-layer CA Certificate. rotationPolicy: Never keeps the CA stable so existing
# client trust bundles remain valid across cert-manager renewals.
# Named http-ca (not ca) to avoid colliding with the operator's own transport CA secret
# which is always named <clusterName>-ca by the opensearch-operator.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-http-ca
spec:
  secretName: {{ .Release.Name }}-http-ca
  # Publish this CA to the tenant. The CA-extraction controller lifts ca.crt alone
  # into the key-free <release>.tenant-ca Secret, so a tenant can verify the HTTPS
  # endpoint without gaining access to the CA private key stored here under tls.key.
  # The release label is required on this leg: cert-manager issues the Secret, so it
  # carries neither an OwnerReference nor Helm metadata to attribute it by.
  secretTemplate:
    labels:
      internal.cozystack.io/publish-ca-cert: "true"
      internal.cozystack.io/publish-ca-cert-release: {{ .Release.Name | quote }}
  duration: 87600h  # 10 years
  isCA: true
  commonName: {{ .Release.Name }}-http-ca
  usages:
    - signing
    - key encipherment
    - cert sign
  privateKey:
    rotationPolicy: Never
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ .Release.Name }}-http-selfsigned
    kind: Issuer
    group: cert-manager.io
---
# CA Issuer — used to sign the leaf server certificate.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-http-ca
spec:
  ca:
    secretName: {{ .Release.Name }}-http-ca
---
# Combined leaf TLS Certificate for HTTP API (port 9200) and Dashboards (port 5601).
# A single cert with a combined SAN list is used so both services share the same
# CA Issuer and the chain stays at exactly 4 resources.
# The secret name ({{ .Release.Name }}-http-server) is passed to both:
#   spec.security.tls.http.secret.name  (OpenSearch HTTP API)
#   spec.dashboards.tls.secret.name     (Dashboards HTTPS, when enabled)
#
# NAMED -http-server, NOT -http-cert, for the same reason the CA above is named
# -http-ca: the operator reserves <clusterName>-http-cert for the HTTP certificate
# it generates itself (nodeSecretName in handleHttp), alongside -ca,
# -transport-cert, -admin-cert and -dashboards-cert. Reusing the reserved name
# breaks the moment TLS is turned off again: cert-manager keeps its Secret when
# the Certificate goes away (the platform ships enableCertificateOwnerRef=false),
# the operator then finds a Secret already sitting at the name it was about to
# generate, skips generation, and mounts the stale cert-manager one — while
# signing the admin certificate with its own transport CA. securityadmin cannot
# authenticate against that, and the security config silently stops applying.
# Staying outside the operator's namespace of names avoids the collision entirely.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-http-server
spec:
  secretName: {{ .Release.Name }}-http-server
  duration: 8760h    # 1 year
  renewBefore: 720h  # renew 30 days before expiry
  isCA: false
  usages:
    - server auth
    - signing
    - key encipherment
  dnsNames:
    {{- $ns := .Release.Namespace }}
    {{- $name := .Release.Name }}
    # OpenSearch HTTP API service (operator-created ClusterIP)
    - {{ $name }}
    - {{ $name }}.{{ $ns }}.svc
    - {{ $name }}.{{ $ns }}.svc.{{ $clusterDomain }}
    # Dashboards service (operator-created ClusterIP)
    - {{ $name }}-dashboards
    - {{ $name }}-dashboards.{{ $ns }}.svc
    - {{ $name }}-dashboards.{{ $ns }}.svc.{{ $clusterDomain }}
    {{- if .Values.external | default false }}
    {{- $extHost := required "external is true but _namespace.host is not set" .Values._namespace.host }}
    # External LoadBalancer DNS name (used by external-dns)
    - {{ printf "%s.%s" $name $extHost }}
    - {{ printf "%s-dashboards.%s" $name $extHost }}
    {{- end }}
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ .Release.Name }}-http-ca
    kind: Issuer
    group: cert-manager.io
{{- end }}
