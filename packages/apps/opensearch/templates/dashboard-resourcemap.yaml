apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-dashboard-resources
rules:
- apiGroups:
  - ""
  resources:
  - services
  resourceNames:
  - {{ .Release.Name }}
  - {{ .Release.Name }}-external
  {{- if .Values.dashboards.enabled }}
  - {{ .Release.Name }}-dashboards
  - {{ .Release.Name }}-dashboards-external
  {{- end }}
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ .Release.Name }}-credentials
  # The key-free trust anchor the CA-extraction controller publishes. Listing it in
  # the ApplicationDefinition only labels it for the tenant-resource registry; direct
  # read still needs a grant here. Both entries are required and neither substitutes
  # for the other: without the grant a tenant cannot read the Secret, and without the
  # registry entry the projection is not surfaced as a tenant resource at all.
  # ONLY the projection: <release>-http-ca, -http-server and -dashboards-server all
  # hold a private key and must never appear in this list.
  - {{ .Release.Name }}.tenant-ca
  verbs: ["get", "list", "watch"]
- apiGroups:
  - cozystack.io
  resources:
  - workloadmonitors
  resourceNames:
  - {{ .Release.Name }}
  verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Name }}-dashboard-resources
subjects:
{{ include "cozy-lib.rbac.subjectsForTenantAndAccessLevel" (list "use" .Release.Namespace) }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-dashboard-resources
  apiGroup: rbac.authorization.k8s.io
