###############################################################################
# external-svc.yaml — required guard for _namespace.host
###############################################################################

templates:
  - templates/external-svc.yaml

release:
  name: os-test
  namespace: tenant-test

set:
  _cluster:
    scheduling: {}
    cluster-domain: cozy.local

tests:
  - it: external-svc fails clearly when external true and _namespace.host missing
    set:
      external: true
      _namespace: {}
    asserts:
      - failedTemplate:
          errorMessage: "external is true but _namespace.host is not set"
