###############################################################################
# external-svc.yaml — required guard for _namespace.host
###############################################################################

templates:
  - templates/external-svc.yaml

release:
  name: os-test
  namespace: tenant-test

set:
  _cluster:
    scheduling: {}
    cluster-domain: cozy.local

tests:
  # An empty tenant host must not take the release down. The LoadBalancers still get
  # addresses and still serve; only the external-dns hostname is withheld, because
  # there is no name to publish. Previously this failed the whole render, which took
  # the OpenSearchCluster CR with it on a configuration that works on main.
  - it: still renders both Services when the tenant host is empty
    set:
      external: true
      _namespace: {}
      dashboards:
        enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: os-test-external
        documentIndex: 0
      - notExists:
          path: metadata.annotations
        documentIndex: 0
      - equal:
          path: metadata.name
          value: os-test-dashboards-external
        documentIndex: 1
      - notExists:
          path: metadata.annotations
        documentIndex: 1

  # _namespace absent entirely, not merely missing its host key — the deref must not
  # raise a nil pointer either.
  - it: still renders both Services when _namespace is absent entirely
    set:
      external: true
      dashboards:
        enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - notExists:
          path: metadata.annotations
        documentIndex: 0

  # The external-dns hostname is built from the tenant host, not the in-cluster
  # domain: cozy.local does not resolve outside the cluster, and the name published
  # here has to be one the leaf certificate carries a SAN for.
  # The operator labels Dashboards pods with opensearch.cluster.dashboards only.
  # A selector naming opster.io/opensearch-cluster or app.kubernetes.io/* matches
  # nothing, so the LoadBalancer comes up with no endpoints and no error — and this
  # PR issues a certificate SAN and documents a hostname for that very Service.
  - it: selects dashboards pods by the label the operator actually sets
    set:
      external: true
      _namespace:
        host: example.cozy.local
      dashboards:
        enabled: true
    asserts:
      - equal:
          path: spec.selector["opensearch.cluster.dashboards"]
          value: os-test
        documentIndex: 1
      - notExists:
          path: spec.selector["app.kubernetes.io/component"]
        documentIndex: 1
      - notExists:
          path: spec.selector["opster.io/opensearch-cluster"]
        documentIndex: 1
      # The API Service keeps the label the operator does set on data pods.
      - equal:
          path: spec.selector["opster.io/opensearch-cluster"]
          value: os-test
        documentIndex: 0

  - it: publishes external-dns hostnames under the tenant host
    set:
      external: true
      _namespace:
        host: example.cozy.local
      dashboards:
        enabled: true
    asserts:
      - equal:
          path: metadata.annotations["external-dns.alpha.kubernetes.io/hostname"]
          value: os-test.example.cozy.local
        documentIndex: 0
      - equal:
          path: metadata.annotations["external-dns.alpha.kubernetes.io/hostname"]
          value: os-test-dashboards.example.cozy.local
        documentIndex: 1
