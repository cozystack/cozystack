suite: opensearch TLS cert-manager chain

# Covers the tri-state tls.enabled field:
#   (a) external: false, tls.enabled unset  → TLS off, operator generates HTTP cert
#   (b) external: true,  tls.enabled unset  → TLS auto-on via cert-manager + external SAN
#   (c) external: true,  tls.enabled: false → TLS off, operator generates HTTP cert
#   (d) external: false, tls.enabled: true  → TLS on via cert-manager (no external SAN)
#
# Design: ONE combined leaf Certificate for HTTP + Dashboards (combined SAN list).
# Keeps the chain to 4 resources: selfsigned Issuer, CA Cert, CA Issuer, leaf Cert.
# Transport mTLS remains operator-managed (generate: true, perNode: true) — not touched here.

release:
  name: os-test
  namespace: tenant-test

set:
  _cluster:
    scheduling: {}
    cluster-domain: cozy.local

###############################################################################
# certmanager.yaml — case (a): external false, tls.enabled unset → no resources
###############################################################################

templates:
  - templates/certmanager.yaml

tests:
  - it: fails when release name exceeds the 47-char cert-manager naming limit
    release:
      name: os-test-name-that-is-definitely-too-long-xxxxxxx
      namespace: tenant-test
    set:
      tls:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "Release name \"os-test-name-that-is-definitely-too-long-xxxxxxx\" is 48 chars; opensearch TLS requires <=47 chars so cert-manager resource names fit in the 63-char Kubernetes limit (longest suffix: -http-selfsigned)."

  # Version floor: below OpenSearch 2.0.0 the operator signs the admin certificate
  # with the transport CA instead of http.caSecret, so securityadmin cannot verify
  # against the cert-manager HTTP CA and the security config silently never applies.
  # An explicit request fails; an auto-on one degrades (asserted two cases below).
  - it: fails when chart-managed HTTP TLS is explicitly requested below 2.0.0
    set:
      version: v1
      tls:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "opensearch 1.3.20 (version: v1) does not support chart-managed HTTP TLS: below 2.0.0 the operator signs the securityadmin admin certificate with the transport CA, which cannot verify against the cert-manager HTTP CA, so users and roles would silently never apply. Set tls.enabled: false to use operator-managed HTTP TLS, or use version v2 or later."

  # A v1 + external release never asked for chart-managed TLS — the tri-state
  # turned it on. Degrade to operator-managed HTTP TLS so such a release keeps
  # rendering on upgrade instead of hard-failing on a flag it never set.
  - it: degrades to operator-managed TLS when auto-on lands below 2.0.0
    set:
      version: v1
      external: true
      _namespace:
        host: example.cozy.local
    asserts:
      - hasDocuments:
          count: 0

  - it: allows version v1 when chart-managed HTTP TLS is off
    set:
      version: v1
      external: true
      _namespace:
        host: example.cozy.local
      tls:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: allows chart-managed HTTP TLS on v3, which is at or above 2.0.0
    set:
      version: v3
      tls:
        enabled: true
    asserts:
      - hasDocuments:
          count: 4

  # CA publication (label-driven leg). The CA-extraction controller selects the source
  # by these labels and projects ca.crt alone into the key-free <release>.tenant-ca
  # Secret. The release label is required because a cert-manager-issued Secret carries
  # no OwnerReference and no Helm metadata to attribute it by.
  - it: labels the HTTP CA secret for publication to the tenant
    set:
      tls:
        enabled: true
    asserts:
      - equal:
          path: spec.secretTemplate.labels["internal.cozystack.io/publish-ca-cert"]
          value: "true"
        documentIndex: 1
      - equal:
          path: spec.secretTemplate.labels["internal.cozystack.io/publish-ca-cert-release"]
          value: os-test
        documentIndex: 1
      - equal:
          path: metadata.name
          value: os-test-http-ca
        documentIndex: 1

  # Passing http.caSecret moves the operator onto subPath mounts, which the kubelet
  # never refreshes, and nothing restarts the pods when the Secret changes. A leaf
  # that outlived its mount would expire in place and take HTTPS down on a timer, so
  # the leaf must not be short-lived, and renewBefore must not promise a rotation
  # that cannot happen.
  - it: gives the leaf certificate no expiry the pods cannot survive
    set:
      tls:
        enabled: true
    asserts:
      - equal:
          path: spec.duration
          value: 87600h
        documentIndex: 3
      - notExists:
          path: spec.renewBefore
        documentIndex: 3

  - it: keeps the CA and the leaf on the same lifetime
    set:
      tls:
        enabled: true
    asserts:
      - equal:
          path: spec.duration
          value: 87600h
        documentIndex: 1
      - notExists:
          path: spec.renewBefore
        documentIndex: 1

  # Both names external-svc publishes to external-dns must appear in the leaf's SAN
  # list, or an external client reaching the LoadBalancer fails hostname verification.
  - it: covers both external-dns hostnames with certificate SANs
    set:
      external: true
      _namespace:
        host: example.cozy.local
      dashboards:
        enabled: true
    asserts:
      - contains:
          path: spec.dnsNames
          content: os-test.example.cozy.local
        documentIndex: 3
      - contains:
          path: spec.dnsNames
          content: os-test-dashboards.example.cozy.local
        documentIndex: 3

  # The operator reserves <release>-http-cert for the HTTP certificate it generates
  # itself. If the chart's leaf took that name, turning TLS off would leave the
  # cert-manager Secret behind (enableCertificateOwnerRef is false), the operator
  # would find it already present, skip generation and mount it — while signing the
  # admin certificate with its transport CA, silently breaking securityadmin.
  - it: keeps the leaf secret out of the operator's reserved certificate names
    set:
      tls:
        enabled: true
    asserts:
      - notEqual:
          path: spec.secretName
          value: os-test-http-cert
        documentIndex: 3
      - notEqual:
          path: spec.secretName
          value: os-test-transport-cert
        documentIndex: 3
      - notEqual:
          path: spec.secretName
          value: os-test-dashboards-cert
        documentIndex: 3
      - notEqual:
          path: spec.secretName
          value: os-test-admin-cert
        documentIndex: 3
      - notEqual:
          path: spec.secretName
          value: os-test-ca
        documentIndex: 3

  # The two labels are not interchangeable, and collapsing them leaks the CA key.
  # publish-ca-cert marks a SOURCE for the extraction controller, which copies ca.crt
  # alone into a separate key-free Secret. tenant-ca marks that PROJECTION, and it is
  # what the ApplicationDefinition selects to hand to the tenant. This Secret holds
  # the CA private key under tls.key, so it must never carry the projection's label:
  # the ApplicationDefinition selects purely by label, so one renamed key here would
  # make the CA private key tenant-readable with every other test still passing.
  - it: keeps the key-bearing CA secret off the tenant-visible label
    set:
      tls:
        enabled: true
    asserts:
      - notExists:
          path: spec.secretTemplate.labels["internal.cozystack.io/tenant-ca"]
        documentIndex: 1

  # Only the CA may be published. The leaf carries the HTTPS server private key, so
  # labelling it would hand that key to the extraction controller as a CA source.
  - it: does not label the leaf server certificate for publication
    set:
      tls:
        enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: os-test-http-server
        documentIndex: 3
      - notExists:
          path: spec.secretTemplate
        documentIndex: 3

  - it: "(a) renders no resources when external false and tls.enabled unset"
    asserts:
      - hasDocuments:
          count: 0

  - it: "(c) renders no resources when tls.enabled explicitly false even with external true"
    set:
      external: true
      _namespace:
        host: example.cozy.local
      tls:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: "(b) renders 4 cert-manager resources when tls auto-on via external true"
    set:
      external: true
      _namespace:
        host: example.cozy.local
    asserts:
      - hasDocuments:
          count: 4

  - it: "(d) renders 4 cert-manager resources when tls explicitly enabled with external false"
    set:
      tls:
        enabled: true
    asserts:
      - hasDocuments:
          count: 4

  - it: "(e) renders 4 resources and external SANs when tls.enabled explicitly true and external true"
    set:
      tls:
        enabled: true
      external: true
      _namespace:
        host: example.cozy.local
    asserts:
      - hasDocuments:
          count: 4
      - contains:
          path: spec.dnsNames
          content: os-test.example.cozy.local
        documentIndex: 3
      - contains:
          path: spec.dnsNames
          content: os-test-dashboards.example.cozy.local
        documentIndex: 3

  # --- Chain structure ---

  - it: first document is selfsigned Issuer
    set:
      tls:
        enabled: true
    documentIndex: 0
    asserts:
      - isKind:
          of: Issuer
      - equal:
          path: spec.selfSigned
          value: {}
      - equal:
          path: metadata.name
          value: os-test-http-selfsigned

  - it: second document is CA Certificate with isCA true and rotationPolicy Never
    set:
      tls:
        enabled: true
    documentIndex: 1
    asserts:
      - isKind:
          of: Certificate
      - equal:
          path: spec.isCA
          value: true
      - equal:
          path: spec.secretName
          value: os-test-http-ca
      - equal:
          path: spec.issuerRef.name
          value: os-test-http-selfsigned
      - equal:
          path: spec.privateKey.rotationPolicy
          value: Never
      - equal:
          path: spec.privateKey.algorithm
          value: ECDSA
      - equal:
          path: spec.privateKey.size
          value: 256

  - it: third document is CA Issuer referencing the CA secret
    set:
      tls:
        enabled: true
    documentIndex: 2
    asserts:
      - isKind:
          of: Issuer
      - equal:
          path: metadata.name
          value: os-test-http-ca
      - equal:
          path: spec.ca.secretName
          value: os-test-http-ca

  - it: fourth document is leaf Certificate referencing the CA Issuer
    set:
      tls:
        enabled: true
    documentIndex: 3
    asserts:
      - isKind:
          of: Certificate
      - equal:
          path: spec.secretName
          value: os-test-http-server
      - equal:
          path: spec.issuerRef.name
          value: os-test-http-ca
      - equal:
          path: spec.privateKey.algorithm
          value: ECDSA
      - equal:
          path: spec.privateKey.size
          value: 256
      - equal:
          path: spec.privateKey.rotationPolicy
          value: Always

  # --- SAN coverage for HTTP services ---

  # SAN PARITY WITH THE OPERATOR. Enabling chart-managed TLS replaces the certificate
  # the operator was issuing, so every name that certificate covered has to be covered
  # here too — otherwise an existing client silently stops verifying. The operator
  # issues for <name>, the service name, <name>-discovery and the <name>.<ns>[.svc
  # [.domain]] ladder, and its Dashboards certificate for the -dashboards ladder.
  - it: leaf cert covers every DNS form the operator certificate covered
    set:
      tls:
        enabled: true
    documentIndex: 3
    asserts:
      - contains:
          path: spec.dnsNames
          content: os-test
      - contains:
          path: spec.dnsNames
          content: os-test.tenant-test
      - contains:
          path: spec.dnsNames
          content: os-test.tenant-test.svc
      - contains:
          path: spec.dnsNames
          content: os-test.tenant-test.svc.cozy.local
      - contains:
          path: spec.dnsNames
          content: os-test-discovery
      - contains:
          path: spec.dnsNames
          content: os-test-dashboards
      - contains:
          path: spec.dnsNames
          content: os-test-dashboards.tenant-test
      - contains:
          path: spec.dnsNames
          content: os-test-dashboards.tenant-test.svc
      - contains:
          path: spec.dnsNames
          content: os-test-dashboards.tenant-test.svc.cozy.local

  - it: "(b) leaf cert includes external HTTP DNS SAN when external true"
    set:
      external: true
      _namespace:
        host: example.cozy.local
    documentIndex: 3
    asserts:
      - contains:
          path: spec.dnsNames
          content: os-test.example.cozy.local

  - it: "(d) leaf cert does NOT include external HTTP DNS SAN when external false"
    set:
      tls:
        enabled: true
    documentIndex: 3
    asserts:
      - notContains:
          path: spec.dnsNames
          content: os-test.example.cozy.local

  # --- SAN coverage for Dashboards services ---

  - it: leaf cert includes three DNS forms for the dashboards service
    set:
      tls:
        enabled: true
    documentIndex: 3
    asserts:
      - contains:
          path: spec.dnsNames
          content: os-test-dashboards
      - contains:
          path: spec.dnsNames
          content: os-test-dashboards.tenant-test.svc
      - contains:
          path: spec.dnsNames
          content: os-test-dashboards.tenant-test.svc.cozy.local

  - it: "(b) leaf cert includes external Dashboards DNS SAN when external true"
    set:
      external: true
      _namespace:
        host: example.cozy.local
    documentIndex: 3
    asserts:
      - contains:
          path: spec.dnsNames
          content: os-test-dashboards.example.cozy.local

  # No key encipherment on either certificate: RFC 5480 section 3 forbids it for
  # ECDSA keys, which do no key transport, and both keys here are ECDSA P-256.
  - it: leaf cert includes usages server auth and signing, and no key encipherment
    set:
      tls:
        enabled: true
    documentIndex: 3
    asserts:
      - contains:
          path: spec.usages
          content: server auth
      - contains:
          path: spec.usages
          content: signing
      - notContains:
          path: spec.usages
          content: key encipherment
      - lengthEqual:
          path: spec.usages
          count: 2
      - notContains:
          path: spec.usages
          content: cert sign

  - it: CA cert carries no key encipherment either
    set:
      tls:
        enabled: true
    documentIndex: 1
    asserts:
      - contains:
          path: spec.usages
          content: cert sign
      - notContains:
          path: spec.usages
          content: key encipherment
      - lengthEqual:
          path: spec.usages
          count: 2

  - it: external SAN block fails clearly when _namespace.host missing
    set:
      tls:
        enabled: true
      external: true
      _namespace: {}
    asserts:
      - failedTemplate:
          errorMessage: "external is true but _namespace.host is not set"

---
---
###############################################################################
# opensearch.yaml — TLS state reflected in OpenSearchCluster spec
###############################################################################

templates:
  - templates/opensearch.yaml

release:
  name: os-test
  namespace: tenant-test

set:
  _cluster:
    scheduling: {}
    cluster-domain: cozy.local

tests:
  # A v1 + external release never asked for chart-managed TLS — the tri-state
  # turned it on. Below 2.0.0 that combination degrades to operator-managed HTTP
  # TLS rather than failing, so such a release keeps working across an upgrade.
  - it: leaves HTTP TLS operator-generated when auto-on degrades below 2.0.0
    set:
      version: v1
      external: true
      _namespace:
        host: example.cozy.local
    asserts:
      - equal:
          path: spec.security.tls.http.generate
          value: true
        documentIndex: 0
      - notExists:
          path: spec.security.tls.http.caSecret
        documentIndex: 0
      - notExists:
          path: spec.security.tls.http.secret
        documentIndex: 0

  # --- Transport TLS: always operator-managed, never touched ---

  - it: transport TLS always uses operator generate regardless of tls.enabled
    asserts:
      - equal:
          path: spec.security.tls.transport.generate
          value: true
        documentIndex: 0
      - equal:
          path: spec.security.tls.transport.perNode
          value: true
        documentIndex: 0

  - it: transport TLS stays operator generate even when tls.enabled true
    set:
      tls:
        enabled: true
    asserts:
      - equal:
          path: spec.security.tls.transport.generate
          value: true
        documentIndex: 0
      - equal:
          path: spec.security.tls.transport.perNode
          value: true
        documentIndex: 0

  # --- HTTP TLS: case (a) — operator generate when tls off by default ---

  - it: "(a) HTTP uses operator generate when external false and tls.enabled unset"
    asserts:
      - equal:
          path: spec.security.tls.http.generate
          value: true
        documentIndex: 0
      - notExists:
          path: spec.security.tls.http.secret
        documentIndex: 0
      - notExists:
          path: spec.security.tls.http.caSecret
        documentIndex: 0

  # --- HTTP TLS: case (b) — cert-manager secret when external true and tls.enabled unset ---

  - it: "(b) HTTP uses cert-manager secret when external true and tls.enabled unset"
    set:
      external: true
      _namespace:
        host: example.cozy.local
    asserts:
      - equal:
          path: spec.security.tls.http.secret.name
          value: os-test-http-server
        documentIndex: 0
      - equal:
          path: spec.security.tls.http.caSecret.name
          value: os-test-http-ca
        documentIndex: 0
      - notExists:
          path: spec.security.tls.http.generate
        documentIndex: 0

  # --- HTTP TLS: case (c) — operator generate when tls.enabled explicitly false ---

  - it: "(c) HTTP uses operator generate when tls.enabled explicitly false"
    set:
      external: true
      _namespace:
        host: example.cozy.local
      tls:
        enabled: false
    asserts:
      - equal:
          path: spec.security.tls.http.generate
          value: true
        documentIndex: 0
      - notExists:
          path: spec.security.tls.http.secret
        documentIndex: 0
      - notExists:
          path: spec.security.tls.http.caSecret
        documentIndex: 0

  # --- HTTP TLS: case (d) — cert-manager secret when tls.enabled explicitly true ---

  - it: "(d) HTTP uses cert-manager secret when tls.enabled explicitly true"
    set:
      tls:
        enabled: true
    asserts:
      - equal:
          path: spec.security.tls.http.secret.name
          value: os-test-http-server
        documentIndex: 0
      - equal:
          path: spec.security.tls.http.caSecret.name
          value: os-test-http-ca
        documentIndex: 0
      - notExists:
          path: spec.security.tls.http.generate
        documentIndex: 0

  # --- Dashboards TLS: operator generate when dashboards on, cert-manager secret when tls enabled ---

  - it: dashboards uses operator generate when enabled and tls off by default
    set:
      dashboards:
        enabled: true
        replicas: 1
        resourcesPreset: "c1.small"
        resources: {}
    asserts:
      - equal:
          path: spec.dashboards.tls.enable
          value: true
        documentIndex: 0
      - equal:
          path: spec.dashboards.tls.generate
          value: true
        documentIndex: 0
      - notExists:
          path: spec.dashboards.tls.secret
        documentIndex: 0

  - it: dashboards uses cert-manager secret when enabled and tls on via external true
    set:
      external: true
      _namespace:
        host: example.cozy.local
      dashboards:
        enabled: true
        replicas: 1
        resourcesPreset: "c1.small"
        resources: {}
    asserts:
      - equal:
          path: spec.dashboards.tls.enable
          value: true
        documentIndex: 0
      - equal:
          path: spec.dashboards.tls.secret.name
          value: os-test-http-server
        documentIndex: 0
      - notExists:
          path: spec.dashboards.tls.generate
        documentIndex: 0

  - it: dashboards uses cert-manager secret when tls.enabled explicitly true
    set:
      tls:
        enabled: true
      dashboards:
        enabled: true
        replicas: 1
        resourcesPreset: "c1.small"
        resources: {}
    asserts:
      - equal:
          path: spec.dashboards.tls.enable
          value: true
        documentIndex: 0
      - equal:
          path: spec.dashboards.tls.secret.name
          value: os-test-http-server
        documentIndex: 0
      - notExists:
          path: spec.dashboards.tls.generate
        documentIndex: 0

---
---
###############################################################################
# external-svc.yaml — required guard for _namespace.host
###############################################################################

templates:
  - templates/external-svc.yaml

release:
  name: os-test
  namespace: tenant-test

set:
  _cluster:
    scheduling: {}
    cluster-domain: cozy.local

tests:
  - it: external-svc fails clearly when external true and _namespace.host missing
    set:
      external: true
      _namespace: {}
    asserts:
      - failedTemplate:
          errorMessage: "external is true but _namespace.host is not set"

  # _namespace absent entirely, not merely missing its host key. Without a default
  # the deref raises a raw nil pointer before required can say anything useful.
  - it: external-svc fails clearly when _namespace is absent entirely
    set:
      external: true
    asserts:
      - failedTemplate:
          errorMessage: "external is true but _namespace.host is not set"

  # The external-dns hostname is built from the tenant host, not the in-cluster
  # domain: cozy.local does not resolve outside the cluster, and the name published
  # here has to be one the leaf certificate carries a SAN for.
  - it: publishes external-dns hostnames under the tenant host
    set:
      external: true
      _namespace:
        host: example.cozy.local
      dashboards:
        enabled: true
    asserts:
      - equal:
          path: metadata.annotations["external-dns.alpha.kubernetes.io/hostname"]
          value: os-test.example.cozy.local
        documentIndex: 0
      - equal:
          path: metadata.annotations["external-dns.alpha.kubernetes.io/hostname"]
          value: os-test-dashboards.example.cozy.local
        documentIndex: 1
