## @enum {string} Version
## @value v3
## @value v2
## @value v1

## @param {Version} version - OpenSearch major version to deploy.
version: v2

##
## @section TLS configuration
##

## @typedef {struct} TLS - HTTP-layer TLS configuration for OpenSearch and Dashboards.
## @field {*bool} enabled - Tri-state TLS switch. When unset, TLS is enabled automatically if external is true, off otherwise. Set explicitly to true or false to override.
##   NOTE: Transport mTLS between nodes is always active and is managed by the opster
##   operator (tls.transport.generate: true). Setting enabled: false here does NOT
##   disable transport mTLS — the OpenSearch security plugin requires it unconditionally.
##   When chart-managed HTTP TLS is enabled, the chart's cert-manager HTTP CA
##   (<release>-http-ca) is passed to the operator via spec.security.tls.http.caSecret, so
##   the operator signs the admin certificate with it and anchors the HTTP listener trust on
##   it. The securityadmin job then verifies the HTTP server certificate and applies the
##   security configuration (users, roles, audit policies) from the <release>-security-config
##   Secret. Transport mTLS stays operator-managed and independent.
##   REQUIRES OpenSearch 2.0.0 or later (version v2 or v3). Below that the operator
##   signs the admin certificate with the transport CA rather than this one, so
##   securityadmin cannot authenticate. Setting enabled: true on such a version
##   fails the release; leaving it unset falls back to operator-managed HTTP TLS
##   instead, so an external release on an older version keeps working.
##   The certificate is issued by a per-release private CA, so clients must trust it
##   explicitly. The platform publishes that trust anchor as the key-free Secret
##   <release>.tenant-ca, holding ca.crt alone; the private key never leaves the
##   namespace. Neither service picks up a reissued certificate on its own, so ANY
##   change to one needs a manual step, not just a deliberate rotation: changing
##   external, the tenant host or the cluster domain makes cert-manager reissue with
##   the new names while the pods keep serving the old material, with no error
##   anywhere. Those three reissue BOTH certificates, so complete it on both sides —
##   delete <release>-http-server and restart the OpenSearch pods, and, when
##   Dashboards is enabled, delete <release>-dashboards-server and restart the
##   Dashboards deployment separately. Doing only the first leaves Dashboards serving
##   a certificate that no longer matches its own name. Do not delete <release>-http-ca
##   to do this: that mints a new CA, and until everything restarts the old one is
##   still what is trusted.
##   UPGRADE NOTE: an existing external release with this switch unset is on
##   operator-managed TLS today and moves to chart-managed TLS the first time it is
##   reconciled after this becomes available. That rolls the cluster and re-anchors it
##   on a new CA, so anything pinned to the operator's CA must be repointed at
##   <release>.tenant-ca. Set enabled: false beforehand to stay as you are.
##   Turning this off again on a release that had it on also needs a manual cleanup:
##   cert-manager keeps its Secrets after the certificates are removed, so the tenant
##   keeps receiving the old CA while the endpoint has moved to an operator-issued
##   certificate. Delete <release>-http-ca, <release>-http-server and, if Dashboards
##   was enabled, <release>-dashboards-server to complete it.

## @param {TLS} tls - HTTP-layer TLS configuration.
tls: {}

##
## @section Image configuration
##

## @typedef {struct} Images - Container image configuration.
## @field {string} opensearch - OpenSearch image.

## @param {Images} images - Container images used by the operator.
images:
  opensearch: ""

##
## @section Node roles configuration
##

## @typedef {struct} NodeRoles - OpenSearch node roles.
## @field {bool} master - Enable cluster_manager role.
## @field {bool} data - Enable data role.
## @field {bool} ingest - Enable ingest role.
## @field {bool} ml - Enable machine learning role.

## @param {NodeRoles} nodeRoles - Node roles configuration.
nodeRoles:
  master: true
  data: true
  ingest: true
  ml: false

##
## @section Users configuration
##

## @typedef {struct} User - User configuration.
## @field {string} [password] - Password for the user (auto-generated if omitted).
## @field {[]string} roles - List of OpenSearch roles.

## @param {map[string]User} users - Custom OpenSearch users configuration map.
users: {}
## Example:
## users:
##   myuser:
##     roles:
##       - all_access

##
## @section OpenSearch Dashboards configuration
##

## @typedef {struct} Dashboards - OpenSearch Dashboards deployment configuration.
## @field {bool} enabled - Enable OpenSearch Dashboards deployment.
## @field {int} replicas - Number of Dashboards replicas.
## @field {Resources} [resources] - Explicit CPU and memory configuration for Dashboards.
## @field {ResourcesPreset} resourcesPreset - Default sizing preset for Dashboards.

## @param {Dashboards} dashboards - OpenSearch Dashboards configuration.
dashboards:
  enabled: false
  replicas: 1
  resources: {}
  resourcesPreset: "c1.small"
