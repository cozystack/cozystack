## @param {bool} external - Enable external access from outside the cluster.
##   The LoadBalancer Services are published to external-dns as
##   <release>.<tenant-host> and <release>-dashboards.<tenant-host>. Releases created
##   before this naming was introduced were published under the in-cluster domain
##   instead, which does not resolve outside the cluster. Re-applying publishes the
##   new name but does NOT withdraw the old record: external-dns runs upsert-only, so
##   it never issues a delete. The stale entry keeps pointing at the LoadBalancer
##   until it is removed from the zone by hand.
##   ONLY chart-managed TLS covers those names. With tls.enabled true (or auto-on on
##   OpenSearch 2.0.0 and later) each service gets its own certificate carrying its
##   own external name — they are issued separately, not as one covering both. With TLS
##   operator-managed — tls.enabled false, or the fallback below 2.0.0 — the operator
##   issues a certificate for in-cluster names only, so an external client reaching
##   the published name cannot verify it and must skip verification or supply its own
##   certificate out of band.
##   Changing this on a release that already runs chart-managed TLS reissues the
##   certificate with a different set of names, and the pods do not pick that up on
##   their own — see the manual step described under tls.
external: false

## @enum {string} TopologySpreadPolicy - Pod distribution policy across nodes/zones.
## @value soft - Best-effort distribution (ScheduleAnyway) - pods may be scheduled on same node if needed
## @value hard - Strict distribution (DoNotSchedule) - pods will not schedule if spread cannot be achieved

## @param {TopologySpreadPolicy} topologySpreadPolicy="soft" - How strictly to enforce pod distribution across nodes and zones.
topologySpreadPolicy: "soft"

