suite: site-router cloud-init + API-key Secrets

# T04/T11/D6 — one template file computes the VyOS HTTPS-API token exactly once
# (lookup <release>-api-key else autogen, for reconcile stability) and renders
# BOTH the api-key Secret (RBAC-isolated from tenant roles; the controller reads
# it) AND the NoCloud cloud-init Secret that seeds first boot.
#
# DELIVERY — the seed is a cloud-init `write_files` of a COMPLETE, VyOS-serialized
# config.boot (see the DELIVERY MECHANISM note in _helpers.tpl). On the pinned
# image the vyos_config_commands module serializes config.boot invalidly and
# runcmd/bootcmd are disabled (empty cloud_final_modules), so write_files is the
# only config-capable module that runs. Because we now ship the WHOLE config.boot,
# these tests also assert the baked security defaults we must preserve (locked
# login, no ssh service, ttyS0 console) and the image-coupled version footer.
#
# LISTEN-ADDRESS / MANAGEMENT-BINDING DESIGN (raised at the T04 gate):
# The pod IP is unknown at Helm render time (kube-ovn assigns it at pod CREATE),
# so the API cannot bind to a literal pod address. Following the reference
# implementation + D6, the API binds broadly (listen-address "0.0.0.0") and the
# MANAGEMENT FIREWALL is the compensating control: only the controller mgmt-CIDR
# reaches tcp 443 (the HTTPS API; SSH 22 is never accepted — no SSH service on
# the image, baked login locked), everything else (tunnel traffic, world) hits
# `default-action "drop"`. We assert the firewall binding, not a dynamic pod IP.
# The stricter "API never on the tunnel interface" guard is T08's guest
# local-input drop.

templates:
  - templates/secret-cloudinit.yaml

release:
  name: site-router-test
  namespace: tenant-test

set:
  _cluster: {}
  managementCIDR: 10.244.0.0/16
  peer:
    address: 203.0.113.10

tests:
  - it: renders the cloud-init Secret as a #cloud-config write_files of config.boot
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: '(?m)^#cloud-config'
      - matchRegex:
          path: stringData.userdata
          pattern: '(?m)^write_files:'
      - matchRegex:
          path: stringData.userdata
          pattern: 'path: /opt/vyatta/etc/config/config.boot'
      # config.boot must be root:vyattacfg 0660 or vyos-router will not read it.
      - matchRegex:
          path: stringData.userdata
          pattern: 'owner: root:vyattacfg'
      - matchRegex:
          path: stringData.userdata
          pattern: 'permissions:'
      - matchRegex:
          path: stringData.userdata
          pattern: '0660'
      # Lock out the two broken delivery paths on this image: vyos_config_commands
      # (cc_vyos_userdata serializes config.boot with invalid braced leaf values)
      # and runcmd (scripts-user disabled — empty cloud_final_modules). A revert to
      # either must fail here. See the DELIVERY MECHANISM note in _helpers.tpl.
      - notMatchRegex:
          path: stringData.userdata
          pattern: '(?m)^vyos_config_commands:'
      - notMatchRegex:
          path: stringData.userdata
          pattern: '(?m)^runcmd:'

  - it: seeds the hostname and the HTTPS API key
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: 'host-name "site-router-test"'
      - matchRegex:
          path: stringData.userdata
          pattern: 'id site-router-controller \{'
      - matchRegex:
          path: stringData.userdata
          pattern: 'key "[a-zA-Z0-9]{16,}"'

  - it: binds the API broadly (listen-address "0.0.0.0") — firewall is the compensating control
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: 'listen-address "0.0.0.0"'

  # R2 — the router is unreachable without these: eth0 up over DHCP (otherwise no
  # IP/routes) and the HTTPS API REST endpoints started (`api keys` alone does NOT
  # start /configure — the `rest` node is required). Emitted always (not gated on
  # managementCIDR).
  - it: brings eth0 up over DHCP and starts the HTTPS API REST endpoints
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: 'ethernet eth0 \{'
      - matchRegex:
          path: stringData.userdata
          pattern: 'address "dhcp"'
      - matchRegex:
          path: stringData.userdata
          pattern: 'rest \{'
      # eth0 must NOT carry a hw-id — it would pin the interface to one MAC, and
      # every gateway VM gets a fresh MAC. Match by name on any MAC.
      - notMatchRegex:
          path: stringData.userdata
          pattern: 'hw-id'

  # The whole config.boot ships baked defaults we must not drop. The locked `vyos`
  # login (encrypted-password "*") + absent ssh service is what keeps the pod
  # network from reaching a shell (D6); the ttyS0 console is the only debug path
  # (virtctl console, cluster-RBAC gated). The version footer must match the image
  # or VyOS runs a config migration (IMAGE COUPLING — see _helpers.tpl).
  - it: preserves the baked security defaults (locked login, no ssh service, ttyS0 console, version footer)
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: 'encrypted-password "\*"'
      - notMatchRegex:
          path: stringData.userdata
          pattern: '(?m)^\s+ssh \{'
      - matchRegex:
          path: stringData.userdata
          pattern: 'device ttyS0 \{'
      - matchRegex:
          path: stringData.userdata
          pattern: 'Release version: 1.5-rolling-20260720'

  - it: stamps the fail-closed management firewall (established/related + mgmt-CIDR tcp 443 only + default drop)
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: 'state "established"'
      - matchRegex:
          path: stringData.userdata
          pattern: 'state "related"'
      - matchRegex:
          path: stringData.userdata
          pattern: 'address "10.244.0.0/16"'
      - matchRegex:
          path: stringData.userdata
          pattern: 'protocol "tcp"'
      # S2: the management ACL accept rule opens ONLY the HTTPS API (443). SSH (22)
      # is never accepted — the appliance has no SSH service and the baked login is
      # locked, so 22 stays behind default-action "drop".
      - matchRegex:
          path: stringData.userdata
          pattern: 'port "443"'
      - matchRegex:
          path: stringData.userdata
          pattern: 'default-action "drop"'

  - it: does NOT open the API to the world (no 0.0.0.0/0 firewall source)
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - notMatchRegex:
          path: stringData.userdata
          pattern: 'address "0\.0\.0\.0/0"'

  - it: honours a custom managementCIDR in the firewall allow rule
    set:
      managementCIDR: 192.0.2.0/24
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: 'address "192.0.2.0/24"'

  # S1 config-injection guard. The templated values land inside VyOS "…" quotes in
  # config.boot, so a tenant value with an embedded quote/newline could break out
  # of a leaf and inject arbitrary config (e.g. an attacker's own API key).
  # managementCIDR is constrained by the values.schema.json IPv4-CIDR pattern, so a
  # malformed value is rejected at schema validation before it can reach a leaf.
  - it: rejects a managementCIDR carrying an injection payload (schema pattern)
    set:
      managementCIDR: '10.244.0.0/16" ; set service https api keys id evil key "pwned'
    asserts:
      - failedTemplate:
          errorPattern: "managementCIDR.*does not match pattern"

  - it: rejects a managementCIDR carrying an embedded newline (schema pattern)
    set:
      managementCIDR: |-
        10.244.0.0/16
        set service https api keys id evil key "pwned"
    asserts:
      - failedTemplate:
          errorPattern: "managementCIDR.*does not match pattern"

  # peer.address is NOT interpolated into the chart config.boot (the controller
  # renders it as a structured op), so the schema leaves it unconstrained — but the
  # template guard still rejects a hostile value at render time (defence in depth,
  # and the direct exercise of the `fail` guard, since managementCIDR is caught by
  # the schema first).
  - it: the template guard rejects a peer.address carrying an injection payload
    set:
      peer:
        address: '203.0.113.10" ; set service https api keys id evil key "pwned'
    asserts:
      - failedTemplate:
          errorPattern: "peer.address .* must be a bare IP address or hostname"

  - it: fail-closed — empty managementCIDR without allowOpenManagement aborts the render
    set:
      managementCIDR: ""
      allowOpenManagement: false
    asserts:
      - failedTemplate:
          errorMessage: "managementCIDR is required (fail-closed); set allowOpenManagement=true to expose the VyOS API unrestricted"

  - it: allowOpenManagement=true with empty managementCIDR renders with no firewall (open)
    set:
      managementCIDR: ""
      allowOpenManagement: true
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: 'listen-address "0.0.0.0"'
      - notMatchRegex:
          path: stringData.userdata
          pattern: 'firewall \{'

  - it: renders the RBAC-isolated api-key Secret with a non-empty token
    documentSelector:
      path: metadata.name
      value: site-router-test-api-key
    asserts:
      - equal:
          path: type
          value: Opaque
      - matchRegex:
          path: stringData.token
          pattern: '^[a-zA-Z0-9]{16,}$'

  # --- T08 guest security-guard seeds (written FIRST; land in Phase B) ------
  # The controller re-stamps the full guard set on its first reconcile, but the
  # cloud-init seed makes the guest fail-closed from first boot, BEFORE the
  # controller can reach it. Two net-new seeds sit alongside the M1 mgmt firewall
  # (all inside the managementCIDR block, so the open-management escape hatch stays
  # "no firewall at all" — asserted by the open-management test above):
  #   - Boundary A (§4): a local-input drop of the management ports for
  #     IPsec-decrypted traffic — a packet decrypted by VyOS and addressed to the
  #     guest's own API does not cross the pod veth where Cilium enforces, so the
  #     guest must drop it. Matching the decrypted property (not an interface)
  #     covers every tunnel interface, including dynamic ones.
  #   - forward default-deny (§3): routed mode advertises specific remotes and
  #     never a default route, so the forward chain denies by default.
  # VyOS 1.5-rolling (validated live): the inbound-IPsec matcher is `match-ipsec-in`
  # and a rule with a destination port must also set a protocol.
  - it: seeds the Boundary A management-API drop for IPsec-decrypted input
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: 'match-ipsec-in'
      - matchRegex:
          path: stringData.userdata
          pattern: 'port "22,443"'
      # rule 1 is the only input rule whose action is "drop" (the accepts are
      # rule 5 / rule 10); the forward chain expresses its deny as default-action.
      - matchRegex:
          path: stringData.userdata
          pattern: 'action "drop"'

  - it: seeds the forward-chain default-deny (tunnel→world)
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: 'match-none-in'
      - matchRegex:
          path: stringData.userdata
          pattern: 'default-action "drop"'

  - it: the open-management path seeds no guest guards either (consistent with no firewall)
    set:
      managementCIDR: ""
      allowOpenManagement: true
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - notMatchRegex:
          path: stringData.userdata
          pattern: 'match-ipsec-in'
      - notMatchRegex:
          path: stringData.userdata
          pattern: 'match-none-in'
      - notMatchRegex:
          path: stringData.userdata
          pattern: 'firewall \{'

  - it: the api-key Secret token and the cloud-init token are the same value (single lookup)
    kubernetesProvider:
      scheme:
        "v1/Secret":
          gvr:
            group: ""
            version: v1
            resource: secrets
          namespaced: true
      objects:
        - kind: Secret
          apiVersion: v1
          metadata:
            name: site-router-test-api-key
            namespace: tenant-test
          # base64("known-token-abc123")
          data:
            token: a25vd24tdG9rZW4tYWJjMTIz
    asserts:
      - equal:
          path: stringData.token
          value: known-token-abc123
        documentSelector:
          path: metadata.name
          value: site-router-test-api-key
      - matchRegex:
          path: stringData.userdata
          pattern: 'key "known-token-abc123"'
        documentSelector:
          path: metadata.name
          value: site-router-test-cloud-init
