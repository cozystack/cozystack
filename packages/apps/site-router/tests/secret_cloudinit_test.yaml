suite: site-router cloud-init + API-key Secrets

# T04/T11/D6 — one template file computes the VyOS HTTPS-API token exactly once
# (lookup <release>-api-key else autogen, for reconcile stability) and renders
# BOTH the api-key Secret (RBAC-isolated from tenant roles; the controller reads
# it) AND the NoCloud cloud-init Secret that seeds first boot. The cloud-init
# userdata is a port of the upstream VyOS-router reference implementation's
# buildCloudInitUserData: hostname, the HTTPS API key, listen-address, and the
# fail-closed management firewall.
#
# LISTEN-ADDRESS / MANAGEMENT-BINDING DESIGN (raised at the T04 gate):
# The pod IP is unknown at Helm render time (kube-ovn assigns it at pod CREATE),
# so the API cannot bind to a literal pod address. Following the reference
# implementation + D6, the API binds broadly (listen-address 0.0.0.0) and the
# MANAGEMENT FIREWALL seed is
# the compensating control: only the controller mgmt-CIDR reaches tcp 22/443,
# everything else (tunnel traffic, world) hits `default-action drop`. We assert
# the firewall binding, not a dynamic pod IP. The stricter "API never on the
# tunnel interface" guard is T08's guest local-input drop.

templates:
  - templates/secret-cloudinit.yaml

release:
  name: site-router-test
  namespace: tenant-test

set:
  _cluster: {}
  managementCIDR: 10.244.0.0/16
  peer:
    address: 203.0.113.10

tests:
  - it: renders the cloud-init Secret with a #cloud-config vyos_config_commands userdata
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: '(?m)^#cloud-config'
      - matchRegex:
          path: stringData.userdata
          pattern: '(?m)^vyos_config_commands:'

  - it: seeds the hostname and the HTTPS API key
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: "set system host-name 'site-router-test'"
      - matchRegex:
          path: stringData.userdata
          pattern: "set service https api keys id site-router-controller key '.+'"

  - it: binds the API broadly (listen-address 0.0.0.0) — firewall is the compensating control
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: "set service https listen-address 0.0.0.0"

  # R2 — a conformant, cloud-init-capable image needs two more base commands or
  # the router is unreachable: eth0 up over DHCP (otherwise no IP/routes) and the
  # HTTPS API REST endpoints started (`service https api keys` alone does NOT
  # start /configure). Both are inert on the currently-referenced image (which
  # ignores vyos_config_commands — the T14 image follow-up) but mandatory on any
  # image that honours the seed. Emitted always (not gated on managementCIDR).
  - it: brings eth0 up over DHCP and starts the HTTPS API REST endpoints
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: "set interfaces ethernet eth0 address dhcp"
      - matchRegex:
          path: stringData.userdata
          pattern: "set service https api rest"

  - it: stamps the fail-closed management firewall (established/related + mgmt-CIDR tcp 22,443 + default drop)
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter rule 5 state established"
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter rule 5 state related"
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter rule 10 source address '10.244.0.0/16'"
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter rule 10 protocol tcp"
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter rule 10 destination port '22,443'"
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter default-action drop"

  - it: does NOT open the API to the world (no 0.0.0.0/0 firewall source)
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - notMatchRegex:
          path: stringData.userdata
          pattern: "source address '0\\.0\\.0\\.0/0'"

  - it: honours a custom managementCIDR in the firewall allow rule
    set:
      managementCIDR: 192.0.2.0/24
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter rule 10 source address '192.0.2.0/24'"

  # S1 command-injection guard. A tenant-settable value with an embedded quote,
  # space or newline could otherwise terminate a `set …` line in the
  # vyos_config_commands list and inject arbitrary VyOS config (e.g. an attacker's
  # own API key). managementCIDR (the value interpolated into the seed) is
  # constrained by the values.schema.json IPv4-CIDR pattern, so a malformed value
  # is rejected at schema validation before it can reach a config line.
  - it: rejects a managementCIDR carrying an injection payload (schema pattern)
    set:
      managementCIDR: "10.244.0.0/16' ; set service https api keys id evil key 'pwned"
    asserts:
      - failedTemplate:
          errorPattern: "managementCIDR.*does not match pattern"

  - it: rejects a managementCIDR carrying an embedded newline (schema pattern)
    set:
      managementCIDR: |-
        10.244.0.0/16
        set service https api keys id evil key 'pwned'
    asserts:
      - failedTemplate:
          errorPattern: "managementCIDR.*does not match pattern"

  # peer.address is NOT interpolated into the chart seed (the controller renders
  # it as a structured op), so the schema leaves it unconstrained — but the
  # template guard still rejects a hostile value at render time (defence in depth,
  # and the direct exercise of the `fail` guard, since managementCIDR is caught by
  # the schema first).
  - it: the template guard rejects a peer.address carrying an injection payload
    set:
      peer:
        address: "203.0.113.10' ; set service https api keys id evil key 'pwned"
    asserts:
      - failedTemplate:
          errorPattern: "peer.address .* must be a bare IP address or hostname"

  - it: fail-closed — empty managementCIDR without allowOpenManagement aborts the render
    set:
      managementCIDR: ""
      allowOpenManagement: false
    asserts:
      - failedTemplate:
          errorMessage: "managementCIDR is required (fail-closed); set allowOpenManagement=true to expose the VyOS API unrestricted"

  - it: allowOpenManagement=true with empty managementCIDR renders with no firewall (open)
    set:
      managementCIDR: ""
      allowOpenManagement: true
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: "set service https listen-address 0.0.0.0"
      - notMatchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter"

  - it: renders the RBAC-isolated api-key Secret with a non-empty token
    documentSelector:
      path: metadata.name
      value: site-router-test-api-key
    asserts:
      - equal:
          path: type
          value: Opaque
      - matchRegex:
          path: stringData.token
          pattern: '^[a-zA-Z0-9]{16,}$'

  # --- T08 guest security-guard seeds (written FIRST; land in Phase B) ------
  # The controller re-stamps the full guard set on its first reconcile, but the
  # cloud-init seed makes the guest fail-closed from first boot, BEFORE the
  # controller can reach it. Two net-new seeds sit alongside the M1 mgmt
  # firewall (all inside the managementCIDR block, so the open-management escape
  # hatch stays "no firewall at all" — asserted by the M1 test above):
  #   - Boundary A (§4): a local-input drop of the management ports for
  #     IPsec-decrypted traffic — a packet decrypted by VyOS and addressed to
  #     the guest's own API does not cross the pod veth where Cilium enforces,
  #     so the guest must drop it. Matching the decrypted property (not an
  #     interface) covers every tunnel interface, including dynamic ones.
  #   - forward default-deny (§3): routed mode advertises specific remotes and
  #     never a default route, so the forward chain denies by default.
  # VyOS 1.5-rolling (validated live): the inbound-IPsec matcher is
  # `match-ipsec-in` and a rule with a destination port must also set a protocol.
  - it: seeds the Boundary A management-API drop for IPsec-decrypted input
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter rule 1 ipsec match-ipsec-in"
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter rule 1 protocol tcp"
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter rule 1 destination port '22,443'"
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter rule 1 action drop"

  - it: seeds the forward-chain default-deny (tunnel→world)
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - matchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 forward filter default-action drop"

  - it: the open-management path seeds no guest guards either (consistent with no firewall)
    set:
      managementCIDR: ""
      allowOpenManagement: true
    documentSelector:
      path: metadata.name
      value: site-router-test-cloud-init
    asserts:
      - notMatchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 forward filter default-action"
      - notMatchRegex:
          path: stringData.userdata
          pattern: "set firewall ipv4 input filter rule 1 ipsec"

  - it: the api-key Secret token and the cloud-init token are the same value (single lookup)
    kubernetesProvider:
      scheme:
        "v1/Secret":
          gvr:
            group: ""
            version: v1
            resource: secrets
          namespaced: true
      objects:
        - kind: Secret
          apiVersion: v1
          metadata:
            name: site-router-test-api-key
            namespace: tenant-test
          # base64("known-token-abc123")
          data:
            token: a25vd24tdG9rZW4tYWJjMTIz
    asserts:
      - equal:
          path: stringData.token
          value: known-token-abc123
        documentSelector:
          path: metadata.name
          value: site-router-test-api-key
      - matchRegex:
          path: stringData.userdata
          pattern: "set service https api keys id site-router-controller key 'known-token-abc123'"
        documentSelector:
          path: metadata.name
          value: site-router-test-cloud-init
