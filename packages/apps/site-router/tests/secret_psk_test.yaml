suite: site-router IPsec PSK Secret

# T04/T11 — the IPsec PSK must match the remote peer, so it is tenant-supplied
# via peer.auth.psk and templated into <release>-psk (data key `psk`). The
# lookup idiom (vpn/templates/tls.yaml) keeps an autogenerated PSK stable across
# reconciles. When peer.auth.existingSecret is set the chart references that
# Secret and does not create its own.

templates:
  - templates/secret-psk.yaml

release:
  name: site-router-test
  namespace: tenant-test

set:
  _cluster: {}

tests:
  - it: templates the supplied PSK into <release>-psk under data key psk
    set:
      peer:
        address: 203.0.113.10
        auth:
          psk: super-secret-preshared-key
    documentSelector:
      path: kind
      value: Secret
    asserts:
      - equal:
          path: metadata.name
          value: site-router-test-psk
      - equal:
          path: type
          value: Opaque
      - equal:
          path: stringData.psk
          value: super-secret-preshared-key

  - it: reuses an existing PSK Secret value across re-render (lookup stability)
    set:
      peer:
        address: 203.0.113.10
        auth: {}
    kubernetesProvider:
      scheme:
        "v1/Secret":
          gvr:
            group: ""
            version: v1
            resource: secrets
          namespaced: true
      objects:
        - kind: Secret
          apiVersion: v1
          metadata:
            name: site-router-test-psk
            namespace: tenant-test
          # base64("reused-psk-value")
          data:
            psk: cmV1c2VkLXBzay12YWx1ZQ==
    documentSelector:
      path: kind
      value: Secret
    asserts:
      - equal:
          path: stringData.psk
          value: reused-psk-value

  - it: autogenerates a non-empty PSK when none is supplied and none exists
    set:
      peer:
        address: 203.0.113.10
        auth: {}
    documentSelector:
      path: kind
      value: Secret
    asserts:
      - matchRegex:
          path: stringData.psk
          pattern: '^[a-zA-Z0-9]{16,}$'

  - it: existingSecret path skips creating the PSK Secret entirely
    set:
      peer:
        address: 203.0.113.10
        auth:
          existingSecret: my-preprovisioned-psk
    asserts:
      - hasDocuments:
          count: 0
