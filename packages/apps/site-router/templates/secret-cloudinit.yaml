{{- /*
  VyOS HTTPS-API token + first-boot cloud-init, rendered in ONE file so the
  token is resolved exactly once and shared. The api-key Secret is RBAC-isolated
  (NOT in the AppDef secrets.include list, NOT in the dashboard Role): only the
  controller reads it (D6). The cloud-init Secret seeds the token into first boot
  so the API is authenticated before it is reachable.

  Fail-closed management binding: an empty managementCIDR requires an explicit
  allowOpenManagement=true, mirroring the controller's --management-cidr flag.
*/ -}}
{{- if and (not .Values.managementCIDR) (not .Values.allowOpenManagement) }}
{{- fail "managementCIDR is required (fail-closed); set allowOpenManagement=true to expose the VyOS API unrestricted" }}
{{- end }}
{{- $token := include "site-router.apiToken" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-api-key
  labels:
    {{- include "site-router.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ $token | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-cloud-init
  labels:
    {{- include "site-router.labels" . | nindent 4 }}
type: Opaque
stringData:
  userdata: |
    {{- include "site-router.cloudInitUserData" (dict "ctx" . "token" $token) | nindent 4 }}
