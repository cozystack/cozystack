{{- /*
  Dashboard RBAC (copied from vpn). Grants tenant `use`-level subjects read
  access to the tunnel LoadBalancer Service (external address) and the PSK Secret
  (tenant-supplied / autogenerated — the far side needs it). The api-key Secret
  is deliberately NOT listed here (nor in the AppDef secrets.include): it stays
  RBAC-isolated from tenant roles and is read only by the controller (D6).
*/ -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-dashboard-resources
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ .Release.Name }}-psk
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - services
  resourceNames:
  - {{ .Release.Name }}-tunnel
  verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Name }}-dashboard-resources
subjects:
{{ include "cozy-lib.rbac.subjectsForTenantAndAccessLevel" (list "use" .Release.Namespace) }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-dashboard-resources
  apiGroup: rbac.authorization.k8s.io
