{{- /*
  IPsec pre-shared key Secret. The PSK must match the remote peer, so it is
  tenant-supplied via peer.auth.psk and templated into <release>-psk (data key
  `psk`). The lookup idiom (vpn/templates/tls.yaml) keeps an autogenerated PSK
  stable across reconciles. When peer.auth.existingSecret is set the tenant owns
  the Secret and the chart does not create its own.
*/ -}}
{{- if not .Values.peer.auth.existingSecret }}
{{- $psk := .Values.peer.auth.psk | default "" }}
{{- if not $psk }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-psk" .Release.Name) }}
  {{- if and $existing (hasKey $existing "data") (hasKey $existing.data "psk") }}
    {{- $psk = index $existing.data "psk" | b64dec }}
  {{- else }}
    {{- $psk = randAlphaNum 32 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-psk
  labels:
    {{- include "site-router.labels" . | nindent 4 }}
type: Opaque
stringData:
  psk: {{ $psk | quote }}
{{- end }}
