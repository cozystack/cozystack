##
## @section Tunnel configuration
##

## @enum {string} TunnelType - Site-to-site tunnel protocol. Phase 1 implements only `ipsec`; the enum is kept single-value for forward-compatibility.
## @value ipsec

## @typedef {struct} Tunnel - Site-to-site tunnel configuration.
## @field {TunnelType} type - Tunnel protocol used to connect to the remote peer.

## @param {Tunnel} tunnel - Site-to-site tunnel configuration.
tunnel:
  type: ipsec

## @typedef {struct} PeerAuth - Authentication material for the tunnel (IPsec pre-shared key).
## @field {string} [psk] - IPsec pre-shared key. Autogenerated and stored in a Secret when omitted. Mutually exclusive with `existingSecret`.
## @field {string} [existingSecret] - Name of an existing Secret in the tenant namespace holding the pre-shared key (key `psk`). Takes precedence over `psk` when set.

## @typedef {struct} Peer - Remote peer the tunnel connects to. A single peer per instance (one tunnel); reach a second site with a second instance.
## @field {string} address - Public address (IP or hostname) of the remote peer. Responder model: the remote peer dials in.
## @field {PeerAuth} [auth] - IPsec authentication material for the tunnel.

## @param {Peer} peer - Remote peer this router builds a tunnel to.
peer:
  address: ""
  auth: {}

##
## @section Routing configuration
##

## @param {[]string} remoteCIDRs - Remote networks reachable over the tunnel. Must be disjoint from the cluster pod/service/join networks (validated by the controller).
remoteCIDRs: []

## @typedef {struct} StaticRoute - Static route programmed on the router.
## @field {string} destination - Destination network in CIDR notation.
## @field {string} nextHop - Next-hop IP address for the destination.

## @param {[]StaticRoute} staticRoutes - Optional extra static routes programmed on the router.
staticRoutes: []

## @typedef {struct} BGPNeighbor - BGP neighbor.
## @field {string} address - Neighbor IP address.
## @field {int} remoteASN - Remote autonomous system number of the neighbor.

## @typedef {struct} BGP - Optional BGP peering over the tunnel.
## @field {bool} enabled - Enable BGP peering.
## @field {int} [localASN] - Local autonomous system number.
## @field {[]BGPNeighbor} [neighbors] - BGP neighbors to peer with.

## @param {BGP} bgp - Optional BGP peering over the tunnel. Disabled by default.
bgp:
  enabled: false

##
## @section Common parameters
##

## @typedef {struct} Resources - Explicit CPU and memory allocated to the router VM.
## @field {quantity} cpu - CPU cores allocated to the router VM.
## @field {quantity} memory - Memory (RAM) allocated to the router VM.

## @param {Resources} resources - Explicit CPU and memory sizing for the router VM.
resources:
  cpu: "2"
  memory: 2Gi
