{{/*
  Legacy. Restic credential Secret consumed by the chart-emitted CronJob in
  backup-cronjob.yaml. Gated identically (including the `useSystemBucket`
  exclusion) so it is only materialised alongside the legacy CronJob. The
  Altinity backup strategy uses the chart-emitted `<release>-backup-s3`
  Secret instead; see backup-strategy-secret.yaml.
*/}}
{{- if and .Values.backup.enabled .Values.backup.schedule (not .Values.backup.useSystemBucket) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backup
stringData:
  s3AccessKey: {{ required "s3AccessKey is not specified!" .Values.backup.s3AccessKey }}
  s3SecretKey: {{ required "s3SecretKey is not specified!" .Values.backup.s3SecretKey }}
  resticPassword: {{ required "resticPassword is not specified!" .Values.backup.resticPassword }}
{{- end }}
