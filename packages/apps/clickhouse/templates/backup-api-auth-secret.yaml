{{/*
  Auth credentials for the in-Pod `clickhouse-backup` HTTP API on
  port 7171. The sidecar reads API_USERNAME / API_PASSWORD from this
  Secret and rejects unauthenticated requests; the backup-strategy Pod
  passes the same credentials on its curl invocation.

  Without this, any Pod with network reach to `chi-...-clickhouse-...:7171`
  could trigger restore_remote (overwrite tables from S3) or DELETE
  /backup/<name>/remote (wipe archives) on the tenant's instance. The
  Pod-IP-only scheme is no auth in a multi-tenant cluster.

  Persistence: use `lookup` to preserve the existing password across
  reconciles - we don't want to rotate the API password every time the
  HelmRelease re-renders, because a brief skew between the sidecar and
  the strategy Pod's view would surface as 401s.
*/}}
{{- if .Values.backup.enabled }}
{{- $existingAuth := lookup "v1" "Secret" .Release.Namespace (printf "%s-backup-api-auth" .Release.Name) }}
{{- $apiPassword := "" }}
{{- with (index $existingAuth "data") }}
  {{- if .password }}
    {{- $apiPassword = b64dec .password }}
  {{- end }}
{{- end }}
{{- if not $apiPassword }}
  {{- $apiPassword = randAlphaNum 24 }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backup-api-auth
type: Opaque
stringData:
  username: "backup"
  password: {{ $apiPassword | quote }}
{{- end }}
