{{/*
  Backup S3 credentials Secret consumed by the chart-emitted
  `clickhouse-backup` sidecar rendered into every ClickHouseInstallation
  Pod (see templates/clickhouse.yaml). The sidecar exposes Altinity's
  HTTP API on port 7171; the strategy.backups.cozystack.io/Altinity
  Pod is a curl/jq client that talks to that API and does not bind to
  this Secret itself.

  Naming: deterministic `<release>-backup-s3` so a single cluster-wide
  BackupClass can target every tenant's ClickHouse without per-tenant
  parameter overrides. The Secret carries bucket coordinates
  (bucketName, endpoint, region) alongside the access keys; the
  sidecar consumes them via secretKeyRef on the ClickHouseInstallation
  PodTemplate.

  Gating: rendered only when `backup.enabled=true` AND
  `backup.useSystemBucket=false` AND no pre-existing Secret reference is
  provided via `backup.s3CredentialsSecret.name`. The three short-circuit
  paths in priority order:
    1. useSystemBucket: the sidecar reads from the platform-projected
       `cozy-backups-creds` Secret instead — this template is skipped.
    2. s3CredentialsSecret.name set: tenants point at their own pre-
       existing Secret to keep credentials out of values.yaml.
    3. Default (legacy): this template materialises
       `<release>-backup-s3` from s3AccessKey / s3SecretKey / ... .
*/}}
{{- if and .Values.backup.enabled (not .Values.backup.useSystemBucket) (eq .Values.backup.s3CredentialsSecret.name "") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backup-s3
type: Opaque
stringData:
  bucketName: {{ required "backup.s3Bucket is not specified!" .Values.backup.s3Bucket | quote }}
  endpoint: {{ .Values.backup.endpoint | quote }}
  region: {{ required "backup.s3Region is not specified!" .Values.backup.s3Region | quote }}
  accessKey: {{ required "backup.s3AccessKey is not specified!" .Values.backup.s3AccessKey | quote }}
  secretKey: {{ required "backup.s3SecretKey is not specified!" .Values.backup.s3SecretKey | quote }}
{{- end }}
