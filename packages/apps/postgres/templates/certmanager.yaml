{{- $tlsEnabled := (include "postgres.tls.enabled" .) | eq "true" -}}
{{- if $tlsEnabled }}
{{- $clusterDomain := (index .Values._cluster "cluster-domain") | default "cozy.local" }}
---
# Self-signed bootstrap Issuer — used only to sign the CA Certificate below.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-selfsigned
spec:
  selfSigned: {}
---
# CA Certificate. rotationPolicy: Never keeps the CA stable so existing
# client trust bundles remain valid across cert-manager renewals.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-ca
spec:
  secretName: {{ .Release.Name }}-ca
  duration: 87600h  # 10 years
  isCA: true
  commonName: {{ .Release.Name }}-ca
  usages:
    - signing
    - cert sign
  privateKey:
    rotationPolicy: Never
    algorithm: RSA
    size: 4096
  issuerRef:
    name: {{ .Release.Name }}-selfsigned
    kind: Issuer
    group: cert-manager.io
---
# CA Issuer — used to sign the leaf server certificate.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-ca
spec:
  ca:
    secretName: {{ .Release.Name }}-ca
---
# Leaf server TLS Certificate passed to CNPG via spec.certificates.serverTLSSecret.
# The SAN list covers all three ClusterIP services CNPG creates plus, when
# external is true, the external DNS name for the LoadBalancer service.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-tls
spec:
  secretName: {{ .Release.Name }}-tls
  duration: 8760h    # 1 year
  renewBefore: 720h  # renew 30 days before expiry
  isCA: false
  usages:
    - server auth
    - signing
    - key encipherment
  dnsNames:
    {{- $ns := .Release.Namespace }}
    {{- $name := .Release.Name }}
    {{- range $svc := list (printf "%s-rw" $name) (printf "%s-ro" $name) (printf "%s-r" $name) }}
    - {{ $svc }}
    - {{ $svc }}.{{ $ns }}.svc
    - {{ $svc }}.{{ $ns }}.svc.{{ $clusterDomain }}
    {{- end }}
    {{- if .Values.external }}
    - {{ printf "%s.%s" .Release.Name .Values._namespace.host }}
    {{- end }}
  privateKey:
    rotationPolicy: Always
    algorithm: RSA
    size: 4096
  issuerRef:
    name: {{ .Release.Name }}-ca
    kind: Issuer
    group: cert-manager.io
{{- end }}
