{{/*
  Materialise <release>-s3-creds only when the operator did NOT supply an
  external Secret via backup.s3CredentialsSecret.name. The CNPG backup
  driver sets backup.s3CredentialsSecret.name on restore so credentials
  read from a tenant Secret never round-trip through the Postgres CR spec.
*/}}
{{- $credCfg := default (dict) .Values.backup.s3CredentialsSecret }}
{{- if and (or .Values.backup.enabled .Values.bootstrap.enabled) (not $credCfg.name) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-s3-creds
stringData:
  AWS_ACCESS_KEY_ID: {{ required "s3AccessKey is not specified!" .Values.backup.s3AccessKey | quote }}
  AWS_SECRET_ACCESS_KEY: {{ required "s3SecretKey is not specified!" .Values.backup.s3SecretKey | quote }}
{{- end }}
