{{/*
  Materialise <release>-s3-creds only when the operator did NOT supply an
  external Secret via backup.s3CredentialsSecret.name AND the tenant has
  not opted in to the platform-managed flow via backup.useSystemBucket.
  When useSystemBucket=true, cozy-backups-creds is projected into the
  namespace by the backupstrategy-controller and referenced from the
  barman-cloud ObjectStore's spec.configuration.s3Credentials that the
  CNPG driver SSA-applies.

  Empty access/secret values short-circuit the chart-emitted Secret too:
  the previous behaviour materialised the literal "<your-access-key>"
  placeholder into the tenant namespace whenever backup.enabled=true was
  set without real coordinates, which spammed the barman-cloud plugin's
  WAL archiving with junk credentials. Tenants that need the legacy flow
  must set both values explicitly; everyone else gets the platform flow.
*/}}
{{- $credCfg := default (dict) .Values.backup.s3CredentialsSecret }}
{{- $hasInlineCreds := and (ne (default "" .Values.backup.s3AccessKey) "") (ne (default "" .Values.backup.s3SecretKey) "") }}
{{- if and (or .Values.backup.enabled .Values.bootstrap.enabled) (not $credCfg.name) (not .Values.backup.useSystemBucket) $hasInlineCreds }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-s3-creds
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.backup.s3AccessKey | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.backup.s3SecretKey | quote }}
{{- end }}
