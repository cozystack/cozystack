##
## @section TLS configuration
##

## @typedef {struct} TLS - TLS configuration for PostgreSQL server connections.
## @field {*bool} enabled - Tri-state switch controlling whether the chart injects the external hostname into the operator-managed CNPG cert via spec.certificates.serverAltDNSNames. When omitted, the chart injects the SAN if `external: true` and skips it otherwise. Set explicitly to `true` to inject regardless of `external` (no-op when `external: false` since there is no external hostname to add). Set to `false` to skip injection. Note that CNPG keeps its built-in TLS on the wire regardless of this flag — this toggle only controls the chart-side SAN injection; to disable PostgreSQL TLS entirely set `postgresql.parameters.ssl = "off"` at the CNPG layer.

## @param {TLS} tls - TLS configuration for server connections.
tls: {}

## @section Application-specific parameters
##

## @typedef {struct} PostgreSQL - PostgreSQL server configuration.
## @field {map[string]intOrString} [parameters] - PostgreSQL server parameters. Values may be strings or integers; integers are coerced to strings by the template (e.g. both `max_connections: 100` and `max_connections: "100"` are accepted). BLOCKED (enable arbitrary code execution): archive_command, restore_command, ssl_passphrase_command, archive_cleanup_command, recovery_end_command, dynamic_library_path, local_preload_libraries, session_preload_libraries, shared_preload_libraries. Do NOT override CloudNativePG-managed parameters: archive_mode, primary_conninfo, wal_level, max_replication_slots.

## @param {PostgreSQL} postgresql - PostgreSQL server configuration.
postgresql:
  parameters:
    max_connections: "100"
## Additional parameters examples:
##   shared_buffers: "1GB"
##   effective_cache_size: "4GB"
##   bgwriter_delay: "200ms"
##   commit_delay: "100"
##   commit_siblings: "5"
##   work_mem: "256MB"
##
## SECURITY: The following parameters are BLOCKED (enable arbitrary code execution):
##   archive_command, restore_command, ssl_passphrase_command, archive_cleanup_command, recovery_end_command (shell commands),
##   dynamic_library_path, local_preload_libraries, session_preload_libraries,
##   shared_preload_libraries (arbitrary .so loading)
##
## IMPORTANT: Do NOT override CloudNativePG-managed parameters:
##   archive_mode, primary_conninfo, wal_level, max_replication_slots
##
## NOTE: Some parameters require pod restart (not just reload):
##   shared_buffers, max_connections, max_prepared_transactions,
##   wal_buffers, max_wal_senders

