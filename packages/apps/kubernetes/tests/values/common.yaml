_cluster: {}
_namespace:
  etcd: cozy-etcd
  ingress: nginx
  host: example.com
version: "v1.32"
controlPlane:
  replicas: 2
  apiServer:
    resources: {}
    resourcesPreset: "large"
  controllerManager:
    resources: {}
    resourcesPreset: "micro"
  scheduler:
    resources: {}
    resourcesPreset: "micro"
  konnectivity:
    server:
      resources: {}
      resourcesPreset: "micro"
# Worker pools are managed via KubernetesNodes resources since the Phase 2 split;
# the kubernetes chart renders the control plane only.
