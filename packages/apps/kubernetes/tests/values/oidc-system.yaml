_cluster:
  oidc-enabled: "true"
  root-host: example.org
_namespace:
  etcd: cozy-etcd
  ingress: nginx
  host: example.org
version: "v1.35"
controlPlane:
  replicas: 1
  apiServer:
    resources: {}
    resourcesPreset: "large"
  controllerManager:
    resources: {}
    resourcesPreset: "micro"
  scheduler:
    resources: {}
    resourcesPreset: "micro"
  konnectivity:
    server:
      resources: {}
      resourcesPreset: "micro"
nodeGroups:
  md0:
    minReplicas: 0
    maxReplicas: 10
    instanceType: ""
    diskSize: 20Gi
    roles:
      - worker
    resources:
      cpu: 2
      memory: 4Gi
    gpus: []
oidc:
  mode: "System"
  customConfig:
    config: ""
    secretRef:
      name: ""
  users:
    - email: alice@example.org
      role: admin
    - email: bob@example.org
      role: view
