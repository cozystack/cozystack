suite: kubelet reservation validation tests

# These tests cover the failure-path guards in cluster.yaml's per-nodeGroup
# validation block (memory/CPU format checks, total-reserved vs effective
# invariants, mixed-unit eviction rejection, etc.). The TalosConfigTemplate
# is no longer rendered by cluster.yaml — the main-phase Job in
# templates/talos/talos-reconcile-job.yaml produces it at runtime — so the
# test file only asserts on the kubeadm-era validation paths that survived
# the Talos rollover. The kubelet-reservation math used to apply
# machine.kubelet.extraConfig is exercised separately by helm-unittest on
# the reconcile Job template (see tests/gpu_node_labels_test.yaml for the
# matchRegex pattern against the Job's command literal).

templates:
  - templates/cluster.yaml

tests:
  - it: rejects absolute eviction thresholds where hard >= soft
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "1Gi"
            evictionSoftMemory: "200Mi"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (1Gi) must be strictly less than evictionSoftMemory (200Mi)"

  ############################################
  # Auto-computation from resources.memory   #
  ############################################

  - it: clamps auto-computed reservation to 256Mi floor (512Mi memory, triggers validation error)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources:
            memory: "512Mi"
    asserts:
      # 512Mi, 5% = 25Mi, but floor is 256Mi -> 256Mi+256Mi+7%eviction(35Mi) = 547Mi > 512Mi -> fails validation
      - failedTemplate:
          errorMessage: "nodeGroup md0: total reserved memory (systemReservedMemory=256Mi + kubeReservedMemory=256Mi + evictionHardMemory=7%) must be less than effective node memory (512Mi)"

  ##################################
  # Clamp logic: 1024Mi ceiling    #
  ##################################

  - it: fails when evictionHardMemory percentage exceeds evictionSoftMemory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "15%"
            evictionSoftMemory: "10%"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (15%) must be strictly less than evictionSoftMemory (10%)"

  - it: fails when evictionHardMemory percentage equals evictionSoftMemory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "10%"
            evictionSoftMemory: "10%"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (10%) must be strictly less than evictionSoftMemory (10%)"

  - it: fails when default evictionHardMemory is overridden to exceed default evictionSoftMemory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "12%"
            # soft defaults to 10%, so 12% >= 10% should fail
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (12%) must be strictly less than evictionSoftMemory (10%)"

  ##############################################
  # Static args always present                 #
  ##############################################

  - it: rejects mixed eviction types (hard absolute, soft percentage)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "1Gi"
            evictionSoftMemory: "10%"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (1Gi) and evictionSoftMemory (10%) must use the same unit type (both percentage or both absolute)"

  - it: rejects mixed eviction types reversed (hard percentage, soft absolute)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "10%"
            evictionSoftMemory: "1Gi"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (10%) and evictionSoftMemory (1Gi) must use the same unit type (both percentage or both absolute)"

  ################################################
  # Reservation field format validation          #
  ################################################

  - it: rejects invalid CPU format for kubeReservedCpu
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            kubeReservedCpu: "banana"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: invalid kubeReservedCpu value \"banana\" — must be a valid Kubernetes CPU quantity (integer millicores like 100m, or decimal cores like 0.5, 1)"

  - it: rejects invalid memory format for systemReservedMemory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            systemReservedMemory: "abc"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: invalid systemReservedMemory value \"abc\" — must be a valid Kubernetes memory quantity (e.g. 128Mi, 1Gi, 1e9, 500e6)"

  ################################################
  # Multi-nodeGroup isolation test               #
  ################################################

  - it: rejects invalid format for absolute evictionHardMemory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "banana"
            evictionSoftMemory: "500Mi"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: invalid evictionHardMemory value \"banana\" — must be a percentage (e.g. 7%) or a valid Kubernetes memory quantity (e.g. 500Mi, 1Gi, 1e9)"

  - it: rejects invalid format for absolute evictionSoftMemory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "200Mi"
            evictionSoftMemory: "not-a-quantity"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: invalid evictionSoftMemory value \"not-a-quantity\" — must be a percentage (e.g. 10%) or a valid Kubernetes memory quantity (e.g. 500Mi, 1Gi, 1e9)"

  - it: rejects non-numeric evictionHardMemory percentage
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "abc%"
            evictionSoftMemory: "10%"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory percentage value \"abc\" is not a valid number"

  - it: rejects evictionHardMemory percentage over 100
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "150%"
            evictionSoftMemory: "200%"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory percentage must be greater than 0 and at most 100, got 150%"

  - it: rejects evictionSoftMemory percentage over 100
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "5%"
            evictionSoftMemory: "150%"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionSoftMemory percentage must be greater than 0 and at most 100, got 150%"

  - it: rejects evictionHardMemory percentage of zero
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "0%"
            evictionSoftMemory: "10%"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory percentage must be greater than 0 and at most 100, got 0%"

  - it: rejects negative evictionHardMemory percentage
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "-5%"
            evictionSoftMemory: "10%"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory percentage value \"-5\" is not a valid number"

  ####################################################
  # Reserved memory exceeds node memory validation   #
  ####################################################

  - it: rejects reserved memory exceeding effective node memory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources:
            memory: "1Gi"
          kubelet:
            systemReservedMemory: "512Mi"
            kubeReservedMemory: "600Mi"
    asserts:
      # 1Gi = 1024Mi, 512+600+71(7% eviction) = 1183 > 1024
      - failedTemplate:
          errorMessage: "nodeGroup md0: total reserved memory (systemReservedMemory=512Mi + kubeReservedMemory=600Mi + evictionHardMemory=7%) must be less than effective node memory (1Gi)"

  - it: rejects reserved memory equal to effective node memory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources:
            memory: "1Gi"
          kubelet:
            systemReservedMemory: "512Mi"
            kubeReservedMemory: "512Mi"
    asserts:
      # 1Gi = 1024Mi, 512+512+71(7% eviction) = 1095 > 1024
      - failedTemplate:
          errorMessage: "nodeGroup md0: total reserved memory (systemReservedMemory=512Mi + kubeReservedMemory=512Mi + evictionHardMemory=7%) must be less than effective node memory (1Gi)"

  - it: rejects kubelet overrides when no effective memory is available
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            systemReservedMemory: "1Gi"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: kubelet memory reservations require effective memory to validate — set resources.memory or instanceType"

  #############################################################
  # Eviction thresholds interaction with explicit reservations
  #############################################################

  - it: fails when instanceType is specified but not found in cluster
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: "u1.medium"
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: specified instanceType \"u1.medium\" not found in cluster"

  ####################################################
  # CPU auto-computation from resources.cpu          #
  ####################################################

  - it: rejects reserved CPU exceeding effective node CPU
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources:
            memory: "8Gi"
            cpu: 2
          kubelet:
            systemReservedCpu: "1200m"
            kubeReservedCpu: "1200m"
    asserts:
      # 2 cores = 2000m, 1200+1200 = 2400 > 2000 -> fails
      - failedTemplate:
          errorMessage: "nodeGroup md0: total reserved CPU (systemReservedCpu=1200m + kubeReservedCpu=1200m) must be less than effective node CPU (2 cores)"

  ################################################################
  # CPU override guard: CPU overrides without effective CPU      #
  ################################################################

  - it: rejects kubelet CPU overrides when no effective CPU is available
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            systemReservedCpu: "200m"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: cannot validate kubelet CPU reservations without effective CPU — set resources.cpu or a valid instanceType"

  ########################################################
  # Default CPU: no resources/instanceType -> 50m        #
  ########################################################

