suite: Ouroboros HelmRelease tests
templates:
  - templates/helmreleases/ouroboros.yaml
values:
  - values-ci.yaml
tests:
  - it: should not render when ouroboros is disabled
    set:
      addons:
        ouroboros:
          enabled: false
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HelmRelease when ouroboros and ingressNginx are enabled
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - hasDocuments:
          count: 1

  - it: pins ouroboros.controller.clusterDomain to cluster.local — Kamaji-managed tenant CoreDNS serves cluster.local (per TenantControlPlane.networkProfile), but cozystack tenant kubelet injects the host platform domain (cozy.local) into pod resolv.conf, which makes the chart's auto-detect path return the wrong value and the proxy /readyz NXDOMAIN forever
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.ouroboros.controller.clusterDomain
          value: cluster.local
      - isKind:
          of: HelmRelease

  - it: lets a tenant-supplied valuesOverride opt into controller.logLevel=debug (escape hatch — operators chasing an in-tenant ouroboros issue can flip to debug without forking the chart; default stays at upstream info)
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride:
            ouroboros:
              controller:
                logLevel: debug
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.ouroboros.controller.logLevel
          value: debug

  - it: lets a tenant-supplied valuesOverride set controller.clusterDomain explicitly (escape hatch for non-default tenant cluster-domain)
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride:
            ouroboros:
              controller:
                clusterDomain: tenant-custom.local
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.ouroboros.controller.clusterDomain
          value: tenant-custom.local

  - it: should fail render when ouroboros is enabled but ingressNginx is not
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: false
          hosts: []
          valuesOverride: {}
    asserts:
      - failedTemplate:
          errorMessage: "addons.ouroboros.enabled requires addons.ingressNginx.enabled — ouroboros is a hairpin-NAT fix for tenant ingress-nginx and has nothing to fix against without it."

  - it: should have correct metadata labels
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - equal:
          path: metadata.labels["cozystack.io/repository"]
          value: system
      - equal:
          path: metadata.labels["sharding.fluxcd.io/key"]
          value: tenants

  - it: should target cozy-ouroboros namespace
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.targetNamespace
          value: cozy-ouroboros
      - equal:
          path: spec.storageNamespace
          value: cozy-ouroboros

  - it: should reference the kubernetes-application ExternalArtifact
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.chartRef.kind
          value: ExternalArtifact
      - equal:
          path: spec.chartRef.name
          value: cozystack-kubernetes-application-kubevirt-kubernetes-ouroboros
      - equal:
          path: spec.chartRef.namespace
          value: cozy-system

  - it: should depend on cilium, coredns and ingress-nginx
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - contains:
          path: spec.dependsOn
          content:
            name: RELEASE-NAME-cilium
            namespace: NAMESPACE
      - contains:
          path: spec.dependsOn
          content:
            name: RELEASE-NAME-coredns
            namespace: NAMESPACE
      - contains:
          path: spec.dependsOn
          content:
            name: RELEASE-NAME-ingress-nginx
            namespace: NAMESPACE

  - it: should default to coredns-import mode for tenants
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.ouroboros.controller.mode
          value: coredns-import

  - it: should let valuesOverride win over the default for controller.mode
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride:
            ouroboros:
              controller:
                mode: coredns
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.ouroboros.controller.mode
          value: coredns

  - it: should fail render when valuesOverride enables gatewayApi without addons.gatewayAPI
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride:
            ouroboros:
              controller:
                gatewayApi:
                  enabled: true
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "addons.ouroboros.valuesOverride.ouroboros.controller.gatewayApi.enabled=true requires addons.gatewayAPI.enabled=true on the same tenant — Gateway-API CRDs would otherwise be missing and the controller would CrashLoopBackOff on WaitForCacheSync. Either enable addons.gatewayAPI for the tenant, or drop the override and let the wrapper mirror the tenant value."

  - it: should fail render when valuesOverride enables gatewayApi as string "true" without addons.gatewayAPI (Helm --set string-truthy form)
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride:
            ouroboros:
              controller:
                gatewayApi:
                  enabled: "true"
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: false
    asserts:
      - failedTemplate:
          errorPattern: "valuesOverride.*gatewayApi\\.enabled=true requires addons\\.gatewayAPI\\.enabled=true"

  - it: should fail render when valuesOverride enables gatewayApi as numeric 1 without addons.gatewayAPI (YAML truthy form)
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride:
            ouroboros:
              controller:
                gatewayApi:
                  enabled: 1
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: false
    asserts:
      - failedTemplate:
          errorPattern: "valuesOverride.*gatewayApi\\.enabled=true requires addons\\.gatewayAPI\\.enabled=true"

  - it: should fail render when valuesOverride enables gatewayApi as YAML "on" without addons.gatewayAPI (--set string truthy form)
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride:
            ouroboros:
              controller:
                gatewayApi:
                  enabled: "on"
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: false
    asserts:
      - failedTemplate:
          errorPattern: "valuesOverride.*gatewayApi\\.enabled=true requires addons\\.gatewayAPI\\.enabled=true"

  - it: should fail render when valuesOverride enables gatewayApi as YAML "True" without addons.gatewayAPI (case-insensitive truthy form)
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride:
            ouroboros:
              controller:
                gatewayApi:
                  enabled: "True"
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: false
    asserts:
      - failedTemplate:
          errorPattern: "valuesOverride.*gatewayApi\\.enabled=true requires addons\\.gatewayAPI\\.enabled=true"

  - it: should fail render when valuesOverride enables gatewayApi as YAML "TRUE" without addons.gatewayAPI (uppercase truthy form)
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride:
            ouroboros:
              controller:
                gatewayApi:
                  enabled: "TRUE"
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: false
    asserts:
      - failedTemplate:
          errorPattern: "valuesOverride.*gatewayApi\\.enabled=true requires addons\\.gatewayAPI\\.enabled=true"

  - it: should let valuesOverride enable gatewayApi when addons.gatewayAPI is also true
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride:
            ouroboros:
              controller:
                gatewayApi:
                  enabled: true
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: true
    asserts:
      - equal:
          path: spec.values.ouroboros.controller.gatewayApi.enabled
          value: true

  - it: should NOT enable --gateway-api when tenant addons.gatewayAPI.enabled is false (default)
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: false
    asserts:
      - equal:
          path: spec.values.ouroboros.controller.gatewayApi.enabled
          value: false

  - it: should mirror tenant addons.gatewayAPI.enabled into ouroboros gatewayApi
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: true
    asserts:
      - equal:
          path: spec.values.ouroboros.controller.gatewayApi.enabled
          value: true

  # Operator turns OFF tenant Gateway-API while ouroboros stays
  # enabled. The wrapper must re-render the HelmRelease with
  # controller.gatewayApi.enabled flipped to false (so the controller
  # Deployment loses --gateway-api on the next reconcile and the
  # cluster role rules for gateways/httproutes are dropped). The
  # gateway-api-crds dependency must also disappear — keeping it
  # would leave a stale dependsOn entry on a CRDs HelmRelease the
  # operator just stopped wanting around.
  - it: should re-render with gatewayApi=false and drop the gateway-api-crds dependsOn when tenant addons.gatewayAPI.enabled flips back to false (with ouroboros still enabled)
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: false
    asserts:
      - equal:
          path: spec.values.ouroboros.controller.gatewayApi.enabled
          value: false
      - notContains:
          path: spec.dependsOn
          content:
            name: RELEASE-NAME-gateway-api-crds
            namespace: NAMESPACE

  - it: should add gateway-api-crds dependency when addons.gatewayAPI.enabled is true
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: true
    asserts:
      - contains:
          path: spec.dependsOn
          content:
            name: RELEASE-NAME-gateway-api-crds
            namespace: NAMESPACE

  - it: should NOT add gateway-api-crds dependency when addons.gatewayAPI.enabled is false
    set:
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
        gatewayAPI:
          enabled: false
    asserts:
      - notContains:
          path: spec.dependsOn
          content:
            name: RELEASE-NAME-gateway-api-crds
            namespace: NAMESPACE

  - it: should not render when _namespace.etcd is empty (addon HelmReleases gate on the tenant root namespace presence)
    set:
      _namespace:
        etcd: ""
        ingress: ""
        seaweedfs: ""
        host: ""
        monitoring: ""
      addons:
        ouroboros:
          enabled: true
          valuesOverride: {}
        ingressNginx:
          enabled: true
          hosts: []
          valuesOverride: {}
    asserts:
      - hasDocuments:
          count: 0

