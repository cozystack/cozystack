suite: cluster.yaml template tests

templates:
  - templates/cluster.yaml

values:
  - values/common.yaml

# With one nodeGroup (md0) the cluster.yaml template renders in this
# order. The TalosConfigTemplate is no longer rendered here — it is
# produced at runtime by the post-install hook in
# templates/talos/talos-reconcile-job.yaml, which writes the TCT YAML
# from a string literal in the Job's command.
#   0: Cluster
#   1: KamajiControlPlane
#   2: WorkloadMonitor (control plane)
#   3: KubevirtCluster
#   4: KubevirtMachineTemplate-md0
#   5: MachineDeployment-md0
#   ...
# The named template "kubevirtmachinetemplate" is inlined inside document 4
# under spec.template.spec.
#
# Note: instanceType must be set to "" to bypass the lookup() call that
# validates VirtualMachineClusterInstancetype existence against a live cluster.

tests:
  ###############################################
  # dataVolumeTemplates — default disk size     #
  ###############################################

  - it: falls back to 20Gi when diskSize is not set
    release:
      name: test-k8s
      namespace: tenant-test
    asserts:
      - isKind:
          of: KubevirtMachineTemplate
        documentIndex: 4
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].spec.storage.resources.requests.storage
          value: "20Gi"
        documentIndex: 4

  - it: renders dataVolumeTemplate sourced from Talos factory image
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeGroups.md0.diskSize: 20Gi
    asserts:
      - isKind:
          of: KubevirtMachineTemplate
        documentIndex: 4
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].metadata.name
          value: disk-system
        documentIndex: 4
      - matchRegex:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].spec.source.http.url
          pattern: "^https://factory\\.talos\\.dev/image/[a-f0-9]+/v[0-9.]+/openstack-amd64\\.raw\\.xz$"
        documentIndex: 4
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].spec.storage.resources.requests.storage
          value: 20Gi
        documentIndex: 4

  ###############################################
  # dataVolumeTemplates — custom disk size      #
  ###############################################

  - it: renders dataVolumeTemplate with custom 50Gi storage
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeGroups.md0.diskSize: 50Gi
    asserts:
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].spec.storage.resources.requests.storage
          value: 50Gi
        documentIndex: 4

  ###############################################
  # storageClassName omitted when empty         #
  ###############################################

  - it: omits storageClassName when storageClass is empty
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeGroups.md0.storageClass: ""
    asserts:
      - notExists:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].spec.storage.storageClassName
        documentIndex: 4

  ###############################################
  # storageClassName present when set           #
  ###############################################

  - it: sets storageClassName when storageClass is provided
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeGroups.md0.storageClass: "my-storage"
    asserts:
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].spec.storage.storageClassName
          value: my-storage
        documentIndex: 4

  ###############################################
  # ephemeral-storage is always 2Gi             #
  ###############################################

  - it: hardcodes ephemeral-storage to 2Gi with default diskSize
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeGroups.md0.diskSize: 20Gi
    asserts:
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.template.spec.domain.resources.limits.ephemeral-storage
          value: 2Gi
        documentIndex: 4

  - it: hardcodes ephemeral-storage to 2Gi even with large diskSize
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeGroups.md0.diskSize: 100Gi
    asserts:
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.template.spec.domain.resources.limits.ephemeral-storage
          value: 2Gi
        documentIndex: 4

  ###############################################
  # disk-system name consistency                #
  ###############################################

  - it: uses disk-system name consistently across dataVolumeTemplates, volumes, and disks
    release:
      name: test-k8s
      namespace: tenant-test
    asserts:
      # dataVolumeTemplates name
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].metadata.name
          value: disk-system
        documentIndex: 4
      # disks name
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.template.spec.domain.devices.disks[0].name
          value: system
        documentIndex: 4
      # volumes name
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.template.spec.volumes[0].name
          value: system
        documentIndex: 4
      # volumes dataVolume reference
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.template.spec.volumes[0].dataVolume.name
          value: disk-system
        documentIndex: 4

  ###############################################
  # CDI populator annotation                    #
  ###############################################

  - it: includes CDI populator annotation on dataVolumeTemplate
    release:
      name: test-k8s
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].metadata.annotations["cdi.kubevirt.io/storage.usePopulator"]
          value: "false"
        documentIndex: 4

  ###############################################
  # multiple node groups — independent storage  #
  ###############################################

  # With two nodeGroups (md0, md1) the range loop emits per-group documents
  # alphabetically. Documents before the loop: Cluster(0),
  # KamajiControlPlane(1), WorkloadMonitor-cp(2), KubevirtCluster(3).
  # Each group adds: KubevirtMachineTemplate, MachineDeployment,
  # MachineHealthCheck, WorkloadMonitor.
  # md0 KubevirtMachineTemplate → index 4, md1 → index 8.

  - it: renders independent dataVolumeTemplates per node group
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeGroups.md0.minReplicas: 0
      nodeGroups.md0.maxReplicas: 10
      nodeGroups.md0.instanceType: ""
      nodeGroups.md0.roles[0]: worker
      nodeGroups.md0.resources.cpu: 2
      nodeGroups.md0.resources.memory: 4Gi
      nodeGroups.md0.diskSize: 20Gi
      nodeGroups.md1.minReplicas: 0
      nodeGroups.md1.maxReplicas: 5
      nodeGroups.md1.instanceType: ""
      nodeGroups.md1.roles[0]: worker
      nodeGroups.md1.resources.cpu: 4
      nodeGroups.md1.resources.memory: 8Gi
      nodeGroups.md1.diskSize: 50Gi
      nodeGroups.md1.storageClass: my-storage-class
    asserts:
      # --- md0: KubevirtMachineTemplate at document index 4 ---
      - isKind:
          of: KubevirtMachineTemplate
        documentIndex: 4
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].spec.storage.resources.requests.storage
          value: 20Gi
        documentIndex: 4
      - notExists:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].spec.storage.storageClassName
        documentIndex: 4
      # --- md1: KubevirtMachineTemplate at document index 8 ---
      - isKind:
          of: KubevirtMachineTemplate
        documentIndex: 8
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].spec.storage.resources.requests.storage
          value: 50Gi
        documentIndex: 8
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.dataVolumeTemplates[0].spec.storage.storageClassName
          value: my-storage-class
        documentIndex: 8

  ###############################################
  # disk blockSize for 4Ki-native storage       #
  ###############################################

  - it: pins logical=512/physical=4096 block size on the system disk
    release:
      name: test-k8s
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.template.spec.domain.devices.disks[0].blockSize.custom.logical
          value: 512
        documentIndex: 4
      - equal:
          path: spec.template.spec.virtualMachineTemplate.spec.template.spec.domain.devices.disks[0].blockSize.custom.physical
          value: 4096
        documentIndex: 4

  ###############################################
  # ephemeralStorage migration guard            #
  ###############################################

  - it: fails when ephemeralStorage is set instead of diskSize
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeGroups.md0.ephemeralStorage: 50Gi
    asserts:
      - failedTemplate:
          errorMessage: 'nodeGroup "md0": ephemeralStorage is no longer supported and should have been automatically migrated to diskSize by platform migration 41. If you see this error after upgrading, the migration did not run — check the cozystack-migration-hook Job logs in cozy-system.'

  - it: fails when ephemeralStorage is set to empty string
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeGroups.md0.ephemeralStorage: ""
    asserts:
      - failedTemplate:
          errorMessage: 'nodeGroup "md0": ephemeralStorage is no longer supported and should have been automatically migrated to diskSize by platform migration 41. If you see this error after upgrading, the migration did not run — check the cozystack-migration-hook Job logs in cozy-system.'

  - it: fails when both ephemeralStorage and diskSize are set
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeGroups.md0.ephemeralStorage: 50Gi
      nodeGroups.md0.diskSize: 50Gi
    asserts:
      - failedTemplate:
          errorMessage: 'nodeGroup "md0": ephemeralStorage is no longer supported and should have been automatically migrated to diskSize by platform migration 41. If you see this error after upgrading, the migration did not run — check the cozystack-migration-hook Job logs in cozy-system.'
