suite: GPU Operator HelmRelease HAMi integration tests
templates:
  - templates/helmreleases/gpu-operator.yaml
tests:
  - it: should disable devicePlugin when hami is enabled
    set:
      addons:
        gpuOperator:
          enabled: true
          valuesOverride: {}
        hami:
          enabled: true
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.gpu-operator.devicePlugin.enabled
          value: false

  - it: should not have values when hami is disabled and no overrides
    set:
      addons:
        gpuOperator:
          enabled: true
          valuesOverride: {}
        hami:
          enabled: false
          valuesOverride: {}
    asserts:
      - notExists:
          path: spec.values

  - it: should allow user overrides to merge with hami defaults
    set:
      addons:
        gpuOperator:
          enabled: true
          valuesOverride:
            gpu-operator:
              driver:
                enabled: false
        hami:
          enabled: true
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.gpu-operator.devicePlugin.enabled
          value: false
      - equal:
          path: spec.values.gpu-operator.driver.enabled
          value: false

  - it: should let user override devicePlugin back to true if needed
    set:
      addons:
        gpuOperator:
          enabled: true
          valuesOverride:
            gpu-operator:
              devicePlugin:
                enabled: true
        hami:
          enabled: true
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.gpu-operator.devicePlugin.enabled
          value: true

  - it: should not render when gpuOperator is disabled
    set:
      addons:
        gpuOperator:
          enabled: false
          valuesOverride: {}
        hami:
          enabled: false
          valuesOverride: {}
    asserts:
      - hasDocuments:
          count: 0
