suite: GPU Operator HelmRelease HAMi integration tests
templates:
  - templates/helmreleases/gpu-operator.yaml
values:
  - values-ci.yaml
tests:
  - it: should disable devicePlugin when hami is enabled
    set:
      addons:
        gpuOperator:
          enabled: true
          valuesOverride: {}
        hami:
          enabled: true
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.gpu-operator.devicePlugin.enabled
          value: false

  - it: should default the NvLinkDisable kernel module config even when hami is disabled
    set:
      addons:
        gpuOperator:
          enabled: true
          valuesOverride: {}
        hami:
          enabled: false
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.kernelModuleConfig.create
          value: true
      - equal:
          path: spec.values.gpu-operator.driver.kernelModuleConfig.name
          value: nvidia-kernel-module-params
      - notExists:
          path: spec.values.gpu-operator.devicePlugin

  - it: should let user override the kernel module config name
    set:
      addons:
        gpuOperator:
          enabled: true
          valuesOverride:
            gpu-operator:
              driver:
                kernelModuleConfig:
                  name: my-custom-kmc
        hami:
          enabled: false
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.gpu-operator.driver.kernelModuleConfig.name
          value: my-custom-kmc
      - equal:
          path: spec.values.kernelModuleConfig.create
          value: true

  - it: should apply hami defaults when valuesOverride key is omitted
    set:
      addons:
        gpuOperator:
          enabled: true
        hami:
          enabled: true
    asserts:
      - equal:
          path: spec.values.gpu-operator.devicePlugin.enabled
          value: false

  - it: should allow user overrides to merge with hami defaults
    set:
      addons:
        gpuOperator:
          enabled: true
          valuesOverride:
            gpu-operator:
              driver:
                enabled: false
        hami:
          enabled: true
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.gpu-operator.devicePlugin.enabled
          value: false
      - equal:
          path: spec.values.gpu-operator.driver.enabled
          value: false

  - it: should let user explicitly override devicePlugin.enabled to true with hami enabled
    set:
      addons:
        gpuOperator:
          enabled: true
          valuesOverride:
            gpu-operator:
              devicePlugin:
                enabled: true
              driver:
                enabled: false
        hami:
          enabled: true
          valuesOverride: {}
    asserts:
      - equal:
          path: spec.values.gpu-operator.devicePlugin.enabled
          value: true
      - equal:
          path: spec.values.gpu-operator.driver.enabled
          value: false

  - it: should not render when gpuOperator is disabled
    set:
      addons:
        gpuOperator:
          enabled: false
          valuesOverride: {}
        hami:
          enabled: false
          valuesOverride: {}
    asserts:
      - hasDocuments:
          count: 0
