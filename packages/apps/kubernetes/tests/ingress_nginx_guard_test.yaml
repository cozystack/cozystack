suite: ingress-nginx requires an ingress-nginx worker pool (Phase 2 guard)

# The ingress-nginx controller DaemonSet pins itself (nodeSelector) to nodes
# labelled node-role.kubernetes.io/ingress-nginx. Since Phase 2 moved worker
# pools into the kubernetes-nodes chart, that label comes only from a
# KubernetesNodes pool with roles: [ingress-nginx]. The chart fails render when
# this cluster already has pools but none carries the ingress role, so the
# operator gets an actionable error instead of a DaemonSet that schedules
# nothing. The lookup is empty during plain render (helm template / lint /
# unittest without a mocked provider), so the guard never fires there.

templates:
  - templates/helmreleases/ingress-nginx.yaml

values:
  - values/common.yaml

release:
  name: test-k8s
  namespace: tenant-test

tests:
  - it: renders the ingress-nginx HelmRelease when enabled and no pools are visible (empty lookup, no fail)
    set:
      addons.ingressNginx.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HelmRelease
      - equal:
          path: metadata.name
          value: test-k8s-ingress-nginx

  - it: does not render when the addon is disabled
    set:
      addons.ingressNginx.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when a worker pool exists for this cluster but none has the ingress-nginx role
    set:
      addons.ingressNginx.enabled: true
    kubernetesProvider:
      scheme:
        "cluster.x-k8s.io/v1beta1/MachineDeployment":
          gvr:
            group: cluster.x-k8s.io
            version: v1beta1
            resource: machinedeployments
          namespaced: true
      objects:
        - apiVersion: cluster.x-k8s.io/v1beta1
          kind: MachineDeployment
          metadata:
            name: test-k8s-md0
            namespace: tenant-test
          spec:
            clusterName: test-k8s
            template:
              metadata:
                labels:
                  node-role.kubernetes.io/worker: ""
    asserts:
      - failedTemplate:
          errorPattern: "no KubernetesNodes pool for this cluster has roles"

  - it: renders when a worker pool with the ingress-nginx role exists
    set:
      addons.ingressNginx.enabled: true
    kubernetesProvider:
      scheme:
        "cluster.x-k8s.io/v1beta1/MachineDeployment":
          gvr:
            group: cluster.x-k8s.io
            version: v1beta1
            resource: machinedeployments
          namespaced: true
      objects:
        - apiVersion: cluster.x-k8s.io/v1beta1
          kind: MachineDeployment
          metadata:
            name: test-k8s-ingress
            namespace: tenant-test
          spec:
            clusterName: test-k8s
            template:
              metadata:
                labels:
                  node-role.kubernetes.io/ingress-nginx: ""
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HelmRelease
