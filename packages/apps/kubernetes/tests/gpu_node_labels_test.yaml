suite: GPU node-group Talos worker nodeLabels tests

# The TalosConfigTemplate that defines worker nodeLabels is not rendered
# directly by helm — the kubernetes chart emits a post-install Job
# (templates/talos/talos-reconcile-job.yaml) whose container command
# carries the TCT YAML as a string literal that the hook applies at
# runtime. helm-unittest therefore asserts on the rendered Job's script
# via matchRegex / notMatchRegex, looking for the machine.nodeLabels
# block GPU node-groups must inject so HAMi's hami-device-plugin
# DaemonSet (nodeSelector gpu=on) schedules and advertises nvidia.com/gpu.
# Without the label the plugin stays at DESIRED=0 and no GPUs are
# exposed to the tenant — same regression main avoids via kubeadm
# kubeletExtraArgs node-labels="gpu=on".

templates:
  - templates/talos/talos-reconcile-job.yaml

tests:
  - it: labels GPU node-groups with gpu=on
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources:
            cpu: 8
            memory: 16Gi
          gpus:
            - name: nvidia.com/GH200
          kubelet: {}
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'nodeLabels:\s*\n\s+gpu: "on"'
        documentSelector:
          path: kind
          value: Job

  - it: does not label non-GPU node-groups with gpu=on
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          diskSize: 20Gi
          roles:
            - worker
          resources:
            cpu: 2
            memory: 4Gi
          gpus: []
          kubelet: {}
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: 'nodeLabels:\s*\n\s+gpu: "on"'
        documentSelector:
          path: kind
          value: Job
