  ####################################################
  # Capacity annotation: floor gives safe under-approximation
  ####################################################

  - it: reports non-zero capacity annotation when reservations consume most memory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "2.5Gi"
          kubelet:
            systemReservedMemory: "1Gi"
            kubeReservedMemory: "1Gi"
    asserts:
      # 2.5Gi = 2560Mi. Reserved: 1Gi + 1Gi + 7% of 2560Mi (179.2Mi) = 2359.2Mi.
      # Remaining: ~200.8Mi. floor gives a safe under-approximation for cluster-autoscaler.
      - isKind:
          of: MachineDeployment
        documentIndex: 6
      - notEqual:
          path: metadata.annotations["capacity.cluster-autoscaler.kubernetes.io/memory"]
          value: "0Mi"
        documentIndex: 6
      - matchRegex:
          path: metadata.annotations["capacity.cluster-autoscaler.kubernetes.io/memory"]
          pattern: "^\\d+Mi$"
        documentIndex: 6

  ####################################################
  # instanceType validation                          #
  ####################################################

  # NOTE: The instanceType-based auto-computation path (where resources.memory is
  # absent and instanceType points to a VirtualMachineClusterInstancetype CR whose
  # .spec.memory.guest is used as $effectiveMemory) cannot be tested here.
  #
  # The template uses Helm's `lookup` function to fetch the instancetype CR
  # (cluster.yaml line ~187). `lookup` requires a live Kubernetes API server and
  # always returns empty in helm-unittest (v1.0.3 provides no lookup mocking).
  # When lookup returns empty, the template calls `fail`, so the positive path
  # (successful lookup -> reservation derived from spec.memory.guest) is
  # unreachable in unit tests.
  #
  # All reservation auto-computation tests above use resources.memory directly,
  # which exercises the same 5%-clamp logic that the instanceType path uses.
  # The instanceType resolution itself is validated via e2e tests that deploy
  # against a real cluster with instancetype CRs present.

  - it: fails when instanceType is specified but not found in cluster
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: "u1.medium"
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: specified instanceType \"u1.medium\" not found in cluster"

