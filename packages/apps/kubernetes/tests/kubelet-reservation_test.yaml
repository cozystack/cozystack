          resources: {}
          kubelet:
            evictionHardMemory: "200Mi"
            evictionSoftMemory: "not-a-quantity"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: invalid evictionSoftMemory value \"not-a-quantity\" — must be a percentage (e.g. 10%) or a valid Kubernetes memory quantity (e.g. 500Mi, 1Gi)"

  - it: accepts valid absolute eviction thresholds with correct format
    release:
