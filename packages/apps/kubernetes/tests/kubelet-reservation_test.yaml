suite: kubelet reservation tests

templates:
  - templates/cluster.yaml

# The KubeadmConfigTemplate for the first nodeGroup (md0) is rendered
# at document index 4 within cluster.yaml. The kubelet args live at:
# spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs

tests:
  ###################################
  # Default values (no memory set)  #
  ###################################

  - it: renders default kubelet args when no memory and no kubelet overrides
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
    asserts:
      - isKind:
          of: KubeadmConfigTemplate
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-hard
          value: "memory.available<7%,nodefs.available<10%,imagefs.available<15%,nodefs.inodesFree<5%"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-soft
          value: "memory.available<10%,nodefs.available<15%,imagefs.available<20%"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-soft-grace-period
          value: "memory.available=1m30s,nodefs.available=1m30s,imagefs.available=1m30s"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-minimum-reclaim
          value: "memory.available=256Mi"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.enforce-node-allocatable
          value: "pods"
        documentIndex: 4

  ##########################################
  # Empty kubelet: {} falls back to defaults
  ##########################################

  - it: falls back to defaults when kubelet is empty dict
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
          kubelet: {}
    asserts:
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-hard
          value: "memory.available<7%,nodefs.available<10%,imagefs.available<15%,nodefs.inodesFree<5%"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-soft
          value: "memory.available<10%,nodefs.available<15%,imagefs.available<20%"
        documentIndex: 4

  #########################################
  # Node group without kubelet key at all #
  #########################################

  - it: renders defaults when nodeGroup has no kubelet key
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
    asserts:
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4

  ###############################
  # Custom kubelet overrides    #
  ###############################

  - it: uses custom kubelet overrides when specified
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "8Gi"
            cpu: 4
          kubelet:
            systemReservedMemory: "512Mi"
            kubeReservedMemory: "256Mi"
            systemReservedCpu: "200m"
            kubeReservedCpu: "300m"
            evictionHardMemory: "5%"
            evictionSoftMemory: "15%"
    asserts:
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=512Mi,cpu=200m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=256Mi,cpu=300m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-hard
          value: "memory.available<5%,nodefs.available<10%,imagefs.available<15%,nodefs.inodesFree<5%"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-soft
          value: "memory.available<15%,nodefs.available<15%,imagefs.available<20%"
        documentIndex: 4

  - it: allows partial kubelet overrides, uses defaults for unset fields
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "4Gi"
          kubelet:
            systemReservedMemory: "256Mi"
    asserts:
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-hard
          value: "memory.available<7%,nodefs.available<10%,imagefs.available<15%,nodefs.inodesFree<5%"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-soft
          value: "memory.available<10%,nodefs.available<15%,imagefs.available<20%"
        documentIndex: 4

  - it: allows valid absolute eviction thresholds (hard < soft)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "8Gi"
          kubelet:
            evictionHardMemory: "200Mi"
            evictionSoftMemory: "500Mi"
    asserts:
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-hard
          value: "memory.available<200Mi,nodefs.available<10%,imagefs.available<15%,nodefs.inodesFree<5%"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-soft
          value: "memory.available<500Mi,nodefs.available<15%,imagefs.available<20%"
        documentIndex: 4

  - it: rejects absolute eviction thresholds where hard >= soft
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "1Gi"
            evictionSoftMemory: "200Mi"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (1Gi) must be strictly less than evictionSoftMemory (200Mi)"

  ############################################
  # Auto-computation from resources.memory   #
  ############################################

  - it: auto-computes reservation from resources.memory (4Gi -> 256Mi, clamped from 204Mi)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "4Gi"
    asserts:
      # 4Gi = 4096Mi, 5% = 204Mi (truncated from 204.8), clamped up to 256Mi floor
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4

  - it: auto-computes reservation from resources.memory (8Gi -> 409Mi)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "8Gi"
    asserts:
      # 8Gi = 8192Mi, 5% = 409Mi (truncated from 409.6)
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=409Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=409Mi,cpu=50m"
        documentIndex: 4

  ##################################
  # Clamp logic: 256Mi floor        #
  ##################################

  - it: clamps auto-computed reservation to 256Mi floor (1Gi memory)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "1Gi"
    asserts:
      # 1Gi = 1024Mi, 5% = 51Mi, but floor is 256Mi
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4

  - it: clamps auto-computed reservation to 256Mi floor (512Mi memory, triggers validation error)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "512Mi"
    asserts:
      # 512Mi, 5% = 25Mi, but floor is 256Mi -> 256Mi+256Mi+7%eviction(35Mi) = 547Mi > 512Mi -> fails validation
      - failedTemplate:
          errorMessage: "nodeGroup md0: total reserved memory (systemReservedMemory=256Mi + kubeReservedMemory=256Mi + evictionHardMemory=7%) must be less than effective node memory (512Mi)"

  ##################################
  # Clamp logic: 1024Mi ceiling    #
  ##################################

  - it: clamps auto-computed reservation to 1024Mi ceiling (32Gi memory)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "32Gi"
    asserts:
      # 32Gi = 32768Mi, 5% = 1638Mi, capped to 1024Mi
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=1024Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=1024Mi,cpu=50m"
        documentIndex: 4

  - it: clamps auto-computed reservation to 1024Mi ceiling (64Gi memory)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "64Gi"
    asserts:
      # 64Gi = 65536Mi, 5% = 3276Mi, capped to 1024Mi
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=1024Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=1024Mi,cpu=50m"
        documentIndex: 4

  ##################################################
  # Boundary: exactly at 1024Mi ceiling threshold  #
  ##################################################

  - it: auto-computes exactly 1024Mi at the boundary (20480Mi memory)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            # 20480Mi = 20Gi, 5% = 1024Mi — exactly at the cap
            memory: "20Gi"
    asserts:
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=1024Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=1024Mi,cpu=50m"
        documentIndex: 4

  ####################################################
  # Custom overrides take precedence over auto-compute
  ####################################################

  - it: custom kubelet memory overrides take precedence over auto-computation
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "8Gi"
          kubelet:
            systemReservedMemory: "1Gi"
            kubeReservedMemory: "768Mi"
    asserts:
      # Despite 8Gi yielding 409Mi auto, explicit overrides win
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=1Gi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=768Mi,cpu=50m"
        documentIndex: 4

  ######################################
  # Eviction validation: hard >= soft  #
  ######################################

  - it: fails when evictionHardMemory percentage exceeds evictionSoftMemory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "15%"
            evictionSoftMemory: "10%"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (15%) must be strictly less than evictionSoftMemory (10%)"

  - it: fails when evictionHardMemory percentage equals evictionSoftMemory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "10%"
            evictionSoftMemory: "10%"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (10%) must be strictly less than evictionSoftMemory (10%)"

  - it: fails when default evictionHardMemory is overridden to exceed default evictionSoftMemory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "12%"
            # soft defaults to 10%, so 12% >= 10% should fail
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (12%) must be strictly less than evictionSoftMemory (10%)"

  ##############################################
  # Static args always present                 #
  ##############################################

  - it: always renders enforce-node-allocatable as pods
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "16Gi"
          kubelet:
            systemReservedMemory: "1Gi"
            kubeReservedMemory: "512Mi"
    asserts:
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.enforce-node-allocatable
          value: "pods"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-soft-grace-period
          value: "memory.available=1m30s,nodefs.available=1m30s,imagefs.available=1m30s"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-minimum-reclaim
          value: "memory.available=256Mi"
        documentIndex: 4

  ################################################
  # Mixed eviction threshold types must be rejected
  ################################################

  - it: rejects mixed eviction types (hard absolute, soft percentage)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "1Gi"
            evictionSoftMemory: "10%"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (1Gi) and evictionSoftMemory (10%) must use the same unit type (both percentage or both absolute)"

  - it: rejects mixed eviction types reversed (hard percentage, soft absolute)
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "10%"
            evictionSoftMemory: "1Gi"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: evictionHardMemory (10%) and evictionSoftMemory (1Gi) must use the same unit type (both percentage or both absolute)"

  ################################################
  # Reservation field format validation          #
  ################################################

  - it: rejects invalid CPU format for kubeReservedCpu
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            kubeReservedCpu: "banana"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: invalid kubeReservedCpu value \"banana\" — must be a valid Kubernetes CPU quantity (integer millicores like 100m, or decimal cores like 0.5, 1)"

  - it: rejects invalid memory format for systemReservedMemory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            systemReservedMemory: "abc"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: invalid systemReservedMemory value \"abc\" — must be a valid Kubernetes memory quantity (e.g. 128Mi, 1Gi, 1e9, 500e6)"

  ################################################
  # Multi-nodeGroup isolation test               #
  ################################################

  - it: renders independent kubelet args for multiple node groups
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
        md1:
          minReplicas: 1
          maxReplicas: 5
          instanceType: ""
          ephemeralStorage: 40Gi
          roles:
            - worker
          resources:
            memory: "8Gi"
            cpu: 4
          kubelet:
            systemReservedMemory: "512Mi"
            kubeReservedMemory: "256Mi"
            systemReservedCpu: "200m"
            kubeReservedCpu: "150m"
            evictionHardMemory: "5%"
            evictionSoftMemory: "15%"
    asserts:
      # md0 at documentIndex 4: defaults
      - isKind:
          of: KubeadmConfigTemplate
        documentIndex: 4
      - equal:
          path: metadata.name
          value: test-k8s-md0
        documentIndex: 4
      - equal:
