  # CPU override guard: CPU overrides without effective CPU      #
  ################################################################

  - it: rejects kubelet CPU overrides when no effective CPU is available
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            systemReservedCpu: "200m"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: cannot validate kubelet CPU reservations without effective CPU — set resources.cpu or a valid instanceType"

  ########################################################
  # Default CPU: no resources/instanceType -> 50m        #
  ########################################################

  - it: defaults to 50m CPU reservation when no resources or instanceType
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
    asserts:
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=256Mi,cpu=50m"
        documentIndex: 4

  - it: computes CPU capacity annotation correctly with whole-core input
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles: []
          gpus: []
          kubelet: {}
          resources:
            cpu: 4
            memory: "8Gi"
    asserts:
      - documentIndex: 6
        isKind:
          of: MachineDeployment
      - documentIndex: 6
        equal:
          path: metadata.annotations["capacity.cluster-autoscaler.kubernetes.io/cpu"]
          value: "3600m"

  - it: computes CPU capacity annotation correctly with millicore input
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles: []
          gpus: []
          kubelet: {}
          resources:
            cpu: "4000m"
            memory: "8Gi"
    asserts:
      - documentIndex: 6
        isKind:
          of: MachineDeployment
      - documentIndex: 6
        equal:
          path: metadata.annotations["capacity.cluster-autoscaler.kubernetes.io/cpu"]
          value: "3600m"
