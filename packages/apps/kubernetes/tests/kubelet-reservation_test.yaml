        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources: {}
          kubelet:
            evictionHardMemory: "500Mi"
            evictionSoftMemory: "1Gi"
    asserts:
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-hard
          value: "memory.available<500Mi"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-soft
          value: "memory.available<1Gi"
        documentIndex: 4

  ####################################################
  # Reserved memory exceeds node memory validation   #
  ####################################################

  - it: rejects reserved memory exceeding effective node memory
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "1Gi"
          kubelet:
            systemReservedMemory: "512Mi"
            kubeReservedMemory: "600Mi"
    asserts:
      - failedTemplate:
          errorMessage: "nodeGroup md0: total reserved memory (systemReservedMemory=512Mi + kubeReservedMemory=600Mi) must be less than effective node memory (1Gi)"

  - it: rejects reserved memory equal to effective node memory
