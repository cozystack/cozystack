          value: "memory.available<3Gi"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.eviction-soft
          value: "memory.available<3.5Gi"
        documentIndex: 4

  - it: renders reasonable absolute eviction with explicit reservations
