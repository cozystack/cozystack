      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=512Mi,cpu=100m"
        documentIndex: 4

  #############################################################
  # Eviction thresholds interaction with explicit reservations
  #############################################################

  - it: renders aggressive absolute eviction with explicit reservations on small node
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      _namespace:
        etcd: etcd
        ingress: nginx
        host: example.com
      _cluster:
        cluster-domain: cozy.local
      nodeGroups:
        md0:
          minReplicas: 0
          maxReplicas: 10
          instanceType: ""
          ephemeralStorage: 20Gi
          roles:
            - worker
          resources:
            memory: "4Gi"
          kubelet:
            systemReservedMemory: "512Mi"
            kubeReservedMemory: "512Mi"
            evictionHardMemory: "3Gi"
            evictionSoftMemory: "3.5Gi"
    asserts:
      # 4Gi node, 1Gi reserved, 3Gi hard eviction — only ~3Gi for workloads.
      # Valid config: template allows aggressive eviction relative to reservations.
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.system-reserved
          value: "memory=512Mi,cpu=100m"
        documentIndex: 4
      - equal:
          path: spec.template.spec.joinConfiguration.nodeRegistration.kubeletExtraArgs.kube-reserved
          value: "memory=512Mi,cpu=100m"
        documentIndex: 4
      - equal:
