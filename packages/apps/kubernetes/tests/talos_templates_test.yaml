suite: talos control-plane PKI, secrets and bootstrap-token render tests

# Render-coverage for the control-plane talos/ templates kept in this chart:
# the cert-manager Certificates/Issuers (talos-pki), the talos-secrets Secret
# whose token components the worker reconcile Job binds from, and the
# bootstrap-token tenant Job. Worker pools and the per-pool talos-reconcile Job
# that produces each TalosConfigTemplate now live in the kubernetes-nodes chart
# (covered by its own tests). helm-unittest sees documents in source-file order,
# so the documentIndex constants below follow the template file layout — update
# if a top-level object is added/removed/reordered.

values:
  - values/common.yaml

tests:
  - it: bootstrap-token tenant Job renders ServiceAccount + Job
    templates:
      - templates/talos/bootstrap-token-tenant-job.yaml
    release:
      name: test-k8s
      namespace: tenant-test
    asserts:
      # Source order: 0 ServiceAccount, 1 Job (Role/RoleBinding/CNP are
      # inside the Job's command literal as text, not separate top-level
      # documents, so they do not contribute to hasDocuments count).
      - hasDocuments:
          count: 2
      - isKind:
          of: ServiceAccount
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-k8s-bootstrap-token-tenant
        documentIndex: 0
      - isKind:
          of: Job
        documentIndex: 1
      - equal:
          path: metadata.name
          value: test-k8s-bootstrap-token-tenant
        documentIndex: 1

  - it: talos-pki emits two cert-manager Certificates and two Issuers
    templates:
      - templates/talos/talos-pki.yaml
    release:
      name: test-k8s
      namespace: tenant-test
    asserts:
      # Source order in templates/talos/talos-pki.yaml:
      # 0 Issuer test-k8s-talos-bootstrap (self-signed),
      # 1 Certificate test-k8s-talos-ca (issued by talos-bootstrap),
      # 2 Issuer test-k8s-talos-ca (issues tls-cert from talos-ca Secret),
      # 3 Certificate test-k8s-talos-tls-cert (issued by talos-ca).
      - hasDocuments:
          count: 4
      - isKind:
          of: Issuer
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-k8s-talos-bootstrap
        documentIndex: 0
      - isKind:
          of: Certificate
        documentIndex: 1
      - equal:
          path: metadata.name
          value: test-k8s-talos-ca
        documentIndex: 1
      - equal:
          path: spec.secretName
          value: test-k8s-talos-ca
        documentIndex: 1
      - isKind:
          of: Issuer
        documentIndex: 2
      - equal:
          path: metadata.name
          value: test-k8s-talos-ca
        documentIndex: 2
      - isKind:
          of: Certificate
        documentIndex: 3
      - equal:
          path: metadata.name
          value: test-k8s-talos-tls-cert
        documentIndex: 3

  - it: talos-secrets Secret carries the four token-component keys the reconcile Job env binds from
    templates:
      - templates/talos/talos-secrets.yaml
    release:
      name: test-k8s
      namespace: tenant-test
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-k8s-talos-secrets
        documentIndex: 0
      - exists:
          path: data.token
        documentIndex: 0
      - exists:
          path: data.clusterId
        documentIndex: 0
      - exists:
          path: data.clusterSecret
        documentIndex: 0
      - exists:
          path: data.bootstrapToken
        documentIndex: 0
