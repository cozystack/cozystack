suite: MachineHealthCheck maxUnhealthy int-vs-percent rendering tests

# CAPI MachineHealthCheck admission accepts spec.maxUnhealthy as IntOrString
# but rejects a *quoted plain integer* string like "0" — the webhook
# strconv-parses bare-digit strings and returns "invalid IntOrString". The
# chart's render branch is:
#   maxUnhealthy: {{ if hasSuffix "%" ... }}{{ . | quote }}{{ else }}{{ . | int }}{{ end }}
# A regression in either arm flips the MHC document into the webhook-
# rejected shape, which surfaces only at HR install time — far from the
# template change.

templates:
  - templates/cluster.yaml

values:
  - values/common.yaml

tests:
  - it: renders percent-suffix maxUnhealthy as a quoted string
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeHealthCheck:
        maxUnhealthy: "50%"
        nodeStartupTimeout: "10m"
    asserts:
      - isKind:
          of: MachineHealthCheck
        documentSelector:
          path: kind
          value: MachineHealthCheck
      - equal:
          path: spec.maxUnhealthy
          value: "50%"
        documentSelector:
          path: kind
          value: MachineHealthCheck

  - it: renders bare-integer maxUnhealthy as an unquoted int
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeHealthCheck:
        maxUnhealthy: "0"
        nodeStartupTimeout: "10m"
    asserts:
      - isKind:
          of: MachineHealthCheck
        documentSelector:
          path: kind
          value: MachineHealthCheck
      - equal:
          path: spec.maxUnhealthy
          value: 0
        documentSelector:
          path: kind
          value: MachineHealthCheck

  - it: passes nodeStartupTimeout through verbatim
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeHealthCheck:
        maxUnhealthy: "50%"
        nodeStartupTimeout: "20m"
    asserts:
      - equal:
          path: spec.nodeStartupTimeout
          value: "20m"
        documentSelector:
          path: kind
          value: MachineHealthCheck

  - it: per-group maxUnhealthy overrides the cluster-wide nodeHealthCheck value
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeHealthCheck:
        maxUnhealthy: "50%"
        nodeStartupTimeout: "10m"
      nodeGroups.md0.maxUnhealthy: "10%"
    asserts:
      - equal:
          path: spec.maxUnhealthy
          value: "10%"
        documentSelector:
          path: kind
          value: MachineHealthCheck

  - it: per-group bare-integer maxUnhealthy override renders as an unquoted int
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeHealthCheck:
        maxUnhealthy: "50%"
        nodeStartupTimeout: "10m"
      nodeGroups.md0.maxUnhealthy: "3"
    asserts:
      - equal:
          path: spec.maxUnhealthy
          value: 3
        documentSelector:
          path: kind
          value: MachineHealthCheck

  - it: per-group nodeStartupTimeout overrides the cluster-wide value
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeHealthCheck:
        maxUnhealthy: "50%"
        nodeStartupTimeout: "10m"
      nodeGroups.md0.nodeStartupTimeout: "30m"
    asserts:
      - equal:
          path: spec.nodeStartupTimeout
          value: "30m"
        documentSelector:
          path: kind
          value: MachineHealthCheck

  - it: falls back to the cluster-wide nodeHealthCheck when no per-group override is set
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeHealthCheck:
        maxUnhealthy: "40%"
        nodeStartupTimeout: "15m"
    asserts:
      - equal:
          path: spec.maxUnhealthy
          value: "40%"
        documentSelector:
          path: kind
          value: MachineHealthCheck
      - equal:
          path: spec.nodeStartupTimeout
          value: "15m"
        documentSelector:
          path: kind
          value: MachineHealthCheck

  - it: rejects an invalid per-group maxUnhealthy and names the offending group
    release:
      name: test-k8s
      namespace: tenant-test
    set:
      nodeHealthCheck:
        maxUnhealthy: "50%"
        nodeStartupTimeout: "10m"
      nodeGroups.md0.maxUnhealthy: "abc"
    asserts:
      - failedTemplate:
          errorMessage: 'nodeGroups.md0.maxUnhealthy must be a bare integer (e.g. 0, 1) or an integer percentage (e.g. 50%), got "abc"'
