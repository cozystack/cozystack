apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-kccm
  labels:
    k8s-app: {{ .Release.Name }}-kccm
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: {{ .Release.Name }}-kccm
  template:
    metadata:
      labels:
        k8s-app: {{ .Release.Name }}-kccm
        policy.cozystack.io/allow-to-apiserver: "true"
    spec:
      enableServiceLinks: false
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: "NoSchedule"
      initContainers:
      - name: wait-for-kubeconfig
        image: "{{ $.Files.Get "images/busybox.tag" | trim }}"
        command:
        - sh
        - -c
        - |
          set -eu
          deadline=$(( $(date +%s) + 1200 ))
          until [ -s /etc/kubernetes/kubeconfig/super-admin.svc ]; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "admin kubeconfig was not provisioned within 20m; exiting so the pod goes CrashLoopBackOff and surfaces in dashboards" >&2
              exit 1
            fi
            echo "waiting for admin kubeconfig to be provisioned by Kamaji..."
            sleep 5
          done
        volumeMounts:
        - name: kubeconfig
          mountPath: /etc/kubernetes/kubeconfig
          readOnly: true
      containers:
      - name: kubevirt-cloud-controller-manager
        args:
        - --cloud-provider=kubevirt
        - --cloud-config=/etc/cloud/cloud-config
        - --kubeconfig=/etc/kubernetes/kubeconfig/super-admin.svc
        - --cluster-name={{ .Release.Name }}
        command:
        - /bin/kubevirt-cloud-controller-manager
        image: "{{ $.Files.Get "images/kubevirt-cloud-provider.tag" | trim }}"
        imagePullPolicy: Always
        #securityContext:
        #  privileged: true
        resources:
          limits:
            cpu: 512m
            memory: 512Mi
          requests:
            cpu: 125m
            memory: 128Mi
        volumeMounts:
        - mountPath: /etc/kubernetes/kubeconfig
          name: kubeconfig
          readOnly: true
        - mountPath: /etc/cloud
          name: cloud-config
          readOnly: true
      volumes:
      - configMap:
          name: {{ .Release.Name }}-cloud-config
        name: cloud-config
      - secret:
          secretName: {{ .Release.Name }}-admin-kubeconfig
          optional: true
        name: kubeconfig
      serviceAccountName: {{ .Release.Name }}-kccm
