{{- /*
  Pre-render the OIDC kubeconfig Secret as a chart-owned resource so
  `helm uninstall` cleans it up. The bootstrap Job patches the `data`
  field at runtime with the actual kubeconfig (it cannot be rendered
  at template time because the tenant CA is generated asynchronously
  by Kamaji).

  Emitted only for `mode: System`; in `CustomConfig` mode the chart
  does not know the issuer/clientId — the operator distributes the
  OIDC kubeconfig out-of-band from their own IdP configuration.

  The placeholder content keeps the Secret addressable by the
  dashboard immediately on install; the bootstrap Job swaps it for a
  real kubeconfig as soon as the Kamaji-issued admin kubeconfig is
  available.
*/}}
{{- if eq .Values.oidc.mode "System" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-oidc-kubeconfig
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
type: Opaque
stringData:
  kubeconfig: |
    # awaiting OIDC bootstrap Job — the tenant CA is generated by
    # Kamaji asynchronously; the Job populates this Secret as soon as
    # the admin kubeconfig appears.
{{- end }}
