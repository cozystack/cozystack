---
apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
  name: {{ .Release.Name }}-pre-cleanup
spec:
  template:
    metadata:
      labels:
        policy.cozystack.io/allow-to-apiserver: "true"
    spec:
      serviceAccountName: {{ .Release.Name }}-cleanup
      restartPolicy: Never
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: "NoSchedule"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubectl
          image: docker.io/clastix/kubectl:v1.32
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Step 1: Suspending all HelmReleases with label cozystack.io/target-cluster-name={{ .Release.Name }}"
              for hr in $(kubectl -n {{ .Release.Namespace }} get helmreleases.helm.toolkit.fluxcd.io -l "cozystack.io/target-cluster-name={{ .Release.Name }}" -o name 2>/dev/null || true); do
                if [ -n "$hr" ]; then           
                  echo "  Suspending $hr"
                  kubectl -n {{ .Release.Namespace }} patch "$hr" \
                    -p '{"spec": {"suspend": true}}' \
                    --type=merge --field-manager=flux-client-side-apply
                fi
              done

              echo "Step 2: Deleting HelmReleases with label cozystack.io/target-cluster-name={{ .Release.Name }}"
              # --wait=true blocks until the child HelmReleases (in-tenant cilium,
              # coredns, csi, ingress-nginx, …) are fully gone. When the tenant
              # never became a working cluster — no Ready nodes: storage/LINSTOR
              # exhaustion, worker VMs that never joined, or a nodeGroup at
              # minReplicas: 0 — those uninstalls cannot converge (e.g. in-tenant
              # cilium stays InstallFailed because cilium-operator has nothing to
              # schedule on), and an UNBOUNDED wait hangs this hook forever: the
              # parent Helm uninstall then fails on the pre-cleanup Job and the
              # Kubernetes CR is stuck deleting (see #3271). Bound the wait; if it
              # expires, force-remove the Flux finalizer from any child HR still
              # present so it can be garbage-collected. This is safe here because
              # the whole tenant — its control plane included (torn down in Steps
              # 3/4 below) — is being destroyed, so there is nothing left to
              # orphan; a healthy tenant's children uninstall well within the
              # timeout and never reach the force path.
              if ! kubectl -n {{ .Release.Namespace }} delete helmreleases.helm.toolkit.fluxcd.io \
                   -l "cozystack.io/target-cluster-name={{ .Release.Name }}" \
                   --ignore-not-found=true --wait=true --timeout=120s; then
                echo "WARNING: child HelmReleases for {{ .Release.Name }} did not uninstall within timeout (tenant likely has no working nodes); force-clearing their finalizers so teardown can proceed" >&2
                for hr in $(kubectl -n {{ .Release.Namespace }} get helmreleases.helm.toolkit.fluxcd.io -l "cozystack.io/target-cluster-name={{ .Release.Name }}" -o name 2>/dev/null || true); do
                  [ -n "$hr" ] || continue
                  echo "  Force-clearing finalizers on $hr"
                  kubectl -n {{ .Release.Namespace }} patch "$hr" \
                    --type=merge -p '{"metadata":{"finalizers":null}}' \
                    || echo "WARNING: failed to clear finalizers on $hr" >&2
                done
              fi

              echo "Step 3: Deleting KamajiControlPlane {{ .Release.Name }}"
              # Fire-and-forget (--wait=false): unlike the child HelmReleases in
              # Step 2 — whose Flux finalizer only clears once helm-controller can
              # uninstall INSIDE the tenant cluster (impossible with no Ready
              # nodes) — the KamajiControlPlane is finalized by the Kamaji/CAPI
              # controllers in THIS management cluster, so its teardown does not
              # depend on tenant node health and cannot hang on the nodeless
              # condition (#3271). kubectl delete defaults to --wait=true; waiting
              # here would only block this hook on the same TCP teardown that
              # Step 4 already handles with a bounded wait + Step 4b backstop — an
              # unbounded wait here would run first and defeat that backstop. So
              # trigger deletion and move on; Step 4 owns the bounded TCP wait.
              kubectl -n {{ .Release.Namespace }} delete kamajicontrolplanes.controlplane.cluster.x-k8s.io {{ .Release.Name }} \
                --ignore-not-found=true --wait=false \
                || echo "WARNING: failed to trigger deletion of KamajiControlPlane {{ .Release.Name }}; Step 4 will still attempt the TenantControlPlane" >&2

              echo "Step 4: Deleting TenantControlPlane {{ .Release.Name }} and waiting for it to be removed"
              # --wait=true blocks until the TenantControlPlane object is fully
              # gone. This is required so that Kamaji's TCP finalizer-cleanup
              # chain (which strips finalizer.kamaji.clastix.io/datastore-secret
              # off the <release>-datastore-config Secret) has a chance to run
              # before we fall through to Step 4b. A short --timeout keeps the
              # hook from hanging forever if Kamaji is unreachable; Step 4b is
              # the backstop for that case.
              kubectl -n {{ .Release.Namespace }} delete tenantcontrolplanes.kamaji.clastix.io {{ .Release.Name }} \
                --ignore-not-found=true --wait=true --timeout=120s \
                || echo "WARNING: TenantControlPlane {{ .Release.Name }} did not delete within timeout; relying on the Step 4b finalizer backstop" >&2

              echo "Step 4b: Clearing leftover Kamaji datastore-secret finalizer on {{ .Release.Name }}-datastore-config"
              # Kamaji creates a per-tenant datastore connection Secret named
              # <tcp-name>-datastore-config (tcp-name == .Release.Name) and adds
              # the finalizer "finalizer.kamaji.clastix.io/datastore-secret" to
              # it. That finalizer is normally removed by Kamaji as part of the
              # TenantControlPlane deletion above. If the TCP was force-deleted,
              # or Kamaji did not reconcile the removal in time, the finalizer
              # stays on the Secret and blocks deletion of the entire namespace
              # (the Secret cannot be garbage-collected, see issue #3062).
              #
              # By this point the TenantControlPlane is gone (Step 4 waited for
              # it), so Kamaji no longer has any legitimate use for this Secret:
              # the Secret has an ownerReference to the now-deleted TCP and is
              # only awaiting garbage collection. Stripping the finalizer here is
              # therefore safe and merely lets the GC reap it. We only patch the
              # finalizers field of this one named Secret.
              # Only clear the finalizer if the TenantControlPlane is actually gone.
              # Step 4 may have timed out with the TCP still present; in that case
              # Kamaji still legitimately owns the datastore Secret, and stripping
              # the finalizer would interfere with its lifecycle management. Gate
              # the patch on the TCP being confirmed absent (CodeRabbit #3078).
              if kubectl -n {{ .Release.Namespace }} get tenantcontrolplanes.kamaji.clastix.io {{ .Release.Name }} >/dev/null 2>&1; then
                echo "  TenantControlPlane {{ .Release.Name }} still present (deletion not complete); leaving the datastore-secret finalizer untouched"
              elif kubectl -n {{ .Release.Namespace }} get secret {{ .Release.Name }}-datastore-config >/dev/null 2>&1; then
                echo "  Removing finalizers from secret/{{ .Release.Name }}-datastore-config"
                kubectl -n {{ .Release.Namespace }} patch secret {{ .Release.Name }}-datastore-config \
                  --type=merge -p '{"metadata":{"finalizers":null}}' \
                  || echo "WARNING: failed to clear datastore-secret finalizer for {{ .Release.Name }}; the namespace may stay in Terminating (issue #3062)" >&2
              else
                echo "  Secret {{ .Release.Name }}-datastore-config not present; nothing to do"
              fi

              echo "Step 5: Cleaning up DataVolumes"
              # Fire-and-forget (--wait=false): DataVolumes and their backing PVCs
              # live in THIS management cluster and are finalized by CDI and the
              # CSI driver here, independent of tenant node health — so, like
              # Step 3, deletion cannot hang on the nodeless condition (#3271).
              # kubectl delete defaults to --wait=true, which would block this
              # hook until every worker-disk PVC is physically reclaimed; under
              # storage pressure that can exceed the parent Helm uninstall budget
              # and wedge the whole teardown. Deleting the Kubernetes CR only
              # TRIGGERS this reclaim anyway — the actual VM/PVC drain is waited
              # on separately and best-effort by the caller (e.g. the e2e
              # cozy_wait_tenant_drained barrier), NOT on the CR-finalization
              # path. Do NOT force-clear a stuck PVC/DataVolume finalizer here:
              # that would orphan the LINSTOR backing volume. A genuinely wedged
              # PVC is a storage-layer problem and surfaces honestly as a
              # Terminating namespace rather than being masked.
              kubectl -n {{ .Release.Namespace }} delete datavolumes \
                -l "cluster.x-k8s.io/cluster-name={{ .Release.Name }}" \
                --ignore-not-found=true --wait=false \
                || echo "WARNING: failed to trigger deletion of DataVolumes for {{ .Release.Name }}" >&2

              echo "Step 6: Cleaning up LoadBalancer Services"
              # Fire-and-forget (--wait=false): these LoadBalancer Services are
              # reconciled by the management cluster's LB controller (MetalLB /
              # kube-vip), so their teardown does not depend on tenant node
              # health. kubectl delete defaults to --wait=true; there is nothing
              # to wait for on the CR-finalization path here — trigger the delete
              # and let the LB controller release the address asynchronously.
              kubectl -n {{ .Release.Namespace }} delete services \
                -l "cluster.x-k8s.io/cluster-name={{ .Release.Name }}" \
                --field-selector spec.type=LoadBalancer \
                --ignore-not-found=true --wait=false \
                || echo "WARNING: failed to trigger deletion of LoadBalancer Services for {{ .Release.Name }}" >&2

              echo "Cleanup completed successfully"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-cleanup
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation,hook-failed
    helm.sh/hook-weight: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation,hook-failed
    "helm.sh/hook-weight": "5"
  name: {{ .Release.Name }}-cleanup
rules:
  - apiGroups:
      - "helm.toolkit.fluxcd.io"
    resources:
      - helmreleases
    verbs:
      - get
      - list
      - watch
      - patch
      - delete
  - apiGroups:
      - "controlplane.cluster.x-k8s.io"
    resources:
      - kamajicontrolplanes
    verbs:
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - "kamaji.clastix.io"
    resources:
      - tenantcontrolplanes
    verbs:
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - "cdi.kubevirt.io"
    resources:
      - datavolumes
    verbs:
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
      - delete
  # Scoped to the single Kamaji datastore connection Secret so Step 4b can
  # strip the leftover finalizer.kamaji.clastix.io/datastore-secret finalizer
  # (issue #3062). resourceNames limits get/patch to exactly this Secret.
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - {{ .Release.Name }}-datastore-config
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation,hook-failed
    "helm.sh/hook-weight": "5"
  name: {{ .Release.Name }}-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-cleanup
    namespace: {{ .Release.Namespace }}
