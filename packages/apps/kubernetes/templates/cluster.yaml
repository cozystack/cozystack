{{- /*
  Talos -> Kubernetes support matrix. Each Talos minor release supports a
  bounded window of Kubernetes minor versions; running a kubelet outside
  that window produces a silently broken Talos+kubelet combination that
  HelmRelease cannot detect. Fail the chart render instead, so the operator
  sees the mismatch in Flux/dashboards before workers roll over.
  Source: https://docs.siderolabs.com/talos/v1.13/getting-started/support-matrix
*/}}
{{- $talosK8sSupportMatrix := dict
      "v1.13.0" (list "v1.31" "v1.32" "v1.33" "v1.34" "v1.35" "v1.36")
}}
{{- $chartTalosVersion := "v1.13.0" }}
{{- $supportedK8s := index $talosK8sSupportMatrix $chartTalosVersion }}
{{- if not (has .Values.version $supportedK8s) }}
{{-   fail (printf "Kubernetes %s is not supported by Talos %s. Supported versions: %v. Bump tenant 'version' (or this chart's Talos image)." .Values.version $chartTalosVersion $supportedK8s) }}
{{- end }}
{{- $etcd := .Values._namespace.etcd }}
{{- /*
  When $etcd is empty, the parent Tenant application has not populated
  _namespace.etcd in cozystack-values yet - either the operator forgot to
  set etcd: true on an ancestor Tenant, or the Tenant HelmRelease is still
  reconciling. Either way, rendering a KamajiControlPlane with an empty
  dataStoreName would be rejected by Kamaji's admission webhook and the
  HelmRelease would fail to install, triggering remediation. Instead, emit
  a single ConfigMap as a user-visible status beacon and skip the rest so
  flux marks the HelmRelease Ready and retries its 5m reconcile loop until
  the Tenant chart catches up.
*/}}
{{- $ingress := .Values._namespace.ingress }}
{{- $host := .Values._namespace.host }}
{{- $kubevirtmachinetemplateNames := list }}
{{- define "kubevirtmachinetemplate" -}}
spec:
  {{- /* Talos has no SSH; use 'none' so CAPK does not block Machine.Ready
        on an SSH probe that will never succeed. The Machine reaches Ready
        once kubelet registers with the tenant apiserver via standard CSR. */}}
  virtualMachineBootstrapCheck:
    checkStrategy: none
  virtualMachineTemplate:
    metadata:
      namespace: {{ $.Release.Namespace }}
      labels:
        {{- range .group.roles }}
        node-role.kubernetes.io/{{ . }}: ""
        {{- end }}
    spec:
      {{- with .group.instanceType }}
      instancetype:
        kind: VirtualMachineClusterInstancetype
        name: {{ . }}
      {{- end }}
      runStrategy: Always
      dataVolumeTemplates:
      - metadata:
          name: disk-system
          annotations:
            cdi.kubevirt.io/storage.usePopulator: "false"
        spec:
          {{- /* Use the openstack/configdrive Talos image: KubeVirt CAPK
                injects bootstrap data via cloudInitConfigDrive (OpenStack
                metadata service shape), and the openstack platform image
                is the one that reads it. The nocloud-amd64 image silently
                ignores configdrive and never applies the machineconfig. */}}
          source:
            http:
              url: https://factory.talos.dev/image/ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515/v1.13.0/openstack-amd64.raw.xz
          {{- if hasKey .group "ephemeralStorage" }}
          {{- fail (printf "nodeGroup %q: ephemeralStorage is no longer supported. Rename it to diskSize. See README.md for migration instructions." .groupName) }}
          {{- end }}
          storage:
            resources:
              requests:
                storage: {{ .group.diskSize | default "20Gi" | quote }}
            {{- with .group.storageClass }}
            storageClassName: {{ . | quote }}
            {{- end }}
      template:
        metadata:
          annotations:
            kubevirt.io/allow-pod-bridge-network-live-migration: "true"
          labels:
            {{- range .group.roles }}
            node-role.kubernetes.io/{{ . }}: ""
            {{- end }}
            cluster.x-k8s.io/deployment-name: {{ $.Release.Name }}-{{ .groupName }}
        spec:
          {{- if .Values._cluster.scheduling }}
          {{- $rawConstraints := get .Values._cluster.scheduling "globalAppTopologySpreadConstraints" }}
          {{- if $rawConstraints }}
          {{- $rawConstraints | fromYaml | toYaml | nindent 10 }}
            labelSelector:
              matchLabels:
                cluster.x-k8s.io/cluster-name: {{ $.Release.Name }}
          {{- end }}
          {{- end }}
          domain:
            {{- if and .group.resources .group.resources.cpu }}
            cpu:
              threads: 1
              cores: {{ .group.resources.cpu }}
              sockets: 1
            {{- end }}
            devices:
              {{- if .group.gpus }}
              gpus:
              {{- range $i, $gpu := .group.gpus }}
              - name: gpu{{ add $i 1 }}
                deviceName: {{ $gpu.name }}
              {{- end }}
              {{- end }}
              disks:
              - name: system
                disk:
                  bus: virtio
                  pciAddress: 0000:07:00.0
                blockSize:
                  custom:
                    logical: 512
                    physical: 4096
              interfaces:
              - name: default
                bridge: {}
            {{- if and .group.resources .group.resources.memory }}
            memory:
              guest: {{ .group.resources.memory }}
            {{- end }}
            resources:
              {{/* 2Gi is enough: persistent DataVolumes are not counted as pod ephemeral storage */}}
              {{- include "cozy-lib.resources.sanitize" (list (dict "ephemeral-storage" "2Gi") $) | nindent 14 }}
          evictionStrategy: External
          volumes:
          - name: system
            dataVolume:
              name: disk-system
          networks:
          - name: default
            pod: {}
{{- end }}
{{- if not $etcd }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-awaiting-etcd
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: kubernetes
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  status: "awaiting-etcd"
  message: |
    No DataStore is available for this tenant Kubernetes cluster. The parent
    Tenant application has not populated _namespace.etcd. Set spec.etcd: true
    on an ancestor Tenant (usually tenant-root) and wait for its HelmRelease
    to reconcile - this HelmRelease will pick up the DataStore on its next
    5m reconcile loop and provision the cluster.
{{- else }}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      - 10.243.0.0/16
    services:
      cidrBlocks:
      - 10.95.0.0/16
  controlPlaneRef:
    namespace: {{ .Release.Namespace }}
    apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
    kind: KamajiControlPlane
    name: {{ .Release.Name }}
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubevirtCluster
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
kind: KamajiControlPlane
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    cluster.x-k8s.io/role: control-plane
  annotations:
    kamaji.clastix.io/kubeconfig-secret-key: "super-admin.svc"
spec:
  apiServer:
    resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.controlPlane.apiServer.resourcesPreset .Values.controlPlane.apiServer.resources $) | nindent 6 }}
  controllerManager:
    resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.controlPlane.controllerManager.resourcesPreset .Values.controlPlane.controllerManager.resources $) | nindent 6 }}
  scheduler:
    resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.controlPlane.scheduler.resourcesPreset .Values.controlPlane.scheduler.resources $) | nindent 6 }}
  dataStoreName: "{{ $etcd }}"
  addons:
    konnectivity:
      {{- $konnVersion := include "kubernetes.konnectivityVersion" $ | trim }}
      {{- if $konnVersion }}
      agent:
        version: {{ $konnVersion }}
      {{- end }}
      server:
        port: 8132
        {{- if $konnVersion }}
        version: {{ $konnVersion }}
        {{- end }}
        resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.controlPlane.konnectivity.server.resourcesPreset .Values.controlPlane.konnectivity.server.resources $) | nindent 10 }}
  kubelet:
    cgroupfs: systemd
    preferredAddressTypes:
    - InternalIP
    - ExternalIP
  network:
    serviceType: ClusterIP
    ingress:
      extraAnnotations:
        nginx.ingress.kubernetes.io/ssl-passthrough: "true"
      hostname: {{ .Values.host | default (printf "%s.%s" .Release.Name $host) }}:443
      className: "{{ $ingress }}"
    additionalServicePorts:
      - name: talos-trustd
        port: 50001
        targetPort: 50001
        protocol: TCP
    {{- /* Talos workers point at the apiserver Service ClusterIP (see
           controlPlane.endpoint in the worker machineconfig); include
           that IP and the short/long Service FQDNs in the apiserver
           cert so Talos's internal controllers don't trip on TLS. */}}
    certSANs:
      - {{ printf "%s.%s.svc" .Release.Name .Release.Namespace }}
      - {{ printf "%s.%s.svc.cluster.local" .Release.Name .Release.Namespace }}
      {{- $kcpSvcForSANs := lookup "v1" "Service" .Release.Namespace .Release.Name }}
      {{- if and $kcpSvcForSANs $kcpSvcForSANs.spec.clusterIP }}
      - {{ $kcpSvcForSANs.spec.clusterIP }}
      {{- end }}
  deployment:
    podAdditionalMetadata:
      labels:
        policy.cozystack.io/allow-to-etcd: "true"
    extraContainers:
      - name: talos-csr-signer
        image: ghcr.io/clastix/talos-csr-signer:latest
        imagePullPolicy: IfNotPresent
        ports:
          - name: trustd
            containerPort: 50001
            protocol: TCP
        env:
          - name: TALOS_TOKEN
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-talos-secrets
                key: token
        volumeMounts:
          - name: talos-ca
            mountPath: /etc/talos-ca
            readOnly: true
          - name: talos-tls-cert
            mountPath: /etc/talos-server-crt
            readOnly: true
    extraVolumes:
      - name: talos-ca
        secret:
          secretName: {{ .Release.Name }}-talos-ca
      - name: talos-tls-cert
        secret:
          secretName: {{ .Release.Name }}-talos-tls-cert
  replicas: {{ .Values.controlPlane.replicas }}
  version: {{ include "kubernetes.versionMap" $ }}
---
apiVersion: cozystack.io/v1alpha1
kind: WorkloadMonitor
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 2
  minReplicas: 1
  kind: kubernetes
  type: control-plane
  selector:
    kamaji.clastix.io/component: deployment
    kamaji.clastix.io/name: {{ .Release.Name }}
  version: {{ $.Chart.Version }}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtCluster
metadata:
  annotations:
    cluster.x-k8s.io/managed-by: kamaji
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
{{- range $groupName, $group := .Values.nodeGroups }}
{{/* Resolve instanceType once per group — reused for kubelet reservations and capacity annotations. */}}
{{- $instanceType := dict }}
{{- if $group.instanceType }}
{{-   $instanceType = (lookup "instancetype.kubevirt.io/v1beta1" "VirtualMachineClusterInstancetype" "" $group.instanceType) }}
{{-   if not $instanceType }}
{{-     fail (printf "nodeGroup %s: specified instanceType %q not found in cluster" $groupName $group.instanceType) }}
{{-   end }}
{{- end }}
{{/* Compute kubelet reservations: explicit resources.memory/cpu wins over instanceType spec.
     Auto-computed system/kube reserved memory = 5% of effective memory, clamped to [256Mi, 1Gi].
     Auto-computed system/kube reserved CPU = 5% of effective CPU, clamped to [50m, 500m]. */}}
{{- $effectiveMemory := "" }}
{{- if and $group.resources $group.resources.memory }}
{{-   $effectiveMemory = $group.resources.memory | toString }}
{{- else if and $instanceType $instanceType.spec $instanceType.spec.memory $instanceType.spec.memory.guest }}
{{-   $effectiveMemory = $instanceType.spec.memory.guest | toString }}
{{- end }}
{{- $effectiveCpu := "" }}
{{- if and $group.resources $group.resources.cpu }}
{{-   $effectiveCpu = $group.resources.cpu | toString }}
{{- else if and $instanceType $instanceType.spec $instanceType.spec.cpu $instanceType.spec.cpu.guest }}
{{-   $effectiveCpu = $instanceType.spec.cpu.guest | toString }}
{{- end }}
{{- $autoReservedMi := 256 }}
{{- if $effectiveMemory }}
{{-   $effectiveMemMi := divf (include "cozy-lib.resources.toFloat" $effectiveMemory | float64) 1048576.0 | int }}
{{-   $fivePercentMi := mulf ($effectiveMemMi | float64) 0.05 | int }}
{{-   $autoReservedMi = min (max $fivePercentMi 256) 1024 }}
{{- end }}
{{- $autoReservedMillicores := 50 }}
{{- if $effectiveCpu }}
{{-   $effectiveCpuMillicores := include "kubernetes.cpuToMillicores" $effectiveCpu | int }}
{{-   $fivePercentMillis := mulf ($effectiveCpuMillicores | float64) 0.05 | int }}
{{-   $autoReservedMillicores = min (max $fivePercentMillis 50) 500 }}
{{- end }}
{{- $kubeletOverride := $group.kubelet | default dict }}
{{- $systemReservedMemory := $kubeletOverride.systemReservedMemory | default (printf "%dMi" $autoReservedMi) }}
{{- $kubeReservedMemory := $kubeletOverride.kubeReservedMemory | default (printf "%dMi" $autoReservedMi) }}
{{- $systemReservedCpu := $kubeletOverride.systemReservedCpu | default (printf "%dm" $autoReservedMillicores) }}
{{- $kubeReservedCpu := $kubeletOverride.kubeReservedCpu | default (printf "%dm" $autoReservedMillicores) }}
{{- $evictionHardMemory := $kubeletOverride.evictionHardMemory | default "7%" }}
{{- $evictionSoftMemory := $kubeletOverride.evictionSoftMemory | default "10%" }}
{{/* Validate reservation field formats.
  These guards check the USER-SUPPLIED value (from values.yaml via
  $kubeletOverride), not the resolved/computed default — the default is
  always valid by construction.  The eviction threshold validation below
  differs: it validates the RESOLVED values (user-supplied or default). */}}
{{- $validations := list
      (dict "key" "systemReservedMemory" "value" $kubeletOverride.systemReservedMemory "pattern" `^[0-9]+(\.[0-9]+)?([eE][+-]?[0-9]+)?(Ki|Mi|Gi|Ti|Pi|Ei|k|M|G|T|P|E)?$` "hint" "a valid Kubernetes memory quantity (e.g. 128Mi, 1Gi, 1e9, 500e6)")
      (dict "key" "kubeReservedMemory"   "value" $kubeletOverride.kubeReservedMemory   "pattern" `^[0-9]+(\.[0-9]+)?([eE][+-]?[0-9]+)?(Ki|Mi|Gi|Ti|Pi|Ei|k|M|G|T|P|E)?$` "hint" "a valid Kubernetes memory quantity (e.g. 128Mi, 1Gi, 1e9, 500e6)")
      (dict "key" "systemReservedCpu"    "value" $kubeletOverride.systemReservedCpu    "pattern" `^([0-9]+m|[0-9]+(\.[0-9]+)?)$`                                                              "hint" "a valid Kubernetes CPU quantity (integer millicores like 100m, or decimal cores like 0.5, 1)")
      (dict "key" "kubeReservedCpu"      "value" $kubeletOverride.kubeReservedCpu      "pattern" `^([0-9]+m|[0-9]+(\.[0-9]+)?)$`                                                              "hint" "a valid Kubernetes CPU quantity (integer millicores like 100m, or decimal cores like 0.5, 1)")
}}
{{- range $validations }}
{{-   if and .value (not (regexMatch .pattern (.value | toString))) }}
{{-     fail (printf "nodeGroup %s: invalid %s value %q — must be %s" $groupName .key (.value | toString) .hint) }}
{{-   end }}
{{- end }}
{{/* Validate that user-supplied reservation values are positive (non-zero) */}}
{{- range $_, $entry := list (dict "key" "systemReservedMemory" "value" $kubeletOverride.systemReservedMemory) (dict "key" "kubeReservedMemory" "value" $kubeletOverride.kubeReservedMemory) }}
{{-   if $entry.value }}
{{-     $bytes := include "cozy-lib.resources.toFloat" ($entry.value | toString) | float64 }}
{{-     if le $bytes 0.0 }}
{{-       fail (printf "nodeGroup %s: %s must be a positive value, got %s" $groupName $entry.key ($entry.value | toString)) }}
{{-     end }}
{{-   end }}
{{- end }}
{{- range $_, $entry := list (dict "key" "systemReservedCpu" "value" $kubeletOverride.systemReservedCpu) (dict "key" "kubeReservedCpu" "value" $kubeletOverride.kubeReservedCpu) }}
{{-   if $entry.value }}
{{-     $cpuMillis := include "kubernetes.cpuToMillicores" $entry.value | float64 }}
{{-     if le $cpuMillis 0.0 }}
{{-       fail (printf "nodeGroup %s: %s must be a positive value, got %s" $groupName $entry.key ($entry.value | toString)) }}
{{-     end }}
{{-   end }}
{{- end }}
{{/* Validate absolute eviction threshold formats before converting */}}
{{- if not (hasSuffix "%" $evictionHardMemory) }}
{{-   if not (regexMatch `^[0-9]+(\.[0-9]+)?([eE][+-]?[0-9]+)?(Ki|Mi|Gi|Ti|Pi|Ei|k|M|G|T|P|E)?$` $evictionHardMemory) }}
{{-     fail (printf "nodeGroup %s: invalid evictionHardMemory value %q — must be a percentage (e.g. 7%%) or a valid Kubernetes memory quantity (e.g. 500Mi, 1Gi, 1e9)" $groupName $evictionHardMemory) }}
{{-   end }}
{{- end }}
{{- if not (hasSuffix "%" $evictionSoftMemory) }}
{{-   if not (regexMatch `^[0-9]+(\.[0-9]+)?([eE][+-]?[0-9]+)?(Ki|Mi|Gi|Ti|Pi|Ei|k|M|G|T|P|E)?$` $evictionSoftMemory) }}
{{-     fail (printf "nodeGroup %s: invalid evictionSoftMemory value %q — must be a percentage (e.g. 10%%) or a valid Kubernetes memory quantity (e.g. 500Mi, 1Gi, 1e9)" $groupName $evictionSoftMemory) }}
{{-   end }}
{{- end }}
{{- if and (hasSuffix "%" $evictionHardMemory) (hasSuffix "%" $evictionSoftMemory) }}
{{-   $hardPctStr := trimSuffix "%" $evictionHardMemory }}
{{-   $softPctStr := trimSuffix "%" $evictionSoftMemory }}
{{-   if not (regexMatch `^[0-9]+(\.[0-9]+)?$` $hardPctStr) }}
{{-     fail (printf "nodeGroup %s: evictionHardMemory percentage value %q is not a valid number" $groupName $hardPctStr) }}
{{-   end }}
{{-   if not (regexMatch `^[0-9]+(\.[0-9]+)?$` $softPctStr) }}
{{-     fail (printf "nodeGroup %s: evictionSoftMemory percentage value %q is not a valid number" $groupName $softPctStr) }}
{{-   end }}
{{-   $hardPct := $hardPctStr | float64 }}
{{-   $softPct := $softPctStr | float64 }}
{{-   if le $hardPct 0.0 }}
{{-     fail (printf "nodeGroup %s: evictionHardMemory percentage must be greater than 0 and at most 100, got %s%%" $groupName $hardPctStr) }}
{{-   end }}
{{-   if gt $hardPct 100.0 }}
{{-     fail (printf "nodeGroup %s: evictionHardMemory percentage must be greater than 0 and at most 100, got %s%%" $groupName $hardPctStr) }}
{{-   end }}
{{-   if le $softPct 0.0 }}
{{-     fail (printf "nodeGroup %s: evictionSoftMemory percentage must be greater than 0 and at most 100, got %s%%" $groupName $softPctStr) }}
{{-   end }}
{{-   if gt $softPct 100.0 }}
{{-     fail (printf "nodeGroup %s: evictionSoftMemory percentage must be greater than 0 and at most 100, got %s%%" $groupName $softPctStr) }}
{{-   end }}
{{-   if ge $hardPct $softPct }}
{{-     fail (printf "nodeGroup %s: evictionHardMemory (%s) must be strictly less than evictionSoftMemory (%s)" $groupName $evictionHardMemory $evictionSoftMemory) }}
{{-   end }}
{{- else if and (not (hasSuffix "%" $evictionHardMemory)) (not (hasSuffix "%" $evictionSoftMemory)) }}
{{-   $hardBytes := include "cozy-lib.resources.toFloat" $evictionHardMemory | float64 }}
{{-   $softBytes := include "cozy-lib.resources.toFloat" $evictionSoftMemory | float64 }}
{{-   if ge $hardBytes $softBytes }}
{{-     fail (printf "nodeGroup %s: evictionHardMemory (%s) must be strictly less than evictionSoftMemory (%s)" $groupName $evictionHardMemory $evictionSoftMemory) }}
{{-   end }}
{{- else }}
{{-   fail (printf "nodeGroup %s: evictionHardMemory (%s) and evictionSoftMemory (%s) must use the same unit type (both percentage or both absolute)" $groupName $evictionHardMemory $evictionSoftMemory) }}
{{- end }}
{{/* Resolve eviction hard threshold to bytes for arithmetic.
     Percentage is relative to effective node memory; absolute values are used as-is. */}}
{{- $evictionHardBytes := 0.0 }}
{{- if $effectiveMemory }}
{{-   if hasSuffix "%" $evictionHardMemory }}
{{-     $evictionPct := trimSuffix "%" $evictionHardMemory | float64 }}
{{-     $evictionHardBytes = mulf (include "cozy-lib.resources.toFloat" $effectiveMemory | float64) (divf $evictionPct 100.0) }}
{{-   else }}
{{-     $evictionHardBytes = include "cozy-lib.resources.toFloat" $evictionHardMemory | float64 }}
{{-   end }}
{{- end }}
{{/* Validate that total reserved memory (system + kube + eviction) does not exceed effective node memory */}}
{{- if $effectiveMemory }}
{{-   $sysBytes := include "cozy-lib.resources.toFloat" $systemReservedMemory | float64 }}
{{-   $kubeBytes := include "cozy-lib.resources.toFloat" $kubeReservedMemory | float64 }}
{{-   $totalReservedBytes := addf (addf $sysBytes $kubeBytes) $evictionHardBytes }}
{{-   $effectiveMemBytes := include "cozy-lib.resources.toFloat" $effectiveMemory | float64 }}
{{-   if ge $totalReservedBytes $effectiveMemBytes }}
{{-     fail (printf "nodeGroup %s: total reserved memory (systemReservedMemory=%s + kubeReservedMemory=%s + evictionHardMemory=%s) must be less than effective node memory (%s)" $groupName $systemReservedMemory $kubeReservedMemory $evictionHardMemory $effectiveMemory) }}
{{-   end }}
{{- end }}
{{/* Validate that total reserved CPU does not exceed effective node CPU */}}
{{- if $effectiveCpu }}
{{-   $sysCpuMillis := include "kubernetes.cpuToMillicores" $systemReservedCpu | float64 }}
{{-   $kubeCpuMillis := include "kubernetes.cpuToMillicores" $kubeReservedCpu | float64 }}
{{-   $totalCpuMillis := addf $sysCpuMillis $kubeCpuMillis }}
{{-   $effectiveCpuMillicoresV := include "kubernetes.cpuToMillicores" $effectiveCpu | int }}
{{-   $effectiveCpuMillis := float64 $effectiveCpuMillicoresV }}
{{-   if ge $totalCpuMillis $effectiveCpuMillis }}
{{-     fail (printf "nodeGroup %s: total reserved CPU (systemReservedCpu=%s + kubeReservedCpu=%s) must be less than effective node CPU (%s cores)" $groupName $systemReservedCpu $kubeReservedCpu $effectiveCpu) }}
{{-   end }}
{{- end }}
{{/* Guard: explicit kubelet overrides require effective memory for validation */}}
{{- if not $effectiveMemory }}
{{-   $hasOverride := or $kubeletOverride.systemReservedMemory $kubeletOverride.kubeReservedMemory $kubeletOverride.evictionHardMemory $kubeletOverride.evictionSoftMemory }}
{{-   if $hasOverride }}
{{-     fail (printf "nodeGroup %s: kubelet memory reservations require effective memory to validate — set resources.memory or instanceType" $groupName) }}
{{-   end }}
{{- end }}
{{/* Guard: explicit kubelet CPU overrides require effective CPU for validation */}}
{{- if not $effectiveCpu }}
{{-   $hasCpuOverride := or $kubeletOverride.systemReservedCpu $kubeletOverride.kubeReservedCpu }}
{{-   if $hasCpuOverride }}
{{-     fail (printf "nodeGroup %s: cannot validate kubelet CPU reservations without effective CPU — set resources.cpu or a valid instanceType" $groupName) }}
{{-   end }}
{{- end }}
---
{{- /*
  TalosConfigTemplate produces the raw Talos worker machineconfig as
  spec.template.spec.data, with generateType=none so that CABPT only
  packages it as bootstrap data (no Talos PKI generation on the CABPT
  side — Cozystack owns the PKI via cert-manager and the
  <release>-talos-secrets Secret).

  Values come from three Secrets reconciled by other parts of this chart:
    <release>-talos-secrets     - random tokens + cluster id/secret
    <release>-talos-ca          - cert-manager-issued Ed25519 Talos CA
    <release>-ca                - Kamaji-issued k8s CA

  If any dependency Secret is not ready yet (cert-manager and Kamaji are
  async), the template fails. Flux retries the HelmRelease on its own
  cadence until everything is in place.
*/}}
{{- /*
  Render this nodeGroup's TalosConfigTemplate only when all of its
  dependency Secrets exist. On a first install of the chart these
  Secrets become available asynchronously:
    <release>-talos-secrets - rendered by this chart (always present)
    <release>-talos-ca      - issued by cert-manager (seconds after
                              the Certificate resource lands)
    <release>-ca            - generated by Kamaji once the
                              KamajiControlPlane is up

  If any of them is missing we skip the TalosConfigTemplate document.
  CAPI's Machine controller does not create new Machines until the
  bootstrap configRef resolves, so the MachineDeployment below is safe
  to keep referencing the eventual TCT name; once the chart is
  re-reconciled and all Secrets are ready, TCT is created and CAPI
  picks up. Flux re-reconciles every interval.
*/}}
{{- $talosSecrets := lookup "v1" "Secret" $.Release.Namespace (printf "%s-talos-secrets" $.Release.Name) }}
{{- $talosCA := lookup "v1" "Secret" $.Release.Namespace (printf "%s-talos-ca" $.Release.Name) }}
{{- $k8sCA := lookup "v1" "Secret" $.Release.Namespace (printf "%s-ca" $.Release.Name) }}
{{- $talosReady := and (and $talosSecrets $talosCA) (and (index $talosCA.data "tls.crt" | default "") (and $k8sCA (index $k8sCA.data "ca.crt" | default ""))) }}
{{- /* Also gate on the apiserver Service existing so we can embed its
       ClusterIP into the worker machineconfig. */}}
{{- $apiSvcLookup := lookup "v1" "Service" $.Release.Namespace $.Release.Name }}
{{- $talosReady = and $talosReady (and $apiSvcLookup $apiSvcLookup.spec.clusterIP) }}
{{- if $talosReady }}
{{- $talosToken := index $talosSecrets.data "token" | b64dec }}
{{- $clusterId := index $talosSecrets.data "clusterId" | b64dec }}
{{- $clusterSecret := index $talosSecrets.data "clusterSecret" | b64dec }}
{{- $bootstrapToken := index $talosSecrets.data "bootstrapToken" | b64dec }}
{{- $talosCACrt := index $talosCA.data "tls.crt" }}
{{- $k8sCACrt := index $k8sCA.data "ca.crt" }}
{{- /* Talos boots before any cluster DNS exists, so the apiserver
       endpoint cannot depend on Kubernetes/CoreDNS resolution. Use the
       ClusterIP of the Kamaji-managed apiserver Service directly. */}}
{{- $apiSvc := lookup "v1" "Service" $.Release.Namespace $.Release.Name }}
{{- $apiSvcIP := "" }}
{{- if $apiSvc }}
{{-   $apiSvcIP = $apiSvc.spec.clusterIP }}
{{- end }}
{{- $apiEndpoint := printf "%s:6443" $apiSvcIP }}
{{- $kubeletVersion := include "kubernetes.versionMap" $ | trim }}
{{- $talosVersion := "v1.13.0" }}
{{- $talosSchematic := "ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515" }}
apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
kind: TalosConfigTemplate
metadata:
  name: {{ $.Release.Name }}-{{ $groupName }}
  namespace: {{ $.Release.Namespace }}
spec:
  template:
    spec:
      generateType: none
      talosVersion: {{ $talosVersion | quote }}
      data: |
        version: v1alpha1
        persist: true
        machine:
          type: worker
          token: {{ $talosToken | quote }}
          ca:
            crt: {{ $talosCACrt | quote }}
          kubelet:
            image: ghcr.io/siderolabs/kubelet:{{ $kubeletVersion }}
            extraConfig:
              systemReserved:
                cpu: "{{ $systemReservedCpu }}"
                memory: "{{ $systemReservedMemory }}"
              kubeReserved:
                cpu: "{{ $kubeReservedCpu }}"
                memory: "{{ $kubeReservedMemory }}"
              evictionHard:
                memory.available: "{{ $evictionHardMemory }}"
                nodefs.available: "10%"
                imagefs.available: "15%"
                nodefs.inodesFree: "5%"
              evictionSoft:
                memory.available: "{{ $evictionSoftMemory }}"
                nodefs.available: "15%"
                imagefs.available: "20%"
              evictionSoftGracePeriod:
                memory.available: "1m30s"
                nodefs.available: "1m30s"
                imagefs.available: "1m30s"
              evictionMinimumReclaim:
                memory.available: "256Mi"
          install:
            disk: /dev/vda
            image: factory.talos.dev/installer/{{ $talosSchematic }}:{{ $talosVersion }}
            wipe: false
          features:
            rbac: true
            kubePrism:
              enabled: false
        cluster:
          id: {{ $clusterId | quote }}
          secret: {{ $clusterSecret | quote }}
          controlPlane:
            endpoint: https://{{ $apiEndpoint }}
          clusterName: {{ $.Release.Name | quote }}
          network:
            dnsDomain: cluster.local
            podSubnets:
              - 10.243.0.0/16
            serviceSubnets:
              - 10.95.0.0/16
          token: {{ $bootstrapToken | quote }}
          ca:
            crt: {{ $k8sCACrt | quote }}
          discovery:
            enabled: true
            registries:
              kubernetes:
                disabled: true
              service:
                disabled: true
{{- end }}{{/* if $talosReady */}}
---
{{- $context := deepCopy $ }}
{{- $_ := set $context "group" $group }}
{{- $_ := set $context "groupName" $groupName }}
{{- $kubevirtmachinetemplate := include "kubevirtmachinetemplate" $context }}
{{- $kubevirtmachinetemplateHash := $kubevirtmachinetemplate | sha256sum | trunc 6 }}
{{- $kubevirtmachinetemplateName := printf "%s-%s-%s" $.Release.Name $groupName $kubevirtmachinetemplateHash }}
{{- $kubevirtmachinetemplateNames = append $kubevirtmachinetemplateNames $kubevirtmachinetemplateName }}
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: {{ $.Release.Name }}-{{ $groupName }}-{{ $kubevirtmachinetemplateHash }}
  namespace: {{ $.Release.Namespace }}
spec:
  template:
    {{- $kubevirtmachinetemplate | nindent 4 }}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: {{ $.Release.Name }}-{{ $groupName }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "{{ $group.minReplicas }}"
    cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "{{ $group.maxReplicas }}"
    {{- if $effectiveMemory }}
    {{-   $sysBytes := include "cozy-lib.resources.toFloat" $systemReservedMemory | float64 }}
    {{-   $kubeBytes := include "cozy-lib.resources.toFloat" $kubeReservedMemory | float64 }}
    {{-   $totalReservedBytes := addf (addf $sysBytes $kubeBytes) $evictionHardBytes }}
    {{-   $allocatableBytes := subf (include "cozy-lib.resources.toFloat" $effectiveMemory | float64) $totalReservedBytes }}
    {{-   $allocatableMi := divf $allocatableBytes 1048576.0 | floor }}
    capacity.cluster-autoscaler.kubernetes.io/memory: "{{ $allocatableMi }}Mi"
    {{- end }}
    {{- if $effectiveCpu }}
    {{-   $sysCpuMillisA := include "kubernetes.cpuToMillicores" $systemReservedCpu | float64 }}
    {{-   $kubeCpuMillisA := include "kubernetes.cpuToMillicores" $kubeReservedCpu | float64 }}
    {{-   $effectiveCpuMillicoresA := include "kubernetes.cpuToMillicores" $effectiveCpu | int }}
    {{-   $effectiveCpuMillisA := float64 $effectiveCpuMillicoresA }}
    {{-   $allocatableCpuMillis := subf $effectiveCpuMillisA (addf $sysCpuMillisA $kubeCpuMillisA) }}
    {{-   $allocatableCpuMillisInt := $allocatableCpuMillis | ceil | int }}
    capacity.cluster-autoscaler.kubernetes.io/cpu: "{{ $allocatableCpuMillisInt }}m"
    {{- end }}
spec:
  clusterName: {{ $.Release.Name }}
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: {{ $group.maxReplicas }}
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ $.Release.Name }}
      cluster.x-k8s.io/deployment-name: {{ $.Release.Name }}-{{ $groupName }}
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: {{ $.Release.Name }}
        cluster.x-k8s.io/deployment-name: {{ $.Release.Name }}-{{ $groupName }}
        {{- range $group.roles }}
        node-role.kubernetes.io/{{ . }}: ""
        {{- end }}
    spec:
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
          kind: TalosConfigTemplate
          name: {{ $.Release.Name }}-{{ $groupName }}
          namespace: {{ $.Release.Namespace }}
      clusterName: {{ $.Release.Name }}
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubevirtMachineTemplate
        name: {{ $.Release.Name }}-{{ $groupName }}-{{ $kubevirtmachinetemplateHash }}
        namespace: {{ $.Release.Namespace }}
      version: {{ include "kubernetes.versionMap" $}}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineHealthCheck
metadata:
  name: {{ $.Release.Name }}-{{ $groupName }}
  namespace: {{ $.Release.Namespace }}
spec:
  clusterName: {{ $.Release.Name }}
  maxUnhealthy: 0
  nodeStartupTimeout: 10m
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ $.Release.Name }}
      cluster.x-k8s.io/deployment-name: {{ $.Release.Name }}-{{ $groupName }}
  unhealthyConditions:
  - type: Ready
    status: Unknown
    timeout: 30s
  - type: Ready
    status: "False"
    timeout: 300s
---
apiVersion: cozystack.io/v1alpha1
kind: WorkloadMonitor
metadata:
  name: {{ $.Release.Name }}-{{ $groupName }}
  namespace: {{ $.Release.Namespace }}
spec:
  minReplicas: {{ $group.minReplicas }}
  kind: kubernetes
  type: worker
  selector:
    cluster.x-k8s.io/cluster-name: {{ $.Release.Name }}
    cluster.x-k8s.io/deployment-name: {{ $.Release.Name }}-{{ $groupName }}
    cluster.x-k8s.io/role: worker
  version: {{ $.Chart.Version }}
{{- end }}
---
{{- /*
We must preserve all previous KubevirtMachineTemplates until a MachineSet references them.
*/ -}}
{{- $mss := (lookup "cluster.x-k8s.io/v1beta1" "MachineSet" $.Release.Namespace "").items }}
{{- $oldKubevirtmachinetemplates := dict }}
{{- range $kmt := (lookup "infrastructure.cluster.x-k8s.io/v1alpha1" "KubevirtMachineTemplate" .Release.Namespace "").items }}
{{- range $or := $kmt.metadata.ownerReferences }}
{{- if and (eq $or.kind "Cluster") (eq $or.name $.Release.Name) }}
{{- range $ms := $mss }}
{{- if and (eq $ms.spec.template.spec.infrastructureRef.kind "KubevirtMachineTemplate") (eq $ms.spec.template.spec.infrastructureRef.name $kmt.metadata.name) }}
{{- if not (has $kmt.metadata.name $kubevirtmachinetemplateNames) }}
{{- $oldKubevirtmachinetemplates = merge $oldKubevirtmachinetemplates (dict $kmt.metadata.name $kmt) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- range $oldKubevirtmachinetemplates }}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: {{ .metadata.name }}
  namespace: {{ .metadata.Namespace }}
spec:
  {{- .spec | toYaml | nindent 2 }}
{{- end }}
{{- end }}
