{{- define "cozystack.defaultCiliumValues" -}}
{{- /* Cilium DaemonSet runs with hostNetwork and gets the host's
       resolv.conf (the host cluster CoreDNS), which does not resolve
       <svc>.<ns>.svc. Bind to the Kamaji apiserver service ClusterIP
       directly. */}}
{{- $kcpSvc := lookup "v1" "Service" .Release.Namespace .Release.Name }}
{{- $kcpSvcIP := "" }}
{{- if $kcpSvc }}{{ $kcpSvcIP = $kcpSvc.spec.clusterIP }}{{ end }}
cilium:
  k8sServiceHost: {{ $kcpSvcIP | default (printf "%s.%s.svc" .Release.Name .Release.Namespace) }}
  k8sServicePort: 6443
  routingMode: tunnel
  MTU: 1350
  enableIPv4Masquerade: true
  ipv4NativeRoutingCIDR: ""
  {{- if $.Values.addons.gatewayAPI.enabled }}
  gatewayAPI:
    enabled: true
  envoy:
    enabled: true
  {{- end }}
{{- end }}

{{- if .Values._namespace.etcd }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ .Release.Name }}-cilium
  labels:
    cozystack.io/repository: system
    cozystack.io/target-cluster-name: {{ .Release.Name }}
    sharding.fluxcd.io/key: tenants
spec:
  releaseName: cilium
  chartRef:
    kind: ExternalArtifact
    name: cozystack-kubernetes-application-kubevirt-kubernetes-cilium
    namespace: cozy-system
  kubeConfig:
    secretRef:
      name: {{ .Release.Name }}-admin-kubeconfig
      key: super-admin.svc
  targetNamespace: cozy-cilium
  storageNamespace: cozy-cilium
  interval: 5m
  timeout: 10m
  install:
    createNamespace: true
    remediation:
      retries: -1
  upgrade:
    force: true
    remediation:
      retries: -1
  values:
    {{- toYaml (deepCopy .Values.addons.cilium.valuesOverride | mergeOverwrite (fromYaml (include "cozystack.defaultCiliumValues" .))) | nindent 4 }}
  dependsOn:
  {{- if lookup "helm.toolkit.fluxcd.io/v2" "HelmRelease" .Release.Namespace .Release.Name }}
  - name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
  {{- end }}
  {{- if $.Values.addons.gatewayAPI.enabled }}
  - name: {{ .Release.Name }}-gateway-api-crds
    namespace: {{ .Release.Namespace }}
  {{- end }}
{{- end }}
