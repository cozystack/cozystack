{{- define "cozystack.defaultCiliumValues" -}}
{{- /* Cilium runs hostNetwork on the Talos worker nodes and resolves the
       apiserver via the worker's /etc/hosts, which the talos-reconcile
       main-phase Job seeds with the Kamaji Service ClusterIP under
       <release>.<ns>.svc through machine.network.extraHostEntries. So a
       plain DNS host works here without a lookup-and-reuse race: the
       cert covers the same DNS name from chart render time, and the
       hosts entry is set well before kubelet (and therefore Cilium)
       comes up on the node. */}}
cilium:
  k8sServiceHost: {{ printf "%s.%s.svc" .Release.Name .Release.Namespace }}
  k8sServicePort: 6443
  routingMode: tunnel
  MTU: 1350
  enableIPv4Masquerade: true
  ipv4NativeRoutingCIDR: ""
  {{- if $.Values.addons.gatewayAPI.enabled }}
  gatewayAPI:
    enabled: true
    # Without ALPN "h2" on the TLS listener, browsers silently downgrade every
    # Gateway request to HTTP/1.1 (they negotiate HTTP/2 only via ALPN).
    # Frontend hop only; backends stay HTTP/1.1 unless their Service declares
    # appProtocol kubernetes.io/h2c (GEP-1911). Per-cluster opt-out:
    # addons.cilium.valuesOverride.cilium.gatewayAPI.enableAlpn=false.
    enableAlpn: true
  envoy:
    enabled: true
  {{- end }}
{{- end }}

{{- if .Values._namespace.etcd }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ .Release.Name }}-cilium
  labels:
    cozystack.io/repository: system
    cozystack.io/target-cluster-name: {{ .Release.Name }}
    sharding.fluxcd.io/key: tenants
spec:
  releaseName: cilium
  chartRef:
    kind: ExternalArtifact
    name: cozystack-kubernetes-application-kubevirt-kubernetes-cilium
    namespace: cozy-system
  kubeConfig:
    secretRef:
      name: {{ .Release.Name }}-admin-kubeconfig
      key: super-admin.svc
  targetNamespace: cozy-cilium
  storageNamespace: cozy-cilium
  interval: 5m
  timeout: 10m
  install:
    createNamespace: true
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  values:
    {{- toYaml (deepCopy .Values.addons.cilium.valuesOverride | mergeOverwrite (fromYaml (include "cozystack.defaultCiliumValues" .))) | nindent 4 }}
  {{- if $.Values.addons.gatewayAPI.enabled }}
  dependsOn:
  - name: {{ .Release.Name }}-gateway-api-crds
    namespace: {{ .Release.Namespace }}
  {{- end }}
{{- end }}
