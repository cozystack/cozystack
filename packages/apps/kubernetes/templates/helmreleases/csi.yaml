{{- if .Values._namespace.etcd }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ .Release.Name }}-csi
  labels:
    cozystack.io/repository: system
    cozystack.io/target-cluster-name: {{ .Release.Name }}
    sharding.fluxcd.io/key: tenants
spec:
  interval: 5m
  timeout: 10m
  releaseName: csi
  chartRef:
    kind: ExternalArtifact
    name: cozystack-kubernetes-application-kubevirt-kubernetes-kubevirt-csi-node
    namespace: cozy-system
  kubeConfig:
    secretRef:
      name: {{ .Release.Name }}-admin-kubeconfig
      key: super-admin.svc
  targetNamespace: cozy-csi
  storageNamespace: cozy-csi
  install:
    createNamespace: true
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  values:
    storageClasses:
    {{- /* Propagate remote-accessible LINSTOR infra StorageClasses to the tenant under the same name. */}}
    {{- $defaultName := .Values.storageClass | default "replicated" }}
    {{- $out := dict }}
    {{- range $sc := (lookup "storage.k8s.io/v1" "StorageClass" "" "").items }}
    {{- $params := $sc.parameters | default dict }}
    {{- if and (eq $sc.provisioner "linstor.csi.linbit.com") (ne (index $params "linstor.csi.linbit.com/allowRemoteVolumeAccess" | default "true") "false") }}
    {{- $_ := set $out $sc.metadata.name (dict "infraStorageClass" $sc.metadata.name "default" false) }}
    {{- end }}
    {{- end }}
    {{- /* Non-destructive fallback for dry-run/empty lookup: preserve the legacy mapping, never collapse to nothing. */}}
    {{- if not $out }}
    {{- $_ := set $out "replicated" (dict "infraStorageClass" "replicated" "default" false) }}
    {{- end }}
    {{- /* Legacy alias so existing tenant PVCs bound to the "kubevirt" StorageClass keep working. */}}
    {{- if not (hasKey $out "kubevirt") }}
    {{- $_ := set $out "kubevirt" (dict "infraStorageClass" $defaultName "default" false) }}
    {{- end }}
    {{- /* Mark exactly one default: the configured storageClass if propagated, else replicated, else first by name. */}}
    {{- $chosen := "" }}
    {{- if hasKey $out $defaultName }}{{ $chosen = $defaultName }}
    {{- else if hasKey $out "replicated" }}{{ $chosen = "replicated" }}
    {{- else }}{{ $chosen = (keys $out | sortAlpha | first) }}{{ end }}
    {{- $_ := set (index $out $chosen) "default" true }}
    {{- $out | toYaml | nindent 6 }}
  dependsOn:
  - name: {{ .Release.Name }}-vsnap-crd
    namespace: {{ .Release.Namespace }}
  - name: {{ .Release.Name }}-cilium
    namespace: {{ .Release.Namespace }}
{{- end }}
