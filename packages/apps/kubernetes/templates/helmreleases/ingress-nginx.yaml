{{- define "cozystack.defaultIngressValues" -}}
ingress-nginx:
  fullnameOverride: ingress-nginx
  controller:
    kind: DaemonSet
    {{- if eq .Values.addons.ingressNginx.exposeMethod "Proxied" }}
    service:
      enabled: true
      type: NodePort
      nodePorts:
        http: 30000
        https: 30001
    {{- end }}
    {{- if not .Values.addons.certManager.enabled }}
    admissionWebhooks:
      certManager:
        enabled: false
    {{- end }}
  nodeSelector:
    node-role.kubernetes.io/ingress-nginx: ""
{{- end }}

{{- if and .Values.addons.ingressNginx.enabled .Values._namespace.etcd }}
{{- /* The ingress-nginx controller DaemonSet pins itself to nodes labelled
       node-role.kubernetes.io/ingress-nginx (see cozystack.defaultIngressValues
       nodeSelector). Since Phase 2 moved worker pools into the separate
       kubernetes-nodes chart, that label is produced only by a KubernetesNodes
       pool with roles: [ingress-nginx]. Fail fast when this cluster already has
       worker pools but none carries the ingress role — otherwise the DaemonSet
       silently schedules nothing. The lookup is empty during `helm template`,
       lint and unit tests, and on a cluster with no pools yet, so the guard only
       fires on the positive misconfiguration (pools exist, none is ingress). */}}
{{- $clusterMds := list }}
{{- range $md := (lookup "cluster.x-k8s.io/v1beta1" "MachineDeployment" .Release.Namespace "").items }}
{{-   if eq (dig "spec" "clusterName" "" $md) $.Release.Name }}
{{-     $clusterMds = append $clusterMds $md }}
{{-   end }}
{{- end }}
{{- if $clusterMds }}
{{-   $hasIngressPool := false }}
{{-   range $md := $clusterMds }}
{{-     if hasKey (dig "spec" "template" "metadata" "labels" dict $md) "node-role.kubernetes.io/ingress-nginx" }}
{{-       $hasIngressPool = true }}
{{-     end }}
{{-   end }}
{{-   if not $hasIngressPool }}
{{-     fail "addons.ingressNginx.enabled is set but no KubernetesNodes pool for this cluster has roles: [ingress-nginx]. Create a KubernetesNodes pool named <cluster>-<pool> with roles: [ingress-nginx] so the ingress-nginx DaemonSet has nodes to schedule on." }}
{{-   end }}
{{- end }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ .Release.Name }}-ingress-nginx
  labels:
    cozystack.io/repository: system
    cozystack.io/target-cluster-name: {{ .Release.Name }}
    sharding.fluxcd.io/key: tenants
spec:
  releaseName: ingress-nginx
  chartRef:
    kind: ExternalArtifact
    name: cozystack-kubernetes-application-kubevirt-kubernetes-ingress-nginx
    namespace: cozy-system
  kubeConfig:
    secretRef:
      name: {{ .Release.Name }}-admin-kubeconfig
      key: super-admin.svc
  targetNamespace: cozy-ingress-nginx
  storageNamespace: cozy-ingress-nginx
  interval: 5m
  timeout: 10m
  install:
    createNamespace: true
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  values:
    {{- toYaml (deepCopy .Values.addons.ingressNginx.valuesOverride | mergeOverwrite (fromYaml (include "cozystack.defaultIngressValues" .))) | nindent 4 }}
  dependsOn:
  - name: {{ .Release.Name }}-cilium
    namespace: {{ .Release.Namespace }}
{{- end }}
