{{- /*
  Post-install/post-upgrade Helm hook that resolves the chart's
  lookup-and-reuse race for TalosConfigTemplate and
  KamajiControlPlane.spec.network.certSANs.

  Background. The Talos worker machineconfig and the apiserver Service
  ClusterIP-SAN both need values that only exist AFTER Helm has applied
  the first render: the Service is emitted by the Kamaji controller in
  reaction to the KamajiControlPlane CR, the Talos-CA TLS Secret is
  issued by cert-manager from the Talos PKI Certificate CR, and the
  Kubernetes-CA Secret is generated by Kamaji as part of its tenant
  control-plane bootstrap. A Helm template that uses `lookup` to read
  any of these into the rendered manifest fails the race on every fresh
  install — the lookup returns nil, the gated TalosConfigTemplate is
  skipped, and Helm's release-storage three-way merge concludes the
  release is in-sync on every subsequent reconcile because no chart
  value changed. The result is a tenant whose KamajiControlPlane is
  Ready but whose CAPI MachineDeployment is stuck on
  `cannot create a new MachineSet when templates do not exist` forever.

  This Job runs once Helm has applied everything else in the release,
  blocks until the four dependencies are observably present, then
  produces both objects via `kubectl apply` (idempotent). The
  TalosConfigTemplate carries an ownerReference to the KamajiControlPlane
  so Kubernetes garbage-collects it through the standard owner-reference
  cascade when the chart's release is uninstalled — Helm itself does not
  need to track the resource, and a `pre-delete` hook is not required.
  The certSANs patch is a merge against the KCP `spec.network.certSANs`
  field; the Kamaji controller picks up the change and re-issues the
  apiserver TLS cert with the live ClusterIP in its SAN list.

  Hook weight 5 places the Job after Helm has emitted the
  KamajiControlPlane / Talos PKI Certificate / talos-secrets but before
  the bootstrap-token-tenant Job (weight 10), so workers see a
  reachable apiserver, a SAN-correct TLS cert, and a populated
  bootstrap-token Secret in the tenant kube-system the first time
  they boot.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-talos-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-talos-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["{{ .Release.Name }}"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "{{ .Release.Name }}-talos-secrets"
      - "{{ .Release.Name }}-talos-ca"
      - "{{ .Release.Name }}-ca"
    verbs: ["get"]
  - apiGroups: ["controlplane.cluster.x-k8s.io"]
    resources: ["kamajicontrolplanes"]
    resourceNames: ["{{ .Release.Name }}"]
    verbs: ["get", "patch"]
  - apiGroups: ["bootstrap.cluster.x-k8s.io"]
    resources: ["talosconfigtemplates"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-talos-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-talos-reconcile
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-talos-reconcile
    namespace: {{ .Release.Namespace }}
---
{{- $kubeletVersion := include "kubernetes.versionMap" $ | trim }}
{{- $talosVersion := $.Values.talos.version }}
{{- $podCIDR := "10.243.0.0/16" }}
{{- $serviceCIDR := "10.95.0.0/16" }}
{{- $dnsDomain := include "kubernetes.tenantClusterDomain" $ }}
{{- range $groupName, $group := .Values.nodeGroups }}
{{- /* Resolve per-nodeGroup kubelet reservations the same way cluster.yaml
       does, so the generated machineconfig matches what the chart would
       have rendered before this hook took over TalosConfigTemplate
       authorship. */}}
{{- $instancePreset := include "cozy-lib.resources.unsanitizedPreset" $group.instanceType | fromYaml }}
{{- $effectiveCpu := default $instancePreset.cpu (default "" (get ($group.resources | default dict) "cpu")) }}
{{- $effectiveMemory := default $instancePreset.memory (default "" (get ($group.resources | default dict) "memory")) }}
{{- $kubeletOverride := $group.kubelet | default dict }}
{{- $systemReservedMemory := default (include "kubernetes.defaultSystemReservedMemory" (dict "effectiveMemory" $effectiveMemory)) (get $kubeletOverride "systemReservedMemory") }}
{{- $kubeReservedMemory := default (include "kubernetes.defaultKubeReservedMemory" (dict "effectiveMemory" $effectiveMemory)) (get $kubeletOverride "kubeReservedMemory") }}
{{- $systemReservedCpu := default (include "kubernetes.defaultSystemReservedCpu" (dict "effectiveCpu" $effectiveCpu)) (get $kubeletOverride "systemReservedCpu") }}
{{- $kubeReservedCpu := default (include "kubernetes.defaultKubeReservedCpu" (dict "effectiveCpu" $effectiveCpu)) (get $kubeletOverride "kubeReservedCpu") }}
{{- $evictionHardMemory := default "7%" (get $kubeletOverride "evictionHardMemory") }}
{{- $evictionSoftMemory := default "10%" (get $kubeletOverride "evictionSoftMemory") }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $.Release.Name }}-talos-reconcile-{{ $groupName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" $ | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ $.Release.Name }}-talos-reconcile
      containers:
        - name: kubectl
          image: "{{ default ($.Files.Get "images/kubectl.tag" | trim) $.Values.images.kubectl }}"
          env:
            - name: RELEASE
              value: {{ $.Release.Name | quote }}
            - name: NS
              value: {{ $.Release.Namespace | quote }}
            - name: GROUP_NAME
              value: {{ $groupName | quote }}
            - name: TALOS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-talos-secrets
                  key: token
            - name: CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-talos-secrets
                  key: clusterId
            - name: CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-talos-secrets
                  key: clusterSecret
            - name: BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-talos-secrets
                  key: bootstrapToken
          command:
            - sh
            - -ec
            - |
              echo "[$(date -u +%H:%M:%S)] talos-reconcile/${GROUP_NAME}: waiting for Service ClusterIP, Talos CA, K8s CA"
              for i in $(seq 1 120); do
                SVC_IP=$(kubectl -n "$NS" get svc "$RELEASE" -o jsonpath='{.spec.clusterIP}' 2>/dev/null || true)
                TALOS_CA_B64=$(kubectl -n "$NS" get secret "${RELEASE}-talos-ca" -o jsonpath='{.data.tls\.crt}' 2>/dev/null || true)
                K8S_CA_B64=$(kubectl -n "$NS" get secret "${RELEASE}-ca" -o jsonpath='{.data.ca\.crt}' 2>/dev/null || true)
                if [ -n "$SVC_IP" ] && [ -n "$TALOS_CA_B64" ] && [ -n "$K8S_CA_B64" ]; then
                  break
                fi
                sleep 5
              done
              if [ -z "$SVC_IP" ] || [ -z "$TALOS_CA_B64" ] || [ -z "$K8S_CA_B64" ]; then
                echo "[$(date -u +%H:%M:%S)] timed out waiting for lookup inputs (svc='$SVC_IP' talos-ca=$([ -n "$TALOS_CA_B64" ] && echo ok) k8s-ca=$([ -n "$K8S_CA_B64" ] && echo ok))"
                exit 1
              fi
              echo "[$(date -u +%H:%M:%S)] inputs ready (svc=${SVC_IP})"

              # Patch KamajiControlPlane.spec.network.certSANs so the apiserver
              # TLS cert covers the live Service ClusterIP that Talos workers
              # dial. JSON-merge-patch is array-replace semantics, which is what
              # we want here — Kamaji owns the full SAN list.
              kubectl -n "$NS" patch kamajicontrolplane "$RELEASE" --type=merge --patch "$(
                cat <<JSON
              {"spec":{"network":{"certSANs":["${RELEASE}.${NS}.svc","${RELEASE}.${NS}.svc.{{ $dnsDomain }}","${SVC_IP}"]}}}
              JSON
              )"

              KCP_UID=$(kubectl -n "$NS" get kamajicontrolplane "$RELEASE" -o jsonpath='{.metadata.uid}')

              # Apply the TalosConfigTemplate. ownerReference back to the KCP
              # makes the standard Kubernetes garbage collector clean it up on
              # release uninstall; Helm itself does not track this resource.
              cat <<EOF | kubectl apply -f -
              apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
              kind: TalosConfigTemplate
              metadata:
                name: ${RELEASE}-${GROUP_NAME}
                namespace: ${NS}
                ownerReferences:
                  - apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
                    kind: KamajiControlPlane
                    name: ${RELEASE}
                    uid: ${KCP_UID}
                    controller: true
                    blockOwnerDeletion: true
              spec:
                template:
                  spec:
                    generateType: none
                    talosVersion: "{{ $talosVersion }}"
                    data: |
                      version: v1alpha1
                      persist: true
                      machine:
                        type: worker
                        token: ${TALOS_TOKEN}
                        ca:
                          crt: ${TALOS_CA_B64}
                        kubelet:
                          image: ghcr.io/siderolabs/kubelet:{{ $kubeletVersion }}
                          extraConfig:
                            systemReserved:
                              cpu: "{{ $systemReservedCpu }}"
                              memory: "{{ $systemReservedMemory }}"
                            kubeReserved:
                              cpu: "{{ $kubeReservedCpu }}"
                              memory: "{{ $kubeReservedMemory }}"
                            evictionHard:
                              memory.available: "{{ $evictionHardMemory }}"
                              nodefs.available: "10%"
                              imagefs.available: "15%"
                              nodefs.inodesFree: "5%"
                            evictionSoft:
                              memory.available: "{{ $evictionSoftMemory }}"
                              nodefs.available: "15%"
                              imagefs.available: "20%"
                            evictionSoftGracePeriod:
                              memory.available: "1m30s"
                              nodefs.available: "1m30s"
                              imagefs.available: "1m30s"
                            evictionMinimumReclaim:
                              memory.available: "256Mi"
                        install:
                          disk: /dev/vda
                          image: factory.talos.dev/installer/{{ $.Values.talos.schematicID }}:{{ $talosVersion }}
                          wipe: false
                        features:
                          rbac: true
                          kubePrism:
                            enabled: false
                      cluster:
                        id: ${CLUSTER_ID}
                        secret: ${CLUSTER_SECRET}
                        controlPlane:
                          endpoint: https://${SVC_IP}:6443
                        clusterName: ${RELEASE}
                        network:
                          dnsDomain: {{ $dnsDomain }}
                          podSubnets:
                            - {{ $podCIDR }}
                          serviceSubnets:
                            - {{ $serviceCIDR }}
                        token: ${BOOTSTRAP_TOKEN}
                        ca:
                          crt: ${K8S_CA_B64}
                        discovery:
                          enabled: true
                          registries:
                            kubernetes:
                              disabled: true
                            service:
                              disabled: true
              EOF
              echo "[$(date -u +%H:%M:%S)] TalosConfigTemplate ${RELEASE}-${GROUP_NAME} applied"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
{{- end }}
