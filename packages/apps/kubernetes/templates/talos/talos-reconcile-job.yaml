{{- /*
  Post-install/post-upgrade Helm hook that resolves the chart's
  lookup-and-reuse race for TalosConfigTemplate and
  KamajiControlPlane.spec.network.certSANs.

  Background. The Talos worker machineconfig and the apiserver Service
  ClusterIP-SAN both need values that only exist AFTER Helm has applied
  the first render: the Service is emitted by the Kamaji controller in
  reaction to the KamajiControlPlane CR, the Talos-CA TLS Secret is
  issued by cert-manager from the Talos PKI Certificate CR, and the
  Kubernetes-CA Secret is generated by Kamaji as part of its tenant
  control-plane bootstrap. A Helm template that uses `lookup` to read
  any of these into the rendered manifest fails the race on every fresh
  install — the lookup returns nil, the gated TalosConfigTemplate is
  skipped, and Helm's release-storage three-way merge concludes the
  release is in-sync on every subsequent reconcile because no chart
  value changed. The result is a tenant whose KamajiControlPlane is
  Ready but whose CAPI MachineDeployment is stuck on
  `cannot create a new MachineSet when templates do not exist` forever.

  This Job runs once Helm has applied everything else in the release,
  blocks until the four dependencies are observably present, then
  produces both objects via `kubectl apply` (idempotent). The
  TalosConfigTemplate carries an ownerReference to the KamajiControlPlane
  so Kubernetes garbage-collects it through the standard owner-reference
  cascade when the chart's release is uninstalled — Helm itself does not
  need to track the resource, and a `pre-delete` hook is not required.
  The certSANs patch is a merge against the KCP `spec.network.certSANs`
  field; the Kamaji controller picks up the change and re-issues the
  apiserver TLS cert with the live ClusterIP in its SAN list.

  Hook weight 5 places the Job after Helm has emitted the
  KamajiControlPlane / Talos PKI Certificate / talos-secrets but before
  the bootstrap-token-tenant Job (weight 10), so workers see a
  reachable apiserver, a SAN-correct TLS cert, and a populated
  bootstrap-token Secret in the tenant kube-system the first time
  they boot.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-talos-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-talos-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["{{ .Release.Name }}"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "{{ .Release.Name }}-talos-secrets"
      - "{{ .Release.Name }}-talos-ca"
      - "{{ .Release.Name }}-ca"
    verbs: ["get"]
  - apiGroups: ["controlplane.cluster.x-k8s.io"]
    resources: ["kamajicontrolplanes"]
    resourceNames: ["{{ .Release.Name }}"]
    verbs: ["get", "patch"]
  - apiGroups: ["bootstrap.cluster.x-k8s.io"]
    resources: ["talosconfigtemplates"]
    verbs: ["get", "create", "patch", "update"]
---
{{- /* The tenant-root chart installs a default-deny egress policy on every
       pod in the tenant namespace; without an explicit allow, this hook Job
       cannot reach the management-cluster apiserver to read the Service
       ClusterIP / Secrets / KamajiControlPlane it has to reconcile. Cilium
       policies are additive, so this rule layers on top of the tenant
       default-deny without weakening it for anything else. Endpoint
       selector is scoped to pods carrying the hook label only. */}}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-talos-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  endpointSelector:
    matchLabels:
      cozystack.io/talos-reconcile: "{{ .Release.Name }}"
  egress:
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-talos-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-talos-reconcile
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-talos-reconcile
    namespace: {{ .Release.Namespace }}
---
{{- /* Cluster-scoped read on the management CoreDNS Service so the hook
       can look up its ClusterIP at runtime and inject it into the worker
       machineconfig as a host-level nameserver. Tenant workers run as
       KubeVirt VMs inside the management pod network; tenant in-cluster
       pods still use kubelet --cluster-dns (tenant CoreDNS) via
       dnsPolicy: ClusterFirst, but the worker host itself (kubelet's
       mount syscall path, image pulls) consults /etc/resolv.conf which
       Talos populates from machine.network.nameservers. Without
       management CoreDNS as host resolver, mounting NFS from
       kubevirt-csi (linstor-csi-nfs.cozy-linstor.svc) fails with
       NXDOMAIN.

       Ubuntu+kubeadm workers in main inherit pod DNS via cloud-init
       and got management CoreDNS for free; Talos reads only what is
       in machineconfig, so the chart has to plumb it explicitly.

       resourceNames pins the grant to the single well-known Service
       name kube-dns — cluster-wide get on services scoped to that
       single name is functionally a single-resource permission. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-talos-reconcile-coredns
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["kube-dns"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-talos-reconcile-coredns
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-talos-reconcile-coredns
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-talos-reconcile
    namespace: {{ .Release.Namespace }}
---
{{- $kubeletVersion := include "kubernetes.versionMap" $ | trim }}
{{- $talosVersion := $.Values.talos.version }}
{{- $podCIDR := "10.243.0.0/16" }}
{{- $serviceCIDR := "10.95.0.0/16" }}
{{- $dnsDomain := include "kubernetes.tenantClusterDomain" $ }}
{{- /* Management cluster DNS domain. Tenant Kubernetes workers run as
       KubeVirt VMs inside the management cluster's pod network and need
       to resolve management-cluster service short names ("<svc>.<ns>.svc")
       the same way an Ubuntu+kubeadm worker did via cloud-init DHCP. The
       kubevirt-csi NFS mount path is the load-bearing case: kubelet on
       the worker host calls `mount.nfs linstor-csi-nfs.cozy-linstor.svc`
       (no domain suffix), and without searchDomains in /etc/resolv.conf
       the host resolver hands that name to management CoreDNS verbatim
       and gets NXDOMAIN.

       Distinct from tenantClusterDomain ("cluster.local"), which is the
       *tenant* kubelet --cluster-dns zone. This value is the
       *management* cluster-domain, sourced from .Values._cluster
       (populated by cozystack-controller from the platform config). */}}
{{- $mgmtClusterDomain := (index .Values._cluster "cluster-domain") | default "cozy.local" }}
{{- range $groupName, $group := .Values.nodeGroups }}
{{- /* Mirror the kubelet-reservation computation from cluster.yaml so the
       worker machineconfig the hook applies carries the same numbers the
       MachineDeployment validator was happy with. Auto-computed
       system/kube reserved memory = 5% of effective memory clamped to
       [256Mi, 1Gi]; auto-computed system/kube reserved CPU = 5% of
       effective CPU clamped to [50m, 500m]. instanceType lookup is
       optional — operators that override resources.cpu / resources.memory
       on the nodeGroup get those, otherwise the chart falls back to the
       same static-defaults pair the cluster.yaml validator uses on a
       no-instanceType setup. */}}
{{- $instanceType := dict }}
{{- if $group.instanceType }}
{{-   $instanceType = lookup "instancetype.kubevirt.io/v1beta1" "VirtualMachineClusterInstancetype" "" $group.instanceType }}
{{-   $instanceType = $instanceType | default dict }}
{{- end }}
{{- $effectiveMemory := "" }}
{{- if and $group.resources $group.resources.memory }}
{{-   $effectiveMemory = $group.resources.memory | toString }}
{{- else if and $instanceType $instanceType.spec $instanceType.spec.memory $instanceType.spec.memory.guest }}
{{-   $effectiveMemory = $instanceType.spec.memory.guest | toString }}
{{- end }}
{{- $effectiveCpu := "" }}
{{- if and $group.resources $group.resources.cpu }}
{{-   $effectiveCpu = $group.resources.cpu | toString }}
{{- else if and $instanceType $instanceType.spec $instanceType.spec.cpu $instanceType.spec.cpu.guest }}
{{-   $effectiveCpu = $instanceType.spec.cpu.guest | toString }}
{{- end }}
{{- $autoReservedMi := 256 }}
{{- if $effectiveMemory }}
{{-   $effectiveMemMi := divf (include "cozy-lib.resources.toFloat" $effectiveMemory | float64) 1048576.0 | int }}
{{-   $fivePercentMi := mulf ($effectiveMemMi | float64) 0.05 | int }}
{{-   $autoReservedMi = min (max $fivePercentMi 256) 1024 }}
{{- end }}
{{- $autoReservedMillicores := 50 }}
{{- if $effectiveCpu }}
{{-   $effectiveCpuMillicores := include "kubernetes.cpuToMillicores" $effectiveCpu | int }}
{{-   $fivePercentMillis := mulf ($effectiveCpuMillicores | float64) 0.05 | int }}
{{-   $autoReservedMillicores = min (max $fivePercentMillis 50) 500 }}
{{- end }}
{{- $kubeletOverride := $group.kubelet | default dict }}
{{- $systemReservedMemory := $kubeletOverride.systemReservedMemory | default (printf "%dMi" $autoReservedMi) }}
{{- $kubeReservedMemory := $kubeletOverride.kubeReservedMemory | default (printf "%dMi" $autoReservedMi) }}
{{- $systemReservedCpu := $kubeletOverride.systemReservedCpu | default (printf "%dm" $autoReservedMillicores) }}
{{- $kubeReservedCpu := $kubeletOverride.kubeReservedCpu | default (printf "%dm" $autoReservedMillicores) }}
{{- $evictionHardMemory := $kubeletOverride.evictionHardMemory | default "7%" }}
{{- $evictionSoftMemory := $kubeletOverride.evictionSoftMemory | default "10%" }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $.Release.Name }}-talos-reconcile-{{ $groupName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" $ | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        cozystack.io/talos-reconcile: {{ $.Release.Name | quote }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ $.Release.Name }}-talos-reconcile
      containers:
        - name: kubectl
          image: "{{ default ($.Files.Get "images/kubectl.tag" | trim) $.Values.images.kubectl }}"
          env:
            - name: RELEASE
              value: {{ $.Release.Name | quote }}
            - name: NS
              value: {{ $.Release.Namespace | quote }}
            - name: GROUP_NAME
              value: {{ $groupName | quote }}
            - name: TALOS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-talos-secrets
                  key: token
            - name: CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-talos-secrets
                  key: clusterId
            - name: CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-talos-secrets
                  key: clusterSecret
            - name: BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-talos-secrets
                  key: bootstrapToken
          command:
            - sh
            - -ec
            - |
              echo "[$(date -u +%H:%M:%S)] talos-reconcile/${GROUP_NAME}: waiting for Service ClusterIP, Talos CA, K8s CA, management CoreDNS"
              for i in $(seq 1 120); do
                SVC_IP=$(kubectl -n "$NS" get svc "$RELEASE" -o jsonpath='{.spec.clusterIP}' 2>/dev/null || true)
                TALOS_CA_B64=$(kubectl -n "$NS" get secret "${RELEASE}-talos-ca" -o jsonpath='{.data.tls\.crt}' 2>/dev/null || true)
                K8S_CA_B64=$(kubectl -n "$NS" get secret "${RELEASE}-ca" -o jsonpath='{.data.ca\.crt}' 2>/dev/null || true)
                COREDNS_IP=$(kubectl -n kube-system get svc kube-dns -o jsonpath='{.spec.clusterIP}' 2>/dev/null || true)
                if [ -n "$SVC_IP" ] && [ -n "$TALOS_CA_B64" ] && [ -n "$K8S_CA_B64" ] && [ -n "$COREDNS_IP" ]; then
                  break
                fi
                sleep 5
              done
              if [ -z "$SVC_IP" ] || [ -z "$TALOS_CA_B64" ] || [ -z "$K8S_CA_B64" ] || [ -z "$COREDNS_IP" ]; then
                echo "[$(date -u +%H:%M:%S)] timed out waiting for lookup inputs (svc='$SVC_IP' talos-ca=$([ -n "$TALOS_CA_B64" ] && echo ok) k8s-ca=$([ -n "$K8S_CA_B64" ] && echo ok) coredns='$COREDNS_IP')"
                exit 1
              fi
              echo "[$(date -u +%H:%M:%S)] inputs ready (svc=${SVC_IP} coredns=${COREDNS_IP})"

              # Patch KamajiControlPlane.spec.network.certSANs so the apiserver
              # TLS cert covers the live Service ClusterIP that Talos workers
              # dial. JSON-merge-patch is array-replace semantics, which is what
              # we want here — Kamaji owns the full SAN list.
              kubectl -n "$NS" patch kamajicontrolplane "$RELEASE" --type=merge --patch "$(
                cat <<JSON
              {"spec":{"network":{"certSANs":["${RELEASE}.${NS}.svc","${RELEASE}.${NS}.svc.{{ $dnsDomain }}","${SVC_IP}"]}}}
              JSON
              )"

              # Talos workers dial the apiserver Service via the DNS name
              # (${RELEASE}.${NS}.svc) instead of the live ClusterIP, with
              # machine.network.extraHostEntries injecting the IP into the
              # worker's /etc/hosts. This avoids a TLS race against the
              # csr-signer sidecar: the Talos PKI Certificate is issued
              # with DNS SANs at chart render time and never needs to be
              # patched after the Service ClusterIP becomes known. The
              # apiserver Kubernetes TLS cert (handled by KCP certSANs above)
              # auto-reloads on Kamaji reissue, but the csr-signer container
              # loads its TLS cert once at startup and does not watch the
              # file — so any in-place cert rotation leaves it serving the
              # original (no-IP-SAN) cert until the Kamaji pod restarts.
              # Routing through DNS sidesteps the whole problem.

              KCP_UID=$(kubectl -n "$NS" get kamajicontrolplane "$RELEASE" -o jsonpath='{.metadata.uid}')

              # Apply the TalosConfigTemplate. ownerReference back to the KCP
              # makes the standard Kubernetes garbage collector clean it up on
              # release uninstall; Helm itself does not track this resource.
              cat <<EOF | kubectl apply -f -
              apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
              kind: TalosConfigTemplate
              metadata:
                name: ${RELEASE}-${GROUP_NAME}
                namespace: ${NS}
                ownerReferences:
                  - apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
                    kind: KamajiControlPlane
                    name: ${RELEASE}
                    uid: ${KCP_UID}
                    controller: true
                    blockOwnerDeletion: true
              spec:
                template:
                  spec:
                    generateType: none
                    talosVersion: "{{ $talosVersion }}"
                    data: |
                      version: v1alpha1
                      persist: true
                      machine:
                        type: worker
                        token: ${TALOS_TOKEN}
                        network:
                          # Management CoreDNS as the worker's host
                          # resolver, plus management cluster search
                          # domains so partial names like
                          # "linstor-csi-nfs.cozy-linstor.svc" resolve
                          # the same way they do on Ubuntu+kubeadm
                          # workers in main (which got these via
                          # cloud-init/DHCP). Without searchDomains the
                          # kubevirt-csi NFS mount fails NXDOMAIN
                          # because mount.nfs hands the partial name
                          # to the resolver verbatim and management
                          # CoreDNS only knows full FQDNs.
                          #
                          # Tenant in-cluster pods are not affected:
                          # dnsPolicy: ClusterFirst routes them through
                          # kubelet --cluster-dns (tenant CoreDNS).
                          # This block only configures host-side
                          # resolution (kubelet mount syscalls, image
                          # pulls, pods opted out of cluster DNS).
                          nameservers:
                            - ${COREDNS_IP}
                          searchDomains:
                            - svc.{{ $mgmtClusterDomain }}
                            - {{ $mgmtClusterDomain }}
                            {{- if ne $mgmtClusterDomain "cluster.local" }}
                            - svc.cluster.local
                            - cluster.local
                            {{- end }}
                          extraHostEntries:
                            - ip: ${SVC_IP}
                              aliases:
                                - ${RELEASE}.${NS}.svc
                                - ${RELEASE}.${NS}.svc.{{ $dnsDomain }}
                        ca:
                          crt: ${TALOS_CA_B64}
                        {{- if $group.gpus }}
                        # GPU node-groups: label every node `gpu=on` so
                        # HAMi's hami-device-plugin DaemonSet (nodeSelector
                        # gpu=on) schedules and advertises nvidia.com/gpu.
                        # Without the label the plugin stays at DESIRED=0
                        # and no GPUs are exposed to the tenant. Mirrors
                        # main's kubeadm config (kubeletExtraArgs node-
                        # labels: "gpu=on") so HAMi behaviour is identical
                        # before and after the Talos worker rollover.
                        nodeLabels:
                          gpu: "on"
                        {{- end }}
                        kubelet:
                          image: ghcr.io/siderolabs/kubelet:{{ $kubeletVersion }}
                          extraConfig:
                            systemReserved:
                              cpu: "{{ $systemReservedCpu }}"
                              memory: "{{ $systemReservedMemory }}"
                            kubeReserved:
                              cpu: "{{ $kubeReservedCpu }}"
                              memory: "{{ $kubeReservedMemory }}"
                            evictionHard:
                              memory.available: "{{ $evictionHardMemory }}"
                              nodefs.available: "10%"
                              imagefs.available: "15%"
                              nodefs.inodesFree: "5%"
                            evictionSoft:
                              memory.available: "{{ $evictionSoftMemory }}"
                              nodefs.available: "15%"
                              imagefs.available: "20%"
                            evictionSoftGracePeriod:
                              memory.available: "1m30s"
                              nodefs.available: "1m30s"
                              imagefs.available: "1m30s"
                            evictionMinimumReclaim:
                              memory.available: "256Mi"
                        install:
                          disk: /dev/vda
                          image: factory.talos.dev/installer/{{ $.Values.talos.schematicID }}:{{ $talosVersion }}
                          wipe: false
                        features:
                          rbac: true
                          kubePrism:
                            enabled: false
                      cluster:
                        id: ${CLUSTER_ID}
                        secret: ${CLUSTER_SECRET}
                        controlPlane:
                          endpoint: https://${RELEASE}.${NS}.svc:6443
                        clusterName: ${RELEASE}
                        network:
                          dnsDomain: {{ $dnsDomain }}
                          podSubnets:
                            - {{ $podCIDR }}
                          serviceSubnets:
                            - {{ $serviceCIDR }}
                        token: ${BOOTSTRAP_TOKEN}
                        ca:
                          crt: ${K8S_CA_B64}
                        discovery:
                          enabled: true
                          registries:
                            kubernetes:
                              disabled: true
                            service:
                              disabled: true
              EOF
              echo "[$(date -u +%H:%M:%S)] TalosConfigTemplate ${RELEASE}-${GROUP_NAME} applied"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
{{- end }}
