{{- /*
  Random Talos secrets that don't fit the cert-manager flow.

  Stability across helm upgrades is achieved by looking up the existing
  Secret on each render. If it exists, we reuse the values; if not, we
  generate fresh random values. This is the standard Helm "lookup + reuse"
  pattern for non-cryptographic random values that must remain stable.

  Contents:
    token             - Talos trustd token (machine.token, cluster.token in
                        the worker machineconfig). The talos-csr-signer
                        sidecar reads it via env var to authenticate
                        worker CSRs.
    clusterId         - Random cluster identifier (cluster.id).
    clusterSecret     - Random cluster secret (cluster.secret).
    bootstrapToken    - kubeadm-format bootstrap token "<id>.<secret>"
                        used as cluster.token in the worker machineconfig.
                        A matching bootstrap-token-<id> Secret is
                        materialised inside the tenant kube-system by the
                        bootstrap-token-tenant Job.
    bootstrapTokenId/
    bootstrapTokenSecret - exposed as separate keys so the Job can mount
                        them as env vars without re-parsing the combined
                        value.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-talos-secrets" .Release.Name) }}
{{- $token := "" }}
{{- $clusterId := "" }}
{{- $clusterSecret := "" }}
{{- $btId := "" }}
{{- $btSecret := "" }}
{{- if $existing }}
{{-   $token = index $existing.data "token" | b64dec }}
{{-   $clusterId = index $existing.data "clusterId" | b64dec }}
{{-   $clusterSecret = index $existing.data "clusterSecret" | b64dec }}
{{-   if hasKey $existing.data "bootstrapTokenId" }}
{{-     $btId = index $existing.data "bootstrapTokenId" | b64dec }}
{{-   end }}
{{-   if hasKey $existing.data "bootstrapTokenSecret" }}
{{-     $btSecret = index $existing.data "bootstrapTokenSecret" | b64dec }}
{{-   end }}
{{- else }}
{{-   $token = printf "%s.%s" (randAlphaNum 6 | lower) (randAlphaNum 16 | lower) }}
{{-   $clusterId = randAlphaNum 32 }}
{{-   $clusterSecret = randAlphaNum 32 }}
{{- end }}
{{- if eq $btId "" }}
{{-   $btId = randAlphaNum 6 | lower }}
{{- end }}
{{- if eq $btSecret "" }}
{{-   $btSecret = randAlphaNum 16 | lower }}
{{- end }}
{{- $bootstrapToken := printf "%s.%s" $btId $btSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-talos-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ $token | b64enc | quote }}
  clusterId: {{ $clusterId | b64enc | quote }}
  clusterSecret: {{ $clusterSecret | b64enc | quote }}
  bootstrapToken: {{ $bootstrapToken | b64enc | quote }}
  bootstrapTokenId: {{ $btId | b64enc | quote }}
  bootstrapTokenSecret: {{ $btSecret | b64enc | quote }}
