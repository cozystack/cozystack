{{- /*
  Random Talos secrets that don't fit the cert-manager flow.

  Stability across helm upgrades is achieved by looking up the existing
  Secret on each render. If it exists, we reuse the values; if not, we
  generate fresh random values. This is the standard Helm "lookup + reuse"
  pattern for non-cryptographic random values that must remain stable.

  Contents:
    token           - Talos trustd token (machine.token, cluster.token in
                      worker machineconfig). The talos-csr-signer sidecar
                      reads it via env var to authenticate worker CSRs.
    clusterId       - Random cluster identifier (cluster.id).
    clusterSecret   - Random cluster secret (cluster.secret).
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-talos-secrets" .Release.Name) }}
{{- $token := "" }}
{{- $clusterId := "" }}
{{- $clusterSecret := "" }}
{{- if $existing }}
{{-   $token = index $existing.data "token" | b64dec }}
{{-   $clusterId = index $existing.data "clusterId" | b64dec }}
{{-   $clusterSecret = index $existing.data "clusterSecret" | b64dec }}
{{- else }}
{{-   $token = printf "%s.%s" (randAlphaNum 6 | lower) (randAlphaNum 16 | lower) }}
{{-   $clusterId = randAlphaNum 32 }}
{{-   $clusterSecret = randAlphaNum 32 }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-talos-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ $token | b64enc | quote }}
  clusterId: {{ $clusterId | b64enc | quote }}
  clusterSecret: {{ $clusterSecret | b64enc | quote }}
