{{- $gateway := .Values._namespace.gateway | default "" }}
{{- $host := .Values._namespace.host }}
{{- $harborHost := .Values.host | default (printf "%s.%s" .Release.Name $host) }}
{{- if $gateway }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: cozystack
    namespace: {{ $gateway }}
    sectionName: https
  hostnames:
  - {{ $harborHost | quote }}
  rules:
  - backendRefs:
    - name: {{ .Release.Name }}
      port: 80
{{- end }}
