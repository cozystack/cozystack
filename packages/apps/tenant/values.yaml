##
## @section Common parameters
##

## @param {string} [host] - The hostname used to access tenant services (defaults to using the tenant name as a subdomain for its parent tenant host).
host: ""

## @param {bool} etcd - Deploy own Etcd cluster.
etcd: false

## @param {bool} monitoring - Deploy own Monitoring Stack.
monitoring: false

## @param {bool} ingress - Deploy own Ingress Controller.
ingress: false

## @param {bool} [gateway] - Deploy own Gateway API Gateway (backed by Cilium Gateway API controller). When unset (the default), the chart auto-enables the Gateway for tenants whose apex is derived from the parent (i.e. `host` is empty), and leaves it off for tenants with a custom non-derived apex. Set to `true` or `false` explicitly to override that auto-behaviour.
gateway: ~

## @param {bool} seaweedfs - Deploy own SeaweedFS.
seaweedfs: false

## @param {string} [schedulingClass] - The name of a SchedulingClass CR to apply scheduling constraints for this tenant's workloads.
schedulingClass: ""

## @param {map[string]quantity} resourceQuotas - Define resource quotas for the tenant.
resourceQuotas: {}
