suite: tenant gateway default — inherit from parent, opt-in for own Gateway
templates:
  - templates/gateway.yaml

# Cozystack targets low-skill operators. A child tenant under a Gateway-
# enabled parent must publish through the parent's Gateway by default —
# forcing every child to set `tenant.spec.gateway: true` would break
# parity with how `_namespace.ingress` already inherits, and would burn
# one LB IP per child tenant for no isolation benefit.
#
# Rules under test (see _helpers.tpl::tenant.gatewayEffective):
#   - gateway unset                     → OFF own (inherit from parent)
#   - gateway=true  explicit            → ON  own (LB IP / cert burned)
#   - gateway=false explicit            → OFF own (parked, no inherit)
#
# The inheritance propagation itself happens in namespace.yaml:
# $gateway := $parentNamespace.gateway | default ""
# overridden to $tenantName when tenant.gatewayEffective is "true".
# That logic is exercised by the cozystack-basics secret test for the
# root tenant (cozystack-values-secret_test.yaml) plus by the
# controller-level reconciler tests for the cross-namespace attach
# flow — helm-unittest cannot mock the `lookup` call namespace.yaml
# uses for ownerReferences, so the chart-level pin here covers only
# the HelmRelease render side.

release:
  name: tenant-alice
  namespace: tenant-alice

set:
  _cluster:
    expose-ingress: tenant-root
    expose-external-ips: "192.0.2.10"
    gateway-enabled: "true"

tests:
  - it: gateway unset → inherit, no own HelmRelease
    # The default for a derived-apex child. _namespace.gateway will
    # propagate the parent's owner-name through namespace.yaml; the
    # tenant chart does NOT render its own gateway HelmRelease.
    set:
      host: ""
    asserts:
      - template: templates/gateway.yaml
        hasDocuments:
          count: 0

  - it: gateway unset on custom-apex tenant → inherit, no own HelmRelease
    # Custom apex without explicit `gateway: true` falls through to
    # inheritance — same rule. The HTTPRoutes for this tenant's apps
    # will attach to the parent Gateway but fail TLS (parent cert
    # doesn't cover customer1.io). That's the operator's responsibility
    # to notice; we don't auto-Gateway because they might just want
    # the namespace for isolation with no public exposure.
    set:
      host: customer1.io
    asserts:
      - template: templates/gateway.yaml
        hasDocuments:
          count: 0

  - it: gateway=true explicit on derived apex → own HelmRelease
    set:
      gateway: true
      host: ""
    asserts:
      - template: templates/gateway.yaml
        equal:
          path: kind
          value: HelmRelease
      - template: templates/gateway.yaml
        equal:
          path: metadata.name
          value: gateway

  - it: gateway=true explicit on custom apex → own HelmRelease
    # The intended path for an operator who wants a custom apex
    # publicly reachable: set host + gateway=true. The tenant gets
    # its own Gateway / LB IP / Certificate / Issuer.
    set:
      gateway: true
      host: customer1.io
    asserts:
      - template: templates/gateway.yaml
        equal:
          path: kind
          value: HelmRelease

  - it: gateway=false explicit → no own HelmRelease (parked)
    # The escape hatch. Operator opts out of any Gateway publishing,
    # even inheritance: namespace.yaml writes _namespace.gateway as
    # empty string (the cozystack-basics-side label pins this in
    # cozystack-values-secret_test.yaml), and the parent Gateway's
    # allowedRoutes selector therefore does not match this namespace.
    set:
      gateway: false
      host: ""
    asserts:
      - template: templates/gateway.yaml
        hasDocuments:
          count: 0

  - it: gateway=true on platform-off cluster → own HelmRelease (operator override)
    # The HelmRelease will fail at runtime (no gateway-application
    # chart on the cluster) — that's a user-visible error, which is
    # the right outcome for explicit opt-in against a not-yet-
    # provisioned platform.
    set:
      gateway: true
      host: ""
      _cluster:
        expose-ingress: tenant-root
        expose-external-ips: "192.0.2.10"
        gateway-enabled: "false"
    asserts:
      - template: templates/gateway.yaml
        equal:
          path: kind
          value: HelmRelease
