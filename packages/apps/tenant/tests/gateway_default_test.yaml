suite: tenant gateway default — auto-on for derived apex, opt-in for custom
templates:
  - templates/gateway.yaml
  - templates/cilium-lb-pool.yaml

# Cozystack targets low-skill operators. A tenant with a derived apex
# (`<name>.<parent>`, computed by the chart when tenant.spec.host is
# empty) implicitly expects routability under that apex — forcing
# operators to also set `tenant.spec.gateway: true` is a UX bug.
#
# The auto-default fires only when the platform itself is gateway-
# enabled (`_cluster.gateway-enabled=true`). Auto-on a Gateway when
# the cluster doesn't ship the gateway-application chart only produces
# broken HelmReleases — explicit opt-in still works in that case so
# operators can preview the wiring on a non-Gateway cluster.
#
# Rules under test (see _helpers.tpl::tenant.gatewayEffective):
#   - platform off + any host + gateway unset    → OFF (auto-default
#                                                       waits for the
#                                                       platform flag)
#   - platform on  + host=""  + gateway unset    → ON  (auto-default)
#   - platform on  + host=custom + gateway unset → OFF (custom apex
#                                                       needs explicit
#                                                       opt-in)
#   - gateway=true  explicit                     → ON  (regardless)
#   - gateway=false explicit                     → OFF (escape hatch)

release:
  name: tenant-alice
  namespace: tenant-alice

set:
  _cluster:
    expose-ingress: tenant-root
    expose-external-ips: "192.0.2.10"
    gateway-enabled: "true"

tests:
  - it: derived apex + gateway unset → renders HelmRelease (auto-on)
    set:
      host: ""
    asserts:
      - template: templates/gateway.yaml
        equal:
          path: kind
          value: HelmRelease
      - template: templates/gateway.yaml
        equal:
          path: metadata.name
          value: gateway

  - it: derived apex + gateway unset → renders LB pool (auto-on)
    set:
      host: ""
    asserts:
      - template: templates/cilium-lb-pool.yaml
        equal:
          path: kind
          value: CiliumLoadBalancerIPPool

  - it: custom apex + gateway unset → no HelmRelease (explicit opt-in)
    set:
      host: customer1.io
    asserts:
      - template: templates/gateway.yaml
        hasDocuments:
          count: 0

  - it: custom apex + gateway unset → no LB pool (no Gateway, no pool)
    set:
      host: customer1.io
    asserts:
      - template: templates/cilium-lb-pool.yaml
        hasDocuments:
          count: 0

  - it: gateway=true explicit on derived apex → renders (passthrough)
    set:
      gateway: true
      host: ""
    asserts:
      - template: templates/gateway.yaml
        equal:
          path: kind
          value: HelmRelease

  - it: gateway=true explicit on custom apex → renders (overrides default)
    set:
      gateway: true
      host: customer1.io
    asserts:
      - template: templates/gateway.yaml
        equal:
          path: kind
          value: HelmRelease

  - it: gateway=false explicit on derived apex → no HelmRelease (escape hatch)
    # The reason this matters: an operator who wants a derived-apex
    # tenant for namespace-isolation purposes only (no public exposure)
    # must be able to opt out without inventing a custom apex.
    set:
      gateway: false
      host: ""
    asserts:
      - template: templates/gateway.yaml
        hasDocuments:
          count: 0

  - it: gateway=false explicit on derived apex → no LB pool either
    set:
      gateway: false
      host: ""
    asserts:
      - template: templates/cilium-lb-pool.yaml
        hasDocuments:
          count: 0

  - it: gateway=false explicit on custom apex → no HelmRelease (passthrough)
    set:
      gateway: false
      host: customer1.io
    asserts:
      - template: templates/gateway.yaml
        hasDocuments:
          count: 0

  - it: tenant-root with gateway unset and host set → no auto-default
    # tenant-root always has tenant.spec.host set explicitly (it's the
    # platform apex). This must NOT auto-Gateway tenant-root just
    # because the chart receives the platform apex via `host`.
    # Operators who want gateway on tenant-root set it explicitly.
    release:
      name: tenant-root
      namespace: tenant-root
    set:
      host: example.org
    asserts:
      - template: templates/gateway.yaml
        hasDocuments:
          count: 0

  # The platform-off cases below pin a critical regression-guard: a
  # tenant on a cluster where `gateway.enabled=false` at the platform
  # level must NOT silently auto-Gateway. The gateway-application
  # chart isn't installed on such clusters, so an auto-on would
  # produce a broken HelmRelease. The e2e install bats lives in this
  # mode (gateway not enabled in the bundle), and a regression here
  # broke `Create tenant with isolated mode enabled` until the
  # platform-flag gate landed.

  - it: platform off + derived apex + gateway unset → no HelmRelease
    set:
      host: ""
      _cluster:
        expose-ingress: tenant-root
        expose-external-ips: "192.0.2.10"
        gateway-enabled: "false"
    asserts:
      - template: templates/gateway.yaml
        hasDocuments:
          count: 0
      - template: templates/cilium-lb-pool.yaml
        hasDocuments:
          count: 0

  - it: platform unset + derived apex + gateway unset → no HelmRelease
    # gateway-enabled empty string — what cozystack-values renders
    # when an operator hasn't flipped gateway.enabled in the platform
    # chart. The helper treats anything other than the literal
    # "true" as off. This is what an upgraded existing cluster looks
    # like before the operator opts in.
    set:
      host: ""
      _cluster:
        expose-ingress: tenant-root
        expose-external-ips: "192.0.2.10"
        gateway-enabled: ""
    asserts:
      - template: templates/gateway.yaml
        hasDocuments:
          count: 0

  - it: platform off + gateway=true explicit → renders (operator override wins)
    # Explicit operator opt-in always wins, even when the platform
    # hasn't flipped gateway.enabled. The gateway HelmRelease will
    # fail at runtime (no chart), but that's a user-visible error
    # which is the right outcome — the operator deliberately asked
    # for it.
    set:
      gateway: true
      host: ""
      _cluster:
        expose-ingress: tenant-root
        expose-external-ips: "192.0.2.10"
        gateway-enabled: "false"
    asserts:
      - template: templates/gateway.yaml
        equal:
          path: kind
          value: HelmRelease
