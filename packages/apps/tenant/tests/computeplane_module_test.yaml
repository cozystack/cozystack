suite: tenant computeplane module toggle
# The computeplane module provisions a single-tenant, Cozystack-managed
# cluster for untrusted-code apps (design-proposals/compute-plane in
# cozystack/community). Contract pinned here:
#   - off by default — no HelmRelease;
#   - NO spec.releaseName on the module HelmRelease: the aggregated API
#     rebuilds HelmRelease specs without releaseName, so the release name
#     must always be the object name or the first tenant edit through the
#     API would rename the release out from under Helm.
templates:
  - templates/computeplane.yaml
release:
  name: tenant-alice
  namespace: tenant-alice
tests:
  - it: renders nothing by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the module HelmRelease when enabled
    set:
      computeplane: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: computeplane
      - notExists:
          path: spec.releaseName
      - equal:
          path: spec.chartRef.name
          value: cozystack-computeplane-application-kubevirt-computeplane
      - equal:
          path: metadata.labels["internal.cozystack.io/tenantmodule"]
          value: "true"
      - equal:
          path: metadata.labels["apps.cozystack.io/application.kind"]
          value: ComputePlane
