{{- if eq (include "tenant.gatewayEffective" .) "true" }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gateway
  namespace: {{ include "tenant.name" . }}
  labels:
    sharding.fluxcd.io/key: tenants
    internal.cozystack.io/tenantmodule: "true"
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    apps.cozystack.io/application.kind: Gateway
    apps.cozystack.io/application.group: apps.cozystack.io
    apps.cozystack.io/application.name: gateway
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-gateway-application-default-gateway
    namespace: cozy-system
  interval: 5m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  # helm-controller v1.5.0 kstatus: gate Ready on the TenantGateway CR's Ready
  # condition (#2642). The gateway.cozystack.io CRD exposes a Ready-type
  # condition (its printer column keys on it), so a standard condition
  # predicate applies; the has(status...) guard avoids the empty-status race on
  # a fresh apply. poller is required for healthCheckExprs to be evaluated.
  waitStrategy:
    name: poller
  healthCheckExprs:
    - apiVersion: gateway.cozystack.io/v1alpha1
      kind: TenantGateway
      current: has(status.conditions) && status.conditions.exists(e, e.type == 'Ready' && e.status == 'True')
  valuesFrom:
  - kind: Secret
    name: cozystack-values
{{- end }}
