{{- if .Values.etcd }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: etcd
  namespace: {{ include "tenant.name" . }}
  labels:
    sharding.fluxcd.io/key: tenants
    internal.cozystack.io/tenantmodule: "true"
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    apps.cozystack.io/application.kind: Etcd
    apps.cozystack.io/application.group: apps.cozystack.io
    apps.cozystack.io/application.name: etcd
spec:
  # This release creates a VMPodScrape resource guarded by the
  # victoria-metrics-operator admission webhook (failurePolicy: Fail). On a cold
  # install the operator can be briefly unavailable on :9443, so gate on its
  # HelmRelease becoming Ready to avoid an install failure → rollback. The system
  # monitoring components gate on the operator the same way, via a variant-level
  # dependsOn in packages/core/platform/sources/monitoring.yaml.
  dependsOn:
    - name: victoria-metrics-operator
      namespace: cozy-victoria-metrics-operator
  chartRef:
    kind: ExternalArtifact
    name: cozystack-etcd-application-default-etcd
    namespace: cozy-system
  interval: 5m
  timeout: 30m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  # helm-controller v1.5.0 kstatus: gate Ready on the EtcdCluster actually
  # having all members ready (#2642). The operator's cluster-level conditions
  # carry no stable Ready type, so key on readyMembers vs spec.replicas;
  # brokenMembers signals failure. A freshly-applied cluster has no
  # readyMembers yet, so the poller holds the release not-ready until the
  # members come up or the HR timeout fires. poller is required for
  # healthCheckExprs to be evaluated.
  waitStrategy:
    name: poller
  healthCheckExprs:
    - apiVersion: etcd-operator.cozystack.io/v1alpha2
      kind: EtcdCluster
      inProgress: has(status.readyMembers) && status.readyMembers < spec.replicas
      failed:     has(status.brokenMembers) && status.brokenMembers > 0
      current:    has(status.readyMembers) && status.readyMembers == spec.replicas
  valuesFrom:
  - kind: Secret
    name: cozystack-values
{{- end }}
