{{- /*
  ComputePlane provisioning (tenant module).

  When .Values.computePlane is set to a profile name, provision a single-tenant,
  Cozystack-managed ComputePlane cluster for this tenant. It reuses the managed
  `kubernetes` app (Kamaji control plane + KubeVirt-VM worker nodes) as the
  substrate; the release is named "computeplane" so Kamaji writes its admin
  kubeconfig to the Secret `computeplane-admin-kubeconfig` (key super-admin.svc),
  which cozystack-api injects into the HelmReleases of `placement: ComputePlane`
  applications (see pkg/registry/apps/application/rest.go).

  The cluster's shape (node groups, GPU types, version, autoscaling bounds) comes
  from a platform-defined profile ConfigMap named computeplane-profile-<name> —
  the single source of truth, referenced here by name only. The profile catalog
  is a follow-up (see design-proposals/compute-plane, Open questions).

  Deliberately NOT labelled as an apps.cozystack.io application: the ComputePlane
  is owned by Cozystack and not surfaced to the tenant as a manageable cluster
  (visibility is decoupled from the security boundary; the tenant gets no admin
  kubeconfig for it).

  install/upgrade.disableWait mirrors how the managed `kubernetes` parent chart
  is reconciled elsewhere: it emits child HelmReleases (cilium/coredns/csi/…) and
  a talos-reconcile Job that cannot become Ready until worker nodes exist, so the
  parent must not block on them.
*/}}
{{- if .Values.computePlane }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: computeplane
  namespace: {{ include "tenant.name" . }}
  labels:
    sharding.fluxcd.io/key: tenants
    internal.cozystack.io/tenantmodule: "true"
    internal.cozystack.io/computeplane: "true"
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-kubernetes-application-kubevirt-kubernetes
    namespace: cozy-system
  interval: 5m
  timeout: 30m
  install:
    disableWait: true
    remediation:
      retries: -1
  upgrade:
    disableWait: true
    remediation:
      retries: -1
  valuesFrom:
  # Platform-defined ComputePlane profile (single source of truth for node
  # groups / GPU types / Kubernetes version / autoscaling). Referenced by name
  # only; the profile catalog is a follow-up.
  - kind: ConfigMap
    name: computeplane-profile-{{ .Values.computePlane }}
  - kind: Secret
    name: cozystack-values
{{- end }}
