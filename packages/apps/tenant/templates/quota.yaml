{{- if .Values.resourceQuotas }}
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: {{ include "tenant.name" . }}
spec:
  hard:
    {{- include "cozy-lib.resources.flatten" (list .Values.resourceQuotas $) | nindent 6 }}
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-range-limits
  namespace: {{ include "tenant.name" . }}
spec:
  limits:
    - default:
        cpu: "4"
        memory: "4Gi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      type: Container
{{- end }}
