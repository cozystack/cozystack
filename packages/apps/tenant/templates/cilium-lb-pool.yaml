{{- $exposeMode := (index .Values._cluster "expose-mode") | default "externalIPs" }}
{{- $exposeIngress := (index .Values._cluster "expose-ingress") | default "tenant-root" }}
{{- $exposeIPs := (index .Values._cluster "expose-external-ips") | default "" | nospace }}
{{- $ipsList := list }}
{{- range splitList "," $exposeIPs }}
  {{- $ip := . | trim }}
  {{- if $ip }}
    {{- $ipsList = append $ipsList $ip }}
  {{- end }}
{{- end }}
{{- $isPublishingIngressLB := and
      (eq $exposeMode "loadBalancer")
      (eq $exposeIngress .Release.Namespace)
      .Values.ingress }}
{{- $hasOwnGateway := .Values.gateway | default false }}
{{- /*
  Empty-IPs guard for tenant Gateway. The chart can render its own
  CiliumLoadBalancerIPPool only if publishing.externalIPs is non-empty.
  Without IPs the LoadBalancer Service stays in <pending> with no
  address — that's an outright misconfig in externalIPs mode (no LB
  IPAM source) and must fail render. In loadBalancer mode it's a
  legitimate operator pattern: cluster-wide BGP / L2-announce pools
  managed outside this chart provide the IP. Skip the per-tenant pool
  in that case so cilium IPAM picks up the operator's pool by service
  selector.
*/}}
{{- if and $hasOwnGateway (not $ipsList) }}
  {{- if eq $exposeMode "externalIPs" }}
    {{- fail "publishing.externalIPs is empty — a tenant Gateway has no source of LoadBalancer IPs in publishing.exposure=externalIPs mode. The Gateway Service would stay in <pending> with no address. Set publishing.externalIPs on the platform, or switch to publishing.exposure=loadBalancer with a BGP / L2-announce pool you manage separately, before enabling tenant.spec.gateway=true." }}
  {{- end }}
{{- end }}
{{- if and (or $isPublishingIngressLB $hasOwnGateway) $ipsList }}
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: {{ trimPrefix "tenant-" .Release.Namespace }}-exposure
spec:
  blocks:
  {{- range $ipsList }}
  - cidr: {{ . }}{{ if not (contains "/" .) }}/{{ if contains ":" . }}128{{ else }}32{{ end }}{{ end }}
  {{- end }}
  serviceSelector:
    matchLabels:
      "io.kubernetes.service.namespace": {{ .Release.Namespace | quote }}
{{- end }}
