{{/* Lookup for namespace uid (needed for ownerReferences) */}}
{{- $existingNS := lookup "v1" "Namespace" "" .Release.Namespace }}
{{- if not $existingNS }}
{{- fail (printf "error lookup existing namespace: %s" .Release.Namespace) }}
{{- end }}

{{- if ne (include "tenant.name" .) "tenant-root" }}
{{/* Compute namespace values once for use in both Secret and labels */}}
{{- $tenantName := include "tenant.name" . }}
{{- $parentNamespace := .Values._namespace | default dict }}
{{- $parentHost := $parentNamespace.host | default "" }}

{{/* Compute host */}}
{{- $computedHost := "" }}
{{- if .Values.host }}
{{- $computedHost = .Values.host }}
{{- else if $parentHost }}
{{- $computedHost = printf "%s.%s" (splitList "-" $tenantName | last) $parentHost }}
{{- end }}

{{/* Compute service references */}}
{{- $etcd := $parentNamespace.etcd | default "" }}
{{- if .Values.etcd }}
{{- $etcd = $tenantName }}
{{- end }}

{{- $ingress := $parentNamespace.ingress | default "" }}
{{- if .Values.ingress }}
{{- $ingress = $tenantName }}
{{- end }}

{{/*
  Gateway reference is NOT inherited from parent. A child tenant
  namespace is not on the parent Gateway's allowedRoutes whitelist,
  and the parent Gateway's wildcard cert only covers <apex> +
  *.<apex> (one level) while a child apex would be two levels deep —
  inheritance would break both admission and TLS. Each tenant that
  wants Gateway-attached apps either sets tenant.spec.gateway=true
  explicitly or hits the auto-default for derived-apex tenants
  (tenant.gatewayEffective). The same helper is consulted by
  gateway.yaml (HelmRelease render) so the per-tenant Gateway, the
  namespace label, and _namespace.gateway propagation to apps stay
  in lockstep.
*/}}
{{- $gateway := "" }}
{{- if eq (include "tenant.gatewayEffective" .) "true" }}
{{- $gateway = $tenantName }}
{{- end }}

{{- $monitoring := $parentNamespace.monitoring | default "" }}
{{- if .Values.monitoring }}
{{- $monitoring = $tenantName }}
{{- end }}

{{- $seaweedfs := $parentNamespace.seaweedfs | default "" }}
{{- if .Values.seaweedfs }}
{{- $seaweedfs = $tenantName }}
{{- end }}

{{/* SchedulingClass: inherited from parent, can be set if parent has none */}}
{{- $schedulingClass := $parentNamespace.schedulingClass | default "" }}
{{- if and (not $schedulingClass) .Values.schedulingClass }}
{{- $schedulingClass = .Values.schedulingClass }}
{{- end }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $tenantName }}
  {{- if hasPrefix "tenant-" .Release.Namespace }}
  labels:
    tenant.cozystack.io/{{ $tenantName }}: ""
    {{- $parts := splitList "-" .Release.Namespace }}
    {{- range $i, $v := $parts }}
    {{- if ne $i 0 }}
    tenant.cozystack.io/{{ join "-" (slice $parts 0 (add $i 1)) }}: ""
    {{- end }}
    {{- end }}
    {{/* Labels for network policies */}}
    namespace.cozystack.io/etcd: {{ $etcd | quote }}
    namespace.cozystack.io/ingress: {{ $ingress | quote }}
    namespace.cozystack.io/gateway: {{ $gateway | quote }}
    namespace.cozystack.io/monitoring: {{ $monitoring | quote }}
    namespace.cozystack.io/seaweedfs: {{ $seaweedfs | quote }}
    namespace.cozystack.io/host: {{ $computedHost | quote }}
    {{- with $schedulingClass }}
    scheduler.cozystack.io/scheduling-class: {{ . | quote }}
    {{- end }}
    alpha.kubevirt.io/auto-memory-limits-ratio: "1.0"
  ownerReferences:
  - apiVersion: v1
    blockOwnerDeletion: true
    controller: true
    kind: Namespace
    name: {{ .Release.Namespace }}
    uid: {{ $existingNS.metadata.uid }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: cozystack-values
  namespace: {{ $tenantName }}
  labels:
    reconcile.fluxcd.io/watch: Enabled
type: Opaque
stringData:
  values.yaml: |
    _cluster:
      {{- .Values._cluster | toYaml | nindent 6 }}
    _namespace:
      etcd: {{ $etcd | quote }}
      ingress: {{ $ingress | quote }}
      gateway: {{ $gateway | quote }}
      monitoring: {{ $monitoring | quote }}
      seaweedfs: {{ $seaweedfs | quote }}
      host: {{ $computedHost | quote }}
      {{- with $schedulingClass }}
      schedulingClass: {{ . | quote }}
      {{- end }}
{{- end }}
