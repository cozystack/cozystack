---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-qdrant-cleanup
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        policy.cozystack.io/allow-to-apiserver: "true"
    spec:
      serviceAccountName: {{ .Release.Name }}-qdrant-cleanup
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cleanup
          image: docker.io/clastix/kubectl:v1.32
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          command:
            - /bin/sh
            - -c
            - |
              # StatefulSet-templated data PVCs are named
              # qdrant-storage-<release>-<ordinal> (volumeClaimTemplate name
              # "qdrant-storage" + StatefulSet name <release> + pod ordinal).
              # Select by that deterministic name rather than a label: the
              # upstream chart stamps volumeClaimTemplates labels, which are
              # immutable on an existing StatefulSet, so a label-based scheme
              # cannot be applied to already-deployed instances. Name selection
              # needs no StatefulSet change and also reclaims PVCs created before
              # this hook existed. The ordinal is anchored ("-[0-9]+$") so a
              # release whose name is a prefix of a sibling (e.g. "qdrant-test"
              # vs "qdrant-test-2") never matches the sibling's PVCs and deletes
              # its data. See #3059.
              echo "Deleting orphaned data PVCs for release {{ .Release.Name }}..."
              pvcs=$(kubectl get pvc -n {{ .Release.Namespace }} -o name \
                | grep -E "^persistentvolumeclaim/qdrant-storage-{{ .Release.Name }}-[0-9]+$" || true)
              if [ -z "$pvcs" ]; then
                echo "No data PVCs found for release {{ .Release.Name }}; nothing to delete."
              else
                echo "$pvcs" | xargs kubectl delete -n {{ .Release.Namespace }} --ignore-not-found \
                  || echo "WARNING: PVC cleanup failed for {{ .Release.Name }}; orphaned PVCs may remain" >&2
              fi
              echo "PVC cleanup complete."
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-qdrant-cleanup
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-delete
    helm.sh/hook-weight: "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-qdrant-cleanup
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-qdrant-cleanup
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-delete
    helm.sh/hook-weight: "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-qdrant-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-qdrant-cleanup
