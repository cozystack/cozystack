{{- $clusterDomain := "cozy.local" }}
{{- if .Values._cluster }}
{{- $clusterDomain = (index .Values._cluster "cluster-domain") | default "cozy.local" }}
{{- end }}
{{- $tlsEnabled := eq (include "qdrant.tls.enabled" .) "true" -}}
{{- if $tlsEnabled }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-selfsigned
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-ca
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Release.Name }}-ca
  secretTemplate:
    labels:
      internal.cozystack.io/publish-ca-cert: "true"
      internal.cozystack.io/publish-ca-cert-release: {{ .Release.Name }}
  duration: 43800h
  commonName: {{ .Release.Name }}-ca
  issuerRef:
    name: {{ .Release.Name }}-selfsigned
  isCA: true
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Never
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-ca
  namespace: {{ .Release.Namespace }}
spec:
  ca:
    secretName: {{ .Release.Name }}-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Release.Name }}-tls
  duration: 8760h
  renewBefore: 720h
  isCA: false
  issuerRef:
    name: {{ .Release.Name }}-ca
  commonName: {{ .Release.Name }}
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  # server auth: required for REST (6333) and gRPC (6334) TLS endpoints.
  # client auth: required for p2p mTLS — Qdrant uses ca_cert for peer
  # verification when cluster.p2p.enable_tls is true (see qdrant.yaml).
  usages:
    - digital signature
    - key encipherment
    - server auth
    - client auth
  dnsNames:
    - {{ .Release.Name }}
    - {{ .Release.Name }}.{{ .Release.Namespace }}.svc
    - {{ .Release.Name }}.{{ .Release.Namespace }}.svc.{{ $clusterDomain }}
    - {{ .Release.Name }}-headless
    - {{ .Release.Name }}-headless.{{ .Release.Namespace }}.svc
    - {{ .Release.Name }}-headless.{{ .Release.Namespace }}.svc.{{ $clusterDomain }}
    - "*.{{ .Release.Name }}-headless.{{ .Release.Namespace }}.svc.{{ $clusterDomain }}"
    {{- range $i, $_ := until (int .Values.replicas) }}
    - {{ printf "%s-%d.%s-headless" $.Release.Name $i $.Release.Name | quote }}
    - {{ printf "%s-%d.%s-headless.%s.svc" $.Release.Name $i $.Release.Name $.Release.Namespace | quote }}
    - {{ printf "%s-%d.%s-headless.%s.svc.%s" $.Release.Name $i $.Release.Name $.Release.Namespace $clusterDomain | quote }}
    {{- end }}
    {{- if .Values.external }}
    - {{ .Release.Name }}.{{ .Values._namespace.host }}
    {{- end }}
{{- end }}
