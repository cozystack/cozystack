## @param {int} replicas - Number of Qdrant replicas. Cluster mode is automatically enabled when replicas > 1.
replicas: 1

## @param {Resources} [resources] - Explicit CPU and memory configuration for each Qdrant replica. When omitted, the preset defined in `resourcesPreset` is applied.
resources: {}

## @param {ResourcesPreset} resourcesPreset="t1.small" - Default sizing preset used when `resources` is omitted.
resourcesPreset: "t1.small"

## @param {quantity} size - Persistent Volume Claim size available for vector data storage.
size: 10Gi

## @param {string} storageClass - StorageClass used to store the data.
## @immutable
## @x-cozystack-options {source: storageclass}
storageClass: ""

## @param {bool} external - Enable external access from outside the cluster.
external: false

##
## @section TLS parameters
##

## @typedef {struct} TLS - TLS configuration for Qdrant.
## @field {*bool} enabled - Enable TLS. When unset, inherits the value of `external` (TLS is on when external access is enabled). Set explicitly to `true` or `false` to override.

## @param {TLS} [tls] - TLS configuration. When omitted, the effective TLS state follows the value of `external`.
tls: {}

## @param {string} schedulingClass - Name of a SchedulingClass CR (cluster-scoped, group cozystack.io) applied to this application's workloads. When set, takes precedence over any tenant-level schedulingClass. Empty means inherit from the tenant.
## @maxLength 63
schedulingClass: ""
