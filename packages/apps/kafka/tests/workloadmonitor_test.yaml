suite: WorkloadMonitor tests

templates:
  - templates/workloadmonitor.yaml

tests:
  ##################################
  # Combined pool (new instance)   #
  ##################################

  - it: creates only kafka WorkloadMonitor for new instance
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: WorkloadMonitor
      - equal:
          path: metadata.name
          value: test-kafka

  - it: sets type kafka for combined pool
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.type
          value: kafka

  - it: does not add pool-name selector for combined pool
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - notExists:
          path: spec.selector["strimzi.io/pool-name"]

  - it: sets correct kafka monitor fields
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.kind
          value: kafka
      - equal:
          path: spec.minReplicas
          value: 1

  - it: sets replicas from kafka.replicas
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      kafka:
        replicas: 5
    asserts:
      - equal:
          path: spec.replicas
          value: 5

  - it: sets correct selector labels
    release:
      name: my-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: my-kafka
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: kafka

  - it: does not create zookeeper WorkloadMonitor for new instance
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - hasDocuments:
          count: 1
