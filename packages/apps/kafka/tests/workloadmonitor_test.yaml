suite: WorkloadMonitor tests

templates:
  - templates/workloadmonitor.yaml

tests:
  ##################################
  # Pool layout (always separated) #
  ##################################

  - it: renders broker and controller WorkloadMonitors
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: WorkloadMonitor
        documentIndex: 0
      - isKind:
          of: WorkloadMonitor
        documentIndex: 1

  - it: names broker monitor as the release and controller monitor with -controller suffix
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: metadata.name
          value: test-kafka
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-kafka-controller
        documentIndex: 1

  - it: sets broker monitor type to kafka-broker with pool-name selector
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.type
          value: kafka-broker
        documentIndex: 0
      - equal:
          path: spec.selector["strimzi.io/pool-name"]
          value: test-kafka-broker
        documentIndex: 0

  - it: sets controller monitor type to kafka-controller with pool-name selector
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.type
          value: kafka-controller
        documentIndex: 1
      - equal:
          path: spec.selector["strimzi.io/pool-name"]
          value: test-kafka-controller
        documentIndex: 1

  ##################################
  # Replicas                       #
  ##################################

  - it: broker monitor replicas track kafka.replicas
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      kafka:
        replicas: 5
    asserts:
      - equal:
          path: spec.replicas
          value: 5
        documentIndex: 0

  - it: controller monitor has 3 replicas when kafka.replicas >= 2
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      kafka:
        replicas: 5
    asserts:
      - equal:
          path: spec.replicas
          value: 3
        documentIndex: 1

  - it: controller monitor falls back to 1 replica when kafka.replicas <= 1
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      kafka:
        replicas: 1
    asserts:
      - equal:
          path: spec.replicas
          value: 1
        documentIndex: 1

  ##################################
  # Common fields                  #
  ##################################

  - it: sets kind=kafka and minReplicas=1 on both monitors
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.kind
          value: kafka
        documentIndex: 0
      - equal:
          path: spec.minReplicas
          value: 1
        documentIndex: 0
      - equal:
          path: spec.kind
          value: kafka
        documentIndex: 1
      - equal:
          path: spec.minReplicas
          value: 1
        documentIndex: 1

  - it: does not render a zookeeper WorkloadMonitor
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - hasDocuments:
          count: 2
