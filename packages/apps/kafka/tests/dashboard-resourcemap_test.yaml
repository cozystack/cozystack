suite: Dashboard resourcemap tests

templates:
  - templates/dashboard-resourcemap.yaml

tests:
  - it: creates Role and RoleBinding
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Role
        documentIndex: 0
      - isKind:
          of: RoleBinding
        documentIndex: 1

  - it: allows access to internal kafka-bootstrap service
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - contains:
          path: rules[0].resourceNames
          content: test-kafka-kafka-bootstrap
        documentIndex: 0

  - it: omits external kafka bootstrap service when external is false
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      external: false
    asserts:
      - notContains:
          path: rules[0].resourceNames
          content: test-kafka-kafka-external-bootstrap
        documentIndex: 0

  - it: allows access to external kafka bootstrap service when external is true
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      external: true
    asserts:
      - contains:
          path: rules[0].resourceNames
          content: test-kafka-kafka-external-bootstrap
        documentIndex: 0

  - it: allows access to clients-ca secret
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - contains:
          path: rules[1].resourceNames
          content: test-kafka-clients-ca
        documentIndex: 0

  - it: allows access to broker and controller workloadmonitors
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - contains:
          path: rules[2].resourceNames
          content: test-kafka
        documentIndex: 0
      - contains:
          path: rules[2].resourceNames
          content: test-kafka-controller
        documentIndex: 0

  - it: does not reference zookeeper workloadmonitor
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - notContains:
          path: rules[2].resourceNames
          content: test-kafka-zookeeper
        documentIndex: 0
