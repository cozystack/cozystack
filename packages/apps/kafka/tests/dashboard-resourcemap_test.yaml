suite: dashboard resourcemap tests

templates:
  - templates/dashboard-resourcemap.yaml

tests:
  # Always renders Role and RoleBinding
  - it: renders Role and RoleBinding
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Role
        documentIndex: 0
      - isKind:
          of: RoleBinding
        documentIndex: 1

  # Role naming
  - it: uses correct Role name
    release:
      name: my-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: metadata.name
          value: my-kafka-dashboard-resources
        documentIndex: 0

  # RoleBinding naming
  - it: uses correct RoleBinding name
    release:
      name: my-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: metadata.name
          value: my-kafka-dashboard-resources
        documentIndex: 1

  # Internal bootstrap service always in RBAC
  - it: grants access to internal bootstrap service
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - contains:
          path: rules[0].resourceNames
          content: test-kafka-kafka-bootstrap
        documentIndex: 0

  # External bootstrap service absent when external is false
  - it: does not grant access to external bootstrap service when external is false
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      external: false
    asserts:
      - notContains:
          path: rules[0].resourceNames
          content: test-kafka-kafka-external-bootstrap
        documentIndex: 0

  # External bootstrap service present when external is true
  - it: grants access to external bootstrap service when external is true
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      external: true
    asserts:
      - contains:
          path: rules[0].resourceNames
          content: test-kafka-kafka-external-bootstrap
        documentIndex: 0

  # Role grants access to CA secrets
  - it: grants access to clients CA cert secret
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - contains:
          path: rules[1].resourceNames
          content: test-kafka-clients-ca-cert
        documentIndex: 0
      - notContains:
          path: rules[1].resourceNames
          content: test-kafka-clients-ca
        documentIndex: 0

  - it: grants access to cluster CA cert secret
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - contains:
          path: rules[1].resourceNames
          content: test-kafka-cluster-ca-cert
        documentIndex: 0

  # Role grants access to workloadmonitors
  - it: grants access to WorkloadMonitor
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - contains:
          path: rules[2].resourceNames
          content: test-kafka
        documentIndex: 0
      - equal:
          path: rules[2].apiGroups[0]
          value: cozystack.io
        documentIndex: 0

  # External bootstrap service present when tls.enabled=true and external=false ($showExternal is true)
  - it: grants access to external bootstrap service when tls.enabled=true and external=false
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      external: false
      tls:
        enabled: true
    asserts:
      - contains:
          path: rules[0].resourceNames
          content: test-kafka-kafka-external-bootstrap
        documentIndex: 0

  # External bootstrap service absent when both external=false and tls.enabled=false
  - it: does not grant access to external bootstrap when tls.enabled is explicitly false and external is false
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      external: false
      tls:
        enabled: false
    asserts:
      - notContains:
          path: rules[0].resourceNames
          content: test-kafka-kafka-external-bootstrap
        documentIndex: 0

  # RoleBinding references correct Role
  - it: RoleBinding references correct Role
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: roleRef.kind
          value: Role
        documentIndex: 1
      - equal:
          path: roleRef.name
          value: test-kafka-dashboard-resources
        documentIndex: 1
      - equal:
          path: roleRef.apiGroup
          value: rbac.authorization.k8s.io
        documentIndex: 1
