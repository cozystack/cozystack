suite: Kafka CR tests

templates:
  - templates/kafka.yaml

tests:
  ##########################
  # KRaft mode (new inst.) #
  ##########################

  - it: renders Kafka CR with KRaft annotations for new instance
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Kafka
      - equal:
          path: metadata.annotations["strimzi.io/kraft"]
          value: enabled
      - equal:
          path: metadata.annotations["strimzi.io/node-pools"]
          value: enabled

  - it: sets correct name and labels
    release:
      name: my-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: metadata.name
          value: my-kafka
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: my-kafka

  - it: sets Kafka version from version map (default v3.9)
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.kafka.version
          value: "3.9.0"

  - it: resolves v3.8 version
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      version: "v3.8"
    asserts:
      - equal:
          path: spec.kafka.version
          value: "3.8.1"


  - it: does not include zookeeper section for new instance
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - notExists:
          path: spec.zookeeper

  - it: does not include replicas in Kafka CR (managed by KafkaNodePool)
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - notExists:
          path: spec.kafka.replicas

  - it: does not include storage in Kafka CR (managed by KafkaNodePool)
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - notExists:
          path: spec.kafka.storage

  - it: does not include resources in Kafka CR (managed by KafkaNodePool)
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - notExists:
          path: spec.kafka.resources

  ##########################
  # Listeners              #
  ##########################

  - it: configures internal listeners by default
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.kafka.listeners[0].name
          value: plain
      - equal:
          path: spec.kafka.listeners[0].type
          value: internal
      - equal:
          path: spec.kafka.listeners[1].name
          value: tls
      - equal:
          path: spec.kafka.listeners[1].type
          value: internal
      - equal:
          path: spec.kafka.listeners[2].name
          value: external
      - equal:
          path: spec.kafka.listeners[2].type
          value: internal

  - it: sets external listener to loadbalancer when external is true
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      external: true
    asserts:
      - equal:
          path: spec.kafka.listeners[2].type
          value: loadbalancer

  ##########################
  # Replication config     #
  ##########################

  - it: sets replication factor 1 for single replica
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      kafka:
        replicas: 1
    asserts:
      - equal:
          path: spec.kafka.config["offsets.topic.replication.factor"]
          value: 1
      - equal:
          path: spec.kafka.config["min.insync.replicas"]
          value: 1

  - it: sets replication factor 2 for two replicas
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      kafka:
        replicas: 2
    asserts:
      - equal:
          path: spec.kafka.config["offsets.topic.replication.factor"]
          value: 2

  - it: sets replication factor 3 for three or more replicas
    release:
      name: test-kafka
      namespace: tenant-test
    set:
      kafka:
        replicas: 5
    asserts:
      - equal:
          path: spec.kafka.config["offsets.topic.replication.factor"]
          value: 3
      - equal:
          path: spec.kafka.config["min.insync.replicas"]
          value: 2

  ##########################
  # Entity Operator        #
  ##########################

  - it: includes entity operator with topic and user operators
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - exists:
          path: spec.entityOperator.topicOperator
      - exists:
          path: spec.entityOperator.userOperator

  ##########################
  # Metrics                #
  ##########################

  - it: configures JMX Prometheus metrics
    release:
      name: test-kafka
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.kafka.metricsConfig.type
          value: jmxPrometheusExporter
      - equal:
          path: spec.kafka.metricsConfig.valueFrom.configMapKeyRef.name
          value: test-kafka-metrics
      - equal:
          path: spec.kafka.metricsConfig.valueFrom.configMapKeyRef.key
          value: kafka-metrics-config.yml
