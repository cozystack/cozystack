{{- $existingKafka := lookup "kafka.strimzi.io/v1beta2" "Kafka" .Release.Namespace .Release.Name }}
{{- $isExisting := not (empty $existingKafka) }}
{{- $metadataState := "" }}
{{- if $isExisting }}
  {{- $metadataState = dig "status" "kafkaMetadataState" "ZooKeeper" $existingKafka }}
{{- end }}
{{- $isKRaft := or (not $isExisting) (eq $metadataState "KRaft") }}
{{- $existingBrokerPool := lookup "kafka.strimzi.io/v1beta2" "KafkaNodePool" .Release.Namespace (printf "%s-broker" .Release.Name) }}
{{- $useCombinedPool := empty $existingBrokerPool }}
{{- $controllerReplicas := 3 }}
{{- if le (int .Values.kafka.replicas) 1 }}
  {{- $controllerReplicas = 1 }}
{{- end }}
---
apiVersion: cozystack.io/v1alpha1
kind: WorkloadMonitor
metadata:
  name: {{ $.Release.Name }}
  labels:
    workloads.cozystack.io/resource-preset: {{ .Values.kafka.resourcesPreset | quote }}
spec:
  replicas: {{ .Values.kafka.replicas }}
  minReplicas: 1
  kind: kafka
  {{- if $useCombinedPool }}
  type: kafka
  {{- else }}
  type: kafka-broker
  {{- end }}
  selector:
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/name: kafka
    {{- if not $useCombinedPool }}
    strimzi.io/pool-name: {{ $.Release.Name }}-broker
    {{- end }}
  version: {{ $.Chart.Version }}
{{- if not $useCombinedPool }}
---
apiVersion: cozystack.io/v1alpha1
kind: WorkloadMonitor
metadata:
  name: {{ $.Release.Name }}-controller
  labels:
    workloads.cozystack.io/resource-preset: {{ .Values.kafka.resourcesPreset | quote }}
spec:
  replicas: {{ $controllerReplicas }}
  minReplicas: 1
  kind: kafka
  type: kafka-controller
  selector:
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/name: kafka
    strimzi.io/pool-name: {{ $.Release.Name }}-controller
  version: {{ $.Chart.Version }}
{{- end }}
{{- if not $isKRaft }}
---
apiVersion: cozystack.io/v1alpha1
kind: WorkloadMonitor
metadata:
  name: {{ $.Release.Name }}-zookeeper
  labels:
    workloads.cozystack.io/resource-preset: {{ .Values.zookeeper.resourcesPreset | quote }}
spec:
  replicas: {{ .Values.zookeeper.replicas }}
  minReplicas: 1
  kind: kafka
  type: zookeeper
  selector:
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/name: zookeeper
  version: {{ $.Chart.Version }}
{{- end }}
