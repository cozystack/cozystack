{{- /*
  Tri-state TLS logic for the external listener (port 9094):
  - .Values.external is the sole gate for the external LoadBalancer listener.
    The listener is rendered if and only if external is true.
  - tls.enabled controls TLS *on the external listener* (independent of whether
    the listener exists):
    - If tls.enabled is explicitly set (true or false), that value wins.
    - If tls.enabled is unset (nil / absent), TLS inherits from .Values.external
      (auto-on when external is true, off otherwise).
  - tls.enabled does NOT control whether the external listener is created.
    Setting tls.enabled=true with external=false has no effect on listeners.
  Internal TLS listener (port 9093) is always on; Strimzi manages the PKI.
  Null detection uses `kindIs "invalid"` (canonical pattern) — see _tls.tpl.
*/ -}}
{{- $tlsEnabled := include "kafka.tls.enabled" . | trim -}}
{{- $showExternal := .Values.external -}}
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  kafka:
    replicas: {{ .Values.kafka.replicas }}
    resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.kafka.resourcesPreset .Values.kafka.resources $) | nindent 6 }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
      {{- if $showExternal }}
      - name: external
        port: 9094
        type: loadbalancer
        tls: {{ $tlsEnabled }}
      {{- end }}
    config:
      {{- if eq (int .Values.kafka.replicas) 1 }}
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      {{- else if eq (int .Values.kafka.replicas) 2 }}
      offsets.topic.replication.factor: 2
      transaction.state.log.replication.factor: 2
      transaction.state.log.min.isr: 2
      default.replication.factor: 2
      min.insync.replicas: 2
      {{- else }}
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      {{- end }}
    storage:
      type: jbod
      volumes:
      - id: 0
        type: persistent-claim
        {{- with .Values.kafka.size }}
        size: {{ . }}
        {{- end }}
        {{- with .Values.kafka.storageClass }}
        class: {{ . }}
        {{- end }}
        deleteClaim: true
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: {{ .Release.Name }}-metrics
          key: kafka-metrics-config.yml
  zookeeper:
    replicas: {{ .Values.zookeeper.replicas }}
    resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.zookeeper.resourcesPreset .Values.zookeeper.resources $) | nindent 6 }}
    storage:
      type: persistent-claim
      {{- with .Values.zookeeper.size }}
      size: {{ . }}
      {{- end }}
      {{- with .Values.kafka.storageClass }}
      class: {{ . }}
      {{- end }}
      deleteClaim: true
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: {{ .Release.Name }}-metrics
          key: kafka-metrics-config.yml
  entityOperator:
    topicOperator: {}
    userOperator: {}
    template:
      # `pod` accepts metadata + a flat set of pod-spec fields
      # (enableServiceLinks, securityContext, affinity, …) directly.
      # The previous file nested enableServiceLinks under a phantom
      # `template.spec` key — Flux v2.7 dropped it silently, v2.8 SSA
      # rejects it with "field not declared in schema".
      pod:
        metadata:
          labels:
            policy.cozystack.io/allow-to-apiserver: "true"
        enableServiceLinks: false
