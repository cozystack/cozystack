{{- $kafkaVersion := include "kafka.versionMap" . }}
{{- $existingKafka := lookup "kafka.strimzi.io/v1beta2" "Kafka" .Release.Namespace .Release.Name }}
{{- $isExisting := not (empty $existingKafka) }}
{{- $metadataState := "" }}
{{- if $isExisting }}
  {{- $metadataState = dig "status" "kafkaMetadataState" "" $existingKafka }}
{{- end }}
{{- /* Switch to KRaft enabled when migration reaches KRaftPostMigration or later */ -}}
{{- $isKRaft := or (not $isExisting) (has $metadataState (list "KRaftPostMigration" "PreKRaft" "KRaft")) }}
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    strimzi.io/node-pools: enabled
    {{- if $isKRaft }}
    strimzi.io/kraft: enabled
    {{- else }}
    strimzi.io/kraft: migration
    {{- end }}
spec:
  kafka:
    version: {{ $kafkaVersion }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
      - name: external
        port: 9094
        {{- if .Values.external }}
        type: loadbalancer
        {{- else }}
        type: internal
        {{- end }}
        tls: false
    config:
      {{- if eq (int .Values.kafka.replicas) 1 }}
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      {{- else if eq (int .Values.kafka.replicas) 2 }}
      offsets.topic.replication.factor: 2
      transaction.state.log.replication.factor: 2
      transaction.state.log.min.isr: 2
      default.replication.factor: 2
      min.insync.replicas: 2
      {{- else }}
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      {{- end }}
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: {{ .Release.Name }}-metrics
          key: kafka-metrics-config.yml
  {{- if not $isKRaft }}
  zookeeper:
    replicas: {{ .Values.zookeeper.replicas }}
    resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.zookeeper.resourcesPreset .Values.zookeeper.resources $) | nindent 6 }}
    storage:
      type: persistent-claim
      {{- with .Values.zookeeper.size }}
      size: {{ . }}
      {{- end }}
      {{- with .Values.zookeeper.storageClass }}
      class: {{ . }}
      {{- end }}
      deleteClaim: false
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: {{ .Release.Name }}-metrics
          key: zookeeper-metrics-config.yml
  {{- end }}
  entityOperator:
    topicOperator: {}
    userOperator: {}
    template:
      pod:
        metadata:
         labels:
           policy.cozystack.io/allow-to-apiserver: "true"
      spec:
        enableServiceLinks: false
