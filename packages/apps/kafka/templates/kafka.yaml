{{- /*
  Tri-state TLS logic for the external listener (port 9094):
  - If tls.enabled is explicitly set (true or false), that value wins.
  - If tls.enabled is unset (nil), the value inherits from .Values.external.
  External listener is shown when .Values.external is true OR when tls.enabled
  is explicitly true (so callers can enable TLS-only external access without
  also setting the generic external flag).
*/ -}}
{{- $tlsMap := .Values.tls | default dict -}}
{{- $tlsEnabledExplicit := hasKey $tlsMap "enabled" -}}
{{- $tlsEnabled := false -}}
{{- if $tlsEnabledExplicit -}}
  {{- $tlsEnabled = index $tlsMap "enabled" -}}
{{- else -}}
  {{- $tlsEnabled = .Values.external | default false -}}
{{- end -}}
{{- $showExternal := or .Values.external (and $tlsEnabledExplicit $tlsEnabled) -}}
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  kafka:
    replicas: {{ .Values.kafka.replicas }}
    resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.kafka.resourcesPreset .Values.kafka.resources $) | nindent 6 }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
      {{- if $showExternal }}
      - name: external
        port: 9094
        type: loadbalancer
        tls: {{ $tlsEnabled }}
      {{- end }}
    config:
      {{- if eq (int .Values.kafka.replicas) 1 }}
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      {{- else if eq (int .Values.kafka.replicas) 2 }}
      offsets.topic.replication.factor: 2
      transaction.state.log.replication.factor: 2
      transaction.state.log.min.isr: 2
      default.replication.factor: 2
      min.insync.replicas: 2
      {{- else }}
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      {{- end }}
    storage:
      type: jbod
      volumes:
      - id: 0
        type: persistent-claim
        {{- with .Values.kafka.size }}
        size: {{ . }}
        {{- end }}
        {{- with .Values.kafka.storageClass }}
        class: {{ . }}
        {{- end }}
        deleteClaim: true
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: {{ .Release.Name }}-metrics
          key: kafka-metrics-config.yml
  zookeeper:
    replicas: {{ .Values.zookeeper.replicas }}
    resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.zookeeper.resourcesPreset .Values.zookeeper.resources $) | nindent 6 }}
    storage:
      type: persistent-claim
      {{- with .Values.zookeeper.size }}
      size: {{ . }}
      {{- end }}
      {{- with .Values.kafka.storageClass }}
      class: {{ . }}
      {{- end }}
      deleteClaim: false
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: {{ .Release.Name }}-metrics
          key: kafka-metrics-config.yml
  entityOperator:
    topicOperator: {}
    userOperator: {}
    template:
      pod:
        metadata:
         labels:
           policy.cozystack.io/allow-to-apiserver: "true"
      spec:
        enableServiceLinks: false
