{{- $existingKafka := lookup "kafka.strimzi.io/v1beta2" "Kafka" .Release.Namespace .Release.Name }}
{{- $isExisting := not (empty $existingKafka) }}
{{- $metadataState := "" }}
{{- if $isExisting }}
  {{- $metadataState = dig "status" "kafkaMetadataState" "" $existingKafka }}
{{- end }}
{{- $isKRaft := or (not $isExisting) (has $metadataState (list "KRaftPostMigration" "PreKRaft" "KRaft")) }}
{{- $existingBrokerPool := lookup "kafka.strimzi.io/v1beta2" "KafkaNodePool" .Release.Namespace (printf "%s-broker" .Release.Name) }}
{{- $isMigrating := and (not (empty $existingKafka)) (not (has $metadataState (list "KRaftPostMigration" "PreKRaft" "KRaft" ""))) }}
{{- $useCombinedPool := and (empty $existingBrokerPool) (not $isMigrating) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-dashboard-resources
rules:
- apiGroups:
  - ""
  resources:
  - services
  resourceNames:
  - {{ .Release.Name }}-kafka-bootstrap
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ .Release.Name }}-clients-ca
  verbs: ["get", "list", "watch"]
- apiGroups:
  - cozystack.io
  resources:
  - workloadmonitors
  resourceNames:
  - {{ .Release.Name }}
  {{- if not $useCombinedPool }}
  - {{ .Release.Name }}-controller
  {{- end }}
  {{- if not $isKRaft }}
  - {{ .Release.Name }}-zookeeper
  {{- end }}
  verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Name }}-dashboard-resources
subjects:
{{ include "cozy-lib.rbac.subjectsForTenantAndAccessLevel" (list "use" .Release.Namespace) }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-dashboard-resources
  apiGroup: rbac.authorization.k8s.io
