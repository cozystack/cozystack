{{- $tlsMap := .Values.tls | default dict -}}
{{- $tlsEnabledExplicit := hasKey $tlsMap "enabled" -}}
{{- $tlsEnabled := false -}}
{{- if $tlsEnabledExplicit -}}
  {{- $tlsEnabled = index $tlsMap "enabled" -}}
{{- else -}}
  {{- $tlsEnabled = .Values.external | default false -}}
{{- end -}}
{{- $showExternal := or .Values.external (and $tlsEnabledExplicit $tlsEnabled) -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-dashboard-resources
rules:
- apiGroups:
  - ""
  resources:
  - services
  resourceNames:
  - {{ .Release.Name }}-kafka-bootstrap
  {{- if $showExternal }}
  - {{ .Release.Name }}-kafka-external-bootstrap
  {{- end }}
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ .Release.Name }}-clients-ca-cert
  - {{ .Release.Name }}-cluster-ca-cert
  verbs: ["get", "list", "watch"]
- apiGroups:
  - cozystack.io
  resources:
  - workloadmonitors
  resourceNames:
  - {{ .Release.Name }}
  - {{ $.Release.Name }}-zookeeper
  verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Name }}-dashboard-resources
subjects:
{{ include "cozy-lib.rbac.subjectsForTenantAndAccessLevel" (list "use" .Release.Namespace) }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-dashboard-resources
  apiGroup: rbac.authorization.k8s.io
