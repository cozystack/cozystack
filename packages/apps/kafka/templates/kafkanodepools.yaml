{{- /* Detect pool layout: use separate pools for existing ZK clusters (migration requires it) */ -}}
{{- $existingBrokerPool := lookup "kafka.strimzi.io/v1beta2" "KafkaNodePool" .Release.Namespace (printf "%s-broker" .Release.Name) }}
{{- $existingKafka := lookup "kafka.strimzi.io/v1beta2" "Kafka" .Release.Namespace .Release.Name }}
{{- $metadataState := dig "status" "kafkaMetadataState" "" $existingKafka }}
{{- /* Combined pools are only for new installs; ZK→KRaft migration requires separate broker+controller pools */ -}}
{{- $isMigrating := and (not (empty $existingKafka)) (not (has $metadataState (list "KRaftPostMigration" "PreKRaft" "KRaft" ""))) }}
{{- $useCombinedPool := and (empty $existingBrokerPool) (not $isMigrating) }}
{{- /* Controller replicas: use odd number for quorum (1 for single-node, 3 otherwise) */ -}}
{{- $controllerReplicas := 3 }}
{{- if le (int .Values.kafka.replicas) 1 }}
  {{- $controllerReplicas = 1 }}
{{- end }}

{{- if $useCombinedPool }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: {{ .Release.Name }}-combined
  labels:
    strimzi.io/cluster: {{ .Release.Name }}
spec:
  replicas: {{ .Values.kafka.replicas }}
  roles:
    - controller
    - broker
  resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.kafka.resourcesPreset .Values.kafka.resources $) | nindent 4 }}
  storage:
    type: jbod
    volumes:
    - id: 0
      type: persistent-claim
      {{- with .Values.kafka.size }}
      size: {{ . }}
      {{- end }}
      {{- with .Values.kafka.storageClass }}
      class: {{ . }}
      {{- end }}
      kraftMetadata: shared
      deleteClaim: true

{{- else }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: {{ .Release.Name }}-broker
  labels:
    strimzi.io/cluster: {{ .Release.Name }}
spec:
  replicas: {{ .Values.kafka.replicas }}
  roles:
    - broker
  resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.kafka.resourcesPreset .Values.kafka.resources $) | nindent 4 }}
  storage:
    type: jbod
    volumes:
    - id: 0
      type: persistent-claim
      {{- with .Values.kafka.size }}
      size: {{ . }}
      {{- end }}
      {{- with .Values.kafka.storageClass }}
      class: {{ . }}
      {{- end }}
      deleteClaim: false
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: {{ .Release.Name }}-controller
  labels:
    strimzi.io/cluster: {{ .Release.Name }}
spec:
  replicas: {{ $controllerReplicas }}
  roles:
    - controller
  resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.kafka.resourcesPreset .Values.kafka.resources $) | nindent 4 }}
  storage:
    type: jbod
    volumes:
    - id: 0
      type: persistent-claim
      size: {{ .Values.kafka.controllerStorageSize | default "5Gi" }}
      {{- with .Values.kafka.storageClass }}
      class: {{ . }}
      {{- end }}
      kraftMetadata: shared
      deleteClaim: false
{{- end }}
