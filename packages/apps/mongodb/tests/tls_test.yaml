suite: mongodb TLS CR integration

# Covers the spec.tls block in the PerconaServerMongoDB CR
# and the spec.secrets.ssl reference to the pre-rendered leaf secret.
#
# Tri-state matrix:
#   (a) external: false, tls.enabled unset  → TLS off (no spec.tls, no spec.secrets.ssl)
#   (b) external: true,  tls.enabled unset  → TLS auto-on
#   (c) external: true,  tls.enabled: false → TLS off (explicit override)
#   (d) external: false, tls.enabled: true  → TLS on (only internal SANs rendered by certmanager)

release:
  name: mg-test
  namespace: tenant-test

set:
  _cluster:
    cluster-domain: cozy.local

templates:
  - templates/mongodb.yaml

tests:
  ############################################################
  # (a) external: false, tls.enabled unset → TLS OFF
  ############################################################

  - it: (a) no spec.tls block when external false and tls unset
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.tls

  - it: (a) no spec.secrets.ssl when external false and tls unset
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.secrets.ssl

  ############################################################
  # (b) external: true, tls.enabled unset → TLS AUTO-ON
  ############################################################

  - it: (b) spec.tls.mode is preferTLS when external true and tls unset
    set:
      external: true
      _namespace:
        host: example.cozy.local
    documentIndex: 0
    asserts:
      - equal:
          path: spec.tls.mode
          value: preferTLS

  - it: (b) spec.secrets.ssl references the leaf secret when external true and tls unset
    set:
      external: true
      _namespace:
        host: example.cozy.local
    documentIndex: 0
    asserts:
      - equal:
          path: spec.secrets.ssl
          value: mg-test-ssl

  ############################################################
  # (c) external: true, tls.enabled: false → TLS OFF (explicit)
  ############################################################

  - it: (c) no spec.tls block when external true but tls explicitly disabled
    set:
      external: true
      _namespace:
        host: example.cozy.local
      tls:
        enabled: false
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.tls

  - it: (c) no spec.secrets.ssl when external true but tls explicitly disabled
    set:
      external: true
      _namespace:
        host: example.cozy.local
      tls:
        enabled: false
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.secrets.ssl

  ############################################################
  # (d) external: false, tls.enabled: true → TLS ON (internal only)
  ############################################################

  - it: (d) spec.tls.mode is preferTLS when tls explicitly enabled with external false
    set:
      external: false
      tls:
        enabled: true
    documentIndex: 0
    asserts:
      - equal:
          path: spec.tls.mode
          value: preferTLS

  - it: (d) spec.secrets.ssl references the leaf secret when tls explicitly enabled
    set:
      external: false
      tls:
        enabled: true
    documentIndex: 0
    asserts:
      - equal:
          path: spec.secrets.ssl
          value: mg-test-ssl

  ############################################################
  # spec.tls does NOT include issuerConf — we pass the secret directly
  ############################################################

  - it: spec.tls has no issuerConf when TLS enabled
    set:
      tls:
        enabled: true
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.tls.issuerConf

  - it: TLS mode is preferTLS (allows mixed TLS/plaintext for backup compatibility)
    # preferTLS is intentional: the backup CronJob does not yet support TLS,
    # so requireTLS would break backups. Strict enforcement will be added in a
    # follow-up once the backup workflow supports TLS connections.
    set:
      tls:
        enabled: true
    documentIndex: 0
    asserts:
      - equal:
          path: spec.tls.mode
          value: preferTLS
