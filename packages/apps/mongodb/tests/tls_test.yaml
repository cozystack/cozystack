suite: mongodb TLS CR integration

# Covers the spec.tls block in the PerconaServerMongoDB CR
# and the spec.secrets.ssl reference to the operator-managed leaf secret.
#
# TLS chain is fully managed by the PSMDB operator via its native cert-manager
# integration when spec.secrets.ssl is set. The chart does NOT render
# cert-manager Issuer/Certificate resources — see templates/mongodb.yaml for
# a detailed explanation.
#
# Tri-state matrix:
#   (a) external: false, tls.enabled unset  → TLS off (no spec.tls, no spec.secrets.ssl)
#   (b) external: true,  tls.enabled unset  → TLS auto-on
#   (c) external: true,  tls.enabled: false → TLS off (explicit override)
#   (d) external: false, tls.enabled: true  → TLS on (operator creates cert chain)

release:
  name: mg-test
  namespace: tenant-test

set:
  _cluster:
    cluster-domain: cozy.local

templates:
  - templates/mongodb.yaml

tests:
  ############################################################
  # (a) external: false, tls.enabled unset → TLS OFF
  ############################################################

  - it: (a) no spec.tls block when external false and tls unset
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.tls

  - it: (a) no spec.secrets.ssl when external false and tls unset
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.secrets.ssl

  ############################################################
  # (b) external: true, tls.enabled unset → TLS AUTO-ON
  ############################################################

  - it: (b) spec.tls.mode is preferTLS when external true and tls unset
    set:
      external: true
      _namespace:
        host: example.cozy.local
    documentIndex: 0
    asserts:
      - equal:
          path: spec.tls.mode
          value: preferTLS

  - it: (b) spec.secrets.ssl references the leaf secret when external true and tls unset
    set:
      external: true
      _namespace:
        host: example.cozy.local
    documentIndex: 0
    asserts:
      - equal:
          path: spec.secrets.ssl
          value: mg-test-ssl

  ############################################################
  # (c) external: true, tls.enabled: false → TLS OFF (explicit)
  ############################################################

  - it: (c) no spec.tls block when external true but tls explicitly disabled
    set:
      external: true
      _namespace:
        host: example.cozy.local
      tls:
        enabled: false
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.tls

  - it: (c) no spec.secrets.ssl when external true but tls explicitly disabled
    set:
      external: true
      _namespace:
        host: example.cozy.local
      tls:
        enabled: false
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.secrets.ssl

  ############################################################
  # (d) external: false, tls.enabled: true → TLS ON (internal only)
  ############################################################

  - it: (d) spec.tls.mode is preferTLS when tls explicitly enabled with external false
    set:
      external: false
      tls:
        enabled: true
    documentIndex: 0
    asserts:
      - equal:
          path: spec.tls.mode
          value: preferTLS

  - it: (d) spec.secrets.ssl references the leaf secret when tls explicitly enabled
    set:
      external: false
      tls:
        enabled: true
    documentIndex: 0
    asserts:
      - equal:
          path: spec.secrets.ssl
          value: mg-test-ssl

  ############################################################
  # spec.tls does NOT include issuerConf — we pass the secret directly
  ############################################################

  - it: spec.tls has no issuerConf when TLS enabled
    set:
      tls:
        enabled: true
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.tls.issuerConf

  - it: TLS mode is preferTLS (allows mixed TLS/plaintext for backup compatibility)
    # preferTLS is intentional: the backup CronJob does not yet support TLS,
    # so requireTLS would break backups. Strict enforcement will be added in a
    # follow-up once the backup workflow supports TLS connections.
    set:
      tls:
        enabled: true
    documentIndex: 0
    asserts:
      - equal:
          path: spec.tls.mode
          value: preferTLS

  ############################################################
  # crVersion gates the operator's splitHorizons → SAN injection
  # (cr.CompareVersion("1.22.0") >= 0 in pkg/psmdb/tls/tls.go)
  ############################################################

  - it: crVersion is hardcoded to 1.22.0
    documentIndex: 0
    asserts:
      - equal:
          path: spec.crVersion
          value: 1.22.0

  ############################################################
  # splitHorizons: per-pod external hostnames for external TLS
  ############################################################

  - it: (b) splitHorizons advertises per-pod external hostnames when external + tls auto-on
    set:
      external: true
      _namespace:
        host: example.cozy.local
    documentIndex: 0
    asserts:
      - equal:
          path: spec.replsets[0].splitHorizons
          value:
            mg-test-rs0-0:
              external: mg-test-rs0-0.example.cozy.local
            mg-test-rs0-1:
              external: mg-test-rs0-1.example.cozy.local
            mg-test-rs0-2:
              external: mg-test-rs0-2.example.cozy.local

  - it: splitHorizons honours the replica count
    set:
      external: true
      replicas: 2
      _namespace:
        host: example.cozy.local
    documentIndex: 0
    asserts:
      - equal:
          path: spec.replsets[0].splitHorizons
          value:
            mg-test-rs0-0:
              external: mg-test-rs0-0.example.cozy.local
            mg-test-rs0-1:
              external: mg-test-rs0-1.example.cozy.local

  - it: (b) TLS stays active but splitHorizons is omitted when external true and _namespace.host absent
    set:
      external: true
      # _namespace intentionally absent — controller has not populated host yet
    documentIndex: 0
    asserts:
      - equal:
          path: spec.tls.mode
          value: preferTLS
      - notExists:
          path: spec.replsets[0].splitHorizons

  - it: (a) no splitHorizons when external false and tls unset
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.replsets[0].splitHorizons

  - it: (c) no splitHorizons when external true but tls explicitly disabled
    set:
      external: true
      _namespace:
        host: example.cozy.local
      tls:
        enabled: false
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.replsets[0].splitHorizons

  - it: (d) no splitHorizons when tls enabled but external false (internal-only TLS)
    set:
      external: false
      tls:
        enabled: true
    documentIndex: 0
    asserts:
      - notExists:
          path: spec.replsets[0].splitHorizons

  ############################################################
  # sharding + TLS combination
  ############################################################

  - it: spec.tls.mode is preferTLS and secrets.ssl is set when tls enabled with sharding
    set:
      sharding: true
      tls:
        enabled: true
      shardingConfig:
        configServers: 3
        configServerSize: 3Gi
        mongos: 2
        shards:
          - name: rs0
            replicas: 3
            size: 10Gi
    documentIndex: 0
    asserts:
      - equal:
          path: spec.tls.mode
          value: preferTLS
      - equal:
          path: spec.secrets.ssl
          value: mg-test-ssl
