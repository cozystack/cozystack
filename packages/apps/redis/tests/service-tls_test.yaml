suite: External service TLS port switching
templates:
  - templates/service.yaml
tests:
  - it: no service when external is false
    set:
      external: false
      tls:
        enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: external true and TLS false renders port 6379 plaintext
    set:
      external: true
      tls:
        enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.ports[0].port
          value: 6379
      - equal:
          path: spec.ports[0].name
          value: redis
      - equal:
          path: spec.ports[0].targetPort
          value: redis

  - it: external true and TLS true renders port 6380 TLS
    set:
      external: true
      tls:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.ports[0].port
          value: 6380
      - equal:
          path: spec.ports[0].name
          value: redis-tls
      - equal:
          path: spec.ports[0].targetPort
          value: redis-tls
