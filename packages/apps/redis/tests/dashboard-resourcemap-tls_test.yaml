suite: Dashboard RBAC includes TLS resources
templates:
  - templates/dashboard-resourcemap.yaml
release:
  namespace: tenant-test
tests:
  - it: TLS secret not in RBAC when tls.enabled is false
    set:
      tls.enabled: false
    documentSelector:
      path: kind
      value: Role
    asserts:
      - notContains:
          path: rules[?(@.resources[0]=='secrets')].resourceNames
          content: RELEASE-NAME-tls
      - notContains:
          path: rules[?(@.resources[0]=='secrets')].resourceNames
          content: RELEASE-NAME-ca

  - it: TLS secret added to RBAC when tls.enabled is true
    set:
      tls.enabled: true
    documentSelector:
      path: kind
      value: Role
    asserts:
      - contains:
          path: rules[?(@.resources[0]=='secrets')].resourceNames
          content: RELEASE-NAME-tls
      - contains:
          path: rules[?(@.resources[0]=='secrets')].resourceNames
          content: RELEASE-NAME-ca

  - it: TLS services not in RBAC when tls.enabled is false
    set:
      tls.enabled: false
    documentSelector:
      path: kind
      value: Role
    asserts:
      - notContains:
          path: rules[?(@.resources[0]=='services')].resourceNames
          content: RELEASE-NAME-master
      - notContains:
          path: rules[?(@.resources[0]=='services')].resourceNames
          content: RELEASE-NAME-replicas

  - it: TLS services added to RBAC when tls.enabled is true
    set:
      tls.enabled: true
    documentSelector:
      path: kind
      value: Role
    asserts:
      - contains:
          path: rules[?(@.resources[0]=='services')].resourceNames
          content: RELEASE-NAME-master
      - contains:
          path: rules[?(@.resources[0]=='services')].resourceNames
          content: RELEASE-NAME-replicas

  - it: custom secretName used in RBAC when certificate.secretName is set
    set:
      tls.enabled: true
      tls.certificate.secretName: my-custom-secret
    documentSelector:
      path: kind
      value: Role
    asserts:
      - contains:
          path: rules[?(@.resources[0]=='secrets')].resourceNames
          content: my-custom-secret
      - notContains:
          path: rules[?(@.resources[0]=='secrets')].resourceNames
          content: RELEASE-NAME-tls

  - it: CA secret not in RBAC when tls.issuerRef.name is set (external issuer)
    set:
      tls.enabled: true
      tls.issuerRef.name: my-issuer
    documentSelector:
      path: kind
      value: Role
    asserts:
      - contains:
          path: rules[?(@.resources[0]=='secrets')].resourceNames
          content: RELEASE-NAME-tls
      - notContains:
          path: rules[?(@.resources[0]=='secrets')].resourceNames
          content: RELEASE-NAME-ca
