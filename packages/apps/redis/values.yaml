## @param {int} replicas - Number of Redis replicas.
replicas: 2

## @param {Resources} [resources] - Explicit CPU and memory configuration for each Redis replica. When omitted, the preset defined in `resourcesPreset` is applied.
resources: {}

## @param {ResourcesPreset} resourcesPreset="t1.nano" - Default sizing preset used when `resources` is omitted.
resourcesPreset: "t1.nano"

## @param {quantity} size - Persistent Volume Claim size available for application data.
size: 1Gi

## @param {string} storageClass - StorageClass used to store the data.
storageClass: ""

## @param {bool} external - Enable external access from outside the cluster.
external: false

## @enum {string} Version
## @value v8
## @value v7

## @param {Version} version - Redis major version to deploy
version: v8

##
## @section Application-specific parameters
##

## @param {bool} authEnabled - Enable password generation.
authEnabled: true

## @enum {string} IssuerKind - cert-manager Issuer kind.
## @value Issuer
## @value ClusterIssuer

## @typedef {struct} TLSIssuerRef - cert-manager Issuer reference.
## @field {string} name - Issuer/ClusterIssuer resource name. When empty, a self-signed CA chain is created.
## @field {IssuerKind} kind - Either "Issuer" or "ClusterIssuer".
## @field {string} group - Issuer API group.

## @typedef {struct} TLSCertificate - Leaf certificate configuration.
## @field {string} secretName - Custom TLS secret name. Defaults to "<release>-tls".
## @field {string} duration - Certificate lifetime.
## @field {string} renewBefore - Renew this long before expiry.
## @field {[]string} dnsNames - Explicit DNS SANs for the certificate. Merged with computed names from dnsNameSuffixes. When external is true and tls is enabled, add the LoadBalancer IP or hostname here so external clients can verify the certificate.
## @field {[]string} dnsNameSuffixes - Service name suffixes used to auto-compute DNS SANs. Each suffix expands to four DNS forms using the release name and namespace.
## @field {[]string} usages - Key usages.
## @field {PrivateKeyAlgorithm} algorithm - Key algorithm. Ed25519 uses a fixed key; the size field is ignored.
## @field {int} [size] - Key size in bits. Ignored for Ed25519.
## @field {PrivateKeyEncoding} encoding - Private key encoding.

## @enum {string} PrivateKeyEncoding - Private key encoding format.
## @value PKCS1
## @value PKCS8

## @enum {string} PrivateKeyAlgorithm - Key algorithm for TLS certificates.
## @value ECDSA
## @value RSA
## @value Ed25519

## @typedef {struct} TLSCA - CA certificate configuration.
## @field {string} duration - CA certificate lifetime.
## @field {PrivateKeyAlgorithm} algorithm - Key algorithm. Ed25519 uses a fixed key; the size field is ignored.
## @field {int} [size] - Key size in bits. Ignored for Ed25519.

## @typedef {struct} CozyTLS - TLS certificate chain sub-chart configuration.
## @field {bool} enabled - Enable TLS termination via nginx stream sidecar and cert-manager PKI chain.
## @field {string} clusterDomain - Cluster domain used when constructing fully-qualified DNS SANs from dnsNameSuffixes.
## @field {TLSIssuerRef} issuerRef - External Issuer reference. When name is empty, a self-signed CA chain is created.
## @field {TLSCA} ca - CA certificate settings (only used with self-signed chain).
## @field {TLSCertificate} certificate - Leaf certificate settings.

## TLS limitations:
## - Intra-cluster traffic on 6379 (operator probes, sentinel, replication) remains plaintext.
## - Sentinel HA clients (rfs-*:26379) operate on plaintext and resolve master IP as <ip>:6379.
## - For automatic master failover with TLS: use <release>-master:6380 (follows master role label).

## @param {CozyTLS} [tls] - TLS configuration. When enabled, an nginx stream sidecar terminates TLS on port 6380. Certificate chain is managed by the cozy-tls sub-chart.
tls:
  enabled: false
  clusterDomain: "cozy.local"
  issuerRef:
    name: ""
    kind: "Issuer"
    group: "cert-manager.io"
  ca:
    duration: "43800h"
    algorithm: "ECDSA"
    size: 256
  certificate:
    secretName: ""
    duration: "8760h"
    renewBefore: "720h"
    dnsNames: []
    dnsNameSuffixes:
      - master
      - replicas
      - external-lb
    usages:
      - server auth
    algorithm: "ECDSA"
    size: 256
    encoding: "PKCS8"
