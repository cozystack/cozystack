{{- $tlsEnabled := (include "redis.tls.enabled" .) | eq "true" -}}
{{- $authClients := include "redis.tls.authClients" . -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-dashboard-resources
rules:
- apiGroups:
  - ""
  resources:
  - services
  resourceNames:
  - rfs-{{ .Release.Name }}
  - rfrm-{{ .Release.Name }}
  - rfrs-{{ .Release.Name }}
  - "{{ .Release.Name }}-external-lb"
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - "{{ .Release.Name }}-auth"
  {{- if $tlsEnabled }}
  # CA-only secret (ca.crt, no private key). Tenants trust this to verify the
  # Redis server. The CA private key ({{ .Release.Name }}-ca-tls) is deliberately
  # NOT granted here — exposing it would let tenants mint certificates trusted by
  # the whole cluster.
  - "{{ .Release.Name }}-ca-cert"
  {{- if eq $authClients "yes" }}
  # authClients=yes requires clients to present a certificate signed by the CA.
  # They reuse the server leaf secret as their client identity. A dedicated
  # per-tenant client certificate would be the stricter long-term design.
  - "{{ .Release.Name }}-tls"
  {{- end }}
  {{- end }}
  verbs: ["get", "list", "watch"]
- apiGroups:
  - cozystack.io
  resources:
  - workloadmonitors
  resourceNames:
  - {{ .Release.Name }}-redis
  - {{ .Release.Name }}-sentinel
  verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Name }}-dashboard-resources
subjects:
{{ include "cozy-lib.rbac.subjectsForTenantAndAccessLevel" (list "use" .Release.Namespace) }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-dashboard-resources
  apiGroup: rbac.authorization.k8s.io
