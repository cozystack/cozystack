{{- $tlsEnabled := (include "redis.tls.enabled" .) | eq "true" -}}
{{- if .Values.authEnabled }}
  {{- $existingPassword := lookup "v1" "Secret" .Release.Namespace (printf "%s-auth" .Release.Name) }}
  {{- $password := randAlphaNum 32 | b64enc }}
  {{- if $existingPassword }}
    {{- $password = index $existingPassword.data "password" }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-auth
data:
  password: {{ $password }}
{{- end }}

---

apiVersion: databases.spotahome.com/v1
kind: RedisFailover
metadata:
  name: {{ .Release.Name }}
  {{- if $tlsEnabled }}
  annotations:
    # Roll the Redis pods when cert-manager rewrites the leaf Secret. Redis
    # reads tls-cert-file once at startup, so without this the pods keep
    # serving the certificate they booted with until something restarts them,
    # and the renewed one never takes effect before the old one expires.
    #
    # This has to sit on the RedisFailover rather than in spec.redis.podAnnotations:
    # the operator copies the CR's own annotations onto the StatefulSet's
    # metadata, which is where stakater reloader looks, while podAnnotations
    # land on the pod template where it does not. Covers Redis only — see the
    # TLS section of README.md for why Sentinel cannot be wired the same way.
    secret.reloader.stakater.com/reload: {{ .Release.Name }}-tls
  {{- end }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  {{- if $tlsEnabled }}
  tls:
    enabled: true
    authClients: {{ include "redis.tls.authClients" . | quote }}
    # Operator publishes an Opaque secret with only ca.crt (no private key) so
    # clients can verify the server under tightly scoped RBAC. See the secrets
    # rule in dashboard-resourcemap.yaml.
    caCertSecretName: {{ .Release.Name }}-ca-cert
    certificateSecret:
      secretName: {{ .Release.Name }}-tls
  {{- end }}
  sentinel:
    replicas: 3
    resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.resourcesPreset .Values.resources $) | nindent 6 }}
  redis:
    image: "redis:{{ include "redis.versionMap" $ }}"
    resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.resourcesPreset .Values.resources $) | nindent 6 }}
    replicas: {{ .Values.replicas }}
    {{- with .Values.size }}
    storage:
      persistentVolumeClaim:
        metadata:
          name: redisfailover-persistent-data
          labels:
            app.kubernetes.io/component: redis
            app.kubernetes.io/instance: {{ $.Release.Name }}
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: {{ . }}
          {{- with $.Values.storageClass }}
          storageClassName: {{ . }}
          {{- end }}
    {{- end }}
    exporter:
      enabled: true
      image: oliver006/redis_exporter:v1.55.0-alpine
      args:
        - --web.telemetry-path
        - /metrics
      env:
        - name: REDIS_EXPORTER_LOG_FORMAT
          value: txt
    customConfig:
      - tcp-keepalive 0
      - loglevel notice
      {{- if not .Values.size }}
      - appendonly no
      - save ""
      {{- end }}
  {{- if .Values.authEnabled }}
  auth:
    secretPath: {{ .Release.Name }}-auth
  {{- end }}

---
apiVersion: cozystack.io/v1alpha1
kind: WorkloadMonitor
metadata:
  name: {{ $.Release.Name }}-redis
  namespace: {{ $.Release.Namespace }}
  labels:
    workloads.cozystack.io/resource-preset: {{ .Values.resourcesPreset | quote }}
spec:
  minReplicas: 1
  replicas: {{ .Values.replicas }}
  kind: redis
  type: redis
  selector:
    app.kubernetes.io/component: redis
    app.kubernetes.io/instance: {{ $.Release.Name }}
  version: {{ $.Chart.Version }}
---
apiVersion: cozystack.io/v1alpha1
kind: WorkloadMonitor
metadata:
  name: {{ $.Release.Name }}-sentinel
  namespace: {{ $.Release.Namespace }}
  labels:
    workloads.cozystack.io/resource-preset: {{ .Values.resourcesPreset | quote }}
spec:
  minReplicas: 2
  replicas: 3
  kind: redis
  type: sentinel
  selector:
    app.kubernetes.io/component: sentinel
    app.kubernetes.io/instance: {{ $.Release.Name }}
  version: {{ $.Chart.Version }}
