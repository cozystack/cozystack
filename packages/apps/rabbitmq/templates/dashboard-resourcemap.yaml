{{/*
Tri-state TLS resolution: explicit non-null tls.enabled wins; when absent or null,
defaults to external. A null tls.enabled is treated as "inherit from external".
*/}}
{{- $tlsEnabled := .Values.external }}
{{- if not (kindIs "invalid" .Values.tls.enabled) }}
  {{- $tlsEnabled = .Values.tls.enabled }}
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-dashboard-resources
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ .Release.Name }}-default-user
  {{- /* No TLS Secret is granted here. Both objects that carry ca.crt also carry a
       private key: <release>-tls holds the server key (impersonation) and
       <release>-ca holds the CA key (full trust-chain compromise). Granting read on
       either to hand over a trust anchor would hand over the key with it, since RBAC
       has no key-level filter. The tenant instead reads the key-free
       <release>.tenant-ca projection through core.cozystack.io/tenantsecrets, which
       cozy:tenant:use:base already grants — no core/v1 Secret grant is involved. */}}
  {{- range $name, $u := .Values.users }}
  - {{ $.Release.Name }}-{{ kebabcase $name }}-credentials
  {{- end }}
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - services
  resourceNames:
  - {{ .Release.Name }}
  verbs: ["get", "list", "watch"]
- apiGroups:
  - cozystack.io
  resources:
  - workloadmonitors
  resourceNames:
  - {{ .Release.Name }}
  verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Name }}-dashboard-resources
subjects:
{{ include "cozy-lib.rbac.subjectsForTenantAndAccessLevel" (list "use" .Release.Namespace) }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-dashboard-resources
  apiGroup: rbac.authorization.k8s.io
