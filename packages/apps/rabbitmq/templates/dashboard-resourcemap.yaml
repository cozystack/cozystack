{{/*
Tri-state TLS resolution: explicit non-null tls.enabled wins; when absent or null,
defaults to external. A null tls.enabled is treated as "inherit from external".
*/}}
{{- $tlsEnabled := .Values.external }}
{{- if not (kindIs "invalid" .Values.tls.enabled) }}
  {{- $tlsEnabled = .Values.tls.enabled }}
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-dashboard-resources
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ .Release.Name }}-default-user
  {{- if $tlsEnabled }}
  {{- /* Grant read access to the TLS secret so tenants can retrieve ca.crt via:
       kubectl get secret <release>-tls -o jsonpath='{.data.ca\.crt}' | base64 -d */}}
  - {{ .Release.Name }}-tls
  {{- end }}
  {{- range $name, $u := .Values.users }}
  - {{ $.Release.Name }}-{{ kebabcase $name }}-credentials
  {{- end }}
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - services
  resourceNames:
  - {{ .Release.Name }}
  verbs: ["get", "list", "watch"]
- apiGroups:
  - cozystack.io
  resources:
  - workloadmonitors
  resourceNames:
  - {{ .Release.Name }}
  verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Name }}-dashboard-resources
subjects:
{{ include "cozy-lib.rbac.subjectsForTenantAndAccessLevel" (list "use" .Release.Namespace) }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-dashboard-resources
  apiGroup: rbac.authorization.k8s.io
