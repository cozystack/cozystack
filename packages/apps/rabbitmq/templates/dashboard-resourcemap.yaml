{{/*
This Role deliberately does not branch on whether TLS is enabled: no TLS Secret is
granted in either state, so there is nothing here for a TLS condition to gate.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-dashboard-resources
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ .Release.Name }}-default-user
  {{- /* No TLS Secret is granted here, in either TLS state. Both objects carrying
       ca.crt also carry a private key — <release>-tls the server key, <release>-ca
       the CA key — and RBAC has no key-level filter, so granting read to deliver a
       trust anchor would deliver the key with it. The tenant reads the key-free
       <release>.tenant-ca projection through core.cozystack.io/tenantsecrets, which
       cozy:tenant:use:base already grants. */}}
  {{- range $name, $u := .Values.users }}
  - {{ $.Release.Name }}-{{ kebabcase $name }}-credentials
  {{- end }}
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - services
  resourceNames:
  - {{ .Release.Name }}
  verbs: ["get", "list", "watch"]
- apiGroups:
  - cozystack.io
  resources:
  - workloadmonitors
  resourceNames:
  - {{ .Release.Name }}
  verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Name }}-dashboard-resources
subjects:
{{ include "cozy-lib.rbac.subjectsForTenantAndAccessLevel" (list "use" .Release.Namespace) }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-dashboard-resources
  apiGroup: rbac.authorization.k8s.io
