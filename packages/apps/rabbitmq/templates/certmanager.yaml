{{- $tlsEnabled := (include "rabbitmq.tls.enabled" .) | eq "true" }}

{{- if $tlsEnabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-selfsigned
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-ca
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Release.Name }}-ca
  # Publish this CA to the tenant. The CA-extraction controller lifts ca.crt alone
  # into the key-free <release>.tenant-ca Secret, so a tenant can verify the AMQPS
  # and management HTTPS endpoints without gaining access to the CA private key
  # stored here under tls.key. The label goes on the isCA Certificate, not the leaf
  # <release>-tls: the leaf carries the server private key next to the same ca.crt.
  # The release label is required on this leg: cert-manager issues the Secret, so it
  # carries neither an OwnerReference nor Helm metadata to attribute it by.
  #
  # TURNING TLS OFF DOES NOT WITHDRAW THIS ANCHOR. Helm removes the Certificate, but
  # cert-manager leaves the Secret behind (enableCertificateOwnerRef=false), so it
  # keeps matching the publish label and the controller keeps projecting it — while
  # the endpoint has gone back to plaintext. Nothing the chart renders prevents this:
  # the label leg withdraws on the source Secret disappearing, and Helm does not own
  # that Secret. Until the controller gains a withdrawal signal for a removed
  # Certificate, disabling TLS on a release that had it means deleting <release>-ca
  # and <release>-tls by hand. Verification fails closed meanwhile; no key is exposed.
  secretTemplate:
    labels:
      internal.cozystack.io/publish-ca-cert: "true"
      internal.cozystack.io/publish-ca-cert-release: {{ .Release.Name | quote }}
  duration: 43800h
  commonName: {{ .Release.Name }}-ca
  issuerRef:
    name: {{ .Release.Name }}-selfsigned
    kind: Issuer
    group: cert-manager.io
  isCA: true
  usages:
    - cert sign
    - crl sign
  privateKey:
    algorithm: ECDSA
    size: 256
    # Never rotate the CA private key: rotating the CA key invalidates all
    # leaf certs signed by the old key and causes a service outage. CA renewal
    # (new certificate, same key) is handled automatically by cert-manager
    # when the cert approaches its 43800h expiry.
    rotationPolicy: Never
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-ca
  namespace: {{ .Release.Namespace }}
spec:
  ca:
    secretName: {{ .Release.Name }}-ca
---
{{- $clusterDomain := include "rabbitmq.clusterDomain" . }}
{{- $ns := .Release.Namespace }}
{{- $name := .Release.Name }}
{{- /* Every name is covered in all resolvable forms: bare (same namespace),
     two-segment <name>.<namespace> (the cross-namespace shorthand the DNS search
     path resolves), and the fully qualified .svc / .svc.<domain>. That includes
     the per-pod wildcards — the operator addresses nodes as
     <pod>.<name>-nodes.<namespace>, the two-segment form, in RABBITMQ_NODENAME and
     K8S_HOSTNAME_SUFFIX, so it is the canonical pod address rather than an
     afterthought. Omitting a two-segment form is the easy mistake: it resolves
     fine, so the connection succeeds and fails only at hostname verification,
     which reads as a certificate bug rather than a missing SAN. */}}
{{- $dnsNames := list
  $name
  (printf "%s.%s" $name $ns)
  (printf "%s.%s.svc" $name $ns)
  (printf "%s.%s.svc.%s" $name $ns $clusterDomain)
  (printf "%s-nodes" $name)
  (printf "%s-nodes.%s" $name $ns)
  (printf "%s-nodes.%s.svc" $name $ns)
  (printf "%s-nodes.%s.svc.%s" $name $ns $clusterDomain)
  (printf "*.%s-nodes.%s" $name $ns)
  (printf "*.%s-nodes.%s.svc" $name $ns)
  (printf "*.%s-nodes.%s.svc.%s" $name $ns $clusterDomain)
}}
{{- /* Add the external hostname as a SAN when the platform supplies one. It is
     skipped, not required: _namespace.host derives from _cluster.root-host, which
     the platform treats as optional, and an external RabbitMQ is a bare
     LoadBalancer Service with no Ingress and no hostname involvement. Failing
     here would turn "external RabbitMQ on a cluster with no root host" — a
     configuration that worked before this chart had TLS at all — into a render
     error on upgrade, and those releases have no tls.enabled: false to fall back
     on because the field did not exist when they were created.

     Note this SAN is not backed by a DNS record the chart creates; see the README
     on verifying an external endpoint. */}}
{{- if .Values.external }}
  {{- $host := dig "host" "" (.Values._namespace | default dict) }}
  {{- if $host }}
    {{- $dnsNames = append $dnsNames (printf "%s.%s" $name $host) }}
  {{- end }}
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Release.Name }}-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: {{ .Release.Name }}-ca
    kind: Issuer
    group: cert-manager.io
  commonName: {{ .Release.Name }}
  dnsNames:
    {{- range $dnsNames }}
    - {{ . | quote }}
    {{- end }}
  usages:
    - digital signature
    - key encipherment
    - server auth
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
{{- end }}
