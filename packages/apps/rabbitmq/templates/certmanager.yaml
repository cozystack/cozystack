{{/*
Tri-state TLS resolution: explicit non-null tls.enabled wins; when absent or null,
defaults to external. A null tls.enabled is treated as "inherit from external".
kindIs "invalid" detects both the missing-key and explicit-null cases.
*/}}
{{- $tlsEnabled := .Values.external }}
{{- if not (kindIs "invalid" .Values.tls.enabled) }}
  {{- $tlsEnabled = .Values.tls.enabled }}
{{- end }}

{{- if $tlsEnabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-selfsigned
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-ca
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Release.Name }}-ca
  duration: 43800h
  commonName: {{ .Release.Name }}-ca
  issuerRef:
    name: {{ .Release.Name }}-selfsigned
    kind: Issuer
    group: cert-manager.io
  isCA: true
  usages:
    - cert sign
    - crl sign
  privateKey:
    algorithm: ECDSA
    size: 256
    # Never rotate the CA private key: rotating the CA key invalidates all
    # leaf certs signed by the old key and causes a service outage. CA renewal
    # (new certificate, same key) is handled automatically by cert-manager
    # when the cert approaches its 43800h expiry.
    rotationPolicy: Never
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-ca
  namespace: {{ .Release.Namespace }}
spec:
  ca:
    secretName: {{ .Release.Name }}-ca
---
{{- $clusterDomain := "cozy.local" }}
{{- if .Values._cluster }}
  {{- $clusterDomain = (index .Values._cluster "cluster-domain") | default "cozy.local" }}
{{- end }}
{{- $ns := .Release.Namespace }}
{{- $name := .Release.Name }}
{{- $dnsNames := list
  $name
  (printf "%s.%s.svc" $name $ns)
  (printf "%s.%s.svc.%s" $name $ns $clusterDomain)
  (printf "%s-nodes" $name)
  (printf "%s-nodes.%s.svc" $name $ns)
  (printf "%s-nodes.%s.svc.%s" $name $ns $clusterDomain)
  (printf "*.%s-nodes.%s.svc" $name $ns)
  (printf "*.%s-nodes.%s.svc.%s" $name $ns $clusterDomain)
}}
{{- if .Values.external }}
  {{- $dnsNames = append $dnsNames (printf "%s.%s" $name .Values._namespace.host) }}
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Release.Name }}-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: {{ .Release.Name }}-ca
    kind: Issuer
    group: cert-manager.io
  commonName: {{ .Release.Name }}
  dnsNames:
    {{- range $dnsNames }}
    - {{ . | quote }}
    {{- end }}
  usages:
    - digital signature
    - key encipherment
    - server auth
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
{{- end }}
