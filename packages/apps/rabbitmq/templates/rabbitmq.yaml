{{- $tlsEnabled := (include "rabbitmq.tls.enabled" .) | eq "true" }}
{{- $wantDisableNonTLS := dig "disableNonTLSListeners" false (.Values.tls | default dict) }}

{{- /* Refuse the contradiction rather than drop it. Asking to close the plaintext
     listeners while TLS is off leaves nothing listening at all, and the operator
     rejects the combination itself — reconcile_tls.go returns
     "TLS must be enabled if disableNonTLSListeners is set to true" and sets
     ReconcileSuccess=False. Silently ignoring the flag here would be worse than
     what the operator does: it at least records a TLSError event, whereas a
     dropped flag renders a healthy-looking cluster with every plaintext listener
     open and no trace of the request. The likely way to reach this is an operator
     hardening an internal broker who sets only disableNonTLSListeners, since TLS
     is off by default when external is false. */}}
{{- if and $wantDisableNonTLS (not $tlsEnabled) }}
{{-   fail "tls.disableNonTLSListeners is set but TLS is off, which would leave no listener at all: set tls.enabled: true (it defaults to the value of external). The RabbitMQ operator rejects this combination too." }}
{{- end }}
{{- $disableNonTLS := and $tlsEnabled $wantDisableNonTLS }}

{{- /* disableNonTLSListeners closes the plaintext management port, and
     messaging-topology-operator has no working route to the broker without it.
     Its connection is computed as
       useTLSForConnection = TLSEnabled() && (!connectUsingHTTP || DisableNonTLSListeners())
     so the flag forces TLS on that side no matter how the operator is configured,
     and it then verifies the broker against x509.SystemCertPool(), which cannot
     contain a per-release self-signed CA. Pinning it back to plaintext is not an
     escape either — that is the port the flag just closed. So every User, Vhost and
     Permission would stop reconciling, silently: objects already applied to the
     broker keep working while new ones and password rotations never land.

     Refuse the combination at render time rather than ship that. The flag remains
     usable for an instance whose users and vhosts are managed outside the chart. */}}
{{- if and $disableNonTLS (or .Values.users .Values.vhosts) }}
{{-   fail "tls.disableNonTLSListeners cannot be combined with users or vhosts: closing the plaintext listeners stops messaging-topology-operator from reconciling User, Vhost and Permission objects, because it would have to verify the per-release CA against the system trust pool. Manage users and vhosts outside the chart, or leave tls.disableNonTLSListeners unset." }}
{{- end }}

apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- if and $tlsEnabled (not $disableNonTLS) }}
  {{- /* Keep messaging-topology-operator on the plaintext management port.
       Setting spec.tls.secretName makes RabbitmqCluster.TLSEnabled() true, and the
       topology operator computes
         useTLSForConnection = TLSEnabled() && (!connectUsingHTTP || DisableNonTLSListeners())
       with connectUsingHTTP coming from CONNECT_USING_PLAIN_HTTP, which the
       cozystack Deployment does not set. So it would switch to https://…:15671 and
       verify against x509.SystemCertPool() — a process-wide pool that cannot
       contain a per-release self-signed CA. Every User, Vhost and Permission this
       chart renders would then fail with "certificate signed by unknown
       authority": already-applied users would linger while password rotation, new
       users and permission changes silently stopped.

       This annotation short-circuits that: extractURIandScheme reports
       tlsEnabled=false for an http:// scheme, so the operator uses the plaintext
       management listener — which the chart deliberately keeps open. That listener
       is load-bearing, not merely tolerated. Broker traffic is unaffected; this
       governs only the operator's own management connection.

       Note it does not stay on this object: ReconcileAndFilterAnnotations strips
       only keys containing kubernetes.io or k8s.io, so this annotation is copied
       onto every child the operator builds — Service, StatefulSet, ServiceAccount,
       Role and the default-user Secret the tenant reads. Harmless, but it is why
       an internal plumbing annotation shows up on tenant-visible objects. */}}
  annotations:
    rabbitmq.com/operator-connection-uri: "http://{{ .Release.Name }}.{{ .Release.Namespace }}.svc.{{ include "rabbitmq.clusterDomain" . }}:15672"
  {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  image: 'rabbitmq:{{ include "rabbitmq.versionMap" $ }}-management'
  {{- if .Values.external }}
  service:
    type: LoadBalancer
  {{- end }}
  resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.resourcesPreset .Values.resources $) | nindent 4 }}
  {{- if $tlsEnabled }}
  {{- /* Setting spec.tls.secretName is the whole of it. The operator then writes its
       own defaultTLSConf, supplying ssl_options.certfile/keyfile,
       listeners.ssl.default=5671 and management.ssl.certfile/keyfile/port=15671, so
       no additionalConfig is needed to serve AMQPS or management HTTPS. The same
       branch writes management.tcp.port=15672, which is why the plaintext management
       listener stays up while disableNonTLSListeners is unset.

       No cacertfile is set on either listener. It would only matter for verifying
       CLIENT certificates, which additionally requires verify_peer and
       fail_if_no_peer_cert; without those the endpoint authenticates clients by
       password inside the TLS session, not by certificate. */}}
  tls:
    secretName: {{ .Release.Name }}-tls
    {{- if $disableNonTLS }}
    {{- /* Broker-level: writes `listeners.tcp = none` into rabbitmq.conf, so the
         plaintext AMQP socket is never opened on any interface and in-cluster
         clients lose it at the same instant external ones do. Management and
         Prometheus plaintext close with it. Erlang distribution (25672) and epmd
         (4369) are NOT affected — the operator never applies this to the headless
         Service that carries them, so inter-node traffic stays plaintext either
         way. Opt-in only; see README "TLS scope". */}}
    disableNonTLSListeners: true
    {{- end }}
  {{- end }}
  override:
    {{- /* No spec.override.service here, and both directions are deliberate.

         Removing a port is impossible: the operator rebuilds its default port set
         from generateServicePortsMap() on every reconcile and only then applies the
         override as a strategic merge patch keyed on `port` (corev1.ServiceSpec
         tags Ports with patchMergeKey:"port"), which can add or mutate an entry but
         never delete one. A TLS-only port list would be a no-op that reads like a
         guarantee. So plaintext amqp:5672 and management:15672 stay published,
         including on the LoadBalancer when external is true; only
         spec.tls.disableNonTLSListeners closes them, and it writes
         `listeners.tcp = none` into rabbitmq.conf — broker level, so it drops
         in-cluster clients along with external ones. It is not set here.

         Adding a port is possible but not safe here. Enabling TLS swaps the
         published metrics port from prometheus:15692 to prometheus-tls:15691
         (service.go: "We expose either 15692 or 15691 in the Service, but not
         both"), and adding 15692 back through this override would churn: on each
         reconcile updatePorts drops it, because it keeps only operator-known port
         NAMES and carries their NodePort across, then the override re-adds it with
         nodePort unset. For a LoadBalancer the apiserver reads that as "allocate",
         assigns a fresh NodePort, and the resulting write retriggers the operator's
         own Service watch. ClusterIP escapes it only because Update() zeroes every
         NodePort there, making the patched spec equal to the live one. The default
         external configuration is exactly the one that would loop, so the port
         change is documented in README "TLS scope" instead. */}}
    statefulSet:
      spec:
        template:
          spec:
            enableServiceLinks: false
            containers: []
          metadata:
            labels:
              policy.cozystack.io/allow-to-apiserver: "true"

  persistence:
    {{- with .Values.storageClass }}
    storageClassName: {{ . }}
    {{- end }}
    storage: {{ .Values.size }}

{{- range $user, $u := .Values.users }}

{{- $password := $u.password }}
{{- if not $password }}
{{- with (dig "data" "password" "" (lookup "v1" "Secret" $.Release.Namespace (printf "%s-%s-credentials" $.Release.Name (kebabcase $user)))) }}
{{- $password = b64dec . }}
{{- end }}
{{- end }}
{{- if not $password }}
{{- $password = (randAlphaNum 16) }}
{{- end }}

---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $user }}
  annotations:
    config: '{{ printf "%s %s" $user $password | sha256sum }}'
spec:
  importCredentialsSecret:
    name: {{ $.Release.Name }}-{{ kebabcase $user }}-credentials
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $user }}-credentials
  labels:
    apps.cozystack.io/user-secret: "true"
type: Opaque
stringData:
  username: {{ $user }}
  password: {{ $password }}
{{- end }}

{{- range $host, $h := .Values.vhosts }}
---
apiVersion: rabbitmq.com/v1beta1
kind: Vhost
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $host }}
spec:
  name: {{ $host }}
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
{{- range $user := $h.roles.admin }}
---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $host }}-{{ kebabcase $user }}
spec:
  vhost: "{{ $host }}"
  user: "{{ $user }}"
  permissions:
    write: ".*"
    configure: ".*"
    read: ".*"
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
{{- end }}
{{- range $user := $h.roles.readonly }}
---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $host }}-{{ kebabcase $user }}
spec:
  vhost: "{{ $host }}"
  user: "{{ $user }}"
  permissions:
    read: ".*"
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
{{- end }}

{{- end }}
