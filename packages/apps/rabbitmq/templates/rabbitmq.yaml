{{- $tlsEnabled := (include "rabbitmq.tls.enabled" .) | eq "true" }}

apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicas }}
  image: 'rabbitmq:{{ include "rabbitmq.versionMap" $ }}-management'
  {{- if .Values.external }}
  service:
    type: LoadBalancer
  {{- end }}
  resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.resourcesPreset .Values.resources $) | nindent 4 }}
  {{- if $tlsEnabled }}
  {{- /* Setting spec.tls.secretName is the whole of it. The operator then writes its
       own defaultTLSConf, supplying ssl_options.certfile/keyfile,
       listeners.ssl.default=5671 and management.ssl.certfile/keyfile/port=15671, so
       no additionalConfig is needed to serve AMQPS or management HTTPS. The same
       branch writes management.tcp.port=15672, which is why the plaintext management
       listener stays up while disableNonTLSListeners is unset.

       No cacertfile is set on either listener. It would only matter for verifying
       CLIENT certificates, which additionally requires verify_peer and
       fail_if_no_peer_cert; without those the endpoint authenticates clients by
       password inside the TLS session, not by certificate. Setting it on the
       management listener alone — as this chart previously did — bought nothing and
       left the two listeners inconsistent. */}}
  tls:
    secretName: {{ .Release.Name }}-tls
  {{- end }}
  override:
    {{- /* No spec.override.service here, deliberately. Listing only the TLS ports
         would look like it removes the plaintext ones from the published Service,
         and it does not: the operator rebuilds its full default port set from
         generateServicePortsMap() on every reconcile and only then applies the
         override as a strategic merge patch keyed on `port` (corev1.ServiceSpec
         tags Ports with patchMergeKey:"port"), which can add or mutate entries but
         never remove them. A partial port list is therefore a no-op — and with TLS
         on, amqps:5671 and management-tls:15671 are byte-identical to what the
         operator already generates. Plaintext amqp:5672 and management:15672 stay
         published, including on the LoadBalancer when external is true.

         The only switch that closes them is spec.tls.disableNonTLSListeners, which
         writes `listeners.tcp = none` into rabbitmq.conf — a broker-level change
         that closes the socket on every interface at once, dropping in-cluster
         plaintext clients along with external ones. It is not set here, so
         enabling TLS never breaks a working connection. See README "TLS scope". */}}
    statefulSet:
      spec:
        template:
          spec:
            enableServiceLinks: false
            containers: []
          metadata:
            labels:
              policy.cozystack.io/allow-to-apiserver: "true"

  persistence:
    {{- with .Values.storageClass }}
    storageClassName: {{ . }}
    {{- end }}
    storage: {{ .Values.size }}

{{- range $user, $u := .Values.users }}

{{- $password := $u.password }}
{{- if not $password }}
{{- with (dig "data" "password" "" (lookup "v1" "Secret" $.Release.Namespace (printf "%s-%s-credentials" $.Release.Name (kebabcase $user)))) }}
{{- $password = b64dec . }}
{{- end }}
{{- end }}
{{- if not $password }}
{{- $password = (randAlphaNum 16) }}
{{- end }}

---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $user }}
  annotations:
    config: '{{ printf "%s %s" $user $password | sha256sum }}'
spec:
  importCredentialsSecret:
    name: {{ $.Release.Name }}-{{ kebabcase $user }}-credentials
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $user }}-credentials
  labels:
    apps.cozystack.io/user-secret: "true"
type: Opaque
stringData:
  username: {{ $user }}
  password: {{ $password }}
{{- end }}

{{- range $host, $h := .Values.vhosts }}
---
apiVersion: rabbitmq.com/v1beta1
kind: Vhost
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $host }}
spec:
  name: {{ $host }}
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
{{- range $user := $h.roles.admin }}
---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $host }}-{{ kebabcase $user }}
spec:
  vhost: "{{ $host }}"
  user: "{{ $user }}"
  permissions:
    write: ".*"
    configure: ".*"
    read: ".*"
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
{{- end }}
{{- range $user := $h.roles.readonly }}
---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $host }}-{{ kebabcase $user }}
spec:
  vhost: "{{ $host }}"
  user: "{{ $user }}"
  permissions:
    read: ".*"
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
{{- end }}

{{- end }}
