{{- $tlsEnabled := (include "rabbitmq.tls.enabled" .) | eq "true" }}
{{- $wantDisableNonTLS := dig "disableNonTLSListeners" false (.Values.tls | default dict) }}

{{- /* Closing the plaintext listeners with TLS off would leave nothing listening.
     The operator rejects this too (reconcile_tls.go), so fail here rather than
     drop the flag and render a cluster that looks healthy with every plaintext
     listener open. */}}
{{- if and $wantDisableNonTLS (not $tlsEnabled) }}
{{-   fail "tls.disableNonTLSListeners is set but TLS is off, which would leave no listener at all: set tls.enabled: true as well. The RabbitMQ operator rejects this combination too." }}
{{- end }}
{{- $disableNonTLS := and $tlsEnabled $wantDisableNonTLS }}

{{- /* messaging-topology-operator reaches the broker only over the plaintext
     management port here: the flag forces its connection to TLS regardless of its
     own configuration (TLSEnabled() && (!connectUsingHTTP || DisableNonTLSListeners()))
     and it verifies against x509.SystemCertPool(), which cannot hold a per-release
     CA. So User, Vhost and Permission would stop reconciling. Fail rather than ship
     that.

     The check reads .Values only because that is all a template can see. The
     breakage is wider: useTLSForConnection is derived from the RabbitmqCluster, not
     from who created the topology CR, so hand-written User/Vhost/Permission objects
     against this cluster fail identically and silently. The flag is for clusters
     whose users are managed by rabbitmqctl or a definitions import, not by that
     operator at all. See README "Closing the plaintext listeners". */}}
{{- if and $disableNonTLS (or .Values.users .Values.vhosts) }}
{{-   fail "tls.disableNonTLSListeners cannot be combined with users or vhosts: closing the plaintext listeners stops messaging-topology-operator from reconciling User, Vhost and Permission objects, because it would have to verify the per-release CA against the system trust pool. That applies to hand-written topology objects too — the operator reads the RabbitmqCluster, not who created the CR — so moving them out of the chart does not help. Manage users and permissions with rabbitmqctl or a definitions import, or leave tls.disableNonTLSListeners unset." }}
{{- end }}

apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- if and $tlsEnabled (not $disableNonTLS) }}
  {{- /* Keep messaging-topology-operator on the plaintext management port.
       Setting spec.tls.secretName makes RabbitmqCluster.TLSEnabled() true, and the
       topology operator computes
         useTLSForConnection = TLSEnabled() && (!connectUsingHTTP || DisableNonTLSListeners())
       with connectUsingHTTP coming from CONNECT_USING_PLAIN_HTTP, which the
       cozystack Deployment does not set. So it would switch to https://…:15671 and
       verify against x509.SystemCertPool() — a process-wide pool that cannot
       contain a per-release self-signed CA. Every User, Vhost and Permission this
       chart renders would then fail with "certificate signed by unknown
       authority": already-applied users would linger while password rotation, new
       users and permission changes silently stopped.

       This annotation short-circuits that: extractURIandScheme reports
       tlsEnabled=false for an http:// scheme, so the operator uses the plaintext
       management listener — which the chart deliberately keeps open. That listener
       is load-bearing, not merely tolerated. Broker traffic is unaffected; this
       governs only the operator's own management connection.

       Note it does not stay on this object: ReconcileAndFilterAnnotations strips
       only keys containing kubernetes.io or k8s.io, so this annotation is copied
       onto every child the operator builds — Service, StatefulSet, ServiceAccount,
       Role and the default-user Secret the tenant reads. Harmless, but it is why
       an internal plumbing annotation shows up on tenant-visible objects. */}}
  annotations:
    rabbitmq.com/operator-connection-uri: "http://{{ .Release.Name }}.{{ .Release.Namespace }}.svc.{{ include "rabbitmq.clusterDomain" . }}:15672"
  {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  image: 'rabbitmq:{{ include "rabbitmq.versionMap" $ }}-management'
  {{- if .Values.external }}
  service:
    type: LoadBalancer
  {{- end }}
  resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.resourcesPreset .Values.resources $) | nindent 4 }}
  {{- if $tlsEnabled }}
  {{- /* Setting spec.tls.secretName is the whole of it. The operator then writes its
       own defaultTLSConf, supplying ssl_options.certfile/keyfile,
       listeners.ssl.default=5671 and management.ssl.certfile/keyfile/port=15671, so
       no additionalConfig is needed to serve AMQPS or management HTTPS. The same
       branch writes management.tcp.port=15672, which is why the plaintext management
       listener stays up while disableNonTLSListeners is unset.

       No cacertfile is set on either listener. It would only matter for verifying
       CLIENT certificates, which additionally requires verify_peer and
       fail_if_no_peer_cert; without those the endpoint authenticates clients by
       password inside the TLS session, not by certificate. */}}
  tls:
    secretName: {{ .Release.Name }}-tls
    {{- if $disableNonTLS }}
    {{- /* Writes `listeners.tcp = none` into rabbitmq.conf: broker-level, so
         in-cluster clients lose plaintext with external ones. Does NOT cover Erlang
         distribution (25672) or epmd (4369), which ride the headless Service. See
         README "TLS scope". */}}
    disableNonTLSListeners: true
    {{- end }}
  {{- end }}
  override:
    {{- /* No spec.override.service, in either direction.

         It cannot REMOVE a port: the operator regenerates its default port set each
         reconcile and applies the override as a strategic merge patch keyed on
         `port`, which only adds or mutates. A TLS-only port list would be a no-op
         that reads like a guarantee.

         It must not ADD one either. Re-adding prometheus:15692, which enabling TLS
         swaps for prometheus-tls:15691, churns on a LoadBalancer: updatePorts drops
         any port name the operator does not own along with its NodePort, the
         override reinstates it with nodePort unset, the apiserver reallocates, and
         that write retriggers the operator's Service watch. ClusterIP escapes only
         because NodePorts are zeroed there. See README "TLS scope". */}}
    statefulSet:
      spec:
        template:
          spec:
            enableServiceLinks: false
            containers: []
          metadata:
            labels:
              policy.cozystack.io/allow-to-apiserver: "true"

  persistence:
    {{- with .Values.storageClass }}
    storageClassName: {{ . }}
    {{- end }}
    storage: {{ .Values.size }}

{{- range $user, $u := .Values.users }}

{{- $password := $u.password }}
{{- if not $password }}
{{- with (dig "data" "password" "" (lookup "v1" "Secret" $.Release.Namespace (printf "%s-%s-credentials" $.Release.Name (kebabcase $user)))) }}
{{- $password = b64dec . }}
{{- end }}
{{- end }}
{{- if not $password }}
{{- $password = (randAlphaNum 16) }}
{{- end }}

---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $user }}
  annotations:
    config: '{{ printf "%s %s" $user $password | sha256sum }}'
spec:
  importCredentialsSecret:
    name: {{ $.Release.Name }}-{{ kebabcase $user }}-credentials
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $user }}-credentials
  labels:
    apps.cozystack.io/user-secret: "true"
type: Opaque
stringData:
  username: {{ $user }}
  password: {{ $password }}
{{- end }}

{{- range $host, $h := .Values.vhosts }}
---
apiVersion: rabbitmq.com/v1beta1
kind: Vhost
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $host }}
spec:
  name: {{ $host }}
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
{{- range $user := $h.roles.admin }}
---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $host }}-{{ kebabcase $user }}
spec:
  vhost: "{{ $host }}"
  user: "{{ $user }}"
  permissions:
    write: ".*"
    configure: ".*"
    read: ".*"
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
{{- end }}
{{- range $user := $h.roles.readonly }}
---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: {{ $.Release.Name }}-{{ kebabcase $host }}-{{ kebabcase $user }}
spec:
  vhost: "{{ $host }}"
  user: "{{ $user }}"
  permissions:
    read: ".*"
  rabbitmqClusterReference:
    name: {{ $.Release.Name }}
{{- end }}

{{- end }}
