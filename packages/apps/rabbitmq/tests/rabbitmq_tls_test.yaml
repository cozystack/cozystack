suite: RabbitMQ TLS spec wiring

templates:
  - templates/rabbitmq.yaml

tests:
  # -----------------------------------------------------------------------
  # No TLS: spec.tls absent
  # -----------------------------------------------------------------------

  - it: does not set spec.tls when tls.enabled is false
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: false
      external: false
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - notExists:
          path: spec.tls

  - it: does not include management ssl config when tls.enabled is false
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: false
      external: false
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - notExists:
          path: spec.rabbitmq.additionalConfig

  # -----------------------------------------------------------------------
  # TLS enabled: spec.tls wired
  # -----------------------------------------------------------------------

  - it: sets spec.tls.secretName to release-tls when tls.enabled is true
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
      external: false
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - equal:
          path: spec.tls.secretName
          value: myrabbitmq-tls

  - it: does not set disableNonTLSListeners when tls.enabled is true
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
      external: false
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - notExists:
          path: spec.tls.disableNonTLSListeners

  # The operator's own defaultTLSConf supplies ssl_options.certfile/keyfile,
  # listeners.ssl.default and management.ssl.certfile/keyfile/port once
  # spec.tls.secretName is set, so the chart restates none of them and renders no
  # additionalConfig at all.

  - it: adds no additionalConfig, since the operator supplies the TLS config itself
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
      external: false
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      # defaultTLSConf already gives ssl_options.certfile/keyfile,
      # listeners.ssl.default and management.ssl.certfile/keyfile/port once
      # spec.tls.secretName is set. No cacertfile on either listener either: it
      # would only matter for verifying CLIENT certificates, which also needs
      # verify_peer and fail_if_no_peer_cert.
      - notExists:
          path: spec.rabbitmq

  - it: never sets disableNonTLSListeners, so plaintext listeners survive TLS
    release:
      name: myrabbitmq
      namespace: tenant-test
    values:
      - fixtures/tls_default_values.yaml
    set:
      external: true
      _namespace.host: example.com
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - notExists:
          path: spec.tls.disableNonTLSListeners

  # -----------------------------------------------------------------------
  # Tri-state: external=true, tls.enabled not set (default ~) => TLS enabled
  # -----------------------------------------------------------------------

  - it: enables TLS when tls.enabled is unset (default) and external is true
    release:
      name: myrabbitmq
      namespace: tenant-test
    values:
      - fixtures/tls_default_values.yaml
    set:
      external: true
      _namespace.host: example.com
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - equal:
          path: spec.tls.secretName
          value: myrabbitmq-tls

  # -----------------------------------------------------------------------
  # Tri-state: explicit tls.enabled=false beats external=true
  # -----------------------------------------------------------------------

  - it: disables TLS when tls.enabled is false even if external is true
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: false
      external: true
      _namespace.host: example.com
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - notExists:
          path: spec.tls
      - notExists:
          path: spec.rabbitmq.additionalConfig

  # -----------------------------------------------------------------------
  # B1: no spec.override.service is rendered, in any combination.
  #
  # Listing only the TLS ports there would READ as "plaintext is not published",
  # but it cannot do that. The operator rebuilds its default port set from
  # generateServicePortsMap() on every reconcile and only then applies the
  # override as a strategic merge patch keyed on `port` (corev1.ServiceSpec tags
  # Ports patchMergeKey:"port"), so a partial list can add or mutate entries but
  # never remove them. With TLS on, amqps:5671 and management-tls:15671 are also
  # byte-identical to what the operator already generates, making such an
  # override a pure no-op that credits itself with a guarantee it does not
  # provide. These tests pin its absence so it cannot come back as decoration.
  #
  # Closing plaintext requires spec.tls.disableNonTLSListeners, which is a
  # broker-level switch affecting in-cluster clients too — see the block below.
  # -----------------------------------------------------------------------

  - it: no service override is rendered when TLS is on and external is false
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
      external: false
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - notExists:
          path: spec.override.service

  - it: no service override is rendered when TLS and external are both on
    release:
      name: myrabbitmq
      namespace: tenant-test
    values:
      - fixtures/tls_default_values.yaml
    set:
      external: true
      _namespace.host: example.com
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - notExists:
          path: spec.override.service

  - it: no service override is rendered when external is on but TLS is off
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: false
      external: true
      _namespace.host: example.com
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - notExists:
          path: spec.override.service

  - it: the statefulSet override is still rendered, so override itself is not empty
    release:
      name: myrabbitmq
      namespace: tenant-test
    values:
      - fixtures/tls_default_values.yaml
    set:
      external: true
      _namespace.host: example.com
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - exists:
          path: spec.override.statefulSet

  # -----------------------------------------------------------------------
  # Inter-node Erlang distribution TLS scope boundary
  #
  # This chart wires TLS for AMQP (5671), management HTTPS (15671), and the
  # cert-manager chain. Inter-node Erlang distribution (port 25672) is NOT
  # covered. The operator exposes exactly three TLS fields — secretName,
  # caSecretName and disableNonTLSListeners — and none of them governs 25672,
  # which the operator carries on the headless Service unconditionally. Inter-node
  # mTLS would require caSecretName plus operator-side configuration this chart
  # does not wire.
  # -----------------------------------------------------------------------

  - it: leaves caSecretName unset, so no inter-node mTLS is configured
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
    documentSelector:
      path: kind
      value: RabbitmqCluster
    asserts:
      - notExists:
          path: spec.tls.caSecretName

  # -----------------------------------------------------------------------
  # Baseline (no TLS): RabbitmqCluster always renders
  # -----------------------------------------------------------------------

