suite: RabbitMQ dashboard Role resource access

templates:
  - templates/dashboard-resourcemap.yaml

tests:
  # -----------------------------------------------------------------------
  # Baseline: Role always grants access to default-user secret
  # -----------------------------------------------------------------------

  - it: Role always grants access to default-user secret
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: false
      external: false
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - contains:
          path: rules[0].resourceNames
          content: myrabbitmq-default-user

  # -----------------------------------------------------------------------
  # B: no key-bearing Secret is ever granted, in any TLS state.
  #
  # Both objects that carry ca.crt also carry a private key: <release>-tls holds
  # the server key and <release>-ca holds the CA key. RBAC cannot filter by key,
  # so granting either to deliver a trust anchor delivers a key with it. The
  # tenant reads the key-free <release>.tenant-ca projection through
  # core.cozystack.io/tenantsecrets instead, which the base tenant roles already
  # grant — so it is deliberately absent from this core/v1 Role too.
  # -----------------------------------------------------------------------

  - it: Role never grants the leaf TLS secret when tls.enabled is true
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
      external: false
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - notContains:
          path: rules[0].resourceNames
          content: myrabbitmq-tls

  - it: Role never grants the CA secret when tls.enabled is true
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
      external: false
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - notContains:
          path: rules[0].resourceNames
          content: myrabbitmq-ca

  - it: Role never grants key-bearing secrets on the external TLS path
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
      external: true
      _namespace.host: example.com
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - notContains:
          path: rules[0].resourceNames
          content: myrabbitmq-tls
      - notContains:
          path: rules[0].resourceNames
          content: myrabbitmq-ca

  - it: Role does not grant the tenant-ca projection by name either
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
      external: false
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      # Delivered through core.cozystack.io/tenantsecrets, not as a core/v1
      # Secret, so a resourceNames entry here would grant nothing.
      - notContains:
          path: rules[0].resourceNames
          content: myrabbitmq.tenant-ca

  - it: Role still grants the default-user secret when TLS is on
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
      external: false
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - contains:
          path: rules[0].resourceNames
          content: myrabbitmq-default-user

  - it: Role does NOT grant access to TLS secret when TLS is disabled
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: false
      external: false
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - notContains:
          path: rules[0].resourceNames
          content: myrabbitmq-tls

  - it: Role does NOT grant access to TLS secret when tls.enabled is explicitly false even if external is true
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: false
      external: true
      _namespace.host: example.com
    documentIndex: 0
    asserts:
      - isKind:
          of: Role
      - notContains:
          path: rules[0].resourceNames
          content: myrabbitmq-tls

  # -----------------------------------------------------------------------
  # Verify RoleBinding is also rendered
  # -----------------------------------------------------------------------

  - it: RoleBinding is rendered as second document
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: false
      external: false
    documentIndex: 1
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: roleRef.name
          value: myrabbitmq-dashboard-resources

  # -----------------------------------------------------------------------
  # Pin the complete list, not just the absence of known-bad names. Every other
  # assertion here is a notContains, so a Role that gained the erlang cookie or
  # any future Secret would satisfy all of them. This is the actual contract.
  # -----------------------------------------------------------------------

  - it: grants exactly the intended Secrets and nothing else, TLS on
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
      external: false
    documentIndex: 0
    asserts:
      - equal:
          path: rules[0].resourceNames
          value:
            - myrabbitmq-default-user

  - it: grants exactly the intended Secrets and nothing else, with users defined
    release:
      name: myrabbitmq
      namespace: tenant-test
    set:
      tls.enabled: true
      external: false
      users.alice.password: hackme
    documentIndex: 0
    asserts:
      - equal:
          path: rules[0].resourceNames
          value:
            - myrabbitmq-default-user
            - myrabbitmq-alice-credentials
