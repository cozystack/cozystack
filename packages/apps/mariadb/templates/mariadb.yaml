{{- $certManagerIssued := (include "mariadb.tls.certManagerIssued" .) | eq "true" -}}
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: {{ .Release.Name }}
spec:
  rootPasswordSecretKeyRef:
    name: {{ .Release.Name }}-credentials
    key: root

  image: "mariadb:{{ include "mariadb.versionMap" $ }}"

  port: 3306

  replicas: {{ .Values.replicas }}
  replicasAllowEvenNumber: true
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - mariadb
          - key: app.kubernetes.io/instance
            operator: In
            values:
            - {{ .Release.Name }}
        topologyKey: "kubernetes.io/hostname"

  {{- if gt (int .Values.replicas) 1 }}
  replication:
    enabled: true
    #primary:
    #  podIndex: 0
    #  automaticFailover: true
  {{- end }}

  podMetadata:
    labels:
      "policy.cozystack.io/allow-to-apiserver": "true"

  metrics:
    enabled: true
    exporter:
      image: prom/mysqld-exporter:v0.15.1
      # The mariadb-operator hardcodes the exporter's liveness/readiness probe
      # as an httpGet on port 9104, which kubelet dials over the pod's IPv4
      # address. Bind the exporter to the IPv4 wildcard so the probe connects
      # deterministically; the default [::] listener intermittently refuses the
      # IPv4 connect on single-stack-IPv4 data planes, flapping the pod to
      # NotReady and leaving the metrics Service endpoint unpopulated.
      args:
      - --web.listen-address=0.0.0.0:9104
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 300m
          memory: 512Mi
      port: 9104
    serviceMonitor:
      interval: 10s
      scrapeTimeout: 10s

  myCnfConfigMapKeyRef:
    name: {{ .Release.Name }}-my-cnf
    key: config

  service:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ $.Release.Name }}
    {{- if and .Values.external (eq (int .Values.replicas) 1) }}
    type: LoadBalancer
    {{- end }}
  storage:
    size: {{ .Values.size }}
    resizeInUseVolumes: true
    waitForVolumeResize: true
    {{- with .Values.storageClass }}
    storageClassName: {{ . }}
    {{- end }}

  {{- if and .Values.external (gt (int .Values.replicas) 1) }}
  primaryService:
    type: LoadBalancer
  {{- end }}

  #secondaryService:
  #  type: LoadBalancer

  {{- $tlsMap := default (dict) .Values.tls }}
  {{- $tlsRequired := index $tlsMap "required" }}
  # Always true, and load-bearing: the operator substitutes an enabled TLS spec
  # only when spec.tls is absent entirely, so sending the block without this
  # would turn TLS off.
  tls:
    enabled: true
    # Emitted under either issuer: enforcement works against operator-issued
    # certificates too, so gating it would accept required: true and silently
    # not enforce. Defaults to false because switching it on refuses every
    # client not yet moved to TLS — a decision to make, not something an upgrade
    # does. Flips to true as an announced change once the trust anchor is
    # published to tenants automatically.
    #
    # `kindIs "invalid"` guards against unset field; an explicit value is preserved.
    required: {{ if kindIs "invalid" $tlsRequired }}false{{ else }}{{ $tlsRequired }}{{ end }}
  {{- if $certManagerIssued }}
    serverCertSecretRef:
      name: {{ .Release.Name }}-tls
    serverCASecretRef:
      name: {{ .Release.Name }}-ca-tls
  {{- end }}

  resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.resourcesPreset .Values.resources $) | nindent 4 }}
