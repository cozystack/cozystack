{{- $tlsEnabled := (include "mariadb.tls.enabled" .) | eq "true" -}}
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: {{ .Release.Name }}
spec:
  rootPasswordSecretKeyRef:
    name: {{ .Release.Name }}-credentials
    key: root

  image: "mariadb:{{ include "mariadb.versionMap" $ }}"

  port: 3306

  replicas: {{ .Values.replicas }}
  replicasAllowEvenNumber: true
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - mariadb
          - key: app.kubernetes.io/instance
            operator: In
            values:
            - {{ .Release.Name }}
        topologyKey: "kubernetes.io/hostname"

  {{- if gt (int .Values.replicas) 1 }}
  replication:
    enabled: true
    #primary:
    #  podIndex: 0
    #  automaticFailover: true
  {{- end }}

  podMetadata:
    labels:
      "policy.cozystack.io/allow-to-apiserver": "true"

  metrics:
    enabled: true
    exporter:
      image: prom/mysqld-exporter:v0.15.1
      # The mariadb-operator hardcodes the exporter's liveness/readiness probe
      # as an httpGet on port 9104, which kubelet dials over the pod's IPv4
      # address. Bind the exporter to the IPv4 wildcard so the probe connects
      # deterministically; the default [::] listener intermittently refuses the
      # IPv4 connect on single-stack-IPv4 data planes, flapping the pod to
      # NotReady and leaving the metrics Service endpoint unpopulated.
      args:
      - --web.listen-address=0.0.0.0:9104
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 300m
          memory: 512Mi
      port: 9104
    serviceMonitor:
      interval: 10s
      scrapeTimeout: 10s

  myCnfConfigMapKeyRef:
    name: {{ .Release.Name }}-my-cnf
    key: config

  service:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ $.Release.Name }}
    {{- if and .Values.external (eq (int .Values.replicas) 1) }}
    type: LoadBalancer
    {{- end }}
  storage:
    size: {{ .Values.size }}
    resizeInUseVolumes: true
    waitForVolumeResize: true
    {{- with .Values.storageClass }}
    storageClassName: {{ . }}
    {{- end }}

  {{- if and .Values.external (gt (int .Values.replicas) 1) }}
  primaryService:
    type: LoadBalancer
  {{- end }}

  #secondaryService:
  #  type: LoadBalancer

  {{- $tlsMap := default (dict) .Values.tls }}
  {{- $tlsRequired := index $tlsMap "required" }}
  # The chart always asks for TLS. The operator does support enabled: false,
  # but omitting spec.tls does not select it — SetDefaults substitutes
  # TLS{Enabled: true} whenever the field is absent, so instances built by this
  # chart have always served TLS. Sending it explicitly makes the manifest say
  # what actually runs, and keeps the resolved values from silently turning TLS
  # off on an instance that has it today.
  #
  # What the chart's tls values select is therefore who owns the CA and whether
  # TLS is enforced, not whether TLS exists.
  tls:
    enabled: true
    # required: true enforces require_secure_transport=ON (strict TLS for all
    # connections). It is emitted in every configuration, not only the managed
    # one: enforcement is a sibling of enabled in the operator API and works
    # against operator-issued certificates too, so gating it here would accept
    # required: true and silently drop it — the worst outcome for a setting
    # whose whole purpose is refusing unprotected connections.
    #
    # It defaults to false, and enforcement is opt-in, because enforcement has to
    # follow the trust anchor rather than lead it: until the platform publishes a
    # key-free CA to the tenant, requiring TLS would tell clients they must
    # encrypt while giving them nothing to verify the server against. It also
    # keeps a platform upgrade from refusing connections that work today.
    #
    # This default is temporary. It flips to true as an announced change, in the
    # same release that makes the published anchor universal.
    #
    # `kindIs "invalid"` guards against unset field; an explicit value is preserved.
    required: {{ if kindIs "invalid" $tlsRequired }}false{{ else }}{{ $tlsRequired }}{{ end }}
  {{- if $tlsEnabled }}
    serverCertSecretRef:
      name: {{ .Release.Name }}-tls
    serverCASecretRef:
      name: {{ .Release.Name }}-ca-tls
  {{- end }}

  resources: {{- include "cozy-lib.resources.defaultingSanitize" (list .Values.resourcesPreset .Values.resources $) | nindent 4 }}
