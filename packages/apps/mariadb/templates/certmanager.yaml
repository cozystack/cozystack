{{- $tlsEnabled := (include "mariadb.tls.enabled" .) | eq "true" -}}
{{- if $tlsEnabled }}
{{- /* default (dict) keeps `index` from erroring when _cluster is absent or null, which is what makes the cozy.local fallback below actually reachable. */}}
{{- $clusterDomain := (index (default (dict) .Values._cluster) "cluster-domain") | default "cozy.local" }}
---
# Self-signed bootstrap Issuer — used only to sign the CA Certificate below.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-selfsigned
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
---
# CA Certificate. rotationPolicy: Never keeps the CA stable so existing
# client trust bundles remain valid across cert-manager renewals.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-ca
  namespace: {{ .Release.Namespace }}
spec:
  isCA: true
  commonName: {{ .Release.Name }}-ca
  secretName: {{ .Release.Name }}-ca-tls
  # This Secret is key-bearing and is never handed to the tenant, nor is it the
  # source the trust anchor is published from: the ApplicationDefinition names
  # the operator's key-free <release>-ca-bundle for that instead, so no
  # publication path ever runs next to the CA private key.
  #
  # The operator only watches Secrets referenced by serverCASecretRef /
  # serverCertSecretRef when they carry its watch label. Without it, a
  # cert-manager renewal does not trigger a reconcile and the new material is
  # only picked up on the next full resync.
  secretTemplate:
    labels:
      k8s.mariadb.com/watch: ""
  duration: 43800h
  issuerRef:
    name: {{ .Release.Name }}-selfsigned
    kind: Issuer
    group: cert-manager.io
  privateKey:
    rotationPolicy: Never
    algorithm: ECDSA
    size: 256
  # CA usages: signing + cert sign (issuing leaf certs) + crl sign (RFC 5280)
  usages:
    - signing
    - cert sign
    - crl sign
---
# CA Issuer — used to sign the leaf server certificate.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-ca
  namespace: {{ .Release.Namespace }}
spec:
  ca:
    secretName: {{ .Release.Name }}-ca-tls
---
# Leaf server TLS Certificate passed to mariadb-operator via spec.tls.serverCertSecretRef.
# The SAN list covers the base, primary, and secondary services plus, when external is
# true, the external DNS name for the LoadBalancer service.
#
# The operator can issue this leaf itself, via spec.tls.serverCertIssuerRef
# pointed at the CA Issuer above, which would remove this hand-written list.
# It is not used because at the pinned operator version (25.10.2) the SAN list
# is computed from the cluster's own service names with no way to extend it —
# the TLS spec has no alt-names field — so the external hostname, the only
# reason external: true exists, could never appear in the certificate and an
# external client would fail hostname verification against it.
#
# That is version-scoped, not permanent: upstream has since added
# spec.tls.serverCertAdditionalNames, which TLSServerDNSNames appends. Once the
# operator is bumped past that, the issuer path can carry the external hostname
# and everything below here can go. Worth revisiting at the next bump rather
# than treating this as settled.
#
# The consequence is that this list has to track the operator's service naming
# by hand, and nothing verifies that it still does. The test suite pins the full
# set, which catches an accidental edit here, but it compares this template
# against a copy of itself — it cannot notice the operator renaming a service.
# The operator does not check either: with both serverCASecretRef and
# serverCertSecretRef supplied it skips certificate issuance, so the code that
# would validate SANs is never reached. It still reads the Secret — for the pod
# annotation hash and for status — but never inspects the names in it. So an upstream rename surfaces as a handshake failure
# in a cluster, and closing that gap needs an e2e case that connects, not
# another rendering assertion.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Release.Name }}-tls
  # Set explicitly: cert-manager leaves the Subject CN empty otherwise, and a
  # client that still verifies the hostname against the CN rather than the SANs
  # fails outright against an empty one.
  commonName: {{ .Release.Name }}
  # Watch label only: this Secret holds the server private key and is never a
  # publication source. rotationPolicy below replaces the key on every renewal,
  # so the operator has to observe the change to roll the pods onto it.
  secretTemplate:
    labels:
      k8s.mariadb.com/watch: ""
  duration: 8760h
  renewBefore: 720h
  isCA: false
  # Server authentication only. The operator issues its own server certificates
  # the same way — server auth, never client auth — and keeps client auth on the
  # separate client certificates it manages, which is what replication actually
  # presents. MariaDB treats the two as distinct roles, and a user declared
  # REQUIRE X509 accepts any client certificate signed by a trusted CA, so
  # granting the server key client auth would let it authenticate as such a user.
  #
  # digital signature is the usage an ECDSA key actually needs, for the ECDHE
  # signature. This set deliberately drops the key encipherment bit the operator
  # also sets: it covers RSA key transport and means nothing for a P-256 key.
  usages:
    - server auth
    - digital signature
  dnsNames:
    {{- $ns := .Release.Namespace }}
    {{- $name := .Release.Name }}
    - localhost
    # All four resolution depths are listed for the headless wildcard, matching
    # the per-service names below: a client with a low ndots setting, or one
    # using a search-domain suffix, presents the shortened form during
    # verification, and an absent SAN fails the handshake.
    - {{ printf "*.%s-internal" $name | quote }}
    - {{ printf "*.%s-internal.%s" $name $ns | quote }}
    - {{ printf "*.%s-internal.%s.svc" $name $ns | quote }}
    - {{ printf "*.%s-internal.%s.svc.%s" $name $ns $clusterDomain | quote }}
    {{- range $svc := list $name (printf "%s-primary" $name) (printf "%s-secondary" $name) }}
    - {{ $svc }}
    - {{ $svc }}.{{ $ns }}
    - {{ $svc }}.{{ $ns }}.svc
    - {{ $svc }}.{{ $ns }}.svc.{{ $clusterDomain }}
    {{- end }}
    {{- if .Values.external | default false }}
    {{- /* default (dict) keeps `index` from erroring on an absent or null _namespace, so the required message is what surfaces. */}}
    {{- $extHost := required "external is true but _namespace.host is not set" (index (default (dict) .Values._namespace) "host") }}
    - {{ printf "%s.%s" .Release.Name $extHost }}
    {{- end }}
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ .Release.Name }}-ca
    kind: Issuer
    group: cert-manager.io
{{- end }}
