{{- $tlsEnabled := (include "mariadb.tls.enabled" .) | eq "true" -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-dashboard-resources
rules:
- apiGroups:
  - ""
  resources:
  - services
  resourceNames:
  # The bare <name> service exists in both topologies; -primary/-secondary
  # only when replication is on (replicas>1). Grant exactly what exists so the
  # RBAC matches the services the ApplicationDefinition (mariadb-rd) lists.
  - {{ .Release.Name }}
  {{- if gt (int .Values.replicas) 1 }}
  - {{ .Release.Name }}-primary
  - {{ .Release.Name }}-secondary
  {{- end }}
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  # The cert-manager Secrets are deliberately absent: -ca-tls and -tls hold
  # private keys, so granting them here would hand the tenant signing material
  # instead of a trust anchor.
  - {{ .Release.Name }}-credentials
  {{- if $tlsEnabled }}
  # -ca-bundle is reconciled by the operator whenever TLS is enabled and holds
  # only ca.crt, never a private key. It is the trust anchor clients need to
  # verify the server, and it tracks CA rollovers, so it is the correct thing
  # to hand the tenant.
  - {{ .Release.Name }}-ca-bundle
  {{- end }}
  verbs: ["get", "list", "watch"]
- apiGroups:
  - cozystack.io
  resources:
  - workloadmonitors
  resourceNames:
  - {{ .Release.Name }}
  verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Release.Name }}-dashboard-resources
subjects:
{{ include "cozy-lib.rbac.subjectsForTenantAndAccessLevel" (list "use" .Release.Namespace) }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-dashboard-resources
  apiGroup: rbac.authorization.k8s.io
