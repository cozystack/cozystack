suite: worker node pool rendering
templates:
  - templates/nodegroup.yaml
release:
  name: kubernetes-nodes-myk8s-md0
  namespace: tenant-test
set:
  cluster: myk8s
  _cluster:
    cluster-domain: cozy.local
  version: "v1.35"
  minReplicas: 0
  maxReplicas: 3
  instanceType: ""
  diskSize: 20Gi
  storageClass: replicated
  roles:
    - ingress-nginx
  resources:
    cpu: "2"
    memory: 4Gi
tests:
  - it: names the MachineDeployment after the parent cluster and pool
    documentSelector:
      path: kind
      value: MachineDeployment
    asserts:
      - equal:
          path: metadata.name
          value: kubernetes-myk8s-md0
      - equal:
          path: spec.clusterName
          value: kubernetes-myk8s

  - it: wires the MachineDeployment to the parent CAPI cluster via labels
    documentSelector:
      path: kind
      value: MachineDeployment
    asserts:
      - equal:
          path: spec.selector.matchLabels["cluster.x-k8s.io/cluster-name"]
          value: kubernetes-myk8s
      - equal:
          path: spec.template.metadata.labels["cluster.x-k8s.io/deployment-name"]
          value: kubernetes-myk8s-md0
      - equal:
          path: spec.template.metadata.labels["node-role.kubernetes.io/ingress-nginx"]
          value: ""

  - it: carries both cluster-autoscaler node-group size annotations and omits replicas
    documentSelector:
      path: kind
      value: MachineDeployment
    asserts:
      - equal:
          path: metadata.annotations["cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size"]
          value: "0"
      - equal:
          path: metadata.annotations["cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size"]
          value: "3"
      - notExists:
          path: spec.replicas

  - it: points the MachineDeployment bootstrap at the pool TalosConfigTemplate
    documentSelector:
      path: kind
      value: MachineDeployment
    asserts:
      - equal:
          path: spec.template.spec.bootstrap.configRef.name
          value: kubernetes-myk8s-md0
      - equal:
          path: spec.template.spec.bootstrap.configRef.kind
          value: TalosConfigTemplate

  - it: names the KubevirtMachineTemplate with the parent cluster prefix and a content hash
    documentSelector:
      path: kind
      value: KubevirtMachineTemplate
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ^kubernetes-myk8s-md0-[0-9a-f]{6}$

  - it: emits a worker WorkloadMonitor selecting the pool
    documentSelector:
      path: kind
      value: WorkloadMonitor
    asserts:
      - equal:
          path: spec.type
          value: worker
      - equal:
          path: spec.selector["cluster.x-k8s.io/cluster-name"]
          value: kubernetes-myk8s
---
suite: worker node pool validation
templates:
  - templates/nodegroup.yaml
tests:
  - it: fails when cluster is not set
    release:
      name: kubernetes-nodes-myk8s-md0
      namespace: tenant-test
    set:
      cluster: ""
      _cluster:
        cluster-domain: cozy.local
    asserts:
      - failedTemplate:
          errorMessage: "kubernetes-nodes: .Values.cluster is required — set it to the parent Kubernetes CR name so the pool attaches to cluster kubernetes-<cluster>"

  - it: fails when the release name is not prefixed with the cluster name
    release:
      name: kubernetes-nodes-wrong-md0
      namespace: tenant-test
    set:
      cluster: myk8s
      _cluster:
        cluster-domain: cozy.local
    asserts:
      - failedTemplate:
          errorMessage: 'kubernetes-nodes: release name "kubernetes-nodes-wrong-md0" must start with "kubernetes-nodes-myk8s-" — name the KubernetesNodes CR <cluster>-<pool> (cluster="myk8s")'
