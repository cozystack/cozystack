{{- /*
  Main-phase Job (NOT a Helm hook) that produces this pool's TalosConfigTemplate
  and patches the parent KamajiControlPlane.spec.network.certSANs with the live
  apiserver Service ClusterIP.

  The Talos worker machineconfig needs values that only exist AFTER the parent
  control-plane release has applied: the apiserver Service ClusterIP (emitted by
  Kamaji), the Talos-CA Secret (issued by cert-manager from the parent's Talos
  PKI), and the Kubernetes-CA Secret (generated by Kamaji). A Helm `lookup` for
  any of these races on every fresh install, so this Job blocks until all four
  inputs are observably present, then `kubectl apply`s the TalosConfigTemplate
  (idempotent) with an ownerReference to the parent KamajiControlPlane so it is
  garbage-collected on the parent's uninstall.

  Cross-release ordering. The Job reads objects owned by the PARENT `kubernetes`
  release (Service, Secrets, KamajiControlPlane named kubernetes-<cluster>). No
  hard per-tenant dependsOn is possible across the two HelmReleases, so ordering
  is handled at runtime by this Job's ~10-minute input-wait loop plus the
  release.cozystack.io/helm-install-disable-wait annotation on the pool's
  ApplicationDefinition.

  Churn-free across upgrades. The Job is immutable, so it carries a content-hash
  name suffix; an identical render yields the same name and Helm no-ops it. The
  applied TalosConfigTemplate keeps a stable name (kubernetes-<cluster>-<group>,
  referenced by MachineDeployment.bootstrap.configRef), so an unchanged render
  re-applies a byte-identical TCT — a CAPI no-op that never rolls workers.
*/}}
{{- $clusterName := include "kubernetes-nodes.clusterName" . }}
{{- $groupName := include "kubernetes-nodes.groupName" . }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-talos-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-talos-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["{{ $clusterName }}"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "{{ $clusterName }}-talos-secrets"
      - "{{ $clusterName }}-talos-ca"
      - "{{ $clusterName }}-ca"
    verbs: ["get"]
  - apiGroups: ["controlplane.cluster.x-k8s.io"]
    resources: ["kamajicontrolplanes"]
    resourceNames: ["{{ $clusterName }}"]
    verbs: ["get", "patch"]
  - apiGroups: ["bootstrap.cluster.x-k8s.io"]
    resources: ["talosconfigtemplates"]
    verbs: ["get", "create", "patch", "update"]
---
{{- /* The tenant-root chart installs a default-deny egress policy on every
       pod in the tenant namespace; without an explicit allow, this Job
       cannot reach the management-cluster apiserver to read the Service
       ClusterIP / Secrets / KamajiControlPlane it has to reconcile. Cilium
       policies are additive, so this rule layers on top of the tenant
       default-deny without weakening it for anything else. Endpoint
       selector is scoped to pods carrying the reconcile label only. */}}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-talos-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      cozystack.io/talos-reconcile: "{{ .Release.Name }}"
  egress:
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-talos-reconcile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-talos-reconcile
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-talos-reconcile
    namespace: {{ .Release.Namespace }}
---
{{- /* Cluster-scoped read on the management CoreDNS Service so the Job
       can look up its ClusterIP at runtime and inject it into the worker
       machineconfig as a host-level nameserver. resourceNames pins the
       grant to the single well-known Service name kube-dns. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-talos-reconcile-coredns
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["kube-dns"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-talos-reconcile-coredns
  labels:
    {{- include "kubernetes.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-talos-reconcile-coredns
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-talos-reconcile
    namespace: {{ .Release.Namespace }}
{{- /* Job spec rendered through a named template so the Job name can carry
       a content hash of the whole spec. $.Release is the pool release (used for
       the SA it runs as and its network-policy label); .clusterName targets the
       parent control-plane objects (Service/Secrets/KCP/TCT). */}}
{{- define "kubernetes-nodes.talos-reconcile-job-spec" -}}
spec:
  backoffLimit: 30
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        cozystack.io/talos-reconcile: {{ $.Release.Name | quote }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ $.Release.Name }}-talos-reconcile
      containers:
        - name: kubectl
          image: "{{ .kubectlImage }}"
          env:
            - name: RELEASE
              value: {{ .clusterName | quote }}
            - name: NS
              value: {{ $.Release.Namespace | quote }}
            - name: GROUP_NAME
              value: {{ .groupName | quote }}
            - name: TALOS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .clusterName }}-talos-secrets
                  key: token
            - name: CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .clusterName }}-talos-secrets
                  key: clusterId
            - name: CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .clusterName }}-talos-secrets
                  key: clusterSecret
            - name: BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .clusterName }}-talos-secrets
                  key: bootstrapToken
          command:
            - sh
            - -ec
            - |
              echo "[$(date -u +%H:%M:%S)] talos-reconcile/${GROUP_NAME}: waiting for Service ClusterIP, Talos CA, K8s CA, management CoreDNS"
              for i in $(seq 1 120); do
                SVC_IP=$(kubectl -n "$NS" get svc "$RELEASE" -o jsonpath='{.spec.clusterIP}' 2>/dev/null || true)
                TALOS_CA_B64=$(kubectl -n "$NS" get secret "${RELEASE}-talos-ca" -o jsonpath='{.data.tls\.crt}' 2>/dev/null || true)
                K8S_CA_B64=$(kubectl -n "$NS" get secret "${RELEASE}-ca" -o jsonpath='{.data.ca\.crt}' 2>/dev/null || true)
                COREDNS_IP=$(kubectl -n kube-system get svc kube-dns -o jsonpath='{.spec.clusterIP}' 2>/dev/null || true)
                if [ -n "$SVC_IP" ] && [ -n "$TALOS_CA_B64" ] && [ -n "$K8S_CA_B64" ] && [ -n "$COREDNS_IP" ]; then
                  break
                fi
                sleep 5
              done
              if [ -z "$SVC_IP" ] || [ -z "$TALOS_CA_B64" ] || [ -z "$K8S_CA_B64" ] || [ -z "$COREDNS_IP" ]; then
                echo "[$(date -u +%H:%M:%S)] timed out waiting for lookup inputs (svc='$SVC_IP' talos-ca=$([ -n "$TALOS_CA_B64" ] && echo ok) k8s-ca=$([ -n "$K8S_CA_B64" ] && echo ok) coredns='$COREDNS_IP')"
                exit 1
              fi
              echo "[$(date -u +%H:%M:%S)] inputs ready (svc=${SVC_IP} coredns=${COREDNS_IP})"

              # Patch KamajiControlPlane.spec.network.certSANs so the apiserver
              # TLS cert covers the live Service ClusterIP that Talos workers
              # dial. JSON-merge-patch is array-replace semantics, which is what
              # we want here — Kamaji owns the full SAN list.
              kubectl -n "$NS" patch kamajicontrolplane "$RELEASE" --type=merge --patch "$(
                cat <<JSON
              {"spec":{"network":{"certSANs":["${RELEASE}.${NS}.svc","${RELEASE}.${NS}.svc.{{ .dnsDomain }}","${SVC_IP}"]}}}
              JSON
              )"

              KCP_UID=$(kubectl -n "$NS" get kamajicontrolplane "$RELEASE" -o jsonpath='{.metadata.uid}')

              # Apply the TalosConfigTemplate. ownerReference back to the parent
              # KamajiControlPlane makes the standard Kubernetes garbage collector
              # clean it up when the parent cluster is deleted.
              cat <<EOF | kubectl apply -f -
              apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
              kind: TalosConfigTemplate
              metadata:
                name: ${RELEASE}-${GROUP_NAME}
                namespace: ${NS}
                ownerReferences:
                  - apiVersion: controlplane.cluster.x-k8s.io/v1alpha1
                    kind: KamajiControlPlane
                    name: ${RELEASE}
                    uid: ${KCP_UID}
                    controller: true
                    blockOwnerDeletion: true
              spec:
                template:
                  spec:
                    generateType: none
                    talosVersion: "{{ .talosVersion }}"
                    data: |
                      version: v1alpha1
                      persist: true
                      machine:
                        type: worker
                        token: ${TALOS_TOKEN}
                        network:
                          nameservers:
                            - ${COREDNS_IP}
                          searchDomains:
                            - svc.{{ .mgmtClusterDomain }}
                            - {{ .mgmtClusterDomain }}
                            {{- if ne .mgmtClusterDomain "cluster.local" }}
                            - svc.cluster.local
                            - cluster.local
                            {{- end }}
                          extraHostEntries:
                            - ip: ${SVC_IP}
                              aliases:
                                - ${RELEASE}.${NS}.svc
                                - ${RELEASE}.${NS}.svc.{{ .dnsDomain }}
                        ca:
                          crt: ${TALOS_CA_B64}
                        {{- if .group.gpus }}
                        nodeLabels:
                          gpu: "on"
                        {{- end }}
                        kubelet:
                          image: ghcr.io/siderolabs/kubelet:{{ .kubeletVersion }}
                          extraConfig:
                            systemReserved:
                              cpu: "{{ .systemReservedCpu }}"
                              memory: "{{ .systemReservedMemory }}"
                            kubeReserved:
                              cpu: "{{ .kubeReservedCpu }}"
                              memory: "{{ .kubeReservedMemory }}"
                            evictionHard:
                              memory.available: "{{ .evictionHardMemory }}"
                              nodefs.available: "10%"
                              imagefs.available: "15%"
                              nodefs.inodesFree: "5%"
                            evictionSoft:
                              memory.available: "{{ .evictionSoftMemory }}"
                              nodefs.available: "15%"
                              imagefs.available: "20%"
                            evictionSoftGracePeriod:
                              memory.available: "1m30s"
                              nodefs.available: "1m30s"
                              imagefs.available: "1m30s"
                            evictionMinimumReclaim:
                              memory.available: "256Mi"
                        install:
                          disk: /dev/vda
                          image: {{ $.Values.talos.installerRepository | trimSuffix "/" }}/{{ $.Values.talos.schematicID }}:{{ .talosVersion }}
                          wipe: false
                        features:
                          rbac: true
                          kubePrism:
                            enabled: false
                      cluster:
                        id: ${CLUSTER_ID}
                        secret: ${CLUSTER_SECRET}
                        controlPlane:
                          endpoint: https://${RELEASE}.${NS}.svc:6443
                        clusterName: ${RELEASE}
                        network:
                          dnsDomain: {{ .dnsDomain }}
                          podSubnets:
                            - {{ .podCIDR }}
                          serviceSubnets:
                            - {{ .serviceCIDR }}
                        token: ${BOOTSTRAP_TOKEN}
                        ca:
                          crt: ${K8S_CA_B64}
                        discovery:
                          enabled: true
                          registries:
                            kubernetes:
                              disabled: true
                            service:
                              disabled: true
              EOF
              echo "[$(date -u +%H:%M:%S)] TalosConfigTemplate ${RELEASE}-${GROUP_NAME} applied"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
{{- end }}
{{- $kubeletVersion := include "kubernetes.versionMap" $ | trim }}
{{- $talosVersion := $.Values.talos.version }}
{{- $podCIDR := "10.243.0.0/16" }}
{{- $serviceCIDR := "10.95.0.0/16" }}
{{- $dnsDomain := include "kubernetes.tenantClusterDomain" $ }}
{{- $mgmtClusterDomain := (index (.Values._cluster | default dict) "cluster-domain") | default "cozy.local" }}
{{- $group := dict
      "instanceType" .Values.instanceType
      "resources" .Values.resources
      "gpus" .Values.gpus
      "kubelet" .Values.kubelet
}}
{{- /* Mirror the kubelet-reservation computation from nodegroup.yaml so the
       worker machineconfig this Job applies carries the same numbers the
       MachineDeployment validator was happy with. */}}
{{- $instanceType := dict }}
{{- if $group.instanceType }}
{{-   $instanceType = lookup "instancetype.kubevirt.io/v1beta1" "VirtualMachineClusterInstancetype" "" $group.instanceType }}
{{-   $instanceType = $instanceType | default dict }}
{{- end }}
{{- $effectiveMemory := "" }}
{{- if and $group.resources $group.resources.memory }}
{{-   $effectiveMemory = $group.resources.memory | toString }}
{{- else if and $instanceType $instanceType.spec $instanceType.spec.memory $instanceType.spec.memory.guest }}
{{-   $effectiveMemory = $instanceType.spec.memory.guest | toString }}
{{- end }}
{{- $effectiveCpu := "" }}
{{- if and $group.resources $group.resources.cpu }}
{{-   $effectiveCpu = $group.resources.cpu | toString }}
{{- else if and $instanceType $instanceType.spec $instanceType.spec.cpu $instanceType.spec.cpu.guest }}
{{-   $effectiveCpu = $instanceType.spec.cpu.guest | toString }}
{{- end }}
{{- $autoReservedMi := 256 }}
{{- if $effectiveMemory }}
{{-   $effectiveMemMi := divf (include "cozy-lib.resources.toFloat" $effectiveMemory | float64) 1048576.0 | int }}
{{-   $fivePercentMi := mulf ($effectiveMemMi | float64) 0.05 | int }}
{{-   $autoReservedMi = min (max $fivePercentMi 256) 1024 }}
{{- end }}
{{- $autoReservedMillicores := 50 }}
{{- if $effectiveCpu }}
{{-   $effectiveCpuMillicores := include "kubernetes.cpuToMillicores" $effectiveCpu | int }}
{{-   $fivePercentMillis := mulf ($effectiveCpuMillicores | float64) 0.05 | int }}
{{-   $autoReservedMillicores = min (max $fivePercentMillis 50) 500 }}
{{- end }}
{{- $kubeletOverride := $group.kubelet | default dict }}
{{- $systemReservedMemory := $kubeletOverride.systemReservedMemory | default (printf "%dMi" $autoReservedMi) }}
{{- $kubeReservedMemory := $kubeletOverride.kubeReservedMemory | default (printf "%dMi" $autoReservedMi) }}
{{- $systemReservedCpu := $kubeletOverride.systemReservedCpu | default (printf "%dm" $autoReservedMillicores) }}
{{- $kubeReservedCpu := $kubeletOverride.kubeReservedCpu | default (printf "%dm" $autoReservedMillicores) }}
{{- $evictionHardMemory := $kubeletOverride.evictionHardMemory | default "7%" }}
{{- $evictionSoftMemory := $kubeletOverride.evictionSoftMemory | default "10%" }}
{{- $jobContext := deepCopy $ }}
{{- $_ := set $jobContext "group" $group }}
{{- $_ := set $jobContext "groupName" $groupName }}
{{- $_ := set $jobContext "clusterName" $clusterName }}
{{- $_ := set $jobContext "kubeletVersion" $kubeletVersion }}
{{- $_ := set $jobContext "talosVersion" $talosVersion }}
{{- $_ := set $jobContext "podCIDR" $podCIDR }}
{{- $_ := set $jobContext "serviceCIDR" $serviceCIDR }}
{{- $_ := set $jobContext "dnsDomain" $dnsDomain }}
{{- $_ := set $jobContext "mgmtClusterDomain" $mgmtClusterDomain }}
{{- $_ := set $jobContext "systemReservedCpu" $systemReservedCpu }}
{{- $_ := set $jobContext "systemReservedMemory" $systemReservedMemory }}
{{- $_ := set $jobContext "kubeReservedCpu" $kubeReservedCpu }}
{{- $_ := set $jobContext "kubeReservedMemory" $kubeReservedMemory }}
{{- $_ := set $jobContext "evictionHardMemory" $evictionHardMemory }}
{{- $_ := set $jobContext "evictionSoftMemory" $evictionSoftMemory }}
{{- $_ := set $jobContext "kubectlImage" (default ($.Files.Get "images/kubectl.tag" | trim) $.Values.images.kubectl) }}
{{- $jobSpec := include "kubernetes-nodes.talos-reconcile-job-spec" $jobContext }}
{{- $jobHash := $jobSpec | sha256sum | trunc 6 }}
{{- $jobName := printf "%s-talos-reconcile-%s" $.Release.Name $groupName | trunc 56 | trimSuffix "-" }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName }}-{{ $jobHash }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "kubernetes.labels" $ | nindent 4 }}
{{ $jobSpec }}
