cilium:
  kubeProxyReplacement: true
  # Upstream cilium with hostFirewall enabled and the IPv6 datapath disabled
  # (ipv6.enabled=false, the default here) drops ALL node IPv6 before any
  # policy evaluation ("Unsupported L3 protocol", DROP_UNKNOWN_L3 in
  # bpf/bpf_host.c), breaking ICMPv6 Neighbor Discovery and BGP unnumbered on
  # IPv6/L3 fabrics. The cozystack cilium image carries a BPF patch
  # (images/cilium/patches/) that passes IPv6 to the kernel stack instead.
  # Consequence: Cilium host policies apply to IPv4 only; node IPv6 is not
  # filtered by Cilium.
  hostFirewall:
    enabled: true
  hubble:
    enabled: false
  externalIPs:
    enabled: true
  nodePort:
    enabled: true
  loadBalancer:
    algorithm: maglev
    serviceTopology: true
  ipam:
    mode: "kubernetes"
  image:
    repository: ghcr.io/cozystack/cozystack/cilium
    tag: v1.5.0
    digest: "sha256:94dc74c9301f0da5695c80e77b77ee0486ad0086b5be60a94136a2cafd410b73"
  envoy:
    enabled: true
    # Upstream default is {} — no requests/limits. The embedded envoy DaemonSet
    # idles at ~100 MB RAM/node and grows under L7 traffic; without requests
    # the DaemonSet schedules onto any node with no reserved headroom, and
    # without a memory limit a runaway listener could OOM the node.
    # The baseline matches the commented-out example in the upstream Helm values.
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi
  gatewayAPI:
    enabled: true
    # Upstream default is false — Envoy then advertises no ALPN protocols on
    # TLS-terminating Gateway listeners, and browsers (which negotiate HTTP/2
    # exclusively through TLS ALPN "h2") silently fall back to HTTP/1.1 on
    # every request. ingress-nginx, which the Gateway API path replaces,
    # advertised h2 out of the box, so false here is a client-visible
    # regression, not a neutral default. With true, ALPN offers h2 then
    # http/1.1 — clients without HTTP/2 keep negotiating http/1.1 unchanged.
    # This only affects the client↔gateway hop: gateway↔backend stays
    # HTTP/1.1 unless a Service opts in per GEP-1911 via appProtocol
    # kubernetes.io/h2c (enableAlpn also switches that support on; no
    # cozystack-shipped Service declares such a value today).
    # Platform-managed clusters can flip this through the platform chart's
    # gateway.http2 value, which overrides this default either way.
    enableAlpn: true
  rollOutCiliumPods: true
  operator:
    rollOutPods: true
    replicas: 1
