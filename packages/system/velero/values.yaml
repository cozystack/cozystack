velero:
  # Disable the upgrade-crds Job: CRDs ship via the chart's crds/ directory, so
  # the Job is redundant. (The old kubectl-image-compatibility rationale is
  # obsolete in velero 12.x — the Job now runs the velero image natively, not a
  # kubectl one — but it stays disabled because cozystack manages CRDs via crds/.)
  upgradeCRDs: false
  initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.14.1
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - mountPath: /target
          name: plugins
    - image: quay.io/kubevirt/kubevirt-velero-plugin:v0.9.0
      name: kubevirt-kubevirt-velero-plugin
      imagePullPolicy: IfNotPresent
      volumeMounts:
      - mountPath: /target
        name: plugins

  deployNodeAgent: true
  configuration:
    # defaultVolumesToFsBackup: true
    # cozy-default BackupStorageLocation lives in the
    # backupstrategy-controller chart (single source of truth for
    # backupStorage.{endpoint,bucketName,region}); see
    # packages/system/backupstrategy-controller/templates/velero-bsl.yaml.
    backupStorageLocation: null
    volumeSnapshotLocation: null
    namespace: cozy-velero
    features: EnableCSI
    # Increase timeout for item operations to 24 hours to prevent timeouts
    # during backups of very large volumes. The Velero default is 4 hours.
    defaultItemOperationTimeout: 24h
