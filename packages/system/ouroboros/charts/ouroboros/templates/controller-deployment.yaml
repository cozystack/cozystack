{{- if and .Values.controller.enabled (not .Values.etcHosts.enabled) }}
{{- $mode := include "ouroboros.mode" . }}
{{- if and (eq $mode "external-dns") (gt (int .Values.controller.replicaCount) 1) }}
{{- fail (printf "controller.replicaCount=%d is unsafe in external-dns mode: ouroboros has no leader-election, two reconcilers would race on Get->Update against the same DNSEndpoints. Set controller.replicaCount=1 or pick a different mode." (int .Values.controller.replicaCount)) }}
{{- end }}
{{- $proxyService := default (include "ouroboros.proxyFullname" .) .Values.externalDns.proxyService }}
{{- $namespace := include "ouroboros.externalDnsNamespace" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ouroboros.fullname" . }}
  labels:
    {{- include "ouroboros.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  {{- /* The controller has no leader-election in any mode and no serving
         path (no ports, no probes), so surging a second pod during a
         rollout buys no availability anywhere. In external-dns mode it
         actively hurts: that reconciler Updates DNSEndpoints with no
         conflict retry, so two overlapping reconcilers race on
         Get->Update. The coredns paths wrap Get->Update in
         RetryOnConflict and converge instead, which is why only
         external-dns rejects replicaCount > 1 above — that asymmetry is
         deliberate, do not extend the guard to coredns. The default
         maxSurge=25% rounds to 1 on a single replica and keeps the old
         pod fully live and reconciling until the new one reports Ready.

         maxSurge=0 is deliberately NOT claimed to be Recreate-equivalent
         exclusivity: the surge budget counts rs.Spec.Replicas (desired),
         not live pods, so once the old ReplicaSet's desired count hits 0
         the new pod is created even though the old one may still be
         Terminating. rolloutRecreate gates scale-up on oldPodsRunning;
         the rolling path has no equivalent. What maxSurge=0 does
         guarantee is enough here: the old pod is sent SIGTERM at
         scale-down, before the new pod is created, and SIGTERM cancels
         the reconciler context (see signalContext in cmd/ouroboros), so
         the old reconciler has stopped well before the new pod finishes
         starting and syncing its caches. Overlapping *reconcile* is what
         matters, and that window is effectively nil. Nothing is lost by
         the gap either: CoreDNS keeps serving the last written Corefile,
         and the controller reconciles from scratch at startup.

         Rendered for every mode on purpose. While this block was gated
         on external-dns, switching controller.mode on a live release
         mutated spec.strategy, adding type: Recreate on top of the
         rollingUpdate block that the apiserver defaults onto any
         Deployment created without one:
           spec.strategy.rollingUpdate: Forbidden: may not be specified
           when strategy `type` is 'Recreate'
         That rejection fires only under server-side apply, so a
         `helm upgrade` does not reproduce it — DeploymentSpec.Strategy
         carries patchStrategy:"retainKeys", so a client-side strategic
         merge clears rollingUpdate on the way through. Server-side apply
         has no such retainKeys step and the two fields collide; Flux's
         helm-controller applies server-side by default. Rendering the
         same RollingUpdate block in every mode means a mode switch
         changes no strategy field at all, so the combination cannot
         arise on any transition. */}}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "ouroboros.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ouroboros.selectorLabels" . | nindent 8 }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ouroboros.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: controller
          image: {{ include "ouroboros.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - controller
            - --mode={{ $mode }}
            - --resync={{ .Values.controller.resync }}
            - --log-level={{ .Values.controller.logLevel }}
            {{- if .Values.controller.gatewayApi.enabled }}
            - --gateway-api
            {{- end }}
            {{- if .Values.controller.ingressClass }}
            - --ingress-class={{ .Values.controller.ingressClass }}
            {{- end }}
            {{- if .Values.controller.gatewayClass }}
            - --gateway-class={{ .Values.controller.gatewayClass }}
            {{- end }}
            {{- if .Values.controller.clusterDomain }}
            - --cluster-domain={{ .Values.controller.clusterDomain }}
            {{- end }}
            {{- /* --proxy-fqdn vs --proxy-service-name path:
                   when controller.clusterDomain is set the chart bakes the
                   full FQDN at template time (current behaviour, explicit
                   override path). When unset the chart emits --proxy-service-name
                   + --proxy-service-namespace and the controller composes the
                   FQDN at runtime using the cluster-domain auto-detected from
                   /etc/resolv.conf — platform-agnostic default. */}}
            {{- if eq $mode "coredns" }}
            - --coredns-namespace={{ .Values.controller.coredns.namespace }}
            - --coredns-configmap={{ .Values.controller.coredns.configmap }}
            - --coredns-key={{ .Values.controller.coredns.key }}
            {{- if .Values.controller.clusterDomain }}
            - --proxy-fqdn={{ include "ouroboros.proxyFqdn" . }}
            {{- else }}
            - --proxy-service-name={{ include "ouroboros.proxyFullname" . }}
            - --proxy-service-namespace={{ .Release.Namespace }}
            {{- end }}
            {{- end }}
            {{- if eq $mode "coredns-import" }}
            - --coredns-import-namespace={{ .Values.controller.corednsImport.namespace }}
            - --coredns-import-configmap={{ .Values.controller.corednsImport.configmap }}
            - --coredns-import-key={{ .Values.controller.corednsImport.key }}
            {{- if .Values.controller.clusterDomain }}
            - --proxy-fqdn={{ include "ouroboros.proxyFqdn" . }}
            {{- else }}
            - --proxy-service-name={{ include "ouroboros.proxyFullname" . }}
            - --proxy-service-namespace={{ .Release.Namespace }}
            {{- end }}
            {{- end }}
            {{- if eq $mode "external-dns" }}
            - --external-dns-namespace={{ $namespace }}
            - --external-dns-record-ttl={{ .Values.externalDns.recordTTL }}
            - --external-dns-proxy-service={{ $proxyService }}
            - --external-dns-output={{ default "crd" .Values.externalDns.output }}
            {{- /* `default` keeps helm upgrade --reuse-values safe: stored
                   values from a pre-PR release won't carry annotationPrefix,
                   so an empty render would crash the controller in
                   output=service mode (validation requires non-empty + '/' suffix). */}}
            - --external-dns-annotation-prefix={{ default "external-dns.alpha.kubernetes.io/" .Values.externalDns.annotationPrefix }}
            {{- if .Values.externalDns.proxyIP }}
            - --external-dns-proxy-ip={{ .Values.externalDns.proxyIP }}
            {{- end }}
            {{- range $key, $value := .Values.externalDns.annotations }}
            - --external-dns-annotation={{ $key }}={{ $value }}
            {{- end }}
            {{- range $key, $value := .Values.externalDns.labels }}
            - --external-dns-label={{ $key }}={{ $value }}
            {{- end }}
            {{- end }}
          env:
            - name: OUROBOROS_INSTANCE
              value: {{ .Release.Name | quote }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
