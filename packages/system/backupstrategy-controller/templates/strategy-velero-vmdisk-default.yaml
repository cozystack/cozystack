{{- $bucketName := include "backupstrategy-controller.bucketName" . -}}
{{- if and .Values.velero.bslEnabled $bucketName -}}
apiVersion: strategy.backups.cozystack.io/v1alpha1
kind: Velero
metadata:
  name: cozy-default-velero-vmdisk
spec:
  template:
    restoreSpec:
      existingResourcePolicy: update
      includedNamespaces:
        - {{ printf "{{ .Application.metadata.namespace }}" | quote }}
      orLabelSelectors:
        - matchLabels:
            app.kubernetes.io/instance: {{ printf "vm-disk-{{ .Application.metadata.name }}" | quote }}
        - matchLabels:
            apps.cozystack.io/application.kind: {{ printf "{{ .Application.kind }}" | quote }}
            apps.cozystack.io/application.name: {{ printf "{{ .Application.metadata.name }}" | quote }}
      includedResources:
        - helmreleases.helm.toolkit.fluxcd.io
        - persistentvolumeclaims
        - configmaps
      includeClusterResources: false
    spec:
      includedNamespaces:
        - {{ printf "{{ .Application.metadata.namespace }}" | quote }}
      orLabelSelectors:
        - matchLabels:
            app.kubernetes.io/instance: {{ printf "vm-disk-{{ .Application.metadata.name }}" | quote }}
        - matchLabels:
            apps.cozystack.io/application.kind: {{ printf "{{ .Application.kind }}" | quote }}
            apps.cozystack.io/application.name: {{ printf "{{ .Application.metadata.name }}" | quote }}
      includedResources:
        - helmreleases.helm.toolkit.fluxcd.io
        - persistentvolumeclaims
        - configmaps
      includeClusterResources: false
      storageLocation: cozy-default
      snapshotVolumes: true
      snapshotMoveData: true
      ttl: 720h0m0s
      itemOperationTimeout: 24h0m0s
{{- end -}}
