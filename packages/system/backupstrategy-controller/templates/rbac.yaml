kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: backups.cozystack.io:strategy-controller
rules:
# Strategy types (Velero, Job)
- apiGroups: ["strategy.backups.cozystack.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
# BackupClass: resolve strategy per application
- apiGroups: ["backups.cozystack.io"]
  resources: ["backupclasses"]
  verbs: ["get", "list", "watch"]
# BackupJob / RestoreJob: reconcile; update for RestoreJob finalizers
- apiGroups: ["backups.cozystack.io"]
  resources: ["backupjobs", "restorejobs"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["backups.cozystack.io"]
  resources: ["backupjobs/status", "restorejobs/status"]
  verbs: ["get", "update", "patch"]
# Backup: create after Velero job completes; update/patch for BackupReconciler finalizers
- apiGroups: ["backups.cozystack.io"]
  resources: ["backups"]
  verbs: ["create", "get", "list", "watch", "update", "patch"]
# Pods: BackupJob lists virt-launcher pods by label (manager cache uses cluster-scoped list/watch)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# ConfigMaps: controller-runtime cache requires cluster-scoped list/watch;
# create/update/delete is scoped to cozy-velero via a Role shipped by the
# velero chart (packages/system/velero/templates/backupstrategy-controller-rbac.yaml)
# so it is only created when velero is installed.
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
# Application refs (e.g. VMInstance) for backup/restore scope
- apiGroups: ["apps.cozystack.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
# CNPG restore patches the Postgres app spec (.spec.bootstrap, .spec.backup)
# so the chart re-renders the cnpg.io Cluster with bootstrap.recovery.
- apiGroups: ["apps.cozystack.io"]
  resources: ["postgreses"]
  verbs: ["patch", "update"]
# KubeVirt: pre-restore halts VMs and checks VMI shutdown
- apiGroups: ["kubevirt.io"]
  resources: ["virtualmachines"]
  verbs: ["get", "update"]
- apiGroups: ["kubevirt.io"]
  resources: ["virtualmachineinstances"]
  verbs: ["get"]
# CDI DataVolumes: pre-restore deletes DVs so CDI doesn't recreate PVCs after rename
- apiGroups: ["cdi.kubevirt.io"]
  resources: ["datavolumes"]
  verbs: ["delete"]
# HelmReleases: pre-restore suspends HRs; post-restore rename creates new HR and deletes old
- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources: ["helmreleases"]
  verbs: ["get", "create", "update", "delete"]
# PVCs and PVs: pre-restore renames PVCs (delete old, create new) and patches PV reclaim policy
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["get", "list", "watch", "update"]
# Velero Backup/Restore/DataUpload in cozy-velero namespace (DataUpload: enrich BackupJob failure messages)
- apiGroups: ["velero.io"]
  resources: ["backups", "restores", "datauploads"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete", "deletecollection"]
# Velero DeleteBackupRequest: used by BackupReconciler to delete Velero backups with their storage data
- apiGroups: ["velero.io"]
  resources: ["deletebackuprequests"]
  verbs: ["create", "get", "list", "watch"]
# Namespaces: validate target namespace exists for cross-namespace restore
# controller-runtime cache requires list/watch for any resource accessed via r.Get()
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
# Events from Recorder.Event() calls
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# Leader election (--leader-elect)
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
# CNPG strategy: SSA-patch the live Cluster (spec.plugins referencing the
# barman-cloud plugin), create one-shot Backup CRs, observe their status, and
# clean them up on RestoreJob purge.
- apiGroups: ["postgresql.cnpg.io"]
  resources: ["clusters"]
  verbs: ["get", "list", "watch", "patch", "delete"]
- apiGroups: ["postgresql.cnpg.io"]
  resources: ["backups"]
  verbs: ["get", "list", "watch", "create", "patch", "delete"]
# barman-cloud plugin ObjectStore CRs: the CNPG driver SSA-applies one per
# platform-managed Cluster to carry the S3/barman configuration that native
# spec.backup.barmanObjectStore used to hold (deprecated in CNPG 1.27, removed
# in 1.29). The driver owner-references each ObjectStore to its Cluster, so
# Kubernetes garbage-collects it when the Cluster is deleted (app teardown or
# the RestoreJob purge) — the driver never deletes it itself, hence no delete verb.
- apiGroups: ["barmancloud.cnpg.io"]
  resources: ["objectstores"]
  verbs: ["get", "list", "watch", "create", "patch", "update"]
# Secrets: the BackupJob/RestoreJob reconcilers project the platform-managed
# S3 credentials Secret from the backupStorage.namespace (tenant-root by
# default) into each tenant namespace as cozy-backups-creds. The verbs are
# cluster-scoped because the
# target namespace varies per BackupJob. Only Get + Create/Update/Patch
# are needed — the projector does no listing or watching. Trimming list +
# watch keeps the cluster-wide Secret read blast-radius minimal.
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch"]
# Altinity strategy: drives clickhouse-backup as a one-shot batch/v1.Job
# per BackupJob / RestoreJob. The controller renders the strategy
# PodTemplateSpec into a Job in the application namespace and watches the
# Job's terminal condition (Complete/Failed) to drive Cozystack Backup /
# RestoreJob status transitions.
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete"]
# MariaDB strategy: read the operator-side MariaDB CR to surface "not yet
# rendered" preconditions, create one-shot k8s.mariadb.com/Backup CRs on
# the BackupJob path, and create k8s.mariadb.com/Restore CRs on the
# RestoreJob path. The driver only ever Creates/Lists/Gets these objects -
# it does not patch or delete them; their lifecycle is owned by
# mariadb-operator and (for cleanup) by tenants / explicit teardown flows,
# never by this controller.
- apiGroups: ["k8s.mariadb.com"]
  resources: ["mariadbs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["k8s.mariadb.com"]
  resources: ["backups", "restores"]
  verbs: ["get", "list", "watch", "create"]
# FoundationDB strategy: read the operator-side FoundationDBCluster CR to
# surface "not yet rendered" preconditions, create per-BackupJob
# FoundationDBBackup CRs and per-RestoreJob FoundationDBRestore CRs.
# Patch is required so the driver can flip backupState=Stopped on a prior
# BackupJob's FoundationDBBackup before starting a new one - the operator
# only permits one running backup directory per cluster.
- apiGroups: ["apps.foundationdb.org"]
  resources: ["foundationdbclusters"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps.foundationdb.org"]
  resources: ["foundationdbbackups"]
  verbs: ["get", "list", "watch", "create", "patch"]
- apiGroups: ["apps.foundationdb.org"]
  resources: ["foundationdbrestores"]
  verbs: ["get", "list", "watch", "create"]
# Etcd strategy: read the operator-side EtcdCluster CR (existence +
# Available gate before snapshotting; live spec on the restore path) and
# create per-BackupJob etcd-operator.cozystack.io/EtcdSnapshot CRs. Restore
# is in-place only: the driver deletes the chart-rendered EtcdCluster, then
# creates a new one with spec.bootstrap.restore.source populated from the
# artifact - so delete + create on etcdclusters are both required. The PVCs
# the operator generates for member volumes get listed (etcdClusterFullyGone
# gate) but never directly mutated; cleanup is owned by the operator's
# finalizers + the EtcdCluster ownerRef cascade.
- apiGroups: ["etcd-operator.cozystack.io"]
  resources: ["etcdclusters"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: ["etcd-operator.cozystack.io"]
  resources: ["etcdsnapshots"]
  verbs: ["get", "list", "watch", "create"]
