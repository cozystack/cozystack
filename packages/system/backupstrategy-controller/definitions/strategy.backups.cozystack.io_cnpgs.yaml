---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: cnpgs.strategy.backups.cozystack.io
spec:
  group: strategy.backups.cozystack.io
  names:
    kind: CNPG
    listKind: CNPGList
    plural: cnpgs
    singular: cnpg
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          CNPG defines a backup strategy that delegates execution to the
          CloudNativePG operator (postgresql.cnpg.io). The strategy carries a
          templated barmanObjectStore configuration that the driver injects into
          the live cnpg.io Cluster of the application; backup runs are produced as
          postgresql.cnpg.io/Backup objects and surfaced as Cozystack Backup
          artifacts.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CNPGSpec specifies the desired CloudNativePG-driven backup
              strategy.
            properties:
              template:
                description: |-
                  Template carries the templated barmanObjectStore configuration applied
                  to the live cnpg.io Cluster. String fields support Helm-style Go
                  templating with two top-level values:
                    .Application - the application object (apps.cozystack.io)
                    .Parameters  - the parameters from the matched BackupClassStrategy
                properties:
                  barmanObjectStore:
                    description: |-
                      BarmanObjectStore is the templated CloudNativePG barmanObjectStore
                      configuration. Field semantics mirror
                      postgresql.cnpg.io/v1.BarmanObjectStoreConfiguration.
                    properties:
                      data:
                        description: Data carries optional Barman base-backup settings.
                        properties:
                          compression:
                            description: Compression algorithm for base backups.
                            type: string
                          encryption:
                            description: Encryption algorithm for base backups.
                            type: string
                          jobs:
                            description: Jobs controls the number of parallel jobs
                              to use during backup.
                            format: int32
                            type: integer
                        type: object
                      destinationPath:
                        description: |-
                          DestinationPath is the S3 (or compatible) destination URI, for example
                          "s3://my-bucket/path/". Templating is supported.
                        minLength: 1
                        type: string
                      endpointCA:
                        description: |-
                          EndpointCA references a Secret/ConfigMap key carrying a CA bundle the
                          Barman client should trust when reaching a self-signed S3 endpoint
                          (e.g. cozystack's seaweedfs-s3, which is TLS-only with a per-cluster
                          internal CA). Templating is supported on Name and Key. When omitted,
                          Barman uses the system trust store.
                        properties:
                          key:
                            description: |-
                              Key is the key within the Secret containing the PEM-encoded CA bundle.
                              Defaults to "ca.crt".
                            type: string
                          secretRef:
                            description: |-
                              SecretRef is a reference to the Secret in the application's namespace.
                              Templating is supported on the Name field.
                            properties:
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                            type: object
                            x-kubernetes-map-type: atomic
                        required:
                        - secretRef
                        type: object
                      endpointURL:
                        description: EndpointURL is the S3 endpoint URL. Templating
                          is supported.
                        type: string
                      retentionPolicy:
                        description: RetentionPolicy is a Barman retention policy
                          expression (e.g. "30d").
                        type: string
                      s3Credentials:
                        description: |-
                          S3Credentials references a Secret that holds the S3 access keys. The
                          Secret must live in the application's namespace. Templating is
                          supported on Name and key fields.
                        properties:
                          accessKeyIDKey:
                            description: |-
                              AccessKeyIDKey is the key within the Secret holding the access key ID.
                              Defaults to AWS_ACCESS_KEY_ID.
                            type: string
                          secretAccessKeyKey:
                            description: |-
                              SecretAccessKeyKey is the key within the Secret holding the secret access key.
                              Defaults to AWS_SECRET_ACCESS_KEY.
                            type: string
                          secretRef:
                            description: |-
                              SecretRef is a reference to the Secret in the application's namespace
                              that holds the credentials.
                            properties:
                              name:
                                default: ""
                                description: |-
                                  Name of the referent.
                                  This field is effectively required, but due to backwards compatibility is
                                  allowed to be empty. Instances of this type with an empty value here are
                                  almost certainly wrong.
                                  More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                type: string
                            type: object
                            x-kubernetes-map-type: atomic
                        required:
                        - secretRef
                        type: object
                      wal:
                        description: Wal carries optional Barman WAL settings.
                        properties:
                          compression:
                            description: Compression algorithm for WAL files (e.g.
                              "gzip", "bzip2", "snappy").
                            type: string
                          encryption:
                            description: Encryption algorithm for WAL files.
                            type: string
                        type: object
                    required:
                    - destinationPath
                    type: object
                  serverName:
                    description: |-
                      ServerName overrides the Barman server name used as the storage path
                      prefix. When empty, the driver defaults it to the application name.
                      Templating is supported.
                    type: string
                required:
                - barmanObjectStore
                type: object
            required:
            - template
            type: object
          status:
            description: |-
              CNPGStatus reports observed state for the strategy CR. Driver controllers
              surface diagnostic conditions here (e.g. validation issues).
            properties:
              conditions:
                description: Conditions holds the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
