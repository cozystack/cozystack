{{- /*
  Post-install/post-upgrade Job — waits for cert-manager to make the
  Certificate Ready, then rolls the admission-controller Deployment so
  its pods pick up the current TLS Secret content and re-register the
  MutatingWebhookConfiguration with the current caBundle.

  Why this is needed:
    The admission-controller reads its TLS material once at process
    startup (`--tls-cert-file` / `--tls-private-key`); it does not
    watch the Secret. The MutatingWebhookConfiguration `vpa-webhook-config`
    is (re-)registered by the pod itself via `--register-webhook=true`
    at startup, so its `caBundle` also lives only as long as the pod
    that wrote it. Under the cert-manager path the Secret content is
    now written by cert-manager rather than by Helm — nothing else in
    the chart triggers a Deployment rollout when that happens (the old
    `checksum/tls-secret` annotation is gone precisely because it was
    the ReplicaSet-churn amplifier this whole change targets).

    Without a controlled rollout, an in-place upgrade of an existing
    cluster ends up in this inconsistent state:
      * cert-manager rewrote the Secret with a NEW CA + NEW cert
        (issuer changed from ephemeral in-chart CA to selfSigned Issuer,
        so the adopted content is regenerated).
      * The admission-controller pod is still running with the OLD
        cert in memory and has last registered MWC.caBundle with the
        OLD CA.
    That's actually consistent (old pod ↔ old MWC) and safe until the
    next unrelated Deployment rollout happens. But we don't want to
    leave the tenant apiserver trusting a caBundle that no longer
    corresponds to the Secret on disk — a node reboot, a preemption,
    a manual kubectl rollout, or the next Certificate renewal would
    flip half of the trust chain at random.

    This Job resolves the transition deterministically: after Helm
    has applied the new Certificate, wait until cert-manager reports
    the Certificate Ready, then force a rollout. The admission-
    controller comes back up reading the new Secret and re-registers
    MWC.caBundle with the new CA — the whole chain flips atomically
    from the operator's perspective.

  Downtime:
    The VPA MutatingWebhookConfiguration ships with `failurePolicy:
    Ignore` (verified on cozy-dev3 — `webhooks[*].failurePolicy=Ignore`).
    During the rolling restart of the single admission-controller pod
    (`replicaCount: 1`, `strategy.rollingUpdate` default) there is a
    <60s window where either the old pod is terminating or the new
    pod is starting; in that window the apiserver's webhook call may
    time out and — because failurePolicy is Ignore — pod admission
    just proceeds without VPA resource-mutation. No cluster-wide
    request rejection.

  Idempotency:
    * Certificate not yet created (first-ever install where the parent
      chart resource apply beat the hook by a tick) → `kubectl wait`
      polls; on timeout the Job fails and Helm rolls back.
    * Deployment not yet created (chart disabled admission-controller
      after previously enabling it) → detect and no-op.
    * Repeat invocations after successful completion — the rollout
      restart uses a fresh annotation timestamp, so each run does one
      genuine rollout. Helm will only invoke the hook once per
      upgrade, so this stays a single rollout per release.

  Failure mode:
    Certificate stuck (Issuer misconfigured, cert-manager overloaded):
      `kubectl wait` times out at 3m, Job fails, Helm marks upgrade
      failed. Operator can `helm rollback` — the previous release's
      manifest still owns the Deployment, so the pre-upgrade migration
      hook's effect (stripped Secret ownership) is the only artefact
      left, and it is safe to leave in place (cert-manager will
      eventually adopt on next retry).
*/}}
{{- if and .Values.admissionController.enabled .Values.admissionController.tls.certManagerEnabled (not .Values.admissionController.tls.existingSecret) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-rollout
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    {{- include "vertical-pod-autoscaler.admissionController.labels" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "9"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-rollout
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    {{- include "vertical-pod-autoscaler.admissionController.labels" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "9"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    resourceNames: [{{ printf "%s-tls" (include "vertical-pod-autoscaler.admissionController.fullname" .) | quote }}]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: [{{ include "vertical-pod-autoscaler.admissionController.fullname" . | quote }}]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    resourceNames: [{{ include "vertical-pod-autoscaler.admissionController.fullname" . | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-rollout
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    {{- include "vertical-pod-autoscaler.admissionController.labels" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "9"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-rollout
subjects:
  - kind: ServiceAccount
    name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-rollout
    namespace: {{ include "common.names.namespace" . | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-rollout
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    {{- include "vertical-pod-autoscaler.admissionController.labels" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "vertical-pod-autoscaler.admissionController.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-rollout
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubectl
          image: docker.io/clastix/kubectl:v1.32
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          command:
            - sh
            - -euc
            - |
              ns={{ include "common.names.namespace" . | quote }}
              # Certificate name is <fullname>-tls (see certificate.yaml).
              # Do NOT drop the -tls suffix — the previous iteration did that
              # and hit a 3m NotFound timeout every rollout, exhausting
              # backoffLimit and failing the post-upgrade hook.
              cert={{ printf "%s-tls" (include "vertical-pod-autoscaler.admissionController.fullname" .) | quote }}
              deploy={{ include "vertical-pod-autoscaler.admissionController.fullname" . | quote }}

              # Wait until cert-manager has issued the certificate. On the first
              # install this races the Helm apply (Certificate resource may
              # only exist a few seconds when this Job starts); on upgrades the
              # Certificate already exists and cert-manager rewrites the Secret
              # very quickly. 3-minute budget accommodates a busy cert-manager
              # under simultaneous fresh-install load without letting a truly
              # stuck Issuer hold the whole HelmRelease reconcile.
              echo "[tls-rollout] waiting for certificate/$cert to become Ready"
              kubectl -n "$ns" wait "certificate.cert-manager.io/$cert" \
                --for=condition=Ready --timeout=3m

              # If the admission-controller Deployment somehow does not exist
              # yet (parent chart still applying), Helm will requeue the hook
              # on retry; a hook that requires the Deployment to succeed can
              # deadlock the release. Guard on presence explicitly.
              if ! kubectl -n "$ns" get "deployment.apps/$deploy" -o name >/dev/null 2>&1; then
                echo "[tls-rollout] deployment.apps/$deploy not present — nothing to roll"
                exit 0
              fi

              echo "[tls-rollout] rolling deployment.apps/$deploy so pods pick up the current TLS Secret + re-register the MutatingWebhookConfiguration"
              kubectl -n "$ns" rollout restart "deployment.apps/$deploy"
              kubectl -n "$ns" rollout status  "deployment.apps/$deploy" --timeout=3m
              echo "[tls-rollout] rollout complete"
{{- end }}
