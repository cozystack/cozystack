{{- /*
  Pre-upgrade migration Job — hands ownership of the admission-controller
  TLS Secret from Helm/Flux to cert-manager, so cert-manager's Certificate
  (see certificate.yaml) can adopt the existing Secret in place instead of
  racing Helm's garbage collector.

  Why this is needed:
    Existing clusters were installed with an earlier chart version that
    rendered the Secret directly via `tls-secret.yaml` (genCA path). The
    Secret therefore carries these ownership labels/annotations:
      labels:
        app.kubernetes.io/managed-by: Helm
        helm.toolkit.fluxcd.io/name: vertical-pod-autoscaler
        helm.toolkit.fluxcd.io/namespace: cozy-vertical-pod-autoscaler
      annotations:
        meta.helm.sh/release-name: vertical-pod-autoscaler
        meta.helm.sh/release-namespace: cozy-vertical-pod-autoscaler
    On upgrade to a chart that no longer renders `tls-secret.yaml` (because
    `certManagerEnabled: true`), Helm's release manifest diff shows the
    Secret as "gone from templates" and Helm garbage-collects it. If
    cert-manager hasn't yet reconciled its Certificate at that moment,
    admission-controller pods lose their TLS mount and CrashLoop until
    cert-manager catches up — the exact churn this migration is meant
    to end.
    Additionally, Flux HelmController runs its own prune against
    resources labelled `helm.toolkit.fluxcd.io/*` — that prune also
    deletes the Secret once it disappears from the release manifest.

  What this Job does:
    Runs as `helm.sh/hook: pre-upgrade` with the lowest weight (`-10`) so
    it executes BEFORE Helm computes the resource diff for the upgrade.
    Idempotently strips both Helm and Flux ownership from the Secret,
    leaving it as an orphaned object in the namespace. cert-manager's
    Certificate then adopts it on next reconcile and rewrites its content
    with a certificate issued by the new selfSigned Issuer.

  Idempotency:
    * If the Secret does not exist (fresh install) — no-op, exit 0.
    * If the Secret has `admissionController.tls.existingSecret` set —
      this template is not rendered at all (see outer `if` guard).
    * If the Secret already carries the cert-manager adoption label
      `controller.cert-manager.io/fao=true` — migration is already
      complete, no-op.
    * Otherwise, strip Helm/Flux ownership. The kubectl commands
      themselves are idempotent (label/annotation removal is a no-op if
      already absent).

  Failure mode:
    If the Job fails (RBAC denied, kubectl not found, apiserver blip),
    Helm aborts the upgrade — the release stays on the prior chart
    version, the Secret still Helm-owned, and the cluster continues
    running the legacy genCA path. No partial migration.
*/}}
{{- if and .Values.admissionController.enabled .Values.admissionController.tls.certManagerEnabled (not .Values.admissionController.tls.existingSecret) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-migrator
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    {{- include "vertical-pod-autoscaler.admissionController.labels" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-11"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-migrator
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    {{- include "vertical-pod-autoscaler.admissionController.labels" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-11"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ include "vertical-pod-autoscaler.admissionController.tls.secretName" . | quote }}]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-migrator
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    {{- include "vertical-pod-autoscaler.admissionController.labels" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-11"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-migrator
subjects:
  - kind: ServiceAccount
    name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-migrator
    namespace: {{ include "common.names.namespace" . | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-migrator
  namespace: {{ include "common.names.namespace" . | quote }}
  labels:
    {{- include "vertical-pod-autoscaler.admissionController.labels" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
    {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "vertical-pod-autoscaler.admissionController.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vertical-pod-autoscaler.admissionController.fullname" . }}-tls-migrator
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubectl
          image: docker.io/clastix/kubectl:v1.32
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          command:
            - sh
            - -euc
            - |
              ns={{ include "common.names.namespace" . | quote }}
              secret={{ include "vertical-pod-autoscaler.admissionController.tls.secretName" . | quote }}

              # Fresh install — Secret does not exist yet, nothing to migrate.
              if ! kubectl -n "$ns" get secret "$secret" -o name >/dev/null 2>&1; then
                echo "[tls-migrator] secret/$secret not present in namespace/$ns — fresh install, no-op"
                exit 0
              fi

              # Already migrated — cert-manager has adopted this Secret.
              # `controller.cert-manager.io/fao=true` is the label
              # cert-manager writes on Secrets it owns via a Certificate.
              owner=$(kubectl -n "$ns" get secret "$secret" -o jsonpath='{.metadata.labels.controller\.cert-manager\.io/fao}' 2>/dev/null || true)
              if [ "$owner" = "true" ]; then
                echo "[tls-migrator] secret/$secret already carries cert-manager adoption label — no-op"
                exit 0
              fi

              # Strip Helm ownership.
              kubectl -n "$ns" annotate secret "$secret" \
                meta.helm.sh/release-name- \
                meta.helm.sh/release-namespace- \
                --overwrite
              kubectl -n "$ns" label secret "$secret" \
                app.kubernetes.io/managed-by- \
                --overwrite

              # Strip Flux HelmRelease ownership so Flux prune does not
              # delete the Secret once it disappears from the release
              # manifest.
              kubectl -n "$ns" label secret "$secret" \
                helm.toolkit.fluxcd.io/name- \
                helm.toolkit.fluxcd.io/namespace- \
                --overwrite

              echo "[tls-migrator] secret/$secret ownership stripped, cert-manager will adopt on next Certificate reconcile"
{{- end }}
