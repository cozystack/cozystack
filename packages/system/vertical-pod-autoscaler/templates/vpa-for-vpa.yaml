{{- if .Values.vpaForVPA }}
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    cozystack.io/system: "true"
  name: cozy-vpa-for-vpa
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    cozystack.io/repository: system
    cozystack.io/system-app: "true"
  name: vpa-for-vpa
  namespace: cozy-vpa-for-vpa
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-vertical-pod-autoscaler-default-vpa-for-vpa
    namespace: cozy-system
  # Do NOT add dependsOn: monitoring-agents — it creates a circular wait:
  # helm install of the parent vertical-pod-autoscaler HR waits for this nested
  # HR's Ready condition; this HR waits for monitoring-agents; monitoring-agents
  # PackageSource waits for cozystack.vertical-pod-autoscaler Ready; that waits
  # for the parent HR. The recommender's /health-check probe is served by the
  # binary itself and doesn't require Prometheus, so the pod becomes Ready
  # immediately and starts producing recommendations when monitoring-agents
  # finishes installing later.
  install:
    crds: Skip
    remediation:
      retries: -1
  interval: 5m
  releaseName: vertical-pod-autoscaler
  upgrade:
    crds: Skip
    remediation:
      retries: -1
  values:
    vpaForVPA: false
    vertical-pod-autoscaler:
      nameOverride: vpa-for-vpa
      fullnameOverride: vpa-for-vpa
      admissionController:
        enabled: false
      recommender:
        extraArgs:
          vpa-object-namespace: {{ .Release.Namespace }}
          recommender-name: vpa-for-vpa
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 512Mi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-for-vpa
  namespace: {{ .Release.Namespace }}
spec:
  recommenders:
  - name: vpa-for-vpa
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ dig "vertical-pod-autoscaler" "nameOverride" "" .Values.AsMap | default "vertical-pod-autoscaler" | trunc 63 | trimSuffix "-" }}-recommender
  updatePolicy:
    # Initial (not Recreate): size at pod creation without ever evicting.
    # Recreate here evicts the VPA recommender during install, adding pod churn
    # on an already busy cluster. Matches the monitoring/etcd VPA->Initial fixes.
    updateMode: Initial
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-for-vpa
  namespace: cozy-vpa-for-vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vpa-for-vpa-recommender
  updatePolicy:
    updateMode: Initial
{{- end }}
