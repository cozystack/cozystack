apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: ControlPlaneProvider
metadata:
  name: kamaji
spec:
  # https://github.com/clastix/cluster-api-control-plane-provider-kamaji
  # TODO: pin to a tagged release SHA once upstream cuts v0.20.0 (this is
  #       master HEAD because the AdditionalServicePorts feature is not in
  #       v0.19.0 yet). Bump `version` to match `images/.../Dockerfile`'s
  #       ARG COMMIT and rerun `make update` to refresh the bundled manifests.
  version: master-e52ee00
  fetchConfig:
    selector:
      matchLabels:
        cp-components: cozy
  deployment:
    containers:
    - name: manager
      resources:
        limits:
          cpu: "1"
          memory: 1024Mi
        requests:
          cpu: "10m"
          memory: 128Mi
