apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: ControlPlaneProvider
metadata:
  name: kamaji
spec:
  # https://github.com/clastix/cluster-api-control-plane-provider-kamaji
  # Pinned to v0.19.0 + a single backport patch
  # (images/cluster-api-control-plane-provider-kamaji/patches/) because
  # upstream master ships v1alpha2 only with no v1alpha1 conversion
  # webhook. Bump along with UPSTREAM_VERSION / COZYSTACK_REV in the
  # package Makefile.
  version: v0.19.0-cozystack.0
  fetchConfig:
    selector:
      matchLabels:
        cp-components: cozy
  deployment:
    containers:
    - name: manager
      resources:
        limits:
          cpu: "1"
          memory: 1024Mi
        requests:
          cpu: "10m"
          memory: 128Mi
