apiVersion: v1
kind: ConfigMap
metadata:
  # Must match spec.version in templates/providers.yaml so the
  # ControlPlaneProvider operator selects this components bundle.
  name: v0.19.0-cozystack.0
  labels:
    cp-components: cozy
  annotations:
    provider.cluster.x-k8s.io/compressed: "true"
binaryData:
  components: {{ .Files.Get "files/components.gz" | b64enc | quote }}
data:
  metadata: {{ .Files.Get "files/metadata.yaml" | quote }}
