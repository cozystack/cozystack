apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: autoscaling.cozystack.io:db-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: autoscaling.cozystack.io:db-autoscaler
subjects:
- kind: ServiceAccount
  name: db-autoscaler
  namespace: {{ .Release.Namespace }}
---
# Allow the secure metrics endpoint to authenticate/authorize scrapers via
# TokenReview / SubjectAccessReview (controller-runtime WithAuthnAndAuthz).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: autoscaling.cozystack.io:db-autoscaler:auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: db-autoscaler
  namespace: {{ .Release.Namespace }}
