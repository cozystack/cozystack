{{- if .Values.dbAutoscaler.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: db-autoscaler-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: db-autoscaler
spec:
  selector:
    app: db-autoscaler
  ports:
  - name: metrics
    port: {{ splitList ":" .Values.dbAutoscaler.metrics.bindAddress | mustLast }}
    targetPort: metrics
    protocol: TCP
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: db-autoscaler
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: db-autoscaler
  endpoints:
  - port: metrics
    scheme: https
    # Verify the metrics server's cert-manager serving cert instead of skipping
    # verification: the CA is read from the same secret the server presents, and
    # serverName matches a SAN on that cert (the pod is reached by IP, but TLS
    # verification uses serverName, so no metrics-service DNS name is needed).
    tlsConfig:
      ca:
        secret:
          name: db-autoscaler-cert
          key: ca.crt
      serverName: db-autoscaler.{{ .Release.Namespace }}.svc
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
{{- end }}
