                      - ReadCPUUtilization
                      type: string
                  required:
                  - target
                  - type
                  type: object
                minItems: 1
                type: array
              minReplicas:
                description: |-
                  MinReplicas is the minimum TOTAL instance count (primary + standbys). Must be
                  >= 2 so at least one read-serving replica exists.
                format: int32
                minimum: 2
                type: integer
              targetRef:
                description: TargetRef is the managed database Application to scale.
                properties:
                  apiGroup:
                    default: apps.cozystack.io
                    description: APIGroup of the target. Defaults to apps.cozystack.io.
                    type: string
                  kind:
                    description: Kind of the target Application (e.g. Postgres).
                    type: string
                  name:
                    description: Name of the target Application in the same namespace
