                minimum: 2
                type: integer
              metrics:
                description: |-
                  Metrics drive the scaling decision. When several are set the desired count is
                  the maximum of the per-metric desired counts (HPA semantics).
                items:
                  description: MetricSpec selects one driver metric and its target.
                  properties:
