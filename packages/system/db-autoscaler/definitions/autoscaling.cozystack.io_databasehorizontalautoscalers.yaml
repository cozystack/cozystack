                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentMetrics:
                description: CurrentMetrics is the last observed value of each driver
                  metric.
                items:
                  description: MetricStatus is the last observed value of a driver
                    metric.
                  properties:
                    averageValue:
                      anyOf:
                      - type: integer
                      - type: string
                      description: AverageValue observed per read-serving replica.
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    type:
                      description: Type of the driver metric.
                      enum:
                      - ReadConnections
                      - ReadCPUUtilization
                      type: string
                  required:
                  - averageValue
                  - type
                  type: object
                type: array
              currentReplicas:
                description: CurrentReplicas is the total instance count last observed
                  on the target.
                format: int32
                type: integer
              desiredReplicas:
                description: DesiredReplicas is the total instance count the autoscaler
                  computed.
                format: int32
                type: integer
              lastConvergedReplicas:
                description: LastConvergedReplicas is the last count that reached
                  availableReplicas == replicas.
                format: int32
                type: integer
              lastScaleTime:
                description: LastScaleTime is when the autoscaler last patched the
                  target.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation the status
                  reflects.
                format: int64
                type: integer
