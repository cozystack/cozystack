              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DatabaseHorizontalAutoscalerSpec defines the desired state.
            properties:
              behavior:
                description: Behavior tunes scaling dynamics.
                properties:
                  convergenceDeadlineSeconds:
                    description: |-
                      ConvergenceDeadlineSeconds bounds how long a patched scale may take to
                      converge (availableReplicas == replicas) before the operator surfaces
                      StuckScaling and rolls back to lastConvergedReplicas.
                    format: int32
                    minimum: 1
                    type: integer
                  scaleDown:
                    description: ScaleDown rules (typically a longer stabilization
                      window than ScaleUp).
                    properties:
                      stabilizationWindowSeconds:
                        description: StabilizationWindowSeconds is how long the signal
                          must hold before acting.
                        format: int32
                        minimum: 0
                        type: integer
                      step:
                        description: |-
                          Step is the maximum number of replicas changed in a single decision.
                          The quorum floor overrides this limit (a safe quorum is never rate-limited).
                        format: int32
                        minimum: 1
                        type: integer
                    type: object
                  scaleUp:
                    description: ScaleUp rules.
                    properties:
                      stabilizationWindowSeconds:
                        description: StabilizationWindowSeconds is how long the signal
                          must hold before acting.
                        format: int32
                        minimum: 0
                        type: integer
                      step:
                        description: |-
                          Step is the maximum number of replicas changed in a single decision.
                          The quorum floor overrides this limit (a safe quorum is never rate-limited).
                        format: int32
                        minimum: 1
                        type: integer
                    type: object
                type: object
              constraints:
                description: Constraints are the safety knobs.
                properties:
                  gracefulScaleDown:
                    default: true
                    description: |-
                      GracefulScaleDown leaves backend termination to the engine operator; the
                      DHA never terminates backends itself.
                    type: boolean
                  maxReplicationLagSeconds:
                    description: |-
                      MaxReplicationLagSeconds is the lag threshold above which scaling is braked
                      (only while the primary is actively writing).
                    format: int32
                    minimum: 0
                    type: integer
                  respectQuorum:
                    default: true
                    description: RespectQuorum keeps the desired count at or above
