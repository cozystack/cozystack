apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-db
spec:
  instances: 2
  {{- $existingCluster := lookup "postgresql.cnpg.io/v1" "Cluster" .Release.Namespace "keycloak-db" }}
  {{- $image := dig "spec" "imageName" "ghcr.io/cloudnative-pg/postgresql:17.7-standard-trixie" $existingCluster }}
  imageName: {{ if regexMatch ":17\\." $image }}ghcr.io/cloudnative-pg/postgresql:17.7-standard-trixie{{ else if regexMatch ":[0-9]+\\.[0-9]+$" $image }}{{ printf "%s-standard-trixie" $image }}{{ else }}{{ $image }}{{ end }}
  storage:
    size: 20Gi
  {{- if .Values._cluster.scheduling }}
  {{- $rawConstraints := get .Values._cluster.scheduling "globalAppTopologySpreadConstraints" }}
  {{- if $rawConstraints }}
  {{- $rawConstraints | fromYaml | toYaml | nindent 2 }}
    labelSelector:
      matchLabels:
        cnpg.io/cluster: keycloak-db
  {{- end }}
  {{- end }}
  {{- $credSecret := .Values.backup.existingSecretName | default "keycloak-db-backup-s3-creds" }}
  {{- if and .Values.backup.enabled .Values.backup.destinationPath }}
  # Barman Cloud plugin. The S3/barman settings live in the ObjectStore CR
  # rendered at the bottom of this file; the Cluster only references it by name.
  # Native spec.backup.barmanObjectStore is deprecated in CNPG 1.27 and removed
  # in 1.29, and the standard image variant keycloak-db pins no longer ships the
  # barman-cloud-* binaries. The plugin runs them in a sidecar, so keycloak-db
  # stays on the standard variant (no need for the deprecated system variant).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: keycloak-db
        # Pin the WAL-archive S3 prefix explicitly (the plugin would default it
        # to the Cluster name anyway); it must never change on a live cluster.
        serverName: keycloak-db
  {{- end }}
  monitoring:
    enablePodMonitor: true

  inheritedMetadata:
    labels:
      policy.cozystack.io/allow-to-apiserver: "true"
{{- if and .Values.backup.enabled .Values.backup.destinationPath }}
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: keycloak-db
spec:
  {{- if .Values.backup.retentionPolicy }}
  retentionPolicy: {{ .Values.backup.retentionPolicy | quote }}
  {{- end }}
  configuration:
    destinationPath: {{ .Values.backup.destinationPath | quote }}
    {{- with .Values.backup.endpointURL }}
    endpointURL: {{ . | quote }}
    {{- end }}
    s3Credentials:
      accessKeyId:
        name: {{ $credSecret }}
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: {{ $credSecret }}
        key: AWS_SECRET_ACCESS_KEY
    data:
      compression: gzip
    wal:
      compression: gzip
{{- end }}
