image: quay.io/keycloak/keycloak:26.6.3

ingress:
  # Custom hostname for the Keycloak Ingress.
  # If set, this value will be used as the Ingress hostname (e.g., "auth.example.com").
  # If left empty, defaults to "keycloak.<root-host>" based on the cluster root-host setting.
  host: ""
  annotations:
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-expires: "86400"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "86400"
    nginx.ingress.kubernetes.io/session-cookie-name: "keycloak-cookie"
resources:
  requests:
    memory: 500Mi
    cpu: 100m

themes: []
# - name: my-theme
#   image: my-registry/my-keycloak-theme:v1.0
# Theme images must contain theme files under /themes/ directory.
# Each theme is copied into Keycloak's /opt/keycloak/themes/ via init container.
# If multiple themes contain files with the same path, later entries take precedence.

imagePullSecrets: []
# - name: my-registry-secret

# Extra environment variables to inject into the Keycloak container.
# Useful for passing runtime values that custom themes read via
# kcContext.properties (Keycloakify themes, FTL templates with
# ${env.NAME} substitution, etc.).
# Each entry is appended verbatim to the container's env list and
# supports the full corev1.EnvVar schema (value, valueFrom, ...).
extraEnv: []
# - name: MY_VAR
#   value: "some-value"
# - name: MY_SECRET_VAR
#   valueFrom:
#     secretKeyRef:
#       name: my-secret
#       key: my-key

# Database connection. By default Keycloak connects directly to the chart's
# CNPG cluster using the keycloak-db-app secret. Override these to route the
# connection through an external endpoint (e.g. a connection proxy such as
# PgBouncer) without the chart needing to know about it.
db:
  # DB host. Empty = use the keycloak-db-app secret's "host" key.
  host: ""
  # DB port. Empty = use the keycloak-db-app secret's "port" key.
  port: ""
  # Extra JDBC URL properties, appended verbatim as KC_DB_URL_PROPERTIES, e.g.
  #   "?sslmode=verify-full&prepareThreshold=0&sslrootcert=/etc/keycloak-db-ca/ca.crt"
  # Empty = KC_DB_URL_PROPERTIES is not set.
  urlProperties: ""

# Extra volumes and volume mounts on the Keycloak container (in addition to
# themes). Useful for mounting a CA so KC_DB_URL_PROPERTIES can reference an
# sslrootcert when routing the DB connection through a proxy.
extraVolumes: []
# - name: keycloak-db-ca
#   secret:
#     secretName: keycloak-db-ca
extraVolumeMounts: []
# - name: keycloak-db-ca
#   mountPath: /etc/keycloak-db-ca
#   readOnly: true
