##
## @section Talos worker golden image collection
##
## Pre-populates the Talos worker OS disk image(s) as DataVolumes in the
## cozy-public namespace so tenant Kubernetes worker VMs boot by CDI csi-clone
## (a storage-layer copy) instead of each worker independently importing the raw
## image over HTTP from the Talos Image Factory. One import per
## (schematicID, version) is then shared by every worker of every tenant cluster
## that boots that image — eliminating the per-worker Factory dependency (and the
## kubernetes-* e2e node-join flake, cozystack/cozystack#3231) on the hot path.
##
## The kubernetes app looks a golden up by the deterministic name
## `talos-worker-<schematicID>-<version>` in cozy-public and clones it; when no
## match exists it falls back to a direct per-worker HTTP import. So each entry
## here MUST match a (talos.schematicID, talos.version) that tenant `Kubernetes`
## resources use for the clone to be selected. Keep the default entry in sync
## with `talos.*` in packages/apps/kubernetes/values.yaml — a drift only costs the
## caching benefit (workers degrade to HTTP import), it does not break anything.

## @param {string} imageFactoryURL - Default base URL of the Talos Image Factory serving the raw worker OS image (`<url>/image/<schematicID>/<version>/openstack-amd64.raw.xz`). Overridable per image. No trailing slash.
imageFactoryURL: "https://factory.talos.dev"

## @param {string} storageClass - Default StorageClass for the golden image(s). Must use the same CSI driver as the tenant worker disks so csi-clone works, and be snapshot-capable (linstor ships the default VolumeSnapshotClass). Overridable per image.
storageClass: "replicated"

## @param {quantity} storage - Default storage size allocated for each golden image. Must be >= the imported raw image virtual size and <= the smallest worker diskSize that clones it. The Talos v1.13.x openstack raw is ~4.15 GiB, so 6Gi leaves headroom; bump per image if a future Talos version's raw grows. Overridable per image.
storage: "6Gi"

## @typedef {struct} WorkerImage - A golden Talos worker image entry.
## @field {string} schematicID - Talos image-factory schematic ID.
## @field {string} version - Talos version (e.g. "v1.13.6").
## @field {string} [imageFactoryURL] - Override the global imageFactoryURL for this image.
## @field {quantity} [storage] - Override the global storage size for this image.
## @field {string} [storageClass] - Override the global StorageClass for this image.

## @param {[]WorkerImage} images - List of golden Talos worker images to provision in the cozy-public namespace.
images:
  - schematicID: "ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515"
    version: "v1.13.6"
