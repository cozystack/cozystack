# LINSTOR replaced by Blockstor. piraeus-operator runs in EXTERNAL mode (no
# in-cluster Java linstor-controller) and only drives linstor-csi, which talks
# to the blockstor apiserver. piraeusServer below is kept for the operator's
# image reference but is unused in external mode (the LinstorCluster CR points
# the CSI at blockstor). The blockstor images are the published ghcr.io v0.1.17
# release, pinned by digest.
piraeusServer:
  image:
    repository: ghcr.io/cozystack/cozystack/piraeus-server
    tag: 1.33.3@sha256:1f8317fc814954f7a2325cfe5c194b44110b5ff2af461f0b9f8da9f857827c9f
blockstorController:
  image:
    repository: ghcr.io/cozystack/blockstor-controller
    tag: 0.1.17@sha256:19b5733565e4bbe9510eecae8d47a181e72e07009b3d565848e8ccf1cd9393e8
blockstorApiserver:
  image:
    repository: ghcr.io/cozystack/blockstor-apiserver
    tag: 0.1.17@sha256:102cf8c8d431f3b6714bca53752327ae8bb793b2d5ebed3aae47d51a85805f26
blockstorSatellite:
  image:
    repository: ghcr.io/cozystack/blockstor-satellite
    tag: 0.1.17@sha256:8bd15bca47f33464eaf489884c33fd50ef2574a0ad856ab5ab9b921186a98bea
# Talos-specific workarounds (disable for generic Linux like Ubuntu/Debian)
talos:
  enabled: true
linstor:
  autoDiskful:
    enabled: true
    minutes: 30
    allowCleanup: true
# linstor-csi is REUSED unchanged — blockstor serves the same CSI
# wire-shape, so the existing StorageClasses (provisioner
# linstor.csi.linbit.com) keep working.
linstorCSI:
  image:
    repository: ghcr.io/cozystack/cozystack/linstor-csi
    tag: v1.11.2@sha256:36f33dc8c70f76c3683f8703cdbb5e764c948b8089dc618d4e7dbe20fe388d3e
controller:
  # Resource requests for the linstor-controller JVM. Requests (not limits) are
  # set on purpose: a CPU request guarantees CPU shares so the JVM can answer its
  # GET /health liveness probe under node CPU contention, while omitting limits
  # avoids throttling the JVM (CPU limit) or OOM-killing it (memory limit). The
  # memory value is a conservative starting estimate for the JVM heap + overhead;
  # tune it to observed RSS.
  resources:
    requests:
      cpu: 250m
      memory: 700Mi
  # Liveness-probe timing for the linstor-controller container. Only these timing
  # fields are overridden; the httpGet target (GET /health on the api port) is
  # supplied by piraeus-operator and intentionally left untouched. Relaxed from
  # the operator defaults (timeoutSeconds 1, failureThreshold 3) so a JVM GC
  # pause or CPU contention does not trip a kubelet liveness kill.
  livenessProbe:
    timeoutSeconds: 5
    failureThreshold: 6
