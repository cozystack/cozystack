apiVersion: piraeus.io/v1
kind: LinstorCluster
metadata:
  name: linstorcluster
  labels:
    platform.cozystack.io/no-delete: "true"
spec:
  #nodeSelector:
  #  node-role.kubernetes.io/linstor: ""
  #
  # External mode: piraeus-operator does NOT run its own in-cluster Java
  # linstor-controller. Instead linstor-csi talks to the blockstor
  # apiserver, which serves the LINSTOR-compatible REST API. The
  # apiserver Service lives in this namespace and exposes ONLY the mTLS
  # port :3371 (RequireAndVerifyClientCert). The externalController.url
  # below MUST match the blockstor-apiserver Service DNS and one of the
  # serving-cert SANs (see blockstor-apiserver-tls.yaml).
  externalController:
    url: https://blockstor-apiserver.cozy-linstor.svc:3371
  # apiTLS.certManager makes the operator issue linstor-csi-{controller,node}-tls
  # client-cert Secrets from the blockstor-api-ca Issuer (created in
  # blockstor-apiserver-tls.yaml). The operator then wires
  # LS_USER_CERTIFICATE / LS_USER_KEY / LS_ROOT_CA onto the CSI pods so
  # they present a client cert chained to blockstor-api-ca to the
  # apiserver's RequireAndVerifyClientCert :3371 listener.
  apiTLS:
    certManager:
      name: blockstor-api-ca
      kind: Issuer
  # Controller-level DRBD properties. piraeus-operator applies these to the
  # external controller (the blockstor apiserver) over the LINSTOR REST API,
  # so DRBD tuning is honoured regardless of who serves the API. In external
  # mode there is no in-cluster linstor-controller Deployment (and thus no
  # controller podTemplate / plunger sidecar) — blockstor serves the API.
  properties:
  {{- if .Values.linstor.autoDiskful.enabled }}
  - name: DrbdOptions/auto-diskful
    value: {{ .Values.linstor.autoDiskful.minutes | quote }}
  - name: DrbdOptions/auto-diskful-allow-cleanup
    value: {{ .Values.linstor.autoDiskful.allowCleanup | quote }}
  {{- end }}
  - name: DrbdOptions/Net/verify-alg
    value: "crc32c"
  - name: DrbdOptions/Net/connect-int
    value: "15"
  - name: DrbdOptions/Net/ping-int
    value: "15"
  - name: DrbdOptions/Net/ping-timeout
    value: "20"
  - name: DrbdOptions/Net/timeout
    value: "100"
  csiController:
    podTemplate:
      spec:
        initContainers:
        - name: linstor-wait-api-online
          image: {{ .Values.linstorCSI.image.repository }}:{{ .Values.linstorCSI.image.tag }}
        containers:
        - name: linstor-csi
          image: {{ .Values.linstorCSI.image.repository }}:{{ .Values.linstorCSI.image.tag }}
  csiNode:
    podTemplate:
      spec:
        initContainers:
        - name: linstor-wait-node-online
          image: {{ .Values.linstorCSI.image.repository }}:{{ .Values.linstorCSI.image.tag }}
        containers:
        - name: linstor-csi
          image: {{ .Values.linstorCSI.image.repository }}:{{ .Values.linstorCSI.image.tag }}
  patches:
    - target:
        kind: Deployment
        name: linstor-csi-controller
      patch: |-
        - op: add
          path: /metadata/annotations/reloader.stakater.com~1auto
          value: "true"
    - target:
        kind: DaemonSet
        name: linstor-csi-node
      patch: |-
        - op: add
          path: /metadata/annotations/reloader.stakater.com~1auto
          value: "true"
