---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: storagepools.blockstor.cozystack.io
spec:
  group: blockstor.cozystack.io
  names:
    kind: StoragePool
    listKind: StoragePoolList
    plural: storagepools
    singular: storagepool
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          StoragePool is the Schema for the storagepools API.

          The CEL rule above enforces the cluster-wide naming convention every
          node-bound CRD in the project follows: `metadata.name == <pool>.<node>`.
          Keeping the composite key encoded in the name lets operators grep for
          `<node>.` across kinds (Resource, Snapshot, StoragePool) and find every
          resource bound to one satellite at once.

          The match is case-insensitive (`lowerAscii()` on both sides) because
          k8s metadata.Name is RFC-1123 (lowercase only) while LINSTOR identifiers
          preserve their CamelCase spelling on the wire. Upstream's well-known
          `DfltDisklessStorPool` is the canonical example — we must be able to
          store it under metadata.name `dfltdisklessstorpool.<node>` while keeping
          `spec.poolName == "DfltDisklessStorPool"` for byte-equal comparisons in
          the satellite's provider registry (Bug 59).

          The rule fires on both Create and Update; the REST layer
          (`pkg/rest/storage_pools.go`) also rejects non-canonical bodies with a
          friendlier 400 message so callers don't have to parse the k8s 422
          Invalid envelope.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of StoragePool
            properties:
              nodeName:
                description: |-
                  nodeName is the name of the satellite hosting this pool. Same as the
                  LINSTOR Node CRD's metadata.name.
                type: string
              poolName:
                description: |-
                  poolName is the LINSTOR pool name (LVM VG, ZFS dataset, etc.). The
                  CRD-level CEL rule pins `metadata.name == poolName + "." + nodeName`,
                  so this field is required — without it the rule cannot evaluate.
                type: string
              props:
                additionalProperties:
                  type: string
                description: props is the LINSTOR property map for this pool.
                type: object
              providerKind:
                description: providerKind is the storage backend.
                enum:
                - LVM
                - LVM_THIN
                - ZFS
                - ZFS_THIN
                - FILE
                - FILE_THIN
                - DISKLESS
                type: string
              sharedSpaceID:
                description: |-
                  sharedSpaceId groups pools that physically share the same backing
                  LUN (e.g. an EXOS / NetApp / Ceph-RBD-as-shared-disk slice attached
                  to multiple satellites). Pools in the same group contribute their
                  free capacity once to cluster totals instead of summing, and the
                  autoplacer treats them as anti-affine for replica placement so a
                  2-replica RD never lands twice on the same physical LUN.
                  Empty string = local pool (default).
                type: string
            required:
            - nodeName
            - poolName
            - providerKind
            type: object
          status:
            description: status defines the observed state of StoragePool
            properties:
              conditions:
                description: conditions represent the current state of the StoragePool
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              freeCapacity:
                description: |-
                  freeCapacity is the free capacity in KiB reported by the satellite.
                  Matches the wire shape (gRPC SatellitePool.FreeCapacityKib, REST
                  `free_capacity_kib`) so /v1/view/storage-pools and the autoplacer
                  can read this field directly without a unit conversion.
                format: int64
                type: integer
              poolMissing:
                description: |-
                  poolMissing indicates the satellite's last PoolStatus probe failed —
                  typically the backing pool (zpool / VG / FILE_THIN dir) was destroyed
                  out-of-band. While true, the placer skips this pool and the REST
                  wire view emits state="Faulty" instead of "Ok".
                type: boolean
              staticTraits:
                additionalProperties:
                  type: string
                description: staticTraits exposes provider-static attributes (kind,
                  etc.).
                type: object
              supportsSnapshots:
                description: supportsSnapshots is whether the backing provider can
                  create snapshots.
                type: boolean
              totalCapacity:
                description: totalCapacity is the total capacity in KiB reported by
                  the satellite.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: metadata.name must equal <spec.poolName>.<spec.nodeName> (case-insensitive)
          optionalOldSelf: true
          rule: oldSelf.hasValue() || self.metadata.name.lowerAscii() == (self.spec.poolName
            + '.' + self.spec.nodeName).lowerAscii()
    served: true
    storage: true
    subresources:
      status: {}
