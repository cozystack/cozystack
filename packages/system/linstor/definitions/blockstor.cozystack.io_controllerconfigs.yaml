---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: controllerconfigs.blockstor.cozystack.io
spec:
  group: blockstor.cozystack.io
  names:
    kind: ControllerConfig
    listKind: ControllerConfigList
    plural: controllerconfigs
    singular: controllerconfig
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ControllerConfig is the cluster-wide singleton config for the
          blockstor controller. Exactly one instance with name=`default`
          is recognised; any other instance is ignored. Phase 10.4.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ControllerConfig
            properties:
              drbdOptions:
                description: |-
                  drbdOptions is the cluster-wide DRBD configuration. Acts as
                  the controller-scope input to the typed hierarchy resolver
                  (`pkg/drbd.ResolveDRBDOptions`).
                properties:
                  disk:
                    description: |-
                      disk configures the `disk { ... }` section (on-io-error,
                      activity-log size, resync hints).
                    properties:
                      alExtents:
                        description: |-
                          alExtents is the activity-log size (in extents). Larger values
                          reduce metadata write amplification at the cost of longer
                          resync windows.
                        format: int32
                        type: integer
                      onIoError:
                        description: |-
                          onIOError is the action when the local backing device returns
                          an I/O error. `detach` is the production-safe default — the
                          satellite drops the local replica to Diskless and consumers
                          keep going via the network path.
                        enum:
                        - detach
                        - pass-on
                        - call-local-io-error
                        type: string
                    type: object
                  handlers:
                    additionalProperties:
                      type: string
                    description: |-
                      handlers maps event names to script paths (e.g. fence-peer,
                      before-resync-target). Free-form for now; the rendered .res
                      emits one line per pair under `handlers { }`.
                    type: object
                  net:
                    description: |-
                      net configures the `net { ... }` section of the rendered .res
                      file (replication protocol, secret, dual-primary, after-sb).
                    properties:
                      afterSb0Pri:
                        description: |-
                          afterSb0Pri is the recovery action when DRBD detects split-
                          brain and both sides were Secondary at the time.
                        enum:
                        - disconnect
                        - discard-younger-primary
                        - discard-older-primary
                        - discard-zero-changes
                        - discard-least-changes
                        - discard-local
                        - discard-remote
                        type: string
                      afterSb1Pri:
                        description: afterSb1Pri is the recovery action when one side
                          was Primary.
                        enum:
                        - disconnect
                        - consensus
                        - violently-as0p
                        - discard-secondary
                        - call-pri-lost-after-sb
                        type: string
                      afterSb2Pri:
                        description: |-
                          afterSb2Pri is the recovery action when both sides were Primary
                          (only possible if allow-two-primaries was enabled).
                        enum:
                        - disconnect
                        - violently-as0p
                        - call-pri-lost-after-sb
                        type: string
                      allowTwoPrimaries:
                        description: |-
                          allowTwoPrimaries enables dual-primary mode (live-migration,
                          shared-export NFS Ganesha). Must be paired with consumer-side
                          fencing — DRBD does NOT serialise concurrent writes from two
                          primaries.
                        type: boolean
                      maxBuffers:
                        description: maxBuffers is the maximum number of in-flight
                          network buffers.
                        format: int32
                        type: integer
                      protocol:
                        description: |-
                          protocol picks the DRBD replication protocol. A=async (writer
                          returns once data hits local disk), B=memory-sync (returns on
                          peer ACK after kernel buffer), C=sync (returns on peer disk
                          fsync). DRBD-9 default is C.
                        enum:
                        - A
                        - B
                        - C
                        type: string
                      sharedSecretRef:
                        description: |-
                          sharedSecretRef references a Secret containing the DRBD network
                          authentication shared secret under the key `shared-secret`.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                    type: object
                  peerDevice:
                    description: |-
                      peerDevice configures the `peer-device { ... }` block (per-peer
                      resync rate caps and similar).
                    properties:
                      cMaxRate:
                        description: |-
                          cMaxRate caps the per-peer resync transfer rate. Format
                          matches DRBD: integer + suffix (`100M`, `1G`).
                        type: string
                    type: object
                  resource:
                    description: |-
                      resource configures resource-level `options { ... }` (auto-
                      promote, quorum mode, on-no-quorum action).
                    properties:
                      autoPromote:
                        description: |-
                          autoPromote causes DRBD to promote the resource to Primary
                          automatically when a consumer opens the device, provided no
                          other peer is already Primary. Cluster-wide default true.
                        type: boolean
                      autoTieBreaker:
                        description: |-
                          autoTieBreaker gates auto-creation of a DISKLESS+TIE_BREAKER
                          witness when a parent RD has an even number of diskful
                          replicas and no operator-placed diskless replica. Replaces
                          `Props["DrbdOptions/AutoAddQuorumTiebreaker"]`. nil inherits
                          the cluster-wide default (true). Phase 10.3.
                        type: boolean
                      onNoQuorum:
                        description: |-
                          onNoQuorum is the action when quorum is lost. `io-error`
                          returns EIO to the consumer (drbd-reactor's typical trigger
                          for failover). `suspend-io` blocks I/O until quorum returns
                          (useful for deliberate maintenance windows).
                        enum:
                        - io-error
                        - suspend-io
                        - freeze-io
                        type: string
                      quorum:
                        description: |-
                          quorum picks the quorum policy. `majority` requires more than
                          half of all replicas (including diskless witnesses) to be
                          connected before allowing writes. `off` allows writes from any
                          replica regardless of partition state — split-brain risk.
                          `all` requires every replica to be reachable, useful only for
                          strict 2-replica configurations under deliberate operator
                          control.
                        enum:
                        - "off"
                        - majority
                        - all
                        type: string
                    type: object
                type: object
              extraProps:
                additionalProperties:
                  type: string
                description: |-
                  extraProps carries upstream-LINSTOR-shaped Props keys we have
                  not yet typed into structured fields. Forward-compat shim
                  populated only by the REST shim when golinstor sends an
                  unknown key. Drained as we type more fields here.
                type: object
              nodeConnections:
                additionalProperties:
                  additionalProperties:
                    type: string
                  type: object
                description: |-
                  nodeConnections is the per-(nodeA,nodeB) property bag exposed
                  at `/v1/node-connections/{nodeA}/{nodeB}` — backs upstream
                  LINSTOR's `linstor node-connection set-property / list` CLI
                  (Bug 101). Keys are the canonical pair-id `<lo>::<hi>` where
                  `<lo>` and `<hi>` are the lexicographically lower / higher of
                  the two node names — so a write against (A,B) and a read
                  against (B,A) hit the same record without the caller having
                  to remember any ordering convention.

                  Stored on the cluster-wide ControllerConfig singleton rather
                  than a per-pair CRD: upstream LINSTOR persists these on a
                  flat in-memory matrix attached to the Controller, and the
                  cozystack node-connection use case is overwhelmingly empty
                  or one-off ("flag this pair as cross-site"). A dedicated CRD
                  per pair would add admission/RBAC surface for a feature that
                  in practice carries ≤ a handful of rows on any given cluster.
                type: object
              passphraseSecretRef:
                description: |-
                  passphraseSecretRef points at the Secret carrying the
                  cluster-wide LUKS passphrase under the key `passphrase`. The
                  satellite reads it via the apiserver during reconcile;
                  passphrase never lands on Spec in plaintext. Replaces
                  `Props["DrbdOptions/Encryption/passphrase"]` on the legacy
                  ControllerProps instance.
                properties:
                  name:
                    description: name is the Secret name. Required.
                    type: string
                required:
                - name
                type: object
            type: object
          status:
            description: status defines the observed state of ControllerConfig
            properties:
              conditions:
                description: |-
                  conditions track the current state of the ControllerConfig
                  (e.g. PassphraseSecretFound, DRBDOptionsValid).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
