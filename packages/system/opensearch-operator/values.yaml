opensearch-operator:
  manager:
    # Number of operator replicas. Leader election is enabled automatically only
    # when this is greater than 1. On a single replica leader election adds no HA
    # value but lets a transient apiserver/etcd lease-renewal blip self-terminate
    # the manager (controller-runtime exits on "leader election lost"), which
    # surfaces at install time as a crashlooping, Failed Deployment.
    replicaCount: 1
    # Enable cluster-wide mode to watch all namespaces
    watchNamespace: ""
    # The operator builds in-cluster service FQDNs from DNS_BASE — the
    # securityadmin bootstrap job (`-h <svc>.<ns>.svc.<DNS_BASE>`) and the
    # OpenSearch Dashboards OPENSEARCH_HOSTS. The upstream chart defaults
    # DNS_BASE to cluster.local, but Cozystack's cluster domain is
    # cozy.local, so those names fail to resolve: the securityconfig job
    # can never reach the cluster (no `.opendistro_security` index → nodes
    # stay NotReady) and Dashboards crash-loops on ENOTFOUND. Align
    # DNS_BASE with the platform's default cluster domain, matching what
    # the opensearch app chart already uses everywhere
    # (`.Values._cluster.cluster-domain | default "cozy.local"`).
    dnsBase: cozy.local
  kubeRbacProxy:
    image:
      # gcr.io/kubebuilder/kube-rbac-proxy was sunset; use the original upstream
      repository: "quay.io/brancz/kube-rbac-proxy"
