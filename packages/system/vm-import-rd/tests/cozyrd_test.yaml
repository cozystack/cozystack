suite: vm-import resource definition
release:
  name: vm-import-rd
  namespace: cozy-system
templates:
  - templates/cozyrd.yaml
tests:
  - it: renders the vm-import ApplicationDefinition
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ApplicationDefinition
      - equal:
          path: metadata.name
          value: vm-import
