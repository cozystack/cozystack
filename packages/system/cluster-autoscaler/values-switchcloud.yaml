cluster-autoscaler:
  cloudProvider: externalgrpc
  extraArgs:
    cloud-config: /etc/externalgrpc/cloud-config

  livenessProbe:
    httpGet:
      path: /health-check
      port: 8085
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 1

  rbac:
    additionalRules:
      - apiGroups: [""]
        resources: [secrets]
        verbs: [get]
      - apiGroups: [coordination.k8s.io]
        resources: [leases]
        verbs: [create, get, update]

  extraContainers:
    - name: switchcloud-provider
      image: ghcr.io/aenix-org/cluster-autoscaler-switchcloud:latest
      args:
        - --config=/etc/switchcloud/config.yaml
        - --address=:8086
        - --secret-namespace=kube-system
      volumeMounts:
        - name: switchcloud-config
          mountPath: /etc/switchcloud
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]

  extraVolumes:
    - name: switchcloud-config
      secret:
        secretName: switchcloud-provider-config
        items:
          - key: config.yaml
            path: config.yaml
    - name: externalgrpc-config
      configMap:
        name: switchcloud-externalgrpc-config

  extraVolumeMounts:
    - name: externalgrpc-config
      mountPath: /etc/externalgrpc
      readOnly: true

  extraObjects:
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: switchcloud-externalgrpc-config
        namespace: "{{ .Release.Namespace }}"
      data:
        cloud-config: 'address: "localhost:8086"'
    - apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: switchcloud-provider-id-setter
        namespace: kube-system
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: switchcloud-provider-id-setter
      rules:
        - apiGroups: [""]
          resources: [nodes]
          verbs: [get, patch]
    - apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: switchcloud-provider-id-setter
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: switchcloud-provider-id-setter
      subjects:
        - kind: ServiceAccount
          name: switchcloud-provider-id-setter
          namespace: kube-system
    - apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: switchcloud-provider-id-setter
        namespace: kube-system
      spec:
        selector:
          matchLabels:
            app: switchcloud-provider-id-setter
        updateStrategy:
          type: RollingUpdate
        template:
          metadata:
            labels:
              app: switchcloud-provider-id-setter
          spec:
            serviceAccountName: switchcloud-provider-id-setter
            hostNetwork: true
            tolerations:
              - operator: Exists
            priorityClassName: system-node-critical
            initContainers:
              - name: set-provider-id
                image: ghcr.io/aenix-org/cluster-autoscaler-switchcloud:latest
                command: ["/provider-id-setter"]
                env:
                  - name: NODE_NAME
                    valueFrom:
                      fieldRef:
                        fieldPath: spec.nodeName
                securityContext:
                  readOnlyRootFilesystem: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: [ALL]
            containers:
              - name: pause
                image: registry.k8s.io/pause:3.10
                resources:
                  requests:
                    cpu: 1m
                    memory: 4Mi
