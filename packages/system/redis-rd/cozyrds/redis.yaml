apiVersion: cozystack.io/v1alpha1
kind: ApplicationDefinition
metadata:
  name: redis
spec:
  application:
    kind: Redis
    plural: redises
    singular: redis
    openAPISchema: |-
      {"title":"Chart Values","type":"object","properties":{"replicas":{"description":"Number of Redis replicas.","type":"integer","default":2},"resources":{"description":"Explicit CPU and memory configuration for each Redis replica. When omitted, the preset defined in `resourcesPreset` is applied.","type":"object","default":{},"properties":{"cpu":{"description":"CPU available to each replica.","pattern":"^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$","anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true},"memory":{"description":"Memory (RAM) available to each replica.","pattern":"^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$","anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true}}},"resourcesPreset":{"description":"Default sizing preset used when `resources` is omitted.","type":"string","default":"t1.nano","enum":["t1.nano","t1.micro","t1.small","t1.medium","t1.large","t1.xlarge","t1.2xlarge","t1.4xlarge","c1.nano","c1.micro","c1.small","c1.medium","c1.large","c1.xlarge","c1.2xlarge","c1.4xlarge","s1.nano","s1.micro","s1.small","s1.medium","s1.large","s1.xlarge","s1.2xlarge","s1.4xlarge","u1.nano","u1.micro","u1.small","u1.medium","u1.large","u1.xlarge","u1.2xlarge","u1.4xlarge","m1.nano","m1.micro","m1.small","m1.medium","m1.large","m1.xlarge","m1.2xlarge","m1.4xlarge","nano","micro","small","medium","large","xlarge","2xlarge"]},"size":{"description":"Persistent Volume Claim size available for application data.","default":"1Gi","pattern":"^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$","anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true},"storageClass":{"description":"StorageClass used to store the data.","type":"string","default":"","x-kubernetes-validations":[{"rule":"self == oldSelf","message":"storageClass is immutable"}],"x-cozystack-options":{"source":"storageclass"}},"external":{"description":"Enable external access from outside the cluster.","type":"boolean","default":false},"version":{"description":"Redis major version to deploy","type":"string","default":"v8","enum":["v8","v7"]},"tls":{"description":"TLS configuration. TLS is opt-in and is not inferred from `external`.","type":"object","default":{},"properties":{"authClients":{"description":"Maps to the Redis `tls-auth-clients` directive. Defaults to `no` — the server certificate is presented but client certificates are not validated.","type":"string","enum":["no","optional","yes"]},"enabled":{"description":"Enable TLS for Redis and Sentinel connections. Disabled unless set. Enabling it moves Redis and Sentinel to a TLS-only listener, so existing plaintext clients must be migrated at the same time. Encryption is provided by the redis-operator fork that mounts the certificate Secret into both Redis and Sentinel pods at `/tls`.","type":"boolean"}}},"authEnabled":{"description":"Enable password generation.","type":"boolean","default":true}}}
  release:
    prefix: redis-
    labels:
      sharding.fluxcd.io/key: tenants
    chartRef:
      kind: ExternalArtifact
      name: cozystack-redis-application-default-redis
      namespace: cozy-system
  dashboard:
    category: PaaS
    singular: Redis
    plural: Redis
    description: Managed Redis service
    tags:
      - cache
    icon: 
    keysOrder: [["apiVersion"], ["appVersion"], ["kind"], ["metadata"], ["metadata", "name"], ["spec", "replicas"], ["spec", "resources"], ["spec", "resourcesPreset"], ["spec", "size"], ["spec", "storageClass"], ["spec", "external"], ["spec", "version"], ["spec", "tls"], ["spec", "authEnabled"]]
  # The redis-operator fork already publishes a key-free trust anchor of its
  # own: an Opaque Secret holding nothing but the ca.crt it lifts out of the
  # release's TLS Secret. Declaring that as the source is preferable to
  # labelling the chart's CA Certificate, because the declared source then
  # never has a private key sitting next to it — the cert-manager Secret
  # <release>-ca-tls holds the CA key and is not referenced here at all.
  # Source and destination are two different Secrets: the controller reads
  # ca.crt out of the source named below and writes it into a separate
  # key-free projection, <release>.tenant-ca, which the label selector further
  # down then surfaces to the tenant.
  #
  # This block blocks installation until the CA-extraction controller lands.
  # ApplicationDefinition's schema does not declare spec.caCert yet and carries
  # no x-kubernetes-preserve-unknown-fields, and Flux applies the object as a
  # typed patch — so helm-controller rejects it before the API server is ever
  # asked, with "failed to create typed patch object: .spec.caCert: field not
  # declared in schema", and the whole redis-rd release fails. It is not
  # pruned and it does not degrade quietly; nothing installs.
  #
  # That is the intent rather than an oversight: it makes the merge order
  # mechanically enforced instead of relying on a note, so this cannot land
  # ahead of the controller and leave a broken definition behind. E2E is red
  # by construction until then. Keep the block; do not "fix" the red run by
  # deleting it.
  caCert:
    sourceSecretName: "{{ .release }}-ca-cert"
    sourceKey: ca.crt
  secrets:
    # Backstop for the label-only include below, which matches on the label
    # alone with no name constraint. These two Secrets are the ones whose
    # promotion would hand the tenant private key material.
    #
    # Scope this honestly — it is narrower than it looks, in two ways.
    # Selection is not namespace-wide: the lineage webhook drops out early for
    # any object whose ownership does not resolve to this release's app CR
    # (computeLabels returns nil when there is no owner), so unrelated Secrets
    # in the namespace are never evaluated against these selectors at all.
    # And these two specific Secrets do not reach the matcher today either,
    # because the platform runs cert-manager with enableCertificateOwnerRef
    # false, which leaves them with no ownerReference and therefore no
    # resolvable owner.
    #
    # So the entries below are defence in depth against a future in which they
    # do become reachable — ownerRefs enabled, or the operator adopting them —
    # not a gate that fires today. Matching is by exact name with no globs, so
    # a Secret a future operator version introduces, or a transient object an
    # issuer creates mid-renewal, is not covered either. The primary defence
    # remains that the controller stamps the tenant-ca label only on its own
    # projection.
    exclude:
      - resourceNames:
          # CA certificate and CA private key, issued by cert-manager.
          - redis-{{ .name }}-ca-tls
          # Server leaf and its private key, mounted into Redis and Sentinel.
          - redis-{{ .name }}-tls
    include:
      - resourceNames:
          - redis-{{ .name }}-auth
          # The CA-only Secret the operator publishes: ca.crt and nothing else,
          # no private key. Named directly rather than left to the label
          # selector below, which only starts matching once the CA-extraction
          # controller has actually written its projection for this release.
          # The name entry covers the window between the operator publishing
          # this Secret and that projection appearing, so a TLS-enabled Redis
          # is never left without a way for the tenant to obtain the
          # certificate needed to verify it.
          - redis-{{ .name }}-ca-cert
      # The key-free trust anchor published by the CA-extraction controller.
      # This is the engine-agnostic selector every converged engine shares and
      # carries no per-release name templating. Inert until that controller
      # merges, at which point the tenant sees the anchor under both this
      # release-specific name and the uniform projection name.
      - matchLabels:
          internal.cozystack.io/tenant-ca: "true"
  services:
    exclude: []
    include:
      - resourceNames:
          - rfs-redis-{{ .name }}
          - rfrm-redis-{{ .name }}
          - rfrs-redis-{{ .name }}
          - redis-{{ .name }}-external-lb
