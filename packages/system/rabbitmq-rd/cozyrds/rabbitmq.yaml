apiVersion: cozystack.io/v1alpha1
kind: ApplicationDefinition
metadata:
  name: rabbitmq
spec:
  application:
    kind: RabbitMQ
    plural: rabbitmqs
    singular: rabbitmq
    openAPISchema: |-
      {"title":"Chart Values","type":"object","properties":{"replicas":{"description":"Number of RabbitMQ replicas.","type":"integer","default":3},"resources":{"description":"Explicit CPU and memory configuration for each RabbitMQ replica. When omitted, the preset defined in `resourcesPreset` is applied.","type":"object","default":{},"properties":{"cpu":{"description":"CPU available to each replica.","pattern":"^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$","anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true},"memory":{"description":"Memory (RAM) available to each replica.","pattern":"^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$","anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true}}},"resourcesPreset":{"description":"Default sizing preset used when `resources` is omitted.","type":"string","default":"t1.nano","enum":["t1.nano","t1.micro","t1.small","t1.medium","t1.large","t1.xlarge","t1.2xlarge","t1.4xlarge","c1.nano","c1.micro","c1.small","c1.medium","c1.large","c1.xlarge","c1.2xlarge","c1.4xlarge","s1.nano","s1.micro","s1.small","s1.medium","s1.large","s1.xlarge","s1.2xlarge","s1.4xlarge","u1.nano","u1.micro","u1.small","u1.medium","u1.large","u1.xlarge","u1.2xlarge","u1.4xlarge","m1.nano","m1.micro","m1.small","m1.medium","m1.large","m1.xlarge","m1.2xlarge","m1.4xlarge","nano","micro","small","medium","large","xlarge","2xlarge"]},"size":{"description":"Persistent Volume Claim size available for application data.","default":"10Gi","pattern":"^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$","anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true},"storageClass":{"description":"StorageClass used to store the data.","type":"string","default":"","x-kubernetes-validations":[{"rule":"self == oldSelf","message":"storageClass is immutable"}],"x-cozystack-options":{"source":"storageclass"}},"external":{"description":"Enable external access from outside the cluster.","type":"boolean","default":false},"tls":{"description":"TLS configuration. When `tls.enabled` is not set, TLS is enabled automatically when `external` is true.","type":"object","default":{},"properties":{"enabled":{"description":"Enable TLS for AMQPS (5671) and Management HTTPS (15671). When omitted, defaults to the value of `external`.","type":"boolean"}},"additionalProperties":false},"version":{"description":"RabbitMQ major.minor version to deploy","type":"string","default":"v4.2","enum":["v4.2","v4.1","v4.0","v3.13"]},"users":{"description":"Users configuration map.","type":"object","default":{},"additionalProperties":{"type":"object","properties":{"password":{"description":"Password for the user.","type":"string"}}}},"vhosts":{"description":"Virtual hosts configuration map.","type":"object","default":{},"additionalProperties":{"type":"object","required":["roles"],"properties":{"roles":{"description":"Virtual host roles list.","type":"object","properties":{"admin":{"description":"List of admin users.","type":"array","items":{"type":"string"}},"readonly":{"description":"List of readonly users.","type":"array","items":{"type":"string"}}}}}}}}}
  release:
    prefix: rabbitmq-
    labels:
      sharding.fluxcd.io/key: tenants
    chartRef:
      kind: ExternalArtifact
      name: cozystack-rabbitmq-application-default-rabbitmq
      namespace: cozy-system
  dashboard:
    category: PaaS
    singular: RabbitMQ
    plural: RabbitMQ
    description: Managed RabbitMQ service
    tags:
      - messaging
    icon: 
    keysOrder: [["apiVersion"], ["appVersion"], ["kind"], ["metadata"], ["metadata", "name"], ["spec", "replicas"], ["spec", "resources"], ["spec", "resourcesPreset"], ["spec", "size"], ["spec", "storageClass"], ["spec", "external"], ["spec", "tls"], ["spec", "version"], ["spec", "users"], ["spec", "vhosts"]]
  secrets:
    # Evaluated before include, so this is a structural backstop rather than a
    # restatement. The trust-anchor include below matches by label with no name
    # constraint, so a single mis-stamp of that label on one of these would
    # promote a private key to the tenant — the projection API copies Secret
    # data verbatim and filters no keys.
    #
    # Two groups, both key-bearing:
    #   - The cert-manager chain. -ca holds the CA private key under tls.key
    #     (whoever has it can issue a certificate for anything and MITM the
    #     endpoint undetected); -tls holds the server private key next to the
    #     very ca.crt a tenant legitimately wants, which is exactly why the
    #     trust anchor is published as a separate key-free object instead.
    #   - The operator's cluster secrets. -erlang-cookie is the Erlang
    #     distribution shared secret: holding it and reaching port 25672 on the
    #     -nodes headless Service is enough to join as a peer node and execute
    #     arbitrary Erlang on the brokers. Note that disableNonTLSListeners does
    #     not protect 25672 — the operator never applies it to the headless
    #     Service — so this one is not mitigated by turning TLS on.
    #
    # rabbitmq-{{ .name }}-default-user is deliberately NOT excluded: it is
    # included by name below, since handing the tenant its own broker
    # credentials is the point of the resource map.
    #
    # The guarantee is bounded by this enumeration, not absolute: matching is by
    # exact name with no glob support, so a release-owned Secret not listed here
    # — one a future operator version introduces, or a transient object
    # cert-manager creates mid-renewal — remains in scope of the label-only
    # include. The per-user credentials are the known unbounded family: their
    # names carry the username, so they cannot be enumerated here at all. They
    # hold tenant-supplied values rather than platform secrets, so surfacing one
    # back to its own tenant would not cross a privilege boundary the way the CA
    # private key would, and they are already promoted on purpose by the
    # user-secret label below. The primary defence stays the controller stamping
    # only its own projection; this closes the enumerable set.
    exclude:
      - resourceNames:
          - rabbitmq-{{ .name }}-ca
          - rabbitmq-{{ .name }}-tls
          - rabbitmq-{{ .name }}-erlang-cookie
    include:
      - resourceNames:
          - rabbitmq-{{ .name }}-default-user
      # The key-free trust anchor the CA-extraction controller publishes. The
      # chart mints the CA through cert-manager and labels that Secret for
      # publication, so rabbitmq resolves on the label-driven leg and declares no
      # spec.caCert — the operator produces no CA object of its own to point at
      # (spec.tls.caSecretName is an input it only consumes). This is the
      # engine-agnostic selector every converged engine shares.
      - matchLabels:
          internal.cozystack.io/tenant-ca: "true"
      - matchLabels:
          apps.cozystack.io/user-secret: "true"
  services:
    exclude: []
    include:
      - resourceNames:
          - rabbitmq-{{ .name }}
