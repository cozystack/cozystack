apiVersion: v1
kind: Service
metadata:
  name: {{ include "linstor-scheduler.fullname" . }}-extender
  labels:
    {{- include "linstor-scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: extender
spec:
  type: ClusterIP
  ports:
    - port: 8099
      targetPort: 8099
      protocol: TCP
      name: http
  selector:
    {{- include "linstor-scheduler.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
