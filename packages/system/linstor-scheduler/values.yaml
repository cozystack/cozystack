linstor-scheduler:
  fullnameOverride: linstor-scheduler
  # Chart 0.2.5 (appVersion v0.3.5). The previous version (v0.3.2) shipped a
  # scheduler-admission mutating webhook that decoded every pod through a stale
  # vendored k8s.io/api (v0.25) and re-encoded it, stripping any field unknown
  # to that schema — including initContainers[].restartPolicy — from ALL pods
  # cluster-wide. That broke native/restartable sidecars, which the
  # CloudNativePG barman-cloud plugin relies on for WAL archiving/backups, so
  # CNPG instance Pods were rejected ("startupProbe forbidden without
  # restartPolicy=Always"). Upstream dropped the admission webhook entirely in
  # this release (piraeus-operator#1025); pods are no longer auto-assigned
  # spec.schedulerName, they are scheduled by the default scheduler and LINSTOR
  # data locality becomes advisory. The extender still runs as a kube-scheduler
  # plugin for workloads that opt in via schedulerName.
  linstor:
    endpoint: "https://linstor-controller.cozy-linstor.svc:3371"
    clientSecret: "linstor-client-tls"
