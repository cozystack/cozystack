kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cozystack-controller
rules:
- apiGroups: ['cozystack.io', 'gateway.cozystack.io']
  resources: ['*']
  verbs: ['*']
# TenantGatewayReconciler renders Gateway / HTTPRoute / TLSRoute and
# reads back their status to populate TenantGateway.Status.
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways", "httproutes", "tlsroutes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways/status", "httproutes/status", "tlsroutes/status"]
  verbs: ["get", "update", "patch"]
# TenantGatewayReconciler renders the per-tenant Issuer and the
# wildcard / per-listener Certificates the Gateway listeners reference.
- apiGroups: ["cert-manager.io"]
  resources: ["issuers", "certificates"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources: ["helmreleases"]
  verbs: ["get", "list", "watch", "patch", "update"]
# CACertReconciler reconciles TenantProjection sentinels a chart renders and
# writes their Ready status. It never creates or deletes a sentinel; that is
# the chart's (helm-controller's) job, gated by a ValidatingAdmissionPolicy.
- apiGroups: ["internal.cozystack.io"]
  resources: ["tenantprojections"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["internal.cozystack.io"]
  resources: ["tenantprojections/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "patch", "update"]
# TenantQuotaReconciler manages the per-namespace "tenant-quota-allocated"
# ResourceQuota that enforces each tenant's share of its parent pool, and emits
# events on the tenant namespace when sub-tenant quotas overcommit the budget.
- apiGroups: [""]
  resources: ["resourcequotas"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# Two reconcilers share this single Secret write grant; both scope the
# platform controller's own ServiceAccount only and widen no tenant's RBAC.
#
#  - WildcardSecretReconciler replicates the operator-provided wildcard TLS
#    Secret from the publishing namespace into each tenant namespace that
#    terminates TLS; tenant ingress controllers / Gateways still read only the
#    replica in their own namespace.
#  - CACertReconciler projects an application's CA certificate into the key-free
#    "<release>.tenant-ca" Secret of the same namespace. It creates and updates
#    that projection, and deletes it to WITHDRAW a retired declaration — but only
#    a projection it owns by owner reference, never a foreign Secret. Deleting the
#    whole sentinel is handled instead by garbage collection, through the
#    projection's owner reference to the TenantProjection.
#
# The read verbs (get/list/watch) are listed explicitly so the rule fully
# describes both reconcilers' Secret access on its own and keeps working if the
# broad read-only catch-all rule below is ever narrowed; create/update/patch/
# delete are the new grants.
#
# BLAST RADIUS — this grant is cluster-wide write on every Secret, and it is
# worth being explicit about why it cannot be narrower and what it therefore
# costs.
#
# Why it cannot be narrower. RBAC can scope a verb to a namespace, to a
# resource, or to an exact resourceName — and to nothing else. It has no notion
# of a name suffix or a label selector, which is what both reconcilers actually
# need:
#   - the objects are named per release ("<release>.tenant-ca", the wildcard
#     replica), so the set is unbounded and every name is minted at runtime;
#   - they land in tenant namespaces, which are themselves created dynamically,
#     so no namespace list can be enumerated when this ClusterRole is rendered;
#   - resourceNames could not express it even if the names were known: RBAC
#     ignores resourceNames for create, list and watch, which is most of what
#     these reconcilers do.
# So a Secret write grant here is all-Secrets-everywhere or nothing.
#
# What it costs. A compromise of the cozystack-controller ServiceAccount is a
# compromise of every Secret in the cluster — including the CA private keys the
# CA-extraction controller exists to keep away from tenants. The controller's own
# code is what confines it: the CA reconciler lifts exactly one whitelisted key,
# re-guards the bytes on every write, and deletes only a projection it owns by
# owner reference — to withdraw a retired declaration — never a foreign Secret;
# garbage collection removes the projection through the sentinel owner reference
# when the sentinel itself goes. That is a
# code-level confinement of an RBAC-level power, which is
# strictly weaker than not holding the power — the honest reading is that the
# guard is the boundary, and the RBAC is not.
#
# In context, the delta is smaller than it first looks: this same SA already
# holds ['*'] on cozystack.io (which is how applications, and thus their
# Secrets, are created in the first place) and cluster-wide read on every
# resource. It is a platform-tier identity before this rule is reached, and the
# write verbs do not move it to a new tier.
#
# If that ever needs to change, the shape is a SEPARATE ServiceAccount holding
# only the Secret verbs, with the two Secret-writing reconcilers moved onto it
# and off this one — which is a process/manager split, not an RBAC edit, and so
# deliberately not attempted here.
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ['*']
  resources: ['*']
  verbs: ["get", "list", "watch"]
