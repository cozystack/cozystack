kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cozystack-controller
rules:
- apiGroups: ['cozystack.io', 'gateway.cozystack.io', 'network.cozystack.io']
  resources: ['*']
  verbs: ['*']
# ServiceExposureReconciler renders the backend LoadBalancer pool /
# announcer CRs (MetalLB IPAddressPool + L2Advertisement, Cilium
# CiliumLoadBalancerIPPool + CiliumL2AnnouncementPolicy). The catch-all
# read rule below covers get/list/watch; these add the write verbs.
- apiGroups: ["metallb.io"]
  resources: ["ipaddresspools", "l2advertisements"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["cilium.io"]
  resources: ["ciliumloadbalancerippools", "ciliuml2announcementpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# TenantGatewayReconciler renders Gateway / HTTPRoute / TLSRoute and
# reads back their status to populate TenantGateway.Status.
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways", "httproutes", "tlsroutes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways/status", "httproutes/status", "tlsroutes/status"]
  verbs: ["get", "update", "patch"]
# TenantGatewayReconciler renders the per-tenant Issuer and the
# wildcard / per-listener Certificates the Gateway listeners reference.
- apiGroups: ["cert-manager.io"]
  resources: ["issuers", "certificates"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources: ["helmreleases"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "patch", "update"]
# TenantQuotaReconciler manages the per-namespace "tenant-quota-allocated"
# ResourceQuota that enforces each tenant's share of its parent pool, and emits
# events on the tenant namespace when sub-tenant quotas overcommit the budget.
- apiGroups: [""]
  resources: ["resourcequotas"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# WildcardSecretReconciler replicates the operator-provided wildcard TLS
# Secret from the publishing namespace into each tenant namespace that
# terminates TLS. This grants the platform controller's own
# ServiceAccount Secret writes — it does not widen any tenant's RBAC;
# tenant ingress controllers / Gateways still read only the replica in
# their own namespace. The read verbs (get/list/watch) are intentionally
# listed too so this rule fully describes the reconciler's Secret access
# on its own and keeps working if the broad read-only catch-all rule
# below is ever narrowed; only create/update/patch/delete are new grants.
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ['*']
  resources: ['*']
  verbs: ["get", "list", "watch"]
