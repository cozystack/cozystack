suite: cozystack-controller ClusterRole grants the shared Secret write
templates:
  - templates/rbac.yaml

release:
  name: cozystack-controller
  namespace: cozy-system

# One Secret write grant serves two reconcilers (WildcardSecret replication and
# CACert projection, including "delete"); it scopes the platform controller's own
# ServiceAccount and widens no tenant's RBAC. This rule gates both features, so pin it.

tests:
  - it: grants the ClusterRole every verb both reconcilers need, including delete
    documentSelector:
      path: kind
      value: ClusterRole
    asserts:
      - equal:
          path: metadata.name
          value: cozystack-controller
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - it: does not grant a blanket wildcard verb on secrets
    documentSelector:
      path: kind
      value: ClusterRole
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["*"]
