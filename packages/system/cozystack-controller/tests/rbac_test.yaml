suite: cozystack-controller ClusterRole grants the shared Secret write
templates:
  - templates/rbac.yaml

release:
  name: cozystack-controller
  namespace: cozy-system

# One Secret write grant on the platform controller's ClusterRole serves two
# reconcilers: WildcardSecret replicates the operator wildcard TLS Secret into
# tenant namespaces, and CACert writes — and withdraws — the key-free
# "<release>.tenant-ca" projection. Read was already covered by the catch-all
# rule; the write verbs (including "delete", which lets CACert withdraw a
# projection and lets WildcardSecret prune a stale replica) are the new grants.
# This rule gates both features, so pin it. It scopes the platform controller's
# own ServiceAccount only — it does not widen any tenant's RBAC.

tests:
  - it: grants the ClusterRole every verb both reconcilers need, including delete
    documentSelector:
      path: kind
      value: ClusterRole
    asserts:
      - equal:
          path: metadata.name
          value: cozystack-controller
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - it: does not grant a blanket wildcard verb on secrets
    documentSelector:
      path: kind
      value: ClusterRole
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["*"]
