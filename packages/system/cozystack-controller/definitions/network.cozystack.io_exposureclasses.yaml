---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: exposureclasses.network.cozystack.io
spec:
  group: network.cozystack.io
  names:
    kind: ExposureClass
    listKind: ExposureClassList
    plural: exposureclasses
    shortNames:
    - expcls
    singular: exposureclass
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.backend
      name: Backend
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ExposureClass is the Schema for the exposureclasses API. It is the
          cluster-admin-facing configuration that binds a logical class name to a
          LoadBalancer backend and its address scope. Tenants reference it by name
          from a ServiceExposure; the cozystack-controller renders the backend's
          pool and announcer resources from this CR.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ExposureClassSpec is the cluster-admin backend configuration. It maps a
              logical exposure class to a concrete backend and its address scope,
              following the StorageClass / IngressClass / GatewayClass pattern: the
              admin owns the backend choice, tenants reference the class by name.
            properties:
              addresses:
                description: |-
                  Addresses is the VIP address scope for pool-based backends (metallb,
                  cilium), as CIDRs or start-end ranges. These are virtual VIPs, NOT
                  node public IPs. Ignored by the externalIPs and robotlb backends.
                items:
                  type: string
                type: array
              backend:
                description: Backend selects the concrete allocation+announcement
                  mechanism.
                enum:
                - externalIPs
                - metallb
                - cilium
                - robotlb
                type: string
              interfaces:
                description: |-
                  Interfaces optionally scopes L2 announcement to the named host
                  network interfaces (cilium CiliumL2AnnouncementPolicy.spec.interfaces;
                  metallb L2Advertisement.spec.interfaces). Empty announces on all.
                items:
                  type: string
                type: array
              l2:
                default: true
                description: |-
                  L2 enables L2 (ARP/NDP) announcement for bare-metal backends
                  (metallb, cilium). Defaults to true. Set false when announcement is
                  handled out of band (e.g. BGP added later, or a routed network).
                type: boolean
            required:
            - backend
            type: object
          status:
            description: ExposureClassStatus reports the observed state of the ExposureClass.
            properties:
              conditions:
                description: |-
                  Conditions describes the current state of the ExposureClass.
                  Standard condition type: Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration mirrors the .metadata.generation reflected in the
                  latest reconciled state.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
