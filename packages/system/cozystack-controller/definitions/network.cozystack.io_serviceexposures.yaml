                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            required:
            - serviceRef
            type: object
          status:
            description: ServiceExposureStatus reports the observed state of the exposure.
            properties:
              assignedIPs:
                description: |-
                  AssignedIPs reports the external addresses the backend assigned,
                  read back from the Service (status.loadBalancer.ingress or the
                  externalIPs pin).
                items:
