    listKind: ServiceExposureList
    plural: serviceexposures
    shortNames:
    - svcexp
    singular: serviceexposure
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serviceRef.name
      name: Service
      type: string
    - jsonPath: .spec.exposureClassName
      name: Class
      type: string
    - jsonPath: .status.resolvedBackend
