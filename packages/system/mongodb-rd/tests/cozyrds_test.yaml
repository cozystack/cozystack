suite: mongodb-rd ApplicationDefinition

# The cozyrds/mongodb.yaml file is a plain YAML file included verbatim via
# .Files.Get. It is NOT processed by Helm, so it does not support conditionals
# ({{- if .Values.tls.enabled }}). As a result, the TLS secret references
# (mongodb-{{ .name }}-ca and mongodb-{{ .name }}-ssl) are always present in
# spec.secrets.include regardless of whether TLS is enabled.
#
# This is a known tooling limitation. The cozystack controller that processes
# ApplicationDefinition is responsible for resolving {{ .name }} at runtime,
# so the template strings are intentionally literal in the rendered manifest.
#
# KNOWN LIMITATION: mongodb-{{ .name }}-ca and mongodb-{{ .name }}-ssl are
# included unconditionally. When TLS is disabled, these secret names will be
# referenced but the secrets themselves will not exist. The cozystack RBAC
# controller must tolerate missing secrets to avoid breaking non-TLS instances.
# Tracked for follow-up: conditional cozyrds support requires tooling changes.

templates:
  - templates/cozyrd.yaml

tests:
  - it: renders exactly one ApplicationDefinition
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ApplicationDefinition

  - it: credentials secret is always included (unconditional)
    asserts:
      - contains:
          path: spec.secrets.include
          content:
            resourceNames:
              - "mongodb-{{ .name }}-credentials"

  - it: TLS secrets are always included (known limitation - cozyrds lacks conditional support)
    # NOTE: These entries are unconditional because cozyrds/mongodb.yaml is plain
    # YAML and cannot use Helm conditionals. They appear even when tls.enabled is
    # false. This is intentional: removing them would require cozyrds templating
    # support, tracked as a follow-up improvement.
    asserts:
      - contains:
          path: spec.secrets.include
          content:
            resourceNames:
              - "mongodb-{{ .name }}-ca"
              - "mongodb-{{ .name }}-ssl"

  - it: credentials and TLS secrets are separate include entries
    asserts:
      - lengthEqual:
          path: spec.secrets.include
          count: 2

  - it: TLS secrets are still listed in secrets.include when tls.enabled is explicitly false (cozyrds is not Helm-processed)
    set:
      tls:
        enabled: false
    asserts:
      - contains:
          path: spec.secrets.include
          content:
            resourceNames:
              - "mongodb-{{ .name }}-ca"
              - "mongodb-{{ .name }}-ssl"

  - it: ApplicationDefinition name is mongodb
    asserts:
      - equal:
          path: metadata.name
          value: mongodb

  - it: application kind is MongoDB
    asserts:
      - equal:
          path: spec.application.kind
          value: MongoDB
