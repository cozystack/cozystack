suite: mongodb-rd ApplicationDefinition

# The cozyrds/mongodb.yaml file is a plain YAML file included verbatim via
# .Files.Get. It is NOT processed by Helm, so it does not support conditionals.
# That is fine here: operator-managed TLS is always on, so the leaf (-ssl) and
# CA (-ca-cert) secrets always exist and are listed unconditionally in
# spec.secrets.include alongside the credentials secret.
#
# The cozystack controller that processes ApplicationDefinition resolves
# {{ .name }} at runtime, so the template strings are intentionally literal in
# the rendered manifest.

templates:
  - templates/cozyrd.yaml

tests:
  - it: renders exactly one ApplicationDefinition
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ApplicationDefinition

  - it: credentials secret is always included (unconditional)
    asserts:
      - contains:
          path: spec.secrets.include
          content:
            resourceNames:
              - "mongodb-{{ .name }}-credentials"

  - it: TLS secrets are always included (operator-managed TLS is always on)
    asserts:
      - contains:
          path: spec.secrets.include
          content:
            resourceNames:
              - "mongodb-{{ .name }}-ca-cert"
              - "mongodb-{{ .name }}-ssl"

  - it: credentials and TLS secrets are separate include entries
    asserts:
      - lengthEqual:
          path: spec.secrets.include
          count: 2

  - it: ApplicationDefinition name is mongodb
    asserts:
      - equal:
          path: metadata.name
          value: mongodb

  - it: application kind is MongoDB
    asserts:
      - equal:
          path: spec.application.kind
          value: MongoDB
