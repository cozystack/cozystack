apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-router-controller
  labels:
    app: site-router-controller
spec:
  replicas: {{ .Values.siteRouterController.replicas }}
  selector:
    matchLabels:
      app: site-router-controller
  template:
    metadata:
      labels:
        app: site-router-controller
    spec:
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      serviceAccountName: site-router-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: site-router-controller
        image: "{{ .Values.siteRouterController.image }}"
        args:
        - --leader-elect
        # The controller's management CIDR MUST match the site-router chart's
        # managementCIDR (which seeds the VyOS first-boot firewall). Keep the two
        # in lockstep; a mismatch locks the controller out of the router.
        - --management-cidr={{ .Values.siteRouterController.managementCidr }}
        {{- if .Values.siteRouterController.allowOpenManagement }}
        - --allow-open-management
        {{- end }}
        {{- if .Values.siteRouterController.debug }}
        - --zap-log-level=debug
        {{- else }}
        - --zap-log-level=info
        {{- end }}
        ports:
        - name: health
          containerPort: 8081
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        {{- with .Values.siteRouterController.resources }}
        resources: {{- . | toYaml | nindent 10 }}
        {{- end }}
