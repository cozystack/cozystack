{{- range .Values.images }}
---
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  annotations:
    vm-default-images.cozystack.io/name: {{ .name | quote }}
    {{- with .os }}
    {{- with .family }}
    vm-default-images.cozystack.io/os-family: {{ . | quote }}
    {{- end }}
    {{- with .name }}
    vm-default-images.cozystack.io/os-name: {{ . | quote }}
    {{- end }}
    {{- with .version }}
    vm-default-images.cozystack.io/os-version: {{ . | quote }}
    {{- end }}
    {{- end }}
    {{- with .architecture }}
    vm-default-images.cozystack.io/architecture: {{ . | quote }}
    {{- end }}
    {{- with .description }}
    vm-default-images.cozystack.io/description: {{ . | quote }}
    {{- end }}
    cdi.kubevirt.io/storage.bind.immediate.requested: "true"
    cdi.kubevirt.io/storage.usePopulator: "true"
  labels:
    app.kubernetes.io/managed-by: cozystack
  name: vm-default-images-{{ required "A valid .name entry required for each image!" .name }}
  namespace: cozy-public
spec:
  contentType: kubevirt
  source:
    {{- if .registryFromTag }}
    {{- /*
      Import a digest-pinned OCI containerDisk built in-repo (see
      packages/system/vyos-router-image). registryFromTag names a .tag file in
      THIS chart, holding `<ref>@sha256:<digest>`; the in-repo image build stamps
      it (mirroring the talos -> bootbox/matchbox.tag convention). A digest pin is
      why the artifact is shipped as a registry image rather than an HTTP qcow2 —
      CDI's http importer cannot verify a sha256.
    */}}
    registry:
      url: {{ printf "docker://%s" (required (printf "empty .tag file '%s' for image '%s'!" .registryFromTag .name) ($.Files.Get .registryFromTag | trim)) | quote }}
    {{- else if .registry }}
    registry:
      url: {{ required (printf "A valid .registry entry required for image '%s'!" .name) .registry | quote }}
    {{- else }}
    http:
      url: {{ required (printf "A valid .url entry required for image '%s'!" .name) .url | quote }}
    {{- end }}
  storage:
    resources:
      requests:
        storage: {{ default "5Gi" .storage }}
    {{- if .storageClass }}
    storageClassName: {{ .storageClass }}
    {{- else if $.Values.storageClass }}
    storageClassName: {{ $.Values.storageClass }}
    {{- end }}
{{- end }}
