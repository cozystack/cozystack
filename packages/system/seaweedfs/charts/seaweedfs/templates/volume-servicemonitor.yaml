{{ $volumes := (list .Values.volume) }}
{{- range .Values.volumes }}
{{ $volumes = append $volumes (deepCopy . | mergeOverwrite $.Values.volume) }}
{{- end }}

{{- range $index, $volume := $volumes }}
{{- $volumeName := printf "volume%d" $index }}
{{- if eq $index 0 }}
{{- $volumeName = "volume" }}
{{- end }}
{{- if $volume.enabled }}
{{- if $volume.metricsPort }}
{{- if $.Values.global.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ template "seaweedfs.name" $ }}-{{ $volumeName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ template "seaweedfs.name" $ }}
    helm.sh/chart: {{ $.Chart.Name }}-{{ $.Chart.Version | replace "+" "_" }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: volume
    {{- with $.Values.global.monitoring.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  endpoints:
    - interval: 30s
      port: metrics
      scrapeTimeout: 5s
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ template "seaweedfs.name" $ }}
      app.kubernetes.io/component: volume
{{- end }}
{{- end }}
{{- end }}
{{- end }}
