  master:
    # 30 GB per volume × 10 GiB PVC = 0 → rounded to 1 maxVolume per
    # volume server. With defaultReplication=001 (one replica on a
    # different node) two volume servers can host exactly one logical
    # volume between them. The platform now ships a default
    # bucket-cozy-backups Bucket that grabs that single slot, so any
    # second collection (the bucket E2E, a tenant app bucket, etc.)
    # blocks on `assign volume: No writable volumes` until the test
    # times out. Smaller volumes = more parallel collections on a
    # 10 GiB E2E sandbox PVC. The upstream chart default is 1000.
    volumeSizeLimitMB: 1000
    replicas: 3
    #  replication type is XYZ:
    # X number of replica in other data centers
    # Y number of replica in other racks in the same data center
    # Z number of replica in other servers in the same rack
    defaultReplication: "001"
    data:
      type: "emptyDir"
    logs:
      type: ""
  volume:
    replicas: 2
    resizeHook:
      image: docker.io/alpine/k8s:1.33.4
    # minimum free disk space(in percents). If free disk space lower this value - all volumes marks as ReadOnly
    minFreeSpacePercent: 5
    dataDirs:
      - name: data1
        type: "persistentVolumeClaim"
        size: "10Gi"
        maxVolumes: 0
  filer:
    replicas: 2
    #  replication type is XYZ:
    # X number of replica in other data centers
    # Y number of replica in other racks in the same data center
    # Z number of replica in other servers in the same rack
    defaultReplicaPlacement: "001"
    data:
      type: "emptyDir"
    logs:
      type: ""
    extraEnvironmentVars:
      WEED_LEVELDB2_ENABLED: "false"
      WEED_POSTGRES2_ENABLED: "true"
      # Without explicit pool settings the Go sql pool keeps zero idle
      # connections, so every filer metadata lookup opens a fresh PostgreSQL
      # connection (TCP + TLS + SCRAM, ~300ms each), adding seconds of latency
      # to every S3 operation. Keep max_open * filer.replicas below the
      # database max_connections (CNPG default: 100).
      WEED_POSTGRES2_CONNECTION_MAX_IDLE: "20"
      WEED_POSTGRES2_CONNECTION_MAX_OPEN: "40"
      WEED_POSTGRES2_CONNECTION_MAX_LIFETIME_SECONDS: "600"
      WEED_POSTGRES2_CREATETABLE: |
        CREATE TABLE IF NOT EXISTS "%s" (
          dirhash   BIGINT,
          name      VARCHAR(65535),
          directory VARCHAR(65535),
          meta      bytea,
          PRIMARY KEY (dirhash, name)
        );
    secretExtraEnvironmentVars:
      WEED_POSTGRES2_HOSTNAME:
        secretKeyRef:
          key: host
          name: seaweedfs-db-app
      WEED_POSTGRES2_DATABASE:
        secretKeyRef:
          key: dbname
          name: seaweedfs-db-app
      WEED_POSTGRES2_USERNAME:
        secretKeyRef:
          key: username
          name: seaweedfs-db-app
      WEED_POSTGRES2_PASSWORD:
        secretKeyRef:
          key: password
          name: seaweedfs-db-app
    s3:
      replicas: 2
      enabled: false
      port: 8333
      httpsPort: 0
      # Suffix of the host name, {bucket}.{domainName}
      domainName: ""
      # enable user & permission to s3 (need to inject to all services)
      enableAuth: false
      # set to the name of an existing kubernetes Secret with the s3 json config file
      # should have a secret key called seaweedfs_s3_config with an inline json configure
      existingConfigSecret: null
      auditLogConfig: {}
  s3:
    enabled: true
    replicas: 2
    port: 8333
    # Keep S3 traffic on same-zone endpoints. Native chart support landed in 4.12
    # (replaces the former s3-traffic-distribution.patch); the chart gates the
    # field on Kubernetes >=1.31 and auto-converts to PreferSameZone on >=1.35.
    trafficDistribution: PreferClose
    extraArgs:
      - -idleTimeout=60
    enableAuth: false
    readinessProbe:
      httpGet:
        scheme: HTTPS
    livenessProbe:
      httpGet:
        scheme: HTTPS
    logs:
      type: ""
    ingress:
      enabled: true
      className: "tenant-root"
      host: "seaweedfs.demo.cozystack.io"
      annotations:
        # Limit single PUT request to 5GB to enforce multipart uploads for large files.
        # This prevents issues with large file uploads and reduces support load.
        # For files >5GB, clients must use S3 multipart upload API.
        nginx.ingress.kubernetes.io/proxy-body-size: "5g"
        nginx.ingress.kubernetes.io/proxy-buffering: "off"
        nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/client-body-timeout: "3600"
        nginx.ingress.kubernetes.io/client-header-timeout: "120"
        nginx.ingress.kubernetes.io/service-upstream: "true"
        acme.cert-manager.io/http01-ingress-ingressclassname: tenant-root
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls:
        - hosts:
            - seaweedfs.demo.cozystack.io
          secretName: seaweedfs-s3-ingress-tls
    affinity: |
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 10
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                    - '{{ template "seaweedfs.name" . }}'
                  - key: app.kubernetes.io/instance
                    operator: In
                    values:
                    - '{{ .Release.Name }}'
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                    - s3
              topologyKey: kubernetes.io/hostname
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                    - '{{ template "seaweedfs.name" . }}'
                  - key: app.kubernetes.io/instance
                    operator: In
                    values:
                    - '{{ .Release.Name }}'
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                    - s3
              topologyKey: topology.kubernetes.io/zone
      podAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 20
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                    - ingress-nginx
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                    - controller
              topologyKey: kubernetes.io/hostname
  cosi:
    enabled: true
    # Override the vendored chart default (v0.1.2), which hardcodes read-write
    # S3 actions for every BucketAccess and ignores the accessPolicy parameter.
    # v0.3.x honours accessPolicy: readonly, so a -readonly BucketAccessClass
    # actually issues read-only (Read,List) credentials instead of read-write.
    image: "ghcr.io/seaweedfs/seaweedfs-cosi-driver:v0.3.1"
    podLabels:
      policy.cozystack.io/allow-to-apiserver: "true"
    driverName: "seaweedfs.objectstorage.k8s.io"
    bucketClassName: "seaweedfs"
    region: ""
    sidecar:
      image: "ghcr.io/cozystack/cozystack/objectstorage-sidecar:v1.5.2@sha256:fdc09634688d5579a329b48aabf6706cc55bcd9503b0331fa47764706f0d6f62"
  certificates:
    commonName: "SeaweedFS CA"
    ipAddresses: []
    keyAlgorithm: RSA
    keySize: 2048
    duration: 87600h # 10 years
    renewBefore: 720h # 30d
