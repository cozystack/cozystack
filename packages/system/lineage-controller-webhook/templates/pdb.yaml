{{- if and .Values.lineageControllerWebhook.deployment.enabled (gt (int .Values.lineageControllerWebhook.deployment.replicas) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lineage-controller-webhook
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: lineage-controller-webhook
{{- end }}
