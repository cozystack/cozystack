{{- if .Values.lineageControllerWebhook.deployment.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lineage-controller-webhook
spec:
  minAvailable: {{ if gt (int .Values.lineageControllerWebhook.deployment.replicas) 1 }}1{{ else }}0{{ end }}
  selector:
    matchLabels:
      app: lineage-controller-webhook
{{- end }}