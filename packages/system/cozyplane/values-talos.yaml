# Talos overlay for the cozyplane networking variant (cozyplane + cozyplane-kpr,
# no Cilium, no kube-proxy).
#
# cozyplane is the sole CNI; its conflist sorts first (00-) so kubelet uses it as
# the primary CNI over any co-installed one.
cniConfName: "00-cozyplane.conflist"

# Serve sdn.cozystack.io from the aggregated API server (not CRDs); Cozystack
# ships cert-manager for the serving + etcd certificates.
apiserver:
  enabled: true
  etcd:
    # Operator-managed etcd (etcd-operator.cozystack.io/v1alpha2), memory-backed
    # (no storageClass) so the API's etcd bootstraps before storage — the CNI
    # installs first. Replicated (raft survives single-pod restarts); not durable
    # across a full-cluster restart until a persistent mode lands.
    operator:
      enabled: true
      replicas: 3
