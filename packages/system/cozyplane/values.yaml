# Container image for all cozyplane components (agent, CNI plugin, controller),
# published from github.com/lllamnyp/cozyplane. Digest-pinned (no floating tag).
image: ghcr.io/lllamnyp/cozyplane@sha256:8e1e5dceb02f5d936ac21da9de030fd4c27d915c52202494ca7a78022ddd4e5c
imagePullPolicy: IfNotPresent
imagePullSecrets: []

# Pod MTU (underlay MTU minus Geneve overhead, ~50 bytes).
mtu: 1450

# Geneve UDP destination port. Override (e.g. 6082) only to coexist with another
# overlay still holding 6081 on the node.
genevePort: 6081

# CNI conflist filename written to /etc/cni/net.d. Lower names sort first; use a
# low prefix (e.g. "00-cozyplane.conflist") to win over a co-installed CNI such
# as Cilium (which ships 05-cilium.conflist).
cniConfName: "10-cozyplane.conflist"

agent:
  priorityClassName: system-node-critical
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

controller:
  replicas: 1
  priorityClassName: system-cluster-critical
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

# The export ValidatingAdmissionPolicy that gates VPCBinding creation on the
# 'export' verb of the referenced VPC. Requires Kubernetes >= 1.30. Disable only
# if your cluster predates VAP (then VPCBinding creation is governed by plain
# 'create vpcbindings' RBAC alone, with no cross-VPC export check).
exportPolicy:
  enabled: true

# Serve the sdn.cozystack.io API group from a real aggregated API server (backed
# by a dedicated etcd) instead of CRDs — the design target, enabling custom
# validation and subresources beyond CRD ergonomics. Requires cert-manager
# (present in Cozystack). Enabled for the Cozystack variant in values-talos.yaml.
apiserver:
  enabled: false
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  etcd:
    image: registry.k8s.io/etcd:3.5.16-0
    storage:
      emptyDir: {}
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
