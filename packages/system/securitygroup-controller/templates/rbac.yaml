kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: sdn.cozystack.io:securitygroup-controller
rules:
# Stamp and clear the per-SecurityGroup membership label on managed-app pods.
# Cluster-wide because tenant namespaces are created dynamically; the controller
# only ever patches the single membership-label key (see internal/
# securitygroupcontroller) and only on pods carrying the lineage identity.
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "patch"]
# Watch the SecurityGroup-backing CiliumNetworkPolicies and manage the
# membership finalizer on them (via merge patches, never an Update that would
# drop the policy spec).
- apiGroups: ["cilium.io"]
  resources: ["ciliumnetworkpolicies"]
  verbs: ["get", "list", "watch", "patch"]
# Leader election (--leader-elect).
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
