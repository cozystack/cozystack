---
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  name: cozystack-workloadmonitors
spec:
  id: "factory-detail-workloads"
  additionalPrinterColumns:
    - jsonPath: .metadata.name
      name: NAME
      type: string
    - jsonPath: .status.kind
      name: KIND
      type: string
    - jsonPath: .status.type
      name: TYPE
      type: string
    - jsonPath: .metadata.labels["app.kubernetes.io/version"]
      name: VERSION
      type: string
    - jsonPath: .status.replicas
      name: REPLICAS
      type: string
    - jsonPath: .status.minReplicas
      name: MINREPLICAS
      type: string
    - jsonPath: .status.availableReplicas
      name: AVAILABLE
      type: string
    - jsonPath: .status.observedReplicas
      name: OBSERVED
      type: string
    - jsonPath: .status.operational
      name: OPERATIONAL
      type: boolean
---
apiVersion: front.in-cloud.io/v1alpha1
kind: CustomColumnsOverride
metadata:
  name: cozystack-services
spec:
  id: "factory-detail-services"
  additionalPrinterColumns:
    - jsonPath: .metadata.name
      name: NAME
      type: string
    - jsonPath: .spec.type
      name: TYPE
      type: string
    - jsonPath: .spec.ports[0].port
      name: PORT
      type: string
    - jsonPath: .spec.ports[0].port
      name: TARGET_PORT
      type: string
    - jsonPath: .spec.clusterIP
      name: CLUSTER_IP
      type: string
    - jsonPath: .status.loadBalancer.ingress[0].ip
      name: INGRESS_IP
      type: string
