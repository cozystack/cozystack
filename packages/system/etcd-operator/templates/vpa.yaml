{{- if .Values.vpa.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: etcd-operator-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: etcd-operator
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: etcd-operator-controller-manager
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | default "Auto" | quote }}
  resourcePolicy:
    containerPolicies:
    - containerName: manager
      {{- with .Values.vpa.minAllowed }}
      minAllowed: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vpa.maxAllowed }}
      maxAllowed: {{- toYaml . | nindent 8 }}
      {{- end }}
      controlledResources: ["cpu", "memory"]
{{- end }}
