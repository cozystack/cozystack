apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcd-operator-controller-manager
  namespace: {{ .Release.Namespace }}
---
# Manager ClusterRole — vendored from github.com/cozystack/etcd-operator
# config/rbac/role.yaml. Cluster-scoped because etcd clusters live in tenant
# namespaces. Refresh via `make update` when the operator's role.yaml changes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: etcd-operator-manager-role
rules:
- apiGroups: [""]
  resources: [persistentvolumeclaims]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [""]
  resources: [pods]
  verbs: [create, delete, get, list, patch, watch]
- apiGroups: [""]
  resources: [pods/log]
  verbs: [get]
- apiGroups: [""]
  resources: [secrets]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [services]
  verbs: [create, get, list, patch, update, watch]
- apiGroups: [batch]
  resources: [jobs]
  verbs: [create, delete, get, list, watch]
- apiGroups: [cert-manager.io]
  resources: [certificates]
  verbs: [create, get, list, patch, update, watch]
- apiGroups: [etcd-operator.cozystack.io]
  resources: [etcdclusters]
  verbs: [get, list, watch]
- apiGroups: [etcd-operator.cozystack.io]
  resources: [etcdclusters/finalizers, etcdmembers/finalizers, etcdsnapshots/finalizers]
  verbs: [update]
- apiGroups: [etcd-operator.cozystack.io]
  resources: [etcdclusters/status, etcdmembers/status, etcdsnapshots/status]
  verbs: [get, patch, update]
- apiGroups: [etcd-operator.cozystack.io]
  resources: [etcdmembers, etcdsnapshots]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [policy]
  resources: [poddisruptionbudgets]
  verbs: [create, delete, get, list, patch, update, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: etcd-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: etcd-operator-manager-role
subjects:
- kind: ServiceAccount
  name: etcd-operator-controller-manager
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: etcd-operator-leader-election-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: [configmaps]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: etcd-operator-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: etcd-operator-leader-election-role
subjects:
- kind: ServiceAccount
  name: etcd-operator-controller-manager
  namespace: {{ .Release.Namespace }}
