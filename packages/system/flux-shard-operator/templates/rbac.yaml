kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: flux-shard-operator
rules:
# Placement: watch tenant HelmReleases (metadata only) and relabel them.
- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources: ["helmreleases"]
  verbs: ["get", "list", "watch", "patch"]
# Placement: record the tenant->shard assignment on tenant namespaces.
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "patch"]
# Provisioner: manage helm-controller-shard<i> Deployments (cloned from the
# flux-aio Deployment) and retire the legacy flux-tenants Deployment.
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Leader election.
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
