fluxShardOperator:
  image: ghcr.io/cozystack/cozystack/flux-shard-operator:latest
  debug: false
  replicas: 2
  ## Number of helm-controller shards to provision and distribute tenants
  ## over. Ship at 1 (≈ today's single tenant shard), raise gradually.
  shardCount: 1
  ## Load spread ratio (maxLoad-minLoad)/avgLoad above which tenants are
  ## rebalanced between shards.
  rebalanceThreshold: 0.25
  ## Pin heavy tenants to dedicated shards, e.g.:
  ##   pinnedTenants:
  ##     tenant-bigone: shard3
  pinnedTenants: {}
  shard:
    ## --concurrent for each shard helm-controller.
    concurrent: 5
    ## Resources of each shard helm-controller; empty values inherit the
    ## flux-aio helm-controller resources.
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        memory: 1Gi
