{{- /*
  updateMode is Initial, not Auto. In Auto mode the VPA Updater evicts running
  pods to apply new recommendations. During install that eviction churn
  recreates pods faster than Cilium releases their endpoint IPs, tripping the
  cluster-pool IPAM "IP already in use" (putEndpointIdInvalid) leak: a pod gets
  wedged in ContainerCreating and the install stalls (e.g. vmstorage/vmagent
  evictions wedging vmalertmanager / fluent-bit). Initial sets requests at pod
  creation without ever evicting, which removes the trigger. Do not switch back
  to Auto without first fixing the underlying Cilium IP-reuse race.
*/ -}}
{{- range .Values.metricsStorages }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-vminsert-{{ .name }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vminsert-{{ .name }}
  updatePolicy:
    updateMode: Initial
  resourcePolicy:
    containerPolicies:
      - containerName: vminsert
        minAllowed:
          {{- if and .vminsert .vminsert.minAllowed }}
          {{- toYaml .vminsert.minAllowed | nindent 10 }}
          {{- else }}
          cpu: 25m
          memory: 64Mi
          {{- end }}
        maxAllowed:
          {{- if and .vminsert .vminsert.maxAllowed }}
          {{- toYaml .vminsert.maxAllowed | nindent 10 }}
          {{- else }}
          cpu: 2000m
          memory: 4Gi
          {{- end }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-vmselect-{{ .name }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: vmselect-{{ .name }}
  updatePolicy:
    updateMode: Initial
  resourcePolicy:
    containerPolicies:
      - containerName: vmselect
        minAllowed:
          {{- if and .vmselect .vmselect.minAllowed }}
          {{- toYaml .vmselect.minAllowed | nindent 10 }}
          {{- else }}
          cpu: 200m
          memory: 512Mi
          {{- end }}
        maxAllowed:
          {{- if and .vmselect .vmselect.maxAllowed }}
          {{- toYaml .vmselect.maxAllowed | nindent 10 }}
          {{- else }}
          cpu: 4000m
          memory: 8Gi
          {{- end }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-vmstorage-{{ .name }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: vmstorage-{{ .name }}
  updatePolicy:
    updateMode: Initial
  resourcePolicy:
    containerPolicies:
      - containerName: vmstorage
        minAllowed:
          {{- if and .vmstorage .vmstorage.minAllowed }}
          {{- toYaml .vmstorage.minAllowed | nindent 10 }}
          {{- else }}
          cpu: 200m
          memory: 512Mi
          {{- end }}
        maxAllowed:
          {{- if and .vmstorage .vmstorage.maxAllowed }}
          {{- toYaml .vmstorage.maxAllowed | nindent 10 }}
          {{- else }}
          cpu: 4000m
          memory: 8Gi
          {{- end }}
{{- end }}
{{- range .Values.logsStorages }}
