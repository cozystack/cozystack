{{- $solver := (index .Values._cluster "solver") | default "http01" }}
{{- $clusterIssuer := (index .Values._cluster "issuer-name") | default "letsencrypt-prod" }}
{{- $ingress := .Values._namespace.ingress }}
{{- $host := .Values._namespace.host }}
{{- $gatewayEnabled := (index .Values._cluster "gateway-enabled") | default "false" }}
{{- $wildcardSecret := (index .Values._cluster "wildcard-secret-name") | default "" }}

{{- /*
  OIDC (see values.yaml — oidc.mode).
  System        → chart-owned Keycloak client + client-secret + role
                  mapping via role_attribute_path.
  CustomConfig  → operator-supplied auth.generic_oauth payload — either
                  inline as a map (customConfig.config), or as a Secret
                  with a ready-made ini fragment
                  (customConfig.secretRef.name). XOR-guarded via the
                  assertCustomConfigXor helper.
  None          → no auth.generic_oauth section, no OIDC env — the
                  admin_user/admin_password Secret remains the only auth
                  path.
*/}}
{{- $oidcMode := .Values.oidc.mode | default "None" }}
{{- if eq $oidcMode "CustomConfig" }}
{{-   include "monitoring.oidc.assertCustomConfigXor" . }}
{{- end }}
{{- /*
  Symmetric assertions with templates/grafana/oidc-keycloak.yaml so a
  missing platform OIDC feature or missing Keycloak operator CRD
  hard-fails the render instead of bringing Grafana up with an
  `auth.generic_oauth` block pointing at a client that never gets
  provisioned.
*/}}
{{- if eq $oidcMode "System" }}
{{-   include "monitoring.oidc.assertSystemEnabled" . }}
{{-   include "monitoring.oidc.assertSystemKeycloakCRD" . }}
{{- end }}
{{- $customInline := (.Values.oidc.customConfig.config | default dict) }}
{{- $customSecretRefName := dig "secretRef" "name" "" (.Values.oidc.customConfig | default dict) }}
{{- $useCustomInline := and (eq $oidcMode "CustomConfig") (gt (len $customInline) 0) }}
{{- $useCustomSecretRef := and (eq $oidcMode "CustomConfig") (ne $customSecretRefName "") }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    log:
      mode: "console"
    auth:
      disable_login_form: "false"
    database:
      type: postgres
      name: ${GF_DATABASE_NAME}
      host: ${GF_DATABASE_HOST}
      user: ${GF_DATABASE_USER}
      password: ${GF_DATABASE_PASSWORD}
      #ssl_mode: require
    server:
      root_url: "https://{{ printf "grafana.%s" (.Values.host | default $host) }}"
    security:
      admin_user: user
      admin_password: ${GF_PASSWORD}
    plugins:
      allow_loading_unsigned_plugins: "victoriametrics-logs-datasource"
    {{- if eq $oidcMode "System" }}
    auth.generic_oauth:
      enabled: "true"
      name: "Keycloak"
      client_id: {{ include "monitoring.oidc.clientId" . | quote }}
      client_secret: "${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}"
      auth_url: "{{ include "monitoring.oidc.systemIssuerURL" . }}/protocol/openid-connect/auth"
      token_url: "{{ include "monitoring.oidc.systemIssuerURL" . }}/protocol/openid-connect/token"
      api_url: "{{ include "monitoring.oidc.systemIssuerURL" . }}/protocol/openid-connect/userinfo"
      scopes: "openid email profile groups {{ include "monitoring.oidc.audienceScopeName" . }}"
      role_attribute_path: {{ include "monitoring.oidc.roleAttributePath" . | quote }}
      allow_assign_grafana_admin: {{ include "monitoring.oidc.allowAssignGrafanaAdmin" . | quote }}
      email_attribute_path: "email"
      auto_login: "false"
    {{- else if $useCustomInline }}
    auth.generic_oauth:
      {{- toYaml $customInline | nindent 6 }}
    {{- end }}
  deployment:
    spec:
      replicas: 2
      template:
        spec:
          containers:
            - name: grafana
              resources: {{- toYaml .Values.grafana.resources | nindent 16 }}
              image: "{{ $.Files.Get "images/grafana.tag" | trim }}"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
              readinessProbe:
                failureThreshold: 3
              env:
              #- name: GF_INSTALL_PLUGINS
              #  value: grafana-worldmap-panel,natel-discrete-panel
              - name: GF_PATHS_PLUGINS
                value: /var/lib/grafana-plugins
              - name: ONCALL_API_URL
                value: http://grafana-oncall-engine:8080
              - name: GF_DATABASE_HOST
                value: "grafana-db-rw:5432"
              - name: GF_DATABASE_PASSWORD
                valueFrom: { secretKeyRef: { name: grafana-db-app, key: password } }
              - name: GF_DATABASE_NAME
                value: "app"
              - name: GF_DATABASE_USER
                value: "app"
              - name: GF_PASSWORD
                valueFrom: { secretKeyRef: { name: grafana-admin-password, key: password } }
              - name: GF_SECURITY_ADMIN_USER
                valueFrom:
                  secretKeyRef:
                    key: user
                    name: grafana-admin-password
              - name: GF_SECURITY_ADMIN_PASSWORD
                valueFrom:
                  secretKeyRef:
                    key: password
                    name: grafana-admin-password
              {{- if eq $oidcMode "System" }}
              - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: {{ include "monitoring.oidc.clientSecretName" . }}
                    key: client-secret
              {{- end }}
              {{- if $useCustomSecretRef }}
              - name: GF_PATHS_CUSTOM_INI
                value: /etc/grafana/oidc/auth.ini
              {{- end }}
              {{- if $useCustomSecretRef }}
              volumeMounts:
                - name: oidc-custom-ini
                  mountPath: /etc/grafana/oidc
                  readOnly: true
              {{- end }}
          {{- if $useCustomSecretRef }}
          volumes:
            - name: oidc-custom-ini
              secret:
                secretName: {{ $customSecretRefName }}
          {{- end }}
  {{- if ne $gatewayEnabled "true" }}
  ingress:
    {{- /* Operator wildcard mode: nginx serves the default SSL cert, so skip per-host ACME. */}}
    {{- if not $wildcardSecret }}
    metadata:
      annotations:
        {{- if eq $solver "http01" }}
        acme.cert-manager.io/http01-ingress-ingressclassname: "{{ $ingress }}"
        {{- end }}
        cert-manager.io/cluster-issuer: {{ $clusterIssuer }}
    {{- end }}
    spec:
      ingressClassName: "{{ $ingress }}"
      rules:
        - host: "{{ printf "grafana.%s" (.Values.host | default $host) }}"
          http:
            paths:
              - backend:
                  service:
                    name: grafana-service
                    port:
                      number: 3000
                path: /
                pathType: Prefix
      tls:
      - hosts:
        - "{{ printf "grafana.%s" (.Values.host | default $host) }}"
        {{- /* Operator wildcard mode: no per-host secret — ingress-nginx falls
               back to the default SSL certificate while the tls section keeps
               the HTTP-to-HTTPS redirect enforced. */}}
        {{- if not $wildcardSecret }}
        secretName: grafana-ingress-tls
        {{- end }}
  {{- end }}
