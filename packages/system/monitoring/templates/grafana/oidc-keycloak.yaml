{{- /*
  Phase 1 — System mode: render one per-instance Keycloak client, a
  per-instance audience client scope, and the three role-mapping
  groups (`-admin` / `-editor` / `-viewer`) inside the platform `cozy`
  realm.

  The clientId is namespace-prefixed so it is globally unique across
  the realm; the audience scope binds `id_token.aud` to that clientId
  so a token minted for one Monitoring instance is rejected by
  another's Grafana — the per-instance isolation primitive in the
  absence of per-tenant realms.

  Nothing is rendered for `mode: CustomConfig` or `mode: None`: in
  those modes `cozy` is not in the path.

  The `_cluster.oidc-enabled` guard catches the case where an
  operator toggles `mode: System` without the platform-level OIDC
  feature (authentication.oidc.enabled) being on — the Keycloak
  operator CRDs would not be present and the chart would silently
  no-op without the fail-fast.

  The three KeycloakRealmGroup objects are chart-owned but their
  membership is not — a Keycloak operator adds users to them via the
  Keycloak UI or via a KeycloakRealmUser CR. Grafana's
  `role_attribute_path` (see grafana.yaml) evaluates group membership
  on login and assigns Admin / Editor / Viewer accordingly.
*/}}
{{- if eq .Values.oidc.mode "System" }}
{{-   include "monitoring.oidc.assertSystemEnabled" . }}
{{-   if .Capabilities.APIVersions.Has "v1.edp.epam.com/v1" }}
{{-     $clientId := include "monitoring.oidc.clientId" . }}
{{-     $scopeName := include "monitoring.oidc.audienceScopeName" . }}
{{-     $clientSecretName := include "monitoring.oidc.clientSecretName" . }}
{{-     $grafanaHost := include "monitoring.oidc.grafanaHost" . }}
---
apiVersion: v1.edp.epam.com/v1
kind: KeycloakClientScope
metadata:
  name: {{ $scopeName }}
  namespace: {{ .Release.Namespace }}
spec:
  name: {{ $scopeName }}
  realmRef:
    name: keycloakrealm-cozy
    kind: ClusterKeycloakRealm
  description: "Per-instance audience for Grafana {{ .Release.Name }}"
  protocol: openid-connect
  default: false
  attributes:
    "include.in.token.scope": "true"
  protocolMappers:
    - name: audience
      protocol: openid-connect
      protocolMapper: "oidc-audience-mapper"
      config:
        "included.client.audience": {{ $clientId | quote }}
        "id.token.claim": "true"
        "access.token.claim": "true"
        "introspection.token.claim": "true"
        "lightweight.claim": "false"
---
apiVersion: v1.edp.epam.com/v1
kind: KeycloakClient
metadata:
  name: {{ $clientId }}
  namespace: {{ .Release.Namespace }}
spec:
  clientId: {{ $clientId }}
  name: {{ $clientId }}
  realmRef:
    name: keycloakrealm-cozy
    kind: ClusterKeycloakRealm
  public: false
  directAccess: false
  advancedProtocolMappers: true
  secret: "${{ $clientSecretName }}:client-secret"
  webUrl: "https://{{ $grafanaHost }}"
  redirectUris:
    - "https://{{ $grafanaHost }}/login/generic_oauth"
  defaultClientScopes:
    - groups
    - {{ $scopeName }}
  attributes:
    "post.logout.redirect.uris": "+"
---
apiVersion: v1.edp.epam.com/v1
kind: KeycloakRealmGroup
metadata:
  name: {{ printf "%s-admin" $clientId }}
  namespace: {{ .Release.Namespace }}
spec:
  name: {{ printf "%s-admin" $clientId }}
  realmRef:
    name: keycloakrealm-cozy
    kind: ClusterKeycloakRealm
---
apiVersion: v1.edp.epam.com/v1
kind: KeycloakRealmGroup
metadata:
  name: {{ printf "%s-editor" $clientId }}
  namespace: {{ .Release.Namespace }}
spec:
  name: {{ printf "%s-editor" $clientId }}
  realmRef:
    name: keycloakrealm-cozy
    kind: ClusterKeycloakRealm
---
apiVersion: v1.edp.epam.com/v1
kind: KeycloakRealmGroup
metadata:
  name: {{ printf "%s-viewer" $clientId }}
  namespace: {{ .Release.Namespace }}
spec:
  name: {{ printf "%s-viewer" $clientId }}
  realmRef:
    name: keycloakrealm-cozy
    kind: ClusterKeycloakRealm
{{-   end }}
{{- end }}
