{{- /*
  Persistent Secret carrying the confidential OIDC client secret.

  Consumed by two parties:
    1. The EDP-Keycloak operator, referenced from oidc-keycloak.yaml
       via the `$<secret>:client-secret` syntax on `spec.secret`.
    2. The Grafana pod, referenced from grafana.yaml as
       `GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET` env — Grafana's `.ini`
       supports `${VAR}` interpolation.

  Random on first install, preserved on upgrades via `lookup` (same
  pattern as packages/system/dashboard/templates/keycloakclient.yaml).
  Rotating the value requires deleting the Secret and re-running the
  release.

  Rendered only for System mode. In CustomConfig mode the operator
  supplies their own credentials — either inline in
  spec.oidc.customConfig.config (plaintext) or through
  spec.oidc.customConfig.secretRef pointing at their own Secret.
*/}}
{{- $oidc := .Values.oidc | default dict }}
{{- if eq ($oidc.mode | default "None") "System" }}
{{-   $secretName := include "monitoring.oidc.clientSecretName" . }}
{{-   $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{-   $clientSecret := "" }}
{{-   if $existing }}
{{-     $existingValue := dig "data" "client-secret" "" $existing }}
{{-     if $existingValue }}
{{-       $clientSecret = $existingValue | b64dec }}
{{-     end }}
{{-   end }}
{{-   if eq $clientSecret "" }}
{{-     $clientSecret = randAlphaNum 32 }}
{{-   end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  client-secret: {{ $clientSecret | b64enc }}
{{- end }}
