---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-root
  labels:
    platform.cozystack.io/no-delete: "true"
    namespace.cozystack.io/host: {{ index .Values._cluster "root-host" | quote }}
    {{- /* Gateway attach label: when platform-level Gateway is on,
            tenant-root owns the publishing Gateway, and its own
            namespace must carry the label so the Gateway's
            allowedRoutes label-selector picks up the routes living
            here (the controller-owned http→https redirect among
            them). Conditional on _cluster.gateway-enabled so non-
            Gateway clusters keep the label absent, mirroring the
            cozystack-values-secret.yaml gating. */ -}}
    {{- if eq (toString (index .Values._cluster "gateway-enabled" | default "false")) "true" }}
    namespace.cozystack.io/gateway: tenant-root
    {{- end }}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    helm.sh/resource-policy: keep
  labels:
    platform.cozystack.io/no-delete: "true"
    sharding.fluxcd.io/key: tenants
    apps.cozystack.io/application.kind: Tenant
    apps.cozystack.io/application.group: apps.cozystack.io
    apps.cozystack.io/application.name: tenant-root
  name: tenant-root
  namespace: tenant-root
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-tenant-application-default-tenant
    namespace: cozy-system
  interval: 1m0s
  timeout: 15m0s
  valuesFrom:
    - kind: Secret
      name: cozystack-values
