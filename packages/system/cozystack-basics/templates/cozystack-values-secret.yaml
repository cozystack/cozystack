---
apiVersion: v1
kind: Secret
metadata:
  name: cozystack-values
  namespace: tenant-root
  labels:
    reconcile.fluxcd.io/watch: Enabled
    internal.cozystack.io/managed-by-cozystack: ""
type: Opaque
stringData:
  values.yaml: |
    _cluster:
      {{- .Values._cluster | toYaml | nindent 6 }}
    _namespace:
      host: {{ index .Values._cluster "root-host" | quote }}
      etcd: tenant-root
      ingress: tenant-root
      {{- /* `gateway` is conditional, the other four `_namespace` keys are
              unconditional. The `apps/tenant` chart gates tenant-root via
              `ne (include "tenant.name" .) "tenant-root"`, so the namespace.yaml
              propagation fix that consumes `tenant.gatewayEffective` never
              reaches tenant-root — and the `cozystack-values` Secret rendered
              here is the only source of `_namespace.gateway` for tenant-root's
              apps (harbor, bucket). Without this, those apps render Ingress
              instead of HTTPRoute on a cluster with `_cluster.gateway-enabled`
              set, even though the cozystack-controller has materialised the
              Gateway. Gate on the platform-level flag so non-Gateway clusters
              still see the empty string consumers default to. */ -}}
      {{- /* toString normalises both string "true" (cozystack-controller's
              wire form) and Helm-set bool true (operators using --set on
              the bare key without quoting) to the same comparable value;
              raw `eq bool string` fails the Helm template render. */ -}}
      {{- if eq (toString (index .Values._cluster "gateway-enabled" | default "false")) "true" }}
      gateway: tenant-root
      {{- end }}
      monitoring: tenant-root
      seaweedfs: tenant-root
