{{/*
  cozystack-tenant-projection-writer-policy

  Restricts who may write a TenantProjection (internal.cozystack.io) — the
  namespaced sentinel that declares which of an application's Secrets the
  CA-extraction controller publishes to the tenant as a key-free trust anchor.

  A sentinel is a DECLARATION with power: whoever creates one names a source
  Secret whose ca.crt the controller lifts into the tenant-readable
  <release>.tenant-ca projection. Forge a sentinel pointing at an attacker-seeded
  Secret and the tenant is handed a trust anchor the attacker controls — a
  spoofing / MITM primitive, delivered as vouched. Only the platform's chart
  applier has any business creating one, so this pins the writer to it.

  Who that writer is NOT, today: the tenant. Base tenant roles grant NO verb on
  internal.cozystack.io at all — that is the group's whole reason for existing,
  and it is what actually closes the tenant-shaped hole. This policy is defence
  in depth against a widened role, an operator, or any controller that gains
  write on this group. RBAC, not this policy, is the current boundary.

  Rule: a TenantProjection may be CREATEd or UPDATEd ONLY by the flux
  ServiceAccount that helm-controller runs as. Every other principal is denied.
  The CA-extraction controller writes only the sentinel's /status subresource (a
  different resource in admission terms), which this policy does not gate, so its
  status writes pass.

  Coverage — both attack shapes, and why no matchCondition or objectSelector:
   - Forge-new (CREATE) and tamper-existing (UPDATE) both carry the object, and
     matchConstraints already narrows to exactly this one custom resource, so
     every write to it is evaluated. There is nothing to filter down to with a
     matchCondition — a VAP gating a broad core resource such as Secrets has to
     match everything and then select by label, but this one matches a single
     dedicated kind.
   - An objectSelector is deliberately NOT used, and here it would be actively
     HARMFUL. A sentinel carries no label intrinsic to being a sentinel — Flux
     stamps helm.toolkit.fluxcd.io/name, but a FORGED sentinel simply would not
     carry it — so any objectSelector here would let an unlabelled forgery slip
     past the binding entirely. The resource scope is already narrow, so the
     failurePolicy: Fail blast radius is confined to TenantProjection writes (all
     of them the platform's own), not the whole cluster; no objectSelector is
     needed to bound it.

  DELETE is INTENTIONALLY ungated (operations are CREATE + UPDATE only). Deleting
  a sentinel cannot forge an anchor — it only prunes the projection through the
  owner reference, which is exactly the intended teardown path. Gating DELETE
  would also block the garbage-collector and namespace-controller from cleaning
  sentinels up during tenant teardown, wedging namespaces in Terminating. Losing
  a sentinel is an availability concern for ordinary RBAC, not an integrity one
  for this policy.

  failurePolicy is Fail: a sentinel whose write cannot be evaluated is denied,
  not admitted — fail-closed, as a trust-anchor control must be.

  BROADER THAN helm-controller, and deliberately so. cozystack runs all its flux
  controllers under ONE shared ServiceAccount named "flux" in cozy-fluxcd — the
  flux-aio Deployment sets serviceAccountName: flux, and the flux-shard-operator
  clones the base helm-controller Deployment and inherits that identity (pinned as
  ServiceAccountName "flux" by internal/fluxshardoperator/provisioner_test.go). So
  the pin admits any flux controller, not helm-controller alone. That is an
  acceptable widening: every flux controller is platform-tier, only helm-controller
  renders charts, and the tenant — the principal this gate exists to keep out — has
  no RBAC on internal.cozystack.io at all. A helm-controller-only pin is not
  available without a per-controller ServiceAccount the platform does not deploy.

  FRAGILE SEAM — the writer is pinned as a literal:
  system:serviceaccount:cozy-fluxcd:flux. The flux identity is generated by
  flux-operator/flux-aio at RUNTIME, not rendered by any chart this repo can
  `helm template`, so unlike a chart-shipped ServiceAccount it cannot be
  cross-checked statically. If cozystack's flux install ever moves its namespace or
  renames that ServiceAccount, this pin must move with it — a wrong identity here
  denies every sentinel write and no CA is ever published.
  hack/check-tenant-projection-writer-pin.bats guards the namespace against the
  flux install source and pins the SA name so a stray edit reddens CI.
*/}}
{{- $fluxWriter := "system:serviceaccount:cozy-fluxcd:flux" }}
{{- /* Render only where the ValidatingAdmissionPolicy API is served (GA since Kubernetes 1.30; the management cluster requires 1.33+, so this holds on every supported cluster). The guard keeps `helm template` and any pre-1.30 edge from emitting a resource the apiserver would reject. Same guard as packages/core/platform/templates/deletion-protection.yaml. */}}
{{- if .Capabilities.APIVersions.Has "admissionregistration.k8s.io/v1/ValidatingAdmissionPolicy" }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: cozystack-tenant-projection-writer-policy
  labels:
    internal.cozystack.io/managed-by-cozystack: ""
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
    - apiGroups: ["internal.cozystack.io"]
      apiVersions: ["v1alpha1"]
      operations: ["CREATE", "UPDATE"]
      resources: ["tenantprojections"]
  validations:
  # Allowed iff the writer is the flux ServiceAccount helm-controller runs as.
  - expression: request.userInfo.username == {{ $fluxWriter | quote }}
    messageExpression: >-
      {{ printf "a TenantProjection is a tenant trust-anchor declaration and may only be written by the flux service account (%s); " $fluxWriter | quote }} + request.userInfo.username + " is not permitted to create or modify it"
    reason: Forbidden
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: cozystack-tenant-projection-writer-policy
  labels:
    internal.cozystack.io/managed-by-cozystack: ""
spec:
  policyName: cozystack-tenant-projection-writer-policy
  validationActions: [Deny]
{{- end }}
