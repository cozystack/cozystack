suite: cozystack-values Secret for tenant-root
templates:
  - templates/cozystack-values-secret.yaml

release:
  name: cozystack-basics
  namespace: cozy-system

set:
  _cluster:
    root-host: example.org

# The `cozystack-values` Secret in tenant-root is the bottom of the
# `_namespace.*` lookup chain for tenant-root's own apps (harbor,
# bucket — both read `_namespace.gateway` to switch between Ingress
# and HTTPRoute). The `apps/tenant` chart gates tenant-root via
# `ne (include "tenant.name" .) "tenant-root"`, so the propagation
# logic that flows `tenant.gatewayEffective` into `_namespace.gateway`
# never reaches tenant-root — this Secret is the only place that
# value gets set for the root tenant.
#
# Four of the five `_namespace.*` keys (`etcd`, `ingress`,
# `monitoring`, `seaweedfs`) are always rendered, because their
# dependent platform apps are always installable in tenant-root.
# `gateway` is conditional on `_cluster.gateway-enabled`: when the
# platform-level flag is false (the default), Gateway is not
# installed, and writing `gateway: tenant-root` would point apps at a
# Gateway that doesn't exist. The fixtures below pin both halves of
# that contract.
tests:
  - it: omits _namespace.gateway when _cluster.gateway-enabled is missing (default)
    asserts:
      - notMatchRegex:
          path: stringData["values.yaml"]
          pattern: '(?m)^\s+gateway:'

  - it: omits _namespace.gateway when _cluster.gateway-enabled is "false"
    set:
      _cluster:
        gateway-enabled: "false"
    asserts:
      - notMatchRegex:
          path: stringData["values.yaml"]
          pattern: '(?m)^\s+gateway:'

  - it: emits _namespace.gateway=tenant-root when _cluster.gateway-enabled is "true"
    set:
      _cluster:
        gateway-enabled: "true"
    asserts:
      - matchRegex:
          path: stringData["values.yaml"]
          pattern: '(?m)^\s+gateway: tenant-root$'

  - it: keeps _namespace.{etcd,ingress,monitoring,seaweedfs} unconditional when Gateway is off — regression guard for a refactor that accidentally gates them on the same flag
    asserts:
      - matchRegex:
          path: stringData["values.yaml"]
          pattern: '(?m)^\s+etcd: tenant-root$'
      - matchRegex:
          path: stringData["values.yaml"]
          pattern: '(?m)^\s+ingress: tenant-root$'
      - matchRegex:
          path: stringData["values.yaml"]
          pattern: '(?m)^\s+monitoring: tenant-root$'
      - matchRegex:
          path: stringData["values.yaml"]
          pattern: '(?m)^\s+seaweedfs: tenant-root$'

  - it: keeps _namespace.{etcd,ingress,monitoring,seaweedfs} unconditional when Gateway is on — same guard, opposite mode
    set:
      _cluster:
        gateway-enabled: "true"
    asserts:
      - matchRegex:
          path: stringData["values.yaml"]
          pattern: '(?m)^\s+etcd: tenant-root$'
      - matchRegex:
          path: stringData["values.yaml"]
          pattern: '(?m)^\s+ingress: tenant-root$'
      - matchRegex:
          path: stringData["values.yaml"]
          pattern: '(?m)^\s+monitoring: tenant-root$'
      - matchRegex:
          path: stringData["values.yaml"]
          pattern: '(?m)^\s+seaweedfs: tenant-root$'
