suite: tenant-root namespace + HelmRelease
templates:
  - templates/tenant-root.yaml

release:
  name: cozystack-basics
  namespace: cozy-system

set:
  _cluster:
    root-host: example.org

# tenant-root carries the platform's root apex. Without the
# `namespace.cozystack.io/host` label set on the tenant-root namespace,
# Layer 7 (cozystack-route-hostname-policy VAP) is fail-closed and
# rejects every HTTPRoute the platform creates inside tenant-root —
# including the dashboard and harbor routes the platform itself
# publishes there. This regression would block bootstrap entirely.
# Pin the label here so a refactor of tenant-root.yaml that forgets
# the label fails CI immediately rather than at apply time.
tests:
  - it: tenant-root namespace carries namespace.cozystack.io/host label
    asserts:
      - documentIndex: 0
        equal:
          path: kind
          value: Namespace
      - documentIndex: 0
        equal:
          path: metadata.name
          value: tenant-root
      - documentIndex: 0
        equal:
          path: metadata.labels["namespace.cozystack.io/host"]
          value: example.org

  - it: host label tracks _cluster.root-host
    set:
      _cluster:
        root-host: customer1.io
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.labels["namespace.cozystack.io/host"]
          value: customer1.io

  - it: gateway label set to tenant-root when _cluster.gateway-enabled is "true"
    # Once the operator flips the platform-level Gateway flag, the
    # tenant-root namespace becomes the publishing apex; its own
    # namespace must carry the label so the Gateway's label-based
    # allowedRoutes selector picks up routes living here (the
    # controller-owned http→https redirect among them). The
    # symmetric "label absent when gateway-enabled unset/false"
    # case is enforced by the conditional `{{- if eq (toString
    # ...) "true" }}` in templates/tenant-root.yaml itself — without
    # it the platform would advertise tenant-root as a gateway-owner
    # before the operator opts in. helm-unittest in this version
    # has no notExists assertion to pin the negative path directly.
    set:
      _cluster:
        gateway-enabled: "true"
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.labels["namespace.cozystack.io/gateway"]
          value: tenant-root

  - it: tenant-root HelmRelease references the tenant-application chart
    asserts:
      - documentIndex: 1
        equal:
          path: kind
          value: HelmRelease
      - documentIndex: 1
        equal:
          path: metadata.name
          value: tenant-root
      - documentIndex: 1
        equal:
          path: spec.chartRef.name
          value: cozystack-tenant-application-default-tenant
