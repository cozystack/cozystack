suite: gateway-hostname-policy security stack (Layers 1+2+4+5 of the model)
templates:
  - templates/gateway-hostname-policy.yaml

release:
  name: cozystack-basics
  namespace: cozy-system

# After the inheritance refactor: every namespace with the label
# namespace.cozystack.io/gateway=<owner> attaches to that owner's
# Gateway, including tenant-* descendants. The previous render-time
# guard + `cozystack-gateway-attached-namespaces-policy` VAP banned
# `tenant-*` entries in publishing.gateway.attachedNamespaces under
# the assumption that listing a tenant there would let it hijack
# hostnames. That assumption no longer holds — Layer 4 (Tenant.spec.
# host VAP), Layer 5 (namespace label immutability VAP), and Layer
# 7 (HTTPRoute hostname VAP, in route-hostname-policy.yaml) already
# defend against hostname hijack independently of attach-list shape.
# Both gates are dropped; inheritance now flows via the label
# selector on Gateway.spec.listeners[].allowedRoutes.

tests:
  - it: renders 3 VAPs + 3 Bindings (6 documents total)
    asserts:
      - hasDocuments:
          count: 6

  - it: cozystack-gateway-hostname-policy targets gateway resources
    asserts:
      - documentIndex: 0
        equal:
          path: kind
          value: ValidatingAdmissionPolicy
      - documentIndex: 0
        equal:
          path: metadata.name
          value: cozystack-gateway-hostname-policy
      - documentIndex: 0
        equal:
          path: spec.matchConstraints.resourceRules[0].apiGroups
          value: ["gateway.networking.k8s.io"]
      - documentIndex: 0
        equal:
          path: spec.matchConstraints.resourceRules[0].resources
          value: ["gateways"]
      - documentIndex: 0
        equal:
          path: spec.failurePolicy
          value: Fail

  - it: cozystack-gateway-hostname-policy gates on tenant-* namespace prefix
    asserts:
      - documentIndex: 0
        equal:
          path: spec.matchConditions[0].name
          value: tenant-namespace
      - documentIndex: 0
        matchRegex:
          path: spec.matchConditions[0].expression
          pattern: 'object\.metadata\.namespace\.startsWith\("tenant-"\)'

  - it: cozystack-gateway-hostname-policy CEL validates listener hostname against namespace.cozystack.io/host
    asserts:
      - documentIndex: 0
        matchRegex:
          path: spec.variables[?(@.name=="tenantHost")].expression
          pattern: 'namespace\.cozystack\.io/host'
      - documentIndex: 0
        matchRegex:
          path: spec.validations[0].expression
          pattern: 'l\.hostname\.lowerAscii\(\)\.endsWith'
      - documentIndex: 0
        matchRegex:
          path: spec.validations[0].expression
          pattern: 'variables\.tenantHost'
      # Both operands normalized with lowerAscii() — tenantHost comes from
      # the label value, which may carry uppercase even though the listener
      # hostname is lowercase-only. Unlike the Ingress policy this one never
      # compares against the platform root host, so the normalization here
      # only stops a mixed-case apex from wrongly denying a tenant its own
      # listener.
      #
      # Both comparisons are pinned as whole operand PAIRS. This policy has
      # no runtime probe of its own — it relies on these renderings — so a
      # pattern matching a lone `.lowerAscii()` somewhere in the expression
      # would let either operand lose its normalization unnoticed.
      - documentIndex: 0
        matchRegex:
          path: spec.validations[0].expression
          pattern: 'l\.hostname\.lowerAscii\(\) == variables\.tenantHost\.lowerAscii\(\)'
      - documentIndex: 0
        matchRegex:
          path: spec.validations[0].expression
          pattern: 'l\.hostname\.lowerAscii\(\)\.endsWith\("\." \+ variables\.tenantHost\.lowerAscii\(\)\)'

  - it: cozystack-gateway-hostname-policy admits any listener hostname when the host label is absent or empty
    # Pins the documented fail-open exception, so that changing it has to be
    # a deliberate act rather than a silent one. The leading
    # `tenantHost == "" ||` admits a Gateway with any listener hostname when
    # the namespace.cozystack.io/host label is absent or empty — the
    # opposite of the sibling Route and Ingress policies, which fail closed
    # on the same input. docs/security/threat-model.md records this as the
    # platform's one fail-open exception and states that the Gateway-side
    # guarantee is conditional on the label being present; the compensating
    # control is that the platform sets the label at tenant creation and the
    # host-label policy keeps it immutable. This test asserts the shape the
    # threat model describes, so that a change to the posture shows up here
    # and gets made against that document rather than by accident.
    asserts:
      # Anchored: the empty-host short-circuit must be the FIRST operand, and
      # `||` is what makes it admit. Rewriting it to the siblings' fail-closed
      # `tenantHost == "" ? false :` breaks this pattern, which is the point.
      - documentIndex: 0
        matchRegex:
          path: spec.validations[0].expression
          pattern: '^variables\.tenantHost == "" \|\|'

  - it: cozystack-gateway-hostname-policy Binding is fail-closed (validationActions Deny)
    asserts:
      - documentIndex: 1
        equal:
          path: kind
          value: ValidatingAdmissionPolicyBinding
      - documentIndex: 1
        equal:
          path: spec.policyName
          value: cozystack-gateway-hostname-policy
      - documentIndex: 1
        equal:
          path: spec.validationActions
          value: [Deny]

  - it: cozystack-tenant-host-policy targets Tenant CRs and gates on trusted callers
    asserts:
      - documentIndex: 2
        equal:
          path: metadata.name
          value: cozystack-tenant-host-policy
      - documentIndex: 2
        equal:
          path: spec.matchConstraints.resourceRules[0].apiGroups
          value: ["apps.cozystack.io"]
      - documentIndex: 2
        equal:
          path: spec.matchConstraints.resourceRules[0].resources
          value: ["tenants"]
      - documentIndex: 2
        matchRegex:
          path: spec.variables[?(@.name=="trustedCaller")].expression
          pattern: 'system:masters'
      - documentIndex: 2
        matchRegex:
          path: spec.variables[?(@.name=="trustedCaller")].expression
          pattern: 'cozy-system'
      - documentIndex: 2
        matchRegex:
          path: spec.variables[?(@.name=="trustedCaller")].expression
          pattern: 'cozy-fluxcd'
      - documentIndex: 2
        matchRegex:
          path: spec.variables[?(@.name=="trustedCaller")].expression
          pattern: 'cozy-cert-manager'

  - it: cozystack-tenant-host-policy Binding is fail-closed
    asserts:
      - documentIndex: 3
        equal:
          path: spec.validationActions
          value: [Deny]

  - it: cozystack-namespace-host-label-policy targets core/v1 Namespace
    asserts:
      - documentIndex: 4
        equal:
          path: metadata.name
          value: cozystack-namespace-host-label-policy
      - documentIndex: 4
        equal:
          path: spec.matchConstraints.resourceRules[0].apiGroups
          value: [""]
      - documentIndex: 4
        equal:
          path: spec.matchConstraints.resourceRules[0].resources
          value: ["namespaces"]
      - documentIndex: 4
        matchRegex:
          path: spec.validations[0].messageExpression
          pattern: 'immutable'

  - it: cozystack-namespace-host-label-policy Binding is fail-closed
    asserts:
      - documentIndex: 5
        equal:
          path: spec.validationActions
          value: [Deny]
      - documentIndex: 5
        equal:
          path: spec.policyName
          value: cozystack-namespace-host-label-policy

  - it: render passes when gateway-attached-namespaces contains a tenant-* entry
    # Inheritance refactor: tenant-* in the attach list is no longer
    # a hijack vector — the parent Gateway's allowedRoutes label
    # selector already includes every tenant labelled with
    # namespace.cozystack.io/gateway=<parent>, and hostname VAPs
    # (Layers 4/5/7) defend against any tenant attempting to claim
    # a hostname outside its own apex. Render must NOT fail.
    set:
      _cluster:
        gateway-attached-namespaces: "cozy-cert-manager,tenant-alice"
    asserts:
      - hasDocuments:
          count: 6

  - it: cozystack-gateway-attached-namespaces-policy VAP is no longer rendered
    # Regression guard: the dropped VAP must not reappear in a
    # future refactor that re-introduces the tenant-* ban.
    asserts:
      - notFailedTemplate: {}
      - documentIndex: 0
        notEqual:
          path: metadata.name
          value: cozystack-gateway-attached-namespaces-policy
      - documentIndex: 2
        notEqual:
          path: metadata.name
          value: cozystack-gateway-attached-namespaces-policy
      - documentIndex: 4
        notEqual:
          path: metadata.name
          value: cozystack-gateway-attached-namespaces-policy
