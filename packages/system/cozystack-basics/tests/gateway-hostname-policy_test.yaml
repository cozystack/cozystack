suite: gateway-hostname-policy security stack (Layers 1+2+4+5 of the model)
templates:
  - templates/gateway-hostname-policy.yaml

release:
  name: cozystack-basics
  namespace: cozy-system

# After the inheritance refactor: every namespace with the label
# namespace.cozystack.io/gateway=<owner> attaches to that owner's
# Gateway, including tenant-* descendants. The previous render-time
# guard + `cozystack-gateway-attached-namespaces-policy` VAP banned
# `tenant-*` entries in publishing.gateway.attachedNamespaces under
# the assumption that listing a tenant there would let it hijack
# hostnames. That assumption no longer holds — Layer 4 (Tenant.spec.
# host VAP), Layer 5 (namespace label immutability VAP), and Layer
# 7 (HTTPRoute hostname VAP, in route-hostname-policy.yaml) already
# defend against hostname hijack independently of attach-list shape.
# Both gates are dropped; inheritance now flows via the label
# selector on Gateway.spec.listeners[].allowedRoutes.

# The template now gates on the ValidatingAdmissionPolicy API (GA since
# Kubernetes 1.30); helm-unittest's default capability set omits it, so every
# rendering test declares it, exactly as the platform deletion-protection suite.
capabilities:
  apiVersions:
    - admissionregistration.k8s.io/v1/ValidatingAdmissionPolicy

tests:
  - it: renders 3 VAPs + 3 Bindings (6 documents total)
    asserts:
      - hasDocuments:
          count: 6

  - it: cozystack-gateway-hostname-policy targets gateway resources
    asserts:
      - documentIndex: 0
        equal:
          path: kind
          value: ValidatingAdmissionPolicy
      - documentIndex: 0
        equal:
          path: metadata.name
          value: cozystack-gateway-hostname-policy
      - documentIndex: 0
        equal:
          path: spec.matchConstraints.resourceRules[0].apiGroups
          value: ["gateway.networking.k8s.io"]
      - documentIndex: 0
        equal:
          path: spec.matchConstraints.resourceRules[0].resources
          value: ["gateways"]
      - documentIndex: 0
        equal:
          path: spec.failurePolicy
          value: Fail

  - it: cozystack-gateway-hostname-policy gates on tenant-* namespace prefix
    asserts:
      - documentIndex: 0
        equal:
          path: spec.matchConditions[0].name
          value: tenant-namespace
      - documentIndex: 0
        matchRegex:
          path: spec.matchConditions[0].expression
          pattern: 'object\.metadata\.namespace\.startsWith\("tenant-"\)'

  - it: cozystack-gateway-hostname-policy CEL validates listener hostname against namespace.cozystack.io/host
    asserts:
      - documentIndex: 0
        matchRegex:
          path: spec.variables[?(@.name=="tenantHost")].expression
          pattern: 'namespace\.cozystack\.io/host'
      - documentIndex: 0
        matchRegex:
          path: spec.validations[0].expression
          pattern: 'l\.hostname\.endsWith'
      - documentIndex: 0
        matchRegex:
          path: spec.validations[0].expression
          pattern: 'variables\.tenantHost'

  - it: cozystack-gateway-hostname-policy Binding is fail-closed (validationActions Deny)
    asserts:
      - documentIndex: 1
        equal:
          path: kind
          value: ValidatingAdmissionPolicyBinding
      - documentIndex: 1
        equal:
          path: spec.policyName
          value: cozystack-gateway-hostname-policy
      - documentIndex: 1
        equal:
          path: spec.validationActions
          value: [Deny]

  - it: cozystack-tenant-host-policy targets Tenant CRs and gates on trusted callers
    asserts:
      - documentIndex: 2
        equal:
          path: metadata.name
          value: cozystack-tenant-host-policy
      - documentIndex: 2
        equal:
          path: spec.matchConstraints.resourceRules[0].apiGroups
          value: ["apps.cozystack.io"]
      - documentIndex: 2
        equal:
          path: spec.matchConstraints.resourceRules[0].resources
          value: ["tenants"]
      - documentIndex: 2
        matchRegex:
          path: spec.variables[?(@.name=="trustedCaller")].expression
          pattern: 'system:masters'
      - documentIndex: 2
        matchRegex:
          path: spec.variables[?(@.name=="trustedCaller")].expression
          pattern: 'cozy-system'
      - documentIndex: 2
        matchRegex:
          path: spec.variables[?(@.name=="trustedCaller")].expression
          pattern: 'cozy-fluxcd'
      - documentIndex: 2
        matchRegex:
          path: spec.variables[?(@.name=="trustedCaller")].expression
          pattern: 'cozy-cert-manager'

  - it: cozystack-tenant-host-policy Binding is fail-closed
    asserts:
      - documentIndex: 3
        equal:
          path: spec.validationActions
          value: [Deny]

  - it: cozystack-namespace-host-label-policy targets core/v1 Namespace
    asserts:
      - documentIndex: 4
        equal:
          path: metadata.name
          value: cozystack-namespace-host-label-policy
      - documentIndex: 4
        equal:
          path: spec.matchConstraints.resourceRules[0].apiGroups
          value: [""]
      - documentIndex: 4
        equal:
          path: spec.matchConstraints.resourceRules[0].resources
          value: ["namespaces"]
      - documentIndex: 4
        matchRegex:
          path: spec.validations[0].messageExpression
          pattern: 'immutable'

  - it: cozystack-namespace-host-label-policy Binding is fail-closed
    asserts:
      - documentIndex: 5
        equal:
          path: spec.validationActions
          value: [Deny]
      - documentIndex: 5
        equal:
          path: spec.policyName
          value: cozystack-namespace-host-label-policy

  - it: render passes when gateway-attached-namespaces contains a tenant-* entry
    # Inheritance refactor: tenant-* in the attach list is no longer
    # a hijack vector — the parent Gateway's allowedRoutes label
    # selector already includes every tenant labelled with
    # namespace.cozystack.io/gateway=<parent>, and hostname VAPs
    # (Layers 4/5/7) defend against any tenant attempting to claim
    # a hostname outside its own apex. Render must NOT fail.
    set:
      _cluster:
        gateway-attached-namespaces: "cozy-cert-manager,tenant-alice"
    asserts:
      - hasDocuments:
          count: 6

  - it: cozystack-gateway-attached-namespaces-policy VAP is no longer rendered
    # Regression guard: the dropped VAP must not reappear in a
    # future refactor that re-introduces the tenant-* ban.
    asserts:
      - notFailedTemplate: {}
      - documentIndex: 0
        notEqual:
          path: metadata.name
          value: cozystack-gateway-attached-namespaces-policy
      - documentIndex: 2
        notEqual:
          path: metadata.name
          value: cozystack-gateway-attached-namespaces-policy
      - documentIndex: 4
        notEqual:
          path: metadata.name
          value: cozystack-gateway-attached-namespaces-policy
