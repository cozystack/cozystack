kamaji:
  etcd:
    deploy: false
  image:
    pullPolicy: IfNotPresent
    tag: v1.3.0@sha256:8c9af083b60600c0800eb56a2cda75f26007b7272a1cf019140de003bfce1a4d
    repository: ghcr.io/cozystack/cozystack/kamaji
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  startupProbe:
    httpGet:
      path: /healthz
      port: healthcheck
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 12
  livenessProbe:
    httpGet:
      path: /healthz
      port: healthcheck
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 1
  readinessProbe:
    httpGet:
      path: /readyz
      port: healthcheck
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 1
  extraArgs:
    - --migrate-image=ghcr.io/cozystack/cozystack/kamaji:v1.3.0@sha256:8c9af083b60600c0800eb56a2cda75f26007b7272a1cf019140de003bfce1a4d
