kamaji:
  etcd:
    deploy: false
  image:
    pullPolicy: IfNotPresent
    tag: v1.5.0-alpha.2@sha256:b40d8fd2f7ef42919f1bd0d3499a3968c3cb7bd451796661941e206f15849359
    repository: ghcr.io/cozystack/cozystack/kamaji
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  startupProbe:
    httpGet:
      path: /healthz
      port: healthcheck
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 12
  livenessProbe:
    httpGet:
      path: /healthz
      port: healthcheck
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 1
  readinessProbe:
    httpGet:
      path: /readyz
      port: healthcheck
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 1
  extraArgs:
    - --migrate-image=ghcr.io/cozystack/cozystack/kamaji:v1.5.0-alpha.2@sha256:b40d8fd2f7ef42919f1bd0d3499a3968c3cb7bd451796661941e206f15849359
