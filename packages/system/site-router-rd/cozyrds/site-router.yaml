apiVersion: cozystack.io/v1alpha1
kind: ApplicationDefinition
metadata:
  name: site-router
spec:
  application:
    kind: SiteRouter
    plural: siterouters
    singular: siterouter
    openAPISchema: |-
      {"title":"Chart Values","type":"object","properties":{"tunnel":{"description":"Site-to-site tunnel configuration.","type":"object","default":{},"required":["type"],"properties":{"type":{"description":"Tunnel protocol used to connect to the remote peer.","type":"string","default":"ipsec","enum":["ipsec"]}}},"peer":{"description":"Remote peer this router builds a tunnel to.","type":"object","default":{},"required":["address"],"properties":{"address":{"description":"Public address (IP or hostname) of the remote peer. Responder model: the remote peer dials in.","type":"string","default":""},"auth":{"description":"IPsec authentication material for the tunnel.","type":"object","default":{},"properties":{"existingSecret":{"description":"Name of an existing Secret in the tenant namespace holding the pre-shared key (key `psk`). Takes precedence over `psk` when set.","type":"string"},"psk":{"description":"IPsec pre-shared key. Autogenerated and stored in a Secret when omitted. Mutually exclusive with `existingSecret`.","type":"string"}}}}},"remoteCIDRs":{"description":"Remote networks reachable over the tunnel. Must be disjoint from the cluster pod/service/join networks (validated by the controller).","type":"array","default":[],"items":{"type":"string"}},"staticRoutes":{"description":"Optional extra static routes programmed on the router.","type":"array","default":[],"items":{"type":"object","required":["destination","nextHop"],"properties":{"destination":{"description":"Destination network in CIDR notation.","type":"string"},"nextHop":{"description":"Next-hop IP address for the destination.","type":"string"}}}},"bgp":{"description":"Optional BGP peering over the tunnel. Disabled by default.","type":"object","default":{},"required":["enabled"],"properties":{"enabled":{"description":"Enable BGP peering.","type":"boolean","default":false},"localASN":{"description":"Local autonomous system number.","type":"integer"},"neighbors":{"description":"BGP neighbors to peer with.","type":"array","items":{"type":"object","required":["address","remoteASN"],"properties":{"address":{"description":"Neighbor IP address.","type":"string"},"remoteASN":{"description":"Remote autonomous system number of the neighbor.","type":"integer"}}}}}},"resources":{"description":"Explicit CPU and memory sizing for the router VM.","type":"object","default":{},"required":["cpu","memory"],"properties":{"cpu":{"description":"CPU cores allocated to the router VM.","default":2,"pattern":"^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$","anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true},"memory":{"description":"Memory (RAM) allocated to the router VM.","default":"2Gi","pattern":"^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$","anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true}}}}}
  release:
    prefix: site-router-
    labels:
      sharding.fluxcd.io/key: tenants
    chartRef:
      kind: ExternalArtifact
