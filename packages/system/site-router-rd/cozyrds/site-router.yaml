    singular: SiteRouter
    plural: SiteRouter
    tags:
      - network
    description: Managed site-to-site router
    icon: 
    keysOrder: [["apiVersion"], ["appVersion"], ["kind"], ["metadata"], ["metadata", "name"], ["spec", "tunnel"], ["spec", "tunnel", "type"], ["spec", "peer"], ["spec", "peer", "address"], ["spec", "peer", "auth"], ["spec", "remoteCIDRs"], ["spec", "staticRoutes"], ["spec", "bgp"], ["spec", "bgp", "enabled"], ["spec", "resources"], ["spec", "resources", "cpu"], ["spec", "resources", "memory"]]
  secrets:
