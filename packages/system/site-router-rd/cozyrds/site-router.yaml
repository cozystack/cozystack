apiVersion: cozystack.io/v1alpha1
kind: ApplicationDefinition
metadata:
  name: site-router
spec:
  application:
    kind: SiteRouter
    plural: siterouters
    singular: siterouter
    openAPISchema: |-
      {"title":"Chart Values","type":"object","properties":{"tunnel":{"description":"Site-to-site tunnel configuration.","type":"object","default":{},"required":["type"],"properties":{"type":{"description":"Tunnel protocol used to connect to the remote peer.","type":"string","default":"ipsec","enum":["ipsec"]}}},"peer":{"description":"Remote peer this router builds a tunnel to.","type":"object","default":{},"required":["address"],"properties":{"address":{"description":"Public address (IP or hostname) of the remote peer. Responder model: the remote peer dials in.","type":"string","default":""},"auth":{"description":"IPsec authentication material for the tunnel.","type":"object","default":{},"properties":{"existingSecret":{"description":"Name of an existing Secret in the tenant namespace holding the pre-shared key (key `psk`). Takes precedence over `psk` when set.","type":"string"},"psk":{"description":"IPsec pre-shared key. Autogenerated and stored in a Secret when omitted. Mutually exclusive with `existingSecret`.","type":"string"}}}}},"remoteCIDRs":{"description":"Remote networks reachable over the tunnel. Must be disjoint from the cluster pod/service/join networks (validated by the controller).","type":"array","default":[],"items":{"type":"string"}},"staticRoutes":{"description":"Optional extra static routes programmed on the router.","type":"array","default":[],"items":{"type":"object","required":["destination","nextHop"],"properties":{"destination":{"description":"Destination network in CIDR notation.","type":"string"},"nextHop":{"description":"Next-hop IP address for the destination.","type":"string"}}}},"bgp":{"description":"Optional BGP peering over the tunnel. Disabled by default.","type":"object","default":{},"required":["enabled"],"properties":{"enabled":{"description":"Enable BGP peering.","type":"boolean","default":false},"localASN":{"description":"Local autonomous system number. Required when `enabled` is true; must be a valid ASN (1..4294967295).","type":"integer","maximum":4294967295,"minimum":1},"neighbors":{"description":"BGP neighbors to peer with.","type":"array","items":{"type":"object","required":["address","remoteASN"],"properties":{"address":{"description":"Neighbor IP address.","type":"string"},"remoteASN":{"description":"Remote autonomous system number of the neighbor. Must be a valid ASN (1..4294967295).","type":"integer","maximum":4294967295,"minimum":1}}}}}},"resources":{"description":"Explicit CPU and memory sizing for the router VM.","type":"object","default":{},"required":["cpu","memory"],"properties":{"cpu":{"description":"CPU topology cores allocated to the router VM. Whole cores only; a fractional quantity (e.g. \"1500m\", \"0.5\") is rejected at admission rather than silently truncated to zero.","type":"integer","default":2},"memory":{"description":"Memory (RAM) allocated to the router VM.","default":"2Gi","pattern":"^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$","anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true}}},"image":{"description":"Boot-disk image source for the router VM.","type":"object","default":{},"required":["enabled","name"],"properties":{"enabled":{"description":"Import the boot disk over HTTP from `url` instead of cloning the golden-image PVC.","type":"boolean","default":false},"name":{"description":"Golden image name in cozy-public. Cloned as the boot disk from PVC vm-default-images-<name> unless `enabled` is true.","type":"string","default":"vyos-router"},"url":{"description":"HTTP(S) URL of a VyOS qcow2/raw disk image. Used only when `enabled` is true.","type":"string","default":""}}},"managementCIDR":{"description":"Source CIDR allowed to reach the VyOS management API (SSH 22, HTTPS 443) through the first-boot firewall. This value and the controller's --management-cidr flag (T05/T06) must agree: both default to the cluster pod CIDR (10.244.0.0/16, the kube-ovn default) and must be kept consistent. On a cluster with a non-default `networking.podCIDR`, set this (and the controller's managementCidr) to that pod CIDR, or the firewall will reject the real controller source. An empty value requires `allowOpenManagement=true` (fail-closed).","type":"string","default":"10.244.0.0/16"},"allowOpenManagement":{"description":"Permit an empty `managementCIDR`, leaving the VyOS management API unrestricted (no first-boot firewall). Fail-closed by default: an empty `managementCIDR` with this false aborts rendering.","type":"boolean","default":false},"cloudInitSeed":{"description":"Opaque seed mixed into the VM firmware UUID. Change it to force a first-boot cloud-init re-run; clear it to preserve an existing VM's UUID across re-renders.","type":"string","default":""}}}
  release:
    prefix: site-router-
    labels:
      sharding.fluxcd.io/key: tenants
    chartRef:
      kind: ExternalArtifact
      name: cozystack-site-router-application-default-site-router
      namespace: cozy-system
  dashboard:
    category: NaaS
    singular: SiteRouter
    plural: SiteRouter
    tags:
      - network
    description: Managed site-to-site router
    icon: 
    keysOrder: [["apiVersion"], ["appVersion"], ["kind"], ["metadata"], ["metadata", "name"], ["spec", "tunnel"], ["spec", "tunnel", "type"], ["spec", "peer"], ["spec", "peer", "address"], ["spec", "peer", "auth"], ["spec", "remoteCIDRs"], ["spec", "staticRoutes"], ["spec", "bgp"], ["spec", "bgp", "enabled"], ["spec", "resources"], ["spec", "resources", "cpu"], ["spec", "resources", "memory"], ["spec", "image"], ["spec", "image", "name"], ["spec", "image", "enabled"], ["spec", "image", "url"], ["spec", "managementCIDR"], ["spec", "allowOpenManagement"], ["spec", "cloudInitSeed"]]
  secrets:
    exclude: []
    include:
      - resourceNames:
          - site-router-{{ .name }}-psk
  services:
    exclude: []
    include:
      - resourceNames:
          - site-router-{{ .name }}-tunnel
