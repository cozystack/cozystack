---
# == schedulingclass view cluster role ==
# Aggregated into cozy-tenant-view (and consequently use, admin, super-admin)
# Provides read-only access to SchedulingClass resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cozy:schedulingclass:view
  labels:
    rbac.cozystack.io/aggregate-to-tenant-view: "true"
rules:
- apiGroups: ["cozystack.io"]
  resources:
  - schedulingclasses
  verbs:
  - get
  - list
  - watch
