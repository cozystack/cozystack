---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cozystack-dashboard-readonly
rules:
- apiGroups:
  - cozystack.io
  resources:
  - applicationdefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - core.cozystack.io
  resources:
  - tenantmodules
  - tenantnamespaces
  - tenantsecrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - dashboard.cozystack.io
  resources:
  - '*'
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - backups.cozystack.io
  resources:
  - backupclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kubevirt.io
  resources:
  - virtualmachineinstances
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - subresources.kubevirt.io
  resources:
  - virtualmachineinstances/vnc
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cozystack-dashboard-readonly-authenticated
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cozystack-dashboard-readonly
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: system:authenticated
