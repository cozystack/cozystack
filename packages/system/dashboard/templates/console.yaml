apiVersion: apps/v1
kind: Deployment
metadata:
  name: cozy-dashboard-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: cozy-dashboard
      app.kubernetes.io/name: console
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: cozy-dashboard
        app.kubernetes.io/name: console
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - console
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - cozy-dashboard
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - image: {{ .Values.console.image | quote }}
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthcheck
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 2
          startupProbe:
            httpGet:
              path: /healthcheck
              port: 8080
              scheme: HTTP
            failureThreshold: 30
            periodSeconds: 2
          name: console
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              ephemeral-storage: 50Mi
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: []
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 0
            runAsNonRoot: true
            runAsUser: 101
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - name: console-config
              mountPath: /usr/share/nginx/html/config.json
              subPath: config.json
      volumes:
        - name: console-config
          configMap:
            name: cozy-dashboard-console-config
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      priorityClassName: system-cluster-critical
      restartPolicy: Always
      schedulerName: default-scheduler
      serviceAccountName: cozy-dashboard-console
      terminationGracePeriodSeconds: 30
