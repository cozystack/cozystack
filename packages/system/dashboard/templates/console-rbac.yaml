apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cozy-dashboard-console-config-reader
  namespace: cozy-dashboard
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  resourceNames:
  - cozy-dashboard-console-config
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cozy-dashboard-console-config-reader
  namespace: cozy-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cozy-dashboard-console-config-reader
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: system:authenticated
