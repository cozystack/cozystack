# Map of tenant StorageClasses to create, keyed by name. Normally populated by
# the parent kubernetes chart from remote-accessible LINSTOR infra classes; the
# default below is the fallback used for `helm template` / unit tests.
storageClasses:
  replicated:
    infraStorageClass: replicated
    default: true
  kubevirt:
    infraStorageClass: replicated
    default: false
csiDriver:
  image: ghcr.io/cozystack/cozystack/kubevirt-csi-driver:v1.6.0-rc.2@sha256:c1d5eefda3f1296c9e47659b734e6dcd1cdc9de40fcc1693be7d13b9889a0be6
