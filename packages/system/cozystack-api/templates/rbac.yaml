kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cozystack-api
rules:
- apiGroups: [""]
  resources: ["namespaces", "secrets", "services"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["rolebindings"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "update", "patch", "delete"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations", "validatingadmissionpolicies", "validatingadmissionpolicybindings"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["flowcontrol.apiserver.k8s.io"]
  resources: ["prioritylevelconfigurations", "flowschemas"]
  verbs: ["list", "watch"]
- apiGroups: ["cozystack.io"]
  resources: ["*"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources: ["*"]
  verbs: ["*"]
# Read-only sources for the Option (dropdown) resource providers.
- apiGroups: [""]
  resources: ["nodes", "persistentvolumeclaims"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["kubevirt.io"]
  resources: ["kubevirts"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["instancetype.kubevirt.io"]
  resources: ["virtualmachineclusterinstancetypes", "virtualmachineclusterpreferences"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["k8s.cni.cncf.io"]
  resources: ["network-attachment-definitions"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["objectstorage.k8s.io"]
  resources: ["bucketclasses"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["backups.cozystack.io"]
  resources: ["backupclasses", "plans", "backups"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["apps.cozystack.io"]
  resources: ["vmdisks"]
  verbs: ["get", "watch", "list"]
