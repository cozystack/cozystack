kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: cozystack-api
rules:
- apiGroups: [""]
  resources: ["namespaces", "secrets", "services"]
  verbs: ["get", "watch", "list"]
# The SiteRouter deny-set admission reads the cluster-wide cozystack ConfigMap to
# resolve the cluster networks a tenant's remoteCIDRs are validated against (see
# pkg/registry/apps/application/rest_siterouter.go). Without this grant every
# SiteRouter declaring remoteCIDRs is rejected with Forbidden. Scoped by name to
# the single ConfigMap the admission reads (a plain get, no list/watch).
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
  resourceNames: ["cozystack"]
# Hierarchical tenant quota admission reads the rendered ResourceQuota usage of
# a parent tenant's pool to carve a child's allocation out of what is actually
# left (see pkg/registry/apps/application/quota.go).
- apiGroups: [""]
  resources: ["resourcequotas"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["rolebindings"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "update", "patch", "delete"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations", "validatingadmissionpolicies", "validatingadmissionpolicybindings"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["flowcontrol.apiserver.k8s.io"]
  resources: ["prioritylevelconfigurations", "flowschemas"]
  verbs: ["list", "watch"]
- apiGroups: ["cozystack.io"]
  resources: ["*"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources: ["*"]
  verbs: ["*"]
# Read-only sources for the Option (dropdown) resource providers.
- apiGroups: [""]
  resources: ["nodes", "persistentvolumeclaims"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["kubevirt.io"]
  resources: ["kubevirts"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["instancetype.kubevirt.io"]
  resources: ["virtualmachineclusterinstancetypes", "virtualmachineclusterpreferences"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["k8s.cni.cncf.io"]
  resources: ["network-attachment-definitions"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["backups.cozystack.io"]
  resources: ["backupclasses", "plans", "backups"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["apps.cozystack.io"]
  resources: ["vmdisks"]
  verbs: ["get", "watch", "list"]
# The SecurityGroup resource is a projection over CiliumNetworkPolicy: the
# storage CRUDs these objects with the cozystack-api ServiceAccount.
- apiGroups: ["cilium.io"]
  resources: ["ciliumnetworkpolicies"]
  verbs: ["get", "watch", "list", "create", "update", "patch", "delete"]
