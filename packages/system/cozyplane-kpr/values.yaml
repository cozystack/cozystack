# cozyplane-kpr container image. Built and published from
# github.com/lllamnyp/cozyplane (kpr/); digest-pinned (no floating tag).
# It imports Cilium's LB control plane, so it is a large image and a SEPARATE
# component from the cozyplane agent — never co-mingled.
image: ghcr.io/lllamnyp/cozyplane-kpr@sha256:f75bb0e4f351623920f4e46da3227bb04d308e93ff171eb35ad1b4f88f7fd8c6
imagePullPolicy: IfNotPresent
imagePullSecrets: []

# The apiserver endpoint cozyplane-kpr connects to. It must NOT be the
# kubernetes.default ClusterIP: with kube-proxy gone, that VIP is unserved until
# kpr itself is running (chicken-and-egg). Point it at a real endpoint. Empty
# uses the in-cluster config (only valid where some other proxy already serves
# the ClusterIP); on Talos, values-talos.yaml sets the KubePrism local endpoint.
apiServerURL: ""

# The host cgroup2 root (bind-mounted into the pod) where socket-LB attaches,
# and the host bpffs root where the LB service/backend maps are pinned.
cgroupRoot: /host/cgroup2
bpffsRoot: /sys/fs/bpf
