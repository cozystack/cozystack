apiVersion: v1
kind: ServiceAccount
metadata:
  name: cozyplane-kpr
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cozyplane-kpr
rules:
  # The LB control plane watches Services + their endpoints and node/topology.
  - apiGroups: [""]
    resources: [services, endpoints, nodes, namespaces, pods]
    verbs: [get, list, watch]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [get, list, watch]
  # Leader election.
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  # Cilium's imported cells reconcile their own CRDs (CiliumNode, LB IP pools, …).
  - apiGroups: [cilium.io]
    resources: ["*"]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cozyplane-kpr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cozyplane-kpr
subjects:
  - kind: ServiceAccount
    name: cozyplane-kpr
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cozyplane-kpr
  namespace: {{ .Release.Namespace }}
  labels: {app: cozyplane-kpr}
spec:
  selector:
    matchLabels: {app: cozyplane-kpr}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels: {app: cozyplane-kpr}
    spec:
      serviceAccountName: cozyplane-kpr
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Ensure bpffs is mounted on the host so the LB map pins are a real
        # bpffs and outlive the process; Bidirectional propagation pushes it to
        # the node. Cilium's DaemonSet does the equivalent.
        - name: mount-bpffs
          image: busybox:1.36
          command: ["sh", "-c", "mount | grep -q 'bpf on {{ .Values.bpffsRoot }} ' || mount -t bpf bpf {{ .Values.bpffsRoot }}"]
          securityContext:
            privileged: true
          volumeMounts:
            - {name: bpffs, mountPath: {{ .Values.bpffsRoot }}, mountPropagation: Bidirectional}
      containers:
        - name: kpr
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          args:
            {{- if .Values.apiServerURL }}
            - --k8s-api-server-urls={{ .Values.apiServerURL }}
            {{- end }}
          env:
            - {name: KPR_CGROUP_ROOT, value: {{ .Values.cgroupRoot | quote }}}
            - {name: KPR_BPFFS_ROOT, value: {{ .Values.bpffsRoot | quote }}}
          securityContext:
            privileged: true
          volumeMounts:
            - {name: bpffs, mountPath: {{ .Values.bpffsRoot }}, mountPropagation: Bidirectional}
            - {name: cgroup2, mountPath: {{ .Values.cgroupRoot }}}
      volumes:
        - name: bpffs
          hostPath: {path: {{ .Values.bpffsRoot }}, type: DirectoryOrCreate}
        - name: cgroup2
          hostPath: {path: /sys/fs/cgroup, type: Directory}
