{{- $gatewayAPI := (index .Values._cluster "gateway-api") | default "false" }}
{{- $gateway := .Values._namespace.gateway | default "" }}
{{- $host := .Values._namespace.host }}
{{- $bucketHost := printf "%s.%s" .Values.bucketName $host }}

{{- if and (eq $gatewayAPI "true") (ne $gateway "") }}
{{ include "cozy-lib.gateway.httpRoute" (dict "ctx" . "name" (printf "%s-ui" .Values.bucketName) "hostname" $bucketHost "backendName" (printf "%s-ui" .Values.bucketName) "backendPort" 8080 "certRef" (printf "%s-ui-gateway-tls" .Values.bucketName)) }}
{{- end }}
