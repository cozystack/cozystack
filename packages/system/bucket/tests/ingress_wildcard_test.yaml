suite: bucket ingress wildcard mode drops per-host ACME
templates:
  - templates/ingress.yaml

release:
  name: bucket
  namespace: tenant-root

# bucket gates its Ingress on an empty _namespace.gateway. In wildcard
# mode the cert-manager + http01 annotations and the per-host tls
# secretName are dropped (the tls section stays so the HTTPS redirect
# keeps working against the default SSL certificate); the other nginx
# annotations stay so the annotations map is never empty.

tests:
  - it: drops cert-manager annotation and tls secretName when wildcard secret is set
    set:
      _namespace:
        host: example.org
        ingress: tenant-root
        gateway: ""
      _cluster:
        issuer-name: letsencrypt-prod
        solver: http01
        wildcard-secret-name: wildcard-tls
    asserts:
      - equal:
          path: kind
          value: Ingress
      - notExists:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
      - exists:
          path: spec.tls
      - notExists:
          path: spec.tls[0].secretName
      - exists:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-body-size"]

  - it: keeps cert-manager annotation and tls secretName without wildcard secret
    set:
      _namespace:
        host: example.org
        ingress: tenant-root
        gateway: ""
      _cluster:
        issuer-name: letsencrypt-prod
        solver: http01
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: letsencrypt-prod
      - exists:
          path: spec.tls[0].secretName

  # WS2 / #2400 child-tenant blast radius, pinned as a contract: the
  # wildcard secret name rides _cluster, which packages/apps/tenant copies
  # verbatim into every child tenant. A child inheriting the root ingress
  # has nested service hosts (<svc>.<tenant>.<root-host>) that a
  # single-label *.<root-host> does NOT cover, yet the service still drops
  # its per-host cert and falls back to the root default certificate. This
  # is the documented reason shared wildcard issuance is opt-in / off by
  # default. Here _namespace.host is the child apex (alice.example.org),
  # so the bucket host is two labels deep under the wildcard.
  - it: nested child-tenant host drops per-host ACME when wildcard mode is active
    set:
      bucketName: data
      _namespace:
        host: alice.example.org
        ingress: tenant-root
        gateway: ""
      _cluster:
        issuer-name: letsencrypt-prod
        solver: dns01
        wildcard-secret-name: cozystack-wildcard-tls
    asserts:
      - equal:
          path: spec.rules[0].host
          value: data.alice.example.org
      - notExists:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
      - notExists:
          path: spec.tls[0].secretName
