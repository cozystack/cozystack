{{- if .Values.webhook.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "snapshot-validation-webhook.fullname" . }}
  labels:
    {{- include "snapshot-validation-webhook.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.webhook.replicaCount }}
  revisionHistoryLimit: {{ .Values.webhook.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "snapshot-validation-webhook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.webhook.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "snapshot-validation-webhook.selectorLabels" . | nindent 8 }}
        {{- with .Values.webhook.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.webhook.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "snapshot-validation-webhook.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.webhook.podSecurityContext | nindent 8 }}
      {{- with .Values.webhook.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: {{ include "snapshot-validation-webhook.name" . }}
          securityContext:
            {{- toYaml .Values.webhook.securityContext | nindent 12 }}
          image: "{{ .Values.webhook.image.repository }}:{{ .Values.webhook.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.webhook.image.pullPolicy }}
          args:
            {{- range $flag, $val := .Values.webhook.args }}
            - --{{ $flag | kebabcase }}={{ $val }}
            {{- end }}
          ports:
            - name: https
              containerPort: {{ .Values.webhook.args.port | default 8443 }}
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/snapshot-validation
              name: tls-config
          # cozystack: startupProbe covers the post-Started window where the
          # webhook binary is coming up but has not yet bound `:8443` — the
          # upstream chart hard-codes liveness without any startup grace
          # (kubelet defaults periodSeconds=10 failureThreshold=3 = ~30s from
          # container Started to first liveness kill), which is insufficient
          # on a loaded E2E sandbox and cascades into install-wide failure
          # via `snapshot-controller` HR → piraeus / linstor / ~20 downstream
          # operators. See cozystack/cozystack#3203.
          #
          # Budget: 5s * 45 = 225s. Sized to comfortably clear the actual
          # bind-time on a loaded sandbox (single-digit-second range in the
          # healthy case) while staying well inside the operator's default
          # 10m HR install timeout (--helmrelease-install-timeout in
          # cmd/cozystack-operator/main.go). A larger budget would race the
          # HR timeout.
          #
          # This fix covers the "container Started, still binding :8443"
          # window. It does NOT cover a separate class of failure where the
          # container self-exits (e.g. cert-mount race producing an empty
          # tls-config volume); that would need an initContainer that waits
          # for the Certificate's Secret to have non-empty tls.crt/tls.key.
          # Filed as a follow-up on cozystack/cozystack#3203.
          startupProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            periodSeconds: 5
            failureThreshold: 45
          livenessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
          resources:
            {{- toYaml .Values.webhook.resources | nindent 12 }}
      volumes:
        - name: tls-config
          secret:
            secretName: {{ include "snapshot-validation-webhook.certifcateName" . }}
      {{- with .Values.webhook.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhook.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.webhook.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.webhook.topologySpreadConstraints | nindent 8 }}
      {{- end }}
      {{- with .Values.webhook.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: {{ .Values.webhook.hostNetwork }}
      {{- with .Values.webhook.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      dnsPolicy: {{ .Values.webhook.dnsPolicy }}
{{- end }}
