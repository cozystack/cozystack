apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: alerts-gpu-recording.rules
spec:
  groups:
    - name: gpu.recording.cluster.1m
      interval: 1m
      params: {}
      rules:
        - record: cluster:gpu_count:total
          expr: count(group by (UUID) (DCGM_FI_DEV_GPU_UTIL))
        # Kube-allocated GPU count: GPUs requested by *active* pods — Pending
        # and Running only. Source of truth for "what tenants asked for" — used
        # for capacity planning and billing. Includes system pods so it stays
        # consistent with cluster:gpu_count:total when computing :free.
        #
        # Phase filter via group_left() on kube_pod_status_phase matches the
        # canonical pattern from k8s.rules.container_resource.yaml. Without it
        # kube-state-metrics keeps series for Failed/Succeeded pods until the
        # apiserver garbage-collects them, which inflates billing hours and
        # can push :free negative.
        - record: cluster:gpu_count:allocated
          expr: |
            sum(
              kube_pod_container_resource_requests{resource="nvidia_com_gpu"}
              * on (namespace, pod) group_left() max by (namespace, pod) (
                kube_pod_status_phase{phase=~"Pending|Running"} == 1
              )
            )
        # clamp_min guards against transients at DCGM/kube-state-metrics
        # restart where cluster:gpu_count:total dips before :allocated catches
        # up, or rare label drift between the two sources.
        - record: cluster:gpu_count:free
          expr: clamp_min(cluster:gpu_count:total - (cluster:gpu_count:allocated or vector(0)), 0)
        - record: cluster:gpu_util:avg
          expr: avg(DCGM_FI_DEV_GPU_UTIL{namespace!="", namespace!~"cozy-.*|kube-.*"})
        - record: cluster:gpu_power_watts:sum
          expr: sum(DCGM_FI_DEV_POWER_USAGE)

    - name: gpu.recording.namespace.1m
      interval: 1m
      params: {}
      rules:
        # Kube-requested GPU count per namespace — billable view, includes
        # Pending pods. Use this for GPU-hour reporting via
        # sum_over_time(...[1h:1m])/60.
        #
        # Filters cozy-*/kube-* so the namespace set here matches every
        # other namespace:* rule below. This keeps the $namespace variable
        # in the tenant dashboard consistent with panels that read filtered
        # rules — otherwise picking a system ns from the dropdown leaves
        # half the panels empty while others show values.
        #
        # Trade-off: per-namespace GPU accounting for system workloads is
        # no longer available here. If it's ever needed (e.g. operator
        # pods pinning tenant GPUs), add a separate rule like
        # system:gpu_count:allocated rather than widening this one — the
        # "billable tenant view" invariant is relied on by tenants.json
        # and keeping it narrow protects consumers from the asymmetry
        # that triggered this filter in the first place.
        #
        # Note: sum(namespace:gpu_count:allocated) no longer equals
        # cluster:gpu_count:allocated — the cluster-level rule intentionally
        # keeps system pods to stay aligned with cluster:gpu_count:total
        # when computing :free.
        - record: namespace:gpu_count:allocated
          expr: |
            sum by (namespace) (
              kube_pod_container_resource_requests{resource="nvidia_com_gpu", namespace!="", namespace!~"cozy-.*|kube-.*"}
              * on (namespace, pod) group_left() max by (namespace, pod) (
                kube_pod_status_phase{phase=~"Pending|Running"} == 1
              )
            )
        - record: namespace:gpu_util:avg
          expr: avg by (namespace) (DCGM_FI_DEV_GPU_UTIL{namespace!="", namespace!~"cozy-.*|kube-.*"})
        - record: namespace:tensor_active:avg
          expr: avg by (namespace) (DCGM_FI_PROF_PIPE_TENSOR_ACTIVE{namespace!="", namespace!~"cozy-.*|kube-.*"})
        - record: namespace:fb_used_bytes:sum
          expr: sum by (namespace) (DCGM_FI_DEV_FB_USED{namespace!="", namespace!~"cozy-.*|kube-.*"}) * 1048576
        - record: namespace:power_watts:sum
          expr: sum by (namespace) (DCGM_FI_DEV_POWER_USAGE{namespace!="", namespace!~"cozy-.*|kube-.*"})

    - name: gpu.recording.efficiency.1m
      interval: 1m
      params: {}
      rules:
        # Tensor hardware saturation — the honest "am I using the GPU" metric
        # for AI/LLM workloads. Unlike NVML, idle tensor cores are visible.
        # Stored as a 0..1 ratio to stay consistent with namespace:tensor_active:avg
        # and DCGM's native units. Consumers multiply by 100 at display time.
        - record: pod:tensor_saturation:avg5m
          expr: |
            avg by (Hostname, gpu, UUID, namespace, pod) (
              avg_over_time(DCGM_FI_PROF_PIPE_TENSOR_ACTIVE{namespace!="", namespace!~"cozy-.*|kube-.*"}[5m])
            )

        # Power efficiency — utilization per watt, reveals unoptimized clients.
        # Explicit on(...) pins the bigop matching set to the labels we
        # group by — protects against empty results if dcgm-exporter
        # relabeling ever diverges between the two metrics.
        - record: pod:util_per_watt:avg5m
          expr: |
            avg by (Hostname, gpu, UUID, namespace, pod) (
              avg_over_time(DCGM_FI_DEV_GPU_UTIL{namespace!="", namespace!~"cozy-.*|kube-.*"}[5m])
              / on (Hostname, gpu, UUID, namespace, pod)
              clamp_min(
                avg_over_time(DCGM_FI_DEV_POWER_USAGE{namespace!="", namespace!~"cozy-.*|kube-.*"}[5m]),
                1
              )
            )

        # Fraction of time power-throttled (TDP cap) — 1.0 = fully throttled.
        # DCGM_FI_DEV_*_VIOLATION is documented as µs but on A10/DCGM 3.x the
        # counter grows in nanoseconds in practice — divide by 1e9 to get a
        # 0..1 fraction (verified empirically when /1e6 yielded >100× reality).
        # clamp_max protects against rate() artefacts at counter resets.
        #
        # max by (Hostname, gpu, UUID) collapses duplicate series from
        # dcgm-exporter's pod-mapping labels (one physical GPU may appear
        # under multiple pod/container labels during restarts or under
        # MIG/MPS). Throttling is a physical-GPU property; taking max
        # keeps consumer avg(...) honest — a naive avg() would dilute the
        # signal by the number of pods sharing the GPU.
        - record: gpu:power_throttle_fraction:rate5m
          expr: clamp_max(max by (Hostname, gpu, UUID) (rate(DCGM_FI_DEV_POWER_VIOLATION[5m]) / 1e9), 1)

        # Fraction of time thermal-throttled.
        - record: gpu:thermal_throttle_fraction:rate5m
          expr: clamp_max(max by (Hostname, gpu, UUID) (rate(DCGM_FI_DEV_THERMAL_VIOLATION[5m]) / 1e9), 1)

    # Regression watch — the /1e9 divisor on *_VIOLATION was derived
    # empirically against DCGM 3.x on A10. If a future DCGM version
    # restores the documented µs units, pre-clamp values would exceed 1.0
    # while clamp_max(..., 1) silently masks the drift — recorded
    # throttle fractions would plateau at 1.0 and consumers would think
    # every GPU is always throttled. This alert fires on that condition
    # so we can rescale to /1e6 before dashboards start lying.
    - name: gpu.recording.throttle.validation.5m
      interval: 5m
      params: {}
      rules:
        - alert: GPUThrottleFractionOverOne
          expr: |
            max by (Hostname, gpu, UUID) (rate(DCGM_FI_DEV_POWER_VIOLATION[5m]) / 1e9) > 1
            or
            max by (Hostname, gpu, UUID) (rate(DCGM_FI_DEV_THERMAL_VIOLATION[5m]) / 1e9) > 1
          for: 15m
          labels:
            severity: warning
            component: gpu-monitoring
          annotations:
            summary: "DCGM throttle fraction exceeds 1.0 pre-clamp on {{ $labels.Hostname }}/{{ $labels.gpu }}"
            description: |
              gpu:{power,thermal}_throttle_fraction:rate5m clamps to 1.0, but the raw
              rate(DCGM_FI_DEV_*_VIOLATION)/1e9 value is already >1 on this GPU — the
              empirical nanosecond assumption is broken. Likely the DCGM exporter
              version changed and the counter now grows in its documented µs units.
              Re-verify on the exporter Pod and adjust the divisor (/1e9 → /1e6) in
              gpu.recording.efficiency.1m before dashboards plateau at 100% throttle.
