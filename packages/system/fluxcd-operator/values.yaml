flux-operator:
  fullnameOverride: flux-operator
  tolerations:
    - key: node.kubernetes.io/not-ready
      operator: Exists
      effect: NoSchedule
  hostNetwork: true
  resources:
    limits:
      cpu: 100m
      memory: 350Mi
    requests:
      cpu: 100m
      memory: 350Mi
  # Flux Status Web UI is opt-in. Override `web.enabled: true` (and configure
  # `web.config` / `web.configSecretName` / `web.ingress` as needed) to enable.
  # The upstream chart's NetworkPolicy is suppressed because Cozystack ships a
  # CiliumClusterwideNetworkPolicy that already restricts ports 8080/8081/9080.
  web:
    enabled: false
    networkPolicy:
      create: false
