hami:
  scheduler:
    kubeScheduler:
      image:
        registry: registry.k8s.io
        repository: kube-scheduler
  devicePlugin:
    runtimeClassName: nvidia
    updateStrategy:
      type: OnDelete
    # See upstream charts/hami/values.yaml for nodeConfiguration format.
    # Each entry: {"name": "node-name", "operatingmode": "hami-core", "devicesplitcount": N, ...}
    nodeConfiguration:
      config: |
        {
          "nodeconfig": []
        }
