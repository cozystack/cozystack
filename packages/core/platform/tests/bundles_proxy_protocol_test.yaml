suite: publishing.proxyProtocol bundle wiring
templates:
  - templates/bundles/system.yaml
release:
  name: cozystack
  namespace: cozy-system
tests:
  - it: emits no cozystack.ouroboros Package when proxyProtocol is false
    set:
      bundles:
        system:
          enabled: true
          variant: isp-full
      publishing:
        proxyProtocol: false
    asserts:
      - containsDocument:
          apiVersion: cozystack.io/v1alpha1
          kind: Package
          name: cozystack.ouroboros
        not: true
        documentIndex: -1

  - it: leaves cozystack.ingress-application as the bare default Package when proxyProtocol is false
    set:
      bundles:
        system:
          enabled: true
          variant: isp-full
      publishing:
        proxyProtocol: false
    documentSelector:
      path: metadata.name
      value: cozystack.ingress-application
    asserts:
      - equal:
          path: kind
          value: Package
      - equal:
          path: spec.variant
          value: default
      - notExists:
          path: spec.components

  - it: emits cozystack.ouroboros Package with resource-policy keep when proxyProtocol is true
    set:
      bundles:
        system:
          enabled: true
          variant: isp-full
      publishing:
        proxyProtocol: true
    documentSelector:
      path: metadata.name
      value: cozystack.ouroboros
    asserts:
      - equal:
          path: kind
          value: Package
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
      - equal:
          path: spec.variant
          value: default

  - it: points the host ouroboros proxy at the root-tenant ingress Service (default ingressName)
    set:
      bundles:
        system:
          enabled: true
          variant: isp-full
      publishing:
        proxyProtocol: true
    documentSelector:
      path: metadata.name
      value: cozystack.ouroboros
    asserts:
      # The host ingress-nginx is deployed by extra/ingress into the root
      # tenant namespace as <short>-ingress-controller, NOT the chart
      # default ingress-nginx-controller.cozy-ingress-nginx (which is the
      # managed-Kubernetes-tenant layout). Both are derived from
      # publishing.ingressName (default tenant-root).
      - equal:
          path: spec.components.ouroboros.values.ouroboros.proxy.target.namespace
          value: tenant-root
      - equal:
          path: spec.components.ouroboros.values.ouroboros.proxy.target.serviceName
          value: root-ingress-controller

  - it: derives the ouroboros proxy target from a non-default publishing.ingressName
    set:
      bundles:
        system:
          enabled: true
          variant: isp-full
      publishing:
        proxyProtocol: true
        ingressName: tenant-foo
    documentSelector:
      path: metadata.name
      value: cozystack.ouroboros
    asserts:
      - equal:
          path: spec.components.ouroboros.values.ouroboros.proxy.target.namespace
          value: tenant-foo
      - equal:
          path: spec.components.ouroboros.values.ouroboros.proxy.target.serviceName
          value: foo-ingress-controller

  - it: leaves cozystack.ingress-application as the bare default Package when proxyProtocol is true
    # The host PROXY-protocol config does NOT ride on the ingress-application
    # Package's component values — the ingress-system / ingress components have
    # no install: block, so PackageReconciler drops component values for them.
    # The switch is delivered via _cluster.proxy-protocol in the cozystack-values
    # Secret instead (see apps_proxy_protocol_wiring_test.yaml), so this Package
    # stays the bare default regardless of proxyProtocol.
    set:
      bundles:
        system:
          enabled: true
          variant: isp-full
      publishing:
        proxyProtocol: true
    documentSelector:
      path: metadata.name
      value: cozystack.ingress-application
    asserts:
      - equal:
          path: kind
          value: Package
      - equal:
          path: spec.variant
          value: default
      - notExists:
          path: spec.components

  - it: bundles.disabledPackages suppresses cozystack.ouroboros even when proxyProtocol is true
    set:
      bundles:
        system:
          enabled: true
          variant: isp-full
        disabledPackages:
          - cozystack.ouroboros
      publishing:
        proxyProtocol: true
    asserts:
      - containsDocument:
          apiVersion: cozystack.io/v1alpha1
          kind: Package
          name: cozystack.ouroboros
        not: true
        documentIndex: -1

  - it: renders cleanly with proxyProtocol=false and proxyProtocolAcknowledgeUnclean=true (operator acknowledged cleanup)
    set:
      bundles:
        system:
          enabled: true
          variant: isp-full
      publishing:
        proxyProtocol: false
        proxyProtocolAcknowledgeUnclean: true
    asserts:
      - containsDocument:
          apiVersion: cozystack.io/v1alpha1
          kind: Package
          name: cozystack.ouroboros
        not: true
        documentIndex: -1
      - equal:
          path: kind
          value: Package
        documentSelector:
          path: metadata.name
          value: cozystack.ingress-application
