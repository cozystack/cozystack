{{- if .Values.bundles.system.enabled }}

# Networking
{{- if eq .Values.bundles.system.variant "isp-full" }}
{{- $networkingComponents := dict -}}
{{- if .Values.networking -}}
{{- $kubeovnIpv4 := dict
  "POD_CIDR" .Values.networking.podCIDR
  "POD_GATEWAY" .Values.networking.podGateway
  "SVC_CIDR" .Values.networking.serviceCIDR
  "JOIN_CIDR" .Values.networking.joinCIDR -}}
{{- $kubeovnDict := dict "ipv4" $kubeovnIpv4 -}}
{{- if .Values.networking.kubeovn.MASTER_NODES -}}
{{- $_ := set $kubeovnDict "MASTER_NODES" .Values.networking.kubeovn.MASTER_NODES -}}
{{- end -}}
{{- $kubeovnValues := dict "kube-ovn" $kubeovnDict -}}
{{- $_ := set $networkingComponents "kubeovn" (dict "values" $kubeovnValues) -}}
{{- /* For Talos (isp-full): use KubePrism endpoint and disable cgroup autoMount */ -}}
{{- $ciliumValues := dict "cilium" (dict
  "k8sServiceHost" "localhost"
  "k8sServicePort" "7445"
  "cgroup" (dict "autoMount" (dict "enabled" false))) -}}
{{- $_ := set $networkingComponents "cilium" (dict "values" $ciliumValues) -}}
{{- end -}}
{{include "cozystack.platform.package" (list "cozystack.networking" "kubeovn-cilium" $ $networkingComponents) }}
{{include "cozystack.platform.system.common-packages" $ }}
{{include "cozystack.platform.package.default" (list "cozystack.linstor" $) }}
{{include "cozystack.platform.package" (list "cozystack.cozystack-scheduler" "linstor" $) }}
{{- end }}

{{- if eq .Values.bundles.system.variant "isp-hosted" }}
{{include "cozystack.platform.package" (list "cozystack.networking" "noop" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.cozystack-scheduler" $) }}
{{- end }}

{{- if eq .Values.bundles.system.variant "isp-full-generic" }}
{{- $networkingComponents := dict -}}
{{- if .Values.networking -}}
{{- /* Parse apiServerEndpoint URL for generic k8s (used by both Cilium and KubeOVN) */ -}}
{{- /* First try cozystack ConfigMap, then fall back to chart values */ -}}
{{- $cozystackCm := lookup "v1" "ConfigMap" "cozy-system" "cozystack" -}}
{{- $apiServerEndpoint := .Values.publishing.apiServerEndpoint -}}
{{- if and $cozystackCm $cozystackCm.data -}}
{{- $apiServerEndpoint = default $apiServerEndpoint (index $cozystackCm.data "api-server-endpoint") -}}
{{- end -}}
{{- $apiHost := "" -}}
{{- $apiPort := "6443" -}}
{{- if $apiServerEndpoint -}}
{{- $parsed := urlParse $apiServerEndpoint -}}
{{- $hostPort := splitList ":" $parsed.host -}}
{{- $apiHost = index $hostPort 0 -}}
{{- if gt (len $hostPort) 1 -}}
{{- $apiPort = index $hostPort 1 -}}
{{- else -}}
{{- $apiPort = "6443" -}}
{{- end -}}
{{- end -}}
{{- /* KubeOVN IPv4 configuration - read from ConfigMap or fall back to chart values */ -}}
{{- $podCIDR := .Values.networking.podCIDR -}}
{{- $podGateway := .Values.networking.podGateway -}}
{{- $svcCIDR := .Values.networking.serviceCIDR -}}
{{- $joinCIDR := .Values.networking.joinCIDR -}}
{{- if and $cozystackCm $cozystackCm.data -}}
{{- $podCIDR = default $podCIDR (index $cozystackCm.data "ipv4-pod-cidr") -}}
{{- $podGateway = default $podGateway (index $cozystackCm.data "ipv4-pod-gateway") -}}
{{- $svcCIDR = default $svcCIDR (index $cozystackCm.data "ipv4-svc-cidr") -}}
{{- $joinCIDR = default $joinCIDR (index $cozystackCm.data "ipv4-join-cidr") -}}
{{- end -}}
{{- $kubeovnIpv4 := dict
  "POD_CIDR" $podCIDR
  "POD_GATEWAY" $podGateway
  "SVC_CIDR" $svcCIDR
  "JOIN_CIDR" $joinCIDR -}}
{{- $kubeovnDict := dict "ipv4" $kubeovnIpv4 -}}
{{- /* Set MASTER_NODES: explicit value or empty (let kube-ovn discover nodes by label) */ -}}
{{- $masterNodes := .Values.networking.kubeovn.MASTER_NODES -}}
{{- if $masterNodes -}}
{{- $_ := set $kubeovnDict "MASTER_NODES" $masterNodes -}}
{{- end -}}
{{- /* For generic k8s (k3s), control-plane label has value "true" */ -}}
{{- $_ := set $kubeovnDict "MASTER_NODES_LABEL" "node-role.kubernetes.io/control-plane=true" -}}
{{- $kubeovnValues := dict "kube-ovn" $kubeovnDict -}}
{{- $_ := set $networkingComponents "kubeovn" (dict "values" $kubeovnValues) -}}
{{- /* Cilium configuration - for generic k8s, always enable cgroup autoMount */ -}}
{{- $ciliumValues := dict "cilium" (dict
  "k8sServiceHost" $apiHost
  "k8sServicePort" $apiPort
  "cgroup" (dict "autoMount" (dict "enabled" true))) -}}
{{- $_ := set $networkingComponents "cilium" (dict "values" $ciliumValues) -}}
{{- end -}}
{{- /* Use kubeovn-cilium-generic variant (no values-talos.yaml) */ -}}
{{include "cozystack.platform.package" (list "cozystack.networking" "kubeovn-cilium-generic" $ $networkingComponents) }}
{{include "cozystack.platform.system.common-packages" $ }}
{{- /* Pass talos.enabled: false to linstor for generic Linux */ -}}
{{- $linstorComponents := dict "linstor" (dict "values" (dict "talos" (dict "enabled" false))) -}}
{{include "cozystack.platform.package" (list "cozystack.linstor" "default" $ $linstorComponents) }}
{{include "cozystack.platform.package" (list "cozystack.cozystack-scheduler" "linstor" $) }}
{{- end }}

# Cozystack Engine
{{- $cozystackEngineComponents := dict -}}
{{- /* For generic k8s, DaemonSets with control-plane nodeSelector need value "true" */ -}}
{{- if eq .Values.bundles.system.variant "isp-full-generic" -}}
{{- $genericNodeSelector := dict "node-role.kubernetes.io/control-plane" "true" -}}
{{- /* cozystack-api DaemonSet */ -}}
{{- $apiValues := dict "cozystackAPI" (dict "nodeSelector" $genericNodeSelector) -}}
{{- $_ := set $cozystackEngineComponents "cozystack-api" (dict "values" $apiValues) -}}
{{- end -}}
{{- if .Values.authentication.oidc.enabled }}
{{include "cozystack.platform.package" (list "cozystack.cozystack-engine" "oidc" $ $cozystackEngineComponents) }}
{{include "cozystack.platform.package.default" (list "cozystack.keycloak" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.keycloak-operator" $) }}
{{- else }}
{{include "cozystack.platform.package" (list "cozystack.cozystack-engine" "default" $ $cozystackEngineComponents) }}
{{- end }}

# Common Packages
{{include "cozystack.platform.package.default" (list "cozystack.gateway-api-crds" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.cert-manager" $) }}
{{- /* Disable hazard guard. The vendored cozy-ouroboros chart (0.8.0)
       ships a pre-delete Helm hook that sed-strips the BEGIN/END
       block from kube-system/coredns Corefile when the chart is
       actually uninstalled — so the cleanup is automatic in the
       happy path. The danger this guard catches is upstream of that:
       the cozystack.ouroboros Package CR carries
       helm.sh/resource-policy: keep, which means flipping
       publishing.proxyProtocol back to false stops emitting the
       Package CR but Helm does NOT trigger uninstall on the still-
       present-on-cluster Package. ouroboros keeps running, the
       cleanup hook never fires, the rewrite block stays live. The
       operator must `kubectl delete package.cozystack.io
       cozystack.ouroboros` (or add the package to
       bundles.disabledPackages) for the chart to actually uninstall
       and the hook to actually clean up. This guard fails the render
       on the dangerous transition path so the operator confirms
       they understand the asymmetry by setting
       publishing.proxyProtocolAcknowledgeUnclean: true.
       Known hole: an operator who manually `kubectl delete package
       cozystack.ouroboros` before flipping the flag back bypasses the
       check entirely (lookup returns nil, render proceeds; in that
       path the chart's pre-delete hook would have done the cleanup
       on its way out, so silent passage is the right behaviour). The
       guard is defence-in-depth for the resource-policy: keep
       asymmetry, not an airtight lock. */ -}}
{{- if and (not .Values.publishing.proxyProtocol) (not .Values.publishing.proxyProtocolAcknowledgeUnclean) -}}
{{- $existingOuroboros := lookup "cozystack.io/v1alpha1" "Package" "" "cozystack.ouroboros" -}}
{{- if $existingOuroboros -}}
{{- fail "publishing.proxyProtocol was previously enabled (the cozystack.ouroboros Package CR exists on the cluster). Flipping it back to false stops emitting the Package, BUT helm.sh/resource-policy: keep leaves the existing Package on the cluster — ouroboros stays installed and keeps re-applying its rewrite block to kube-system/coredns. Meanwhile the host ingress-nginx config reverts to no-PROXY-protocol while the upstream LB may still be injecting PROXY frames, breaking external traffic. Either: (a) restore publishing.proxyProtocol to true, or (b) flip the upstream LB off PROXY-protocol injection FIRST, then `kubectl delete package.cozystack.io cozystack.ouroboros` (the vendored chart's pre-delete hook then sed-strips the BEGIN/END block from kube-system/coredns automatically — manual sed is not needed in the happy path; the values.yaml comment ships a manual fallback recipe only for the rare case where the hook itself fails to land), then set publishing.proxyProtocolAcknowledgeUnclean: true to confirm." -}}
{{- end -}}
{{- end -}}
{{- if .Values.publishing.proxyProtocol }}
{{- /* Gateway-API watching is left at the upstream chart's default of
       false on the host. Cozystack does not install Gateway-API CRDs
       cluster-wide on the host — system/gateway-api-crds is referenced
       only from packages/core/platform/sources/kubernetes-application.yaml
       (tenant scope). Forcing --gateway-api on without CRDs would
       CrashLoop the controller on WaitForCacheSync against missing
       GVRs. Operators on hosts that do install Gateway-API CRDs out
       of band can enable it via the standard Package values override. */ -}}
{{- /* Point the ouroboros proxy at the HOST ingress-nginx Service. The
       wrapper chart default (cozy-ingress-nginx / ingress-nginx-controller)
       describes a managed Kubernetes tenant cluster, NOT the host: on the
       host, extra/ingress deploys ingress-nginx into the root tenant
       namespace (publishing.ingressName, default tenant-root) with
       fullnameOverride <short>-ingress, yielding the controller Service
       <short>-ingress-controller (e.g. root-ingress-controller). Derive
       namespace + serviceName from publishing.ingressName so a non-default
       ingress name still resolves; mirror the trimPrefix "tenant-"
       transform extra/ingress applies to .Release.Namespace. */ -}}
{{- $ingressNs := .Values.publishing.ingressName | default "tenant-root" -}}
{{- $ingressSvc := printf "%s-ingress-controller" (trimPrefix "tenant-" $ingressNs) -}}
{{- $ouroborosTarget := dict "namespace" $ingressNs "serviceName" $ingressSvc -}}
{{- $ouroborosValues := dict "ouroboros" (dict "proxy" (dict "target" $ouroborosTarget)) -}}
{{- $ouroborosComponents := dict "ouroboros" (dict "values" $ouroborosValues) -}}
{{include "cozystack.platform.package" (list "cozystack.ouroboros" "default" $ $ouroborosComponents) }}
{{- end }}
{{include "cozystack.platform.package.default" (list "cozystack.flux-plunger" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.flux-shard-operator" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.victoria-metrics-operator" $) }}
{{- $tenantComponents := dict -}}
{{- $tenantClusterValues := dict "_cluster" (dict "oidc-enabled" (ternary "true" "false" .Values.authentication.oidc.enabled)) -}}
{{- $_ := set $tenantComponents "tenant" (dict "values" $tenantClusterValues) }}
{{include "cozystack.platform.package" (list "cozystack.tenant-application" "default" $ $tenantComponents) }}
{{- /* PROXY-protocol on the host ingress-nginx is delivered via
       _cluster.proxy-protocol in the cozystack-values Secret (see
       templates/apps.yaml) and applied by the extra/ingress chart to the
       external-facing ingress. It does NOT ride on this Package's component
       values: the ingress-system / ingress components have no install: block,
       so PackageReconciler never builds a HelmRelease for them and never
       consumes their values. */ -}}
{{include "cozystack.platform.package.default" (list "cozystack.ingress-application" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.gateway-application" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.seaweedfs-application" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.info-application" $) }}
{{- /* Variant selection mirrors cozystack-engine above: `oidc` when
       platform-level OIDC is on (extra dependsOn on
       cozystack.keycloak-operator so the v1.edp.epam.com CRDs are
       registered before the monitoring chart reconciles), `default`
       otherwise (no wait on a Package that would not be emitted).

       No component-values override is passed. The platform Grafana's
       HelmRelease is created by the tenant-root chart's
       templates/monitoring.yaml (not by PackageReconciler over the
       monitoring-system component here — that component has no
       `install:` block), so `Package.spec.components[].values` here
       would be silently dropped by the reconciler
       (internal/operator/package_reconciler.go:197-201 skips
       components without `install:` before ever reaching the
       hr.Spec.Values assignment). Server-level GrafanaAdmin
       promotion is out of scope for Phase 1; see
       docs/oidc-grafana.md. */}}
{{- if .Values.authentication.oidc.enabled }}
{{include "cozystack.platform.package" (list "cozystack.monitoring-application" "oidc" $) }}
{{- else }}
{{include "cozystack.platform.package" (list "cozystack.monitoring-application" "default" $) }}
{{- end }}
{{include "cozystack.platform.package.default" (list "cozystack.etcd-application" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.cozystack-basics" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.backupstrategy-controller" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.backup-controller" $) }}
{{- /* velero must be a default package: backupstrategy-controller (default)
hard-depends on cozystack.velero, so an optional velero leaves the
backupstrategy-controller Package permanently DependenciesNotReady and the
cozystack-platform HelmRelease never becomes Ready. */}}
{{include "cozystack.platform.package.default" (list "cozystack.velero" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.vertical-pod-autoscaler" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.metrics-server" $) }}
{{- $monitoringAgentsComponents := dict "monitoring-agents" (dict "values" (dict "global" (dict "target" "tenant-root"))) -}}
{{include "cozystack.platform.package" (list "cozystack.monitoring-agents" "default" $ $monitoringAgentsComponents) }}
{{include "cozystack.platform.package.default" (list "cozystack.goldpinger" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.prometheus-operator-crds" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.grafana-operator" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.etcd-operator" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.postgres-operator" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.objectstorage-controller" $) }}
{{- /* bucket-application belongs to the system bundle, not iaas: its own
       dependsOn closure is cozystack.networking + cozystack.objectstorage-controller
       + cozystack.cozystack-engine, all emitted here, and nothing in it needs
       KubeVirt or CAPI. It sat in the iaas bundle while cozystack.backupstrategy-controller
       — a *default* package of this bundle — hard-depends on it, so every
       system-on/iaas-off configuration (i.e. isp-hosted) left
       backupstrategy-controller permanently DependenciesNotReady. Both isp-full
       presets masked that by enabling iaas. Same reasoning as the velero comment
       above: a hard dependency of a default package must itself be emitted
       wherever that default package is. */ -}}
{{include "cozystack.platform.package.default" (list "cozystack.bucket-application" $) }}

# Optional System Packages (controlled via bundles.enabledPackages)
{{include "cozystack.platform.package.optional.default" (list "cozystack.nfs-driver" $) }}
{{include "cozystack.platform.package.optional.default" (list "cozystack.telepresence" $) }}
{{include "cozystack.platform.package.optional.default" (list "cozystack.external-dns" $) }}
{{include "cozystack.platform.package.optional.default" (list "cozystack.external-dns-application" $) }}
{{include "cozystack.platform.package.optional.default" (list "cozystack.kuberture" $) }}
{{include "cozystack.platform.package.optional.default" (list "cozystack.external-secrets-operator" $) }}
{{include "cozystack.platform.package.optional.default" (list "cozystack.linstor-gui" $) }}
{{- if has "cozystack.bootbox" (default (list) .Values.bundles.enabledPackages) }}
{{include "cozystack.platform.package.default" (list "cozystack.bootbox-application" $) }}
{{include "cozystack.platform.package.default" (list "cozystack.bootbox" $) }}
{{- end }}
{{include "cozystack.platform.package.optional.default" (list "cozystack.hetzner-robotlb" $) }}

{{- end }}
