{{- $kubeRootCa := lookup "v1" "ConfigMap" "kube-system" "kube-root-ca.crt" }}
{{- $cozystackCm := lookup "v1" "ConfigMap" "cozy-system" "cozystack" }}
{{- $bundleName := .Values.bundles.system.variant }}
{{- $bundle := tpl (.Files.Get (printf "bundles/%s.yaml" $bundleName)) . | fromYaml }}
{{- /* Read root-host from ConfigMap if available, else use chart values */ -}}
{{- $rootHost := .Values.publishing.host -}}
{{- if and $cozystackCm $cozystackCm.data -}}
{{- $rootHost = default $rootHost (index $cozystackCm.data "root-host") -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: cozystack-values
  namespace: cozy-system
  labels:
    reconcile.fluxcd.io/watch: Enabled
type: Opaque
stringData:
  values.yaml: |
    _cluster:
      root-host: {{ $rootHost | quote }}
      bundle-name: {{ .Values.bundles.system.variant | quote }}
      solver: {{ .Values.publishing.certificates.solver | quote }}
      issuer-name: {{ .Values.publishing.certificates.issuerName | quote }}
      {{- /*
        DNS-01 solver wiring. Read only when solver=dns01, but the
        keys are written unconditionally so a render-time switch from
        http01 to dns01 doesn't require chart redeploy of every
        consumer. Each consumer (extra/gateway, ingress flow) reads
        the keys it needs and validates per-provider requirements.
      */}}
      {{- with .Values.publishing.certificates.dns01 }}
      dns01-provider: {{ .provider | default "cloudflare" | quote }}
      {{- with .cloudflare }}
      dns01-cloudflare-secret-name: {{ .secretName | default "cloudflare-api-token-secret" | quote }}
      dns01-cloudflare-secret-key: {{ .secretKey | default "api-token" | quote }}
      {{- end }}
      {{- with .route53 }}
      dns01-route53-region: {{ .region | default "" | quote }}
      dns01-route53-access-key-id: {{ .accessKeyID | default "" | quote }}
      dns01-route53-secret-name: {{ .secretName | default "" | quote }}
      dns01-route53-secret-key: {{ .secretKey | default "secret-access-key" | quote }}
      {{- end }}
      {{- with .digitalocean }}
      dns01-digitalocean-secret-name: {{ .secretName | default "digitalocean-api-token-secret" | quote }}
      dns01-digitalocean-secret-key: {{ .secretKey | default "access-token" | quote }}
      {{- end }}
      {{- with .rfc2136 }}
      dns01-rfc2136-nameserver: {{ .nameserver | default "" | quote }}
      dns01-rfc2136-tsig-key-name: {{ .tsigKeyName | default "" | quote }}
      dns01-rfc2136-tsig-algorithm: {{ .tsigAlgorithm | default "HMACSHA256" | quote }}
      dns01-rfc2136-secret-name: {{ .secretName | default "" | quote }}
      dns01-rfc2136-secret-key: {{ .secretKey | default "tsig-secret-key" | quote }}
      {{- end }}
      {{- end }}
      oidc-enabled: {{ .Values.authentication.oidc.enabled | quote }}
      oidc-insecure-skip-verify: {{ .Values.authentication.oidc.insecureSkipVerify | quote }}
      extra-keycloak-redirect-uri-for-dashboard: {{ index .Values.authentication.oidc.keycloakExtraRedirectUri | quote }}
      keycloak-internal-url: {{ .Values.authentication.oidc.keycloakInternalUrl | quote }}
      expose-services: {{ .Values.publishing.exposedServices | join "," | quote }}
      {{- /*
        expose-ingress carries two semantically distinct values that
        happen to coincide in the default cozystack deployment:
          1. The ingressClassName the per-system app (dashboard,
             cozystack-api, etc.) sets on its Ingress resource when
             gateway-enabled=false.
          2. The namespace of the Gateway that the same per-system
             app's HTTPRoute / TLSRoute parentRefs target when
             gateway-enabled=true (publishing tenant namespace).
        Default `tenant-root` satisfies both because the ingress-nginx
        controller and the publishing Gateway both live in tenant-root.
        If a future deployment splits these (e.g. an ingress controller
        in cozy-ingress vs a publishing Gateway in tenant-root), the
        per-system templates need a separate _cluster.gateway-namespace
        key. Documented here as a known limitation.
      */}}
      expose-ingress: {{ .Values.publishing.ingressName | quote }}
      expose-external-ips: {{ .Values.publishing.externalIPs | join "," | quote }}
      expose-mode: {{ .Values.publishing.exposure | default "externalIPs" | quote }}
      gateway-enabled: {{ .Values.gateway.enabled | default false | quote }}
      gateway-attached-namespaces: {{ .Values.gateway.attachedNamespaces | default (list) | join "," | quote }}
      cluster-domain: {{ .Values.networking.clusterDomain | quote }}
      api-server-endpoint: {{ .Values.publishing.apiServerEndpoint | quote }}
      {{- with .Values.branding }}
      branding:
        {{- . | toYaml | nindent 8 }}
      {{- end }}
      cpu-allocation-ratio: {{ .Values.resources.cpuAllocationRatio | quote }}
      memory-allocation-ratio: {{ .Values.resources.memoryAllocationRatio | quote }}
      ephemeral-storage-allocation-ratio: {{ .Values.resources.ephemeralStorageAllocationRatio | quote }}
      {{- with .Values.scheduling }}
      scheduling:
        {{- . | toYaml | nindent 8 }}
      {{- end }}
      {{- with $kubeRootCa.data }}
      kube-root-ca: {{ index . "ca.crt" | b64enc | quote }}
      {{- end }}
