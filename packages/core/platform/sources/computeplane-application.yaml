---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.computeplane-application
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
    # The variant mirrors the kubernetes-application variant whose chart it
    # re-sources: the wrapped cluster substrate is the kubevirt flavour of
    # apps/kubernetes, and the artifact naming contract
    # (cozystack-computeplane-application-kubevirt-*) carries that provenance.
    # A future non-kubevirt substrate would arrive as a sibling variant.
    - name: kubevirt
      # Variant dependsOn gates only the components that carry an install:
      # block — here computeplane-rd alone. cozystack-engine serves the
      # ApplicationDefinition CRD that computeplane-rd installs; the
      # kubernetes-application edge orders that install after the kubernetes
      # machinery (CAPI providers, Kamaji, the addon artifacts) is present, so
      # the ComputePlane kind is not registered — and cannot be instantiated —
      # on a cluster that lacks what it provisions.
      dependsOn:
        - cozystack.cozystack-engine
        - cozystack.kubernetes-application
      libraries:
        - name: cozy-lib
          path: library/cozy-lib
      components:
        # The ComputePlane module chart (tenant module, source-only): rendered
        # into the tenant namespace by the tenant chart when the module is on.
        - name: computeplane
          path: extra/computeplane
        # The ordinary managed-kubernetes app, re-declared source-only under
        # this package's own scope (cozystack-computeplane-application-kubevirt-kubernetes)
        # so the module is self-contained and does not reach into another
        # package's artifacts for the cluster chart itself.
        - name: kubernetes
          path: apps/kubernetes
          libraries: ["cozy-lib"]
        - name: computeplane-rd
          path: system/computeplane-rd
          install:
            namespace: cozy-system
            releaseName: computeplane-rd
