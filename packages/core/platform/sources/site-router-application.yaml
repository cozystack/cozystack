---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.site-router-application
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
    - name: default
      dependsOn:
        # kube-ovn + Cilium: the router VM attaches to the tenant pod network.
        - cozystack.networking
        # KubeVirt runs the gateway VirtualMachine (templates/vm.yaml).
        - cozystack.kubevirt
        # CDI provisions the boot DataVolume (templates/dv.yaml).
        - cozystack.kubevirt-cdi
        # cozystack-engine ships the ApplicationDefinition CRD rendered by the *-rd component below.
        - cozystack.cozystack-engine
        # site-router-controller mediates kube-ovn routing/port-security and pushes
        # VyOS config; installed before SiteRouter instances so they reconcile.
        - cozystack.site-router-controller
      libraries:
        - name: cozy-lib
          path: library/cozy-lib
      components:
        - name: site-router
          path: apps/site-router
          libraries: ["cozy-lib"]
        - name: site-router-rd
          path: system/site-router-rd
          install:
            namespace: cozy-system
            releaseName: site-router-rd
