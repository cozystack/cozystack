---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.cozyplane-apiserver
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
  # The aggregated API server for sdn.cozystack.io (VPC tenancy). Separate from
  # the cozyplane CNI component on purpose: the CNI installs before everything
  # (including cert-manager), while this needs cert-manager Certificates and the
  # etcd-operator. Until it installs, the group is served by the CNI package's
  # bootstrap CRDs; its APIService takes the group over atomically when it lands.
  - name: default
    dependsOn:
    - cozystack.cert-manager
    - cozystack.etcd-operator
    components:
    - name: cozyplane-apiserver
      path: system/cozyplane-apiserver
      install:
        privileged: true
        namespace: cozy-cozyplane
        releaseName: cozyplane-apiserver
