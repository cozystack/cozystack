---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.securitygroup-controller
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
  - name: default
    dependsOn:
    - cozystack.networking
    components:
    - name: securitygroup-controller
      path: system/securitygroup-controller
      install:
        privileged: true
        namespace: cozy-securitygroup-controller
        releaseName: securitygroup-controller
