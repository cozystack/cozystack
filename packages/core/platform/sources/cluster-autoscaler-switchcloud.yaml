---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.cluster-autoscaler-switchcloud
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
    - name: default
      dependsOn:
        - cozystack.networking
      components:
        - name: cluster-autoscaler-switchcloud
          path: system/cluster-autoscaler
          valuesFiles:
            - values.yaml
            - values-switchcloud.yaml
          install:
            namespace: cozy-cluster-autoscaler-switchcloud
            releaseName: cluster-autoscaler-switchcloud
