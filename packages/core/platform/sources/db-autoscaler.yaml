---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.db-autoscaler
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
  - name: default
    dependsOn:
    - cozystack.networking
    - cozystack.monitoring-agents
    - cozystack.victoria-metrics-operator
    components:
    - name: db-autoscaler
      path: system/db-autoscaler
      install:
        privileged: true
        namespace: cozy-db-autoscaler
        releaseName: db-autoscaler
