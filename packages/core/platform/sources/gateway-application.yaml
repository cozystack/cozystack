---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.gateway-application
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
    - name: default
      dependsOn:
        - cozystack.gateway-api-crds
        - cozystack.cert-manager
      libraries:
        - name: cozy-lib
          path: library/cozy-lib
      components:
        - name: gateway
          path: extra/gateway
          libraries: ["cozy-lib"]
