---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.tenant-application
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
    - name: default
      dependsOn:
        - cozystack.networking
        - cozystack.ingress-application
        - cozystack.gateway-application
        - cozystack.seaweedfs-application
        - cozystack.info-application
        - cozystack.monitoring-application
        - cozystack.etcd-application
        # cozystack-engine ships the ApplicationDefinition CRD rendered by the *-rd component below.
        - cozystack.cozystack-engine
      libraries:
        - name: cozy-lib
          path: library/cozy-lib
      components:
        - name: tenant
          path: apps/tenant
          libraries: [cozy-lib]
        - name: tenant-rd
          path: system/tenant-rd
          install:
            namespace: cozy-system
            releaseName: tenant-rd
