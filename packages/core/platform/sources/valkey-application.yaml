---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.valkey-application
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
    - name: default
      dependsOn:
        - cozystack.networking
        - cozystack.redis-operator
      libraries:
        - name: cozy-lib
          path: library/cozy-lib
      components:
        - name: valkey
          path: apps/valkey
          libraries: ["cozy-lib"]
        - name: valkey-rd
          path: system/valkey-rd
          install:
            namespace: cozy-system
            releaseName: valkey-rd
