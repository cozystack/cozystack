---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.monitoring-application
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
    - name: default
      dependsOn:
        - cozystack.networking
        - cozystack.postgres-operator
        - cozystack.grafana-operator
        - cozystack.victoria-metrics-operator
        # cozystack-engine ships the ApplicationDefinition CRD rendered by the *-rd component below.
        - cozystack.cozystack-engine
      libraries:
        - name: cozy-lib
          path: library/cozy-lib
      components:
        - name: monitoring-system
          path: system/monitoring
          libraries: ["cozy-lib"]
        - name: monitoring
          path: extra/monitoring
          libraries: ["cozy-lib"]
        - name: monitoring-rd
          path: system/monitoring-rd
          install:
            namespace: cozy-system
            releaseName: monitoring-rd
    # `oidc` variant — additionally waits for cozystack.keycloak-operator so
    # the v1.edp.epam.com CRDs consumed by the Phase-1 OIDC selector
    # (spec.oidc.mode: System renders KeycloakClient, KeycloakClientScope and
    # three KeycloakRealmGroups in the cozy realm) are registered before the
    # monitoring chart reconciles. Without this edge, the
    # `.Capabilities.APIVersions.Has "v1.edp.epam.com/v1"` guard in
    # templates/grafana/oidc-keycloak.yaml would silently drop the whole
    # Keycloak side and Grafana's auth.generic_oauth block would point at
    # a client that never gets provisioned. Selected from the bundle when
    # `authentication.oidc.enabled` is true — see
    # packages/core/platform/templates/bundles/system.yaml. Mirrors the
    # cozystack-engine default/oidc variant split.
    - name: oidc
      dependsOn:
        - cozystack.networking
        - cozystack.postgres-operator
        - cozystack.grafana-operator
        - cozystack.victoria-metrics-operator
        - cozystack.cozystack-engine
        - cozystack.keycloak-operator
      libraries:
        - name: cozy-lib
          path: library/cozy-lib
      components:
        - name: monitoring-system
          path: system/monitoring
          libraries: ["cozy-lib"]
        - name: monitoring
          path: extra/monitoring
          libraries: ["cozy-lib"]
        - name: monitoring-rd
          path: system/monitoring-rd
          install:
            namespace: cozy-system
            releaseName: monitoring-rd
