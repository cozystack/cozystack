---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.monitoring-application
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
    - name: default
      dependsOn:
        - cozystack.networking
        - cozystack.postgres-operator
        - cozystack.grafana-operator
        - cozystack.victoria-metrics-operator
        # cozystack-engine ships the ApplicationDefinition CRD rendered by the *-rd component below.
        - cozystack.cozystack-engine
        # keycloak-operator ships the v1.edp.epam.com CRDs consumed by
        # the OIDC selector (spec.oidc.mode: System renders KeycloakClient,
        # KeycloakClientScope and three KeycloakRealmGroups in the cozy
        # realm). Without this dep the monitoring chart can reconcile
        # before the CRDs are registered on cold install — the
        # .Capabilities.APIVersions.Has guard then silently drops all
        # Keycloak-side objects and Grafana's auth.generic_oauth block
        # points at a client that never gets provisioned.
        - cozystack.keycloak-operator
      libraries:
        - name: cozy-lib
          path: library/cozy-lib
      components:
        - name: monitoring-system
          path: system/monitoring
          libraries: ["cozy-lib"]
        - name: monitoring
          path: extra/monitoring
          libraries: ["cozy-lib"]
        - name: monitoring-rd
          path: system/monitoring-rd
          install:
            namespace: cozy-system
            releaseName: monitoring-rd
