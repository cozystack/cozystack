---
apiVersion: cozystack.io/v1alpha1
kind: PackageSource
metadata:
  name: cozystack.networking
spec:
  sourceRef:
    kind: OCIRepository
    name: cozystack-packages
    namespace: cozy-system
    path: /
  variants:
  - name: noop
    components: []
  - name: cilium
    dependsOn:
    - cozystack.gateway-api-crds
    components:
    - name: cilium
      path: system/cilium
      valuesFiles:
      - values.yaml
      - values-talos.yaml
      install:
        privileged: true
        namespace: cozy-cilium
        releaseName: cilium
        dependsOn: []
    - name: cilium-networkpolicy
      path: system/cilium-networkpolicy
      install:
        privileged: true
        namespace: cozy-cilium
        releaseName: cilium-networkpolicy
        dependsOn:
        - cilium
  - name: cilium-kilo
    dependsOn:
    - cozystack.gateway-api-crds
    components:
    - name: cilium
      path: system/cilium
      valuesFiles:
      - values.yaml
      - values-talos.yaml
      - values-kilo.yaml
      install:
        privileged: true
        namespace: cozy-cilium
        releaseName: cilium
        dependsOn: []
    - name: kilo
      path: system/kilo
      valuesFiles:
      - values.yaml
      - values-cilium.yaml
      install:
        privileged: true
        namespace: cozy-kilo
        releaseName: kilo
        dependsOn:
        - cilium
  # Generic Cilium variant for non-Talos clusters (kubeadm, k3s, RKE2, etc.)
  - name: cilium-generic
    dependsOn:
    - cozystack.gateway-api-crds
    components:
    - name: cilium
      path: system/cilium
      valuesFiles:
      - values.yaml
      - values-apparmor.yaml
      install:
        privileged: true
        namespace: cozy-cilium
        releaseName: cilium
        dependsOn: []
    - name: cilium-networkpolicy
      path: system/cilium-networkpolicy
      install:
        privileged: true
        namespace: cozy-cilium
        releaseName: cilium-networkpolicy
        dependsOn:
        - cilium
  - name: kubeovn-cilium
    dependsOn:
    - cozystack.gateway-api-crds
    components:
    - name: cilium
      path: system/cilium
      valuesFiles:
      - values.yaml
      - values-talos.yaml
      - values-kubeovn.yaml
      install:
        privileged: true
        namespace: cozy-cilium
        releaseName: cilium
        dependsOn: []
    - name: cilium-networkpolicy
      path: system/cilium-networkpolicy
      install:
        privileged: true
        namespace: cozy-cilium
        releaseName: cilium-networkpolicy
        dependsOn:
        - cilium
    - name: kubeovn
      path: system/kubeovn
      install:
        privileged: true
        namespace: cozy-kubeovn
        releaseName: kubeovn
        dependsOn:
        - cilium
  # Generic KubeOVN+Cilium variant for non-Talos clusters (kubeadm, k3s, RKE2, etc.)
  - name: kubeovn-cilium-generic
    dependsOn:
    - cozystack.gateway-api-crds
    components:
    - name: cilium
      path: system/cilium
      valuesFiles:
      - values.yaml
      - values-apparmor.yaml
      - values-kubeovn.yaml
      install:
        privileged: true
        namespace: cozy-cilium
        releaseName: cilium
        dependsOn: []
    - name: cilium-networkpolicy
      path: system/cilium-networkpolicy
      install:
        privileged: true
        namespace: cozy-cilium
        releaseName: cilium-networkpolicy
        dependsOn:
        - cilium
    - name: kubeovn
      path: system/kubeovn
      install:
        privileged: true
        namespace: cozy-kubeovn
        releaseName: kubeovn
        dependsOn:
        - cilium
  # cozyplane eBPF CNI + cozyplane-kpr (kube-proxy replacement) for Talos
  # clusters — NO Cilium and NO kube-proxy. cozyplane owns the datapath and the
  # CNI conflist; cozyplane-kpr provides in-cluster Services via socket-LB
  # (importing Cilium's LB control plane, no Cilium agent). One IPAM authority
  # (cozyplane) over the podCIDR — the coexistence hazard that Cilium's
  # standalone IPAM created is gone. See docs/kube-proxy-replacement.md.
  # NOTE: host-firewall and default-network NetworkPolicy that Cilium provided
  # are not yet replaced (follow-ups); external NodePort + VM-guest ClusterIP
  # need the increment-3 per-packet fallback.
  - name: cozyplane
    dependsOn:
    - cozystack.gateway-api-crds
    components:
    - name: cozyplane
      path: system/cozyplane
      valuesFiles:
      - values.yaml
      - values-talos.yaml
      install:
        privileged: true
        namespace: cozy-cozyplane
        releaseName: cozyplane
        dependsOn: []
    - name: cozyplane-kpr
      path: system/cozyplane-kpr
      valuesFiles:
      - values.yaml
      - values-talos.yaml
      install:
        privileged: true
        namespace: cozy-cozyplane
        releaseName: cozyplane-kpr
        dependsOn:
        - cozyplane
