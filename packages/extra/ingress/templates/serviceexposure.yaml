{{- /*
  Publish the host ingress-nginx Service through the platform's configured
  LoadBalancer backend by declaring a ServiceExposure. Only the host
  (external-facing) ingress — the namespace named by expose-ingress —
  renders it, and only when an exposure class is configured. The
  cozystack-controller owns the backend pool/announcer downstream; the
  ingress-nginx Service itself is already rendered as type LoadBalancer by
  nginx-ingress.yaml whenever expose-external-ips is empty.
*/}}
{{- $exposeIngress := (index .Values._cluster "expose-ingress") | default "tenant-root" }}
{{- $exposureClass := (index .Values._cluster "exposure-class") | default "" }}
{{- if and $exposureClass (eq $exposeIngress .Release.Namespace) }}
apiVersion: network.cozystack.io/v1alpha1
kind: ServiceExposure
metadata:
  name: {{ trimPrefix "tenant-" .Release.Namespace }}-ingress
spec:
  serviceRef:
    name: {{ trimPrefix "tenant-" .Release.Namespace }}-ingress-controller
  exposureClassName: {{ $exposureClass | quote }}
{{- end }}
