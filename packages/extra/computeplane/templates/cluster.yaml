{{- /*
  ComputePlane cluster (rendered by the computeplane tenant module).

  Provisions a single-tenant, Cozystack-managed cluster for untrusted-code
  workloads by deploying the ordinary `apps/kubernetes` chart (Kamaji control
  plane + KubeVirt-VM worker nodes) with operator-fixed values. The chart is
  sourced from this package's own source-only ExternalArtifact (see
  packages/core/platform/sources/computeplane-application.yaml), so the module
  is self-contained.

  The HelmRelease is named computeplane-cluster (the module's own HelmRelease
  occupies the object name "computeplane" in the tenant namespace) and sets no
  spec.releaseName: the aggregated API cannot represent releaseName — the
  conversion rebuilds HelmRelease specs without it — so both releases must let
  Flux derive the name from the object name, like every other tenant module.
  Kamaji therefore writes the cluster's admin kubeconfig to the Secret
  `computeplane-cluster-admin-kubeconfig` (key super-admin.svc) — the derived
  contract consumed by the HelmReleases of `placement: ComputePlane`
  applications. The tenant never sees it: tenant-visible secrets are an
  allowlist (computeplane-rd declares include: [], which withholds
  everything), so the withholding is rename-proof by construction. Renaming
  this object still renames the Secret and dangles every consumer; don't.

  Everything security-relevant is fixed here and unreachable by the tenant:
  the tenant holds no admin kubeconfig for this cluster and the module exposes
  cluster *shape* only (nodeGroups). See design-proposals/compute-plane in
  cozystack/community.

  install/upgrade.disableWait mirrors how the managed `kubernetes` app is
  reconciled elsewhere: it emits child HelmReleases (cilium/coredns/csi/…) and
  a talos-reconcile Job that cannot become Ready until worker nodes exist, so
  the parent must not block on them.
*/}}
{{- /*
  Supplied nodeGroups are authoritative — the wrapped chart does not merge
  them with its default md0 (which carries roles: [ingress-nginx]) — while the
  module pins the ingress-nginx addon on and its controller only schedules
  onto nodes with that role. Without this guard, any tenant-supplied
  nodeGroups lacking the role would leave the controller Pending forever and
  the ComputePlane ingress would never come up.
*/}}
{{- if .Values.nodeGroups }}
{{- $hasIngressRole := false }}
{{- range $name, $group := .Values.nodeGroups }}
{{- if and (has "ingress-nginx" (default (list) $group.roles)) (gt (int (default 0 $group.maxReplicas)) 0) }}
{{- $hasIngressRole = true }}
{{- end }}
{{- end }}
{{- if not $hasIngressRole }}
{{- fail "computeplane: at least one nodeGroup must carry roles: [ingress-nginx] with maxReplicas >= 1 — the module pins the ingress-nginx addon on, and its controller only schedules onto ingress-nginx nodes" }}
{{- end }}
{{- end }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: computeplane-cluster
  labels:
    sharding.fluxcd.io/key: tenants
    # No in-tree reader yet: this is the selector hook for the deferred
    # placement: ComputePlane routing in cozystack-api (and for operators
    # locating ComputePlane cluster releases) — do not remove as dead.
    internal.cozystack.io/computeplane: "true"
spec:
  chartRef:
    kind: ExternalArtifact
    name: cozystack-computeplane-application-kubevirt-kubernetes
    namespace: cozy-system
  interval: 5m
  timeout: 30m
  install:
    disableWait: true
    remediation:
      retries: -1
  upgrade:
    disableWait: true
    remediation:
      retries: -1
  # Cozystack-enablement. A ComputePlane is not a vanilla Kubernetes cluster:
  # placement: ComputePlane apps (e.g. cozyllm Jupyter/n8n/Langflow) render
  # Certificate resources (-> certManager) and Ingress objects
  # (-> ingressNginx) into the target cluster, so those controllers must run
  # inside it. No in-cluster Flux is needed: consumer HelmReleases live on the
  # management cluster and carry spec.kubeConfig, so the management Flux
  # resolves their charts and applies the rendered manifests remotely. Flux
  # merges spec.values after valuesFrom, so nothing injected via
  # cozystack-values can disable these pins.
  values:
    addons:
      certManager:
        enabled: true
      ingressNginx:
        enabled: true
        # Expose the ComputePlane ingress-nginx via the Proxied NodePort Service so a
        # ComputePlane app's per-app management Ingress can route to it without a
        # management LoadBalancer. The Service (computeplane-cluster-ingress-nginx,
        # named after the cluster release) is created whenever the addon is enabled
        # with exposeMethod Proxied, independent of any hosts list.
        exposeMethod: Proxied
    {{- with .Values.nodeGroups }}
    nodeGroups: {{- toYaml . | nindent 6 }}
    {{- end }}
  valuesFrom:
  - kind: Secret
    name: cozystack-values
