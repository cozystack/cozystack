{{- define "calculateQuotaBackendBytes" -}}
{{- $units := dict "Ki" 1024 "Mi" 1048576 "Gi" 1073741824 -}}
{{- $value := regexFind "[0-9.]+" . -}}
{{- $unit := regexFind "[a-zA-Z]+" . -}}
{{- $numericValue := float64 $value -}}
{{- $bytes := mulf $numericValue (index $units $unit) -}}
{{- $result := mulf $bytes 0.95 -}}
{{- printf "%.0f" $result -}}
{{- end -}}
---
apiVersion: etcd-operator.cozystack.io/v1alpha2
kind: EtcdCluster
metadata:
  name: etcd
spec:
  version: {{ .Values.version | quote }}
  replicas: {{ .Values.replicas }}
  storage:
    size: {{ .Values.size }}
    {{- with .Values.storageClass }}
    storageClassName: {{ . }}
    {{- end }}
  options:
    # quotaBackendBytes/snapshotCount are typed integers in v1alpha2 (no quotes).
    quotaBackendBytes: {{ include "calculateQuotaBackendBytes" .Values.size }}
    autoCompactionMode: periodic
    autoCompactionRetention: "5m"
    snapshotCount: 10000
  {{- with .Values.resources }}
  resources: {{- include "cozy-lib.resources.sanitize" (list . $) | nindent 4 }}
  {{- end }}
  additionalMetadata:
    labels:
      cozystack.io/service: etcd
  # TLS is operator-managed via cert-manager (certManager mode): the operator
  # issues the server, operator-client and peer certs from the CA issuers
  # rendered below. Setting operatorClientIssuerRef turns on etcd
  # --client-cert-auth, so external clients (the Kamaji DataStore) authenticate
  # by presenting a CN=root client cert signed by the same CA. No spec.auth:
  # cozystack stays cert-only (no etcd password auth).
  tls:
    client:
      certManager:
        serverIssuerRef:
          name: etcd-issuer
          kind: Issuer
        operatorClientIssuerRef:
          name: etcd-issuer
          kind: Issuer
    peer:
      certManager:
        issuerRef:
          name: etcd-peer-issuer
          kind: Issuer
  {{- $rawConstraints := "" }}
  {{- if .Values._cluster.scheduling }}
    {{- $rawConstraints = get .Values._cluster.scheduling "globalAppTopologySpreadConstraints" }}
  {{- end }}
  {{- if $rawConstraints }}
  {{- /* The raw value already carries its own top-level topologySpreadConstraints: key */}}
  {{- $rawConstraints | fromYaml | toYaml | nindent 2 }}
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: etcd
  {{- else }}
  topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: "kubernetes.io/hostname"
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: etcd
  {{- end }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: etcd-selfsigning-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-peer-ca
spec:
  isCA: true
  usages:
  - "signing"
  - "key encipherment"
  - "cert sign"
  commonName: etcd-peer-ca
  duration: 87600h
  subject:
    organizations:
      - {{ .Release.Namespace }}
    organizationalUnits:
      - {{ .Release.Name }}
  secretName: etcd-peer-ca-tls
  privateKey:
    rotationPolicy: Never
    algorithm: RSA
    size: 4096
  issuerRef:
    name: etcd-selfsigning-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-ca
spec:
  isCA: true
  usages:
  - "signing"
  - "key encipherment"
  - "cert sign"
  commonName: etcd-ca
  duration: 87600h
  subject:
    organizations:
      - {{ .Release.Namespace }}
    organizationalUnits:
      - {{ .Release.Name }}
  secretName: etcd-ca-tls
  privateKey:
    rotationPolicy: Never
    algorithm: RSA
    size: 4096
  issuerRef:
    name: etcd-selfsigning-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: etcd-peer-issuer
spec:
  ca:
    secretName: etcd-peer-ca-tls
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: etcd-issuer
spec:
  ca:
    secretName: etcd-ca-tls
---
# Client certificate for consumers of the cluster (the Kamaji DataStore).
# commonName=root identifies the caller as the etcd root user under
# --client-cert-auth. The server/operator-client/peer certs are issued by the
# operator (certManager mode above) with the correct *.etcd.<ns>.svc SANs, so
# they are no longer rendered here.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-client
spec:
  commonName: root
  secretName: etcd-client-tls
  subject:
    organizations:
      - {{ .Release.Namespace }}
    organizationalUnits:
      - {{ .Release.Name }}
  usages:
  - "signing"
  - "key encipherment"
  - "client auth"
  privateKey:
    rotationPolicy: Always
    algorithm: RSA
    size: 4096
  issuerRef:
    name: etcd-issuer
    kind: Issuer
---
apiVersion: cozystack.io/v1alpha1
kind: WorkloadMonitor
metadata:
  name: {{ $.Release.Name }}
  namespace: {{ $.Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  minReplicas: {{ div .Values.replicas 2 | add1 }}
  kind: etcd
  type: etcd
  selector:
    app.kubernetes.io/instance: etcd
    app.kubernetes.io/managed-by: etcd-operator
    app.kubernetes.io/name: etcd
  version: {{ $.Chart.Version }}
