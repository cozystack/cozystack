{{- define "calculateQuotaBackendBytes" -}}
{{- $units := dict "Ki" 1024 "Mi" 1048576 "Gi" 1073741824 -}}
{{- $value := regexFind "[0-9.]+" . -}}
{{- $unit := regexFind "[a-zA-Z]+" . -}}
{{- $numericValue := float64 $value -}}
{{- $bytes := mulf $numericValue (index $units $unit) -}}
{{- $result := mulf $bytes 0.95 -}}
{{- printf "%.0f" $result -}}
{{- end -}}
---
apiVersion: etcd-operator.cozystack.io/v1alpha2
kind: EtcdCluster
metadata:
  name: etcd
spec:
  version: {{ .Values.version | quote }}
  replicas: {{ .Values.replicas }}
  storage:
    size: {{ .Values.size }}
    {{- with .Values.storageClass }}
    storageClassName: {{ . }}
    {{- end }}
  options:
    # quotaBackendBytes/snapshotCount are typed integers in v1alpha2 (no quotes).
    quotaBackendBytes: {{ include "calculateQuotaBackendBytes" .Values.size }}
    autoCompactionMode: periodic
    autoCompactionRetention: "5m"
    snapshotCount: 10000
  {{- with .Values.resources }}
  resources: {{- include "cozy-lib.resources.sanitize" (list . $) | nindent 4 }}
  {{- end }}
  additionalMetadata:
    labels:
      cozystack.io/service: etcd
  # TLS uses secretRef mode: the chart issues the server, operator-client and
  # peer certs via the cert-manager Certificates rendered below, and the
  # EtcdCluster only REFERENCES the resulting Secrets. This is deliberate, not
  # cosmetic — spec.tls is immutable in v1alpha2 (CRD CEL: self.tls ==
  # oldSelf.tls), and `etcd-migrate` adopts legacy clusters into exactly this
  # secretRef shape (serverSecretRef/operatorClientSecretRef/peer.secretRef,
  # pointing at the legacy etcd-{server,client,peer}-tls Secrets). Rendering
  # certManager here would diverge from the adopted object and the API server
  # would reject every post-adoption HelmRelease reconcile, leaving migrated
  # clusters permanently non-Ready. Providing operatorClientSecretRef keeps etcd
  # --client-cert-auth on, so external clients (the Kamaji DataStore) still
  # authenticate with a CN=root client cert. ca.crt lives inside each referenced
  # Secret (cert-manager writes it), which is what v1alpha2 reads as the trusted
  # CA. No spec.auth: cozystack stays cert-only (no etcd password auth).
  tls:
    client:
      serverSecretRef:
        name: etcd-server-tls
      operatorClientSecretRef:
        name: etcd-client-tls
    peer:
      secretRef:
        name: etcd-peer-tls
  {{- $rawConstraints := "" }}
  {{- if .Values._cluster.scheduling }}
    {{- $rawConstraints = get .Values._cluster.scheduling "globalAppTopologySpreadConstraints" }}
  {{- end }}
  {{- if $rawConstraints }}
  {{- /* The raw value already carries its own top-level topologySpreadConstraints: key */}}
  {{- $rawConstraints | fromYaml | toYaml | nindent 2 }}
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: etcd
  {{- else }}
  topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: "kubernetes.io/hostname"
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: etcd
  {{- end }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: etcd-selfsigning-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-peer-ca
spec:
  isCA: true
  usages:
  - "signing"
  - "key encipherment"
  - "cert sign"
  commonName: etcd-peer-ca
  duration: 87600h
  subject:
    organizations:
      - {{ .Release.Namespace }}
    organizationalUnits:
      - {{ .Release.Name }}
  secretName: etcd-peer-ca-tls
  privateKey:
    rotationPolicy: Never
    algorithm: RSA
    size: 4096
  issuerRef:
    name: etcd-selfsigning-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-ca
spec:
  isCA: true
  usages:
  - "signing"
  - "key encipherment"
  - "cert sign"
  commonName: etcd-ca
  duration: 87600h
  subject:
    organizations:
      - {{ .Release.Namespace }}
    organizationalUnits:
      - {{ .Release.Name }}
  secretName: etcd-ca-tls
  privateKey:
    rotationPolicy: Never
    algorithm: RSA
    size: 4096
  issuerRef:
    name: etcd-selfsigning-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: etcd-peer-issuer
spec:
  ca:
    secretName: etcd-peer-ca-tls
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: etcd-issuer
spec:
  ca:
    secretName: etcd-ca-tls
---
# Server certificate, referenced by spec.tls.client.serverSecretRef. The SANs
# must cover every name the operator and clients dial the cluster by. We use
# WILDCARDS (not the legacy chart's enumerated etcd-<i>.etcd-headless SANs)
# because the v1alpha2 operator brings up members — including replacements after
# a failure — under random names in its native domain (<member>.etcd.<ns>.svc);
# an enumerated list would leave a replacement member's name out of every SAN
# and fail TLS verification forever (a silent one-short-cluster). The legacy
# headless wildcard is kept so adopted members still validate during the
# transition window. cert-manager writes ca.crt into etcd-server-tls, which
# v1alpha2 reads as --trusted-ca-file.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-server
spec:
  commonName: etcd-server
  secretName: etcd-server-tls
  subject:
    organizations:
      - {{ .Release.Namespace }}
    organizationalUnits:
      - {{ .Release.Name }}
  isCA: false
  usages:
  - "client auth"
  - "server auth"
  - "signing"
  - "key encipherment"
  dnsNames:
  - etcd
  - etcd.{{ .Release.Namespace }}.svc
  - "*.etcd.{{ .Release.Namespace }}.svc"
  - "*.etcd-headless.{{ .Release.Namespace }}.svc"
  - localhost
  ipAddresses:
  - "127.0.0.1"
  privateKey:
    rotationPolicy: Always
    algorithm: RSA
    size: 4096
  issuerRef:
    name: etcd-issuer
    kind: Issuer
---
# Peer certificate, referenced by spec.tls.peer.secretRef. Same wildcard SAN
# rationale as the server cert above.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-peer
spec:
  commonName: etcd-peer
  secretName: etcd-peer-tls
  subject:
    organizations:
      - {{ .Release.Namespace }}
    organizationalUnits:
      - {{ .Release.Name }}
  isCA: false
  usages:
  - "server auth"
  - "client auth"
  - "signing"
  - "key encipherment"
  dnsNames:
  - etcd
  - etcd.{{ .Release.Namespace }}.svc
  - "*.etcd.{{ .Release.Namespace }}.svc"
  - "*.etcd-headless.{{ .Release.Namespace }}.svc"
  - localhost
  ipAddresses:
  - "127.0.0.1"
  privateKey:
    rotationPolicy: Always
    algorithm: RSA
    size: 4096
  issuerRef:
    name: etcd-peer-issuer
    kind: Issuer
---
# Client certificate, referenced by spec.tls.client.operatorClientSecretRef and
# reused by external consumers of the cluster (the Kamaji DataStore).
# commonName=root identifies the caller as the etcd root user under
# --client-cert-auth.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: etcd-client
spec:
  commonName: root
  secretName: etcd-client-tls
  subject:
    organizations:
      - {{ .Release.Namespace }}
    organizationalUnits:
      - {{ .Release.Name }}
  usages:
  - "signing"
  - "key encipherment"
  - "client auth"
  privateKey:
    rotationPolicy: Always
    algorithm: RSA
    size: 4096
  issuerRef:
    name: etcd-issuer
    kind: Issuer
---
apiVersion: cozystack.io/v1alpha1
kind: WorkloadMonitor
metadata:
  name: {{ $.Release.Name }}
  namespace: {{ $.Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  minReplicas: {{ div .Values.replicas 2 | add1 }}
  kind: etcd
  type: etcd
  selector:
    app.kubernetes.io/instance: etcd
    app.kubernetes.io/managed-by: etcd-operator
    app.kubernetes.io/name: etcd
  version: {{ $.Chart.Version }}
---
# Transitional headless Service backing the LEGACY per-pod DNS names.
#
# `etcd-migrate` adopts legacy clusters IN PLACE — the existing Pods are never
# recreated, so they keep their original `spec.subdomain: etcd-headless` (and
# hostname etcd-<i>). Their stable DNS name therefore stays
# `etcd-<i>.etcd-headless.<ns>.svc`, which the v1alpha2 operator dials for
# MemberList/health until the members are eventually rolled onto its native
# `<member>.etcd.<ns>.svc` domain (served by the operator-owned `etcd` Service).
#
# The v1alpha2 operator only creates the native `etcd` Service, and the legacy
# `etcd-headless` Service (previously owned by the old operator) is pruned during
# the transition. Without a Service named `etcd-headless`, the adopted Pods'
# `etcd-<i>.etcd-headless.<ns>.svc` records stop resolving (`no such host`),
# MemberList fails, and status.readyMembers never populates — the cluster never
# goes Ready even though the etcd processes are healthy and in quorum. This is
# the DNS counterpart of the legacy `*.etcd-headless.<ns>.svc` wildcard kept in
# the server/peer cert SANs above for the same transition window.
#
# Selector mirrors the operator's native `etcd` Service
# (etcd-operator.cozystack.io/cluster), so this resolves the same member Pods;
# publishNotReadyAddresses keeps peer discovery working while a member is not
# yet Ready. Safe to remove — together with the legacy cert SAN — once the
# members have been rolled onto the native `etcd` subdomain.
apiVersion: v1
kind: Service
metadata:
  name: etcd-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: etcd
    app.kubernetes.io/instance: {{ .Release.Name }}
    cozystack.io/service: etcd
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    etcd-operator.cozystack.io/cluster: etcd
  ports:
  - name: client
    port: 2379
    targetPort: 2379
    protocol: TCP
  - name: peer
    port: 2380
    targetPort: 2380
    protocol: TCP
