{{- if .Values.backup.enabled }}
{{- if eq .Values.backup.s3AccessKey "<your-access-key>" }}{{ fail "backup.s3AccessKey must be set when backup.enabled=true" }}{{- end }}
{{- if eq .Values.backup.s3SecretKey "<your-secret-key>" }}{{ fail "backup.s3SecretKey must be set when backup.enabled=true" }}{{- end }}
{{- if eq .Values.backup.destinationPath "s3://bucket/path/to/folder/" }}{{ fail "backup.destinationPath must be set to a real s3:// URL when backup.enabled=true" }}{{- end }}
{{- if eq .Values.backup.endpointURL "http://minio-gateway-service:9000" }}{{ fail "backup.endpointURL must be set to a real S3 endpoint when backup.enabled=true" }}{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: etcd-s3-creds
stringData:
  AWS_ACCESS_KEY_ID: {{ required "s3AccessKey is not specified!" .Values.backup.s3AccessKey | quote }}
  AWS_SECRET_ACCESS_KEY: {{ required "s3SecretKey is not specified!" .Values.backup.s3SecretKey | quote }}
{{- end }}
