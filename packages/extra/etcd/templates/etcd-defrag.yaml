apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-defrag
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 2
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: etcd-defrag
            image: ghcr.io/ahrtr/etcd-defrag:v0.13.0
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 200m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            args:
            # The v1alpha2 operator names the headless Service after the
            # cluster ({{ $.Release.Name }}) and does not use StatefulSet
            # ordinal pod names. Point at the headless Service and let
            # --cluster fan the defrag out to every member via member-list.
            - --endpoints=https://{{ $.Release.Name }}.{{ $.Release.Namespace }}.svc:2379
            - --cacert=/etc/etcd/pki/client/cert/ca.crt
            - --cert=/etc/etcd/pki/client/cert/tls.crt
            - --key=/etc/etcd/pki/client/cert/tls.key
            - --cluster
            - --defrag-rule
            - "dbQuotaUsage > 0.8 || dbSize - dbSizeInUse > 200*1024*1024"
            volumeMounts:
            - mountPath: /etc/etcd/pki/client/cert
              name: client-certificate
              readOnly: true
          volumes:
          - name: client-certificate
            secret:
              secretName: {{ .Release.Name }}-client-tls
          restartPolicy: OnFailure
