---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcd-datastore-hook
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: etcd-datastore-hook
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: ["kamaji.clastix.io"]
  resources: ["datastores"]
  verbs: ["create", "get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: etcd-datastore-hook
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: etcd-datastore-hook
subjects:
- kind: ServiceAccount
  name: etcd-datastore-hook
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: etcd-datastore-hook-{{ .Release.Revision }}
  annotations:
    # Weight 10 ensures Job runs after all regular resources including Certificates
    # Job waits for cert-manager to populate TLS Secrets before creating DataStore
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: etcd-datastore-hook
      restartPolicy: OnFailure
      containers:
      - name: create-datastore
        image: rancher/kubectl:v1.29.0
        env:
        - name: CERT_WAIT_TIMEOUT
          value: "300"
        command:
        - sh
        - -exc
        - |
          # Get namespace from ServiceAccount
          NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
          TIMEOUT_SECONDS=${CERT_WAIT_TIMEOUT:-300}
          ITERATIONS=$((TIMEOUT_SECONDS / 2))

          echo "Waiting for cert-manager to populate TLS Secrets in namespace: $NAMESPACE"
          echo "Timeout: $TIMEOUT_SECONDS seconds"

          # Function to validate Secret has both certificate and key
          validate_secret() {
            local secret_name=$1
            local namespace=$2

            # Check certificate exists and is valid (not expired)
            if ! kubectl get secret "$secret_name" --namespace "$namespace" -o jsonpath='{.data.tls\.crt}' | base64 -d | openssl x509 -noout -checkend 0 2>/dev/null; then
              return 1
            fi

            # Check private key exists and is valid
            if ! kubectl get secret "$secret_name" --namespace "$namespace" -o jsonpath='{.data.tls\.key}' | base64 -d | openssl rsa -noout -check 2>/dev/null; then
              return 1
            fi

            return 0
          }

          # Function to print diagnostics on failure
          print_diagnostics() {
            local secret_name=$1
            local namespace=$2

            echo "=== Diagnostic Information ==="
            echo "Certificate status:"
            kubectl describe certificate --namespace "$namespace" 2>&1 || echo "No Certificates found"
            echo ""
            echo "CertificateRequest status:"
            kubectl get certificaterequest --namespace "$namespace" -o wide 2>&1 || echo "No CertificateRequests found"
            echo ""
            echo "Secret $secret_name status:"
            kubectl get secret "$secret_name" --namespace "$namespace" -o yaml 2>&1 || echo "Secret not found"
            echo ""
            echo "cert-manager controller logs (last 50 lines):"
            kubectl logs --namespace cert-manager --selector app=cert-manager --tail=50 2>&1 || echo "Cannot access cert-manager logs"
          }

          # Wait for etcd-ca-tls Secret to be populated by cert-manager
          echo "Checking etcd-ca-tls Secret..."
          for i in $(seq 1 $ITERATIONS); do
            if validate_secret "etcd-ca-tls" "$NAMESPACE"; then
              echo "etcd-ca-tls Secret populated and valid after $((i * 2)) seconds"
              break
            fi
            if [ $i -eq $ITERATIONS ]; then
              echo "ERROR: etcd-ca-tls Secret not populated after $TIMEOUT_SECONDS seconds"
              print_diagnostics "etcd-ca-tls" "$NAMESPACE"
              exit 1
            fi
            sleep 2
          done

          # Wait for etcd-client-tls Secret to be populated by cert-manager
          echo "Checking etcd-client-tls Secret..."
          for i in $(seq 1 $ITERATIONS); do
            if validate_secret "etcd-client-tls" "$NAMESPACE"; then
              echo "etcd-client-tls Secret populated and valid after $((i * 2)) seconds"
              break
            fi
            if [ $i -eq $ITERATIONS ]; then
              echo "ERROR: etcd-client-tls Secret not populated after $TIMEOUT_SECONDS seconds"
              print_diagnostics "etcd-client-tls" "$NAMESPACE"
              exit 1
            fi
            sleep 2
          done

          echo "All TLS Secrets populated and validated"

          # Check if DataStore already exists (upgrade case)
          if kubectl get datastore "{{ .Release.Namespace }}" --namespace "$NAMESPACE" >/dev/null 2>&1; then
            echo "DataStore already exists, skipping creation (upgrade detected)"
            exit 0
          fi

          echo "Creating DataStore..."

          # Create DataStore manifest
          cat <<EOF | kubectl create --namespace "$NAMESPACE" -f -
          apiVersion: kamaji.clastix.io/v1alpha1
          kind: DataStore
          metadata:
            name: {{ .Release.Namespace }}
          spec:
            driver: etcd
            endpoints:
            - etcd.{{ .Release.Namespace }}.svc:2379
            tlsConfig:
              certificateAuthority:
                certificate:
                  secretReference:
                    keyPath: tls.crt
                    name: etcd-ca-tls
                    namespace: {{ .Release.Namespace }}
                privateKey:
                  secretReference:
                    keyPath: tls.key
                    name: etcd-ca-tls
                    namespace: {{ .Release.Namespace }}
              clientCertificate:
                certificate:
                  secretReference:
                    keyPath: tls.crt
                    name: etcd-client-tls
                    namespace: {{ .Release.Namespace }}
                privateKey:
                  secretReference:
                    keyPath: tls.key
                    name: etcd-client-tls
                    namespace: {{ .Release.Namespace }}
          EOF

          echo "DataStore created successfully"
---
apiVersion: v1
kind: Secret
metadata:
  name: etcd-ca-tls
  annotations:
    helm.sh/hook: pre-install
    helm.sh/resource-policy: keep
---
apiVersion: v1
kind: Secret
metadata:
  name: etcd-client-tls
  annotations:
    helm.sh/hook: pre-install
    helm.sh/resource-policy: keep
