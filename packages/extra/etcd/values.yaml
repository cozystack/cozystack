##
## @section Common parameters
##

## @param {quantity} [size] - Persistent Volume size.
size: 4Gi

## @param {string} [storageClass] - StorageClass used to store the data.
storageClass: ""

## @param {int} [replicas] - Number of etcd replicas.
replicas: 3

## @typedef {struct} Resources - Resource configuration for etcd.
## @field {quantity} [cpu] - Number of CPU cores allocated.
## @field {quantity} [memory] - Amount of memory allocated.

## @param {Resources} [resources] - Resource configuration for etcd.
resources:
  cpu: 1000m
  memory: 512Mi

## @param {int} [certWaitTimeout] - Timeout in seconds to wait for cert-manager to populate TLS Secrets.
## Increase this value for environments with slow cert-manager (high load, external CA, resource limits).
certWaitTimeout: 300

## @param {string} [kubectlImage] - Container image used for DataStore creation hook Job.
## MUST contain: sh/bash, kubectl, openssl, base64, date utilities.
## Tested images: alpine/k8s:1.29.0 (alpine + kubectl + openssl)
kubectlImage: alpine/k8s:1.29.0
