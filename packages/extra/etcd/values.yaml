##
## @section Common parameters
##

## @param {string} [version] - etcd version (X.Y.Z) to run, set on the EtcdCluster's spec.version; the operator pulls etcd from its own configured image.
version: "3.6.11"

## @param {quantity} [size] - Persistent Volume size.
size: 4Gi

## @param {string} [storageClass] - StorageClass used to store the data.
storageClass: ""

## @param {int} [replicas] - Number of etcd replicas.
replicas: 3

## @typedef {struct} Resources - Resource configuration for etcd.
## @field {quantity} [cpu] - Number of CPU cores allocated.
## @field {quantity} [memory] - Amount of memory allocated.

## @param {Resources} [resources] - Resource configuration for etcd.
resources:
  cpu: 1000m
  memory: 512Mi

## @param {string} schedulingClass - Name of a SchedulingClass CR (cluster-scoped, group cozystack.io) applied to this application's workloads. When set, takes precedence over any tenant-level schedulingClass. Empty means inherit from the tenant.
schedulingClass: ""
