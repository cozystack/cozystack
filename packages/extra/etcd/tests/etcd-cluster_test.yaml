suite: etcd cluster pins an etcd version new enough for consistent watches

# Retargeted from #3122 to the v1alpha2 chart. Under etcd.aenix.io/v1alpha1 the
# version was forced via a spec.podTemplate container image override (the
# operator hardcoded v3.5.12); v1alpha2 exposes spec.version and the operator
# pulls etcd at that version from its own configured image, so there is no
# podTemplate image to assert. The durable contract is unchanged: the requested
# etcd release is >= 3.5.13 (the floor at which kube-apiserver enables the
# RequestWatchProgress storage feature for consistent watches), never the
# operator-default v3.5.12. The exact patch is intentionally NOT pinned here so
# routine version bumps do not turn this red.

release:
  name: etcd
  namespace: tenant-test

templates:
  - templates/etcd-cluster.yaml

set:
  _cluster: {}

tests:
  - it: requests an etcd version >= 3.5.13 via spec.version
    documentSelector:
      path: kind
      value: EtcdCluster
    asserts:
      - matchRegex:
          path: spec.version
          pattern: ^(3\.5\.(1[3-9]|[2-9][0-9]|[1-9][0-9]{2,})|3\.([6-9]|[1-9][0-9])\.[0-9]+|[4-9][0-9]*\.[0-9]+\.[0-9]+)$

  - it: never falls back to the operator default v3.5.12
    documentSelector:
      path: kind
      value: EtcdCluster
    asserts:
      - notEqual:
          path: spec.version
          value: "3.5.12"

  - it: ships the transitional etcd-headless Service that keeps legacy per-pod DNS resolving during v1alpha2 adoption
    # Adopted Pods keep their legacy `etcd-<i>.etcd-headless.<ns>.svc` DNS (never
    # recreated), which the operator dials for MemberList until members roll onto
    # the native domain. It must be headless, publish not-ready addresses (so
    # peer discovery works before a member is Ready), select the operator's
    # member Pods, and expose the client/peer ports.
    documentSelector:
      path: kind
      value: Service
    asserts:
      - equal:
          path: metadata.name
          value: etcd-headless
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.publishNotReadyAddresses
          value: true
      - equal:
          path: spec.selector["etcd-operator.cozystack.io/cluster"]
          value: etcd
      - contains:
          path: spec.ports
          content:
            name: client
            port: 2379
            targetPort: 2379
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: peer
            port: 2380
            targetPort: 2380
            protocol: TCP
