suite: etcd EtcdCluster TLS uses secretRef matching etcd-migrate adoption
# Review blocker B2: spec.tls is immutable in v1alpha2 and `etcd-migrate` adopts
# legacy clusters into the secretRef shape (serverSecretRef / operatorClientSecretRef
# / peer.secretRef -> etcd-{server,client,peer}-tls). The chart MUST render that
# same shape, not certManager, or every post-adoption reconcile is rejected by the
# CRD's `self.tls == oldSelf.tls` rule and migrated clusters stay non-Ready. The
# chart-issued server/peer certs must carry the operator's native wildcard domain
# so a replacement member (random name) still validates TLS.

release:
  name: etcd
  namespace: tenant-root

templates:
  - templates/etcd-cluster.yaml

tests:
  - it: renders the EtcdCluster TLS as secretRef, not certManager
    set:
      _cluster: {}
    documentSelector:
      path: kind
      value: EtcdCluster
    asserts:
      - equal:
          path: spec.tls.client.serverSecretRef.name
          value: etcd-server-tls
      - equal:
          path: spec.tls.client.operatorClientSecretRef.name
          value: etcd-client-tls
      - equal:
          path: spec.tls.peer.secretRef.name
          value: etcd-peer-tls
      # certManager shape would diverge from the adopted object on the immutable
      # spec.tls subtree -> API rejection on the next HelmRelease reconcile.
      - notExists:
          path: spec.tls.client.certManager
      - notExists:
          path: spec.tls.peer.certManager

  - it: issues the server cert with the operator's native wildcard SANs
    set:
      _cluster: {}
    documentSelector:
      path: metadata.name
      value: etcd-server
    asserts:
      - equal:
          path: spec.secretName
          value: etcd-server-tls
      - contains:
          path: spec.dnsNames
          content: "*.etcd.tenant-root.svc"
      - contains:
          path: spec.dnsNames
          content: "*.etcd-headless.tenant-root.svc"
      - equal:
          path: spec.issuerRef.name
          value: etcd-issuer

  - it: issues the peer cert with the operator's native wildcard SANs
    set:
      _cluster: {}
    documentSelector:
      path: metadata.name
      value: etcd-peer
    asserts:
      - equal:
          path: spec.secretName
          value: etcd-peer-tls
      - contains:
          path: spec.dnsNames
          content: "*.etcd.tenant-root.svc"
      - equal:
          path: spec.issuerRef.name
          value: etcd-peer-issuer
