{{- $exposeExternalIPs := (index .Values._cluster "expose-external-ips") | default "" | nospace }}
{{- $exposeIPsList := list }}
{{- range splitList "," $exposeExternalIPs }}
  {{- $ip := . | trim }}
  {{- if $ip }}
    {{- $exposeIPsList = append $exposeIPsList $ip }}
  {{- end }}
{{- end }}
{{- if not $exposeIPsList }}
{{- fail "publishing.externalIPs is empty — a tenant Gateway has no CiliumLoadBalancerIPPool to draw from. The Gateway Service would stay in <pending> with no address. Set publishing.externalIPs on the platform (or publishing.exposure=loadBalancer with a BGP / L2-announce pool you manage separately) before enabling tenant.spec.gateway=true." }}
{{- end }}
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: {{ trimPrefix "tenant-" .Release.Namespace }}-gateway
spec:
  blocks:
  {{- range $exposeIPsList }}
  - cidr: {{ . }}{{ if not (contains "/" .) }}/{{ if contains ":" . }}128{{ else }}32{{ end }}{{ end }}
  {{- end }}
  serviceSelector:
    matchLabels:
      "io.kubernetes.service.namespace": {{ .Release.Namespace | quote }}
      "gateway.networking.k8s.io/gateway-name": cozystack
