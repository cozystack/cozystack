{{- $exposeIngress := (index .Values._cluster "expose-ingress") | default "tenant-root" }}
{{- $host := (index .Values._cluster "host") | default "" }}
{{- $issuerName := (index .Values._cluster "issuer-name") | default "letsencrypt-prod" }}
{{- if not (eq $exposeIngress .Release.Namespace) }}
{{- fail (printf "packages/extra/gateway is only meaningful in the publishing namespace %q; current release namespace is %q. Set tenant.spec.gateway=true on that tenant only." $exposeIngress .Release.Namespace) }}
{{- end }}
{{- if not $host }}
{{- fail "publishing.host must be set in the platform chart for packages/extra/gateway to render a wildcard TLS listener." }}
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ trimPrefix "tenant-" .Release.Namespace }}-gateway-tls
spec:
  secretName: {{ trimPrefix "tenant-" .Release.Namespace }}-gateway-tls
  issuerRef:
    name: {{ $issuerName }}
    kind: ClusterIssuer
  dnsNames:
  - {{ $host | quote }}
  - {{ printf "*.%s" $host | quote }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cozystack
  labels:
    cozystack.io/gateway: {{ .Release.Namespace }}
spec:
  gatewayClassName: {{ .Values.gatewayClassName | quote }}
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            cozystack.io/gateway: {{ .Release.Namespace }}
  - name: https
    protocol: HTTPS
    port: 443
    hostname: {{ printf "*.%s" $host | quote }}
    tls:
      mode: Terminate
      certificateRefs:
      - name: {{ trimPrefix "tenant-" .Release.Namespace }}-gateway-tls
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            cozystack.io/gateway: {{ .Release.Namespace }}
  - name: https-apex
    protocol: HTTPS
    port: 443
    hostname: {{ $host | quote }}
    tls:
      mode: Terminate
      certificateRefs:
      - name: {{ trimPrefix "tenant-" .Release.Namespace }}-gateway-tls
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            cozystack.io/gateway: {{ .Release.Namespace }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
spec:
  parentRefs:
  - name: cozystack
    sectionName: http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
