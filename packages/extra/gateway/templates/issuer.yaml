{{- $issuerName := (index .Values._cluster "issuer-name") | default "letsencrypt-prod" }}
{{- $solver := (index .Values._cluster "solver") | default "http01" }}
{{- $provider := (index .Values._cluster "dns01-provider") | default "cloudflare" }}
{{- $acmeServer := "" }}
{{- if eq $issuerName "letsencrypt-prod" }}
  {{- $acmeServer = "https://acme-v02.api.letsencrypt.org/directory" }}
{{- else if eq $issuerName "letsencrypt-stage" }}
  {{- $acmeServer = "https://acme-staging-v02.api.letsencrypt.org/directory" }}
{{- else }}
  {{- fail (printf "packages/extra/gateway currently supports publishing.certificates.issuerName=letsencrypt-prod or letsencrypt-stage (got %q). For other issuers, extend templates/issuer.yaml to map the name to the corresponding ACME server URL." $issuerName) }}
{{- end }}
{{- /*
  Let's Encrypt refuses to issue wildcard certificates via HTTP-01 (see
  cert-manager/cert-manager-crds/.../crd-cert-manager.io_clusterissuers.yaml
  at the http01 field description, and LE policy
  https://letsencrypt.org/docs/challenge-types/#http-01-challenge). The
  tenant Gateway's Certificate requests apex + *.apex, so HTTP-01 would
  loop the Order forever and the HTTPS listeners would never get a cert.
  Require dns01 (or selfsigned) for Gateway API tenants — fail fast so
  the operator sees the mismatch at install time instead of during a
  stuck cert-manager challenge.
*/}}
{{- if eq $solver "http01" }}
  {{- fail "publishing.certificates.solver=http01 cannot issue the wildcard certificate the tenant Gateway needs (Let's Encrypt refuses HTTP-01 for wildcard identifiers). Set publishing.certificates.solver=dns01 (with a Cloudflare API token Secret in cozy-cert-manager) before enabling tenant.spec.gateway=true, or use the self-signed ClusterIssuer for air-gapped clusters." }}
{{- else if ne $solver "dns01" }}
  {{- fail (printf "packages/extra/gateway currently supports publishing.certificates.solver=dns01 only (got %q). Extend templates/issuer.yaml to add additional solver types." $solver) }}
{{- end }}
{{- /*
  DNS-01 provider dispatch. Each branch validates its required inputs and
  renders the cert-manager solver block matching the provider's schema.
  Adding a provider: add a branch here and a corresponding test case in
  tests/issuer_dns01_providers_test.yaml. Reserved values: cloudflare,
  route53, digitalocean, rfc2136.
*/}}
{{- $supported := list "cloudflare" "route53" "digitalocean" "rfc2136" }}
{{- if not (has $provider $supported) }}
  {{- fail (printf "packages/extra/gateway: unsupported _cluster.dns01-provider=%q. Supported values: cloudflare, route53, digitalocean, rfc2136. To add another provider, extend templates/issuer.yaml with the corresponding solver block." $provider) }}
{{- end }}
{{- if eq $provider "route53" }}
  {{- if not (index .Values._cluster "dns01-route53-region") }}
    {{- fail "packages/extra/gateway: _cluster.dns01-route53-region is required when dns01-provider=route53" }}
  {{- end }}
{{- end }}
{{- if eq $provider "rfc2136" }}
  {{- if not (index .Values._cluster "dns01-rfc2136-nameserver") }}
    {{- fail "packages/extra/gateway: _cluster.dns01-rfc2136-nameserver is required when dns01-provider=rfc2136" }}
  {{- end }}
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: gateway
spec:
  acme:
    server: {{ $acmeServer }}
    privateKeySecretRef:
      name: gateway-acme-account
    solvers:
    - dns01:
    {{- if eq $provider "cloudflare" }}
        cloudflare:
          apiTokenSecretRef:
            name: {{ (index .Values._cluster "dns01-cloudflare-secret-name") | default "cloudflare-api-token-secret" }}
            key: {{ (index .Values._cluster "dns01-cloudflare-secret-key") | default "api-token" }}
    {{- else if eq $provider "route53" }}
        route53:
          region: {{ (index .Values._cluster "dns01-route53-region") | quote }}
          accessKeyID: {{ (index .Values._cluster "dns01-route53-access-key-id") | quote }}
          secretAccessKeySecretRef:
            name: {{ (index .Values._cluster "dns01-route53-secret-name") | quote }}
            key: {{ (index .Values._cluster "dns01-route53-secret-key") | default "secret-access-key" }}
    {{- else if eq $provider "digitalocean" }}
        digitalocean:
          tokenSecretRef:
            name: {{ (index .Values._cluster "dns01-digitalocean-secret-name") | default "digitalocean-api-token-secret" }}
            key: {{ (index .Values._cluster "dns01-digitalocean-secret-key") | default "access-token" }}
    {{- else if eq $provider "rfc2136" }}
        rfc2136:
          nameserver: {{ (index .Values._cluster "dns01-rfc2136-nameserver") | quote }}
          tsigKeyName: {{ (index .Values._cluster "dns01-rfc2136-tsig-key-name") | quote }}
          tsigAlgorithm: {{ (index .Values._cluster "dns01-rfc2136-tsig-algorithm") | default "HMACSHA256" }}
          tsigSecretSecretRef:
            name: {{ (index .Values._cluster "dns01-rfc2136-secret-name") | quote }}
            key: {{ (index .Values._cluster "dns01-rfc2136-secret-key") | default "tsig-secret-key" }}
    {{- end }}
