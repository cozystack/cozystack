suite: issuer DNS-01 provider parametrization
templates:
  - templates/issuer.yaml

release:
  name: gateway
  namespace: tenant-root

tests:
  - it: defaults to cloudflare when dns01-provider is not set (backward compatibility)
    set:
      _cluster:
        solver: dns01
        expose-ingress: tenant-root
        issuer-name: letsencrypt-prod
      _namespace:
        host: example.org
    asserts:
      - equal:
          path: spec.acme.solvers[0].dns01.cloudflare.apiTokenSecretRef.name
          value: cloudflare-api-token-secret
      - equal:
          path: spec.acme.solvers[0].dns01.cloudflare.apiTokenSecretRef.key
          value: api-token

  - it: explicit dns01-provider=cloudflare renders the cloudflare solver with overridable secret refs
    set:
      _cluster:
        solver: dns01
        dns01-provider: cloudflare
        dns01-cloudflare-secret-name: my-cf-secret
        dns01-cloudflare-secret-key: token
        expose-ingress: tenant-root
        issuer-name: letsencrypt-prod
      _namespace:
        host: example.org
    asserts:
      - equal:
          path: spec.acme.solvers[0].dns01.cloudflare.apiTokenSecretRef.name
          value: my-cf-secret
      - equal:
          path: spec.acme.solvers[0].dns01.cloudflare.apiTokenSecretRef.key
          value: token

  - it: dns01-provider=route53 renders the route53 solver block
    set:
      _cluster:
        solver: dns01
        dns01-provider: route53
        dns01-route53-region: us-east-1
        dns01-route53-access-key-id: AKIAEXAMPLE
        dns01-route53-secret-name: route53-creds
        dns01-route53-secret-key: secret-access-key
        expose-ingress: tenant-root
        issuer-name: letsencrypt-prod
      _namespace:
        host: example.org
    asserts:
      - equal:
          path: spec.acme.solvers[0].dns01.route53.region
          value: us-east-1
      - equal:
          path: spec.acme.solvers[0].dns01.route53.accessKeyID
          value: AKIAEXAMPLE
      - equal:
          path: spec.acme.solvers[0].dns01.route53.secretAccessKeySecretRef.name
          value: route53-creds
      - equal:
          path: spec.acme.solvers[0].dns01.route53.secretAccessKeySecretRef.key
          value: secret-access-key
      - notExists:
          path: spec.acme.solvers[0].dns01.cloudflare

  - it: dns01-provider=digitalocean renders the digitalocean solver block
    set:
      _cluster:
        solver: dns01
        dns01-provider: digitalocean
        dns01-digitalocean-secret-name: do-token
        dns01-digitalocean-secret-key: access-token
        expose-ingress: tenant-root
        issuer-name: letsencrypt-prod
      _namespace:
        host: example.org
    asserts:
      - equal:
          path: spec.acme.solvers[0].dns01.digitalocean.tokenSecretRef.name
          value: do-token
      - equal:
          path: spec.acme.solvers[0].dns01.digitalocean.tokenSecretRef.key
          value: access-token
      - notExists:
          path: spec.acme.solvers[0].dns01.cloudflare

  - it: dns01-provider=rfc2136 renders the rfc2136 solver block with TSIG config
    set:
      _cluster:
        solver: dns01
        dns01-provider: rfc2136
        dns01-rfc2136-nameserver: 192.0.2.53:53
        dns01-rfc2136-tsig-key-name: cozystack-acme
        dns01-rfc2136-tsig-algorithm: HMACSHA256
        dns01-rfc2136-secret-name: rfc2136-tsig
        dns01-rfc2136-secret-key: tsig-secret-key
        expose-ingress: tenant-root
        issuer-name: letsencrypt-prod
      _namespace:
        host: example.org
    asserts:
      - equal:
          path: spec.acme.solvers[0].dns01.rfc2136.nameserver
          value: 192.0.2.53:53
      - equal:
          path: spec.acme.solvers[0].dns01.rfc2136.tsigKeyName
          value: cozystack-acme
      - equal:
          path: spec.acme.solvers[0].dns01.rfc2136.tsigAlgorithm
          value: HMACSHA256
      - equal:
          path: spec.acme.solvers[0].dns01.rfc2136.tsigSecretSecretRef.name
          value: rfc2136-tsig
      - equal:
          path: spec.acme.solvers[0].dns01.rfc2136.tsigSecretSecretRef.key
          value: tsig-secret-key
      - notExists:
          path: spec.acme.solvers[0].dns01.cloudflare

  - it: rfc2136 tsig-algorithm defaults to HMACSHA256 when not set
    set:
      _cluster:
        solver: dns01
        dns01-provider: rfc2136
        dns01-rfc2136-nameserver: 192.0.2.53:53
        dns01-rfc2136-tsig-key-name: cozystack-acme
        dns01-rfc2136-secret-name: rfc2136-tsig
        expose-ingress: tenant-root
        issuer-name: letsencrypt-prod
      _namespace:
        host: example.org
    asserts:
      - equal:
          path: spec.acme.solvers[0].dns01.rfc2136.tsigAlgorithm
          value: HMACSHA256

  - it: unknown dns01-provider fails chart render with an explicit error
    set:
      _cluster:
        solver: dns01
        dns01-provider: oraclednslol
        expose-ingress: tenant-root
        issuer-name: letsencrypt-prod
      _namespace:
        host: example.org
    asserts:
      - failedTemplate:
          errorMessage: 'packages/extra/gateway: unsupported _cluster.dns01-provider="oraclednslol". Supported values: cloudflare, route53, digitalocean, rfc2136. To add another provider, extend templates/issuer.yaml with the corresponding solver block.'

  - it: route53 fails clearly when required region is empty
    set:
      _cluster:
        solver: dns01
        dns01-provider: route53
        dns01-route53-access-key-id: AKIAEXAMPLE
        dns01-route53-secret-name: route53-creds
        expose-ingress: tenant-root
        issuer-name: letsencrypt-prod
      _namespace:
        host: example.org
    asserts:
      - failedTemplate:
          errorMessage: "packages/extra/gateway: _cluster.dns01-route53-region is required when dns01-provider=route53"

  - it: rfc2136 fails clearly when required nameserver is empty
    set:
      _cluster:
        solver: dns01
        dns01-provider: rfc2136
        dns01-rfc2136-tsig-key-name: cozystack-acme
        dns01-rfc2136-secret-name: rfc2136-tsig
        expose-ingress: tenant-root
        issuer-name: letsencrypt-prod
      _namespace:
        host: example.org
    asserts:
      - failedTemplate:
          errorMessage: "packages/extra/gateway: _cluster.dns01-rfc2136-nameserver is required when dns01-provider=rfc2136"
