suite: TLS certificate helper

templates:
  - templates/tests/tls.yaml

tests:
  # Certificate CR renders with all required fields
  - it: renders a Certificate CR with all required fields
    values:
      - tls_values.yaml
    release:
      name: test-release
      namespace: tenant-test
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Certificate
      - isAPIVersion:
          of: cert-manager.io/v1
      - equal:
          path: metadata.name
          value: my-redis-tls
      - equal:
          path: spec.secretName
          value: my-redis-tls-secret
      - equal:
          path: spec.privateKey.algorithm
          value: RSA
      - equal:
          path: spec.privateKey.size
          value: 2048

  # dnsNames are correctly set and quoted
  - it: sets dnsNames correctly
    values:
      - tls_values.yaml
    release:
      name: test-release
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.dnsNames
          value:
            - "redis-svc"
            - "redis-svc.tenant-test.svc"

  # issuerRef is correctly set
  - it: sets issuerRef correctly
    values:
      - tls_values.yaml
    release:
      name: test-release
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.issuerRef.name
          value: selfsigned-cluster-issuer
      - equal:
          path: spec.issuerRef.kind
          value: ClusterIssuer
      - equal:
          path: spec.issuerRef.group
          value: cert-manager.io

  # Labels include release info
  - it: includes standard labels
    values:
      - tls_values.yaml
    release:
      name: test-release
      namespace: tenant-test
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  # Default duration and renewBefore are used when not provided
  - it: uses default duration and renewBefore
    values:
      - tls_values.yaml
    release:
      name: test-release
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.duration
          value: 8760h
      - equal:
          path: spec.renewBefore
          value: 720h

  # Custom duration and renewBefore work when provided
  - it: uses custom duration and renewBefore when provided
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: custom-tls
        secretName: custom-tls-secret
        dnsNames:
          - svc.example
        issuerRef:
          name: my-issuer
          kind: Issuer
        duration: 43800h
        renewBefore: 360h
    asserts:
      - equal:
          path: spec.duration
          value: 43800h
      - equal:
          path: spec.renewBefore
          value: 360h

  # Default usages is server auth
  - it: uses server auth as default usage
    values:
      - tls_values.yaml
    release:
      name: test-release
      namespace: tenant-test
    asserts:
      - equal:
          path: spec.usages
          value:
            - server auth

  # Custom usages work when provided
  - it: uses custom usages when provided
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: client-tls
        secretName: client-tls-secret
        dnsNames:
          - svc.example
        issuerRef:
          name: my-issuer
          kind: ClusterIssuer
        usages:
          - server auth
          - client auth
    asserts:
      - equal:
          path: spec.usages
          value:
            - server auth
            - client auth

  # secretName defaults to name when not provided
  - it: uses name as secretName when secretName not provided
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: my-tls-cert
        dnsNames:
          - svc.example
        issuerRef:
          name: selfsigned-cluster-issuer
          kind: ClusterIssuer
    asserts:
      - equal:
          path: metadata.name
          value: my-tls-cert
      - equal:
          path: spec.secretName
          value: my-tls-cert

  # Issuer kind is passed through to Certificate CR
  - it: passes issuerRef kind to Certificate CR
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: test-tls
        dnsNames:
          - svc.example
        issuerRef:
          name: selfsigned-cluster-issuer
          kind: ClusterIssuer
    asserts:
      - equal:
          path: spec.issuerRef.kind
          value: ClusterIssuer

  # Namespace-scoped Issuer also works
  - it: supports namespace-scoped Issuer
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: test-tls
        dnsNames:
          - svc.example
        issuerRef:
          name: my-namespace-issuer
          kind: Issuer
    asserts:
      - equal:
          path: spec.issuerRef.kind
          value: Issuer
      - equal:
          path: spec.issuerRef.name
          value: my-namespace-issuer

  # TLS disabled produces zero documents
  - it: produces zero documents when tls is not set
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
    asserts:
      - hasDocuments:
          count: 0

  # TLS disabled when tls is explicitly null
  - it: produces zero documents when tls is null
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls: null
    asserts:
      - hasDocuments:
          count: 0

  # Empty dnsNames triggers a validation error
  - it: errors when dnsNames is empty
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: empty-dns-tls
        dnsNames: []
        issuerRef:
          name: selfsigned-cluster-issuer
          kind: ClusterIssuer
    asserts:
      - failedTemplate:
          errorMessage: 'ERROR: "dnsNames" is required for cozy-lib.tls.certificate. Provide at least one DNS name as a list.'

  # Missing issuerRef name triggers a validation error
  - it: errors when issuerRef name is not provided
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: missing-issuer-tls
        dnsNames:
          - svc.example
        issuerRef:
          kind: ClusterIssuer
    asserts:
      - failedTemplate:
          errorMessage: 'ERROR: "issuerRef.name" is required for cozy-lib.tls.certificate. Specify the ClusterIssuer or Issuer name.'

  # Missing issuerRef kind triggers a validation error
  - it: errors when issuerRef kind is not provided
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: missing-kind-tls
        dnsNames:
          - svc.example
        issuerRef:
          name: my-issuer
    asserts:
      - failedTemplate:
          errorMessage: 'ERROR: "issuerRef.kind" is required for cozy-lib.tls.certificate. Specify "ClusterIssuer" or "Issuer".'

  # Invalid issuerRef kind triggers a validation error
  - it: errors when issuerRef kind is not Issuer or ClusterIssuer
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: invalid-kind-tls
        dnsNames:
          - svc.example
        issuerRef:
          name: my-issuer
          kind: InvalidKind
    asserts:
      - failedTemplate:
          errorMessage: 'ERROR: issuerRef.kind must be "Issuer" or "ClusterIssuer"'

  # extraDnsNames are appended to dnsNames
  - it: appends extraDnsNames to dnsNames
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: extra-dns-tls
        dnsNames:
          - redis-svc
        issuerRef:
          name: selfsigned-cluster-issuer
          kind: ClusterIssuer
        extraDnsNames:
          - custom.example.com
          - backup.example.com
    asserts:
      - equal:
          path: spec.dnsNames
          value:
            - "redis-svc"
            - "custom.example.com"
            - "backup.example.com"

  # Wildcard dnsNames are properly quoted for YAML safety
  - it: quotes wildcard domains in dnsNames and extraDnsNames
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: wildcard-tls
        dnsNames:
          - "*.redis.example.com"
        issuerRef:
          name: selfsigned-cluster-issuer
          kind: ClusterIssuer
        extraDnsNames:
          - "*.example.com"
    asserts:
      - equal:
          path: spec.dnsNames
          value:
            - "*.redis.example.com"
            - "*.example.com"

  # Empty string duration should fall back to default 8760h
  - it: uses default duration when duration is an empty string
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: empty-duration-tls
        dnsNames:
          - svc.example
        issuerRef:
          name: selfsigned-cluster-issuer
          kind: ClusterIssuer
        duration: ""
        renewBefore: ""
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.duration
          value: 8760h
      - equal:
          path: spec.renewBefore
          value: 720h

  # Missing name triggers a validation error
  - it: errors when name is not provided
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        dnsNames:
          - svc.example
        issuerRef:
          name: selfsigned-cluster-issuer
          kind: ClusterIssuer
    asserts:
      - failedTemplate:
          errorMessage: 'ERROR: "name" is required for cozy-lib.tls.certificate. It sets the Certificate CR metadata.name.'

  # Missing issuerRef entirely triggers a validation error
  - it: errors when issuerRef is not provided
    release:
      name: test-release
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tls:
        name: missing-issuerref-tls
        dnsNames:
          - svc.example
    asserts:
      - failedTemplate:
          errorMessage: 'ERROR: "issuerRef" is required for cozy-lib.tls.certificate. Provide a dict with "name" and "kind".'
