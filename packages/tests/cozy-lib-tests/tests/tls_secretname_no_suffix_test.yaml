suite: TLS secretName helper - suffix not needed when secretName provided

templates:
  - templates/tests/tls-secretname-missing-suffix.yaml

tests:
  - it: returns secretName without requiring suffix
    release:
      name: my-app
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tlsSecretName: my-custom-tls-secret
    asserts:
      - equal:
          path: data.secretName
          value: my-custom-tls-secret
