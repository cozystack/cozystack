suite: TLS secretName helper - suffix validation

templates:
  - templates/tests/tls-secretname-missing-suffix.yaml

tests:
  - it: errors when suffix is not provided
    release:
      name: my-app
      namespace: tenant-test
    set:
      _cluster: {}
      _namespace: {}
      tlsSecretName: ""
    asserts:
      - failedTemplate:
          errorMessage: 'ERROR: "suffix" is required for cozy-lib.tls.secretName when secretName is not provided. Provide a suffix for the generated secret name (e.g. "tls", "server-tls").'
