# A REAL, self-signed CA certificate (EC P-256, long-dated), not a
# certificate-shaped string.
#
# The helper's guard is a regex — it cannot parse x509, and it never will (no
# parser is reachable from a Helm template; see the guard). So a fictional body
# would "pass" here exactly as a real one does, and that is precisely why the
# fixture must be real: a fixture only a regex can tell apart from a certificate
# leaves the suite asserting against something no verifier would accept, and
# documents a lie to the next reader about what a trust anchor looks like.
#
# The Go-side suite learned this the hard way — its fixture was armour around a
# truncated DER prefix, and every test "proving" the write-path guard worked was
# asserting against a non-certificate.
