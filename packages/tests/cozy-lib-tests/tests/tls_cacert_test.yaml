# ./tests/tls_cacert_test.yaml
suite: tls caCertSecret helper

templates:
  - templates/tests/tls-cacert.yaml
  - templates/tests/tls-cacert-params.yaml
  - templates/tests/tls-cacert-nondict.yaml

release:
  name: myrelease
  namespace: tenant-acme
  revision: 1
  isUpgrade: false

tests:
  - it: renders an Opaque Secret carrying only ca.crt
    templates:
      - templates/tests/tls-cacert.yaml
    values:
      - tls_cacert_values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: metadata.name
          value: myrelease.tenant-ca
      - equal:
          path: metadata.namespace
          value: tenant-acme
      - equal:
          path: type
          value: Opaque
      # internal.cozystack.io/tenant-ca is the label that actually reaches the
      # tenant: it is the single engine-agnostic selector an ApplicationDefinition
      # puts in spec.secrets.include[].matchLabels, and the CA-extraction
      # controller stamps it on every anchor it projects. A helper-rendered anchor
      # that lacked it would share the canonical NAME with a projected one but not
      # the LABEL, so the generic selector would miss it and the tenant would be
      # locked out of the object this helper exists to publish.
      - equal:
          path: metadata.labels["internal.cozystack.io/tenant-ca"]
          value: "true"
      - isNotNullOrEmpty:
          path: stringData["ca.crt"]
      # The trust anchor must never carry private key material. The helper
      # only ever emits stringData, so these are the meaningful assertions.
      - notExists:
          path: stringData["tls.key"]
      - notExists:
          path: stringData["tls.crt"]

  - it: carries the tenantresource label so it is delivered via core.cozystack.io/tenantsecrets
    templates:
      - templates/tests/tls-cacert.yaml
    values:
      - tls_cacert_values.yaml
    asserts:
      # This label is the entire RBAC delivery mechanism: the tenantsecret
      # registry surfaces only Secrets bearing it, and the base tenant roles
      # grant read on core.cozystack.io/tenantsecrets (not raw core secrets).
      - equal:
          path: metadata.labels["internal.cozystack.io/tenantresource"]
          value: "true"

  - it: merges caller-supplied labels and annotations
    templates:
      - templates/tests/tls-cacert.yaml
    values:
      - tls_cacert_values.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: myrelease
      - equal:
          path: metadata.annotations["cozystack.io/example"]
          value: "yes"

  - it: keeps the mandatory tenantresource label even when a caller tries to override it
    templates:
      - templates/tests/tls-cacert.yaml
    values:
      - tls_cacert_values.yaml
    set:
      # A caller (or a compromised values override) attempting to opt the object
      # out of tenant delivery — or worse, flip the label onto a key-bearing
      # Secret — must not win. The helper's mandatory label always overrides.
      callerLabels:
        internal.cozystack.io/tenantresource: "false"
    asserts:
      - equal:
          path: metadata.labels["internal.cozystack.io/tenantresource"]
          value: "true"

  - it: fails closed when caCert is empty
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      caCert: ""
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert is required and must be a non-empty PEM"

  - it: refuses to publish private key material to tenants
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      caCert: |
        -----BEGIN EC PRIVATE KEY-----
        MHcCAQEEexampleprivatekeymaterialthatmustneverreachtenants00000000
        -----END EC PRIVATE KEY-----
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must not contain private key material"

  - it: refuses private key material regardless of PEM header casing
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      # RFC 7468 mandates uppercase headers, but the guard must also catch
      # malformed / hand-pasted input where the casing differs.
      caCert: |
        -----begin private key-----
        MIIExampleLowercaseHeaderPrivateKeyMustStillBeRejected0000000000
        -----end private key-----
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must not contain private key material"

  - it: refuses a certificate bundle that also carries a private key block
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      # The realistic accident: a full keypair pasted into the CA field. The
      # guard must scan the entire blob, not merely reject key-only input — a
      # valid leading certificate block must not let a trailing private key
      # slip through to a tenant-readable trust anchor.
      caCert: |
        -----BEGIN CERTIFICATE-----
        MIIBjTCCATOgAwIBAgIUEVKlZMojk6oxsIdEnHzgqNSB5EQwCgYIKoZIzj0EAwIw
        GzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTAgFw0yNjA3MTYxNjM0NDZaGA8y
        MTI2MDYyMjE2MzQ0NlowGzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTBZMBMG
        ByqGSM49AgEGCCqGSM49AwEHA0IABHYaDAyL+v09MqV1Yp1T1AE7Y6LHqBnVF2kH
        4mzq8ewzoqb7EF/IY/acC4G514Lsi212vky2z+yk61EIWlgzqmGjUzBRMB0GA1Ud
        DgQWBBReFu/b3ZdMzmFjrOTD8A8bFPX6fDAfBgNVHSMEGDAWgBReFu/b3ZdMzmFj
        rOTD8A8bFPX6fDAPBgNVHRMBAf8EBTADAQH/MAoGCCqGSM49BAMCA0gAMEUCIQCj
        P8IEUi9H4YcxOyAtGt22n6WCP8dqxP4p2QfkcRl6LAIgSOIMy4oHa5IJWREYdFt9
        L/I7Ek4FlYbzy9kZu/MXqlE=
        -----END CERTIFICATE-----
        -----BEGIN PRIVATE KEY-----
        MIIExamplePrivateKeyThatMustNeverReachTenantsViaCABundle00000000
        -----END PRIVATE KEY-----
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must not contain private key material"

  - it: rejects input that is not a PEM certificate
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      caCert: |
        this is not a certificate at all
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must contain a complete PEM certificate block (BEGIN/END CERTIFICATE)"

  # The three cases below all carry a correct BEGIN CERTIFICATE line and no key
  # header, so a guard that only matched the header admitted every one of them
  # and rendered a trust anchor with nothing usable in it. A Helm template cannot
  # parse x509 (see the helper), but it can insist on a COMPLETE, base64-bodied
  # block rather than the word "BEGIN".
  - it: rejects certificate armour with no closing line
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      caCert: |
        -----BEGIN CERTIFICATE-----
        MIIBExampleCertificateBodyWithNoClosingLine0000000000000000000000
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must contain a complete PEM certificate block (BEGIN/END CERTIFICATE)"

  - it: rejects empty certificate armour
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      caCert: |
        -----BEGIN CERTIFICATE-----
        -----END CERTIFICATE-----
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must contain a complete PEM certificate block (BEGIN/END CERTIFICATE)"

  # Named for what it actually checks. It used to be called "rejects certificate
  # armour wrapped around a non-base64 body", which the guard does not do and
  # cannot: a regex cannot count a base64 body modulo 4. It passed only because
  # of the trailing "!" — drop that one character and the body is spelled
  # entirely in base64 characters and is ACCEPTED. The case below keeps the "!"
  # and now says why it is there.
  - it: rejects certificate armour whose body carries characters base64 never uses
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      caCert: |
        -----BEGIN CERTIFICATE-----
        this is not base64 and never could be!
        -----END CERTIFICATE-----
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must contain a complete PEM certificate block (BEGIN/END CERTIFICATE)"

  # The limit that the case above used to disguise, pinned as a known gap rather
  # than left for someone to discover. A body spelled in base64 characters passes
  # this guard however little sense it makes; only the controller's
  # x509.ParseCertificate can refuse it, and the controller is what every real
  # trust anchor goes through.
  - it: accepts armour around a base64-alphabet body it cannot decode (documented limit)
    templates:
      - templates/tests/tls-cacert-params.yaml
    set:
      useParams: true
      name: my.tenant-ca
      caCert: |
        -----BEGIN CERTIFICATE-----
        this is not base64 and never could be
        -----END CERTIFICATE-----
    asserts:
      - isKind:
          of: Secret

  # PGP spells its header "-----BEGIN PGP PRIVATE KEY BLOCK-----", putting BLOCK
  # between "PRIVATE KEY" and the closing dashes. A guard anchored on those
  # dashes misses it — and this end has no second line of defence, so the miss
  # would publish a private key to tenants. It is also the flavour a human is
  # most likely to paste by hand.
  - it: refuses a PGP private key block next to a valid certificate
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      caCert: |
        -----BEGIN CERTIFICATE-----
        MIIBjTCCATOgAwIBAgIUEVKlZMojk6oxsIdEnHzgqNSB5EQwCgYIKoZIzj0EAwIw
        -----END CERTIFICATE-----
        -----BEGIN PGP PRIVATE KEY BLOCK-----
        lQOYBGaaaaaaExamplePgpPrivateKeyMustNeverReachTenants0000000000
        -----END PGP PRIVATE KEY BLOCK-----
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must not contain private key material"

  # An unquoted numeric scalar in values.yaml parses to a float64, and any string
  # operation on it dies with a raw Go template error. The guard must fail closed
  # AND say which field the author got wrong.
  - it: fails closed with its own message on a numeric caCert
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      caCert: 12345
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must contain a complete PEM certificate block (BEGIN/END CERTIFICATE)"

  # The coercion's known wart, pinned so it is documented rather than discovered.
  # `default ""` runs before printf and sprig treats 0 as empty, so a supplied
  # zero is reported as "required". It fails closed — 0 is not a certificate
  # either way — and swapping the order would make `default` useless for a value
  # that is genuinely absent. Pinned because a reader of the guard's comment will
  # otherwise expect the other message.
  - it: reports a zero caCert as required, not as a bad certificate
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      caCert: 0
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert is required and must be a non-empty PEM"

  - it: accepts a certificate chain of more than one block
    templates:
      - templates/tests/tls-cacert-params.yaml
    set:
      useParams: true
      name: my.tenant-ca
      # An intermediate chain is an ordinary trust anchor and must keep
      # rendering: the tightened guard bounds the block SHAPE, not the count.
      caCert: |
        -----BEGIN CERTIFICATE-----
        MIIBojCCAUegAwIBAgIUMUqqtF2pMghhaI9FEJwiX0S46MswCgYIKoZIzj0EAwIw
        JTEjMCEGA1UEAwwaY296eS1saWItdGVzdC1pbnRlcm1lZGlhdGUwIBcNMjYwNzE2
        MTYzNDQ2WhgPMjEyNjA2MjIxNjM0NDZaMCUxIzAhBgNVBAMMGmNvenktbGliLXRl
        c3QtaW50ZXJtZWRpYXRlMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEePlhpS2d
        Vaj6KcyvQfs96sNWDF+gGJDsNRXAEjPUUkBVZBdkQWVrch4f6ti7yxwrY8a9ZqJP
        KIOB7HdvTJReeqNTMFEwHQYDVR0OBBYEFHbXOUxHp7KY7yfSQlLON+LKu68wMB8G
        A1UdIwQYMBaAFHbXOUxHp7KY7yfSQlLON+LKu68wMA8GA1UdEwEB/wQFMAMBAf8w
        CgYIKoZIzj0EAwIDSQAwRgIhAMgKiremKARWnyMIR4U8TXCs8nsJuYB1DjQcYYvP
        KgyxAiEArfXXEHDpM1vBD4Nf58F98I+6RhN5yQHn7uokVrm88Cc=
        -----END CERTIFICATE-----
        -----BEGIN CERTIFICATE-----
        MIIBjTCCATOgAwIBAgIUEVKlZMojk6oxsIdEnHzgqNSB5EQwCgYIKoZIzj0EAwIw
        GzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTAgFw0yNjA3MTYxNjM0NDZaGA8y
        MTI2MDYyMjE2MzQ0NlowGzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTBZMBMG
        ByqGSM49AgEGCCqGSM49AwEHA0IABHYaDAyL+v09MqV1Yp1T1AE7Y6LHqBnVF2kH
        4mzq8ewzoqb7EF/IY/acC4G514Lsi212vky2z+yk61EIWlgzqmGjUzBRMB0GA1Ud
        DgQWBBReFu/b3ZdMzmFjrOTD8A8bFPX6fDAfBgNVHSMEGDAWgBReFu/b3ZdMzmFj
        rOTD8A8bFPX6fDAPBgNVHRMBAf8EBTADAQH/MAoGCCqGSM49BAMCA0gAMEUCIQCj
        P8IEUi9H4YcxOyAtGt22n6WCP8dqxP4p2QfkcRl6LAIgSOIMy4oHa5IJWREYdFt9
        L/I7Ek4FlYbzy9kZu/MXqlE=
        -----END CERTIFICATE-----
    asserts:
      - isKind:
          of: Secret
      - isNotNullOrEmpty:
          path: stringData["ca.crt"]

  - it: rejects a certificate wrapped in a friendlyName preamble as a structural failure
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      # The helper emits caCert VERBATIM, so it must refuse anything that is not
      # certificate blocks and whitespace — a preamble line would otherwise reach
      # the tenant trust anchor unaltered. This case is also where the private-key
      # guard proves it does not false-positive: "PRIVATE KEY" here is in a
      # friendlyName line, not a PEM header, so the failure is the STRUCTURAL
      # certificate-block error, not the key-material error. A free substring
      # guard would have produced the wrong message.
      caCert: |
        Bag Attributes: friendlyName=acme PRIVATE KEY authority
        -----BEGIN CERTIFICATE-----
        MIIBjTCCATOgAwIBAgIUEVKlZMojk6oxsIdEnHzgqNSB5EQwCgYIKoZIzj0EAwIw
        GzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTAgFw0yNjA3MTYxNjM0NDZaGA8y
        MTI2MDYyMjE2MzQ0NlowGzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTBZMBMG
        ByqGSM49AgEGCCqGSM49AwEHA0IABHYaDAyL+v09MqV1Yp1T1AE7Y6LHqBnVF2kH
        4mzq8ewzoqb7EF/IY/acC4G514Lsi212vky2z+yk61EIWlgzqmGjUzBRMB0GA1Ud
        DgQWBBReFu/b3ZdMzmFjrOTD8A8bFPX6fDAfBgNVHSMEGDAWgBReFu/b3ZdMzmFj
        rOTD8A8bFPX6fDAPBgNVHRMBAf8EBTADAQH/MAoGCCqGSM49BAMCA0gAMEUCIQCj
        P8IEUi9H4YcxOyAtGt22n6WCP8dqxP4p2QfkcRl6LAIgSOIMy4oHa5IJWREYdFt9
        L/I7Ek4FlYbzy9kZu/MXqlE=
        -----END CERTIFICATE-----
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must contain a complete PEM certificate block (BEGIN/END CERTIFICATE)"

  # The chart-side analog of the CA-extraction controller's write-path guard: the
  # regex is anchored to the WHOLE value, so a certificate that parses but carries
  # bytes before or after the block cannot smuggle them into the verbatim-emitted
  # trust anchor. The controller strips such bytes (it can re-encode); a Helm
  # template can only refuse the value, which it does.
  - it: rejects a certificate preceded by a human-readable preamble
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      # What `openssl x509 -text` prints ahead of the PEM block.
      caCert: |
        Certificate:
            Data:
                Version: 3 (0x2)
        -----BEGIN CERTIFICATE-----
        MIIBjTCCATOgAwIBAgIUEVKlZMojk6oxsIdEnHzgqNSB5EQwCgYIKoZIzj0EAwIw
        GzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTAgFw0yNjA3MTYxNjM0NDZaGA8y
        MTI2MDYyMjE2MzQ0NlowGzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTBZMBMG
        ByqGSM49AgEGCCqGSM49AwEHA0IABHYaDAyL+v09MqV1Yp1T1AE7Y6LHqBnVF2kH
        4mzq8ewzoqb7EF/IY/acC4G514Lsi212vky2z+yk61EIWlgzqmGjUzBRMB0GA1Ud
        DgQWBBReFu/b3ZdMzmFjrOTD8A8bFPX6fDAfBgNVHSMEGDAWgBReFu/b3ZdMzmFj
        rOTD8A8bFPX6fDAPBgNVHRMBAf8EBTADAQH/MAoGCCqGSM49BAMCA0gAMEUCIQCj
        P8IEUi9H4YcxOyAtGt22n6WCP8dqxP4p2QfkcRl6LAIgSOIMy4oHa5IJWREYdFt9
        L/I7Ek4FlYbzy9kZu/MXqlE=
        -----END CERTIFICATE-----
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must contain a complete PEM certificate block (BEGIN/END CERTIFICATE)"

  - it: rejects a certificate trailed by arbitrary bytes
    templates:
      - templates/tests/tls-cacert.yaml
    set:
      caCert: |
        -----BEGIN CERTIFICATE-----
        MIIBjTCCATOgAwIBAgIUEVKlZMojk6oxsIdEnHzgqNSB5EQwCgYIKoZIzj0EAwIw
        GzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTAgFw0yNjA3MTYxNjM0NDZaGA8y
        MTI2MDYyMjE2MzQ0NlowGzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTBZMBMG
        ByqGSM49AgEGCCqGSM49AwEHA0IABHYaDAyL+v09MqV1Yp1T1AE7Y6LHqBnVF2kH
        4mzq8ewzoqb7EF/IY/acC4G514Lsi212vky2z+yk61EIWlgzqmGjUzBRMB0GA1Ud
        DgQWBBReFu/b3ZdMzmFjrOTD8A8bFPX6fDAfBgNVHSMEGDAWgBReFu/b3ZdMzmFj
        rOTD8A8bFPX6fDAPBgNVHRMBAf8EBTADAQH/MAoGCCqGSM49BAMCA0gAMEUCIQCj
        P8IEUi9H4YcxOyAtGt22n6WCP8dqxP4p2QfkcRl6LAIgSOIMy4oHa5IJWREYdFt9
        L/I7Ek4FlYbzy9kZu/MXqlE=
        -----END CERTIFICATE-----
        and then some trailing bytes
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: caCert must contain a complete PEM certificate block (BEGIN/END CERTIFICATE)"

  - it: fails closed when name is empty
    templates:
      - templates/tests/tls-cacert-params.yaml
    set:
      useParams: true
      name: ""
      namespace: tenant-acme
      caCert: |
        -----BEGIN CERTIFICATE-----
        MIIBjTCCATOgAwIBAgIUEVKlZMojk6oxsIdEnHzgqNSB5EQwCgYIKoZIzj0EAwIw
        GzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTAgFw0yNjA3MTYxNjM0NDZaGA8y
        MTI2MDYyMjE2MzQ0NlowGzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTBZMBMG
        ByqGSM49AgEGCCqGSM49AwEHA0IABHYaDAyL+v09MqV1Yp1T1AE7Y6LHqBnVF2kH
        4mzq8ewzoqb7EF/IY/acC4G514Lsi212vky2z+yk61EIWlgzqmGjUzBRMB0GA1Ud
        DgQWBBReFu/b3ZdMzmFjrOTD8A8bFPX6fDAfBgNVHSMEGDAWgBReFu/b3ZdMzmFj
        rOTD8A8bFPX6fDAPBgNVHRMBAf8EBTADAQH/MAoGCCqGSM49BAMCA0gAMEUCIQCj
        P8IEUi9H4YcxOyAtGt22n6WCP8dqxP4p2QfkcRl6LAIgSOIMy4oHa5IJWREYdFt9
        L/I7Ek4FlYbzy9kZu/MXqlE=
        -----END CERTIFICATE-----
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: name is required"

  - it: omits metadata.namespace when namespace is not supplied
    templates:
      - templates/tests/tls-cacert-params.yaml
    set:
      useParams: true
      name: my.tenant-ca
      caCert: |
        -----BEGIN CERTIFICATE-----
        MIIBjTCCATOgAwIBAgIUEVKlZMojk6oxsIdEnHzgqNSB5EQwCgYIKoZIzj0EAwIw
        GzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTAgFw0yNjA3MTYxNjM0NDZaGA8y
        MTI2MDYyMjE2MzQ0NlowGzEZMBcGA1UEAwwQY296eS1saWItdGVzdC1jYTBZMBMG
        ByqGSM49AgEGCCqGSM49AwEHA0IABHYaDAyL+v09MqV1Yp1T1AE7Y6LHqBnVF2kH
        4mzq8ewzoqb7EF/IY/acC4G514Lsi212vky2z+yk61EIWlgzqmGjUzBRMB0GA1Ud
        DgQWBBReFu/b3ZdMzmFjrOTD8A8bFPX6fDAfBgNVHSMEGDAWgBReFu/b3ZdMzmFj
        rOTD8A8bFPX6fDAPBgNVHRMBAf8EBTADAQH/MAoGCCqGSM49BAMCA0gAMEUCIQCj
        P8IEUi9H4YcxOyAtGt22n6WCP8dqxP4p2QfkcRl6LAIgSOIMy4oHa5IJWREYdFt9
        L/I7Ek4FlYbzy9kZu/MXqlE=
        -----END CERTIFICATE-----
    asserts:
      - equal:
          path: metadata.name
          value: my.tenant-ca
      - notExists:
          path: metadata.namespace

  - it: fails closed when invoked with a non-dict argument
    templates:
      - templates/tests/tls-cacert-nondict.yaml
    # A valid caCert keeps the other fixtures rendering cleanly so the only
    # failure is the non-dict guard on this fixture.
    values:
      - tls_cacert_values.yaml
    set:
      nonDict: true
    asserts:
      - failedTemplate:
          errorMessage: "cozy-lib.tls.caCertSecret: expected a single dict argument"
