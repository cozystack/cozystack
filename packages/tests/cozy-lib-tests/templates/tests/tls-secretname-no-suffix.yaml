{{/*
Test-only template: calls cozy-lib.tls.secretName with secretName but no suffix
to verify that suffix is not required when secretName is provided.
*/}}
{{- $secretName := include "cozy-lib.tls.secretName" (dict "Release" .Release "secretName" .Values.tlsSecretName) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-secretname-no-suffix
data:
  secretName: {{ $secretName | quote }}
